design_779 = "Dieses Instrument kann in keiner Weise geändert werden, weil es ein PROMIS-Instrument ist. Das bedeutet, dass seine Fragen von einem externen REDCap-Server generiert werden. Sie können das Instrument jedoch umbenennen oder löschen."
