system_config_392 = "Einbettung von Videos auf Eingabeformularen und Fragebogenseiten erlauben?"
system_config_393 = "Wenn aktiviert, erlaubt der Online Designer Benutzern, für ein beschreibendes Feld auf einem Formular oder Fragebogen eine Video-URL bereitzustellen. Dabei wird ein Button bereitgestellt, der beim Anklicken das eingebettete Video in einem Pop-up-Dialog abspielt. Diese Funktion erlaubt die Verwendung beliebiger Video-URLs von beliebigen Video-Hosting-Websites (obwohl sie am besten mit YouTube und Vimeo kompatibel ist)."
