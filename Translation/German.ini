multilang_220 = "Sie können alle standardmäßigen REDCap-Benutzeroberflächenelemente übersetzen, die auf Formularen/Fragebögen sichtbar sind, z. B. Feldvalidierungs-Fehlermeldungen, Absende-Buttons von Fragebögen und andere Dinge, die typischerweise nicht in einem Projekt definiert werden können. Bitte bedenken Sie, dass Sie <b>wahrscheinlich nicht alle Benutzeroberflächenelemente übersetzen müssen</b>, da viele davon auf Ihren Formularen/Fragebögen möglicherweise nicht verwendet werden. Tipp: Verwenden Sie die Hervorhebungsfunktion auf dem Tab Einstellungen oben, um allen nicht übersetzten Text auf der Seite hervorzuheben und schnell zu bestimmen, welche spezifischen Elemente übersetzt werden müssen."
multilang_221 = "Da sich das Projekt derzeit im Produktionsstatus befindet, kann diese Seite nur geändert werden, wenn Sie den Draft Mode aktivieren. Wenn Sie also Bearbeitungen oder Ergänzungen an Ihren Übersetzungen vornehmen möchten, <b>aktivieren Sie zuerst den Draft Mode im Projekt über den Online Designer</b> und kehren Sie dann hierher zurück, um Übersetzungsänderungen im Draft Mode vorzunehmen. Wenn Ihre Entwurfsänderungen genehmigt werden, werden Ihre hier vorgenommenen Übersetzungsänderungen automatisch zusammen mit ihnen genehmigt."
multilang_222 = "Ihr Projekt befindet sich derzeit im Draft Mode; daher werden alle hier vorgenommenen Übersetzungen und Änderungen NICHT in Echtzeit wirksam, sondern gehen erst live, wenn Ihre Entwurfsänderungen über den Online Designer im üblichen Genehmigungsprozess genehmigt und übernommen wurden. HINWEIS: Änderungen an Übersetzungen hier <i>gehen verloren, wenn Sie Ihre Entwurfsänderungen über den Online Designer zurücksetzen</i>. Wenn Sie mit Ihren Übersetzungen fertig sind und sie übernehmen möchten, gehen Sie zum Online Designer und klicken Sie auf den Button 'Submit Changes for Review'."
multilang_223 = "<b>Mehrsprachen-Hinweis:</b> Wenn Sie im Draft Mode Änderungen an Ihren Übersetzungen auf der Multi-Language-Management-Seite vorgenommen haben, gehen diese live, sobald sie zusammen mit allen hier entworfenen Änderungen genehmigt und übernommen werden."
multilang_224 = "<b>Mehrsprachen-Hinweis:</b> Wenn Sie im Draft Mode Änderungen an Ihren Übersetzungen auf der Multi-Language-Management-Seite vorgenommen haben, GEHEN diese Änderungen VERLOREN, wenn Sie hier alle Entwurfsänderungen entfernen."
