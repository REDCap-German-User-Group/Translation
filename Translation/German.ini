multilang_129 = "Standardwerte einschließen"
multilang_130 = "Dies exportiert die Benutzeroberflächenübersetzungen für diese Sprache. Optional können die Übersetzungsprompts und Standardwerte (aus der aktuell aktiven Sprachdatei) eingeschlossen werden (z. B. wenn die Datei nicht ausschließlich für Übertragungs- oder Sicherungszwecke gedacht ist)."
