survey_1245 = "Google-reCAPTCHA-Option zum Schutz öffentlicher Umfragen"
survey_1246 = "Site key:"
survey_1247 = "Secret key:"
survey_1248 = "Um die Option für Benutzer zu aktivieren, Google reCAPTCHA in ihren öffentlichen Umfragen zu verwenden, müssen Sie zuerst einen Google-reCAPTCHA-API-Site-Key und ein Secret für Ihren REDCap-Server einrichten. Wählen Sie beim Registrieren Ihrer Site die Optionen 'reCAPTCHA v2' und 'Checkbox' und geben Sie dann beide Schlüssel in die beiden Textfelder hier ein. Sobald beide gesetzt sind, wird Benutzern auf der Seite Öffentliche Umfrage die Option bereitgestellt, reCAPTCHA in diesem Projekt zu aktivieren. Hinweis: Google reCAPTCHA wird nur bei öffentlichen Umfragen eingesetzt."
survey_1249 = "Google-reCAPTCHA-API-Key erstellen"
survey_1250 = "HINWEIS AN ADMINISTRATOR: Die Google-reCAPTCHA-Funktion zum Schutz öffentlicher Umfragen ist derzeit auf Systemebene für alle Projekte DEAKTIVIERT. Wenn Sie möchten, können Sie die Option jedoch auf der "
survey_1251 = "Seite im Control Center aktivieren. Diese Option ermöglicht Benutzern, ihre öffentliche Umfrage mit Googles reCAPTCHA-Funktionalität zu schützen, wodurch Bots daran gehindert werden können, Müll-Daten in eine öffentliche Umfrage einzutragen."
survey_1252 = "Öffentliche Umfrage mit Google-reCAPTCHA-Funktion schützen"
survey_1253 = "Die Google-reCAPTCHA-Funktion kann aktiviert werden, um Ihre öffentlichen Umfragen vor Missbrauch durch 'Bots' zu schützen, also automatisierte Softwareprogramme, die Müll-Daten in Ihre Umfrage eingeben könnten. Ein 'Captcha' ist ein Turing-Test, um Menschen und Bots zu unterscheiden. Für Menschen ist er leicht zu lösen, für Bots und andere bösartige Software schwer zu knacken. Durch Aktivieren von Google reCAPTCHA in Ihrer öffentlichen Umfrage können Sie automatisierte Software blockieren und zugleich Ihre Umfrageteilnehmenden einfach mit der Umfrage beginnen lassen. Unten sehen Sie einen Beispiel-Screenshot, wie reCAPTCHA in Ihrer Umfrage aussehen könnte. Hinweis: Ein Umfrageteilnehmer muss den reCAPTCHA-Test auf einem bestimmten Gerät/Computer nie öfter als einmal pro Tag bestehen."
survey_1254 = "Bearbeiten von e-Consent-Antworten durch Benutzer erlauben?"
survey_1255 = "HINWEIS: Das Antwortlimit wird nur angewendet, wenn ein Teilnehmer die Umfrageseite lädt. Das bedeutet: Wenn zwei oder mehr Teilnehmende die Umfrage fast gleichzeitig laden und dann absenden, ist es möglich, dass das Antwortlimit leicht überschritten wird. Dies liegt daran, dass das Speichern der Antworten eines Teilnehmers nicht blockiert wird, wenn das Limit erst nach dem Laden der Umfrage überschritten wird; es verhindert aber das Laden der Umfrage, nachdem das Limit überschritten wurde."
survey_1256 = "Abschnittsüberschriften, die neue Abschnitte im Instrument beginnen, dienen als Seitenumbruch in einer mehrseitigen Umfrage, wobei jede Seite mit einer Abschnittsüberschrift beginnt."
survey_1257 = "Bei benutzerdefinierter Nummerierung ist die Nummer jeder Frage standardmäßig leer, bis sie manuell über den Online Designer oder das Data Dictionary hinzugefügt wird."
survey_1258 = "So verwenden Sie \"Stop-Logik\", um eine automatisierte Einladung zu deaktivieren"
survey_1259 = "Wenn Sie automatisierte Umfrageeinladungen (ASIs) haben, die nicht sofort gesendet, sondern später geplant werden, kann es sinnvoll sein, 'Stop-Logik' (auch als 'Kill Switch' bekannt) in Ihrer bedingten Logik zu verwenden, um diese geplanten Einladungen bei Bedarf manuell zu stoppen. Dies kann genutzt werden, wenn eine Einladung versehentlich geplant wurde und Sie sie schnell löschen müssen. HINWEIS: Sie müssen das Kontrollkästchen 'Sicherstellen, dass Logik weiterhin wahr ist' aktiviert haben, damit die 'Stop-Logik' funktioniert. Wenn das Kontrollkästchen aktiviert ist, prüft REDCap jedes Mal, wenn ein bestimmter Datensatz gespeichert oder Daten geändert werden, ob für diesen Datensatz/diese Umfrage eine Einladung geplant ist, und überprüft dann erneut, ob diese Bedingung/Logik weiterhin wahr ist. Wenn die Bedingung nicht mehr wahr ist, wird die Einladung gelöscht, sodass sie nie gesendet wird. Wenn der Datensatz später erneut geändert wird und die Bedingung dann wieder wahr wird, wird die Einladung erneut geplant. Ohne aktiviertes Kontrollkästchen 'Sicherstellen, dass Logik weiterhin wahr ist' lässt REDCap die geplante Einladung unverändert und löscht sie nie."
survey_1260 = "Die 'Stop-Logik' kann ein komplexer Satz bedingter Logik sein oder so einfach wie ein einzelnes Feld im Projekt (d. h. der Kill Switch). Wenn Sie beispielsweise möchten, dass eine Umfrageeinladung geplant wird, wenn ein Teilnehmer mindestens 18 Jahre alt ist, könnte Ihre Logik '[age] >= 18' lauten. Wenn Sie 'Stop-Logik' hinzufügen möchten, um eine geplante Einladung manuell löschen zu können, könnten Sie '[age] >= 18 and [remove_alert] <> 1' verwenden, wobei das Feld 'remove alert' ein Ja/Nein-Feld ist. Wenn Sie in diesem Fall die geplante Einladung löschen möchten, könnten Sie einfach zum Dateneingabeformular gehen, auf dem sich das Feld 'remove alert' befindet, und es auf 'Ja' setzen. Dies kann auf verschiedene Weise erfolgen. Dies ist lediglich ein einfaches Beispiel zur Einführung dieses Konzepts. <b>Denken Sie daran: Der Schlüssel zur Verwendung von 'Stop-Logik' ist, dass das Kontrollkästchen 'Sicherstellen, dass Logik weiterhin wahr ist' aktiviert sein MUSS.</b>"
survey_1261 = "Signaturfeld"
survey_1262 = "Signaturfeld(er) zwangsweise löschen, wenn der Teilnehmer auf der Zertifizierungsseite auf die Schaltfläche Vorherige Seite klickt?"
survey_1263 = "Wählen Sie unten ein Feld aus, das in dieser Umfrage als Signaturfeld dient. Es könnte ein <u>Freitextfeld, ein Signaturfeld oder ein Zahlenfeld</u> sein (z. B. zum Erfassen einer PIN), und es muss ein <u>Pflichtfeld</u> sein. Wenn unten Felder ausgewählt sind und der Teilnehmer zur letzten Seite der Umfrage gelangt, auf der er seine Antworten zertifizieren soll, und dann auf die Schaltfläche Vorherige Seite klickt, wird der Wert dieser Signaturfelder gelöscht. Dadurch muss er die Felder erneut 'signieren', bevor er die Umfrage abschließen kann. Wenn Sie dieses Verhalten nicht wünschen, wählen Sie unten keine Felder aus. Sie können bis zu fünf Signaturfelder verwenden."
survey_1264 = "Ihre Signatur(en) in dieser Umfrage löschen?"
survey_1265 = "Sie haben Ihre Signatur auf einer früheren Seite dieser Umfrage bereitgestellt. Dies kann das Eingeben Ihres Namens, einer PIN und/oder das Zeichnen Ihrer Signatur umfassen. Sie dürfen zu einer vorherigen Seite der Umfrage zurückkehren, aber wenn Sie dies tun, beachten Sie bitte, dass Ihre Signatur(en) automatisch entfernt werden; danach müssen Sie sie erneut bereitstellen, bevor Sie die Umfrage abschließen können. Sie können außerdem alle bestehenden Antworten auf die Fragen in dieser Umfrage ändern. Wenn dies in Ordnung ist, können Sie zu einer früheren Seite der Umfrage gehen, indem Sie auf die Schaltfläche unten klicken."
survey_1266 = "Meine Signatur(en) löschen und zu früherer Seite gehen"
survey_1267 = "Weiteres Signaturfeld auswählen"
survey_1268 = "In dieser Umfrage existieren keine gültigen Felder, die erforderlich sind und außerdem den Kriterien entsprechen, um hier als Signaturfeld verwendet zu werden."
survey_1269 = "WICHTIGER HINWEIS: Eine Twilio-Funktion namens 'Request Inspector' bewirkt, dass alle Aktivitäten detailliert protokolliert und auf Twilios Servern gespeichert werden. Für das höchste Datenschutzniveau wird DRINGEND EMPFOHLEN, den REQUEST INSPECTOR in Ihrem Twilio-Konto manuell zu DEAKTIVIEREN, wenn Sie identifizierende Informationen (z. B. PHI) über Sprachanrufe und SMS-Nachrichten in REDCap erheben. Sie finden diese Einstellung in Ihrer Twilio-Konsole auf der Settings-Seite unter Programmable Voice. Deaktivieren Sie dort den Request Inspector und klicken Sie auf Speichern."
survey_1270 = "Anzeigename (optional)"
survey_1271 = "Zuvor verwendet:"
survey_1272 = "Das Ende benutzerdefinierter URLs darf nur Buchstaben, Zahlen, Punkte, Bindestriche und Unterstriche enthalten."
survey_1273 = "HINWEIS: Sie können die Seite Survey Distribution Tools erst verwenden, wenn ein oder mehrere Datenerhebungsinstrumente als Umfrage aktiviert wurden. Dies kann auf der Online-Designer-Seite erfolgen. Da Sie jedoch keinen Zugriff auf den Online Designer haben, muss ein anderer Benutzer in diesem Projekt dies für Sie tun."
survey_1275 = "Wählen Sie die Sprache Ihres Umfragefragetextes und/oder Ihrer Alarmnachricht sowie den regionalen Dialekt aus, in dem sie gesprochen werden soll (nur für Sprachanrufe verwendet)."
survey_1276 = "REDCap kann mithilfe eines Drittanbieter-Webdienstes namens Twilio (www.twilio.com) Sprachanrufe tätigen und SMS-Textnachrichten für Umfragen sowie für Alarme & Benachrichtigungen senden. So könnten Sie einen Teilnehmer zur Teilnahme an einer Umfrage einladen, indem Sie ihm eine SMS senden oder ihn anrufen; die Daten würden dann direkt von seinem Telefon in REDCap erhoben, ohne eine Webseite verwenden zu müssen. Es gibt viele verschiedene Optionen dafür, wie Sie Teilnehmende einladen und wie diese Ihre Umfragen ausfüllen können, entweder als Sprachanruf-Umfrage oder als SMS-Konversation. Sie können Alarme & Benachrichtigungen auch per Sprachanruf oder SMS statt per E-Mail an Empfänger senden."
survey_1277 = "Nur Umfragen und Umfrageeinladungen (Standard)"
survey_1278 = "Nur Alarme & Benachrichtigungen"
survey_1279 = "ALLE: Umfragen und Umfrageeinladungen + Alarme & Benachrichtigungen"
survey_1281 = "Sie können die Twilio-SMS- und Sprachanrufdienste in diesem Projekt aktivieren, um Alarme & Benachrichtigungen zu senden, Umfrageeinladungen per SMS-Textnachrichten zu versenden und Befragten zu ermöglichen, Umfragen per Sprachanruf oder SMS auszufüllen. Bevor Sie mit den untenstehenden Einrichtungsschritten beginnen, müssen Sie <b>1) Ihr eigenes Twilio-Konto einrichten</b> unter"
survey_1282 = "ALARME & BENACHRICHTIGUNGEN: Zusätzlich zum Senden von Alarmen per E-Mail können Sie diese auch als SMS-Textnachrichten oder Einweg-Sprachanrufe senden. Beim Erstellen eines neuen Alarms auf der Seite Alarme & Benachrichtigungen gibt es eine Auswahl zwischen E-Mail, SMS und Sprachanruf. Die Auswahl von SMS oder Sprachanruf blendet alle E-Mail-spezifischen Einstellungen aus (z. B. E-Mail-Betreff, Anhänge) und zeigt ein Telefonnummern-Textfeld zur Eingabe der Telefonnummer(n) aller Empfänger des Alarms an. Diese Alarme werden weiterhin normal ausgelöst, aber statt die Benachrichtigung per E-Mail zu senden, wird sie als SMS-Nachricht oder Einweg-Sprachanruf gesendet, wobei Text-to-Speech-Technologie verwendet wird, um die Benachrichtigung dem Empfänger hörbar auf seinem Telefon vorzulesen."
survey_1283 = "Umfragespezifische Einstellungen:"
survey_1284 = "Twilio-SMS- und Sprachanrufdienste für Umfragen und Alarme"
survey_1285 = "Um die Twilio-SMS- und Sprachanrufdienste in diesem Projekt zu verwenden, klicken Sie unten auf die Schaltfläche 'Konfigurieren'. Sobald Sie den Twilio-Dienst aktiviert haben, können Sie im Konfigurations-Popup Twilio für 1) Alarme & Benachrichtigungen und/oder 2) Umfragen und Umfrageeinladungen aktivieren. Wenn Sie Twilio für Umfragen verwenden, müssen Sie zunächst ein Instrument in diesem REDCap-Projekt als Umfrage festlegen; danach können Sie auf die Schaltfläche 'Umfragen analysieren' klicken, um eine Analyse aller Ihrer Umfragen auszuführen und festzustellen, ob sie als SMS-Umfrage oder Sprachanruf-Umfrage verwendet werden können."
survey_1286 = "[Auto-Antwort: Diese SMS-Telefonnummer wird nicht überwacht.]"
survey_1288 = "E-Mail gesendet!"
survey_1289 = "Einladung senden"
survey_1290 = "Umfrage-Bestätigungs-E-Mail gesendet"
survey_1291 = "Standardmäßig benötigen Befragte, wenn sie auf einer Umfrage auf die Schaltfläche 'Speichern und später zurückkehren' klicken, den ihnen bereitgestellten Rückkehrcode, um später zur Umfrage zurückzukehren und dort fortzufahren, wo sie aufgehört haben. Dieses Verhalten kann jedoch durch Aktivieren des Kontrollkästchens geändert werden; dadurch kann jeder mit nur dem Umfragelink zur Umfrage zurückkehren und alle zuvor eingegebenen Antworten OHNE Rückkehrcode anzeigen."
survey_1292 = "HINWEIS: Wenn Sie identifizierende Informationen erheben (z. B. PII, PHI), wird aus Datenschutzgründen DRINGEND empfohlen, diese Option nicht zu aktivieren, damit ein Rückkehrcode erzwungen wird."
survey_1293 = "nach Zeitspanne von"
survey_1294 = "(HINWEIS: Felder auf wiederholten Instrumenten/Events funktionieren nicht als Login-Felder.)"
survey_1296 = "Umfrage-Warteschlange vor Teilnehmenden verborgen halten?"
survey_1297 = "Diese Einstellung hält die Tabelle der Umfrage-Warteschlange vor Teilnehmenden verborgen und erzwingt, dass Auto Start für alle warteschlangenaktivierten Umfragen aktiviert ist (auch wenn unten nicht markiert). Dies ist nützlich, wenn Sie die Umfrage-Warteschlange verwenden möchten, um Umfrageteilnehmende automatisch zur nächsten Umfrage zu führen, ohne die Warteschlange der Umfragen anzuzeigen."
survey_1298 = "Bitte beachten Sie, dass das umfragespezifische E-Mail-Einladungsfeld für diese Umfrage aktiviert wurde."
survey_1299 = "HINWEIS: Die Umfrage-Warteschlange wurde in diesem Projekt aktiviert. Bitte beachten Sie, dass die Umfrage-Warteschlange manchmal mit der Funktion Umfrage-Auto-Fortsetzen kollidieren kann."
survey_1300 = "HINWEIS: Eine oder mehrere Umfragen in diesem Projekt verwenden die Funktion Umfrage-Auto-Fortsetzen (aktiviert auf der Seite Umfrageeinstellungen). Bitte beachten Sie, dass die Umfrage-Warteschlange manchmal mit der Funktion Umfrage-Auto-Fortsetzen kollidieren kann."
survey_1301 = "FEHLER: Es tut uns leid, aber die Daten, die Sie gerade auf dieser Seite übermittelt haben, können nicht gespeichert werden. Diese Seite wurde bereits als e-Consent-Umfrage gespeichert, bei der Benutzer e-Consent-Umfrageantworten nach Abschluss durch den Befragten nicht ändern dürfen. Die e-Consent-Antwort wurde zu folgender Zeit gespeichert: "
survey_1302 = "Ihr Projekt befindet sich derzeit im Entwurfsmodus. Sie können ein Instrument im Entwurfsmodus nicht als Umfrage aktivieren, wenn dieses Instrument vor dem Wechsel in den Entwurfsmodus noch nicht im Projekt existierte. Bitte prüfen Sie die Änderungen, die Sie im Entwurfsmodus vorgenommen haben (durch Klicken auf den Link 'Detaillierte Zusammenfassung aller Entwurfsänderungen anzeigen'), und klicken Sie entweder auf die Schaltfläche 'Änderungen zur Prüfung einreichen' oder auf den Link 'Alle Entwurfsänderungen entfernen'. Nachdem Ihre Änderungen genehmigt wurden (oder Sie alle Entwurfsänderungen entfernt haben), steht Ihnen die Schaltfläche 'Aktivieren' zur Verfügung und Sie können Ihr Instrument als Umfrage aktivieren."
survey_1306 = "Aktuelles Event"
survey_1307 = "Hinweis: Wenn das oben ausgewählte Feld auf einem wiederholten Event oder wiederholten Instrument existiert, das zufällig dasselbe Event bzw. Instrument wie diese Umfrage ist, wird die PDF immer in der aktuellen Wiederholungsinstanz der eingereichten Umfrage gespeichert."
survey_1309 = "(Die Zeit, die jeder Befragte zum Abschließen der Umfrage hat, basierend darauf, wann ihm ursprünglich die Umfrageeinladung gesendet wurde. Hinweis: Diese Funktion schließt öffentliche Umfragelinks aus und gilt nicht für Umfragelinks, die über Alarme & Benachrichtigungen gesendet werden.)"
survey_1310 = "Schaltfläche für wiederholte Umfrage nicht anzeigen"
survey_1311 = "Umfrage beenden"
survey_1312 = "Zurückkehren und Antwort bearbeiten"
survey_1313 = "Um Ihre Antworten zu speichern und die Umfrage zu beenden, klicken Sie unten auf die Schaltfläche 'Umfrage beenden'. Wenn Sie versehentlich die falsche Option ausgewählt haben und/oder zur Umfrage zurückkehren möchten, klicken Sie auf die Schaltfläche 'Zurückkehren und Antwort bearbeiten'."
survey_1314 = "Einladungspräferenz jedes Teilnehmers über ein Multiple-Choice-Feld steuern"
survey_1315 = "Wenn Umfrageteilnehmende unterschiedliche Methoden (z. B. E-Mail, SMS mit Link, Sprachanruf-Umfrage) zum Erhalt von Umfrageeinladungen und/oder zum Ausfüllen von Umfragen benötigen, können Sie ein Multiple-Choice-Feld (nur Radio- und Dropdown-Felder) auswählen, dessen Auswahloptionen jede Zustellmethode für Umfrageeinladungen repräsentieren. Nachdem Sie die Einladungspräferenzen einem Feld zugeordnet haben, wird die Einladungspräferenz des Teilnehmers automatisch entsprechend geändert, wenn der Wert des Feldes hinzugefügt oder geändert wird. <b>WICHTIG:</b> Die Multiple-Choice-Codierungen für das ausgewählte Feld müssen exakt wie rechts dargestellt definiert sein, obwohl ihre zugehörigen Auswahl-Labels beliebig geändert werden können."
survey_1316 = "Telefonfeld auswählen"
survey_1317 = "Einladungspräferenz einem Feld zuordnen"
survey_1318 = "Telefonnummernfeld für per SMS oder Sprachanruf gesendete Umfrageeinladungen festlegen (optional)"
survey_1319 = "Oben sind alle Textfelder aufgeführt, die entweder Integer-Validierung oder Telefonnummern-Validierung haben."
survey_1320 = "Erforderliche Auswahlcodes mit Beispiel-Auswahl-Labels:"
survey_1322 = "HINWEIS: Nicht alle obenstehenden Optionen müssen für die Auswahloptionen des Feldes gesetzt werden, sondern nur die benötigten. Beachten Sie außerdem: Wenn der Wert des oben ausgewählten Feldes auf leer/null gesetzt wird, fällt die Einladungspräferenz für den Teilnehmer auf die Standard-Einladungspräferenz des Projekts zurück. Wenn außerdem die Einladungspräferenz eines Teilnehmers über die Teilnehmerliste geändert wird, ändert diese Änderung auch den Wert des oben ausgewählten Zuordnungsfeldes."
survey_1324 = "Optionen zu Umfrage-Stop-Aktionen:"
survey_1325 = "Alternativer Umfrage-Abschlusstext (optional)"
survey_1326 = "Dieser Abschlusstext wird NUR angezeigt, wenn eine Stop-Aktion das Ende der Umfrage auslöst. Wenn leer gelassen, wird der Standard-Umfrage-Abschlusstext verwendet."
survey_1327 = "Speichern von Umfrageantworten verhindern, wenn die Umfrage über Stop-Aktion endet?"
survey_1328 = "Alle Umfrageantworten speichern, unabhängig davon, ob eine Stop-Aktion ausgelöst wurde (Standard)"
survey_1329 = "Umfrageantwort NICHT speichern, wenn eine Stop-Aktion ausgelöst wird"
survey_1330 = "Wenn eine Stop-Aktion das Ende der Umfrage auslöst, können Sie wählen, ob die übermittelten Antworten beibehalten oder nicht als Daten im Projekt gespeichert werden."
survey_1331 = "Offline-Nachricht hinzufügen"
survey_1332 = "Gelöschte Antwort"
survey_1333 = "WARNUNG: Wenn vor Auslösung der Stop-Aktion bereits Daten im Umfrageinstrument gespeichert wurden, werden diese Daten gelöscht. Wenn die Umfrage beispielsweise mehrseitig ist und auf vorherigen Seiten vor Auslösen der Stop-Aktion Daten eingegeben wurden, werden alle bis dahin in dieser Umfrage erhobenen Daten gelöscht, als wäre die Umfrage nie ausgefüllt worden. Wenn der Datensatz außerdem keine Daten in anderen Instrumenten enthält, wird während dieses Vorgangs der gesamte Datensatz selbst gelöscht."
survey_1334 = "HINWEIS: Wenn der gesamte Datensatz gelöscht wird, werden alle protokollierten Datenwerte für diesen Datensatz gemäß der Datenschutz-Einstellung dieses Projekts aus dem Protokoll entfernt."
survey_1335 = "TIPP: Wenn Sie Teilnehmende per SMS-Nachrichten oder Telefonanrufen kontaktieren, könnten Sie ein Feld hinzufügen mit dem Text '<b>Ich stimme zu, per Textnachricht oder Telefon kontaktiert zu werden</b>' und den Teilnehmer diese Frage beantworten lassen. Dann haben Sie in Ihrem Projekt einen Nachweis, dass der Teilnehmer der Kontaktaufnahme per Textnachricht oder Telefon zustimmt."
