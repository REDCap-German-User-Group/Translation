control_center_4419 = "E-Mail erneut senden"
control_center_4420 = "Die E-Mail-Adresse des Benutzers wurde automatisch verifiziert. Das bedeutet, dass er sein E-Mail-Konto nicht mehr über die an sein Konto gesendete Verifizierungs-E-Mail verifizieren muss. Er kann sich nun frei bei REDCap anmelden. Sie möchten ihn möglicherweise darüber informieren."
control_center_4421 = "Möchten Sie die E-Mail-Adresse des Benutzers automatisch verifizieren? Falls ja, bedeutet dies, dass er sein E-Mail-Konto nicht über die an sein Konto gesendete Verifizierungs-E-Mail verifizieren muss. Sie sollten dies wirklich nur tun, wenn er nicht auf seine E-Mail zugreifen kann oder aus irgendeinem Grund keine Verifizierungs-E-Mails erhält."
control_center_4422 = "Benutzer bei Sperrung per E-Mail benachrichtigen?"
control_center_4423 = "Wenn aktiviert, werden Benutzer, die sich in den letzten X Tagen (oben angegeben) nicht bei REDCap angemeldet oder die API verwendet haben, automatisch gesperrt und (falls oben auf Ja gesetzt) per E-Mail über ihre Sperrung benachrichtigt. Wenn der Benutzer einen Sponsor (d. h. sekundären Kontakt) in seinem Konto aufgeführt hat, erhält der Sponsor diese E-Mail in Cc, damit er informiert ist."
control_center_4424 = "Bitte beachten Sie außerdem, dass REDCap eine Richtlinie zum Benutzerzugriff besitzt, nach der ein Benutzerkonto automatisch gesperrt wird, wenn sich der Benutzer über einen längeren Zeitraum nicht bei REDCap angemeldet hat. Für Details hierzu wenden Sie sich bitte an Ihren REDCap-Administrator."
control_center_4425 = "Bitte beachten Sie: Wenn die Sperre eines Benutzers innerhalb des Zeitraums ohne Aktivität durch einen Administrator aufgehoben wurde, wird der Benutzer NICHT automatisch gesperrt."
control_center_4427 = "Benutzerverwaltung für tabellenbasierte Authentifizierung"
control_center_4428 = "Nach Benutzername, Vorname, Nachname oder primärer E-Mail suchen"
control_center_4429 = "Benutzer nach Benutzername, Vorname, Nachname oder primärer E-Mail suchen"
control_center_4431 = "IHRE REDCAP-DATENBANKSTRUKTUR IST FALSCH!"
control_center_4434 = "TIPP: Verwenden Sie nur 1-3 Wörter pro Zeile und keine Wörter wie 'the', 'of', 'a' usw. Verwenden Sie z. B. statt 'The University of Texas Southwestern University' für beste Ergebnisse nur 'University of Texas Southwestern'."
control_center_4436 = "HINWEIS: REDCap Base URL beginnt nicht mit 'https'"
control_center_4437 = "Es scheint, dass Sie eine sichere HTTPS-Verbindung verwenden (d. h. SSL). Ihre REDCap Base URL spiegelt dies jedoch nicht wider. Wenn Sie für diesen Server weiterhin eine SSL-Verbindung verwenden, wird empfohlen, zur Seite Allgemeine Konfiguration zu navigieren und die REDCap Base URL so zu ändern, dass sie mit 'https' beginnt. Andernfalls sind viele REDCap-Links, z. B. per E-Mail versendete Links, falsch."
control_center_4438 = "Tage ab jetzt"
control_center_4439 = "Der von Ihnen eingegebene Wert für REDCap base URL ist möglicherweise nicht korrekt, da er nicht mit der URL oben für diese Webseite übereinstimmt. Sind Sie sicher, dass er korrekt ist? Falls ja, lassen Sie ihn unverändert; andernfalls ändern Sie ihn bitte."
