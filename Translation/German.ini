design_429 = "Der Variablenname kann nicht geändert werden, weil dieser Variablenname bereits verwendet wird, während sich das Projekt im Produktionsstatus befindet. Das Umbenennen der Variable würde zu dauerhaftem Datenverlust führen."
design_434 = "Dieses Feld ist das Datensatz-ID-Feld, also das erste Feld im Projekt. Dieses Feld ist besonders, weil es zum Speichern der Namen der Datensätze in Ihrem Projekt verwendet wird. Daher kann das Datensatz-ID-Feld nicht gelöscht oder verschoben, sondern nur bearbeitet werden. Wenn Sie möchten, können Sie sein Feldlabel oder sogar seinen Variablennamen ändern."
