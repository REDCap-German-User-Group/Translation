report_builder_179 = "Sie können eine kurze und leicht zu merkende benutzerdefinierte URL erstellen, die zu Ihrem öffentlichen Report weiterleitet. <b>Geben Sie die gewünschte benutzerdefinierte URL ein</b>, die zu Ihrem öffentlichen Report weiterleiten soll. Beim Absenden wird geprüft, ob die URL bereits vergeben ist. Falls nicht, wird die benutzerdefinierte URL hier in Ihrem Projekt gespeichert, sodass Sie sie weiterhin verwenden können."
