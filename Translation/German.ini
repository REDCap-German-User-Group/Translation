locking_38 = "Dieses Modul kann verwendet werden, um die Option zur Datensatzsperrung für Datenerhebungsinstrumente anzupassen. Die folgenden Einstellungen sind vollständig optional. Nur Benutzer mit der Berechtigung zum Sperren/Entsperren können auf diese Seite zugreifen, und nur sie können Datensätze für ein bestimmtes Formular sperren und entsperren. Wenn sie über die zusätzliche Berechtigung verfügen, können sie für einen beliebigen Datensatz alle Formulare auf einmal sperren. Standardmäßig können alle Benutzer mit Sperren/Entsperren-Berechtigungen die Sperroption am unteren Rand des Datenerhebungsinstruments sehen, andere Benutzer sehen diese Option jedoch nicht. Sobald ein Formular für einen Datensatz gesperrt ist, zeigt das Formular (für alle Benutzer) an, wann es gesperrt wurde und welcher Benutzer es gesperrt hat. Alle Felder im Formular sind deaktiviert/schreibgeschützt, bis jemand mit Sperren/Entsperren-Berechtigungen das Formular entsperrt."

