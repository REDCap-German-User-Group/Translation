design_219 = "Es scheint, dass Ihr Data Dictionary die Spalte Field Units enthält, die in REDCap nicht mehr unterstützt wird. Field Units wurden früher AUSSCHLIESSLICH beim Datenexport für das Statistikpaket R verwendet. Bitte entfernen Sie die Spalte Field Units aus Ihrem Data Dictionary und laden Sie es erneut hoch. (Die Spalte Section Header sollte jetzt stattdessen in Spalte C stehen.) Falls Sie früher Field Units für Felder definiert hatten, bleiben diese Werte erhalten und werden auch künftig beibehalten (sofern das Feld nicht gelöscht wird). Neue Werte für Field Units können jedoch künftig für keine Felder mehr hinzugefügt oder geändert werden, da die Funktion Field Units veraltet ist."
