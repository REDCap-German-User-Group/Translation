survey_1580 = "FEHLER: Es tut uns leid, aber die Daten, die Sie gerade auf dieser Seite übermittelt haben, können nicht gespeichert werden. Diese Seite wurde bereits als teilweise oder vollständig abgeschlossene Umfrageantwort gespeichert, und da Sie keine Benutzerrechte zum Bearbeiten von Umfrageantworten haben, dürfen Sie die Daten auf diesem Dateneingabeformular nicht ändern."
survey_1581 = "Umfrage-Warteschlange bearbeiten"
survey_1582 = "Beim Definieren der untenstehenden Bedingungen können Sie wählen, ob Umfrageeinladungen durch den Abschluss einer Umfrage oder dadurch ausgelöst werden, dass vordefinierte Logik wahr wird (d. h. wenn die Datenwerte eines bestimmten Datensatzes eine Anforderung erfüllen). Sie können entweder die Logik- oder Umfrageabschlussoptionen als Trigger verwenden oder beide zusammen. (Bitte beachten Sie: Wenn Sie einstellen, dass eine Einladung beim Abschluss einer bestimmten Umfrage ausgelöst wird, umfasst dies auch, wenn ein Nicht-Umfrage-Benutzer das Formularstatusfeld des entsprechenden Dateneingabeformulars dieser Umfrage auf 'Complete' setzt.) Beim Festlegen der Zeit, nach der die Einladungen gesendet werden, können Sie die Einladung sofort nach Erfüllung der Bedingungen oder zu einer relativen oder festen Zeit danach senden lassen. Schließlich müssen Sie die hier definierten automatisierten Einladungseinstellungen aktivieren; das bedeutet, dass Ihre Einstellungen sofort initiiert werden und REDCap aktiv 'lauscht', um Einladungen für Ihre Umfragen anhand der von Ihnen definierten Bedingungen zu senden/zu planen."
