random_111 = "Die soeben hochgeladene Zuteilungstabelle wurde nicht akzeptiert oder gespeichert, weil sie mit der anderen Zuteilungstabelle übereinstimmt, die bereits zuvor hochgeladen wurde. Bitte beachten Sie, dass die im Entwicklungsstatus verwendete Zuteilungstabelle nicht exakt identisch mit der im Produktionsstatus verwendeten Zuteilungstabelle sein darf. Bitte ändern Sie Ihre Zuteilungstabelle und laden Sie sie erneut hoch."
