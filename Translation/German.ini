control_center_4905="HINWEIS: Die obige Cronjob-URL ist eine öffentlich zugängliche URL. Daher kann jeder, der diese Webadresse aufruft, den Cronjob auslösen. Dies ist nicht wirklich bedenklich, es sei denn, der aktuelle Server ist ein Test-/Staging-Server, der eine Kopie des Produktionsservers ist. In diesem Fall könnte das Auslösen des Cron unerwünschte E-Mails versenden, die vom Produktionsserver und nicht von diesem Server kommen sollten."
