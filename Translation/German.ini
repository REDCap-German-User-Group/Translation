ws_158 = "Daten wurden erfolgreich aus dem Quellsystem importiert und gespeichert für"
ws_166 = "Unten werden die aus dem externen Quellsystem abgerufenen Daten angezeigt. Es werden alle gemappten REDCap-Felder angezeigt, für die Quelldaten zurückgegeben wurden. Um die Quelldatenwerte in REDCap zu importieren, wählen Sie den Quellwert aus, indem Sie in der Zeile das Optionsfeld für den gewünschten Wert anklicken. Einige Felder können mehrere Werte zurückgeben, daher müssen Sie den besten oder korrektesten Wert wählen. Nachdem Sie alle Auswahlen getroffen haben, klicken Sie unten auf die Speichern-Schaltfläche, um die Quellwerte in REDCap zu speichern."
ws_349 = "Über das Adjudizierungsmodal"
ws_350 = "Anweisungen anzeigen"
ws_351 = "Dieses Modal vergleicht die aktuellen REDCap-Werte des Datensatzes mit Quellwerten, die noch zur Prüfung ausstehen."
ws_352 = "Wenn \"Passende REDCap-Werte anzeigen\" deaktiviert ist, konzentriert sich das Modal auf Gruppen, die noch wie aktive Adjudizierungsarbeit aussehen."
ws_353 = "Wenn es aktiviert ist, zeigt das Modal auch ausgeblendete Gruppen an, in denen ein ausstehender Quellwert bereits mit dem aktuellen REDCap-Wert übereinstimmt."
ws_354 = "Zeilen, die bereits als adjudiziert oder ausgeschlossen geschlossen wurden, werden hier nicht angezeigt."
ws_355 = "Dieses Modal ist ein Prüfbildschirm für Daten, die aus dem Quellsystem für den aktuellen REDCap-Datensatz abgerufen wurden. Sein Zweck ist es, Ihnen zu helfen, zu vergleichen, was REDCap aktuell speichert und was durch den neuesten Datenabruf zurückgegeben wurde, und dann zu entscheiden, welche Quellwerte in REDCap importiert werden sollen."
ws_356 = "Schlüsselbegriffe"
ws_357 = "Quellwert"
ws_358 = "Ein Wert, der vom Quellsystem für diesen Datensatz während des neuesten Datenabrufs zurückgegeben wurde."
ws_359 = "Ausstehende Prüfung"
ws_360 = "Ein Quellwert, der noch eine Entscheidung benötigt. Er wurde noch nicht als adjudiziert (akzeptiert/importiert) oder ausgeschlossen (ferngehalten) geschlossen."
ws_361 = "Passender REDCap-Wert"
ws_362 = "Ein Quellwert, der mit dem aktuellen REDCap-Wert identisch ist, der bereits im Zielfeld gespeichert ist."
ws_363 = "Was Sie standardmäßig sehen"
ws_364 = "Wenn \"Passende REDCap-Werte anzeigen\" deaktiviert ist, soll dieses Modal zuerst die Arbeit anzeigen, die noch Aufmerksamkeit erfordert. Sie sehen weiterhin den aktuellen REDCap-Wert zum Vergleich sowie Quellwerte aus dem neuesten Datenabruf, die noch zur Prüfung ausstehen. Gruppen, die bereits einen mit REDCap passenden Quellwert enthalten, können ausgeblendet werden, um Unübersichtlichkeit zu reduzieren."
ws_365 = "Was sich ändert, wenn Sie \"Passende REDCap-Werte anzeigen\" aktivieren"
ws_366 = "Das Aktivieren dieser Option zeigt ausgeblendete Gruppen an, in denen ein zur Prüfung ausstehender Quellwert bereits mit dem aktuellen REDCap-Wert übereinstimmt. Dies ist für den Vergleich nützlich, macht das Modal jedoch nicht zu einer Verlaufsansicht und bringt keine Zeilen zurück, die bereits in einem früheren Adjudizierungsdurchlauf geschlossen wurden."
ws_367 = "Was Sie hier nicht sehen werden"
ws_368 = "Zeilen, die bereits als adjudiziert geschlossen wurden (akzeptiert/importiert)"
ws_369 = "Zeilen, die bereits als ausgeschlossen geschlossen wurden (ferngehalten)"
ws_370 = "Eine vollständige Historie jeder früheren Adjudizierungsentscheidung für den Datensatz"
ws_371 = "Betrachten Sie dieses Modal als Prüfqueue für den neuesten Datenabruf, nicht als Audit-Protokoll."
ws_372 = "Beispiel"
ws_373 = "Angenommen, REDCap speichert bereits \"Male\" in einem Feld, und der neueste Datenabruf gibt erneut \"Male\" zurück. Dieser zurückgegebene Wert ist ein passender REDCap-Wert. Er kann zunächst ausgeblendet sein, weil er nicht wie neue Arbeit aussieht. Wenn Sie \"Passende REDCap-Werte anzeigen\" aktivieren, können Sie ihn trotzdem zum Vergleich prüfen. Wenn aber eine ältere Zeile bereits als adjudiziert oder ausgeschlossen geschlossen wurde, erscheint diese ältere geschlossene Zeile in diesem Modal nicht wieder."
ws_374 = "Nur Daten in sichtbaren Formularen werden gespeichert."
ws_375 = "Weitere Ergebnisse aus dem Quellsystem sind verfügbar."
ws_376 = "Weitere Ergebnisse abrufen"
ws_377 = "Weitere Ergebnisse werden abgerufen..."
ws_378 = "Alle verfügbaren Ergebnisse aus dem Quellsystem wurden abgerufen."
ws_379 = "Das Abrufen weiterer Ergebnisse aktualisiert dieses Modal und löscht alle ungespeicherten Auswahlen. Fortfahren?"
