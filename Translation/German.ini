edit_project_151 = "Sind Sie sicher, dass Sie alle ungenutzten zwischengespeicherten Daten aus dem externen Quellsystem entfernen möchten?"
edit_project_154 = "Alle ungenutzten Clinical-Data-Pull-Daten aus dem externen Quellsystem wurden erfolgreich entfernt."
edit_project_155 = "HINWEIS: Da das Projekt nicht zugänglich ist, kann dieses Popup-Fenster nicht geschlossen werden. Sie können jedoch auf den Button unten klicken, um zur Seite 'Meine Projekte' zurückzukehren."
edit_project_156 = "Einstellungen, die nur Administratoren angezeigt werden:"
edit_project_160 = "Der Dateneingabe-Trigger ist eine erweiterte Funktion. Er bietet REDCap die Möglichkeit, eine entfernte Webadresse (URL) aufzurufen, indem eine HTTP-POST-Anfrage an die angegebene URL gesendet wird, sobald *irgendein* Datensatz oder irgendeine Fragebogenantwort in *irgendeinem* Datenerhebungsinstrument oder Fragebogen in diesem Projekt erstellt oder geändert wurde (er wird *nicht* durch Datenimporte ausgelöst - einschließlich API-Importen und Mobile-App-Importen -, sondern nur durch normale Dateneingabe in Fragebögen und Eingabeformularen). Hauptzweck ist, externe Systeme außerhalb von REDCap genau in dem Moment zu benachrichtigen, in dem ein Datensatz/eine Antwort erstellt oder geändert wird, deren Zweck wiederum sein kann, irgendeine Aktion der entfernten Website auszulösen, etwa einen Aufruf der REDCap API."
edit_project_161 = "Projekt kopieren oder sichern"
edit_project_162 = "Projekt sichern"
edit_project_166 = "JA, in Produktionsstatus verschieben"
edit_project_167 = "Eine exakte Kopie dieses Projekts erstellen."
edit_project_168 = "Alle Projektfelder werden kopiert, und Sie werden aufgefordert, Titel und Informationen für das neue Projekt festzulegen. Sie können wählen, ob vorhandene Daten aus dem aktuellen Projekt in das neue kopiert werden sollen oder nicht."
edit_project_171 = "Entschuldigung, aber da Sie keine Datenexportrechte haben, können Sie aus diesem Projekt keine Daten herunterladen, sondern nur die Metadaten."
edit_project_172 = "Das gesamte Projekt (alle Instrumente, Felder und Projektattribute) kann als einzelne XML-Datei (CDISC-ODM-Format) heruntergeladen werden. Diese XML-Datei kann verwendet werden, um einen Klon des Projekts auf diesem REDCap-Server oder auf einem anderen REDCap-Server zu erstellen (sie kann auf der Seite 'Neues Projekt erstellen' hochgeladen werden). Da sie im CDISC-ODM-Format vorliegt, kann sie auch verwendet werden, um das Projekt in ein anderes ODM-kompatibles System zu importieren."
edit_project_173 = "HINWEIS: Die exportierte XML-Datei enthält *nicht* die Logging-Historie (Audit Trail) des Projekts. Wenn Sie diese erhalten möchten, können Sie sie jederzeit oben auf der Logging-Seite herunterladen."
edit_project_174 = "ALLE bisher gespeicherten Daten behalten."
edit_project_175 = "Projekt kopieren"
edit_project_176 = "Vorhandene Daten behalten oder löschen?"
edit_project_178 = "Sind Sie sicher, dass Sie die ENTWICKLUNGS-Phase verlassen möchten? Wenn Sie fortfahren, wird das Projekt in den PRODUKTIONSstatus verschoben, damit echte Daten erhoben werden können. Wenn Sie unten die Option 'ALLE Daten löschen' auswählen, werden alle aktuell erhobenen Daten, Kalender-Events und hochgeladenen Dokumente gelöscht; andernfalls bleibt alles unverändert, während das Projekt in Produktion verschoben wird."
edit_project_179 = "Anfrage ausstehend"
edit_project_180 = "Sobald das Projekt in Produktion ist, können Sie die Projektfelder nicht mehr in Echtzeit bearbeiten. Sie können jedoch Änderungen im Entwurfsmodus vornehmen, die automatisch genehmigt werden oder andernfalls von einem REDCap-Administrator genehmigt werden müssen, bevor sie wirksam werden."
edit_project_181 = "Die Wiederholungsinstanznummer der aktuellen Instanz eines wiederholten Events ODER wiederholten Instruments. Hinweis: Dieser Parameter wird nur in der Anfrage gesendet, wenn das Projekt wiederholte Events/Instrumente enthält *und* gerade ein wiederholtes Event/Instrument gespeichert wird."
edit_project_182 = "Der eindeutige Instrumentname des aktuellen wiederholten Instruments, das gespeichert wird. Hinweis: Dieser Parameter wird nur in der Anfrage gesendet, wenn das Projekt wiederholte Instrumente enthält *und* gerade ein wiederholtes Instrument gespeichert wird. Außerdem wird dieser Parameter nicht für wiederholte Events gesendet (im Gegensatz zu wiederholten Instrumenten)."
edit_project_183 = "Verwenden Sie den Button unten, um ein API-Token für dieses Projekt zu generieren. Sie benötigen für jedes Projekt, auf das Sie zugreifen möchten, ein anderes Token."
edit_project_184 = "Benutzer müssen einen Grund (max. 200 Zeichen) in ein Textfeld eingeben, wenn sie Datenänderungen an einem bereits vorhandenen Datensatz in einem Datenerhebungsinstrument vornehmen. Die Aufforderung wird beim Klick auf den Speichern-Button auf der Seite ausgelöst. Eingegebene 'Gründe' können anschließend jederzeit auf der Logging-Seite eingesehen werden. Hinweis: Wenn für das Instrument noch keine Daten erhoben wurden, ist kein Grund erforderlich (dies umfasst auch Datenimporte über das Datenimport-Tool). Diese Funktion wird nur beim Hinzufügen, Bearbeiten oder Löschen von Daten für ein Instrument ausgelöst, das bereits erhobene Daten für ein oder mehrere Felder des Instruments enthält."
; edit_project_185 is concatenated with a dynamic link target.
edit_project_185 = "Erkunden Sie die"
; edit_project_186 is concatenated with dynamic link targets.
edit_project_186 = "Erfahren Sie mehr über"
edit_project_187 = "<b>HINWEIS:</b> Da für dieses Projekt mehrere Events definiert sind (d. h. es ist longitudinal), <b>müssen Sie dem Variablennamen den eindeutigen Event-Namen in Klammern voranstellen</b> - z. B. [baseline_arm_1][last_name]. Smart Variables können hier ebenfalls verwendet werden - z. B. [first-event-name][last_name]."
edit_project_189 = "FEHLER: Anfrage ungültig"
edit_project_190 = "HINWEIS AN ADMINISTRATOR: Die aktuelle Sponsor-Anfrage ist nicht mehr gültig und kann daher nicht verarbeitet werden. Das bedeutet, sie wurde möglicherweise gelöscht oder bereits von einem Administrator verarbeitet."
edit_project_191 = "Wert des sekundären eindeutigen Felds neben jedem angezeigten Datensatznamen anzeigen?"
edit_project_192 = "Feldbezeichnung des sekundären eindeutigen Felds beim Anzeigen des Werts anzeigen?"
edit_project_193 = "HINWEIS AN ADMINISTRATOR: Die aktuelle Projektanfrage (d. h. zum Löschen des Projekts) ist nicht mehr gültig und kann daher nicht verarbeitet werden. Das bedeutet, die Anfrage wurde möglicherweise von einem Administrator oder vom anfragenden Benutzer gelöscht oder abgebrochen."
edit_project_194 = "Bitte beachten Sie: Wenn Sie Instrumente oder Events abwählen, die derzeit als wiederholtes Instrument oder wiederholtes Event festgelegt sind, kann dies dazu führen, dass viele bereits erhobene Daten dauerhaft verwaist werden. Das bedeutet, dass die Daten nicht mehr über die Benutzeroberfläche zugänglich sind und auch nicht mehr in Reports oder Datenexporten angezeigt werden. Wenn Daten auf diese Weise versehentlich verwaisen, können alle Daten jedoch leicht wiederhergestellt/entwaist werden, indem die Einstellungen für wiederholte Instrumente/Events wieder auf den früheren Stand gesetzt werden."
edit_project_195 = "Das Projekt in den Status Analyse/Bereinigung verschieben, wenn die Datenerhebung abgeschlossen ist. Dadurch wird der Großteil der Projektfunktionalität deaktiviert, obwohl alle erhobenen Daten erhalten bleiben. Im Status Analyse/Bereinigung kann das Projekt jederzeit zurück in den Produktionsstatus verschoben werden."
edit_project_196 = "Projekt in Status Analyse/Bereinigung verschieben?"
edit_project_197 = "Möchten Sie den Status des Projekts auf ANALYSE/BEREINIGUNG setzen?"
edit_project_198 = "Bei Nutzung des Clinical Data Pull werden Daten aus dem externen Quellsystem verschlüsselt und zwischengespeichert, um während des Adjudikationsprozesses verwendet zu werden. Ein Großteil der Daten wird nie verwendet und nach abgeschlossener Adjudikation häufig nie wieder von Benutzern im Projekt gesehen. Aus Compliance-Gründen und nach allgemeinen Best Practices wird empfohlen, alle ungenutzten zwischengespeicherten Quelldaten zu entfernen, nachdem das Projekt die Datenerhebung beendet hat und in den Status Analyse/Bereinigung verschoben wurde. Sie können auf den Button links klicken, um alle Daten aus dem Quellsystem zu löschen, die in diesem REDCap-Projekt zwischengespeichert wurden."
edit_project_199 = "HINWEIS: Sie können nicht alle ungenutzten Clinical-Data-Pull-Daten entfernen, bevor sich das Projekt im Status Analyse/Bereinigung befindet. Bitte verschieben Sie es in den Status Analyse/Bereinigung und versuchen Sie es dann erneut. Vielen Dank!"
edit_project_200 = "HINWEIS: Projekt muss zuerst in den Status ANALYSE/BEREINIGUNG gesetzt werden!"
edit_project_201 = "In Analyse/Bereinigung verschieben"
edit_project_202 = "JA, in Analyse/Bereinigung verschieben"
edit_project_203 = "Projekt als Abgeschlossen markieren"
edit_project_204 = "Wenn Sie mit einem Projekt fertig sind und es vollständig unzugänglich machen möchten, können Sie es als 'Abgeschlossen' markieren. Dadurch wird es offline genommen und aus den Projektlisten aller Benutzer entfernt. Danach kann es nur wieder gesehen werden, indem unten auf der Seite <i>Meine Projekte</i> auf den Link <i>Abgeschlossene Projekte anzeigen</i> geklickt wird."
edit_project_205 = "Zurück in Produktionsstatus verschieben"
edit_project_206 = "Sind Sie sicher, dass Sie dieses Projekt als 'Abgeschlossen' markieren möchten? Dadurch wird das Projekt offline genommen, und Sie sowie andere Benutzer können nicht mehr darauf zugreifen. Das Projekt und seine Daten bleiben im System und können nicht geändert werden. Nur ein REDCap-Administrator darf das Projekt in seinen vorherigen Status zurückversetzen."
edit_project_207 = "Abgeschlossen"
edit_project_208 = "Abgeschlossene Projekte anzeigen"
edit_project_209 = "Abgeschlossene Projekte ausblenden"
edit_project_210 = "Projektstatusverwaltung"
edit_project_211 = "Datenverwaltung"
edit_project_212 = "Sobald ein Projekt als Abgeschlossen markiert wurde, kann niemand im Projekt (außer REDCap-Administratoren) darauf zugreifen, und nur Administratoren dürfen die Abschließung rückgängig machen und es wieder in einen für alle Projektbenutzer zugänglichen Zustand zurückversetzen. Ein Projekt als Abgeschlossen zu markieren, erfolgt typischerweise nur, wenn Sie sicher sind, dass niemand mehr auf das Projekt zugreifen muss, und Sie sicherstellen möchten, dass das Projekt und seine Daten für eine bestimmte Zeit intakt bleiben."
edit_project_216 = "Sie können alle aktuell im Projekt erhobenen Daten löschen (einschließlich aller Fragebogenantworten), Kalender-Events, in Formulare/Fragebögen hochgeladene Dokumente, alle archivierten Datenexportdateien im Datei-Repository sowie alle geloggten Events, die sich auf die Datenerhebung beziehen."
edit_project_217 = "ALLE Daten im Projekt löschen (einschließlich aller Fragebogenantworten), Kalender-Events, in Formulare/Fragebögen hochgeladene Dokumente, alle archivierten Datenexportdateien im Datei-Repository sowie alle geloggten Events, die sich auf die Datenerhebung beziehen."
edit_project_218 = "3) Optionales benutzerdefiniertes Logo zur Anzeige im E-Mail-Header und Seitenkopf, die der Empfänger sieht. (Wird über dem benutzerdefinierten Text angezeigt.)"
