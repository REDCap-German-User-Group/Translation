; data_entry_722 is concatenated with string data_entry_723 and a dynamic email address.
data_entry_722 = "<b>ERFOLG!</b> Ihre Anfrage zur Hintergrundlöschung wurde erfolgreich eingereicht. REDCap beginnt nun, die Datensätze über einen Hintergrundprozess zu löschen. Sie werden per E-Mail benachrichtigt an"
; data_entry_723 is concatenated with string data_entry_722 and a dynamic email address.
data_entry_723 = "sobald Ihre gesamte Anfrage vollständig abgeschlossen wurde. Falls in der Anfrage Fehler gefunden wurden, werden Details bereitgestellt, damit Sie die Datensatzauswahl korrigieren (wenn Sie möchten) und sie erneut verarbeiten können."
