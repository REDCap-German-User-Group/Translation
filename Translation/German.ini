design_657 = "Kompatibilitätshinweis für eingebettetes Audio"
design_658 = "Bitte beachten Sie, dass die Option für eingebettetes Audio bei Anhängen nicht für alle Audiodateitypen in allen Webbrowsern zu 100 % kompatibel ist. Dies ist keine Einschränkung in REDCap, sondern lediglich ein Kompatibilitätsproblem zwischen Webbrowsern. <b>Die kompatibelsten Audiodateitypen sind MP3 und WAV.</b> Andere Audiotypen funktionieren möglicherweise in manchen Browsern, in anderen jedoch nicht. Leider lässt sich nicht immer einfach erkennen, welche Audiodatei in welchem Browser funktioniert, insbesondere da sich Betriebssysteme und Webbrowser im Laufe der Zeit weiterentwickeln. <b>Empfehlung: Testen Sie die Option für eingebettetes Audio immer, um sicherzustellen, dass sie für die hochgeladene Audiodatei wie vorgesehen funktioniert.</b> Wenn die Audiodatei mit den meisten Webbrowsern inkompatibel erscheint, wird empfohlen, die Anzeigeoption des Anhangs auf 'Link' statt auf 'Audiodatei' zu setzen, um die größtmögliche Kompatibilität zu erreichen."
design_659 = "Setzt den Anfangswert eines Feldes. Dadurch kann ein Feld einen festgelegten Standardwert haben, wenn das Feld in einem Fragebogen oder Eingabeformular angezeigt wird, für das noch keine Daten gespeichert wurden (d. h. wenn das Formularstatussymbol grau ist oder wenn auf einer Fragebogenseite noch keine Daten eingegeben wurden). Das Format muss dem Muster @DEFAULT=\"????\" folgen, wobei der gewünschte Standardwert in einfachen oder doppelten Anführungszeichen stehen sollte. Bei Checkbox-Feldern trennen Sie mehrere Checkbox-Werte einfach mit Kommas - z. B. @DEFAULT='1,3,6'. Bei Textfeldern können Sie im Standardwert sogar Piping verwenden, um Daten aus einem anderen Feld des Projekts einzufügen - z. B. @DEFAULT='Name: [first_name] [last_name], DOB: [dob]'. HINWEIS: Der Standardwert wird bei Datenimporten (über API oder Datenimport-Tool) *nicht* angewendet, sondern nur beim Anzeigen von Fragebogenseiten und Eingabeformularen. HINWEIS: Wenn dies für ein Datums- oder Datetime-Feld verwendet wird, muss der Datumswert innerhalb der Anführungszeichen im Format Y-M-D stehen - z. B. @DEFAULT='2007-12-25' - unabhängig vom eingestellten Datumsformat des Feldes. TIPP: Um den Wert eines Mehrfachauswahlfeldes in ein anderes Mehrfachauswahlfeld zu pipen, hängen Sie ':value' an die gepipte Variable an - z. B. @DEFAULT='[my_dropdown:value]'."
design_661 = "In der REDCap Mobile App setzt dies den Wert eines Feldes auf den App-Benutzernamen des aktuellen Mobile-App-Benutzers, d. h. auf dessen Benutzernamen in der Mobile App, der nicht zwingend mit dem REDCap-Server-Benutzernamen übereinstimmt, der mit @USERNAME erfasst werden kann. HINWEIS: Nur zur Verwendung in der REDCap Mobile App."
