multilang_747 = "Verwendung dieser Datei: Wesentlich sind alle Elemente 'id', 'type', 'form', 'order' und 'translation' sowie die Pfade, die zu ihnen führen, außerdem die Wurzelelemente 'creator' (unverändert lassen), 'key', 'display' und 'rtl'. Alle anderen Elemente, einschließlich dieses Textes, sind nicht wesentlich und werden beim Import nicht berücksichtigt. Außerdem können Teilmengen dieser Datei erstellt und nach Belieben verwendet werden, solange sie gültiges JSON bleiben. Die 'hash'-Elemente sind nicht wesentlich, helfen aber zu verfolgen, ob sich ein Standardwert seit Erstellung der Datei geändert hat und eine Übersetzung daher veraltet sein könnte. Beim Import wird ein Best-Effort-Ansatz verwendet. Pfade und/oder IDs, die nicht zum Ziel passen, werden stillschweigend ignoriert."
multilang_748 = "Hinweis: Da dieses Instrument eine <b>MyCap-Aufgabe</b> ist, sind die Felder mit aufgabenbezogenen Daten ausgeblendet. Sie können sie weiterhin einblenden, wenn Sie möchten, aber es wird im Allgemeinen nicht empfohlen, sie zu übersetzen."
