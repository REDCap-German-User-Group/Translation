data_export_tool_242 = "<b>HINWEIS ZU CODES FÜR FEHLENDE DATEN:</b> Bitte beachten Sie: Wenn Sie Codes für fehlende Daten in Ihren Daten exportieren, werden die CSV-Daten in diesem Statistikpaket möglicherweise nicht korrekt geladen und können einen Fehler auslösen. Möglicherweise müssen Sie die Syntaxdatei manuell ändern, bevor Sie sie in das Statistikpaket laden, damit Ihre Codes für fehlende Daten für bestimmte Datentypen, z. B. Datumsfelder, akzeptiert werden. Andernfalls sollten Sie versuchen, Ihre Daten ohne Codes für fehlende Daten zu exportieren."
data_export_tool_243 = "DATENEXPORTE: Bitte beachten Sie: Wenn Sie Codes für fehlende Daten in Ihren Daten in ein Statistikpaket exportieren, werden die CSV-Daten in diesem Statistikpaket möglicherweise nicht korrekt geladen und können einen Fehler auslösen. Möglicherweise müssen Sie die Syntaxdatei manuell ändern, bevor Sie sie in das Statistikpaket laden, damit Ihre Codes für fehlende Daten für bestimmte Datentypen, z. B. Datumsfelder, akzeptiert werden. Andernfalls sollten Sie versuchen, Ihre Daten ohne Codes für fehlende Daten zu exportieren."
data_export_tool_244 = "Laden Sie beide Dateien rechts herunter und speichern Sie sie an einem gemeinsamen Speicherort. Doppelklicken Sie auf die Syntaxdatei, um sie in SAS zu öffnen. Geben Sie im Syntaxeditor in SAS den vollständigen Pfad der Daten-CSV-Datei auf Ihrem Computer in die zweite Zeile der .sas-Syntaxdatei ein. Beispielsweise müssen Sie etwas Ähnliches wie den unten rot dargestellten Text hinzufügen. Ihr Dateiname und Ordnerpfad werden anders aussehen als im Beispiel unten. Wenn Sie diese Schritte abgeschlossen haben, wählen Sie im oberen Menü in SAS Run (oder Run-->Submit), um die Daten zu laden."
