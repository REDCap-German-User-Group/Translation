random_122 = "Dieser Datensatz kann derzeit nicht randomisiert werden, weil es so aussieht, als seien ein oder mehrere Felder, die während der Randomisierung verwendet werden, irgendwie gelöscht worden. Die folgenden Felder müssen wieder hinzugefügt werden, wenn die Randomisierung beginnen soll:"
random_123 = "<b>ERINNERUNG:</b> Dieses Project befindet sich noch im Entwicklungsstatus, daher sollten Sie noch KEINE echten Probanden randomisieren. Sie sollten echte Probanden erst randomisieren, nachdem das Project in den Produktionsstatus verschoben wurde."
random_124 = "Weitere Zuteilungen hochladen? (Nur Administratoren)"
random_125 = "<b>HINWEIS:</b> Falls erforderlich, kann ein REDCap-Administrator weitere Zuteilungen hochladen, während sich das Project in Produktion befindet. Wenn er auf diese Seite zugreift, sieht er unten ein Formular zum Hochladen einer weiteren Zuteilungstabelle. Die hochgeladene Tabelle ersetzt die vorhandene Zuteilungstabelle NICHT, sondern wird NUR an sie ANGEHÄNGT, wodurch weitere Zuteilungen hinzugefügt werden."
random_126 = "(nur REDCap-Administratoren dürfen die Zuteilungstabelle während der Produktion herunterladen)"
random_127 = "Zugeordnete Datensätze"
;; random_128 is concatenated after a record label/name in a data quality randomization warning.
random_128 = "konnte nicht randomisiert werden, weil die Daten, die zu einem oder mehreren Strata-Feldern gehören, gegen eine Data-Quality-Regel verstoßen (siehe Tabelle unten). Die einzige Möglichkeit, diesen Datensatz zu randomisieren, besteht darin, entweder den untenstehenden Verstoß auszuschließen, indem Sie neben der verletzten Regel auf den Link 'exclude' klicken, oder die Werte Ihres/Ihrer Strata-Feld(er) so zu ändern, dass sie nicht mehr gegen eine Data-Quality-Regel verstoßen. Wenn Sie diesen Datensatz weiterhin randomisieren und alle untenstehenden Regeln ausschließen möchten, müssen Sie dieses Pop-up schließen und dann erneut auf die Schaltfläche Randomisieren klicken, um diesen Datensatz zu randomisieren. (HINWEIS: Die Datenwerte für alle Strata-Felder wurden gespeichert, sofern sie nicht bereits zuvor gespeichert waren.)"
random_129 = "Hinweis: Es wird empfohlen, dass nur Personen mit Erfahrung in Randomisierung das Randomisierungsmodul einrichten."
random_130 = "Es ist häufig notwendig, eine gleiche Behandlung über eine Reihe von Faktoren hinweg sicherzustellen. Stratifizierte Randomisierung ist die Lösung, um Balance innerhalb einer oder mehrerer Untergruppen zu erreichen, z. B. Geschlecht, ethnische Zugehörigkeit, Diabetiker/Nicht-Diabetiker usw. Durch die Auswahl von Strata (Multiple-Choice-Kriterienfelder) können Sie dann möglicherweise die Balance innerhalb dieser Untergruppen sicherstellen."
random_131 = "(Kriterienfelder, die für die Stratifizierung verwendet werden; es können bis zu 14 Multiple-Choice-Felder angegeben werden)"
random_132 = "HINWEIS: Da das Randomisierungsfeld offenbar einen gespeicherten Wert hat, bevor dieser Datensatz randomisiert wurde, können Sie diesen Datensatz nicht randomisieren, und dieses Feld bleibt deaktiviert/schreibgeschützt."
