design_1094 = "<b><u>Datumsbestandteile abrufen:</u></b> Beim Pipen eines Datums- oder Datetime-Feldes können Sie gezielt den Jahres-, Monats- oder Tagesbestandteil seines Datumswertes abrufen, indem Sie entsprechend die Option ':year', ':month' oder ':day' anhängen, z. B. <code>[dob:year]</code> oder <code>[visit_date:month]</code>. Hinweis: Der Monats- oder Tagesbestandteil enthält eine führende Null, wenn der resultierende Wert kleiner als 10 ist."
