edit_project_58 = "Projektstatus:"
edit_project_60 = "-- Feld auswählen --"
edit_project_61 = "Sekundäres eindeutiges Feld festlegen"
edit_project_63 = "FELD ENTHÄLT DOPPELTE WERTE!"
edit_project_64 = "Dieses Feld darf NICHT als sekundäres eindeutiges Feld ausgewählt werden, weil zwei oder mehr Datensätze bereits doppelte Werte für dieses Feld enthalten. Kein Wert dieses Felds darf über Datensätze hinweg doppelt vorkommen. Sie müssen ein anderes Feld wählen oder diese Dopplungen zuerst entfernen."
edit_project_66 = "Benutzerdefiniertes Datensatzlabel festlegen"
edit_project_67 = "Sie können andere Daten und/oder statischen Text an jeden Datensatznamen anhängen (z. B. Studien-ID), so wie der Datensatz in Ihren Datenerhebungsinstrumenten angezeigt wird, etwa in Dropdown-Listen bei der Datensatzauswahl und oben auf der Seite nach der Auswahl. Geben Sie unten einfach den anzuzeigenden Text an und setzen Sie Variablennamen in eckige Klammern [ ]. Die für diese Variablen in diesem Datensatz erhobenen Daten ersetzen dann die Variable im Text."
edit_project_68 = "Benutzerdefiniertes Datensatzlabel:"
edit_project_69 = "Beispiel: Wenn ([last_name], [first_name]) eingegeben wird, würde für Datensatz '102' '102 (Doe, Jon)' angezeigt."
edit_project_71 = "-- Feld zum Sortieren der Datensätze auswählen --"
edit_project_72 = "Datensätze nach einem anderen Feld sortieren"
edit_project_73 = "Standardmäßig werden alle Datensätze nach ihrem Datensatznamen (z. B. Studien-ID) sortiert, wenn sie in den Dropdown-Listen Ihrer Datenerhebungsinstrumente angezeigt werden. Alternativ können Sie die Dropdown-Listen bei Bedarf nach den Werten eines anderen Felds im Projekt sortieren (z. B. Nachname). Wenn Sie die Datensätze nach einem anderen Feld sortieren möchten, wählen Sie unten das Feld aus."
edit_project_77 = "(Nur Administratoren)"
edit_project_78 = "Dies ist nur möglich, solange sich das Projekt noch in Entwicklung befindet, oder Sie können während der Produktion eine Anfrage zum Löschen des Projekts an einen REDCap-Administrator senden."
edit_project_79 = "Zurück in Entwicklung verschieben"
edit_project_80 = "Zu früh in Produktion verschoben? Sie können das Projekt bei Bedarf zurück in den Entwicklungsstatus verschieben."
edit_project_81 = "HINWEIS: Da sich das Projekt derzeit im Entwurfsmodus befindet, werden alle Entwurfsänderungen verworfen, wenn es zurück in die Entwicklung verschoben wird. Wenn Sie die aktuellen Entwurfsänderungen nicht verlieren möchten, schließen Sie zuerst die Änderungen an den Feldern im Entwurfsmodus ab und reichen Sie sie zur Genehmigung ein, bevor Sie hier fortfahren."
edit_project_82 = "Sind Sie sicher, dass Sie das Projekt zurück in den Entwicklungsstatus verschieben möchten?"
edit_project_83 = "WARNUNG: Da sich das Projekt derzeit im Entwurfsmodus befindet, werden alle Entwurfsänderungen verworfen. Möchten Sie trotzdem fortfahren?"
edit_project_84 = "Projekt kann bei Verwendung von DTS nicht zurück in die Entwicklung verschoben werden!"
edit_project_85 = "Aufgrund von Abhängigkeitsproblemen mit den REDCap Data Transfer Services (DTS), bei denen Projekte in Produktion sein müssen, um von DTS genutzt werden zu können, kann dieses Projekt nicht zurück in den Entwicklungsstatus verschoben werden."
edit_project_86 = "<b>HINWEIS:</b> Da für dieses Projekt mehrere Events definiert sind (d. h. es ist longitudinal), werden die Daten nur aus dem ersten Event des aktuell ausgewählten Arms gezogen."
edit_project_87 = "Das untenstehende API-Token ist <b>NUR für Sie</b> und funktioniert <b>NUR mit diesem Projekt</b>. Dieses Token erlaubt besonderen Zugriff auf REDCap-Daten und <b>sollte NICHT mit anderen geteilt werden</b>. Wenn Sie glauben, dass Ihr Token kompromittiert wurde, kontaktieren Sie bitte umgehend Ihren REDCap-Administrator <i>UND</i> löschen oder regenerieren Sie Ihr Token mit den Buttons unten."
edit_project_88 = "Verwenden Sie den Button unten, um bei Ihrem REDCap-Administrator ein API-Token für dieses Projekt anzufordern. Sie benötigen für jedes Projekt, auf das Sie zugreifen möchten, ein anderes Token. Bitte beachten Sie, dass Ihr REDCap-Administrator bei jeder Token-Anfrage eine E-Mail erhält."
edit_project_89 = "Ihre API-Token-Anfrage ist fehlgeschlagen!"
edit_project_90 = "Ihre API-Token-Anfrage wurde erfolgreich an einen REDCap-Administrator gesendet. Sie erhalten eine E-Mail-Benachrichtigung, sobald Ihre Anfrage genehmigt wurde. Vielen Dank!"
