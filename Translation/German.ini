design_748 = "Verwendung von"
design_749 = "Berechnete Felder - mathematische Operationen zur Berechnung eines numerischen Ergebnisses verwenden"
design_751 = "Piping - Feldnotation verwenden, um Werte in Labels auf einem Fragebogen/Formular oder in einer Fragebogeneinladung einzufügen"
design_752 = "Feldnotation und Smart Variables können verwendet werden für..."
design_754 = "Piping aus Checkbox-Feldern"
design_755 = "Piping aus Checkbox-Feldern ist etwas anders als bei anderen Feldtypen, weil Checkboxen mehrere gespeicherte Werte erlauben. Es gibt Optionen, eine Liste angekreuzter Optionen, nicht angekreuzter Optionen oder eine bestimmte Option anzuzeigen."
design_756 = "Wenn Sie die Antwort *AUS* einem Mehrfachauswahlfeld (Radio, Drop-down) pipen, wird das Optionslabel (nicht der codierte Datenwert) an der Stelle angezeigt, an der das Feld gepipt wird. Wenn Sie z. B. eine Drop-down-Frage 'What is your favorite ice cream?' mit den Optionen 'Chocolate', 'Vanilla' und 'Strawberry' haben (jeweils als 0, 1, 2 codiert), würde nach Auswahl von 'Chocolate' die nächste Frage lauten: 'On a scale of 1 to 10, how much to you like Chocolate?'. Bei Nicht-Mehrfachauswahlfeldern wie Text-, Notiz- oder Slider-Feldern wird dagegen der wörtliche Datenwert gepipt. <b>Wenn Sie den Wert (nicht das Label) eines Mehrfachauswahlfeldes pipen möchten, hängen Sie ':value'</b> an den Variablennamen in Klammern an - z. B. [race:value]. Hinweis: ':value' muss verwendet werden, wenn Sie innerhalb des <b>@DEFAULT Action Tag den Wert eines Mehrfachauswahlfeldes</b> als Standardwert eines Feldes pipen möchten."
design_757 = "Durch Anhängen von ':checked' wird eine kommaseparierte Liste der Labels der angekreuzten Optionen angezeigt - z. B. 'Sunday, Tuesday, Thursday'. Hinweis: Wenn weder ':checked' noch ':unchecked' an die Variable angehängt wird, wird standardmäßig ':checked' verwendet."
design_758 = "Durch Anhängen von ':unchecked' wird eine kommaseparierte Liste der Labels der NICHT angekreuzten Optionen angezeigt - z. B. 'Monday, Wednesday, Friday, Saturday'."
design_759 = "Wenn ein codierter Wert der Checkbox nach dem Variablennamen in Klammern angegeben wird - z. B. [my_checkbox:(2)] -, wird das Wort 'Checked' oder 'Unchecked' ausgegeben, je nachdem, ob diese bestimmte Option angekreuzt wurde."
design_760 = "Bitte beachten Sie, dass die oben aufgeführten Checkbox-Piping-Optionen zwar die Textlabels zurückgeben, Sie aber auch <b>':value' an die Variable anhängen können, um den Rohwert</b> statt des Labels zurückzugeben. Zum Beispiel könnten [my_checkbox:checked:value] und [my_checkbox:unchecked:value] '1, 3, 5' bzw. '2, 4, 6, 7' zurückgeben, und [my_checkbox(2):value] gibt 1 oder 0 zurück, je nachdem, ob angekreuzt oder nicht."
design_761 = "(verwendet in Logik, Berechnungen und Exporten)"
design_762 = "Lädt das aktuelle Datum des Benutzers in ein leeres Textfeld - ähnlich wie das @NOW-Tag, aber ohne Zeitanteil. Wenn das Feld eine Validierung hat, wird der Wert an das Datumsformat angepasst. Verwenden Sie dieses Tag außerdem nicht für Felder mit Branching Logic, weil der Benutzer immer aufgefordert wird, den Wert zu löschen. Prüfen Sie stattdessen @HIDDEN, wenn Sie das Feld ausblenden möchten."
design_763 = "Lädt das aktuelle Datum+Uhrzeit des Benutzers in ein leeres Textfeld - ähnlich wie das @TODAY-Tag, aber zusätzlich mit Zeitanteil. Wenn das Feld eine Validierung hat, wird der Wert an das Datumsformat angepasst. HINWEIS: Die verwendete Zeit ist die lokale Zeit des Benutzers, die von dessen Gerät/Computer abgeleitet wird und sich bei einer anderen Zeitzone vom Server unterscheiden kann. Verwenden Sie dieses Tag außerdem nicht für Felder mit Branching Logic, weil der Benutzer immer aufgefordert wird, den Wert zu löschen. Prüfen Sie stattdessen @HIDDEN, wenn Sie das Feld ausblenden möchten."
design_765 = "ADMINISTRATORHINWEIS: Da Sie REDCap-Administrator sind, beachten Sie bitte, dass Sie Smart Variables auch innerhalb der Abfrage eines dynamischen SQL-Feldes verwenden können, das in einem Fragebogen oder Eingabeformular angezeigt wird. Im Online Designer finden Sie im Anleitungs-Pop-up zum SQL-Feld Tipps dazu."
design_766 = "HINWEIS: Smart Variables können zwar in der Logik von Datenqualitätsregeln verwendet werden, führen aber in vielen Fällen dazu, dass Datenqualitätsregeln deutlich länger zur Ausführung benötigen."
design_767 = "Bedingte Logik - umfasst Branching Logic, erweiterte Filter für Reports sowie Logik für Fragebogen-Warteschlange, Datenqualitätsregeln, benutzerdefinierte Datensatzstatus-Dashboards und automatische Fragebogeneinladungen"
