control_center_4915 = "SCHRITT 2: Ihre benutzerdefinierte Abfrage Ordnern zuweisen"
control_center_4916 = "Bereits zugewiesene Abfragen ausblenden"
control_center_4917 = "Benutzerdefinierte Abfrageordner sind eine Möglichkeit, Ihre Abfragen zu organisieren, indem Sie sie in Gruppen einordnen. Sie können unten neue Ordner erstellen und ihnen dann rechts Abfragen zuweisen. Eine benutzerdefinierte Abfrage kann gleichzeitig mehreren Ordnern zugewiesen werden. Um Ihre Ordner neu anzuordnen, können Sie sie in der linken Tabelle per Drag-and-drop verschieben."
