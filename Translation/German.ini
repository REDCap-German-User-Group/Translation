data_entry_232 = "Das graue Kreissymbol bezeichnet einen Formularstatus 'Unvollständig' (0), bei dem auf diesem Instrument keine Daten eingegeben wurden. Dies unterscheidet sich vom roten Statussymbol, das ebenfalls einen Status 'Unvollständig' bezeichnet, bei dem jedoch Daten eingegeben wurden. BESONDERER HINWEIS: Der graue Symbolstatus schließt Werte berechneter Felder aus, die automatisch berechnet werden können, wenn sich ein Benutzer auf einem anderen Instrument befindet, und im Hintergrund von REDCap gespeichert werden. Wenn das Instrument also berechnete Felder enthält, für die Werte automatisch berechnet und gespeichert werden, ändert sich das Statussymbol erst dann zu rot, wenn Sie in dieses Instrument navigieren und auf den Speichern-Button klicken oder einen Datenimport von Werten in dieses Instrument durchführen."
