global_302 = "<b><u>Leere Werte:</u></b> Wenn ein Feldwert oder Smart-Variable-Wert leer/null ist (d. h. nicht existiert), wird der leere Wert standardmäßig als sechs Unterstriche (wörtlich ______) gepipt, als Platzhalter, der visuell anzeigt, dass kein Wert existiert. Wenn dieses Verhalten nicht gewünscht ist, können Sie jedoch <code>:hideunderscore</code> an den Variablennamen innerhalb der eckigen Klammern anhängen. Dadurch wird der Wert unverändert gepipt, also als leerer/null/unsichtbarer Wert. Hinweis: Die Notation <code>:hideunderscore</code> kann sowohl an Feldvariablen als auch an Smart Variables angehängt werden."
