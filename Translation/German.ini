mycap_mobile_app_992 = "<b>Warnung:</b> Eine als \"N/A\" markierte Teilnehmer-ID zeigt an, dass der Datensatz aus diesem Projekt gelöscht wurde, aber nach dem Löschen des Datensatzes eine Aufgabe vom Teilnehmer eingereicht wurde. Klicken Sie auf die Schaltfläche unten, um alle Synchronisierungsprobleme für Teilnehmende zu löschen, die nicht mehr existieren."
;; mycap_mobile_app_993 is concatenated after a sync issue count.
mycap_mobile_app_993 = "Synchronisierungsprobleme wurden aus der Liste entfernt.";
mycap_mobile_app_994 = "* Dieses Feld ist für die Verwendung in einem Diagramm für MyCap festgelegt.<br>* Es wird empfohlen, dieses Feld auf \"Erforderlich\" zu setzen, um sicherzustellen, dass das Diagramm in MyCap korrekt funktioniert."
mycap_mobile_app_995 = "<b>HINWEIS:</b> Es ist 30 Tage her, seit Sie MyCap aktiviert haben, aber es wurden noch keine Aufgaben aktiviert. Wenn Sie MyCap nicht mehr für Ihr Projekt verwenden möchten, deaktivieren Sie MyCap bitte für dieses Projekt.<br> Wenn Sie unsicher sind, wie Sie MyCap verwenden sollen, oder Fragen zur Integration in Ihr Projekt haben, wenden Sie sich gerne an das MyCap-Team unter mycap@vumc.org. Wir helfen Ihnen gern!"
