control_center_4672 = "wird automatisch heruntergeladen, und der Upgrade-Prozess beginnt unmittelbar danach. Falls der Upgrade-Prozess aus irgendeinem Grund nicht automatisch abgeschlossen werden kann, werden Sie informiert, wie Sie das Upgrade manuell abschließen können."
