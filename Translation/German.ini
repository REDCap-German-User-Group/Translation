top_usage_report_08 = "Modulseite"
top_usage_report_09 = "Unvollständige HTTP-Anfragen einbeziehen"
top_usage_report_10 = "Dies umfasst sowohl Anfragen, die noch laufen, ALS AUCH Anfragen, die abgeschlossen wurden, aber keine script_execution_time gespeichert haben (was Ergebnisse verzerrt). Möglicherweise können wir script_execution_time in weiteren Szenarien speichern, um noch laufende HTTP-Anfragen genau zu messen. Aktuell laufende Cronjobs werden unabhängig von dieser Einstellung immer einbezogen."
top_usage_report_11 = "Mindestschwelle für CPU-Zeit-Prozentsatz:"
top_usage_report_12 = "Nur Aufrufe anzeigen, die mindestens diesen Prozentsatz der gesamten CPU-Zeit verwenden. CPU-Zeit ist oft ein angemessener Proxy für Datenbanklast. Die einzigen bekannten relevanten Ausnahmen sind Prozesse, die viele Sleep-Aufrufe ausführen (z. B. Flight-Tracker-Crons)."
top_usage_report_13 = "Diese Seite zeigt die aktivsten Projekte, Benutzer, Seiten, spezifischen URLs, External Modules, Cronjobs usw. innerhalb eines angegebenen Zeitraums. Sie kann verwendet werden, um schnell zu erkennen, wofür Serverressourcen in Phasen hoher Last verwendet werden. Beachten Sie bei der Interpretation dieser Statistiken Folgendes:"
top_usage_report_14 = "Diese Seite verfolgt viele, aber nicht alle HTTP-Anfragen. Siehe die Logs Ihres Webservers für ALLE Anfragen."
top_usage_report_15 = "Stunden und Prozentsätze stellen einen genauen Anteil der verfolgten Gesamtwerte dar, werden aber zwischen 'Typen' dupliziert (können sich auf mehr als 100 % summieren). Wenn ein Benutzer beispielsweise API-Anfragen für ein einzelnes Projekt stellt, die insgesamt 70 % der CPU-Nutzung des Servers ausmachen, werden separate Zeilen für den Benutzer UND das Projekt aufgenommen (beide mit 70 %). Eine solche Aggregation von Statistiken ist wichtig, wenn die Nutzung innerhalb eines einzelnen 'Typs' übermäßig wird (z. B. ein Benutzer über viele Projekte hinweg oder viele Benutzer in einem Projekt)."
;; top_usage_report_16 is appended after an External Module Timed Crons link.
top_usage_report_16 = "sind derzeit nicht in diesen Statistiken enthalten"
top_usage_report_17 = "Es wurden keine Aufrufe über der angegebenen Mindestschwelle gefunden."
top_usage_report_18 = "Die Startzeit liegt außerhalb des Bereichs der verfügbaren Daten."
top_usage_report_19 = "<b>HINWEIS:</b> Das Vanderbilt REDCap Team kann Ihnen nicht helfen, diesen Report zu interpretieren oder Performance-Bedenken zu besprechen, die spezifisch für Ihre Einrichtung sind. Das Verständnis dieser Statistiken kann schwierig sein und erfordert möglicherweise tiefgehende und systemspezifische historische Kenntnisse. Wenn Sie Fragen zu diesem Report haben, wird empfohlen, diese an die Community im Allgemeinen auf <a target='_blank' href='https://redcap.vumc.org/community/'>REDCap Community</a> zu stellen. Bei Fragen zu einem bestimmten External Module wenden Sie sich bitte an den Autor dieses Moduls (im Control Center aufgeführt)."
;; top_usage_report_20 is concatenated with a dynamic minimum start date.
top_usage_report_20 = "Daten sind verfügbar ab"
top_usage_report_21 = "Sofern Sie keine Probleme aufgrund von Serverlast haben (langsame Antwortzeiten, Absturzmeldungen usw.), weisen diese Statistiken wahrscheinlich NICHT auf ein Problem hin, selbst wenn sie eine sehr hohe Nutzung durch bestimmte Projekte/URLs/Benutzer/Module usw. zeigen."

cdp_dashboard_label_cdp = "CDP-Dashboard"
cdp_dashboard_label_ddp = "DDP-Dashboard"
cdp_dashboard_index_bg_processes_description = "<h6>Hintergrundprozesse</h6><p>Dieses Dashboard bietet eine umfassende Ansicht des Datenabrufprozesses in CDP- und DDP-Projects und erleichtert das Nachverfolgen und Überwachen. Diese Projects müssen bestimmte Voraussetzungen erfüllen, um ausgewertet zu werden, z. B. aktivierter Echtzeit-Webservice, aktiv, nicht gelöscht und nicht abgeschlossen.</p><p>An diesem Prozess sind zwei Cron-Jobs beteiligt:</p><ol><li><strong>Queueing:</strong> Der erste Cron-Job prüft, ob Datensätze in aktivierten CDP- und DDP-Projects die Kriterien für das Abrufen ihrer gemappten Daten aus dem EHR-System erfüllen. Wenn die Kriterien erfüllt sind, werden die Datensätze für den Abruf in die Queue gestellt.<br>Dieser Prozess läuft alle fünf Minuten.</li><li><strong>Fetching:</strong> Der zweite Cron-Job ruft Daten für die in der Queue stehenden Datensätze ab und speichert sie in einer Cache-Tabelle, wo Benutzer sie prüfen und adjudizieren können, wodurch sie vom Cache in die Datentabelle verschoben werden.<br>Dieser Prozess läuft jede Minute.</li></ol></p><p>Der Queueing-Prozess arbeitet basierend auf bestimmten Kriterien:</p><ul><li><strong>Zukünftige Daten:</strong> Datensätze mit Mappings, die zukünftige Daten haben.</li><li><strong>Aktuelle Datenerhebung:</strong> Datensätze, bei denen Daten aus dem EHR-System kürzlich erhoben wurden, bestimmt durch das Feld <code>updated_at</code> in <code>redcap_ddp_records</code>, das innerhalb eines angegebenen Bereichs liegt.</li><li><strong>Fehlende aktuelle Updates:</strong> Datensätze, die kürzlich nicht aktualisiert wurden, wie im Event-Protokoll angegeben.</li></ul><p>Das Dashboard ist darauf ausgelegt, eine klare Ansicht dieses Hintergrundprozesses bereitzustellen. Es ermöglicht Benutzern, Datensätze bei Bedarf manuell für den Abruf in die Queue zu stellen, z. B. in lang laufenden Projects oder wenn Mappings aktualisiert werden, um sicherzustellen, dass Ihre Projects über die aktüllsten und genauesten Daten verfügen.</p>"
cdp_dashboard_index_cached_values_description = "<h6>Cache-Werte</h6><p>Um einen umfassenden Überblick über den Datenabrufprozess zu bieten, enthält das Dashboard eine Seite für Cache-Werte. Diese Seite ermöglicht Benutzern, die Cache-Daten für jeden Datensatz und jedes Feld ihres Projects anzuzeigen, einschließlich detaillierter Informationen wie Feldnamen in REDCap, gemappte EHR-Ressourcen und Datenzeitstempel. Diese Ansicht ist besonders für zeitbezogene Daten wichtig, damit Benutzer nachverfolgen können, wann Daten zuletzt aktualisiert wurden. Die Cache-Daten sind aus Datenschutzgründen verschlüsselt, aber Benutzer können die Daten zu Debugging- oder Verifizierungszwecken entschlüsseln.</p>"
cdp_dashboard_not_queueable_description = "<p>Diese Seite zeigt eine Tabelle von Datensätzen an, die basierend auf spezifischen Kriterien als nicht queuefähig identifiziert wurden. Für jeden Datensatz werden ein oder mehrere Gründe angegeben, warum die Einschlusskriterien nicht erfüllt wurden. Diese Datensätze werden aufgrund der folgenden Faktoren nicht automatisch für den Datenabruf in die Queue gestellt:</p><ul><li><strong>Zukünftige Daten:</strong> Datensätze mit Mappings, die zukünftige Daten haben.</li><li><strong>Aktuelle Datenerhebung:</strong> Datensätze, bei denen Daten aus dem EHR-System kürzlich erhoben wurden, bestimmt durch das Feld <code>updated_at</code> in <code>redcap_ddp_records</code>, das innerhalb eines angegebenen Bereichs liegt.</li><li><strong>Fehlende aktuelle Updates:</strong> Datensätze, die kürzlich nicht aktualisiert wurden, wie im Event-Protokoll angegeben.</li></ul><p>Zusätzlich muss das Project bestimmte Voraussetzungen erfüllen, um die Datensätze auszuwerten, z. B. aktivierter Echtzeit-Webservice, aktiv, nicht gelöscht und nicht abgeschlossen.</p><p>Hier haben Sie die Möglichkeit, einige oder alle Datensätze im Project manuell als QUEUED zu markieren. Dadurch erzwingen Sie, dass ihre Daten beim nächsten Datenabrufzyklus abgerufen werden.</p>"
cdp_dashboard_queued_description = "<p>Diese Seite zeigt eine Tabelle von Datensätzen an, die für den Datenabruf als QUEUED markiert wurden.<br>Diese Datensätze sind dafür vorgesehen, dass ihre Daten im nächsten Datenabrufzyklus abgerufen werden.</p>"
cdp_dashboard_cached_description = "<p>Diese Seite zeigt die Cache-Daten für jeden Datensatz und jedes Feld Ihres Projects an.<br>Hier können Sie detaillierte Informationen anzeigen, z. B. den Namen des Feldes in REDCap, die gemappte EHR-Ressource und den Zeitstempel der Daten, was besonders für zeitbezogene Daten wie Observations wichtig ist.</p><p>Die Werte der Cache-Daten sind aus Datenschutzgründen verschlüsselt.<br>Wenn Sie die tatsächlichen Werte zu Debugging- oder Verifizierungszwecken anzeigen müssen, können Sie auf die Schaltfläche \"Entschlüsseln\" klicken.<br>Nach einer Bestätigung werden die Daten entschlüsselt und angezeigt.</p>"
cdp_dashboard_cached_alert = "Bitte beachten Sie, dass das Entschlüsseln der Daten eine sensible Aktion ist und nur durchgeführt werden sollte, wenn es unbedingt erforderlich ist."
