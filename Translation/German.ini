cdis_pm_share_info_participant_will_label = "Teilnehmer werden:"
cdis_pm_share_info_privacy_body = "REDCap erfasst weder Benutzername noch Passwort des EHR-Portals des Teilnehmers. Die Gesundheitsorganisation übernimmt die Anmeldung, und REDCap erhält nur das Autorisierungsergebnis und die klinischen Daten, die durch diese Autorisierung erlaubt sind."
cdis_pm_share_info_privacy_body_01 = "REDCap erfasst oder speichert keine Benutzernamen oder Passwörter der Patientenportale von Teilnehmern. Die Anmeldung wird vollständig von der Gesundheitsorganisation übernommen. REDCap erhält nur das Autorisierungsergebnis und die Gesundheitsdaten, die durch diese Autorisierung erlaubt sind."
cdis_pm_share_info_privacy_heading = "Was REDCap nicht erfasst"
cdis_pm_share_info_project_setup_body = "Wenn REDCap SHARE für ein Project aktiviert ist, kann das Project datensatzspezifische REDCap SHARE-Links erzeugen und sie im Teilnehmerworkflow verwenden. Benutzer mit Projekt-Setup-Rechten sollten bestätigen, dass die Studie bereit ist, bevor diese Links verteilt werden."
cdis_pm_share_info_project_setup_body_01 = "Wenn REDCap SHARE für ein Project aktiviert ist, kann das Project teilnehmerspezifische REDCap SHARE-Links als Teil des Studienworkflows erzeugen. Benutzer mit Projekt-Setup-Rechten sollten sicherstellen, dass die Studie vollständig konfiguriert und bereit ist, bevor diese Links an Teilnehmer gesendet werden."
cdis_pm_share_info_project_setup_heading = "Was die Einstellung in Project Setup steuert"
cdis_pm_share_info_project_setup_heading_01 = "Was diese Einstellung in Project Setup bewirkt"
cdis_pm_share_info_project_setup_item_1 = "Jeder REDCap SHARE-Link ist mit einem REDCap-Datensatz verknüpft und sollte nicht für einen anderen Teilnehmer wiederverwendet werden."
cdis_pm_share_info_project_setup_item_1_01 = "Jeder REDCap SHARE-Link ist mit einem bestimmten REDCap-Datensatz verbunden und sollte nur für diesen Teilnehmer verwendet werden."
cdis_pm_share_info_project_setup_item_2 = "Die verfügbaren Gesundheitsorganisationen stammen aus dem REDCap SHARE-EHR-Konfigurationskatalog, der von REDCap-Administratoren verwaltet wird."
cdis_pm_share_info_project_setup_item_2_01 = "Die Liste der verfügbaren Gesundheitsorganisationen stammt aus dem REDCap SHARE-EHR-Katalog, der von REDCap-Administratoren verwaltet wird."
cdis_pm_share_info_project_setup_item_3 = "Importierte EHR-Daten hängen weiterhin von den REDCap SHARE-Mappings des Projects und jedem projektspezifischen Prüfworkflow ab."
cdis_pm_share_info_project_setup_item_3_01 = "Importierte EHR-Daten hängen von den REDCap SHARE-Mappings des Projects und jedem projektspezifischen Prüf- oder Genehmigungsworkflow ab."

