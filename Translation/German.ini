econsent_35 = "Einstellungen für e-Consent & PDF-Snapshots"
econsent_36 = "Diese Seite kann verwendet werden, um Trigger für das Erfassen von PDF-Snapshots von Datensätzen einzurichten. Ein PDF-Snapshot ist eine von REDCap erzeugte PDF-Datei eines einzelnen Instruments/Fragebogens, mehrerer Instrumente oder aller Instrumente eines bestimmten Datensatzes. PDF-Snapshots können ausgelöst werden, wenn 1) ein Fragebogen abgeschlossen wird oder 2) wenn angegebene bedingte Logik als wahr ausgewertet wird. Wenn sie ausgelöst werden, können Snapshots im Ordner PDF-Snapshot-Archiv im Datei-Repository und/oder in einem angegebenen Datei-Upload-Feld gespeichert werden. Sie können beliebig viele Trigger zum Erfassen von Snapshots erstellen."
