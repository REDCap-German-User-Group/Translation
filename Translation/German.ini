ws_118 = "Vorschaufelder (optional):"
ws_119 = "Quellsystemfelder können ausgewählt werden, die eine schnelle Vorschau von Daten aus dem Quellsystem liefern, wenn ein Benutzer zunächst den Wert des Source-ID-Feldes eingibt."
ws_119_02 = "Bis zu 5 Quell-EHR-Felder können konfiguriert werden, um eine Vorschau des passenden Patientendatensatzes anzuzeigen. Beim Eingeben einer MRN in REDCap zeigen diese ausgewählten Felder die entsprechenden EHR-Daten an, sodass Benutzer prüfen können, ob sie den richtigen Patientendatensatz identifiziert haben."
;; ws_121 is concatenated with the source-system name.
ws_121 = "Vorschaufelder auswählen aus"
ws_122 = "(bis zu 5)"
ws_124 = "Standard-Tages-Offset (für zeitbezogene Felder):"
ws_125 = "Beim Abrufen zeitbezogener Daten (d. h. Felder mit einem zugehörigen Zeitstempel) aus dem Quellsystem wird der Tages-Offset zusammen mit dem Wert eines gemappten REDCap-Datums-/Zeitfeldes verwendet, um ein Zeitfenster für die Suche nach Daten im Quellsystem zu erstellen. Nur Daten innerhalb dieses Zeitfensters werden während des Adjudizierungsprozesses angezeigt. Dies hilft, einen zeitlichen Puffer bereitzustellen, falls dem Datums-/Zeitwert aus REDCap und/oder dem Zeitstempel aus dem Quellsystem ein gewisses Maß an Präzision fehlt."
ws_126 = "Standard-Tages-Offset:"
