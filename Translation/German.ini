control_center_4741 = "Administratorberechtigungen festlegen"
control_center_4742 = "Zugriff auf Control-Center-Dashboards"
control_center_4743 = "Diese Seite kann verwendet werden, um Benutzern in dieser REDCap-Installation Berechtigungen auf Administratorebene zu gewähren. Das Gewähren von Admin-Berechtigungen erlaubt Benutzern den Zugriff auf bestimmte Seiten oder Funktionen zur Administration von REDCap. Dazu können die Verwaltung von Benutzerkonten, der Zugriff auf Projekte von Benutzern, das Ändern von Systemkonfigurationen, das Durchführen von Upgrades usw. gehören. Die verschiedenen Kategorien von Admin-Berechtigungen sind in der Tabelle unten zu sehen und werden im Detail beschrieben, wenn Sie auf den Link unten klicken. Wenn ein Benutzer mindestens eine Admin-Berechtigung hat, gilt er als REDCap-Administrator und kann daher auf das Control Center zugreifen; er kann jedoch nur auf die Dinge zugreifen, für die ihm Zugriff gewährt wurde. Sie können"
control_center_4744 = "Administratoren"
control_center_4745 = "Benutzer suchen, um als Admin hinzuzufügen"
control_center_4746 = "Es scheint, dass der Benutzer"
control_center_4747 = "in REDCap nicht als gültiger Benutzername existiert. Bitte geben Sie einen gültigen Benutzernamen ein."
control_center_4748 = "Bitte aktivieren Sie mindestens eines der Berechtigungs-Kontrollkästchen für den Benutzer, dem Sie Administratorberechtigungen gewähren möchten."
control_center_4749 = "wurden nun eine oder mehrere Administratorberechtigungen gewährt."
control_center_4750 = "hat bereits Administratorberechtigungen und existiert in der Tabelle oben. Wenn Sie diesen Dialog schließen, werden Sie zu diesem Benutzer in der Tabelle geführt."
control_center_4751 = "schreibgeschützt"
control_center_4752 = "Bitte beachten Sie, dass Sie ALLE Administratorberechtigungen für diesen Benutzer abgewählt haben"
control_center_4753 = ", wodurch er nicht mehr als Administrator gilt und auf dieser Seite nicht mehr angezeigt wird. Dieser Benutzer kann jedoch jederzeit in Zukunft wieder hinzugefügt werden, indem ihm erneut eine Admin-Berechtigung gewährt wird, wenn Sie möchten."
control_center_4754 = "Da Sie eingeschränkte Admin-Berechtigungen haben, ist diese Seite schreibgeschützt, und keine Einstellungen können geändert werden."
control_center_4755 = "Beschreibungen aller Admin-Berechtigungen anzeigen"
control_center_4756 = "Benutzer kann auf die Seite 'Administrator Privileges' zugreifen (d. h. diese Seite) und Admin-Rechte für jeden Benutzer festlegen."
control_center_4757 = "Benutzer hat Vollzugriff auf alle REDCap-Projekte im System und maximale Rechte innerhalb dieser Projekte. In der Control-Center-Oberfläche kann der Benutzer auf die folgenden Seiten zugreifen und sie nutzen, die zur Projektadministration gehören: To-do-Liste, Projekteinstellungen bearbeiten, Survey Link Lookup und API-Tokens."
control_center_4758 = "Benutzer kann REDCap-Benutzerkonten anzeigen, ändern und (bei Verwendung tabellenbasierter Authentifizierung) erstellen. Auf die folgenden Seiten kann zugegriffen werden, und sie können genutzt werden: Benutzer durchsuchen, Benutzer hinzufügen, Benutzer-Allowlist und Benutzer per E-Mail kontaktieren."
control_center_4759 = "Benutzer kann Einstellungen auf allen Systemkonfigurationsseiten im Control Center ändern. Dazu gehören alle Seiten, die im linken Menü unter den Abschnitten 'Miscellaneous Modules' und 'System Configuration' aufgeführt sind. Hinweis: Wenn der Benutzer diese spezifische Berechtigung nicht hat, aber mindestens eine andere Administratorberechtigung besitzt, kann er weiterhin auf die Systemkonfigurationsseiten zugreifen und sie anzeigen, jedoch nur im schreibgeschützten Modus."
control_center_4760 = "Benutzer kann auf Tools zugreifen, die für Upgrades der REDCap-Software verwendet werden, einschließlich Benachrichtigungen über verfügbare neue Versionen und Zugriff auf die Easy-Upgrade-Funktion (falls aktiviert). Hinweis: Diese Admin-Berechtigung gilt nicht beim Upgrade von REDCap mit traditionellen Methoden (d. h. wenn Easy Upgrade nicht verwendet wird), da der traditionelle Upgrade-Prozess hauptsächlich außerhalb der REDCap-Benutzeroberfläche in einem Datenbankclient und über direkten Serverzugriff erfolgt."
control_center_4761 = "Benutzer hat die Fähigkeit, External Modules aus dem REDCap Repo zu installieren und sie auf Systemebene zu aktivieren und zu konfigurieren. Dies gilt nicht für das Aktivieren und Konfigurieren eines External Module in einem Projekt, was durch andere Benutzerrechte geregelt wird. Hinweis: Wenn der Benutzer diese spezifische Berechtigung nicht hat, aber mindestens eine andere Administratorberechtigung besitzt, kann er weiterhin auf die Seite External Modules im Control Center zugreifen und sie anzeigen, jedoch nur im schreibgeschützten Modus."
control_center_4762 = "Benutzer kann auf alle Seiten zugreifen und sie nutzen, die im linken Menü des Control Center unter dem Abschnitt 'Dashboard' aufgeführt sind."
control_center_4763 = "neuen Admin hinzufügen"
control_center_4764 = "unten auf der Seite."
control_center_4765 = "Dieser Benutzer ist bereits als REDCap-Benutzer im System aufgeführt. Wenn Sie diesen Benutzer hinzufügen müssen, müssen Sie ihn zuerst über die Seite Benutzer durchsuchen aus dem gesamten System löschen und dann hierher zurückkehren, um ihn erneut hinzuzufügen."
control_center_4767 = "TIPP: Während Benutzer die unten angegebenen öffentlichen Fragebögen ausfüllen, können Sie nachverfolgen, welche Fragebogenantwort zum Projekt des Benutzers gehört. Dies erfolgt, indem die Feldvariable <code>project_id</code> zu einem der unten angegebenen Projekte hinzugefügt wird (bei longitudinalen Projekten muss das Feld im ersten Event des ersten Arms des Projekts existieren). Wenn das Feld 'project_id' existiert, wird beim Ausfüllen eines Projektübergangsfragebogens unten die PID des Projekts, für das der Benutzer den Fragebogen ausfüllt, im Feld 'project_id' der unten angegebenen Projekte gespeichert. Dadurch können Sie erkennen, welche Fragebogenantwort zu welchem Projekt des Benutzers gehört, der den Fragebogen ausfüllt."
control_center_4768 = "Benutzerdefinierte Fragebögen für Projektstatus-Übergänge (optional):"
control_center_4769 = "Die Felder unten erlauben Ihnen, öffentliche Fragebögen zu verwenden, um benutzerdefinierte Informationen von Benutzern zu erfassen, wenn Projekte in einen neuen Status wechseln (d. h. Projekterstellung, Projekt kopieren, in Produktionsstatus verschieben, in Analyse-/Bereinigungsstatus verschieben, als Abgeschlossen markieren). Dadurch können Administratoren benutzerdefinierte Fragebögen erstellen, um alle gewünschten Informationen von Benutzern während dieser Projektübergänge zu erfassen. Der Fragebogen wird innerhalb eines iframe auf der Seite angezeigt; der Benutzer muss den Fragebogen ausfüllen, bevor er den Prozess auf der Seite abschließen kann. Sie können beliebige oder keine dieser Felder verwenden. HINWEIS: Administratoren werden nicht gezwungen, einen der unten festgelegten öffentlichen Fragebögen auszufüllen, sondern sind von diesem Prozess ausgenommen."
control_center_4770 = "<b>Fragebogen 'Create/Copy Project':</b><br>Benutzer zwingen, diesen öffentlichen Fragebogen auszufüllen, bevor ein neues Projekt erstellt wird."
