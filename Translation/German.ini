email_users_135 = "Alle ausgehenden E-Mails für dieses Projekt können unten von jedem Benutzer mit \"E-Mail-Logging\"-Berechtigung in diesem Projekt gesucht und aufgerufen werden. Die E-Mail-Logging-Funktion ermöglicht Benutzern das Suchen und Anzeigen *aller* ausgehenden E-Mails zu diesem Projekt. Dazu gehört die Möglichkeit, alle Aspekte einer bestimmten E-Mail anzuzeigen - d. h. Empfänger, Absender, Betreff, Nachrichtentext und Namen von Anhängen. Jede bei einer Suche zurückgegebene E-Mail kann angezeigt und (falls gewünscht) erneut an den ursprünglichen Empfänger gesendet werden (z. B. falls dieser sie nicht erhalten hat). HINWEIS: Wenn Sie in diesem Projekt anonyme Fragebögen verwenden, beachten Sie bitte, dass das Anzeigen dieser Seite und der dort angezeigten E-Mails versehentlich dazu führen kann, dass anonyme Fragebogenantworten identifizierbar/de-anonymisiert werden. Wenn das Projekt Zugriffsgruppen verwendet, können Sie außerdem die E-Mails zu allen DAGs in diesem Projekt anzeigen (und damit möglicherweise alle Daten, die in den Text dieser E-Mails gepiped wurden)."
