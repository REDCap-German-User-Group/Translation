design_02 = "VIDEO: Nutzung dieser Seite"
design_03 = "Änderungen erfolgreich gespeichert!"
design_04 = "Die Feldänderungen aus dem hochgeladenen Data Dictionary wurden übernommen."
design_05 = "Da sich das Projekt noch im Entwurfsmodus befindet, treten diese Änderungen erst offiziell in Kraft, wenn die Entwurfsänderungen zur Prüfung eingereicht wurden."
design_07 = "Mit diesem Modul können neue Datenerfassungsinstrumente/Fragebögen erstellt oder bestehende bearbeitet werden. Änderungen können entweder mit dem <b>Online Designer</b> oder über <b>Data Dictionary hochladen</b> vorgenommen werden (siehe Reiter oben); beide Methoden können einzeln oder gemeinsam genutzt werden. Der Online Designer kann dabei helfen, erste Felder/Formulare schnell anzulegen oder kurze Änderungen vorzunehmen. Die Data-Dictionary-Datei ist jedoch oft hilfreicher, wenn für dieses Projekt viele Felder hinzugefügt werden sollen."
design_08 = "In Arbeit &hellip;"
design_10 = "Das Projekt befindet sich derzeit im Status PRODUKTION. Daher können Änderungen, anders als im Entwicklungsstatus, nicht in Echtzeit am Projekt vorgenommen werden. Änderungen am Projekt können jedoch im ENTWURFSMODUS vorbereitet werden. Anschließend werden diese Änderungen von einem REDCap-Administrator geprüft und freigegeben. Nach der Freigabe erhalten Sie eine E-Mail-Bestätigung, dass die Änderungen in Ihrem Produktionsprojekt wirksam geworden sind."
