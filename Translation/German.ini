multilang_629 = "<b>Admin-Aktivierung</b> der mehrsprachigen Unterstützung in Projekten verlangen"
multilang_630 = "Wenn aktiviert, müssen Admins die mehrsprachige Unterstützung in jedem Projekt aktivieren. Diese Option wirkt sich nicht auf Projekte aus, in denen die mehrsprachige Unterstützung bereits aktiviert ist (entweder weil sie zuvor explizit von einem Admin aktiviert wurde oder weil bereits mindestens eine Sprache eingerichtet ist)."
multilang_631 = "Mehrsprachige Unterstützung für dieses Projekt <b>aktivieren</b>"
multilang_632 = "Beachten Sie: Da bereits mindestens eine Sprache definiert ist, <b>bleibt die mehrsprachige Unterstützung verfügbar</b>, unabhängig vom Status dieses Schalters. Wenn sie jedoch nicht eingeschaltet ist, wird der Menülink Multi-Language Management ausgeblendet, sobald alle Sprachen gelöscht wurden, und Benutzer werden von der Multi-Language-Management-Seite ausgesperrt."
multilang_633 = "Mehrsprachige Unterstützung für dieses Projekt <b>deaktivieren und ausblenden</b>"
multilang_634 = "Das Einschalten dieser Option blendet den Menülink Multi-Language Management aus und verhindert für Benutzer den Zugriff auf Multi-Language Management, <b>selbst wenn Sprachen definiert sind</b>."
