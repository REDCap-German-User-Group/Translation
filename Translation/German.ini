random_95 = "Möchten Sie Ihre Randomisierungseinrichtung wirklich löschen? Dadurch werden auch alle von Ihnen hochgeladenen Zuteilungstabellen gelöscht. (Hinweis: Diese Aktion kann nur ausgeführt werden, solange sich das Project noch im Entwicklungsstatus befindet.)"
random_96 = "Ihre Randomisierungseinrichtung und alle Zuteilungen wurden nun gelöscht."
random_97 = "Bitte wählen Sie eine der Gruppierungsoptionen ODER deaktivieren Sie das Kontrollkästchen Randomisieren nach Gruppe."
random_98 = "Bitte wählen Sie im Abschnitt Randomisieren nach Gruppe ein Feld aus der Dropdown-Liste aus."
random_99 = "Das Randomisierungsmodell wurde gespeichert!"
random_100 = "Die Vorlagen für Zuteilungstabellen enthalten alle rohen codierten Werte für die Felder, die in Ihrem Randomisierungsmodell verwendet werden. Wenn Sie eine der Vorlagen für Zuteilungstabellen herunterladen und öffnen, finden Sie in der letzten Spalte jeder Datei hilfreiche Hinweise. Dort wird für alle verwendeten Felder das Label jeder Multiple-Choice-Option aufgeführt, das dem jeweiligen rohen codierten Wert entspricht (z. B. wird für das Feld 'sex' 0=Female und 1=Male angegeben). Wenn Sie Data Access Groups verwenden, um nach Gruppe zu randomisieren, wird zusätzlich jeder Gruppenname mit seiner entsprechenden Gruppen-ID-Nummer aufgeführt, die in Ihrer Zuteilungstabelle auf die gleiche Weise wie die rohen codierten Werte für Ihr Randomisierungsfeld und Ihre Strata verwendet werden kann. Die letzte Spalte mit den Hinweisen wird ignoriert, wenn Sie Ihre benutzerdefinierte Zuteilungstabelle schließlich in Schritt 3 hochladen."
random_101 = "Es gibt mehrere verschiedene Benutzerrechte, die für die Randomisierung verwendet werden können. Sie entsprechen unterschiedlichen Rollen während des Randomisierungsprozesses und können auf der Seite Benutzerrechte festgelegt werden. Diese spezifischen Randomisierungsrechte heißen 'Einrichtung', 'Dashboard' und 'Randomisieren'. Wenn Ihnen 'Einrichtungs'-Rechte gewährt wurden, sehen Sie den Tab Einrichtung auf der Randomisierungsseite, auf dem Sie das Randomisierungsmodell und alle seine Parameter definieren sowie Ihre benutzerdefinierte Zuteilungstabelle hochladen können. Wenn Sie 'Dashboard'-Rechte haben, sehen Sie den Tab Zuteilungsdashboard auf der Randomisierungsseite, auf dem Sie den gesamten Zuteilungsfortschritt und die Zuweisungen für randomisierte Probanden anzeigen können. Wenn Sie 'Randomisieren'-Rechte haben, können Sie die Schaltfläche Randomisieren auf dem Datenerhebungsformular anzeigen, das das Randomisierungsfeld enthält, und so die Randomisierung für den Probanden/Datensatz durchführen, den Sie anzeigen. Wenn jemand 'Randomisieren'-Rechte erhält, kann diese Person vorhandene Daten, die bereits für Randomisierungs-Strata-Felder erfasst wurden (falls Stratifizierung verwendet wird), anzeigen und ändern, während sie die Randomisierung durchführt, selbst wenn sie nicht speziell formularbezogene Rechte zum Anzeigen des Formulars hat, auf dem ein Strata-Feld existiert. Daher übersteuern 'Randomisieren'-Rechte in dieser Weise formularbezogene Benutzerrechte, jedoch nur für die Randomisierungs-Strata-Felder. Idealerweise gehören alle drei Benutzerrechte für Randomisierung drei verschiedenen Personentypen in Ihrem Project (obwohl es möglich ist, dass einige Benutzer überlappende Rollen haben). Für eine normale Dateneingabeperson ist es am sinnvollsten, 'Randomisieren'-Rechte zu haben, aber keine anderen Randomisierungsrechte. 'Einrichtungs'- und 'Dashboard'-Rechte sollten nur den höchstrangigen Personen in Ihrem Project gewährt werden, z. B. einem PI oder Statistiker/Datenanalysten, sehr wahrscheinlich jemandem mit früherer Erfahrung mit Randomisierung oder Datenqualität."
random_102 = "Einschränkungen"
random_103 = "Die Einrichtungsphase für Randomisierung ist NUR verfügbar, solange sich das Project im Entwicklungsstatus befindet. Daher sollte der gesamte Einrichtungsprozess abgeschlossen sein, bevor das Project in den Produktionsstatus verschoben wird. Sobald das Project in Produktion ist, wird der Tab Einrichtung dauerhaft gesperrt, und es können keine Einstellungen geändert und keine Zuweisungen rückgängig gemacht werden."
