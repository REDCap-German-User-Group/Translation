rights_237 = "Ohne Projekte mit Zweck 'Übung/Nur zum Spaß'"
rights_238 = "Seite neu laden"
rights_239 = "(einschließlich Ihnen)"
rights_240 = "Es gibt für Sie keine anzuzeigenden Projekte, die den obigen Filterkriterien entsprechen und in denen Sie über die Seite Benutzerrechte des jeweiligen Projekts Rechte zum Bearbeiten von Benutzerberechtigungen haben."
rights_241 = "Sie haben zuletzt auf das User Access Dashboard zugegriffen"
rights_242 = "Es wird empfohlen, dass Sie mindestens einmal pro Kalendermonat auf das User Access Dashboard zugreifen, um zu prüfen, welche Benutzer noch Zugriff auf Ihre Projekte haben."
rights_243 = "AUFMERKSAMKEIT ERFORDERLICH:"
rights_244 = "Sie haben noch nicht auf das User Access Dashboard zugegriffen."
rights_245 = "Benachrichtigungen anzeigen und/oder E-Mails senden, um Benutzer regelmäßig daran zu erinnern, das User Access Dashboard aufzurufen. Dort können Benutzer alle ihre Projekte prüfen, um festzustellen, ob Benutzer daraus entfernt oder deren Zugriffsrechte abgelaufen werden sollten."
rights_246 = "Aktiviert: Benachrichtigung auf Seite"
rights_247 = "Aktiviert: Benachrichtigung und Warnung auf Seite"
rights_248 = "Aktiviert: Benachrichtigung und Warnung auf Seite + monatliche E-Mail-Erinnerung"
rights_249 = "Erklärung der Optionen zur Aktivierung des UAD:"
rights_250 = "UAD-Seite ist ausgeblendet und für Benutzer nicht zugänglich."
rights_251 = "Zeigt Text auf der Seite Meine Projekte an, um Benutzer daran zu erinnern, die UAD-Seite regelmäßig zu besuchen."
rights_252 = "Zeigt Text auf der Seite Meine Projekte an, um Benutzer daran zu erinnern, die UAD-Seite regelmäßig zu besuchen. Wenn der Benutzer das UAD im aktuellen Kalendermonat noch nicht besucht hat, wird die Benachrichtigung rot angezeigt, um ihn darauf hinzuweisen, das UAD bald zu besuchen."
rights_253 = "Zeigt Text auf der Seite Meine Projekte an, um Benutzer daran zu erinnern, die UAD-Seite regelmäßig zu besuchen. Wenn der Benutzer das UAD im aktuellen Kalendermonat noch nicht besucht hat, wird die Benachrichtigung rot angezeigt, um ihn darauf hinzuweisen, das UAD bald zu besuchen. Diese Option sendet außerdem am ersten Werktag jedes Monats eine E-Mail-Erinnerung, um Benutzer daran zu erinnern, das UAD zu besuchen."
rights_254 = "HINWEIS: Wenn der Benutzer in keinem Projekt Zugriff auf die Seite Benutzerrechte hat, sieht er diese Benachrichtigungen nicht und erhält keine E-Mails zum Besuch des UAD."
;; rights_256 is concatenated after a dynamic day count.
rights_256 = "Tage zuvor"
rights_257 = "gestern"
rights_258 = "früher heute"
rights_259 = "(Optional) Benutzerdefinierter Benachrichtigungstext:"
rights_260 = "Optionen zur Aktivierung des UAD:"
rights_261 = "Wie wird der benutzerdefinierte Text verwendet?"
rights_262 = "Damit kann der Text der Benachrichtigung geändert werden, die Benutzern auf der Seite Meine Projekte angezeigt wird. Wenn das Textfeld für die Benachrichtigung leer bleibt, wird standardmäßig der folgende Text verwendet:"
;; rights_263 is concatenated with a dynamic recommendation count and rights_264.
rights_263 = "Sie haben"
;; rights_264 is concatenated after rights_263 and a dynamic recommendation count.
rights_264 = "Empfehlungen, die unten vorausgewählt sind."
rights_265 = "Die Benutzer sind unten vorausgewählt, weil ihr REDCap-Konto gesperrt ist. Sie könnten jedoch jederzeit entsperrt werden. Daher wird empfohlen, dass Sie ihren Zugriff entweder ablaufen lassen oder sie sofort aus dem Projekt entfernen, um sicherzustellen, dass sie nicht unbeabsichtigt wieder Zugriff auf das Projekt erhalten."
rights_267 = "Gesperrt"
rights_268 = "SIE sind der einzige Benutzer mit Zugriff auf dieses Projekt"
rights_269 = "Wenn das REDCap-Konto eines Benutzers gesperrt ist, bedeutet dies, dass der Benutzer auf KEINE Projekte in REDCap zugreifen kann und letztlich auf unbestimmte Zeit aus dem gesamten REDCap-System ausgesperrt ist. Der Benutzer kann aus verschiedenen Gründen gesperrt sein (z. B. weil er sich lange nicht bei REDCap angemeldet hat oder seine Benutzerablaufzeit überschritten wurde). Der Sperrstatus eines Benutzers ist potenziell umkehrbar, aber nur ein REDCap-Administrator kann ein Benutzerkonto entsperren. Wenn eines Ihrer Projekte auf dieser Seite gesperrte Benutzer enthält, wird empfohlen, dass Sie diese aus Ihrem Projekt entfernen, wenn Sie sicherstellen möchten, dass sie zu keinem späteren Zeitpunkt wieder Zugriff auf das Projekt erhalten. Derzeit können gesperrte Benutzer jedoch auf keines Ihrer Projekte zugreifen."
rights_270 = "Was bedeutet 'gesperrt'?"
rights_271 = "Es gibt nichts zu speichern. Sie haben keine Benutzer ausgewählt, die aus Ihren Projekten gelöscht werden oder deren Zugriff ablaufen soll. Bitte versuchen Sie es erneut."
rights_272 = "Vor dem Speichern bestätigen"
rights_273 = "Bitte prüfen Sie unten die Auswahlen, die Sie auf dieser Seite vorgenommen haben, um Benutzer aus Ihren Projekten zu löschen und/oder deren Zugriff ablaufen zu lassen. Falls etwas nicht korrekt ist, schließen Sie dieses Pop-up und nehmen Sie weitere Änderungen vor, bevor Sie erneut auf den Button Speichern klicken."
;; rights_274 is concatenated after a dynamic user count in a confirmation dialog.
rights_274 = "Benutzer insgesamt werden aus Ihren Projekten gelöscht"
;; rights_275 is concatenated after a dynamic user count in a confirmation dialog.
rights_275 = "Benutzer insgesamt erhalten in Ihren Projekten ein abgelaufenes Zugriffsrecht"
;; rights_276 is concatenated after a dynamic user count in a success message.
rights_276 = "Benutzer wurden aus Ihren Projekten gelöscht"
;; rights_277 is concatenated after a dynamic user count in a success message.
rights_277 = "Benutzer hatten in Ihren Projekten einen abgelaufenen Zugriff"
rights_278 = "Zurück zum User Access Dashboard"
rights_279 = "Dies ist das erste Mal, dass Sie auf das User Access Dashboard zugegriffen haben."
rights_280 = "abrufen"
rights_281 = "[Konto gesperrt]"
rights_282 = "Aktion erforderlich: Bald bei REDCap anmelden"
rights_283 = "Diese E-Mail betrifft Ihr REDCap-Benutzerkonto"
rights_284 = "Um Sie und Ihre Daten besser zu schützen, verwendet REDCap nun höhere interne Sicherheitsstandards dafür, wie Ihre Login-Informationen im System gespeichert werden. Wie Sie wissen, ist Sicherheit in REDCap von größter Bedeutung, und im Rahmen der Verbesserung dieser Sicherheitsstandards <b>bitten wir Sie um eine einfache Aktion: Melden Sie sich bald bei REDCap an</b>."
rights_285 = "Wir bitten darum, weil der Vorgang der Anmeldung Ihr REDCap-Konto automatisch und unsichtbar auf den neuen Sicherheitsstandard aktualisiert. Nachdem Sie sich erfolgreich bei REDCap angemeldet haben, beachten Sie bitte, dass Ihnen nicht mitgeteilt wird, dass das Sicherheitsupgrade erfolgt ist. Danach können Sie sich entweder sofort abmelden oder REDCap wie gewohnt weiterverwenden. Vielen Dank für Ihre Hilfe. Wenn Sie Fragen zu dieser E-Mail oder ihrer Echtheit haben, wenden Sie sich bitte an Ihren REDCap-Administrator unter"
rights_286 = "Benutzersicherheit"
rights_287 = "Benutzer mit schwächerem Passwort-Hash:"
rights_288 = "Benutzer daran erinnern, sich bald anzumelden"
rights_289 = "Diese Benutzer jetzt sperren"
rights_290 = "Benutzer mit starkem Passwort-Hash:"
rights_291 = "Für höhere Sicherheit wurden die internen Methoden zur Passwortspeicherung in REDCap in REDCap 5.8.0 geändert. Wenn Sie REDCap vor dieser Version verwendet haben, sind die Passwörter einiger Ihrer Benutzer möglicherweise noch mit dem schwächeren Passwort-Hash gespeichert. Damit der Passwort-Hash eines Benutzers auf den stärkeren Hash aktualisiert wird, muss er sich lediglich bei REDCap anmelden; dadurch wird der Hash sofort (und unsichtbar) aktualisiert. Rechts ist die Anzahl der tabellenbasierten Benutzer aufgeführt, die den schwächeren Hash bzw. den starken Hash haben."
rights_292 = "Sie können die Aktionsbuttons im gelben Feld verwenden, um Ihre Benutzer entweder zu benachrichtigen und sie daran zu erinnern, sich anzumelden, und/oder alle Ihre Benutzer mit schwächerem Passwort-Hash zu sperren. Dies kann erfolgen, wenn Sie sie nicht dazu bringen konnten, sich anzumelden. HINWEIS: Ihre REDCap-Installation gilt *nicht* als unsicher, wenn Sie noch Benutzer mit dem schwächeren Hash haben, aber aus Sicherheitssicht ist es deutlich besser, wenn alle den stärkeren Hash verwenden. (HINWEIS: Gesperrte Benutzer sind in den Zählungen rechts *nicht* enthalten.)"
rights_293 = "E-Mail-Erinnerung senden"
rights_294 = "Wenn Sie unten auf den Button 'E-Mail-Erinnerung senden' klicken, wird eine E-Mail-Erinnerung NUR an Ihre tabellenbasierten Benutzer gesendet, deren REDCap-Konto einen schwächeren Passwort-Hash hat. Darin werden sie gebeten, sich bald bei REDCap anzumelden. Den Inhalt der E-Mail, die an die Benutzer gesendet wird, sehen Sie im Feld unten. Der E-Mail-Text kann nicht geändert werden."
rights_295 = "Den Benutzern wird nun eine E-Mail gesendet, in der sie gebeten werden, sich bald anzumelden."
rights_296 = "Die Benutzer mit dem schwächeren Passwort-Hash wurden erfolgreich gesperrt."
rights_297 = "Wenn Sie unten auf den Button 'Benutzer sperren' klicken, werden alle tabellenbasierten Benutzer gesperrt, deren REDCap-Konto einen schwächeren Passwort-Hash hat. Durch das Sperren dieser Benutzer wird die Gesamtsicherheit des Systems erhöht."
rights_298 = "Benutzer sperren"
rights_299 = "Berechtigungen der höchsten Ebene:"
rights_300 = "Weitere Berechtigungen:"
rights_303 = "Mobile-App-Berechtigungen bestätigen"
rights_304 = "Bevor Sie REDCap-Mobile-App-Berechtigungen für diesen Benutzer aktivieren, müssen Sie bestätigen, dass Sie die folgenden Punkte verstehen. Bitte beachten Sie: Unabhängig von den API-Export-/Importrechten und Datenexportrechten dieses Benutzers gilt: <b>Wenn der Benutzer die Mobile App verwendet, geben seine Mobile-App-Berechtigungen ihm automatisch Rechte für den 'Vollständigen Datensatz' bei Datenexporten (wenn er Berechtigungen zum 'Daten herunterladen' für die Mobile App hat) und geben ihm sowohl API-Export- als auch API-Importrechte *NUR FÜR ANFRAGEN, DIE VON DER MOBILE APP GESTELLT WERDEN*.</b> Wenn die Mobile App nicht verwendet wird, verhalten sich die Rechte des Benutzers normal so, wie sie definiert wurden. HINWEIS: Da die Mobile App vollständigen Datenexportzugriff benötigt und außerdem die Möglichkeit erfordert, API-Exporte und -Importe durchzuführen, haben die Berechtigungen der Mobile App während Mobile-App-Vorgängen mit dem REDCap-Server Vorrang vor den normalen Benutzerberechtigungen. <b>Wenn einer Person jedoch nicht die zusätzliche Benutzerberechtigung 'Daten für alle Datensätze in die App herunterladen' gewährt wurde, kann sie keine Daten aus dem Projekt auf dem REDCap-Server in die App herunterladen.</b>"
rights_305 = "Ja, ich verstehe"
rights_306 = "Benutzer erlauben, Daten für alle Datensätze in die App herunterzuladen?"
rights_307 = "Erlaubt dem Benutzer, offline in der Mobile App Daten zu erfassen"
rights_308 = "Was ist die REDCap Mobile App?"
rights_309 = "Einstellungen zur REDCap Mobile App:"
rights_310 = "Die REDCap Mobile App ist eine App, die auf einem Android- oder iOS-Tablet oder Mobilgerät installiert werden kann, damit Daten auf diesem Gerät offline erfasst werden können. Zu einem späteren Zeitpunkt können sie dann mit diesem Projekt auf dem REDCap-Server synchronisiert werden. Die App ist besonders nützlich, wenn die Datenerhebung an Orten durchgeführt wird, an denen kein Internetdienst verfügbar ist (z. B. kein WLAN oder Mobilfunkdienst) oder an denen der Internetdienst unzuverlässig ist."
rights_311 = "Benutzerrechte in der REDCap Mobile App"
rights_312 = "Es ist wichtig zu beachten, dass die Benutzerberechtigungen innerhalb der REDCap Mobile App die Berechtigungen eines Benutzers im Projekt auf dem REDCap-Server im Hinblick auf die Datenerhebung nachbilden. Wenn ein Benutzer beispielsweise für ein bestimmtes Datenerhebungsinstrument 'Kein Zugriff' als Dateneingaberecht hat, hat der Benutzer auch in der App keinen Zugriff auf dieses Instrument. Es gibt eine zusätzliche Benutzerberechtigung im Zusammenhang mit der App, mit der Sie auswählen können, ob der Benutzer Daten (d. h. Datensätze in diesem Projekt) auf sein Gerät in die Mobile App herunterladen darf. Sie können ihnen beispielsweise nicht erlauben, Datensatzdaten in die App herunterzuladen, wenn dieses Projekt sehr sensible Daten enthält (z. B. PHI)."
rights_313 = "WARNUNG: Bitte beachten Sie: Da dieser Benutzer die REDCap Mobile App verwendet hat, gehen alle Daten, die er für dieses Projekt in der REDCap Mobile App erfasst hat und die noch nicht zurück auf den Server synchronisiert wurden, DAUERHAFT VERLOREN, wenn Sie ihn aus diesem Projekt entfernen."
rights_314 = "API-Import/Update"
rights_315 = "Benutzer per E-Mail benachrichtigen?"
rights_316 = "Benutzerrechte stimmen nicht überein"
rights_317 = "Bitte beachten Sie, dass die Rolle, der Sie sich zuweisen möchten, keine Berechtigungen für Benutzerrechte hat und Sie daher daran hindern würde, auf die Seite Benutzerrechte zuzugreifen. Wählen Sie eine andere Rolle aus oder ändern Sie die Rolle, der Sie sich zuweisen möchten."
rights_318 = "Zugriffsgruppen können bei aktivierter Randomisierung nicht gelöscht werden"
rights_319 = "Da Sie das Randomisierungsmodul aktiviert haben und Zugriffsgruppen verwenden, um nach Gruppe/Standort zu randomisieren, dürfen Sie keine Zugriffsgruppen löschen. Dies könnte schwerwiegende Probleme verursachen, wenn Sie Ihre Randomisierungs-Zuordnungstabelle bereits hochgeladen und/oder begonnen haben, Datensätze in diesem Projekt zu randomisieren."
rights_320 = "Hinweis: Projekte, die nur einen Benutzer enthalten (d. h. Sie), werden unten *nicht* angezeigt."
rights_321 = "Sobald einem Benutzer in diesem Projekt Berechtigungen für die 'REDCap Mobile App' gegeben wurden, kann er zur Mobile-App-Seite im linken Menü navigieren und damit dieses Projekt innerhalb der Mobile App auf seinem Gerät einrichten. Nachdem das mobile Projekt auf dem Gerät eingerichtet wurde, kann der Benutzer Daten erfassen (die lokal auf dem Gerät gespeichert werden) und diese Daten später mit diesem Projekt auf dem REDCap-Server synchronisieren."
;; rights_322 is concatenated with a link to the User Access Dashboard.
rights_322 = "Um zu prüfen, welche Benutzer noch Zugriff auf Ihre Projekte haben, besuchen Sie das"
rights_324 = "Einen Datensatz umzubenennen bedeutet, dass Sie seinen Datensatznamen in einen anderen Wert ändern. Benutzer mit dieser Benutzerberechtigung sehen die Option 'Datensatz umbenennen' unter 'Aktion für Datensatz auswählen' auf der Datensatz-Startseite, nachdem ein Datensatz ausgewählt wurde. Dort können sie einen neuen gewünschten Datensatznamen für diesen Datensatz eingeben. Wenn ein Benutzer versucht, einen Datensatz in einen Wert umzubenennen, der dem Namen eines bereits vorhandenen Datensatzes entspricht, wird dies verhindert."
rights_326 = "External Modules: Konfigurationsberechtigungen"
rights_327 = "*Berechtigungen basieren auf den Projektdesign-/Einrichtungsrechten des Benutzers"
rights_328 = "Berechtigungen können dafür definiert werden, ob der Benutzer die Konfiguration eines External Module, das in diesem Projekt aktiviert wurde, festlegen oder ändern kann. Unten sind die derzeit aktivierten Module aufgeführt. HINWEIS: Nur Administratoren dürfen die Modul-Konfigurationsberechtigungen hier ändern."
rights_329 = "**Modul hat keine Konfigurationsoptionen auf Projektebene"
rights_330 = "Sponsor-Dashboard"
rights_334 = "Gesperrt?"
rights_335 = "Kontoablauf"
rights_336 = "Das Sponsor-Dashboard kann von Benutzern verwendet werden, die als Benutzer-Sponsor für einen anderen REDCap-Benutzer benannt wurden. In vielen Fällen ist ein Sponsor eine sekundäre Kontaktperson für den Benutzer oder jemand, der bei der Verwaltung des Kontos hilft (oder möglicherweise die Erstellung des Kontos angefordert hat). Das Sponsor-Dashboard ermöglicht Sponsoren, ihre betreuten Benutzer zu verwalten, indem sie verschiedene Informationen über sie anzeigen, z. B. Benutzername, Name, Ablauf, Sperrstatus und allgemeine Aktivität. Das Dashboard enthält verschiedene Funktionen, mit denen Sponsoren Anfragen an REDCap-Administratoren stellen können, um ihre betreuten Benutzer zu verwalten. Obwohl Sponsoren die Aktionen am unteren Rand dieser Seite nicht selbst durchführen können, <b>kann ein Administrator die Aktion auf Anfrage in ihrem Namen durchführen</b>."
rights_337 = "Sie müssen mindestens einen Benutzer auswählen. Bitte aktivieren Sie das Kontrollkästchen neben einem oder mehreren Benutzern."
rights_338 = "Als Administrator können Sie auf den Button klicken, um die Anfrage des Sponsors zu genehmigen."
rights_339 = "Sponsor-Anfrage bearbeiten:"
rights_340 = "Stellen Sie mit einem der untenstehenden Buttons eine Anfrage an einen REDCap-Administrator für die oben ausgewählten Benutzer."
rights_341 = "Meine betreuten Benutzer"
rights_342 = "Sie haben keine betreuten Benutzer, die auf dieser Seite aufgelistet werden können."
rights_343 = "Wenn dieses Modul aktiviert ist, kann jeder Benutzer, der als Benutzer-Sponsor für einen anderen REDCap-Benutzer aufgeführt ist, über einen Link nahe dem oberen Rand der Seite Meine Projekte auf seine betreuten Benutzer zugreifen. In ihrem Dashboard können Sponsoren Anfragen an Administratoren bezüglich ihrer Benutzer stellen, z. B. Benutzer sperren, Benutzerablaufzeiten festlegen/verlängern, Passwörter zurücksetzen und mehr."
rights_345 = "Standardbetrag zum Festlegen/Verlängern von Benutzerablaufzeiten:"
rights_346 = "Bezüglich Benutzerablaufzeiten gilt: Wenn ein Sponsor beantragt, die Ablaufzeit eines Benutzers für dessen Konto zu verlängern, wird die oben angegebene Anzahl von Tagen zur vorhandenen Ablaufzeit addiert. Wenn der Sponsor die Ablaufzeit festlegt (anstatt sie zu verlängern), wird die Ablaufzeit anhand des oben angegebenen Werts berechnet, der zum heutigen Datum addiert wird."
rights_347 = "Sie können Aktionen für mehrere Benutzer gleichzeitig durchführen, indem Sie einen der untenstehenden Buttons verwenden."
rights_348 = "Mit den Buttons am unteren Rand dieser Seite können Sie Aktionen für mehrere Benutzer durchführen, z. B. Benutzer sperren, deren Kontoablauf verlängern usw."
rights_349 = "Die Änderungen wurden erfolgreich an den ausgewählten Benutzern vorgenommen!"
rights_350 = "Es scheint, dass es nichts zu tun gibt. Möglicherweise haben sich einige Dinge in den Benutzerkonten geändert, die ursprünglich für diese Anfrage ausgewählt wurden, sodass diese Anfrage jetzt nicht mehr notwendig ist. Wenn Sie diese Anfrage über die To-do-Liste bearbeiten, sollten Sie diese Anfrage wahrscheinlich archivieren oder andernfalls den Antragsteller direkt kontaktieren, um dies zu klären."
rights_351 = "Gesperrte Benutzer ausblenden"
rights_353 = "<b>HINWEIS:</b> Dieser Benutzer ist ein REDCap-Administrator. Da Administratoren immer maximale Berechtigungen haben, hat das Ändern der untenstehenden Benutzerrechte keine Auswirkung auf diesen Benutzer in diesem Projekt, einschließlich seiner Nutzung der REDCap Mobile App."
rights_356 = "Reports hinzufügen/bearbeiten/organisieren"
;; rights_357 is concatenated after the Calendar app label when scheduling is enabled.
rights_357 = "& Terminplanung"
rights_358 = "Der Rollenname fehlt. Bitte geben Sie einen Namen für diese Benutzerrolle an."
rights_359 = "Nur Analyse-/Bereinigungsprojekte"
rights_361 = "[Keiner Rolle zugewiesen]"
rights_362 = "Projekt als Benutzer anzeigen:"
rights_363 = "-- Benutzer auswählen --"
;; rights_364 is concatenated with a dynamic username and rights_365.
rights_364 = "ERFOLG! Sie betrachten dieses Projekt jetzt als Benutzer"
;; rights_365 is concatenated after rights_364 and a dynamic username.
rights_365 = "Die Projekt-Benutzerberechtigungen dieses Benutzers werden innerhalb dieses Projekts auf Sie angewendet. Die Seite wird jetzt neu geladen, um diese Änderung anzuzeigen."
;; rights_366 is concatenated with a dynamic username and rights_367.
rights_366 = "Sie betrachten dieses Projekt derzeit als Benutzer"
;; rights_367 is concatenated after rights_366 and a dynamic username.
rights_367 = ", und dessen Benutzerberechtigungen werden für die Dauer dieser Sitzung auf Sie angewendet."
rights_368 = "[Anzeige als Benutzer beenden]"
rights_369 = "ERFOLG! Sie betrachten dieses Projekt nicht mehr als ein anderer Benutzer. Die Seite wird jetzt neu geladen, um diese Änderung anzuzeigen."
rights_370 = "Ganze Datensätze sperren/entsperren (Datensatzebene)"
rights_371 = "(Instrumentenebene)"
rights_372 = "HINWEIS: Es ist wichtig zu beachten, dass Sperrung auf Instrumentenebene und Sperrung auf Datensatzebene unabhängige Funktionen sind, die durch separate Benutzerberechtigungen gesteuert werden (wie oben zu sehen). Sie benötigen eine ausdrückliche Berechtigung für die jeweilige Funktion, um die entsprechende Sperraktion auszuführen. Außerdem ist die Datensatzsperrung eine höherstufige Sperrung als die Instrumentsperrung. Das bedeutet, dass ein ganzer Datensatz gesperrt oder entsperrt werden kann, während ein oder mehrere Instrumente derzeit gesperrt sind, aber ein Instrument nicht gesperrt oder entsperrt werden kann, während der gesamte Datensatz gesperrt ist."
rights_373 = "Datenanzeigerechte"
rights_375 = "Bitte beachten Sie, dass das Gewähren der Berechtigung 'Sperren/Entsperren mit E-Signatur-Berechtigung' für einen Benutzer die E-Signatur-Funktionalität nicht sofort auf allen Datenerhebungsinstrumenten aktiviert. Um die E-Signatur-Funktion für die gewünschten Instrumente zu aktivieren, klicken Sie im linken Menü auf den Link 'Sperrung/E-Signaturen anpassen und verwalten' und aktualisieren Sie die Einstellungen auf der Registerkarte 'Anpassung der Datensatzsperrung'. Dort finden Sie jedes Instrument mit der Option 'E-Signatur-Option anzeigen'. Bis diese Einstellungen aktualisiert sind, bleibt die E-Signatur-Option ausgeblendet."
rights_376 = "Benutzer, Rollen und Zuweisungen hoch- oder herunterladen"
rights_377 = "Benutzer hochladen (CSV)"
rights_378 = "Benutzer herunterladen (CSV)"
rights_379 = "Sie können eine CSV-Datei hochladen, um neuen Benutzern Zugriff auf dieses Projekt zu gewähren und die Benutzerberechtigungen vorhandener Benutzer zu ändern."
rights_380 = "Wählen Sie Ihre CSV-Datei mit Benutzern und deren Benutzerrechten aus, die hinzugefügt/geändert werden sollen:"
rights_381 = "Benutzer wurden hinzugefügt oder aktualisiert. HINWEIS: Wenn Sie gerade einen neuen Benutzer zum Projekt hinzugefügt haben, können Sie den Benutzer jetzt optional einer Rolle zuweisen."
rights_384 = "HINWEIS: Bitte beachten Sie, dass REDCap-Administratoren zwar mit der Methode Benutzer hochladen zu einem Projekt hinzugefügt werden können, sie jedoch aufgrund ihrer Administratorrolle immer maximale Rechte im Projekt haben. Diese Rechte überschreiben alle Benutzerberechtigungen, die hier manuell für sie festgelegt wurden."
rights_385 = "Das Feld mit dem Namen"
rights_386 = "für Benutzer"
rights_387 = "ist kein gültiger Rechtewert."
rights_388 = "Er muss 0 oder 1 sein."
rights_389 = "Er muss 0, 1, 2 oder 3 sein."
rights_390 = "Sie können eine Liste aller Benutzer und ihrer Benutzerberechtigungen für dieses Projekt exportieren. Hinweis: Wenn der Benutzer einer Benutzerrolle zugewiesen wurde, wird der Benutzer mit den in der Rolle definierten Berechtigungen zurückgegeben. Dies gibt alle untenstehenden Attribute im Hinblick auf Benutzerberechtigungen im angegebenen Format zurück. Bitte beachten Sie, dass das Attribut 'forms' das einzige Attribut ist, das Unterelemente enthält (eines für jedes Datenerhebungsinstrument), wobei jedes Formular seinen eigenen Formularrechte-Wert hat (siehe Schlüssel unten, um zu erfahren, was jeder numerische Wert bedeutet). Die meisten Benutzerberechtigungsattribute sind boolesch (0=Kein Zugriff, 1=Zugriff). Zurückgegebene Attribute:"
rights_391 = "Bitte beachten Sie, dass das Format der hochgeladenen CSV-Datei genau dem oben angegebenen Format entsprechen muss. Dieses lässt sich am einfachsten erkennen, wenn Sie die heruntergeladene CSV-Datei der Benutzerrechte ansehen. Außerdem existiert das Feld data_access_group_id in der Export-CSV nur als Referenz. Wenn es hochgeladen wird, wird es beim Import ignoriert. Wenn Sie die Zugriffsgruppe des Benutzers ändern möchten, sollten Sie stattdessen einen neuen Wert für das Feld 'data_access_group' festlegen."
rights_392 = "CDIS: Import der E-Mail-Adresse des Patienten aus der EHR erlauben?<br>(nur anwendbar für die Dienste Clinical Data Mart und Clinical Data Pull)"
rights_393 = "Aus Datenschutzgründen möchten Sie das Feld 'E-Mail-Adresse' möglicherweise ausschließen, damit REDCap-Benutzer die E-Mail-Adresse eines Patienten nicht aus der EHR importieren können. Wenn 'Nein' ausgewählt ist, erscheint die E-Mail-Option nicht in der EHR-Quellfeldliste, wenn ausgewählt wird, welche klinischen Datenfelder importiert werden sollen. Durch Aktivieren dieser Einstellung wird die E-Mail-Option für alle CDIS-Dienste (Clinical Data Pull, Clinical Data Mart) in diesem Projekt sichtbar."
rights_395 = "(Ausgeblendet)"
rights_396 = "können ihre Benutzerberechtigungen nicht geändert bekommen, weil der Benutzer einer Benutzerrolle angehört. Benutzer in Rollen können ihre Berechtigungen nicht über die Methode 'Benutzer hochladen (CSV)' ändern lassen."
rights_397 = "Benutzer einer Zugriffsgruppe zuweisen"
rights_398 = "Zugriffsgruppe zuweisen:"
rights_399 = "-- Rolle auswählen --"
rights_400 = "Es wurde keine Rolle ausgewählt. Bitte versuchen Sie es erneut."
rights_402 = "Letzte protokollierte Aktivität:"
rights_403 = "Benutzerrollen-ID"
rights_404 = "Eindeutiger Rollenname"
rights_405 = "für Benutzerrolle"
rights_406 = "Ungültige eindeutige Rollennamen:"
rights_407 = "Benutzerrollen hochladen (CSV)"
rights_408 = "Benutzerrollen herunterladen (CSV)"
rights_409 = "Sie können eine CSV-Datei hochladen, um neue Benutzerrollen zu diesem Projekt hinzuzufügen und die Benutzerberechtigungen vorhandener Benutzerrollen zu ändern."
rights_410 = "Wählen Sie Ihre CSV-Datei mit Benutzerrollen und deren Benutzerrechten aus, die hinzugefügt/geändert werden sollen:"
rights_411 = "Die Rollenbeschriftung ist leer."
rights_412 = "Sie können eine Liste aller Benutzerrollen und ihrer Benutzerberechtigungen für dieses Projekt exportieren. Dies gibt alle untenstehenden Attribute im Hinblick auf Benutzerrollenberechtigungen im angegebenen Format zurück. Bitte beachten Sie, dass das Attribut 'forms' das einzige Attribut ist, das Unterelemente enthält (eines für jedes Datenerhebungsinstrument). Dies gibt alle untenstehenden Attribute im Hinblick auf Benutzerrollenberechtigungen im angegebenen Format zurück. Bitte beachten Sie, dass das Attribut 'forms' das einzige Attribut ist, das Unterelemente enthält (eines für jedes Datenerhebungsinstrument), wobei jedes Formular seinen eigenen Formularrechte-Wert hat (siehe Schlüssel unten, um zu erfahren, was jeder numerische Wert bedeutet). Die meisten Benutzerberechtigungsattribute sind boolesch (0=Kein Zugriff, 1=Zugriff). Zurückgegebene Attribute:"
rights_413 = "Bitte beachten Sie, dass das Format der hochgeladenen CSV-Datei genau dem oben angegebenen Format entsprechen muss. Dieses lässt sich am einfachsten erkennen, wenn Sie die heruntergeladene CSV-Datei der Benutzerrollen ansehen."
rights_414 = "Benutzerrollen wurden hinzugefügt oder aktualisiert. HINWEIS: Wenn Sie gerade eine neue Benutzerrolle zum Projekt hinzugefügt haben, können Sie den Benutzer jetzt optional einer Rolle zuweisen."
rights_415 = "Benutzerrollenzuweisungen hochladen (CSV)"
rights_416 = "Benutzerrollenzuweisungen herunterladen (CSV)"
rights_417 = "Wählen Sie Ihre CSV-Datei mit Benutzer-Rollen-Zuweisungen aus, die hinzugefügt oder geändert werden sollen:"
rights_418 = "Sie können Benutzer jeder Benutzerrolle zuweisen, indem Sie eine CSV-Datei hochladen. Das Format für die CSV-Upload-Datei erhalten Sie, indem Sie die CSV-Datei Ihrer vorhandenen Benutzer-Rollen-Zuweisungen exportieren. <b>HINWEIS:</b> Wenn Sie eine vorhandene Zuordnung ändern möchten, *müssen* Sie den eindeutigen Benutzernamen und Rollennamen angeben. Wenn die Spalte 'unique_role_name' nicht bereitgestellt wird, wird der Benutzer keiner Rolle zugewiesen."
rights_419 = "Benutzerrollenzuweisungen wurden aktualisiert."
rights_420 = "Sie können eine Liste aller Benutzer und der dem Benutzer zugewiesenen Rolle für dieses Projekt exportieren.<br>Zurückgegebene Attribute:"
rights_421 = "Neuen Benutzer einer Rolle zuweisen"
rights_422 = "Ungültige Benutzernamen:"
rights_423 = "kann nicht aktualisiert werden"
rights_424 = "kann nicht hinzugefügt werden"
rights_425 = "Projektablauf des Benutzers"
rights_427 = "HINWEIS: Benutzer, die sich nicht über tabellenbasierte Authentifizierung authentifizieren, sind für das Zurücksetzen des Passworts nicht gültig. Daher ist es nicht möglich, den Zeitpunkt ihres letzten Passwort-Resets zu prüfen. Nur ausgewählte Benutzer, die sich über tabellenbasierte Authentifizierung anmelden, können für die Aktion 'Zeitpunkt des letzten Passwort-Resets' ausgewählt werden."
rights_428 = "Datenexportrechte"
rights_429 = "Datenanzeigerechte beziehen sich auf die Fähigkeit eines Benutzers, Daten auf Seiten im Projekt anzuzeigen oder zu bearbeiten (z. B. Dateneingabeformulare, Reports). Benutzer mit Datenanzeigerechten 'Kein Zugriff' für ein bestimmtes Instrument können dieses Instrument für keinen Datensatz anzeigen und auch keine Felder aus diesem Instrument in einem Report anzeigen. Datenexportrechte beziehen sich auf die Fähigkeit eines Benutzers, Daten aus dem Projekt zu exportieren, sei es über die Seite Datenexporte, API, Mobile App oder in PDFs von Instrumenten, die Datensatzdaten enthalten. Hinweis: Datenanzeigerechte und Datenexportrechte sind vollständig getrennt und beeinflussen einander nicht."
rights_431 = "Grundlegende Berechtigungen"
rights_432 = "Anzeigen"
rights_433 = "Ausblenden"
rights_434 = "gesperrte Benutzer"
rights_437 = "MyCap-Teilnehmer verwalten"
rights_439 = "External Modules API"
rights_440 = "Vollzugriff"
rights_441 = "Diese Seite kann verwendet werden, um die Benutzerberechtigungen von Benutzern in diesem Projekt anzuzeigen. Da Sie für diese Seite nur Leseberechtigung haben, dürfen Sie keine Benutzer hinzufügen, Benutzerberechtigungen ändern, Rollen hinzufügen/bearbeiten oder andere Aktionen durchführen."
rights_442 = "Da Sie einer Zugriffsgruppe zugewiesen wurden, können Sie nur Benutzer aus Ihrer Gruppe anzeigen."
rights_443 = "Benutzernamen dürfen nur Buchstaben, Zahlen, Unterstriche, Bindestriche, Punkte, Leerzeichen, Apostrophe und @-Symbole enthalten."
rights_444 = "Diese Einstellung ist nur aktiv, wenn auf der CDIS-Einstellungsseite die globale Option 'Einzelnen Projekten die Entscheidung erlauben' ausgewählt ist. Wenn global 'Ja' oder 'Nein' ausgewählt ist, wird diese Einstellung überschrieben."
rights_445 = "Aus Projekt entfernen"
rights_446 = "Aus dem Projekt zu entfernender Benutzer: <b>{0}</b>"
rights_447 = "Nur Admin: Benutzerkonto auf der Seite Benutzer durchsuchen anzeigen"
rights_448 = "Reports hinzufügen/bearbeiten"
rights_449 = "Umfrageantworten bearbeiten"
rights_450 = "Klicken Sie auf einen Kopfzeilentext, um die entsprechende Berechtigung für alle Instrumente festzulegen"
rights_451 = "(halten Sie <kbd>CTRL</kbd> oder <kbd>CMD</kbd> gedrückt, um Kontrollkästchen zu deaktivieren)"
rights_452 = "Das Benutzerrecht <em>Datensätze löschen</em> überschreibt das formularspezifische Recht <em>Löschen</em>"
rights_453 = "* Beinhaltet die Möglichkeit, einen ganzen Datensatz, eine gesamte wiederholte Instrument-/Event-Instanz oder alle Daten in einem Instrument oder Event zu löschen."
rights_454 = "Benutzer mit der Berechtigung zum Erstellen von Datensätzen können auf der Seite Datensätze hinzufügen/bearbeiten oder im Record Status Dashboard einen neuen Datensatz erstellen, indem sie einen neuen Datensatznamen eingeben oder (wenn automatische Datensatznummerierung aktiviert ist) auf den Button 'Neuen Datensatz hinzufügen' klicken. Wenn Benutzer diese Berechtigung nicht haben, sehen sie die Option zum Erstellen neuer Datensätze nicht, sondern können nur auf vorhandene Datensätze zugreifen und diese bearbeiten."
rights_455 = "Benutzer mit der Berechtigung zum Löschen von Datensätzen können einen ganzen Datensatz, eine gesamte wiederholte Instrument-/Event-Instanz innerhalb eines Datensatzes oder alle Daten in einem Instrument oder Event innerhalb eines Datensatzes dauerhaft löschen. Das Löschen eines gesamten Datensatzes erfolgt durch Klicken auf die Option 'Datensatz löschen' unter 'Aktion für Datensatz auswählen' auf der Datensatz-Startseite, nachdem ein Datensatz ausgewählt wurde. Bei longitudinalen Projekten löscht diese Aktion alle Daten für alle Events (für den aktuellen Arm) dieses Datensatzes. Nach der Ausführung gibt es keine Möglichkeit, die gelöschten Daten wiederherzustellen. Um alle Daten in einem bestimmten Instrument zu löschen, kann der Benutzer auf den Button Löschen am unteren Rand eines Dateneingabeformulars klicken. Es wird empfohlen, nur Benutzern der höchsten Ebene diese Benutzerberechtigung zu geben, da sie dauerhaften Datenverlust verursacht."
rights_456 = "Dieses Recht steuert, ob der API-Token eines Benutzers verwendet werden darf, um auf API-Methoden zuzugreifen, die von installierten External Modules bereitgestellt werden. Es wirkt sich nicht auf die standardmäßigen REDCap-API-Rechte aus (Export, Import/Update).<br><br>Es wird empfohlen, dieses Recht vorsichtig zu verwenden, da der Zugriff auf APIs von External Modules je nach den im Projekt aktiven Modulen zusätzliche Funktionalität über die REDCap-Kern-API hinaus gewähren kann. Die von External Modules bereitgestellten API-Methoden können auf der Seite <b>{0:API}</b> oder auf der Seite <b>{1:External Modules - Project Module Manager}</b> geprüft werden."
rights_457 = "Benutzer mit Sperrberechtigungen haben außerdem Zugriff auf die Seite Sperrverwaltung im linken Anwendungsmenü."
rights_458 = "Hinweis: Das Recht <i>Löschen</i> wurde für alle Formulare entfernt. Bitte aktualisieren Sie die <b>Datenanzeigerechte</b> für einzelne Formulare nach Bedarf."
rights_459 = "<b>FEHLER:</b> Der Benutzer \"<b>{0}</b>\" kann nicht hinzugefügt werden, weil er keinem vorhandenen Benutzerkonto in diesem REDCap-System entspricht. Das Benutzerkonto muss erstellt werden, bevor Sie Projektzugriff gewähren können. Bitte prüfen Sie die Schreibweise des Benutzernamens noch einmal."

