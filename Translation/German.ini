dataqueries_17 = "(Diskrepanz nur anzeigen, wenn...)"
dataqueries_18 = "Diskrepanzen gesamt"
dataqueries_19 = "Da Sie einer Zugriffsgruppe zugewiesen sind, können Sie nur Diskrepanzen für Datensätze anzeigen, die Ihrer Gruppe zugewiesen sind."
dataqueries_20 = "Mit diesem Modul können Sie Datenqualitätsregeln auf Ihre Projektdaten anwenden, um Diskrepanzen in Ihren Daten zu prüfen. Unten sind einige vordefinierte Datenregeln aufgeführt, die Sie verwenden und ausführen können. Sie können auch eigene Regeln erstellen oder bereits erstellte Regeln bearbeiten, löschen oder neu anordnen. Um Diskrepanzen für eine bestimmte Regel zu finden, klicken Sie einfach neben der Regel auf den Button Ausführen oder auf den Button Alle Regeln ausführen, um alle Regeln auf einmal auszuführen. Es wird die Gesamtzahl der gefundenen Diskrepanzen für jede Regel angezeigt, und Sie können die Details dieser Diskrepanzen anzeigen, indem Sie neben der jeweiligen Regel auf Anzeigen klicken."
dataqueries_21 = "Die in roter Schrift aufgeführten vordefinierten Regeln können nicht geändert, neu angeordnet oder entfernt werden. Sie sind vorhanden, falls Sie sie verwenden möchten. Sie können außerdem unten in der Tabelle eigene Regeln erstellen und ausführen. Regeln können in einem wörtlichen Logikformat eingerichtet werden (z. B. [age] > 65), das als boolescher Wert (true oder false) ausgewertet wird, nachdem der Wert eines vorhandenen Datensatzes für dieses Feld eingesetzt wurde (z. B. ergibt 23 > 65 false, wenn der Wert eines Datensatzes für 'age' 23 ist). Die Logik wird auf alle vorhandenen Datensätze im Projekt angewendet, und für jeden Datensatz, bei dem die Logik als true ausgewertet wird, wird eine Diskrepanz für diese Regel zurückgegeben. Ähnlich wie bei Verzweigungslogik und berechneten Feldern können REDCap-Variablen-/Feldnamen in der Regellogik verwendet werden, indem der Variablenname in eckige Klammern [ ] gesetzt wird. Bei longitudinalen Projekten können Sie außerdem auf ein Feld in einem bestimmten Event verweisen, indem Sie dem Variablennamen in der Logik den eindeutigen Eventnamen in eckigen Klammern voranstellen."
;; dataqueries_22 is concatenated after a link to the Special Functions page in DataQuality/index.php.
dataqueries_22 = "Seite. Wenn für dieses Projekt Zugriffsgruppen vorhanden sind, werden Diskrepanzen außerdem nach ihrer Gruppe stratifiziert (vorausgesetzt, der Benutzer, der diese Seite anzeigt, gehört keiner Gruppe an). Jeder Benutzer innerhalb einer Zugriffsgruppe kann nur die Diskrepanzen seiner eigenen Gruppe sehen. Wenn Benutzer außerdem keine Benutzerrechte zum Anzeigen oder Bearbeiten von Daten auf bestimmten Eingabeformularen haben, können sie Daten aus diesen Formularen nicht sehen, wenn diese in Ergebnissen auf dieser Seite als Datenqualitätsdiskrepanz angezeigt werden."
