survey_815 = "Teilnehmende per Sprachanruf oder SMS einladen"
survey_816 = "Sie können Teilnehmende einladen, die öffentliche Umfrage per Sprachanruf oder SMS abzuschließen. Wenn Sie sie *jetzt sofort* direkt einladen möchten, klicken Sie auf die Schaltfläche unten, um ein Pop-up zum Eingeben von Telefonnummern zu öffnen, die angerufen oder per SMS-Textnachricht kontaktiert werden sollen."
