data_import_tool_309 = "Sie können die Daten sofort in Echtzeit importieren oder alternativ über einen asynchronen Hintergrundprozess importieren. Der Hintergrundprozess ist für große Datendateien besser geeignet, kann aber insgesamt länger für den Import brauchen. Der Hintergrundprozess sendet Ihnen eine E-Mail, nachdem Ihre Daten vollständig importiert wurden. Wenn während des Hintergrundimports Fehler auftreten, können Sie alle Fehler anzeigen und die nicht importierten Daten erneut herunterladen. So können Sie die Daten korrigieren und den Import erneut versuchen."
