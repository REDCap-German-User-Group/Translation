survey_791 = "Umfrageeinladung an Teilnehmende senden"
survey_792 = "Einladungen senden"
survey_794 = "Sie können Telefonnummern zum Senden von Einladungen an Ihre Umfrageteilnehmenden erfassen, indem Sie ein Feld in Ihrem Projekt festlegen. Dies kann zusätzlich (oder alternativ) zum direkten Eingeben von Telefonnummern in die Teilnehmerliste erfolgen. Wenn ein Teilnehmer keine Telefonnummer hat, die zur Teilnehmerliste hinzugefügt wurde, wird der Wert dieses Felds beim Senden von Umfrageeinladungen per SMS oder als Sprachanruf verwendet."
survey_795 = "Sind Sie sicher, dass Sie ALLE Teilnehmenden aus der untenstehenden Liste entfernen möchten, <b>die noch nicht mit der Umfrage begonnen haben?</b> Wenn jemand aus der Liste die Umfrage bereits abgeschlossen hat (teilweise oder vollständig), wird diese Person NICHT aus der Teilnehmerliste gelöscht. HINWEIS: Das erneute Hinzufügen bestehender Teilnehmender nach dem Löschen erstellt nur eine neue Instanz des Teilnehmers und verbindet die neue Instanz nicht wieder mit ihrer alten Antwort."
survey_796 = "Dieser Vorgang ist irreversibel. Alle aufgeführten Teilnehmenden werden dauerhaft gelöscht, mit Ausnahme derjenigen, die die Umfrage bereits abgeschlossen haben (teilweise oder vollständig)."
survey_797 = "TEILNEHMENDE ENTFERNT!"
survey_798 = "Die Teilnehmenden wurden nun entfernt."
