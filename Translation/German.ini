mycap_mobile_app_453 = "Baseline-Datum-Einstellungen"
mycap_mobile_app_454 = "Baseline-Datum verwenden?"
mycap_mobile_app_455 = "Eine Aufgabe kann relativ zu einem Installationsdatum oder Baseline-Datum geplant werden<br><b>Installationsdatum:</b> Das Datum, an dem ein Teilnehmer den QR-Code scannt oder einen Hyperlink verwendet, um Ihr Projekt zu laden. Wird automatisch von MyCap erfasst. Das Installationsdatum ist Tag 0 in einem Zeitplan.<br><b>Baseline-Datum:</b> Einige Projekte planen Aufgaben relativ zu einem Baseline-Datum. In einem Physiotherapieprojekt könnte das Baseline-Datum beispielsweise das Datum angeben, an dem der Teilnehmer mit der Physiotherapie begonnen hat. Ein Teilnehmer kann MyCap am 2017-01-01 installieren, aber erst am 2017-01-20 mit der Therapie beginnen. Wenn eine tägliche Tagebuchaufgabe nach dem 2017-01-20 erscheinen soll, aktivieren Sie die Einstellung <b>Baseline-Datum verwenden?</b>."
mycap_mobile_app_456 = "MyCap-Aufgaben können relativ zu einem Installationsdatum oder Baseline-Datum geplant werden. Wenn Aufgaben auf Grundlage eines Baseline-Datums ausgelöst werden sollen, aktivieren Sie unten Baseline-Datum verwenden."
