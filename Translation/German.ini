design_884 = "Findet einen Textwert innerhalb eines anderen"
design_885 = "Findet einen Textwert innerhalb eines anderen. Groß-/Kleinschreibung wird ignoriert. Die \"needle\" kann ein oder mehrere Zeichen lang sein. Zum Beispiel würde find('y', [last_name']) '3' zurückgeben, wenn der Wert von [last_name] 'Taylor' ist. Der Wert '0' wird zurückgegeben, wenn \"needle\" nicht in \"haystack\" gefunden wird."
design_886 = "Gibt Zeichen aus einer Zeichenkette ab einer Position zurück"
design_887 = "Gibt eine bestimmte Anzahl von Zeichen aus einer Zeichenkette zurück, beginnend an der von Ihnen angegebenen Position. Der zweite Parameter gibt die Startposition an, wobei der Anfang des Textwertes '1' wäre. Der dritte Parameter gibt an, wie viele Zeichen zurückgegeben werden sollen. Zum Beispiel würde mid([last_name], 2, 3) 'AYL' zurückgeben, wenn der Wert von [last_name] 'TAYLOR' ist."
design_888 = "Kombiniert den Text aus mehreren Zeichenketten"
design_889 = "Kombiniert/konkateniert den Text aus mehreren Zeichenketten zu einem einzelnen Textwert. Zum Beispiel würde concat([first_name], ' ', [last_name]) etwas wie 'Rob Taylor' zurückgeben. Jedes Element innerhalb der Funktion muss durch Kommas getrennt werden. Jedes Element kann statischer Text sein (in einfachen oder doppelten Anführungszeichen), eine Feldvariable oder eine Smart Variable."
design_890 = "Wandelt Text in Großbuchstaben um"
design_891 = "Wandelt Text in Großbuchstaben um. Zum Beispiel gibt upper('John Doe') 'JOHN DOE' zurück."
design_892 = "Wandelt Text in Kleinbuchstaben um"
design_893 = "Wandelt Text in Kleinbuchstaben um. Zum Beispiel gibt lower('John Doe') 'john doe' zurück."
design_894 = "Entfernt Leerzeichen am Anfang und Ende von Text"
design_895 = "Entfernt Leerzeichen sowohl am Anfang als auch am Ende eines Textwertes. Zum Beispiel gibt trim(' Sentence with spaces on end. ') 'Sentence with spaces on end.' zurück."
