system_config_330 = "Die REDCap Mobile App ist eine App, die auf ein Tablet oder Mobilgerät heruntergeladen werden kann, um REDCap-Daten lokal auf diesem Gerät zu erfassen, ohne dass eine Internetverbindung erforderlich ist (weder WLAN noch Mobilfunksignal). Wenn ein Benutzer die App herunterlädt, muss ihm ausdrücklich Mobile-App-Rechte in einem bestimmten REDCap-Projekt erteilt werden, um das Projekt in der App einzurichten. Nachdem ein Projekt in der App eingerichtet wurde, können Daten offline erfasst und später zurück zum REDCap-Server synchronisiert werden."
