design_629 = "Erlaubt einem Textfeld, den Breitengrad des Benutzers zu erfassen, wobei der Benutzer auf der Webseite aufgefordert wird, dies zu erlauben oder abzulehnen. Sobald der Wert erfasst wurde, wird er bei späteren Seitenbesuchen nicht geändert. Das Feld wird deaktiviert und erlaubt Benutzern nicht, den Wert zu bearbeiten, aber es erlaubt ihnen, den Wert vollständig zu entfernen. HINWEIS: Während der GPS-Wert bei Erfassung auf einem Mobilgerät sehr genau ist, ist er bei Verwendung eines Browsers auf Laptops und Desktop-Computern nicht annähernd so genau."
design_630 = "Erlaubt einem Textfeld, den Längengrad des Benutzers zu erfassen, wobei der Benutzer auf der Webseite aufgefordert wird, dies zu erlauben oder abzulehnen. Sobald der Wert erfasst wurde, wird er bei späteren Seitenbesuchen nicht geändert. Das Feld wird deaktiviert und erlaubt Benutzern nicht, den Wert zu bearbeiten, aber es erlaubt ihnen, den Wert vollständig zu entfernen. HINWEIS: Während der GPS-Wert bei Erfassung auf einem Mobilgerät sehr genau ist, ist er bei Verwendung eines Browsers auf Laptops und Desktop-Computern nicht annähernd so genau."
