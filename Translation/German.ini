survey_345 = "Teilnehmende Umfrageeinladungen, die bereits zum Versand geplant sind. Diese Teilnehmenden erhalten ihre Umfrageeinladungen zum neu angegebenen Zeitpunkt neu geplant. Wenn Sie diese nicht neu planen, sondern die aktuell geplante Zeit beibehalten möchten, klicken Sie unten auf Abbrechen und entfernen Sie deren Auswahl in der Liste."
