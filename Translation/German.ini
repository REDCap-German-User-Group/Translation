control_center_4507 = "Neues Super API Token für Benutzer erstellen"
control_center_4508 = "Das Erstellen eines Super API Token für diesen Benutzer erlaubt ihm, neue REDCap-Projekte über die API zu erstellen, ohne dass eine Genehmigung durch einen REDCap-Administrator erforderlich ist. Außerdem erhält er nach dem Erstellen eines neuen Projekts mit einem Super API Token sein neues projektweites API-Token für das Projekt, ebenfalls ohne erforderliche Genehmigung durch einen Administrator. Es wird allgemein empfohlen, Super API Tokens nur den vertrauenswürdigsten Benutzern zu gewähren. Möchten Sie wirklich ein Super API Token für diesen Benutzer erstellen?"
