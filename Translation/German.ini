rights_211 = "Rolle kopieren"
rights_212 = "Sind Sie sicher, dass Sie diese Rolle KOPIEREN möchten? Dadurch werden alle Berechtigungen dieser Rolle in eine neue Rolle kopiert. Geben Sie unten den Namen der neuen Rolle ein und klicken Sie auf den Button Rolle kopieren."
rights_213 = "Neuer Rollenname:"
;; rights_214 is used as a JavaScript dialog title with rights_215.
rights_214 = "Benutzerberechtigungen bleiben unverändert"
rights_215 = "Bitte beachten Sie: Da Sie den Benutzer aus einer Rolle entfernt haben, behält dieser Benutzer genau dieselben Benutzerberechtigungen, die er zuvor innerhalb der Rolle hatte."
rights_216 = "Diese Seite kann verwendet werden, um Benutzern Zugriff auf dieses Projekt zu gewähren und die Benutzerberechtigungen dieser Benutzer zu verwalten. Sie können auch Rollen erstellen, denen Sie Benutzer zuweisen können (optional). Benutzerrollen sind nützlich, wenn mehrere Benutzer dieselben Berechtigungen haben sollen, da Sie damit viele Benutzer deutlich schneller einer Rolle hinzufügen können, als ihre Benutzerberechtigungen einzeln festzulegen. Rollen sind außerdem eine gute Möglichkeit, Benutzer innerhalb eines Projekts zu kategorisieren. Im untenstehenden Feld können Sie Benutzer hinzufügen/zuweisen oder neue Rollen erstellen. Die Tabelle unten ermöglicht Änderungen an vorhandenen Benutzern oder Rollen im Projekt und zeigt außerdem einen Überblick über deren Benutzerberechtigungen."
rights_217 = "Aus Rolle entfernen oder anderer Rolle zuweisen"
rights_218 = "(z. B. Projektmanager, Dateneingabeperson)"
rights_219 = "Der Grund, warum Sie nicht auf diese Seite zugreifen können, *kann* sein, dass Sie ein Benutzer der doppelten Dateneingabe sind. Da das Modul Doppelte Dateneingabe verhindert, dass DDE-Benutzer Nr. 1 und Nr. 2 die Daten der jeweils anderen Person sehen, sind viele Module in REDCap, die Daten aus vielen Datensätzen gleichzeitig anzeigen, für Benutzer der doppelten Dateneingabe gesperrt (obwohl solche Seiten von einem Prüfer-Benutzer im Projekt aufgerufen werden können)."
rights_220 = "* Die API-Rechte des Benutzers können nicht geändert werden, da der Benutzer einer Rolle zugewiesen ist."
rights_222 = "[Keine Benutzer aus Ihrer Gruppe zugewiesen]"
rights_223 = "Rolle kann nicht bearbeitet werden"
rights_224 = "Sie dürfen diese Benutzerrolle nicht bearbeiten, weil ihr Benutzer aus *anderen* Zugriffsgruppen UND/ODER Benutzer, die *keiner* Zugriffsgruppe angehören, zugewiesen sind. Sie dürfen zwar Rollen bearbeiten, die nur Benutzer aus *Ihrer* Zugriffsgruppe enthalten, aber keine Rollen, die Benutzer aus anderen Zugriffsgruppen oder Benutzer ohne Zugriffsgruppe enthalten."
rights_226 = "User Access Dashboard"
rights_227 = "Ablaufen lassen"
rights_228 = "Das User Access Dashboard ist ein Reporting-Tool, das Sie bei der Verwaltung von Benutzern unterstützt, denen Zugriff auf Ihre REDCap-Projekte gewährt wurde. Wenn Sie dieses Dashboard anzeigen können, haben Sie Rechte für die Anwendung Benutzerrechte in mindestens einem Projekt. Unten finden Sie eine Zusammenfassung aller Projekte, in denen Sie anderen Benutzern Zugriff gewähren oder deren Benutzerberechtigungen bearbeiten können. Die Liste kann nach Projektstatus und Projektzweck gefiltert werden. Bitte prüfen Sie die Tabelle regelmäßig, um sicherzustellen, dass jede aufgeführte Person weiterhin Zugriff auf jedes Projekt benötigt. Wenn ein Benutzer keinen Zugriff mehr auf ein bestimmtes Projekt haben soll, können Sie den Radiobutton auswählen, um diese Person aus dem Projekt zu löschen oder den Zugriff dieser Person auf das Projekt ablaufen zu lassen (Standard: gestriges Datum). Sie müssen auf den Button am unteren Rand der Seite klicken, um Änderungen umzusetzen. Änderungen werden dann sofort wirksam. Wenn Sie möchten, können diese Aktualisierungen weiterhin wie bisher innerhalb einzelner Projekte vorgenommen werden, aber das Tool hilft dabei, den Vorgang zu vereinfachen."
rights_229 = "Benutzer mit API-Token"
rights_230 = "Letzter Zugriff des Benutzers auf das Projekt"
