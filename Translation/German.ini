design_1362 = "<b>WICHTIGE INFORMATION ZU BENUTZERRECHTEN:</b> Beachten Sie, dass Benutzerrechte beim Piping nicht angewendet werden. Selbst wenn ein Benutzer 'Kein Zugriff'-Datenansichtsrechte für das Instrument eines gepipten Feldes hat, kann jeder Benutzer die Daten des gepipten Feldes sehen, unabhängig davon, wohin das Feld gepipt wird. Auf diese Weise umgeht Piping im Grunde Datenansichtsrechte. Behalten Sie dies beim Entwerfen Ihres Projekts im Blick."
