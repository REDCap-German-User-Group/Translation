mobile_app_24 = "Unten wird ein Protokoll aller mit der Mobile App verbundenen Aktivitäten für alle Geräte angezeigt. Beispiele sind das Einrichten eines Projekts in der Mobile App oder das Herunterladen von Daten aus REDCap in die App."
