control_center_174 = "HINWEIS: Authentifizierung ist nicht aktiviert!"
control_center_175 = "Bitte beachten Sie, dass die Authentifizierung für diese REDCap-Installation noch nicht aktiviert wurde. Das bedeutet, dass beim Zugriff auf REDCap kein Anmeldebildschirm angezeigt wird und alle Benutzer den Standardbenutzernamen 'site_admin' erhalten. Sie können die Authentifizierungsmethode auf der Seite Sicherheit & Authentifizierung festlegen. Zuvor möchten Sie jedoch möglicherweise auf der REDCap-Community-Website eine Übersicht über alle Schritte lesen, die beim Ändern Ihrer Authentifizierungsmethode für REDCap erforderlich sind (siehe Link unten)."
