cdp_instant_adjudication_process_confirmation = "REDCap berechnet zuerst die aktuelle ausstehende Anzahl für die Datensätze auf dieser Dashboard-Seite und verarbeitet danach die verifizierten Felder. Die Anzahl kann von der beim Laden der Seite angezeigten zuletzt berechneten Anzahl abweichen. Vorhandene Daten können basierend auf der in Ihrer Mapping-Konfiguration definierten Preselect-Strategie überschrieben werden."
