control_center_4696 = "Changelog anzeigen"
control_center_4697 = "<b>Option 2 (empfohlen):</b> Erstellen Sie einen neuen MySQL-Benutzer mit höheren Rechten, der nur für REDCap-Upgrades verwendet wird. Unten finden Sie ein Beispiel, das Sie unverändert in MySQL verwenden und ausführen können. Alternativ können Sie den unten fett dargestellten Benutzernamen und/oder das Passwort durch einen Benutzernamen/ein Passwort Ihrer Wahl ersetzen. <b>HINWEIS:</b> Dieser neue MySQL-Benutzer *MUSS* alle exakt gleichen Parameter wie der aktuelle MySQL-Benutzer verwenden (d. h. die Verbindungswerte, die in der REDCap-Datei database.php aufgeführt sind), mit Ausnahme von Benutzername und Passwort."
