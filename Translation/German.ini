extres_37 = "Unten sind alle REDCap-Projekte im Produktions- oder Entwicklungsstatus aufgeführt, auf die Sie derzeit Zugriff haben. Wählen Sie ein Projekt aus, für das Sie einen Link erstellen möchten."
extres_38 = "Ihre REDCap-Projekte:"
extres_39 = "Projekt auswählen"
extres_40 = "So wird die Identität des REDCap-Benutzers über einen erweiterten Link verifiziert"
extres_41 = "Wenn ein Benutzer auf einen erweiterten Link klickt, handelt es sich nicht um einen typischen HTML-Weblink, sondern tatsächlich um ein HTML-Webformular, das mit der POST-Methode eine HTTP-POST-Anfrage an die externe Zielwebsite sendet. Beim Klicken auf den Link übermittelt die POST-Anfrage ein einzelnes Feld namens 'authkey' an die externe Website. Der authkey ist eine nicht entzifferbare, verschlüsselte Textzeichenfolge, die von der externen Website anschließend zur Identifizierung des Benutzers anhand der untenstehenden Schritte verwendet wird."
extres_42 = "Erforderliche Schritte für Programmierer/Entwickler:"
;; extres_43 is concatenated with the dynamic REDCap API URL, string period, and string extres_50.
extres_43 = "Die externe Website muss den authkey dann über eine POST-Anfrage an die REDCap-API unter der unten angegebenen URL zurück an REDCap senden. Dadurch kann REDCap auswerten, wer der Benutzer ist und ob seine Sitzung in REDCap noch aktiv ist. In der API-Anfrage an REDCap müssen nur zwei POST-Parameter gesendet werden: <b>'authkey'</b> und <b>'format'</b>. Der Parameter 'authkey' ist der Wert des ursprünglich von REDCap erhaltenen authkey. Der Parameter 'format' erlaubt Ihnen, das Format der Antwortdaten anzugeben, die von der API-Anfrage zurückgegeben werden: 'csv' (Standard), 'json' oder 'xml'. Diese API-Anfrage muss an genau diese URL gesendet werden: "
extres_44 = "Der authkey von REDCap wird von der externen Website unmittelbar nachdem der Benutzer im linken Projektmenü auf den externen Link klickt per HTTP-POST-Anfrage empfangen."
extres_45 = "Nach dem Senden der API-Anfrage an REDCap gibt REDCap die folgenden Informationen im angegebenen Format zurück: <b>'username'</b> (Benutzername des Benutzers, der auf den Link geklickt hat), <b>'project_id'</b> (ID-Nummer des REDCap-Projekts, aus dem der Benutzer kommt), <b>'data_access_group_name'</b> (Name der Zugriffsgruppe, in der der Benutzer ist, falls in einer Gruppe), <b>'data_access_group_id'</b> (ID-Nummer der Zugriffsgruppe, in der der Benutzer ist, falls in einer Gruppe), und <b>'callback_url'</b> (URL des REDCap-Projekts, aus dem der Benutzer kam). Wenn die API-Anfrage nicht korrekt formatiert ist oder die Sitzung des Benutzers in REDCap nicht mehr aktiv ist, gibt REDCap eine fehlgeschlagene Antwort von '0' zurück."
extres_46 = "Die aus der API-Antwort zurückgegebenen Werte (z. B. Benutzername) können von der externen Website anschließend für verschiedene Zwecke verwendet werden, z. B. zur Verifizierung der Identität des Benutzers, um bestimmte Benutzerberechtigungen auf der externen Website umzusetzen. Dies muss vollständig dynamisch von der externen Website verarbeitet werden und setzt daher voraus, dass der Entwickler der Website sie so gestaltet hat, dass sie entsprechend den vom Entwicklerskript vorgegebenen Schritten auf Basis der aus der API-Antwort erhaltenen Werte handelt. Sobald die Website die API-Antwort mit allen Benutzer- und Projektinformationen erfolgreich erhält, kann sie mit diesen Informationen für beliebige Zwecke weiterarbeiten."
extres_47 = "Zusätzliche Informationen für Programmierer/Entwickler:"
;; extres_48 is concatenated with string extres_50 in an informational bullet.
extres_48 = "Die REDCap-API ist sprachunabhängig. Es spielt daher keine Rolle, in welcher Programmiersprache die externe Website geschrieben wurde, wenn die API-Anfrage gestellt wird. Erforderlich ist nur, dass die POST-Anfrage an die API korrekt formatiert ist."
extres_49 = "Wenn einer der oben aufgeführten Schritte abschreckend wirkt oder für Sie wenig Sinn ergibt, ist die Nutzung der Option Erweiterter Link möglicherweise keine praktikable Option für Sie. Wenn Sie sie dennoch implementieren möchten, sollten Sie eventuell erwägen, einen Webentwickler zu beauftragen, der das Skript für die externe Website schreiben kann, um die obenstehenden Schritte zur Nutzung der Option Erweiterter Link umzusetzen."
extres_50 = "(HINWEIS: Diese API-Anfrage erfordert NICHT die Verwendung eines API-Tokens, das normalerweise für die meisten API-Anfragen erforderlich ist.)"
extres_51 = "Sie können außerdem erweiterte Funktionen nutzen, wenn Sie die Option Erweiterter Link verwenden. Diese sendet zusätzliche Informationen (z. B. Benutzer- und Projektinformationen) von REDCap an die Zielwebsite, um die Identität des REDCap-Benutzers auf dieser externen Website zu verifizieren."
extres_52 = "Ausgewählte DAGs"
extres_53 = "Zugriffsgruppen auswählen, die diesen Link anzeigen können:"
extres_54 = "Benutzerdefinierte Anwendungslinks für Projekte"
extres_55 = "Benutzerdefinierte Anwendungslinks"
extres_56 = "Dieses Modul erlaubt Ihnen, benutzerdefinierte Links (ähnlich Projekt-Lesezeichen) einzurichten, die <b>unten in der Anwendungsliste im linken Menü JEDES Projekts erscheinen</b> (siehe Beispiel-Screenshot rechts). Diese Links verweisen auf Websites außerhalb von REDCap (d. h. auf einem anderen Server im Web) sowie auf andere REDCap-Projekte. Sie können verschiedene Einstellungen für jeden Link festlegen, z. B. das Label, wie es im linken Menü erscheint, und ob der Link ein neues Fenster/einen neuen Tab in Ihrem Webbrowser öffnet. <b>Standardmäßig erscheinen diese benutzerdefinierten Anwendungslinks für ALLE Benutzer in ALLEN Projekten.</b> Sie können sie jedoch so einstellen, dass sie nur für bestimmte Benutzer angezeigt werden, und Sie können sie außerdem aus einigen Projekten ausschließen, sodass sie für diese Projekte nicht erscheinen."
;; extres_58 is concatenated after string extres_17 and a link using string extres_69.
extres_58 = "unten auf dieser Seite. Sie müssen lediglich ein Label und eine Webadresse (URL) angeben. Wenn Sie den Benutzer nur zur Zielwebsite führen möchten, sollte die Option Einfacher Link ausreichen. Sie können Links zu bestehenden REDCap-Projekten erstellen, indem Sie den Linktyp REDCap-Projekt auswählen. Dadurch wird eine Liste aller Projekte angezeigt, aus der Sie eines auswählen können, um den Link dorthin zu erstellen."
extres_59 = "Alle REDCap-Projekte:"
extres_60 = "Unten sind alle REDCap-Projekte im Produktions- oder Entwicklungsstatus für ALLE Benutzer aufgeführt. Wählen Sie ein oder mehrere Projekte aus, für die dieser externe Link NICHT angezeigt werden soll. Für ALLE unten nicht markierten Projekte wird dieser externe Link in der Anwendungsliste im linken Menü des jeweiligen Projekts erscheinen."
extres_61 = "Ausgeschlossene Projekte"
extres_62 = "Projekte von der Verwendung dieses externen Links ausschließen"
;; extres_63 is concatenated with a dynamic external link label and string extres_64.
extres_63 = "Für die unten ausgewählten Projekte den externen Link NICHT anzeigen "
;; extres_64 is concatenated after string extres_63 and a dynamic external link label.
extres_64 = "im Anwendungsmenü des Projekts."
extres_65 = "Projekt-ID an URL anhängen"
extres_66 = "Die Option, die Projekt-ID eines REDCap-Projekts automatisch an die URL des Links anzuhängen, kann in bestimmten Fällen nützlich sein. Die Projekt-ID befindet sich im Query String der URL als numerischer 'pid'-Wert für jedes REDCap-Projekt, während auf dieses Projekt zugegriffen wird. Die Projekt-ID ist die Art, wie REDCap ein Projekt von einem anderen unterscheidet. Daher könnte sie von externen Webseiten auf dieselbe Weise verwendet werden, um das Projekt zu unterscheiden, aus dem ein Benutzer kommt, damit mehrere REDCap-Projekte individuell über dieselbe Webseite bedient werden können. Folgendes wird zum Query String der URL hinzugefügt:"
;; extres_67 is concatenated with a sample URL and string extres_68.
extres_67 = "Wenn die definierte URL zum Beispiel lautet"
;; extres_68 is concatenated after string extres_67 and a sample URL.
extres_68 = ", dann wäre die resultierende URL nach dem Anhängen des Werts die folgende:"
extres_69 = "neues Lesezeichen hinzufügen"
extres_70 = "Diese Option ist nützlich für fortgeschrittene Benutzer, die zusätzliche Informationen an die Zielwebsite des Lesezeichens weitergeben möchten (höchstwahrscheinlich, weil sie diese bestimmte Website verwalten/entwickeln und die übergebenen Informationen auf bestimmte Weise verwenden möchten). Wenn diese Option für einen bestimmten Lesezeichenlink aktiviert ist, werden bestimmte Informationen an die bereits angegebene Link-URL angehängt, wenn der Link im linken Menü angeklickt wird, während der Benutzer gerade einen Datensatz in einem Datenerhebungsinstrument anzeigt. Die angehängten Informationen sind spezifisch für den in diesem Moment angezeigten Datensatz und erlauben daher, diese Datensatzinformationen an die Zielwebsite weiterzugeben. Wenn der Benutzer auf den Lesezeichenlink klickt und sich NICHT auf einem Datenerhebungsformular befindet, wird der URL nichts angehängt. Ein gutes Anwendungsbeispiel für diese Funktion ist, wenn jemand eine Website entwickelt hat, die Reports für Datensätze anzeigen kann und daher den Report für einen einzelnen Datensatz anzeigen kann, wenn der Datensatzname explizit angegeben wird (d. h. über den URL-Query-String)."
extres_71 = "BEISPIEL: Unten wird angezeigt, wie die benutzerdefinierten Anwendungslinks im Menü eines Projekts erscheinen würden."
extres_72 = "Die REDCap-Projekte von *allen* Benutzern in diesem Projekt:"
extres_73 = "Hinweis: Da Sie Administrator sind, können Sie ein Projekt auswählen, das zu einem beliebigen Benutzer in diesem Projekt gehört, während Benutzer normalerweise nur ihre eigenen Projekte anzeigen können."
extres_74 = "Feldvariablen und Smart Variables können innerhalb der URL eines Projekt-Lesezeichens unten gepiped werden. Während viele Smart Variables erfolgreich außerhalb eines Datensatzkontexts gepiped werden können (z. B. [redcap-base-url]), können alle Feldvariablen und einige Smart Variables (z. B. [record-name], [previous-event-name]) nur dann in die URL gepiped werden, wenn sich der Benutzer in einem Datensatzkontext befindet, z. B. beim Anzeigen der Record Home Page oder eines Eingabeformulars."

