dataqueries_165 = "Der Data Resolution Workflow kann nicht geöffnet werden, weil der Datensatz noch nicht existiert. Er muss zuerst gespeichert werden. Sie können unten auf den Speichern-Button klicken; dadurch werden alle Werte auf dem aktuellen Formular gespeichert und anschließend automatisch das Data-Resolution-Workflow-Pop-up geöffnet."
dataqueries_166 = "Das Feldkommentar-Log kann nicht geöffnet werden, weil der Datensatz noch nicht existiert. Er muss zuerst gespeichert werden. Sie können unten auf den Speichern-Button klicken; dadurch werden alle Werte auf dem aktuellen Formular gespeichert und anschließend automatisch das Feldkommentar-Log-Pop-up geöffnet."
dataqueries_167 = "Datensatz muss gespeichert werden, bevor der Data Resolution Workflow geöffnet wird"
dataqueries_168 = "Datensatz muss gespeichert werden, bevor das Feldkommentar-Log geöffnet wird"
dataqueries_169 = "Datenqualitätsregel:"
dataqueries_170 = "Diese Seite zeigt verschiedene Statistiken und Kennzahlen zu allen Datenabfragen an, die derzeit ungelöst sind oder bereits über den Data Resolution Workflow in diesem Projekt gelöst wurden. Die 'durchschnittliche Zeit bis zur Antwort auf eine Abfrage' bezieht sich auf die Zeitspanne zwischen dem Öffnen einer Abfrage und dem Zeitpunkt, zu dem ein Benutzer erstmals darauf geantwortet hat (umfasst offene und geschlossene Abfragen). Die 'durchschnittliche Zeit bis zur Lösung einer Abfrage' bezieht sich auf die Zeitspanne zwischen dem Öffnen einer Abfrage und dem Schließen der Abfrage (umfasst nur geschlossene Abfragen)."
dataqueries_171 = "Diese Seite zeigt alle Datenabfragen an, die derzeit ungelöst sind oder bereits mithilfe des Data Resolution Workflow gelöst wurden. Einige Probleme wurden möglicherweise von Benutzern in Datenerhebungsinstrumenten initiiert, andere nach Ausführung von Datenqualitätsregeln auf dem Tab Probleme finden. Die Tabelle listet den Namen des Datensatzes und das spezifische Feld oder die Datenqualitätsregel auf, zu der die Datenabfrage gehört, sowie den der Abfrage zugewiesenen Benutzer (falls zutreffend), die Anzahl der Tage, die die Datenabfrage geöffnet ist, und einen kurzen Ausschnitt des ersten und letzten Kommentars der Abfrage. Die Ergebnisse in der Tabelle können nach Abfragestatus (z. B. offen, geschlossen), nach bestimmten Feldern oder Datenqualitätsregeln sowie nach zugewiesenen Benutzern gefiltert werden. Jede Datenabfrage kann durch Klicken auf den Button links daneben angezeigt werden."
dataqueries_172 = "Diese Seite zeigt das Feldkommentar-Log für alle Datensätze/Events/Felder in diesem Projekt an. Sie können die untenstehenden Steuerelemente verwenden, um Stichwortsuchen in den Kommentaren durchzuführen und die Kommentare nach Datensatz, Event, Feld oder Zugriffsgruppe zu filtern. Beachten Sie, dass Kommentare für Felder auf Instrumenten nicht in der Tabelle angezeigt werden, wenn Sie keine Benutzerrechte zum Anzeigen bestimmter Datenerhebungsinstrumente haben. Wenn Sie außerdem einer Zugriffsgruppe angehören, sehen Sie nur Ergebnisse für Datensätze, die zu Ihrer Gruppe gehören. Das gesamte Feldkommentar-Log kann als Datei im Excel-/CSV-Format heruntergeladen werden."
