survey_269 = "Es scheint, dass Sie versuchen, Teilnehmerkennungen für einen oder mehrere Teilnehmende bereitzustellen. Dies ist jedoch nicht möglich, weil Kennungen nicht aktiviert sind. Bitte entfernen Sie die Kennungen für die unten aufgeführten E-Mails und reichen Sie Ihre Teilnehmerliste erneut ein."
