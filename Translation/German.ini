survey_1210 = "WARNUNG: Es scheint, dass für diese Umfrage die Option 'Vorherige-Seite-Schaltfläche ausblenden' ausgewählt ist, was mit dem e-Consent Framework kollidieren kann, weil dadurch verhindert wird, dass ein Teilnehmer während des e-Consent-Prozesses zu einer vorherigen Seite der Umfrage zurückkehrt, um falsche Informationen zu korrigieren. Es wird DRINGEND empfohlen, die Option 'Vorherige-Seite-Schaltfläche ausblenden' auf dieser Seite zu deaktivieren, wenn Sie die e-Consent-Framework-Funktionalität verwenden möchten."
survey_1211 = "Am wichtigsten ist, dass dringend empfohlen wird, mit Ihrem lokalen Institutional Review Board (IRB) zu sprechen, wenn Sie e-Consent in REDCap durchführen möchten."
