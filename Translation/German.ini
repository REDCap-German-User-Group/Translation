design_837 = "Wertet Logik aus, die in einer @CALCTEXT()-Funktion für Textfelder *nur* angegeben wird, und gibt das Ergebnis als Text aus, typischerweise mit einer if(x,y,z)-Funktion - z. B. @CALCTEXT(if([sex]='1', 'male', 'female')). HINWEIS: Es ist wichtig zu verstehen, dass ein Feld mit @CALCTEXT auf der Fragebogenseite oder im Eingabeformular nicht bearbeitbar ist und fast genau wie ein normales berechnetes Feld funktioniert. Sein Wert kann über einen Datenimport, beim Ausführen von Datenqualitätsregel H oder in Echtzeit während der normalen Dateneingabe in einem Formular oder Fragebogen aktualisiert werden. Falls gewünscht, kann der Wert als Zahl zurückgegeben werden - z. B. @CALCTEXT(if([age] >= 18, 'adult', 5*[other_field])). Außerdem ist es zwar möglich, statischen Text (in Anführungszeichen), Feldvariablen oder Smart Variables als Rückgabewerte der IF-Funktion zu verwenden - z. B. @CALCTEXT(if([age] >= 18, [dob], [event-label]) -, aber es ist NICHT möglich, Feldvariablen oder Smart Variables <u>innerhalb von Anführungszeichen</u> für die Rückgabewerte zu pipen."
design_839 = "Spezialfunktionen"
design_840 = "Liste der Funktionen, die in Branching Logic, Berechnungen, Report-Filtern, Datenqualitätsmodul, automatischen Fragebogeneinladungen usw. verwendet werden können."
design_841 = "REDCap-Logik kann an vielen Stellen verwendet werden, z. B. in Branching Logic, Berechnungen, Report-Filtern, Datenqualitätsmodul, automatischen Fragebogeneinladungen und mehr. Spezialfunktionen können bei Bedarf in der Logik verwendet werden. Unten ist eine vollständige Liste ALLER verfügbaren Funktionen aufgeführt."
design_842 = "BEDINGUNG, WERT wenn Bedingung WAHR ist, WERT wenn Bedingung FALSCH ist"
design_843 = "If/Then/Else-bedingte Logik"
design_844 = "Gibt einen Wert basierend auf einer Bedingung zurück. Wenn BEDINGUNG als wahre Aussage ausgewertet wird, gibt sie den ersten WERT zurück; wenn sie falsch ist, den zweiten WERT. Z. B. gibt if([weight] > 100, 44, 11) den Wert 44 zurück, wenn \"weight\" größer als 100 ist, andernfalls 11."
design_845 = "Funktion"
design_846 = "Name/Typ der Funktion"
design_847 = "Hinweise / Beispiele"
design_848 = "Berechnet die Differenz zwischen zwei Datums- oder Datetime-Werten. Optionen für 'units': 'y' (Jahre, 1 Jahr = 365.2425 Tage), 'M' (Monate, 1 Monat = 30.44 Tage), 'd' (Tage), 'h' (Stunden), 'm' (Minuten), 's' (Sekunden). Der Parameter 'returnSignedValue' muss entweder <i>true</i> oder <i>false</i> sein und gibt an, ob das zurückgegebene Ergebnis vorzeichenbehaftet sein soll (Minuszeichen davor, wenn negativ) oder ohne Vorzeichen (Absolutwert). Der Standardwert ist <i>false</i>, wodurch der Absolutwert der Differenz zurückgegeben wird. Wenn beispielsweise [date1] größer als [date2] ist, ist das Ergebnis negativ, wenn returnSignedValue auf <i>true</i> gesetzt ist. Wenn returnSignedValue nicht gesetzt oder auf <i>false</i> gesetzt ist, ist das Ergebnis IMMER eine positive Zahl. Wenn returnSignedValue auf <i>false</i> gesetzt oder nicht gesetzt ist, spielt die Reihenfolge der Datumswerte in der Gleichung keine Rolle, da der Ergebniswert immer positiv ist (auch wenn das Pluszeichen nicht angezeigt, sondern impliziert wird)."
design_849 = "Wenn der Parameter \"decimal places\" nicht angegeben wird, ist der Standardwert 0. Z. B. zum Runden von 14.384 auf eine Dezimalstelle: round(14.384,1) ergibt 14.4"
design_850 = "Wenn der Parameter \"decimal places\" nicht angegeben wird, ist der Standardwert 0. Z. B. zum Aufrunden von 14.384 auf eine Dezimalstelle: roundup(14.384,1) ergibt 14.4"
design_851 = "Wenn der Parameter \"decimal places\" nicht angegeben wird, ist der Standardwert 0. Z. B. zum Abrunden von 14.384 auf eine Dezimalstelle: rounddown(14.384,1) ergibt 14.3"
design_852 = "Verwenden Sie das Caret-Zeichen ^ und setzen Sie sowohl die Zahl als auch ihren Exponenten in Klammern. HINWEIS: Die umgebenden Klammern sind SEHR wichtig, da es ohne sie nicht korrekt funktioniert. Zum Beispiel (4)^(3) oder ([weight]+43)^(2)"
design_853 = "Gibt den Absolutwert zurück (d. h. den Betrag einer reellen Zahl ohne Berücksichtigung ihres Vorzeichens). Z. B. gibt abs(-7.1) den Wert 7.1 zurück und abs(45) den Wert 45."
design_854 = "Gibt den Mindestwert eines Wertesatzes im Format min([num1],[num2],[num3],...) zurück. HINWEIS: Alle leeren Werte werden ignoriert, sodass nur der niedrigste numerische Wert zurückgegeben wird. Es gibt keine Begrenzung für die Anzahl der in dieser Funktion verwendeten Zahlen."
design_855 = "Gibt den Höchstwert eines Wertesatzes im Format max([num1],[num2],[num3],...) zurück. HINWEIS: Alle leeren Werte werden ignoriert, sodass nur der höchste numerische Wert zurückgegeben wird. Es gibt keine Begrenzung für die Anzahl der in dieser Funktion verwendeten Zahlen."
design_856 = "Gibt den Mittelwert (d. h. Durchschnitt) eines Wertesatzes im Format mean([num1],[num2],[num3],...) zurück. HINWEIS: Alle leeren Werte werden ignoriert, sodass nur der aus allen numerischen, nicht leeren Werten berechnete Mittelwert zurückgegeben wird. Es gibt keine Begrenzung für die Anzahl der in dieser Funktion verwendeten Zahlen."
design_857 = "Gibt den Medianwert eines Wertesatzes im Format median([num1],[num2],[num3],...) zurück. HINWEIS: Alle leeren Werte werden ignoriert, sodass nur der aus allen numerischen, nicht leeren Werten berechnete Medianwert zurückgegeben wird. Es gibt keine Begrenzung für die Anzahl der in dieser Funktion verwendeten Zahlen."
design_858 = "Gibt die Gesamtsumme eines Wertesatzes im Format sum([num1],[num2],[num3],...) zurück. HINWEIS: Alle leeren Werte werden ignoriert, sodass nur die aus allen numerischen, nicht leeren Werten berechnete Gesamtsumme zurückgegeben wird. Es gibt keine Begrenzung für die Anzahl der in dieser Funktion verwendeten Zahlen."
design_859 = "Gibt die Standardabweichung eines Wertesatzes im Format stdev([num1],[num2],[num3],...) zurück. HINWEIS: Alle leeren Werte werden ignoriert, sodass nur die aus allen numerischen, nicht leeren Werten berechnete Standardabweichung zurückgegeben wird. Es gibt keine Begrenzung für die Anzahl der in dieser Funktion verwendeten Zahlen."
design_860 = "Gibt den Logarithmus der angegebenen Zahl für eine bestimmte Basis zurück (z. B. Basis 10, Basis \"e\"). Wenn die Basis nicht angegeben oder nicht numerisch ist, wird standardmäßig Basis \"e\" verwendet (natürlicher Logarithmus)."
design_861 = "Ist der Wert eine Zahl?"
design_862 = "Gibt einen booleschen Wert (true oder false) dafür zurück, ob der Wert eine Ganzzahl ODER eine Fließkommazahl ist."
design_863 = "Ist der Wert eine Ganzzahl?"
design_864 = "Gibt einen booleschen Wert (true oder false) dafür zurück, ob der Wert eine Ganzzahl ist (ganze Zahl ohne Dezimalstellen)."
design_865 = "ENTHÄLT Text eine andere Zeichenkette?"
design_867 = "ENTHÄLT Text eine andere Zeichenkette NICHT?"
