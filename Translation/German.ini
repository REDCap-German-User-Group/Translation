check_128 = "<b>Verzeichnis, in dem von Benutzern hochgeladene Dokumente gespeichert werden, ist über das Web erreichbar:</b><br> Es wird DRINGEND empfohlen, den Speicherort zu ändern, an dem von Benutzern hochgeladene Dateien gespeichert werden. Derzeit werden sie im REDCap-Verzeichnis \"edocs\" gespeichert, dem Standardort, der vollständig über das Web zugänglich ist. Obwohl es äußerst unwahrscheinlich ist, dass jemand erfolgreich eine Datei von diesem Ort auf dem Server über das Web abrufen kann, ist dies dennoch ein potenzielles Sicherheitsrisiko, besonders wenn die Dokumente sensible Informationen enthalten.<br><br> Es wird empfohlen, im Control Center zur Seite Datei-Upload-Einstellungen zu gehen und einen neuen Pfad für Ihre von Benutzern hochgeladenen Dokumente festzulegen (d. h. \"Alternativen internen Speicher für hochgeladene Dateien anstelle des Standardordners 'edocs' aktivieren\") und ihn auf einen Pfad auf Ihrem Webserver zu setzen, der NICHT über das Web erreichbar ist. Nachdem Sie diesen Wert geändert haben, gehen Sie in das Verzeichnis 'edocs' und kopieren alle vorhandenen Dateien in diesem Ordner an den neuen Ort, den Sie gerade festgelegt haben."
