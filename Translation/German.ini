control_center_4656 = "Möchten Sie einen einfacheren REDCap-Upgrade-Prozess?"
control_center_4657 = "Erfahren, wie Easy Upgrade aktiviert wird"
control_center_4658 = "Es scheint, dass Ihr REDCap-Webserver keine ausgehenden HTTP-Anfragen an https://redcap.vumc.org stellen kann. Dies ist der Server, der die Liste neuer verfügbarer REDCap-Versionen generiert. Sie sollten mit Ihrem IT-/Serverpersonal sprechen, um sicherzustellen, dass dies möglich ist."
control_center_4659 = "Das 'redcap'-Webroot-Verzeichnis ("
control_center_4660 = ") auf dem REDCap-Webserver ist für die REDCap-Anwendung nicht beschreibbar. REDCap muss in diesem Webroot-Verzeichnis neue Verzeichnisse erstellen können. Bitte passen Sie die Berechtigungen dieses Verzeichnisses so an, dass die Anwendung (z. B. Apache, IIS) in dieses Verzeichnis schreiben kann."
control_center_4661 = "Die Easy-Upgrade-Funktion kann erst genutzt werden, wenn einige kleine Änderungen am REDCap-System vorgenommen wurden, damit die Funktion arbeiten kann. Bitte prüfen und beheben Sie die untenstehenden Probleme. Kehren Sie danach zu dieser Seite zurück (oder laden Sie sie neu), um weitere Anweisungen zu erhalten."
control_center_4662 = "Der MySQL-Benutzer, den REDCap für Datenbankverbindungen verwendet, verfügt nicht über ausreichende Benutzerrechte. Für die Nutzung von Easy Upgrade sind höhere Rechte (CREATE, DROP, ALTER, REFERENCES) erforderlich. Dafür gibt es zwei Lösungen."
control_center_4663 = "<b>Option 1:</b> Erhöhen Sie die Rechte Ihres bestehenden MySQL-Benutzers. Sie können dies tun, indem Sie einfach die SQL-Anweisung direkt unten ausführen."
