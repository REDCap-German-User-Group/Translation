random_01 = "Randomisierung ist ein Prozess, bei dem Teilnehmer/Probanden zufällig (statt nach Auswahl) bestimmten Gruppen zugewiesen werden, typischerweise in klinischer Forschung und klinischen Studien. Das Randomisierungsmodul in REDCap hilft Ihnen, ein definiertes Randomisierungsmodell innerhalb Ihres Projects umzusetzen, sodass Sie Ihre Probanden (d. h. Datensätze in Ihrem Project) randomisieren können. In diesem Modul definieren Sie zuerst das Randomisierungsmodell mit verschiedenen Parametern. Basierend auf den definierten Parametern erstellt das Modul eine Vorlage für eine Zuteilungstabelle, mit der Sie die Randomisierungstabelle strukturieren können, die Sie importieren werden. Das Modul überwacht außerdem den gesamten Zuteilungsfortschritt und die Zuweisung randomisierter Probanden."
