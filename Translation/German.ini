data_export_tool_191 = "Daten für alle Events für jeden zurückgegebenen Datensatz anzeigen"
data_export_tool_193 = "Was bewirkt diese Einstellung?"
data_export_tool_194 = "Wenn das Projekt beispielsweise ein Event zur Erfassung demografischer Informationen und außerdem nachfolgende Besuche (Events) zur Erfassung von Vitalparametern enthält, könnte man einen Filter [sex] = '1' (Female) setzen. Wenn die Checkbox-Einstellung AKTIVIERT bleibt (Standardeinstellung), würden nur Datensätze zurückgegeben, bei denen die Person weiblich war, und die Ergebnisse würden *alle* Events (Demografie und alle Besuche) für jeden dieser Datensätze enthalten. Wenn die Checkbox in dieser Situation jedoch DEAKTIVIERT wäre, würden nicht nur die Datensätze entfernt, bei denen die Person männlich war, sondern zusätzlich auch die Besuchs-Events für die weiblichen Datensätze, sodass nur das Demografie-Event für die weiblichen Datensätze zurückgegeben würde. Auf diese Weise filtert eine DEAKTIVIERTE Checkbox nicht nur einige Datensätze heraus, sondern kann auch einige Events in den zurückgegebenen Datensätzen entfernen."
data_export_tool_195 = "<b>ZUSAMMENFASSUNG:</b> In den meisten Fällen bleibt diese Checkbox-Einstellung AKTIVIERT, sofern Sie nicht sehr bestimmte Absichten haben, sie zu deaktivieren. Wenn Sie noch nicht ganz sicher sind, wie Sie diese Einstellung verwenden könnten, wird empfohlen, sie AKTIVIERT zu lassen."
data_export_tool_197 = "CDISC ODM (XML)"
data_export_tool_198 = "Sie können eine CDISC-ODM-Datei herunterladen, die die Daten im XML-Format enthält. Die XML-Datei kann in ein anderes System importiert werden, das CDISC ODM unterstützt, oder mit dem Data Import Tool oder der API-Methode Import Records in ein anderes REDCap-Projekt."
