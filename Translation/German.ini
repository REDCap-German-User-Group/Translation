ws_02 = "Daten werden abgerufen für"
ws_03 = "Daten abrufen"
ws_08 = "Ungültiger Quellwert!"
ws_13 = "Der erste Schritt beim Einrichten von Dynamic Data Pull (DDP) aus einem externen Quellsystem besteht darin, die Felder in Ihrem Project Feldern aus dem Quellsystem zuzuordnen. Sobald die Felder gemappt wurden, weiß REDCap, welche Daten aus dem Quellsystem importiert und wo sie im REDCap-Project gespeichert werden sollen."
ws_14 = "Vorhandener Wert"
ws_15 = "Niedrigster numerischer Wert"
ws_16 = "Höchster numerischer Wert"
ws_17 = "Frühester Wert (basierend auf Zeitstempel)"
ws_18 = "Neuester Wert (basierend auf Zeitstempel)"
ws_19 = "Setup / Mapping"
ws_20 = "Daten adjudizieren"
;; ws_21 is concatenated with a source-system name and sometimes ws_203.
ws_21 = "FEHLER: Benutzer hat keinen Zugriff auf"
ws_22 = "erklären"
;; ws_23 is concatenated with a contact label/link at the end of the access error.
ws_23 = "Sie können keine Daten anzeigen oder adjudizieren, die aus dem externen Quellsystem stammen. Obwohl Ihnen in diesem Project Benutzerrechte zum Adjudizieren von Daten aus dem Quellsystem gegeben wurden, wurde festgestellt, dass Sie keinen Zugriff auf das Quellsystem selbst haben (oder nicht mehr haben). REDCap hat dies mit einem User-Access-Web-Service-Aufruf an das Quellsystem bestimmt, der festgestellt hat, dass Sie keinen Zugriff haben. Wenn Sie glauben, dass dies ein Fehler ist, wenden Sie sich bitte an Ihren"
ws_24 = "Einen Quellwert ausschließen"
ws_25 = "Wenn Sie beim Adjudizieren von Daten aus dem externen Quellsystem neben einem Quellwert auf den Link 'exclude' klicken, wird dieser Quelldatenwert zukünftig beim Abrufen von Daten für dieses Feld für den betreffenden Datensatz ausgeblendet. Das Ausschließen eines Wertes ist somit eine Möglichkeit, einen bestimmten Quellwert aus beliebigem Grund temporär oder dauerhaft auszublenden (z. B. falsche oder fehlerhafte/missformatierte Daten). Jeder ausgeschlossene Quellwert kann erneut angezeigt werden, indem Sie im Pop-up neben 'Nicht angezeigte Elemente' auf die Schaltfläche 'Alle anzeigen' klicken. Wenn Sie den Wert nach dem Ausschließen wieder einschließen möchten, können Sie beim Anzeigen auf den Link 'Ausschluss entfernen' klicken."
;; ws_26 is concatenated with the external source-system name.
ws_26 = "Dynamic Data Pull (DDP) einrichten von"
;; ws_27 is concatenated with the external source-system name.
ws_27 = "Daten adjudizieren von"
ws_28 = "Dynamic Data Pull (DDP) aus externem System"
ws_29 = "Mapping für Dynamic Data Pull (DDP) einrichten"
ws_30 = "DDP"
ws_31 = "Wenn Dynamic Data Pull (DDP) für ein Project aktiviert ist, können für jeden Benutzer zwei unterschiedliche Benutzerrechte für verschiedene Aspekte von DDP festgelegt werden. Benutzern können Rechte für den Setup-/Mapping-Prozess und/oder für das Adjudizieren der Daten gegeben werden, um sie aus dem Quellsystem in das REDCap-Project zu importieren. Wenn ihnen Setup-/Mapping-Rechte gegeben wurden, sehen sie einen neuen Schritt auf der Project-Setup-Seite, über den sie zur Mapping-Seite navigieren können, wo sie Felder aus dem externen Quellsystem auf REDCap-Project-Felder mappen und weitere Einstellungen definieren können, die beim Abrufen von Daten aus dem Quellsystem verwendet werden. Wenn der Benutzer Adjudicate-Data-Rechte hat, bedeutet dies, dass er eingehende Daten aus dem Quellsystem anzeigen, adjudizieren und importieren kann; diese Daten sind im Record Status Dashboard und auch oben in Dateneingabeformularen sichtbar."
ws_35 = "alle auswählen"
ws_36 = "DDP-Rechte erklären"
ws_37 = "Dynamic Data Pull (DDP) ist eine spezielle Funktion zum Importieren von Daten aus einem externen Quellsystem nach REDCap. Sie bietet einen Adjudizierungsprozess, bei dem REDCap-Benutzer alle eingehenden Daten aus dem Quellsystem genehmigen können, bevor sie offiziell in ihrem REDCap-Project gespeichert werden."
ws_38 = "Was ist DDP?"
ws_39 = "Wie DDP funktioniert"
ws_40 = "DDP kann Daten aus dem externen Quellsystem sowohl manuell in Echtzeit als auch automatisch in regelmäßigen Abständen abrufen. DDP kann externe Daten nur für Datensätze importieren, die bereits im REDCap-Project existieren. Dabei wird angenommen, dass in jedem REDCap-Datensatz ein Datensatz-Identifier (z. B. Medical Record Number) gespeichert ist, sodass DDP den REDCap-Datensatz mit einem Datensatz aus dem Quellsystem verbinden kann. Sobald REDCap einen Datensatz-Identifier-Wert für einen bestimmten Datensatz hat, ruft es die Daten sofort in Echtzeit aus dem Quellsystem ab und prüft später in regelmäßigen Abständen auch auf zusätzliche Daten."
ws_41 = "VIDEO: Dynamic Data Pull (DDP)"
ws_42 = "Funktion aktivieren"
ws_43 = "Nachdem dem Benutzer Zugriff auf DDP gewährt wurde, sieht er den DDP-Schritt auf der Project-Setup-Seite, von wo er zur DDP-Mapping-/Setup-Seite navigieren kann. Dort kann der Benutzer bereits in seinem REDCap-Project erstellte Felder Feldern aus dem externen Quellsystem zuordnen. Dieses Mapping ermöglicht REDCap zu wissen, wo die Daten beim Import aus dem externen System gespeichert werden sollen."
ws_44 = "Der Feldmapping-Prozess"
ws_45 = "Ein Benutzer auf der Mapping-/Setup-Seite kann beliebige verfügbare Felder aus dem externen Quellsystem auswählen, um sie einem REDCap-Project-Feld zuzuordnen. (Hinweis: Dies setzt voraus, dass der Benutzer seine Datenerhebungsinstrumente und Felder im Project bereits erstellt hat.) Es gibt zwei Arten von Feldern, die gemappt werden können: 1) einmalige Datenfelder und 2) zeitbezogene Datenfelder. Einmalige Datenfelder sind solche, bei denen Daten nur einmal im Quellsystem gespeichert werden, z. B. Demografiedaten. Zeitbezogene Datenfelder sind dagegen solche, bei denen Daten über einen Zeitraum hinweg mehrfach erhoben werden können (z. B. Laborwerte, Vitalwerte, jede Art longitudinaler Daten). Beim Mapping zeitbezogener Felder müssen Sie außerdem ein REDCap-Datums-/Datetime-Feld angeben, das zur Bestimmung des Zeitfensters verwendet wird, in dem beim Abrufen von Daten aus dem Quellsystem gesucht werden soll. Das Zeitfenster wird zusammen mit dem auf der Mapping-Seite definierten Tages-Offset-Wert bestimmt. Wenn beispielsweise der Wert des gemappten REDCap-Datums-/Datetime-Feldes 2001-11-29 ist und der Tages-Offset 1 Tag beträgt, fragt es das Quellsystem ab und gibt nur Daten für das Feld zurück, die vom 2001-11-28 bis 2001-11-30 gespeichert wurden. Alle Quelldaten außerhalb dieses Bereichs werden während des Adjudizierungsprozesses ignoriert. Wichtig ist, dass Quelldaten für ein zeitbezogenes Feld NICHT aus dem externen Quellsystem abgerufen werden, WENN das zugehörige REDCap-Datums-/Datetime-Feld keinen Wert hat. Sobald für das zugehörige Datums-/Datetime-Feld ein Wert eingegeben wurde, werden Quelldaten für dieses zeitbezogene Feld abgerufen."
ws_46 = "Vorschaufelder (optional)"
ws_47 = "Auf der Mapping-/Setup-Seite können Sie bis zu 5 Quellfelder auswählen, die als 'Vorschaufelder' verwendet werden. Vorschaufelder sind optional und werden typischerweise verwendet, um zu bestätigen, dass der eingegebene Datensatz-Identifier (z. B. Medical Record Number) korrekt ist, indem andere Kontextdaten aus dem Quellsystem angezeigt werden. Wenn Sie beispielsweise 'Nachname' und 'Geburtsdatum' als Quellfelder haben, können Sie diese in Ihrem Project als Vorschaufelder auswählen. Wenn dann in REDCap ein Wert als Datensatz-Identifier eingegeben wird, werden Nachname und Geburtsdatum der Person abgerufen und angezeigt, um ihre Identität zu validieren. Wenn Vorschaufelder nicht verwendet werden, ist es möglich, dass falsche Quelldaten importiert werden. Daher sind Vorschaufelder nicht erforderlich, aber aus Gründen der Datenqualität empfohlen."
ws_48 = "Der Adjudizierungsprozess"
ws_49 = "Nachdem der Mapping-Prozess abgeschlossen wurde, werden Daten aus dem externen Quellsystem nicht automatisch in das REDCap-Project importiert. Stattdessen muss eine Person jedes Datenelement aus dem Quellsystem vor dem Import in das Project anzeigen und adjudizieren."
ws_50 = "Um Dynamic Data Pull (DDP) für ein REDCap-Project zu verwenden, wenden Sie sich bitte an Ihren REDCap-Administrator bezüglich des erforderlichen Prozesses und der notwendigen Verfahren, damit DDP für das Project aktiviert wird und eine Person die Autorisierung zur Verwendung von DDP erhält."
;; ws_51 is concatenated with the external source-system name in headers.
ws_51 = "Dynamic Data Pull (DDP) von"
ws_52 = "Externes Quellsystem"
ws_54 = "Der Mapping-Prozess besteht aus zwei Schritten: 1) Auswahl von Quellfeldern aus dem externen Quellsystem, deren Daten Sie in Ihr REDCap-Project importieren möchten, und 2) Mapping dieser Quellfelder auf REDCap-Felder in Ihrem Project. Sobald die Quellfelder gemappt sind, kann REDCap Quelldaten importieren, sobald ein Datensatz einen Wert für sein Source-Identifier-Feld (z. B. Medical Record Number) erhält. Daten aus dem Quellsystem werden auf einem Dateneingabeformular oder im Record Status Dashboard sofort in Echtzeit abgerufen, und später wird das Quellsystem in regelmäßigen Abständen auch auf zusätzliche Daten geprüft."
ws_55 = "Auswahl aufheben"
ws_56 = "Nachdem ein REDCap-Administrator DDP für Ihr REDCap-Project aktiviert hat, kann der Administrator jedem Benutzer im Project Zugriff auf DDP geben (vorausgesetzt, der Benutzer wurde für den Zugriff auf Daten des Quellsystems autorisiert). Dabei können dem Benutzer Rechte für den Mapping-/Setup-Prozess und/oder für das Adjudizieren/Importieren von Daten aus dem Quellsystem gegeben werden. Nur ein Administrator kann Einzelpersonen Zugriff gewähren, um DDP zu nutzen."
ws_57 = "Nachdem ein REDCap-Administrator DDP für Ihr REDCap-Project aktiviert hat, kann eine Person mit Zugriff auf die Seite Benutzerrechte Ihnen und jedem Benutzer im Project Benutzerrechte für den Zugriff auf DDP geben. Dabei können dem Benutzer Rechte für den Mapping-/Setup-Prozess und/oder für das Adjudizieren/Importieren von Daten aus dem Quellsystem gegeben werden."
ws_58 = "Siehe die Seite Benutzerrechte, um Rechte für einen bestimmten Benutzer zu aktivieren."
ws_59 = "Der Adjudizierungsbildschirm kann von zwei Stellen aus aufgerufen werden: 1) im Record Status Dashboard und 2) auf dem Dateneingabeformular beim Anzeigen eines Datensatzes. Das Record Status Dashboard zeigt eine neue Tabellenspalte mit einer Anzahl neuer Elemente aus dem Quellsystem für jeden angezeigten Datensatz. Ein Klick auf die Anzahl öffnet den Adjudizierungsbildschirm für diesen Datensatz. Alternativ wird beim Anzeigen eines Datensatzes auf einem Dateneingabeformular die Anzahl neuer Elemente aus dem Quellsystem oben auf der Seite in einem roten Feld angezeigt; durch Klicken auf die Schaltfläche Anzeigen wird der Adjudizierungsbildschirm geöffnet. Auf dem Adjudizierungsbildschirm werden alle Daten aus dem Quellsystem angezeigt, die noch nicht adjudiziert wurden."
ws_60 = "Wenn für ein REDCap-Feld nur ein einzelner Quellwert zurückgegeben wurde, wird dieses Element automatisch für Sie vorausgewählt. Wenn das Feld ein zeitbezogenes Datenfeld ist, für das mehrere Werte zurückgegeben wurden, wird der Datenwert automatisch *NUR DANN* vorausgewählt, wenn dieser Wert der einzige zurückgegebene Wert ist, der am exakt selben Kalenderdatum wie der REDCap-Datums-/Datetime-Wert liegt (es sei denn, für dieses Feld wurde auf der Mapping-Seite bereits eine Vorauswahloption festgelegt, z. B. Minimalwert, neuester Wert)."
ws_61 = "Der Benutzer muss alle Elemente auf dem Adjudizierungsbildschirm ansehen und neben jedem das Optionsfeld auswählen, um den Quellwert zu kennzeichnen, den er importieren möchte. Sobald alle Werte ausgewählt wurden, importiert ein Klick auf die Speichern-Schaltfläche den Wert in das Project. Wenn einige Elemente übrig blieben und nicht adjudiziert wurden, kann der Benutzer jederzeit zurückkehren, um sie später zu adjudizieren."
ws_62 = "DDP kann nur von einem REDCap-Administrator aktiviert werden. Wenden Sie sich daher an ihn, wenn Sie DDP für dieses Project verwenden möchten."
ws_63 = "Dynamic Data Pull (DDP)"
ws_64 = "Bevor DDP von REDCap-Benutzern verwendet werden kann, muss es zuerst auf dieser Seite eingerichtet und aktiviert werden. DDP arbeitet, indem es über HTTP/HTTPS mit zwei Webservices (mit einem optionalen dritten Webservice) kommuniziert. REDCap stellt Anfragen an diese Webservices, und die Services antworten mit einer passenden Antwort für die von REDCap ausgeführte spezifische Aktion. Die technischen Spezifikationen dieser Webservices werden in der unten zum Herunterladen verfügbaren PDF beschrieben. Unten finden Sie außerdem einen Link zu einer Seite, die beschreibt, wie DDP nach Einrichtung und Aktivierung verwendet wird; der Link zu dieser Seite kann an Endbenutzer gesendet werden, die an der Verwendung von DDP interessiert sind."
ws_65 = "Technische Spezifikationen für DDP-Webservices (PDF)"
ws_66 = "Dynamic Data Pull (DDP) aktivieren"
ws_67 = "Benutzerdefinierter Name für das externe Quellsystem"
ws_68 = "Dies ist der Name des Quellsystems, wie er dem Benutzer angezeigt wird. Wenn leer gelassen, wird stattdessen einfach 'Quellsystem' angezeigt."
ws_69 = "Benutzerdefinierter Text Ihrer Einrichtung, der Benutzern angezeigt wird"
ws_70 = "Dieser Text wird oben im DDP-Informations-Pop-up-Fenster angezeigt. Ihr Text sollte den Prozess und/oder die Verfahren Ihrer Einrichtung beschreiben, die erforderlich sind, damit DDP für ein Project oder einen Benutzer aktiviert wird. Er kann einen Link zu einer Umfrage oder einem Anfrageformular enthalten, um Anfragen von Benutzern zu sammeln, die DDP verwenden möchten."
ws_71 = "Wenn leer gelassen, wird dem Benutzer der folgende Text angezeigt:"
ws_72 = "URL für Metadata Web Service"
ws_73 = "URL für Data Web Service"
ws_74 = "URL für User Access Web Service (optional)"
ws_75 = "Informationen über DDP auf der Project-Setup-Seite in einem Project anzeigen?"
ws_76 = "Ja, Informationen über DDP anzeigen"
ws_77 = "Nein, alle Informationen über DDP ausblenden"
ws_78 = "Wenn 'Nein' ausgewählt ist, wird DDP Benutzern auf der Project-Setup-Seite nicht beworben, und Informationen über DDP werden nirgendwo in einem Project angezeigt. Die Einstellung 'Nein' ist vorzuziehen, wenn Sie DDP nur einer begrenzten Anzahl von Benutzern bekannt machen möchten, ohne es allen Benutzern zu bewerben."
ws_79 = "Eine gültige Webadresse (URL), die vom REDCap-Webserver erreichbar ist."
ws_80 = "Normalen Benutzern erlauben, anderen Benutzern in einem Project DDP-Benutzerrechte zu gewähren?"
ws_81 = "Ja, normale Benutzer können anderen Benutzern DDP-Rechte gewähren"
ws_82 = "Nein, nur Administratoren können Benutzern DDP-Rechte gewähren"
ws_83 = "Wenn dies auf 'Nein' gesetzt ist, können nur Administratoren Benutzern auf der Seite Benutzerrechte in einem Project DDP-Rechte gewähren. Typischerweise wird 'Ja' ausgewählt, wenn Sie den User Access Web Service verwenden, der Benutzer automatisch daran hindert, aus REDCap heraus auf Daten aus dem externen Quellsystem zuzugreifen, wenn der Webservice feststellt, dass sie keinen Zugriff haben sollten."
ws_84 = "Zeitintervall, in dem REDCap das Quellsystem für einzelne Datensätze auf neue Daten prüft"
ws_85 = "Zeit der Inaktivität, nach der REDCap aufhört, das Quellsystem auf neue Daten zu prüfen"
ws_86 = "Wenn ein DDP-aktiviertes Project in diesem Zeitraum keine protokollierte Aktivität hatte, werden keine Datensätze im Project automatisch im Quellsystem im obigen regelmäßigen Intervall geprüft. Wenn außerdem ein bestimmter Datensatz innerhalb eines aktiven DDP-aktivierten Projects in diesem Zeitraum nicht geändert wurde, wird er nicht automatisch im Quellsystem im obigen regelmäßigen Intervall geprüft."
ws_87 = "(für Projects und einzelne Datensätze)"
ws_88 = "(min: 1, max: 999)"
ws_89 = "(min: 1, max: 100)"
ws_90 = "Datensätze in DDP-aktivierten Projects werden in diesem regelmäßigen Zeitintervall auf neue Daten aus dem externen Quellsystem geprüft. Die genaue Zeit des Datenabrufs wird aus dem Zeitpunkt des letzten Datenabrufs für einen bestimmten Datensatz bestimmt. Dieser automatische Datenabruf wird von einem im Hintergrund laufenden Cron-Job ausgeführt."
;; ws_91 is concatenated with a time interval.
ws_91 = "Alle"
ws_92 = "REDCap stellt Anfragen an diese Webadresse, wenn Benutzer Felder aus dem Quellsystem mappen. Dieser Webservice stellt eine Liste aller Felder (und ihrer Attribute) bereit, die aus dem Quellsystem verfügbar sind."
ws_93 = "REDCap stellt Anfragen an diese Webadresse, wenn Daten aus dem Quellsystem für einen einzelnen Datensatz abgerufen werden. Wenn REDCap diesen Webservice aufruft und Details zu den angeforderten Daten bereitstellt, gibt der Webservice die für den Datensatz verfügbaren Daten in dem in der technischen Dokumentations-PDF oben vorgeschriebenen Format zurück."
ws_94 = "REDCap stellt Anfragen an diese Webadresse, wenn validiert wird, ob der aktuelle Benutzer die richtige Autorisierung zum Adjudizieren von Daten und/oder zum Zugriff auf Daten aus dem Quellsystem hat. Dieser Webservice wird nur einmal pro Project pro Sitzung aufgerufen. Wenn der Service feststellt, dass der Benutzer keinen Zugriff hat, erhält er eine Fehlermeldung, wenn er versucht, Daten aus dem Quellsystem zu adjudizieren. Hinweis: Dieser Service ist nur optional für zusätzliche Sicherheit."
ws_95 = "Sobald DDP für das System aktiviert ist, kann es für ein bestimmtes Project von einem Administrator auf der Project-Setup-Seite des Projects (im Abschnitt 'optionale Module und Anpassungen') aktiviert werden."
ws_96 = "HINWEIS: Wenn entweder der 'Metadata Web Service' oder der 'Data Web Service' unten nicht definiert ist oder die Services nicht korrekt eingerichtet sind, funktioniert DDP nicht. Es wird empfohlen, beide obligatorischen Services zu erstellen und einzurichten, bevor DDP aktiviert wird."
ws_97 = "* Details zu diesem Webservice finden Sie in der technischen Dokumentations-PDF"
ws_98 = "Informationsseite zur Verwendung von DDP (zur Bereitstellung für Benutzer)"
ws_99 = "HINWEIS: Wenn der 'User Access Web Service' oben nicht definiert ist, wird aus Sicherheitsgründen DRINGEND empfohlen, diese Option auf 'Nein' zu setzen, wenn die Daten aus dem Quellsystem als sensibel oder vertraulich gelten."
