multilang_695 = "Google reCAPTCHA ist auf diesem REDCap-System aktiviert. Die reCAPTCHA-Anzeigesprache kann dynamisch geändert werden, indem eine von Google unterstützte Sprache ({0:<a>}Liste der Sprachcodes){1:</a>} mit dieser Sprache verknüpft wird."
multilang_696 = "Der auf PDFs angezeigte Prompt zum Markieren des Sliders:"
multilang_697 = "Basissprache"
multilang_698 = "<p>Die <i>Basissprache</i> sollte der <b>Projektsprache</b> entsprechen (d. h. der Sprache, in der REDCap-Benutzeroberflächenelemente angezeigt werden). Dies ist üblicherweise auch die Sprache, die beim Projektdesign verwendet wird, also für alle Data-Dictionary-Elemente, Umfrageeinstellungen, ASI- oder Alarmnachrichten, Labels für Missing Data Codes usw.</p><p>Wenn dies nicht der Fall ist, sollte eine Sprache hinzugefügt werden, die der UI-Sprache des Projekts entspricht, und als <i>Basissprache</i> gesetzt werden (sie kann jedoch als inaktiv gesetzt werden, wenn sie nicht verwendet wird).</p>"
multilang_699 = "Erstellen Sie eine Basissprache. Dies ist die Sprache, die der Projektsprache entspricht, d. h. der Sprache der REDCap-Benutzeroberflächenelemente wie diesem Text oder dem Label eines Absende-Buttons. Dies entspricht üblicherweise auch der Sprache, die für Feldlabels, Fragebogenanweisungen usw. verwendet wird, aber nicht unbedingt. Markieren Sie diese Sprache als <i>Basissprache</i>. Wenn diese Sprache Ihrer Data-Dictionary-Sprache entspricht, möchten Sie sie möglicherweise auch als <i>Fallback</i> markieren."
multilang_700 = "Falls Ihre Data-Dictionary-Elemente nicht zur <i>Basissprache</i> passen, fügen Sie eine passende Sprache hinzu. Sie werden diese wahrscheinlich als <i>Fallback</i>-Sprache setzen (der endgültige Fallback ist für alle Benutzeroberflächenelemente immer die <i>Basissprache</i>, und die außerhalb von Multi-Language Management eingerichteten Data-Dictionary-Elemente stellen den endgültigen Fallback für diese dar, falls der <i>Fallback</i> keinen Wert bereitstellt)."
multilang_701 = "Fügen Sie alle weiteren Sprachen hinzu, die Sie anbieten möchten."
multilang_702 = "Stellen Sie Übersetzungen für die verschiedenen Sprachen bereit, indem Sie oben auf die Tabs klicken oder die Symbole rechts neben jeder Sprache in der unten angezeigten Tabelle verwenden. Beachten Sie, dass Sprachen <i>aktiv</i> sein und für einzelne Instrumente im Dateneingabe- und/oder Fragebogenmodus separat aktiviert werden müssen."
multilang_703 = "Testen Sie Ihre Übersetzungen sorgfältig, indem Sie auf den Eingabeformularen und/oder Fragebögen, die für diese Sprachen aktiviert wurden, zwischen Sprachen hin- und herschalten."
multilang_704 = "Verwalten Sie die verfügbaren Sprachen in diesem Projekt mithilfe der untenstehenden Tabelle und Optionen."
multilang_705 = "Die Warnmeldung, die beim Versuch angezeigt wird, ein Eingabeformular (Speichern als PDF) mit ungespeicherten Änderungen zu drucken:"
multilang_706 = "Feldmatrix"
multilang_707 = "<b>Tipp:</b> Es ist möglich, die <i>anfänglich angezeigte Sprache</i> eines Fragebogens durch Bereitstellung des URL-Parameters <b>{0:ParameterName}</b> festzulegen, der auf eine gültige (aktive) Sprach-ID gesetzt sein muss (Groß-/Kleinschreibung relevant!). Beispiel: <code>{1:ExampleUrl}</code>. Bei Verwendung überschreibt dies sowohl die vorherige Auswahl eines Umfragebefragten (im Browser-Cookie gespeichert) als auch das Feld für Sprachpräferenz. Das Action Tag <code>@LANGUAGE-FORCE</code> hat jedoch weiterhin Vorrang."
multilang_708 = "Wie @LANGUAGE-SET, aber die Wirkung ist auf Eingabeformulare beschränkt (d. h. dies betrifft keine Fragebögen)."
multilang_709 = "Wie @LANGUAGE-SET, aber die Wirkung ist auf Fragebögen beschränkt (d. h. dies betrifft keine Eingabeformulare)."
multilang_710 = "Die Standardmeldung für offline geschalteten Fragebogen:"
multilang_711 = "<b>Tipp:</b> Wählen Sie Ihre \"ASI Language Source\" mit Bedacht - Wenn ASIs in Ihrem MLM-Setup übersetzt wurden, wird typischerweise empfohlen, die Option \"Feld für Sprachpräferenz\" zu verwenden, um die Übersetzung zu bestimmen, die für eine ASI-Umfrageeinladung verwendet wird. Die Auswahl von \"Aktive Sprache des Benutzers oder Umfragebefragten\" als ASI Language Source kann unerwartete Ergebnisse haben. Wenn beispielsweise die Fragebogenantwort eines Teilnehmers die ASI auslöst, wird der Einladungstext der ASI in der richtigen Sprache ausgegeben, da verwendet wird, was der Teilnehmer zuvor gewählt hat. Wenn die ASI jedoch durch eine Aktion des Projektbenutzers ausgelöst wird, z. B. Datenimport oder Speichern eines Eingabeformulars, wird der ASI-Text in der Sprache des Projektbenutzers ausgegeben, die möglicherweise nicht der vom Teilnehmer bevorzugten Sprache entspricht."
