email_users_introduction_text_1 = "Sie können diese Seite verwenden, um allen Benutzern oder einer Teilmenge von Benutzern in dieser REDCap-Installation eine E-Mail zu senden. Um eine E-Mail an bestimmte Benutzergruppen zu senden, klicken Sie unten beim Benutzerfilter auf das +-Symbol, um einen neuen Filter zu erstellen, der die gewünschten Filterkriterien festlegt. Nachdem Sie einen Benutzerfilter erstellt haben, können Sie auf den Test-Button <i class=\"fas fa-vial fa-fw\"></i> klicken, um eine Vorschau der Liste der spezifischen Benutzer anzuzeigen, die Ihre E-Mail auf Basis dieses Filters erhalten. Beim Erstellen eines Benutzerfilters können Sie aus verschiedenen Kategorien wählen, z. B. Benutzeraktivität, Benutzerberechtigungen und anderem, und diese mit Logikoperatoren wie AND, OR, AND NOT oder OR NOT kombinieren. Sie können außerdem Regeln gruppieren und diese Gruppen mit denselben Logikoperatoren verketten. Regeln lassen sich über eine Drag-and-drop-Oberfläche leicht neu anordnen, damit Sie sie organisieren können. Zusätzlich können Sie auf dem Tab Nachrichtenverlauf alle zuvor gesendeten Nachrichten anzeigen und dort eine zuvor gesendete Nachricht durch Klicken auf das Importsymbol wiederverwenden."

