survey_1342 = "<b>HINWEIS:<b> Die Umfrage-Warteschlange kann noch nicht eingerichtet werden, weil es keine Umfragen gibt, für die sie verwendet werden kann. Nur Folgeumfragen (d. h. andere Umfragen als das erste Datenerhebungsinstrument) können in der Umfrage-Warteschlange verwendet werden. Wenn Sie weitere Datenerhebungsinstrumente erstellen und dann als Umfragen aktivieren, können Sie diese in der Umfrage-Warteschlange verwenden."
