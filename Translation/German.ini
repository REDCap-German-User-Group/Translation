system_config_522 = "Zwei-Schritt-Verifizierung beim Login von Benutzern in REDCap verlangen."
system_config_523 = "Das Aktivieren der Zwei-Faktor-Authentifizierung (auch als 2-Schritt-Login bekannt) kann die Sicherheit beim Login von Benutzern in das System erhöhen. Während der Standard-Login-Prozess aus der Eingabe von Benutzername und Passwort besteht, stellt Zwei-Faktor-Authentifizierung einen zweiten Schritt nach dem ersten Login bereit, z. B. die Eingabe eines 6-stelligen Verifizierungscodes, der per SMS, per E-Mail oder über die Google-Authenticator-App auf dem Mobilgerät erzeugt wurde, oder die Reaktion auf einen Telefonanruf oder eine Push-Benachrichtigung (nur für Duo-App). Zwei-Faktor-Authentifizierung kann mit den untenstehenden Einstellungen eingerichtet und aktiviert werden; diese steuern, wie und wann Benutzer den 2-Schritt-Login-Prozess durchlaufen müssen."
system_config_524 = "(Dieser Code läuft ab in"
system_config_525 = "Minuten.)"
system_config_528 = "Der API Playground ist eine Oberfläche, mit der Sie mit der REDCap-API experimentieren können, ohne tatsächlich Code zu schreiben. Sie können alle verschiedenen API-Methoden und deren Optionen erkunden, um eine bestimmte API-Anfrage anzupassen. Sie können sogar eine echte API-Anfrage ausführen und die exakte Antwort sehen, die REDCap aus der Anfrage zurückgibt. Wenn Sie daran interessiert sind, ein API-Skript zu erstellen, stellt der Abschnitt unten Codebeispiele für verschiedene Programmiersprachen bereit, um Ihnen den Einstieg zu erleichtern. Details zu den Möglichkeiten der REDCap-API und ihrer Verwendung finden Sie in der"
system_config_529 = "Webadresse/URL der Kontaktperson (optional)"
system_config_530 = "Sie können eine URL angeben, die auf der Startseite und Login-Seite *anstelle* der obigen Kontakt-E-Mail verlinkt wird. Dies ist nützlich, wenn Ihre Institution ein Ticketsystem hat, das Sie lieber als ein E-Mail-Konto verwenden möchten. Wenn leer gelassen, wird auf der Startseite ein Link mit der obigen Kontakt-E-Mail angezeigt."
system_config_531 = "Serverkonfigurationseinstellungen"
system_config_532 = "Andere Systemeinstellungen"
system_config_533 = "Wenn ein Proxyserver verwendet wird, der Benutzername-Passwort-Authentifizierung erfordert, geben Sie Benutzername und Passwort getrennt durch einen Doppelpunkt an."
system_config_534 = "Diese Funktion erlaubt Benutzern, Text-to-Speech-Funktionalität in einem bestimmten Fragebogen zu aktivieren, wobei Text auf der Fragebogenseite vom Computer laut vorgelesen werden kann. Dieser Service verwendet einen an der Vanderbilt University gehosteten Service, der den IBM-Watson-Text-to-Speech-API-Service nutzt, und sendet daher allen angezeigten Fragebogentext (z. B. Fragebogenanweisungen, Feldlabels, Auswahl-Labels) vom REDCap-Server an den von Vanderbilt gehosteten Service. Das bedeutet, dass der REDCap-Webserver ausgehende HTTP-Anfragen an <b>https://redcap.vumc.org</b> senden können muss, damit dieser Service funktioniert."
system_config_538 = "siehe benutzerdefinierte Einstellungen unten"
