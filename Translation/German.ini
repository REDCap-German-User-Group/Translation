access_control_groups_11 = "Access Control Group"
access_control_groups_12 = "Benutzerzuweisungen"
access_control_groups_13 = "Die folgende Tabelle zeigt alle ACGs, die derzeit im System existieren. Eine ACG muss zuerst auf dieser Seite erstellt werden, bevor ein Benutzer ihr zugewiesen werden kann. Die Liste der ACGs kann als CSV-Datei exportiert werden. Sie können bestehende ACGs aktualisieren oder neue ACGs über den CSV-Importprozess erstellen. Nachdem Sie Ihre ACGs erstellt haben, können Sie zum Reiter Benutzerzuweisungen wechseln und beginnen, Benutzer ihrer passenden ACG zuzuweisen."
