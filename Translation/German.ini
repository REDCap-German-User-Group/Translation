multilang_682 = "<b>Hinweis</b>: Beim Erstellen eines Snapshots spiegelt dieser immer den aktuell <i>gespeicherten</i> Zustand wider. Ungespeicherte Änderungen sind daher <b>nicht</b> im Snapshot enthalten."
