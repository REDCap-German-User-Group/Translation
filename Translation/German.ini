design_439 = "Ihre Branching Logic kann nicht unverändert gespeichert werden, weil Sicherheitsmaßnahmen in REDCap sie als ungültige Syntax einstufen. Dies kann der Fall sein, wenn Sie versuchen, spezialisierten JavaScript-Code oder andere 'Hacks' zu verwenden, die für die Nutzung in REDCap nicht offiziell freigegeben oder genehmigt wurden. Sie können 1) die Branching Logic unverändert lassen, 2) die Branching Logic für dieses Feld vollständig entfernen oder 3) sie durch andere Branching Logic ersetzen, die der korrekten Syntax folgt. Weitere Informationen zur korrekten Branching-Logic-Syntax finden Sie in der "
; design_440 is concatenated with a help link that follows.
design_440 = "Ihre bestehende Branching Logic ist zwar syntaktisch gültig, aber die Änderungen an der Logik, die Sie speichern möchten, sind NICHT gültig. In Ihrer Branching Logic liegt ein Syntaxfehler vor, daher müssen Sie ihn beheben und es erneut versuchen. Weitere Unterstützung finden Sie in der"
design_441 = "NUR FÜR ADMINISTRATOREN: <b>Ihre Branching Logic wurde erfolgreich gespeichert.</b> Bitte beachten Sie jedoch, dass in der gerade gespeicherten Branching Logic offenbar ein Syntaxfehler vorliegt. Dies kann der Fall sein, wenn Sie versuchen, spezialisierten JavaScript-Code oder andere 'Hacks' zu verwenden, die für die Nutzung in REDCap nicht offiziell freigegeben oder genehmigt wurden. Da Sie Administrator sind, ist dies zulässig, aber Sie sollten prüfen, ob Ihre Branching Logic im Eingabeformular oder Fragebogen, in dem sich das Feld befindet, korrekt funktioniert."
design_442 = "In einigen Branching-Logic-Ausdrücken werden benutzerdefinierte Funktionen verwendet, die keine offiziellen REDCap-Funktionen sind und daher nicht erlaubt sind. Diese nicht erkannten Funktionen müssen aus der Branching Logic entfernt werden. Unten sind die gefundenen Funktionen aufgeführt, die nicht erlaubt sind."
design_443 = "In einigen Branching-Logic-Ausdrücken werden benutzerdefinierte Funktionen verwendet, die keine offiziellen REDCap-Funktionen sind und daher normalerweise nicht erlaubt sind. Da Sie Administrator sind, werden die unten aufgeführten nicht erkannten Funktionen hier erlaubt."
design_444 = "In einigen Branching-Logic-Ausdrücken liegen Syntaxfehler vor. Dies kann auftreten, wenn unzulässige Zeichen oder unzulässige Funktionen in der Branching Logic verwendet werden. Bitte entfernen Sie alle Syntaxfehler. Unten sind die Felder aufgeführt, deren Branching Logic Syntaxfehler enthält."
design_445 = "In einigen Branching-Logic-Ausdrücken liegen Syntaxfehler vor und sind daher normalerweise nicht erlaubt. Da Sie Administrator sind, wird die Branching Logic für die unten aufgeführten Felder hier erlaubt, auch wenn Sie prüfen sollten, ob es sich nicht tatsächlich um Fehler handelt."
design_446 = "In einigen Branching-Logic-Ausdrücken liegen Syntaxfehler vor und sind daher normalerweise nicht erlaubt, weil Sicherheitsmaßnahmen in REDCap sie als ungültige Syntax einstufen. Da Sie die bestehende Branching Logic für die unten aufgeführten Felder nicht ändern, wird die Branching Logic hier für die folgenden Felder erlaubt."
design_447 = "In einigen Gleichungen berechneter Felder werden benutzerdefinierte Funktionen verwendet, die keine offiziellen REDCap-Funktionen sind und daher nicht erlaubt sind. Diese nicht erkannten Funktionen müssen aus der Gleichung des berechneten Feldes entfernt werden. Unten sind die gefundenen Funktionen aufgeführt, die nicht erlaubt sind."
design_448 = "In einigen Gleichungen berechneter Felder werden benutzerdefinierte Funktionen verwendet, die keine offiziellen REDCap-Funktionen sind und daher normalerweise nicht erlaubt sind. Da Sie Administrator sind, werden die unten aufgeführten nicht erkannten Funktionen hier erlaubt."
design_449 = "In einigen Gleichungen berechneter Felder liegen Syntaxfehler vor. Dies kann auftreten, wenn unzulässige Zeichen oder unzulässige Funktionen in der Gleichung des berechneten Feldes verwendet werden. Bitte entfernen Sie alle Syntaxfehler. Unten sind die berechneten Felder aufgeführt, deren Gleichung Syntaxfehler enthält."
design_450 = "In einigen Gleichungen berechneter Felder liegen Syntaxfehler vor und sind daher normalerweise nicht erlaubt. Da Sie Administrator sind, wird die Gleichung für die unten aufgeführten berechneten Felder hier erlaubt, auch wenn Sie prüfen sollten, ob es sich nicht tatsächlich um Fehler handelt."
design_451 = "In einigen Gleichungen berechneter Felder liegen Syntaxfehler vor und sind daher normalerweise nicht erlaubt, weil Sicherheitsmaßnahmen in REDCap sie als ungültige Syntax einstufen. Da Sie die bestehende Gleichung für die unten aufgeführten berechneten Felder nicht ändern, wird die Gleichung hier für die folgenden Felder erlaubt."
design_452 = "Die Gleichung Ihres berechneten Feldes wurde NOCH NICHT gespeichert. Während alle anderen Attribute des Feldes gespeichert wurden, wird die Gleichung erst gespeichert, wenn keine Fehler mehr in der Gleichung vorhanden sind. Klicken Sie auf den Schließen-Button, um das Pop-up Feld bearbeiten erneut zu öffnen."
design_454 = "Matrix-Kopftext (optional)"
design_455 = "*Hinweis: Das Hinzufügen von Abschnittsüberschriftstext hier startet eine neue Seite im Fragebogen."
design_456 = "Piping verwenden"
; design_457 is concatenated with strings design_476.
design_457 = "Mit der Funktion 'Piping' in REDCap können Sie bereits erhobene Daten in Text auf einem Eingabeformular oder Fragebogen einfügen und dadurch die Frageformulierung präziser steuern. Sie kann auch auf andere Weise verwendet werden, z. B. zur Anpassung von Fragebogeneinladungen (etwa durch Einfügen des Namens des Befragten in die E-Mail) oder des Abschluss-Texts eines Fragebogens (etwa um dem Befragten nach Abschluss des Fragebogens namentlich zu danken). Um Piping in Aktion zu sehen, können Sie"
design_458 = "Wo kann Piping verwendet werden?"
design_459 = "Piping kann an vielen verschiedenen Stellen in REDCap verwendet werden. Unten finden Sie eine Liste aller Stellen, an denen Piping genutzt werden kann, um einen Datenwert *IN* Text einzufügen."
design_460 = "Slider-Feldlabels (d. h. Text, der über der Slider-Leiste angezeigt wird)"
design_461 = "Spaltenüberschriften von Matrixfeldern"
design_462 = "Optionslabels für Mehrfachauswahlfelder (Radio, Drop-down, Checkbox)"
design_463 = "Piping hier verwenden"
design_464 = "Fragebogen-Einladungs-E-Mails (gesendet über Teilnehmerliste oder automatische Einladungen) - enthält sowohl Betreff als auch Nachricht"
design_465 = "Wie nutze ich Piping?"
design_466 = "Das Einrichten von Piping ist sehr einfach. Piping muss nicht gesondert aktiviert werden, um es zu verwenden. <b>Alles, was Sie tun müssen, um einen Datenwert an einer der oben aufgeführten gültigen Stellen einzufügen, ist den Variablennamen in eckigen Klammern in Ihren Text einzufügen</b>. Wenn wir z. B. eine Fragebogenfrage 'What is your first name?' haben und der Variablenname dieser Frage 'first_name' lautet, kann die folgende Frage als <b>'[first_name], what is your date of birth?'</b> eingerichtet werden. Wenn der Benutzer 'John' als Vornamen eingegeben hat, würde der Text der nächsten Frage wörtlich <b>'John, what is your date of birth?'</b> lauten. Ebenso könnten Sie [first_name] im Abschluss-Text Ihres Fragebogens verwenden, wobei <b>'Thanks for taking our survey, [first_name]!'</b> dem Befragten als <b>'Thanks for taking our survey, John!'</b> angezeigt würde."
design_467 = "Wenn Sie ein longitudinales Projekt haben, können Sie bei Bedarf eventübergreifendes Piping verwenden. Wie bei eventübergreifenden Berechnungen und Branching Logic stellen Sie dem Variablennamen in eckigen Klammern einfach den eindeutigen Eventnamen in eckigen Klammern voran. Wenn Sie z. B. den Vornamen einer Person im Event 'Enrollment' erhoben haben, dessen eindeutiger Eventname 'enrollment_arm_1' ist, könnten Sie Piping als <b>'[enrollment_arm_1][first_name], what is your date of birth?'</b> einrichten. Dadurch wird der Vorname nur aus dem Event 'Enrollment' eingefügt und nicht aus einem anderen Event. <b>Wenn in einem longitudinalen Projekt kein eindeutiger Eventname vor eine Variable gesetzt wird, wird der Datenwert aus dem aktuellen Event eingefügt</b>."
design_468 = "Piping in der Fragebogeneinladung verwenden"
design_470 = "Aus welchen Feldtypen können Daten eingefügt werden?"
