mycap_mobile_app_100 = "Als MyCap-Aufgabe aktiviert"
mycap_mobile_app_101 = "MyCap"
mycap_mobile_app_102 = "MyCap-Aufgabeneinstellungen ändern"
mycap_mobile_app_103 = "MyCap-Aufgabe einrichten"
mycap_mobile_app_104 = "Die MyCap-Mobile-App zeigt eine Liste von Aufgaben (Instrumenten), die ein Teilnehmer an einem bestimmten Datum ausfüllen muss. Jede Aufgabe wird durch eine Karte dargestellt. Wenn ein Teilnehmer auf eine Karte tippt, beginnt die Aufgabe. Wenn eine Aufgabe abgeschlossen ist, wird ein Ergebnis in einer verschlüsselten Datenbank auf dem Gerät des Teilnehmers gespeichert. Wenn der Teilnehmer eine aktive Internetverbindung hat, wird das Ergebnis mit REDCap synchronisiert. Wenn keine aktive Internetverbindung besteht, wird das Ergebnis in einer Warteschlange gespeichert. Jedes Mal, wenn ein Teilnehmer eine Aufgabe abschließt, wird versucht, alle Ergebnisse in der Warteschlange zu synchronisieren."
mycap_mobile_app_105 = "Daten für dieses REDCap-Instrument erfassen?"
mycap_mobile_app_106 = "Wenn nicht ausgewählt, können Teilnehmende die Aufgabe in der App nicht sehen."
mycap_mobile_app_107 = "Grundlegende Aufgabeninformationen:"
mycap_mobile_app_108 = "Aufgabentitel"
mycap_mobile_app_109 = "Dies ist der Kartentitel, der Teilnehmenden oben auf der Aufgabenseite angezeigt wird"
mycap_mobile_app_110 = "Format"
mycap_mobile_app_111 = "Jede Frage erscheint auf einem eigenen Bildschirm. Empfohlen. Verzweigungslogik wird unterstützt."
mycap_mobile_app_112 = "Zeigt den Aufgabenfortschritt mit einer kreisförmigen Fortschrittsanzeige an. <br><b>Zum Beispiel</b>: Wenn Ihre Aufgabe 20 Fragen hat und ein Teilnehmer 10 Fragen abschließt, zeigt die Anzeige 50 % abgeschlossen. Die meisten Aufgaben verwenden diesen Kartenanzeigetyp."
mycap_mobile_app_113 = "Zeigt Aufgabenergebnisse in einer Diagrammansicht an. <br><br>Ihr Instrument muss mindestens drei REDCap-Felder haben:"
