cdis_custom_mapping_title="Clinical Data Interoperability Services - Benutzerdefinierte Mappings"
cdis_custom_mapping_description="Benutzerdefinierte Mappings bieten die Flexibilität, Mappings an die spezifischen Anforderungen Ihrer Einrichtung anzupassen. Sobald sie definiert sind, stehen diese benutzerdefinierten Mappings in allen CDIS-Projects (CDP und CDM) zur Verfügung. Um sicherzustellen, dass Ihre benutzerdefinierte Mapping-Datei bei REDCap-Updates erhalten bleibt, wird sie sicher im edocs-Ordner gespeichert. Wichtig ist, dass benutzerdefinierte Mappings Vorrang vor den von REDCap bereitgestellten Standardmappings haben. Das bedeutet, dass alle von Ihnen definierten benutzerdefinierten Mappings die vorhandenen Mappings überschreiben, sodass Ihre angepassten Konfigurationen immer verwendet werden."
cdis_custom_mapping_note_title="Bitte beachten:"
cdis_custom_mapping_note_description="Wenn Sie einen neuen LOINC-Code hinzufügen, besuchen Sie bitte LOINC.org, um Label und Beschreibung gegen zu prüfen. LOINC.org bietet eine genaue und aktuelle Codedatenbank und hilft, eine konsistente medizinische Codierung sicherzustellen. Die Konsultation dieser vertrauenswürdigen Ressource hilft, hohe Standards zu wahren und Ihren Benutzern verlässliche Informationen bereitzustellen."
cdis_custom_mapping_note_1="Benutzerdefinierte Einträge überschreiben keine vorhandenen Einträge, die von REDCap bereitgestellt werden"
cdis_custom_mapping_note_2="Es werden nur zwei Kategorien unterstützt: \"Laboratory\" und \"Vital Signs\""
cdis_custom_mapping_note_3="Die Spalte \"field\" sollte den LOINC-Code enthalten"
cdis_custom_mapping_note_4="Die Spalte \"temporal\" sollte immer auf 1 gesetzt sein"
cdis_custom_mapping_note_5="Die Datei muss mindestens eine Zeile mit den Kopfzeilen UND einen Eintrag enthalten"
cdis_custom_auth_params_01="Benutzerdefinierte Authentifizierungsparameter"
cdis_custom_auth_params_02="Die Einstellung \"Benutzerdefinierte Authentifizierungsparameter\" ermöglicht es Benutzern, während des Smart-on-FHIR-Authentifizierungsprozesses eigene Parameter zu definieren und einzubeziehen. Diese benutzerdefinierten Parameter bieten Flexibilität und Anpassungsoptionen, erleichtern die Integration mit externen Systemen und ermöglichen den Austausch kontextspezifischer Informationen."
cdis_custom_auth_params_03="Benutzerdefinierte Parameter"
cdis_custom_auth_params_04="Um benutzerdefinierte Parameter hinzuzufügen, klicken Sie auf die Schaltfläche \"Benutzerdefinierten Parameter hinzufügen\", geben Sie dann einen Schlüssel und einen Wert ein und legen Sie schließlich den Kontext fest, in dem der Parameter verwendet werden muss. Verwenden Sie bei Bedarf das Löschsymbol, um einen Parameter zu entfernen."
cdis_custom_auth_params_05="Benutzerdefinierten Parameter hinzufügen"
cdis_custom_auth_params_06="Schlüssel"
cdis_custom_auth_params_07="Wert"
cdis_custom_auth_params_08="Kontext"
cdis_custom_auth_params_09="immer"
cdis_custom_auth_params_10="EHR-Launch"
cdis_custom_auth_params_11="Standalone-Launch"

project_setting_fhir_system_title="CDIS: Verbundenes FHIR-System"
project_setting_fhir_system_description="Sie können ein spezifisches FHIR-System (Fast Healthcare Interoperability Resources) für Ihr Project wählen. Diese Auswahl bestimmt die Quelle der Gesundheitsdaten, auf die Ihr Project zugreift und die es verwendet. Wenn 'Standard' ausgewählt ist, wird das erste FHIR-System in der Liste verwendet. Sie können FHIR-Systemkonfigurationen auf der CDIS-Einstellungsseite erstellen."

rewards_feature_name="Rewards"
rewards_feature_name_extended="Rewards - Manager für Teilnehmervergütungen"
rewards_feature_description="Teilnehmervergütungen verwalten"
rewards_stats_total_participants_compensated="Vergütete Teilnehmende gesamt"
rewards_stats_total_compensation_actions="Vergütungsaktionen gesamt"
rewards_stats_amounts_distributed="Verteilte Beträge (nach Währung)"
rewards_settings_title="Reward Services"
rewards_settings_option_1_title="Reward Services aktivieren?"
rewards_settings_option_1_description="Dies erlaubt, Reward Services in allen REDCap-Projekten zu konfigurieren und zu verwenden. Nachdem Reward Services hier global aktiviert wurden, müssen sie weiterhin in einem Projekt von einer Person mit entsprechenden Rechten aktiviert werden (siehe Einstellung direkt darunter)."
rewards_settings_option_1_note="Hinweis: Um Reward Services zu verwenden, muss der REDCap-Webserver ausgehende HTTP/HTTPS-Anfragen an die API des Rewards-Anbieters senden können."
rewards_settings_option_2_title="Wer kann Reward Services in einem bestimmten Projekt aktivieren?"
rewards_settings_option_2_note="Wenn 'Nur Administratoren' ausgewählt ist, sehen normale Benutzer die Einstellung auf der Projekt-Setup-Seite des Projekts nicht einmal (nur Administratoren können sie sehen und aktivieren). Wenn 'Alle Benutzer' ausgewählt ist, kann jeder Benutzer mit Projekt-Design-/Setup-Rechten in diesem Projekt die Einstellung sehen und sie auch selbst aktivieren, um Reward Services in seinem Projekt zu nutzen."
rewards_settings_option_3_title="Informationen zu Reward Services allen Benutzern auf der Projekt-Setup-Seite eines Projekts anzeigen?"
rewards_settings_option_3_note="Wenn 'Nein' ausgewählt ist, werden Reward Services den Benutzern auf der Projekt-Setup-Seite nicht beworben, und Informationen zu Reward Services werden nirgendwo in einem Projekt angezeigt. Die Einstellung 'Nein' ist vorzuziehen, wenn Sie Reward Services nur einer begrenzten Anzahl von Benutzern bekannt machen möchten, ohne sie allen Benutzern zu bewerben."
rewards_settings_option_3_value_1="Nein, alle Informationen zu Reward Services ausblenden"
rewards_settings_option_3_value_2="Ja, Informationen zu Reward Services anzeigen"
rewards_settings_option_4_title="Benutzerdefinierte Nachricht beim Aktivieren von Reward Services in einem Projekt"
rewards_settings_option_4_description="Geben Sie eine benutzerdefinierte Nachricht an, die Benutzern angezeigt wird, wenn sie versuchen, die Rewards-Funktion auf Projektebene zu aktivieren. Diese Nachricht kann Nutzungsbedingungen, Richtlinien, Anweisungen oder andere relevante Informationen enthalten, um Ihre Benutzer wirksam zu informieren und zu leiten."
rewards_settings_option_5_title="Normalen Benutzern erlauben, diese Funktion in ihren Projekten zu aktivieren?"
rewards_settings_option_5_note="Wenn 'Ja' ausgewählt ist, kann jeder Benutzer mit Design-Rechten im Projekt die Einstellung sehen und sie selbst aktivieren, um Reward Services in seinem Projekt zu nutzen. Wenn 'Nein' ausgewählt ist, sehen normale Benutzer die Einstellung auf der Projekt-Setup-Seite des Projekts nicht; nur Administratoren können sie anzeigen und aktivieren."
rewards_settings_option_5_value_1="Ja, Benutzern mit Projekt-Setup-/Design-Rechten erlauben, diese Funktion zu aktivieren"
rewards_settings_option_5_value_2="Nein, ein Administrator muss diese Funktion über eine Benutzeranfrage aktivieren"
rewards_settings_option_6_title = "Client-ID"
rewards_settings_option_7_title = "Client Secret"
rewards_settings_credentials_description = "Die folgende Client-ID und das Client Secret werden auf alle Projekte angewendet, die die Rewards-Funktion verwenden, sofern keine projektspezifischen Zugangsdaten angegeben werden. Wenn eine Client-ID und ein Client Secret auf Projektebene festgelegt sind, überschreiben sie die hier definierten globalen Zugangsdaten."
rewards_settings_credentials_description_02 = "Für Ihr institutionelles Tango-Konto werden die folgende Client-ID, das Client Secret, der Service-Account-Benutzername und das Service-Account-Passwort auf alle Projekte angewendet, die die Rewards-Funktion verwenden, sofern keine projektspezifischen Zugangsdaten angegeben werden. Wenn Zugangsdaten auf Projektebene festgelegt sind, überschreiben sie die hier definierten globalen Zugangsdaten."
rewards_settings_system_defaults_note_01 = "Diese Werte definieren die systemweiten Standardwerte für Reward Services, die Projekte übernehmen, wenn sie auf der Seite Projekt-API-Einstellungen <code>Systemstandard verwenden</code> auswählen."
rewards_settings_no_environment_note_01 = "Wählen Sie <code>Keine Umgebung ausgewählt</code>, wenn Sie die Standardwerte unvollständig lassen müssen. REDCap behält alle unten eingegebenen Zugangsdaten bei, statt sie zu löschen."
rewards_settings_bypass_sensitive_confirmation_note = "Wenn aktiviert, müssen Benutzer, die Rewards-Berechtigungen verwalten, weiterhin einen Grund eingeben, der zu Prüfzwecken geloggt wird, aber REDCap erfordert den zusätzlichen Bestätigungsschritt für sensible Aktionen nicht."
rewards_settings_bypass_sensitive_confirmation_title = "Sensible Bestätigung beim Verwalten von Rewards-Berechtigungen umgehen?"

rewards_project_setup_title="Reward Services für Teilnehmervergütung"
rewards_api_settings_criterion_title = "Konfiguration der API-Einstellungen"
rewards_api_settings_criterion_description = "Stellen Sie auf der Seite API-Einstellungen sicher, dass Werte für <code>Gruppenkennung</code>, <code>Kampagnenkennung</code> und <code>Umgebung</code> festgelegt sind. Wenn <code>Client-ID</code> und <code>Client Secret</code> nicht auf Systemebene festgelegt sind, müssen Sie diese Werte ebenfalls auf der Seite <em>API-Einstellungen</em> konfigurieren. Ausführliche Beschreibungen der einzelnen Einstellungen finden Sie auf der Seite <em>API-Einstellungen</em>."
rewards_api_settings_criterion_description_01 = "Stellen Sie auf der Seite API-Einstellungen sicher, dass Werte für <code>Gruppenkennung</code>, <code>Kampagnenkennung</code> und <code>Umgebung</code> festgelegt sind. Wenn <code>Client-ID</code>, <code>Client Secret</code>, <code>Service-Account-Benutzername</code> und <code>Service-Account-Passwort</code> nicht auf Systemebene festgelegt sind, müssen Sie diese Werte ebenfalls auf der Seite <em>API-Einstellungen</em> konfigurieren. Ausführliche Beschreibungen der einzelnen Einstellungen finden Sie auf der Seite <em>API-Einstellungen</em>."
rewards_email_field_criterion_title = "Festlegung des E-Mail-Feldes"
rewards_email_field_criterion_description = "Im Bereich <em data-page>Optionale Module und Anpassungen aktivieren</em> der Seite <em data-page>Projekt-Setup</em> müssen Sie die Option <code>E-Mail-Feld für Kommunikation festlegen</code> aktivieren. Wählen Sie ein REDCap-Feld mit Validierungstyp <code>email</code> als festgelegtes E-Mail-Feld aus."
rewards_project_settings_criterion_title = "Konfiguration der Projekteinstellungen"
rewards_project_settings_criterion_description = "Stellen Sie sicher, dass die Projekteinstellungen Werte für <code>Benutzerdefiniertes Reward-Label</code>, <code>E-Mail-Betreff</code> und <code>E-Mail-Vorlage</code> enthalten. Ausführliche Beschreibungen der einzelnen Einstellungen finden Sie auf der Seite <em data-page>Einstellungen</em>."
rewards_sender_email_validity_criterion_title = "Absender-E-Mail verwendet zulässige Absenderquellen"
rewards_sender_email_validity_criterion_description = "Stellen Sie sicher, dass der Wert <code>Von</code> einer aktuellen Projekt-Benutzer-E-Mail oder der systemweiten <code>Universal FROM email</code> entspricht. Ein leerer <code>Von</code>-Wert ist nur erlaubt, wenn die systemweite <code>Universal FROM email</code> konfiguriert ist."
rewards_sender_email_blank_without_universal_error = "Der Von-Absender ist leer, und die systemweite Universal FROM-E-Mail-Adresse ist im Control Center nicht konfiguriert."
rewards_sender_email_required_error = "Wählen Sie eine Absender-E-Mail, wenn Sie eine spezifische Absenderquelle verwenden."
rewards_sender_source_universal_unavailable_error = "Die systemweite Universal FROM email ist im Control Center nicht konfiguriert."
rewards_digest_sender_required_when_enabled_error = "Eine Digest-Absender-E-Mail ist erforderlich, wenn mindestens ein Digest aktiviert ist. Wählen Sie eine spezifische Absender-E-Mail oder die systemweite Universal FROM-E-Mail-Quelle."
rewards_project_structure_preview_expression_criterion_title = "Vorschauausdruck verwendet nicht wiederholte Instrumente"
rewards_project_structure_preview_expression_criterion_description = "Stellen Sie sicher, dass jede Smart Variable im Vorschauausdruck ein Feld auf einem Instrument referenziert, das nicht als wiederholt konfiguriert ist. Aktualisieren Sie entweder den Vorschauausdruck oder die Instrumenteneinstellungen, sodass nur nicht wiederholte Instrumente referenziert werden."
rewards_project_draft_mode_disabled_criterion_title = "Draft Mode deaktiviert"
rewards_project_draft_mode_disabled_criterion_description = "Stellen Sie sicher, dass sich das Projekt nicht im Draft Mode befindet, bevor Reward Services aktiviert werden. Veröffentlichen oder verwerfen Sie ausstehende Entwurfsänderungen, um den Draft Mode zu verlassen."
rewards_project_draft_mode_disabled_criterion_error = "Das Projekt befindet sich derzeit im Draft Mode. Veröffentlichen oder verwerfen Sie Entwurfsänderungen an Instrumenten, bevor Sie fortfahren."
rewards_api_connection_criterion_title = "API-Verbindung"
rewards_api_connection_criterion_description = "Stellen Sie sicher, dass Ihre API-Einstellungen gültige und aktive Zugangsdaten für <code>Client-ID</code>, <code>Client Secret</code>, <code>Gruppenkennung</code>, <code>Kampagnenkennung</code> und <code>Umgebung</code> enthalten. Diese Einstellungen sind entscheidend für den Aufbau einer erfolgreichen Verbindung mit der Tango-Rewards-API. <div class=""text-muted"">Hinweis: Ein Verbindungsfehler kann mit einem vorübergehenden Netzwerkproblem auf Ihrer Seite oder auf Seiten des Anbieters zusammenhängen. Wenn ein Fehler auftritt, prüfen Sie bitte Ihre Netzwerkverbindung und versuchen Sie es später erneut.</div>"
rewards_api_connection_criterion_description_01 = "Stellen Sie sicher, dass Ihre API-Einstellungen gültige und aktive Zugangsdaten für <code>Client-ID</code>, <code>Client Secret</code>, <code>Service-Account-Benutzername</code>, <code>Service-Account-Passwort</code>, <code>Gruppenkennung</code>, <code>Kampagnenkennung</code> und <code>Umgebung</code> enthalten. Diese Einstellungen sind entscheidend für den Aufbau einer erfolgreichen Verbindung mit der Tango-Rewards-API. <div class=""text-muted"">Hinweis: Ein Verbindungsfehler kann mit einem vorübergehenden Netzwerkproblem auf Ihrer Seite oder auf Seiten des Anbieters zusammenhängen. Wenn ein Fehler auftritt, prüfen Sie bitte Ihre Netzwerkverbindung und versuchen Sie es später erneut.</div>"
rewards_buyer_role_criterion_title = "Rolle Order Manager zugewiesen"
rewards_buyer_role_criterion_description = "Mindestens einem Benutzer muss die Rolle <code>Order Manager</code> für das aktuelle Projekt zugewiesen sein. Ein <code>Order Manager</code> ist jeder Benutzer mit aktivierter Berechtigung <code>place_orders</code>. Diese Rolle erlaubt den benannten Benutzern, Bestellungen für finanziell autorisierte Rewards aufzugeben, Einlösecodes zu erzeugen und Benachrichtigungen an Teilnehmende zu senden."
rewards_financial_approver_role_criterion_title = "Rolle Financial Approver zugewiesen"
rewards_financial_approver_role_criterion_description = "Mindestens einem Benutzer muss die Rolle <code>Financial Approver</code> für das aktuelle Projekt zugewiesen sein. Ein <code>Financial Approver</code> ist jeder Benutzer mit aktivierter Berechtigung <code>authorize_payments</code>. Diese Rolle erlaubt den benannten Benutzern, die finanzielle Verpflichtung für Rewards zu autorisieren und zu genehmigen, nachdem die Berechtigung bestätigt wurde, aber bevor Bestellungen aufgegeben werden."
rewards_reviewer_role_criterion_title = "Rolle Reviewer zugewiesen"
rewards_reviewer_role_criterion_description = "Mindestens einem Benutzer muss die Rolle <code>Reviewer</code> für das aktuelle Projekt zugewiesen sein. Ein <code>Reviewer</code> ist jeder Benutzer mit aktivierter Berechtigung <code>review_eligibility</code>. Diese Rolle gibt den benannten Benutzern die Befugnis, Rewards anhand vordefinierter Berechtigungskriterien zu prüfen und zu genehmigen oder abzulehnen."
rewards_rewards_manager_role_criterion_title = "Rolle Rewards Options Manager zugewiesen"
rewards_rewards_manager_role_criterion_description = "Mindestens einem Benutzer muss die Rolle <code>Rewards Options Manager</code> für das aktuelle Projekt zugewiesen sein. Ein <code>Rewards Options Manager</code> ist jeder Benutzer mit aktivierter Berechtigung <code>manage_rewards_options</code>. Diese Rolle gibt den benannten Benutzern die Möglichkeit, die für Teilnehmende verfügbaren Reward-Optionen zu konfigurieren, zu ändern und zu verwalten, damit der Vergütungsprozess den spezifischen Anforderungen des Projekts entspricht."
rewards_email_template_smart_variable_criterion_title="E-Mail-Vorlage enthält erforderliche Smart Variable"
rewards_email_template_smart_variable_criterion_description="Stellen Sie sicher, dass die E-Mail-Vorlage mindestens eine der erforderlichen Smart Variables enthält: <code>[reward-link]</code> oder <code>[reward-url]</code>. Dadurch wird sichergestellt, dass die richtigen Informationen dynamisch in Teilnehmerbenachrichtigungen eingefügt werden."
rewards_email_template_smart_variable_criterion_description_01="Stellen Sie sicher, dass die E-Mail-Vorlage <code>[reward-redemption-details]</code> enthält. Dieses Token rendert konsistent die besten verfügbaren Erfüllungsdetails des Anbieters für die Bestellung, einschließlich Link, Zugangsdaten und Anweisungen, sofern verfügbar."
rewards_terms_conditions="Geschäftsbedingungen"
;; rewards_terms_please_review is likely concatenated with a terms link in the Rewards UI.
rewards_terms_please_review="Bitte prüfen Sie die"
rewards_terms_link="Einlösungslink"
rewards_terms_credentials="Einlösungs-Zugangsdaten"
rewards_terms_terms="Bedingungen"
rewards_terms_instructions="Einlösungsanweisungen"
rewards_redeem_details_piping_description="Die besten verfügbaren Einlösungsdetails auf Bestellebene für die angegebene Reward-ID (R-id). Dies kann einen expliziten Einlösungslink, vom Anbieter ausgestellte Zugangsdaten und Teilnehmeranweisungen umfassen."
rewards_redeem_link_piping_description="Eine anklickbare Version des expliziten Einlösungslinks, der für die angegebene Reward-ID (R-id) gespeichert ist, sofern der Anbieter einen bereitstellt."
rewards_redeem_url_piping_description="Die explizite Einlösungs-URL, die für die angegebene Reward-ID (R-id) gespeichert ist, sofern der Anbieter eine bereitstellt."
rewards_redeem_code_piping_description="Ein Wert im Stil eines Einlösecodes, der aus den strukturierten Zugangsdaten abgeleitet wird, die für die angegebene Reward-ID (R-id) gespeichert sind."
rewards_redeem_instructions_piping_description="Vom Anbieter ausgestellte Einlösungsanweisungen, die für die angegebene Reward-ID (R-id) gespeichert sind."
rewards_redeem_credentials_piping_description="Strukturierte Einlösungs-Zugangsdaten, die für die angegebene Reward-ID (R-id) gespeichert sind, formatiert als lesbare Schlüssel/Wert-Paare."
rewards_amount_piping_description="Der Geldwert des Rewards, der mit der angegebenen Reward-ID (R-id) verknüpft ist.<br><strong>Hinweis</strong>: <em>Dieser Wert spiegelt den Betrag wider, der zum Zeitpunkt der Ausgabe des Rewards an einen Teilnehmer zugewiesen war. Er kann vom aktuellen Betrag abweichen, der für diese Reward-Option festgelegt ist, da Änderungen nur für künftige Empfänger gelten</em>."
rewards_product_id_piping_description="Die eindeutige ID des Reward-Produkts im System des Anbieters, die mit der angegebenen Reward-ID (R-id) verknüpft ist."
rewards_product_name_piping_description="Die Beschreibung des Reward-Produkts im System des Anbieters, die mit der angegebenen Reward-ID (R-id) verknüpft ist."
rewards_status_piping_description="Der aktuelle Status der Reward-Bestellung, die mit der angegebenen Reward-ID (R-id) verknüpft ist. Mögliche Status sind:"
rewards_redcap_order_id_piping_description="Der eindeutige Code in REDCap, der die Reward-Bestellung identifiziert, die mit der angegebenen Reward-ID (R-id) verknüpft ist. Wird zum Abgleich mit dem Anbieter verwendet."
rewards_provider_order_id_piping_description="Der eindeutige Bestellcode im System des Reward-Anbieters, der mit der angegebenen Reward-ID (R-id) verknüpft ist. Wird zum Abgleich mit REDCap verwendet."
rewards_request_submitted="Ihre Anfrage zur Aktivierung von Rewards wurde zur Prüfung an einen REDCap-Administrator übermittelt. Sie erhalten eine E-Mail, sobald Ihre Anfrage genehmigt und die Funktion für Ihr Projekt aktiviert wurde."
rewards_request_failed="Beim Übermitteln Ihrer Anfrage zur Aktivierung von Rewards ist ein Problem aufgetreten. Bitte versuchen Sie es später erneut oder wenden Sie sich an einen REDCap-Administrator, wenn das Problem weiterhin besteht."
rewards_project_enable_message = "REDCap bietet die Möglichkeit, Reward Services zur Incentivierung von Umfrageteilnehmenden oder anderen projektspezifischen Aktivitäten zu verwenden. Die Rewards-Funktion gibt Ihnen mehr Kontrolle über die Verteilung von Rewards wie Geschenkkarten und automatisiert den Prozess über integrierte API-Verbindungen mit dem von Ihnen gewählten Rewards-Anbieter. Durch Aktivieren dieser Funktion können Sie Rewards direkt aus Ihren Projekteinstellungen verwalten und verteilen; damit erhalten Sie ein zusätzliches Tool, um die Teilnahme an Umfragen oder Studien zu fördern."
rewards_info_intro_paragraph = "Die Funktion <strong>Rewards</strong> in REDCap vereinfacht die Verwaltung von Teilnehmervergütungen und bietet eine effiziente und organisierte Möglichkeit zur Handhabung von Zahlungen und Rewards. Die Rewards-Funktion wurde zur Unterstützung von Forschungsteams entwickelt und stellt sicher, dass Teilnehmende die ihnen zustehende Vergütung erhalten, während Administratoren ein klarer und strukturierter Prozess bereitgestellt wird."
rewards_info_intro_paragraph_01 = "Die Funktion <strong>Rewards</strong> in REDCap vereinfacht Teilnehmervergütungen mit einem klaren, strukturierten Workflow für Forschungsteams. Sie hilft, zeitnahe und korrekte Rewards sicherzustellen und gleichzeitig die Komplexität der Verwaltung von Berechtigungsprüfungen, Genehmigungen und Bestellaufgaben zu reduzieren."
rewards_info_what_it_offers_title = "Was sie bietet:"
rewards_info_participant_management_title = "Teilnehmerverwaltung:"
rewards_info_participant_management_description = "Verfolgen und verwalten Sie Teilnehmerdetails einfach zusammen mit den jeweiligen Rewards. Die Seite Participant Manager stellt Teilnehmerinformationen in einem übersichtlichen Layout dar, wobei Rewards als einzelne Spalten angezeigt werden und so schnellen und einfachen Zugriff auf Status und Aktionen ermöglichen."
rewards_info_role_based_workflow_title = "Rollenbasierter Workflow:"
rewards_info_role_based_workflow_description = "Die Funktion ist mit klar abgegrenzten Rollen konzipiert:"
rewards_info_role_based_workflow_approver_title = "Reviewer:"
rewards_info_role_based_workflow_approver_description = "Stellt sicher, dass nur berechtigte Teilnehmende Rewards erhalten, indem Vergütungen anhand vordefinierter Kriterien genehmigt oder abgelehnt werden."
rewards_info_role_based_workflow_payment_authorizer_title = "Payment Authorizer:"
rewards_info_role_based_workflow_payment_authorizer_description = "Autorisiert und genehmigt finanzielle Verpflichtungen für berechtigte Rewards vor der Auftragserfüllung. Stellt sicher, dass Zahlungen Budget- und Institutionsrichtlinien entsprechen, und bietet die abschließende finanzielle Genehmigung zwischen Berechtigungsprüfung und Bestellaufgabe."
rewards_info_role_based_workflow_financial_approver_title = "Financial Approver:"
rewards_info_role_based_workflow_financial_approver_description = "Autorisiert und genehmigt die finanzielle Verpflichtung für Rewards, nachdem die Berechtigung bestätigt wurde, aber bevor Bestellungen aufgegeben werden."
rewards_info_role_based_workflow_buyer_title = "Order Manager:"
rewards_info_role_based_workflow_buyer_description = "Überwacht den Erfüllungsprozess und gibt Bestellungen für finanziell autorisierte Rewards auf, um sicherzustellen, dass Teilnehmende ihre Einlösecodes und Benachrichtigungen zeitnah erhalten."
rewards_info_role_based_workflow_rewards_manager_title = "Rewards Options Manager:"
rewards_info_role_based_workflow_rewards_manager_description = "Konfiguriert, ändert und verwaltet die für Teilnehmende verfügbaren Reward-Optionen."
rewards_info_streamlined_processes_title = "Optimierte Prozesse:"
rewards_info_streamlined_processes_description = "Mit klaren Status, die jede Phase eines Rewards im Genehmigungs- und Erfüllungsprozess widerspiegeln, vereinfacht die Rewards-Funktion den Entscheidungsprozess. Ob Sie die Berechtigung prüfen, eine Vergütung genehmigen oder eine Bestellung abschließen: Jede Aktion wird durch eine intuitive Oberfläche unterstützt, die Benutzer durch den Prozess führt."
rewards_info_bulk_actions_title = "Effiziente Massenaktionen:"
rewards_info_bulk_actions_description = "Für größere Studien oder Projekte bietet die Rewards-Funktion die Möglichkeit, mehrere Rewards gleichzeitig zu verwalten. Über Massenaktionen können Benutzer mehrere Rewards auf einmal genehmigen, ablehnen oder bestellen, was Zeit spart und administrativen Aufwand reduziert."
rewards_info_reporting_and_digests_title = "Reporting und Digests:"
rewards_info_reporting_and_digests_description = "Überwachen Sie den Reward-Fortschritt über Teilnehmende hinweg mit Filtern, die sich auf die wichtigsten Status, Reward-Optionen und Zeitfenster konzentrieren. Exportieren Sie gefilterte Ergebnisse als CSV für Nachverfolgung und Weitergabe. Konfigurieren Sie wiederkehrende Digest-Nachrichten, damit jede Rolle Erinnerungen an ausstehende Arbeit und die nächsten auszuführenden Aktionen erhält."
rewards_info_how_it_helps_title = "Wie sie hilft:"
rewards_info_how_it_helps_paragraph = "Die Rewards-Funktion verbessert die Teilnehmererfahrung, indem sie zeitnahe und korrekte Vergütung sicherstellt. Für Forschungsteams reduziert sie die Komplexität der Verwaltung von Teilnehmerzahlungen und bietet ein zuverlässiges, benutzerfreundliches Tool, das zu den strukturierten Workflows von REDCap passt. Durch Integration von Berechtigungsprüfungen, Genehmigungsprozessen und Bestellaufgaben hilft die Rewards-Funktion, Transparenz, Genauigkeit und Effizienz in der Verwaltung von Teilnehmervergütungen zu erhalten."
rewards_info_sandbox_title = "Testen in der Sandbox-Umgebung (vor Produktion empfohlen):"
rewards_info_sandbox_intro_paragraph = "Bevor die Rewards-Funktion in einer Produktionsumgebung aktiviert wird, wird dringend empfohlen, Ihre Konfiguration mit einem Sandbox-Konto zu testen. Die Sandbox-Umgebung ermöglicht Ihnen, Workflows, Rechte und Reward-Erfüllung sicher zu validieren, ohne echte Teilnehmende oder Finanzsysteme zu beeinträchtigen."
rewards_info_sandbox_get_started_title = "Erste Schritte:"
rewards_info_sandbox_create_account_title = "Sandbox-Konto erstellen:"
rewards_info_sandbox_create_account_description = "Registrieren Sie sich für ein Sandbox-Konto über das <a href=""https://tango-portal.sandbox.tangocard.com/"" target=""_blank""><u>Tango-Card-Portal</u></a>."
rewards_info_sandbox_configure_portal_title = "Portal aufrufen und konfigurieren:"
rewards_info_sandbox_configure_portal_description = "Sobald Ihr Konto erstellt und genehmigt wurde, melden Sie sich im Sandbox-Portal an, um verfügbare Reward-Optionen und Einstellungen zu erkunden."
rewards_info_sandbox_setup_docs_title = "Setup-Dokumentation befolgen:"
rewards_info_sandbox_setup_docs_description = "Schließen Sie die anfängliche Einrichtung und Konfiguration ab, indem Sie der <a href=""https://help.rewardsgenius.com/s/topic/0TO1U000000Pngo/getting-started"" target=""_blank"">offiziellen Dokumentation</a> folgen."
rewards_info_sandbox_test_workflow_title = "End-to-End-Workflow testen:"
rewards_info_sandbox_test_workflow_description = "Verwenden Sie die Sandbox-Umgebung, um den vollständigen Rewards-Lebenszyklus zu simulieren, einschließlich Teilnehmer-Berechtigungsprüfung, Autorisierung und Bestellaufgabe. Dies hilft zu bestätigen, dass Rollen, Rechte und Integrationen wie erwartet funktionieren, bevor Sie in Produktion gehen."
rewards_info_sandbox_outro_paragraph = "Die Verwendung der Sandbox-Umgebung hilft, Konfigurationsprobleme zu vermeiden, unterstützt die Einhaltung institutioneller Anforderungen und gibt Sicherheit, dass die Rewards-Funktion vor dem Live-Einsatz korrekt arbeitet."
rewards_info_enabled_confirmation1 = "Reward Services wurden aktiviert!"
rewards_info_enabled_confirmation2 = "Verwenden Sie den Link 'Rewards' unter Datenerhebung im linken Menü, um mit der Nutzung der Funktion zu beginnen."
rewards_info_enabled_confirmation3 = "Gehen Sie hierhin, um mit der Nutzung der Funktion zu beginnen."
