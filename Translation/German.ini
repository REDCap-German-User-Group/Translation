design_1070 = "Dieses Action Tag wird von einem externen Modul bereitgestellt: <b>{0:ModuleName}</b> ({1:ModuleVersion})"
design_1071 = "Das @DOWNLOAD-COUNT Action Tag bietet eine Möglichkeit, die Anzahl der Downloads für ein Datei-Upload-Feld oder einen Anhang eines beschreibenden Feldes automatisch zu zählen. Es kann auf einem Textfeld oder Notizfeld verwendet werden, sodass dessen Wert immer dann um '1' erhöht wird, wenn jemand die Datei für ein Datei-Upload-Feld oder einen Anhang eines beschreibenden Feldes herunterlädt. Der Variablenname des Datei-Upload-Feldes oder beschreibenden Feldes, dessen Downloads gezählt werden sollen, muss innerhalb der Funktion @DOWNLOAD-COUNT() angegeben werden. Zum Beispiel könnte das Textfeld 'my_download_count' sein Action Tag als @DOWNLOAD-COUNT(my_upload_field) definiert haben, wobei 'my_upload_field' die Variable eines Datei-Upload-Feldes ist. Immer wenn die Datei auf einem Eingabeformular, einer Fragebogenseite oder in einem Report heruntergeladen wird, wird der Wert des Feldes mit diesem Action Tag um '1' erhöht. Wenn dieses Feld keinen Wert hat oder einen Nicht-Ganzzahlwert hat, wird sein Wert auf '1' gesetzt. HINWEIS: Das Download-Zählfeld muss sich im selben Kontext befinden wie das Datei-Upload-Feld oder beschreibende Feld. Das bedeutet, dass die beiden Felder in einem longitudinalen Projekt auf demselben Event liegen müssen und in einem Kontext mit wiederholtem Instrument auf demselben wiederholten Instrument. Wenn @DOWNLOAD-COUNT außerdem für ein Feld verwendet wird, in dem PDFs hochgeladen und inline auf der Seite angezeigt werden (über @INLINE oder @INLINE-PREVIEW), werden Klicks von Benutzern/Teilnehmern auf das Download-/Pfeil-nach-unten-Symbol des inline angezeigten PDFs (das vom Browser erzeugt wird, nicht von REDCap) leider *nicht* als Download durch REDCap gezählt. Daher werden Downloads nur gezählt, wenn auf den Datei-Download-Link auf der Seite geklickt wird."
design_1072 = "Verbindet den Text mehrerer Zeichenketten mit einem Trennzeichen"
design_1073 = "Dies funktioniert genauso wie <code>concat</code>, fügt aber den <code>separator</code> zwischen jedes verkettete Element ein. Zum Beispiel könnte <code>concat_ws(\" and \", [veggie1], [veggie2], \"Tomatoes\")</code> zu \"Peas and Carrots and Tomatoes\" führen."
design_1074 = "Ersetzt Teile eines Textwertes durch einen angegebenen Ersatztextwert"
design_1075 = "Findet Text (\"search\") innerhalb eines anderen Textes (\"haystack\") und ersetzt alle gefundenen Vorkommen durch den angegebenen Text (\"replace\"). Wenn [field1] z. B. den Wert \"Paul Taylor, Rob Taylor\" hat, würde <code>replace_text([field1], \"Taylor\", \"Harris\")</code> zu \"Paul Harris, Rob Harris\" führen. Hinweis: Diese Funktion ersetzt unter Beachtung der Groß-/Kleinschreibung. Zusätzlich können Sie mit \"\n\" nach Zeilenumbrüchen suchen (z. B. in Notizfeldern)."
design_1076 = "Modulo"
design_1077 = "Gibt den Rest der (ganzzahligen) Division (Modulo) <code>dividend/divisor</code> zurück. Beide Werte müssen Ganzzahlen sein. Z. B. ergibt mod(10,4) den Wert 2, weil 2 der Rest von 10 geteilt durch 4 ist."
design_1078 = "Gibt \"e\" (Eulersche Zahl) potenziert mit einer Zahl zurück: e^x. Hinweis: Der Wert des Exponenten x muss eine Zahl sein. Z. B. gibt exponential(1) 2.718281828459045 zurück."
design_1079 = "Exponentialfunktion von e"
design_1080 = "<b>Potenzielles Problem:</b> Es scheint, dass Sie ein oder mehrere Felder in ein anderes Instrument verschoben haben. Bitte beachten Sie: Wenn für die gerade verschobenen Felder bereits Daten erhoben wurden, können deren Daten verwaisen (nicht mehr zugänglich sein), wenn das Instrument, in das sie verschoben wurden, auf einem anderen Event existiert. Bitte prüfen Sie Ihre Instrument-Event-Zuordnungen sorgfältig, um sicherzustellen, dass dies keinen Datenverlust verursacht. Wenn diese Aktion einige Daten verwaist hat, können Sie das Feld jederzeit wieder in sein ursprüngliches Instrument zurückverschieben; danach kehren seine Daten zurück."
design_1081 = "Bitte beachten Sie, dass dieses Feld für MyCap-Teilnehmerinformationen verwendet wird (z. B. Teilnehmercode oder Beitrittsdatum). Wenn Sie dieses Feld entfernen, können MyCap-Teilnehmerinformationen verloren gehen."
design_1082 = "Ausgewählt lassen, um diese Tabelle in den Ausdruck aufzunehmen"
design_1083 = "Text escapen: Wenn @CALCTEXT Text ausgibt, der in Apostrophe oder Anführungszeichen eingeschlossen ist, und der Text selbst jeweils ein Apostroph oder Anführungszeichen enthält, müssen Sie das Zeichen \"escapen\", indem Sie direkt davor einen Backslash setzen. Zum Beispiel ist <code>if([field]='2', 'Courtney Howell has a \"@CALCTEXT\" tattoo.', 'No tattoo.')</code> ohne Escaping in Ordnung, wenn Sie Anführungszeichen innerhalb von Apostrophen setzen, aber <code>if([field]='4', 'The user\'s guide', 'something else')</code> erfordert Escaping."
