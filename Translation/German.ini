dataqueries_27 = "Der Begriff 'versteckte Felder' bezeichnet alle Felder in einem Fragebogen oder Eingabeformular, die nicht angezeigt werden, weil Verzweigungslogik sie ausblendet; dabei wird angenommen, dass der Wert des Feldes leer/null sein sollte."
dataqueries_28 = "Regel löschen?"
dataqueries_29 = "Ausschließen"
dataqueries_30 = "Was ist 'Ausschluss'?"
dataqueries_31 = "Sie können bestimmte Ergebnisse ausblenden, damit sie nicht immer wieder angezeigt werden, indem Sie sie ausschließen. Klicken Sie einfach in der Diskrepanztabelle einer Regel auf den Link 'ausschließen' für ein Ergebnis. Dieses Ergebnis wird beim nächsten Mal nicht mehr in der Anzahl der Diskrepanzen für diese Regel gezählt und auch nicht in der Ergebnistabelle angezeigt. Ausgeschlossene Ergebnisse können erneut angezeigt werden, indem Sie oben in der Ergebnistabelle für diese Regel auf den Link 'anzeigen' klicken; dort wird die Anzahl ausgeschlossener Ergebnisse angezeigt, sofern welche vorhanden sind. Der Ausschlussstatus von Ergebnissen kann entfernt werden, indem Sie in der Ergebnistabelle für ein ausgeschlossenes Ergebnis auf den Link 'Ausschluss entfernen' klicken."
;; dataqueries_32 is concatenated with a rule name and dataqueries_33 in Classes/System.php and DataQuality.
