design_803 = "von hier entfernen, damit die Feldeinbettung korrekt funktioniert."
design_804 = "Wie ein Feld eingebettet wird"
design_805 = "Die Funktion 'Feldeinbettung' in REDCap ist die umfassendste Möglichkeit, Fragebögen und Datenerfassungsinstrumente so anzupassen, dass sie genau so aussehen, wie Sie es wünschen. Mit Feldeinbettung können Sie Feldelemente auf einer Fragebogenseite oder einem Eingabeformular neu positionieren, sodass sie an einer neuen Stelle auf derselben Seite eingebettet werden. Eingebettete Felder geben Ihnen mehr Kontrolle über Aussehen und Bedienung Ihres Instruments. Sie können Felder z. B. in einem Raster/einer Tabelle platzieren, um eine kompaktere benutzerfreundliche Seite zu erstellen, oder verwandte Felder nah beieinander gruppieren. Die Screenshots unten zeigen Beispiele, wie Feldeinbettung aussieht und wie Sie diese leistungsstarke Funktion nutzen können."
design_806 = "Was ist Feldeinbettung?"
design_807 = "Die folgenden Schritte zeigen die grundlegende Vorlage zum Einbetten eines Feldes."
design_808 = "Erstellen Sie zuerst das Feld. <b>Das Feld muss zuerst existieren, bevor es an anderer Stelle eingebettet werden kann.</b> Hinweis: Sie müssen dem Feld nicht zwingend ein Feldlabel hinzufügen, da dieses Label letztlich ausgeblendet wird, wenn das Feld an eine andere Stelle auf der Seite verschoben wird. Dies gilt auch für die Feldnotiz und den Text '*Wert erforderlich' (falls erforderlich); keiner dieser Textlabels wird mit einem Feld verschoben, wenn es eingebettet wird."
design_809 = "Platzieren Sie den REDCap-Variablennamen des Feldes, das Sie einbetten möchten, <b>in geschweiften Klammern</b> - z. B. {date_of_birth} - und setzen Sie ihn in das Feldlabel, die Feldnotiz, die Abschnittsüberschrift oder das Optionslabel eines anderen Feldes <u>auf demselben Instrument</u>. Feldeinbettung funktioniert nicht instrumentübergreifend, sondern nur im aktuell angezeigten Instrument/Fragebogen. Bei einem mehrseitigen Fragebogen muss das eingebettete Feld auf derselben Fragebogenseite liegen wie sein Host-Feld. <b>Wir empfehlen, den Rich Text Editor intensiv zu verwenden, damit das Feld genau so aussieht, wie Sie es wünschen.</b>"
design_810 = "Beispiel für die Einrichtung eines eingebetteten Feldes im Online Designer mit einer Tabelle im Feldlabel eines beschreibenden Feldes"
design_811 = "Testen Sie es. Erstellen Sie einen Testdatensatz und rufen Sie das Instrument auf, um zu prüfen, ob das eingebettete Feld wie gewünscht aussieht. Falls nicht, passen Sie es mit dem Rich Text Editor weiter an. Der Button 'Instrumentvorschau' im Online Designer kann ebenfalls verwendet werden, um anzusehen, wie das Instrument mit eingebetteten Feldern aussehen könnte, ist aber deutlich eingeschränkter und weniger genau als die Anzeige des Instruments selbst für einen Testdatensatz."
design_812 = "Empfehlungen und Einschränkungen für die Nutzung"
design_813 = "Feldeinbettung verschiebt nur das tatsächliche Eingabeelement (z. B. Textfeld, Radio-Buttons). <b>Feldlabel oder Feldnotiz werden nicht verschoben</b>, allerdings *wird* das Optionslabel bei Radio-/Checkbox-Feldern verschoben, sodass die Radio-/Checkbox-Optionen ihre Labels behalten. Zusätzlich wird <b>die ursprüngliche Position des eingebetteten Feldes vollständig ausgeblendet, nachdem es verschoben wurde</b>. Das bedeutet, dass das eigentliche Feldlabel, die Feldnotiz usw. des Feldes im Fragebogen/Instrument nie tatsächlich zu sehen sind. Es wird empfohlen, auch dann ein Feldlabel hinzuzufügen, wenn das Feld eingebettet wird, da das Label beim Anzeigen eines Reports weiterhin benötigt wird."
design_814 = "Damit Feldeinbettung funktioniert, müssen Sie den <b>Variablennamen in geschweifte Klammern { } setzen</b> - z. B. {date_of_birth}. Dies unterscheidet sich von Piping, das eckige Klammern [ ] verwendet."
design_815 = "<b>Feldeinbettung funktioniert nicht in der REDCap Mobile App</b>. Wenn ein Projekt mit eingebetteten Feldern in die Mobile App geladen wird, sieht es nicht so aus wie auf einer REDCap-Fragebogen-/Instrument-Webseite."
design_816 = "<b>Eingebettete Felder nicht verschachteln:</b> Ein Feld kann nicht in sich selbst eingebettet werden (d. h. in sein eigenes Feldlabel), und ein Feld kann nicht in das Feldlabel oder die Feldnotiz eines anderen Feldes eingebettet werden, wenn dieses Feld ebenfalls an anderer Stelle eingebettet ist. Wenn dies geschieht, erscheint beim Anzeigen des Instruments in den meisten Fällen eine Fehlermeldung. Ein Feld *kann* in das Optionslabel eines Mehrfachauswahlfeldes eingebettet werden (mit Ausnahme von Drop-down-Feldern), das ebenfalls an anderer Stelle eingebettet ist; dies gilt als zusammengesetzte Einbettung."
design_817 = "<b>Feldsymbole hinzufügen:</b> Die üblichen Symbole zu Datenhistorie, Feldkommentaren und (falls aktiviert) Missing Data Codes eines Feldes können in einem Eingabeformular (aber nicht in einem Fragebogen) neben der neuen Position des eingebetteten Feldes angezeigt werden, indem <b><code>:icons</code> an den Variablennamen innerhalb der geschweiften Klammern angehängt wird</b> - z. B. {last_name:icons}. Die Symbole erscheinen standardmäßig nicht, sondern nur, wenn der Kennzeichner ':icons' angehängt ist."
design_818 = "<b>Der häufigste Ort zum Einbetten eines Feldes ist das Feldlabel eines beschreibenden Feldes.</b> Beschreibende Felder sind reine Textblöcke und eignen sich daher sehr gut, um mit dem Rich Text Editor Tabellen oder komplexe Strukturen zum Platzieren von Text und eingebetteten Feldern zu erstellen."
design_819 = "<b>Felder dürfen nur an folgenden Stellen eingebettet werden: im Feldlabel, in der Feldnotiz, in der Abschnittsüberschrift oder im Optionslabel eines anderen Feldes <u>auf demselben Instrument</u>. Bei einem mehrseitigen Fragebogen muss das eingebettete Feld auf derselben Fragebogenseite liegen wie sein Host-Feld.</b> Hinweis: Felder können nicht in Drop-down-Labels, Fragebogenanweisungen, Fragebogenbestätigungstext, Fragebogen-Warteschlangentext oder ausgehende E-Mails/Einladungen/Alarme eingebettet werden."
design_820 = "HINWEIS: Ein oder mehrere Datenerfassungsinstrumente in diesem Projekt nutzen Feldeinbettung, um Felder im Instrument neu zu positionieren. Bitte beachten Sie jedoch, dass die Twilio-Funktionalität für Fragebögen Feldeinbettung nicht unterstützt. <b>Die Funktion Feldeinbettung funktioniert nur beim Ausfüllen eines Fragebogens oder Eingabeformulars im Webseitenformat</b>, nicht im SMS- oder Sprachanrufformat."
; design_821 is concatenated with a dynamic field name.
design_821 = "kann auf dieser Seite nicht eingebettet werden, weil es in einem anderen Instrument oder auf einer anderen Fragebogenseite existiert. Felder dürfen nur auf der Seite eingebettet werden, auf der sie sich befinden."
design_823 = "Das Datensatz-ID-Feld (das erste Feld im Projekt) kann nicht eingebettet werden, weil es ein besonderes Feld ist."
design_824 = "<b>Branching Logic:</b> Wenn ein Feld eingebettet ist und Branching Logic hat, funktioniert die Branching Logic für dieses Feld wie gewohnt, wobei das eingebettete Feld ausgeblendet wird, wenn seine Branching Logic FALSE ergibt. Wenn außerdem das Host-Feld Branching Logic enthält, die dazu führt, dass es ausgeblendet wird, werden auch alle darin eingebetteten Felder ausgeblendet (da sie als Teil des Host-Feldes gelten). Wenn das Host-Feld ausgeblendet wird und eines der eingebetteten Felder im Host-Feld einen Wert hat, erhält der Benutzer, der das Eingabeformular ansieht (Fragebögen ausgenommen), für jedes eingebettete Feld die Aufforderung 'Aktuellen Wert des Feldes löschen?'. Wenn der Benutzer in diesem Fall bei *einem* der eingebetteten Felder auf diese Aufforderung mit 'Abbrechen' reagiert, wird das Host-Feld nicht ausgeblendet, sondern bleibt sichtbar."
