esignature_01 = "E-Signatur- und Sperrverwaltungsmanagement"
esignature_02 = "Die folgende Tabelle zeigt alle vorhandenen Datensätze im Project mit ihrem Status als gesperrt oder e-signiert für alle Datenerhebungsinstrumente. Sie zeigt außerdem Datensätze an, die vollständig gesperrt sind (d. h. auf Datensatzebene gesperrt, nicht auf Instrumentebene). Instrumente, die keine Sperrung erlauben (falls auf der Seite Anpassung der Datensatzsperrung festgelegt), werden unten nicht angezeigt. Wenn für ein Instrument festgelegt wurde, dass die E-Signatur-Option nicht angezeigt wird, es aber dennoch Sperrung erlaubt, wird für den E-Signatur-Status dieses Formulars 'N/A' angezeigt. Sie können die Links unter 'Aktionen' verwenden, um die Tabelle auf verschiedene Arten zu filtern und Zeilen basierend auf Kriterien zu Sperr- oder E-Signatur-Status anzuzeigen oder auszublenden. Sie können auf den Link 'Datensatz anzeigen' klicken, um diesen Datensatz im Datenerhebungsinstrument anzuzeigen; dies wird in einem neuen Fenster geöffnet. Wenn Sie die Tabelle als Datei im CSV-Format exportieren möchten, klicken Sie einfach auf den untenstehenden Link."
esignature_04 = "ALLE ZEILEN ANZEIGEN"
