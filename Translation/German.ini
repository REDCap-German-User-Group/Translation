survey_188 = "Zusätzliche Einstellungen:"
survey_189 = "Was bedeutet das?"
survey_190 = "Diese Option wird häufig verwendet, wenn die Umfrage sensible Daten erheben könnte. In solchen Situationen hilft das Aktivieren dieser Einstellung sicherzustellen, dass Umfrageteilnehmende die Antworten anderer Teilnehmender nicht erfahren können. "
survey_193 = "Möchten Sie später zu dieser Seite zurückkehren?"
survey_194 = "Notieren Sie Ihren Umfrageergebniscode:"
survey_195 = "Sie können NUR dann erneut zu dieser Seite zurückkehren, wenn Sie Ihren Umfrageergebniscode haben. Bitte notieren Sie ihn jetzt."
survey_196 = "<b>FEHLER:</b><br>Der soeben eingegebene Umfrageergebniscode stimmt NICHT mit dem ursprünglich erhaltenen Code überein."
survey_197 = "Möchten Sie die aggregierten Umfrageantworten erneut ansehen?"
survey_198 = "Geben Sie Ihren Umfrageergebniscode ein:"
survey_199 = "Wenn Sie den Umfrageergebniscode eingeben, den Sie direkt nach Abschluss dieser Umfrage erhalten haben, können Sie die aggregierten Umfrageergebnisse ansehen. Wenn Sie den Umfrageergebniscode nicht haben, können Sie die Ergebnisse nicht anzeigen."
survey_200 = "Absenden"
survey_201 = "<b>HINWEIS:</b> Die an die obige Adresse gesendete E-Mail enthält den Umfrageergebniscode <u>NICHT</u>; dieser muss notiert und aufbewahrt werden."
survey_202 = "Für diese Frage liegen nicht genügend Daten vor, um angezeigt zu werden."
survey_203 = "Grafische Diagramme anzeigen (nur)"
survey_204 = "Deskriptive Statistik anzeigen (nur)"
survey_205 = "Sowohl grafische Diagramme als auch deskriptive Statistik anzeigen"
survey_206 = "Dieses Feld kann nicht angezeigt werden, weil keine Daten dafür vorhanden sind."
survey_207 = "Wenn beispielsweise in einer HIV-Studie Teilnehmende eine Umfrage ausfüllen und eine der Fragen lautet 'Haben Sie HIV?', dann würde ein Teilnehmer, wenn alle Teilnehmenden mit 'Ja' antworten, beim Betrachten des Balkendiagramms für diese Frage erkennen, dass alle anderen Teilnehmenden HIV haben. Solches Wissen könnte Vertraulichkeitsvereinbarungen darüber verletzen, wer Kenntnis von medizinischen Informationen einer Person haben darf."
survey_208 = "Im Wesentlichen gilt: Wenn bei einer kategorialen Frage alle Befragten dieselbe Auswahl getroffen haben, wird das Balkendiagramm in den grafischen Ergebnissen nicht angezeigt und stattdessen die folgende Meldung für den Teilnehmer angezeigt:"
survey_209 = "Diagramme:"
survey_210 = "Statistik:"
survey_211 = "Unter jeder Frage wird deskriptive Statistik angezeigt. Für kategoriale Fragen (Multiple Choice) wird die Anzahl aller fehlenden und eindeutigen Werte sowie die Häufigkeit jedes in der Frage ausgewählten Werts angezeigt. Für numerische Fragen wird die Anzahl aller fehlenden und eindeutigen Werte zusammen mit weiteren nützlichen Statistiken angezeigt, z. B. Minimum, Maximum, Mittelwert und Standardabweichung über alle Antworten. Außerdem werden Perzentile und eine Liste der fünf niedrigsten und höchsten Werte für diese Frage angezeigt."
survey_217 = "Leider kann diese Datei aus Sicherheitsgründen erst erneut heruntergeladen werden, nachdem die aktuelle Webseite durch Klicken auf die Schaltfläche unten auf der Seite gespeichert wurde. Sie können dieses Fenster oder diesen Tab in Ihrem Browser schließen."
