design_671 = "Benutzerdefiniertes Eventlabel"
design_672 = "Ein benutzerdefiniertes Eventlabel kann optional zu jedem Event in Ihrem Projekt hinzugefügt werden. Benutzerdefinierte Eventlabels ähneln benutzerdefinierten Datensatzlabels: Sie ermöglichen es, Daten (über Piping) aus einem bestimmten Event in der Tabellenüberschrift des Events anzuzeigen, wenn die Datensatz-Startseite eines Datensatzes angezeigt wird. Wenn z. B. jedes Event einen einzelnen Besuch einer Person darstellt und Sie das Datum in einem Feld namens 'visit_date' in jedem Event erfassen, können Sie das benutzerdefinierte Eventlabel für alle Besuchsevents auf '[visit_date]' setzen. Dies liefert nützlichen Kontext für jedes Event, wenn alle Events des Datensatzes angezeigt werden. Sie können das Piping auch erweitern, indem Sie mehrere Felder und sogar statischen Text verwenden. Zum Beispiel: '[visit_date], [weight] kg'."
