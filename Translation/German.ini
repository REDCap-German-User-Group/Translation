system_config_483 = "TIPP: Statt E-Mail für den 2-Schritt-Login zu verwenden, können Sie REDCap alternativ eine SMS senden oder Ihr Telefon anrufen lassen. Um dies einzurichten, gehen Sie *nach* dem Login in REDCap mit dem obigen Code zu Ihrer Profilseite (siehe Link oben rechts auf der Seite Meine Projekte) und fügen Sie Ihrem Benutzerkonto Ihre Telefonnummer(n) hinzu."
system_config_484 = "FEHLER: Der Wert 'SmsUrl' für Ihre Telefonnummer in Ihrem Twilio-Konto ist nicht korrekt und muss korrigiert werden, damit Benutzer auf SMS-Nachrichten antworten können, die ihnen für die Zwei-Faktor-Authentifizierung gesendet wurden. Um dies zu beheben, gehen Sie einfach zum Twilio-Abschnitt unten auf dieser Seite und klicken Sie auf den Button 'Twilio-Zugangsdaten testen' ODER klicken Sie einfach unten auf dieser Seite auf Speichern."
