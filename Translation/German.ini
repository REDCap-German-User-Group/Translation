cc_fhir_clear_expired_tokens_title = "Abgelaufene Tokens"
cc_fhir_clear_expired_tokens_description = "Diese Seite bietet eine Übersicht über abgelaufene Tokens für jedes in REDCap verfügbare EHR-System. Sie zeigt die Gesamtzahl der Tokens an, deren gültige Lebensdauer überschritten wurde. Tokens gelten als abgelaufen, sobald ihr Ablaufdatum mehr als 30 Tage überschritten hat; dies ist der typische maximale Zeitraum, in dem ein Refresh Token zur Beschaffung von Access Tokens nutzbar bleibt. Zusätzlich zur Anzeige dieser Zählungen können Benutzer die abgelaufenen Tokens manuell löschen, um das System aktuell zu halten."
cc_fhir_clear_expired_tokens_confirmation = "Möchten Sie die abgelaufenen Tokens wirklich löschen?"

