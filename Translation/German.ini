update_pk_02 = "Changing the record ID field may not have been intentional."
update_pk_03 = "How to fix this issue:"
update_pk_04 = "Now that the first form has been moved, your new record ID field is the field named"
update_pk_05 = "This means that the data for all currently existing records will not be able to be retrieved properly on some pages in the project and may introduce further data errors."
update_pk_06 = "To prevent data errors and eliminate this issue, you may 1) erase all data in the project by using the Control Panel & Settings page, 2) move the form back to its original position as the first form, or 3) move the record identifier field back to the new first form (this can also be done by deleting it from the other form and creating it anew on the new first form or by moving it to the first-field position in your data dictionary)."
