system_config_701 = "URL-Kürzungsservice"
system_config_703 = "Wenn aktiviert, bietet REDCap die Option, den URL-Kürzungsservice REDCAP.LINK zu verwenden, um öffentliche Fragebogenlinks, Links für öffentliche Projekt-Dashboards und öffentliche Report-Links zu kürzen oder anzupassen. Dieser Service wird von Vanderbilt auf AWS gehostet. Wenn Ihr Server hinter einer Firewall steht und keine ausgehenden HTTP-Anfragen an Websites im Web stellen kann, sollten Sie diesen Service deaktivieren."
system_config_704 = "Zum Profil"
system_config_706 = "Google Authenticator oder Microsoft Authenticator"
system_config_707 = "Öffnen Sie die Google-Authenticator- oder Microsoft-Authenticator-App auf Ihrem Mobilgerät, um den Verifizierungscode zu erhalten, der mit Ihrem REDCap-Benutzerkonto verknüpft ist."
system_config_708 = "HINWEIS: Wenn Sie REDCap noch nicht in Ihrer Google-Authenticator- oder Microsoft-Authenticator-App auf Ihrem Mobilgerät eingerichtet haben, können Sie dies auf Ihrer Profilseite in REDCap tun, nachdem Sie sich mit *einer anderen* Login-Methode angemeldet haben."
system_config_709 = "Wie richte ich Google Authenticator oder Microsoft Authenticator ein?"
system_config_710 = "(Optional) Option Google/Microsoft Authenticator App für Zwei-Faktor-Authentifizierung aktivieren?"
system_config_711 = "Wenn aktiviert, kann die Option 'Google Authenticator/Microsoft Authenticator' für Zwei-Faktor-Authentifizierung verwendet werden, wobei der Benutzer den 6-stelligen Verifizierungscode aus der Google-Authenticator- oder Microsoft-Authenticator-App auf seinem Mobilgerät erhält."
system_config_712 = "HINWEIS: Bevor die App für Zwei-Faktor-Authentifizierung verwendet wird, muss der Benutzer zuerst Google Authenticator oder Microsoft Authenticator mithilfe der Anweisungen und des QR-Codes auf seiner Profilseite einrichten."
system_config_714 = "Um Zwei-Schritt-Verifizierung zum Login in REDCap mit der Google-Authenticator- oder Microsoft-Authenticator-Mobile-App zu verwenden, müssen Sie die App zuerst auf Ihr Mobilgerät herunterladen. Verwenden Sie einen der untenstehenden Links, um die App auf Ihr Mobilgerät herunterzuladen."
system_config_715 = "Laden Sie die App herunter, indem Sie im App Store Ihres Mobilgeräts (z. B. Apple App Store, Google Play Store) nach '<b>Google Authenticator</b>' oder '<b>Microsoft Authenticator</b>' suchen."
system_config_716 = "1) Google-Authenticator- oder Microsoft-Authenticator-App auf Ihr Mobilgerät herunterladen"
system_config_717 = "Nachdem Sie den QR-Code mit der Google-Authenticator- oder Microsoft-Authenticator-App gescannt haben, können Sie die App künftig jederzeit öffnen, um Ihren Verifizierungscode für REDCap zu erhalten. Der Verifizierungscode ändert sich ständig, sodass er bei jedem Login anders ist. <b>HINWEIS: Die App benötigt keine Internetverbindung</b> auf Ihrem Gerät, um zu funktionieren."
system_config_718 = "1) Soll der Protected Email Mode für alle Alarme, Umfrageeinladungen und Bestätigungs-E-Mails für Fragebögen gelten oder nur für diejenigen, deren E-Mail-Body Daten aus Identifier-Feldern pipet?"
system_config_719 = "Nur diejenigen mit gepipeten Daten aus Identifier-Feldern"
system_config_720 = "Alle Alarme, Umfrageeinladungen und Bestätigungs-E-Mails für Fragebögen"
system_config_721 = "Diese Einstellung verhindert, dass identifizierende Daten (PHI/PII) in ausgehenden E-Mails für Alarme, Umfrageeinladungen und Bestätigungs-E-Mails für Fragebögen gesendet werden. Wenn hier auf Systemebene aktiviert, sehen Benutzer im Dialog Zusätzliche Anpassungen auf der Projekt-Setup-Seite eine Option, um den Protected Email Mode in ihrem Projekt zu aktivieren. Wenn diese Funktion dann in einem Projekt aktiviert ist, sind entweder A) alle Alarme, Umfrageeinladungen und Bestätigungs-E-Mails für Fragebögen oder B) diejenigen betroffen, deren E-Mail-Body versucht, Daten aus Identifier-Feldern zu pipen. Dabei wird nicht der vollständige E-Mail-Text an den Empfänger gesendet, sondern stattdessen eine Ersatz-E-Mail mit einem Link, der zu einer sicheren REDCap-Seite führt, auf der die ursprüngliche E-Mail angezeigt werden kann. Wenn der Empfänger auf den Link klickt, kann er zu einer sicheren REDCap-Seite navigieren, auf der er die ursprüngliche E-Mail anzeigen kann. Wenn er zum ersten Mal (oder nach mehr als einem Monat) auf eine E-Mail im Protected Email Mode zugreift, wird ein Sicherheitscode an seinen Posteingang gesendet, der dem Empfänger erlaubt, bis zu 30 Tage auf demselben Gerät geschützte E-Mails anzuzeigen."
system_config_722 = "Verhindern, dass identifizierende Daten (PHI/PII) in ausgehenden E-Mails für Alarme, Umfrageeinladungen und Bestätigungs-E-Mails für Fragebögen gesendet werden."
system_config_723 = "Diese Einstellung verhindert, dass identifizierende Daten (PHI/PII) in ausgehenden E-Mails für Alarme, Umfrageeinladungen und Bestätigungs-E-Mails für Fragebögen gesendet werden. Wenn aktiviert, sind entweder A) alle Alarme, Umfrageeinladungen und Bestätigungs-E-Mails für Fragebögen oder B) diejenigen betroffen, deren E-Mail-Body versucht, Daten aus Identifier-Feldern zu pipen. Dabei <b>wird nicht der vollständige E-Mail-Text an den Empfänger gesendet, sondern stattdessen eine Ersatz-E-Mail mit einem Link, der zu einer sicheren REDCap-Seite führt, auf der die ursprüngliche E-Mail angezeigt werden kann</b>. Wenn er zum ersten Mal (oder nach mehr als einem Monat) auf eine E-Mail im Protected Email Mode zugreift, wird ein Sicherheitscode an seinen Posteingang gesendet, der dem Empfänger erlaubt, bis zu 30 Tage auf demselben Gerät geschützte E-Mails anzuzeigen."
system_config_724 = "2) Optionaler benutzerdefinierter Text, der im E-Mail-Header und Seiten-Header angezeigt wird, den der Empfänger sieht. Standardtext: <i>REDCap Secure Messaging</i>."
