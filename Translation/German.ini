survey_1150 = "Leider müssen Sie zuerst die Option 'Speichern und später zurückkehren' aktivieren, bevor Sie die Kontrollkästchen-Einstellung aktivieren können, die Befragten erlaubt, ohne Rückkehrcode zu ihrer Umfrageantwort zurückzukehren."
