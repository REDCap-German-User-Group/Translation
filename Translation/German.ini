design_388 = "Das gerade hochgeladene Data Dictionary enthielt KEINE Felder. Es wird nur akzeptiert, wenn mindestens ein Feld im Data Dictionary definiert ist. Bitte stellen Sie sicher, dass Sie die richtige Datei hochladen, und versuchen Sie es erneut."
