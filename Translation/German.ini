control_center_4944 = "Anzahl der Tage zwischen Projektlöschung und endgültigem Entfernen des Projekts aus dem System"
control_center_4945 = "REDCap löscht das Projekt bei Antrag nicht sofort. Stattdessen speichert REDCap das Löschdatum, blendet das Projekt für die Projektbenutzer aus und wartet so viele Tage, bevor es dauerhaft aus dem System entfernt wird. Ein REDCap-Administrator kann das Projekt vor dem endgültigen Entfernen einfach wiederherstellen. Nach dem endgültigen Entfernen würde die Wiederherstellung jedoch Disaster-Recovery-Backups erfordern. In vielen Fällen kann ein Projekt aufgrund unterschiedlicher Projektkomplexität möglicherweise nicht wiederhergestellt werden."
control_center_4946 = "Universelle DO-NOT-REPLY-E-Mail-Adresse für einige von REDCap gesendete E-Mails festlegen (optional)"
control_center_4947 = "TIPP: Wenn die universelle FROM-E-Mail-Adresse gesetzt ist, wird diese E-Mail-Adresse als Absender der E-Mail verwendet. Die Reply-to-Adresse ist jedoch die oben festgelegte DO-NOT-REPLY-E-Mail-Adresse.<br>"
control_center_4948 = "Diese E-Mail-Adresse wird für systemgenerierte E-Mails von REDCap verwendet, einschließlich User-Access-Dashboard-Erinnerungen, bestimmter Admin-E-Mails und Messenger-Benachrichtigungen. Diese Adresse wird typischerweise nicht überwacht und ist nicht dafür vorgesehen, dass Benutzer darauf antworten."
control_center_4949 = "<b>KEINE gültige JSON-Antwort erhalten - KRITISCH:</b> MyCap kann über API-Aufrufe keine gültige JSON-Antwort erhalten. Wir haben erwartet, dass eine Antwort im JSON-Format aus der Anfrage zurückgegeben wird.<br>Hinweis: Sekundäre Tests können nur ausgeführt werden, wenn dieser Test bestanden wird."
control_center_4950 = "Dieser Typ von EXPLAIN-Abfrage ist nicht erlaubt"
control_center_4951 = "Bitte beachten Sie, dass Datum/Uhrzeit, die für den Benutzerablauf eingegeben wurden, entweder das heutige Datum oder ein Datum in der Vergangenheit sind. Wenn dies ein Fehler ist, sollten Sie erwägen, diesen Wert zu ändern. Wenn dies korrekt ist, fahren Sie fort, indem Sie erneut auf den Button Speichern klicken."
