design_384 = "Unabhängig davon, ob der Entwurfsmodus aktiv ist oder nicht, dürfen Sie jedoch für alle unten aufgeführten Instrumente das PDF herunterladen oder Fragebogeneinstellungen ändern."
design_385 = "Das Projekt befindet sich nun im Entwurfsmodus. Wenn Sie Ihre Änderungen an den Instrumenten abgeschlossen haben, klicken Sie auf den Button 'Änderungen zur Prüfung einreichen', damit Ihre Änderungen freigegeben werden können."
