multilang_55 = "Auf dieser Seite können Sie mehrere Anzeigesprachen für Ihr Projekt erstellen und konfigurieren (für Fragebögen, Eingabeformulare, Alarme, Umfrageeinladungen usw.) oder alternativ Übersetzungen mithilfe einer Datei exportieren und importieren. Vergessen Sie nicht, Ihre Änderungen jederzeit auf dieser Seite zu <b>speichern</b> (Tastenkürzel: <span class='badge badge-secondary shortcut fs11' data-bs-toggle='tooltip' title='On Mac, use CMD-S'>CTRL-S</span>), wenn Sie mit der Bearbeitung fertig sind. HINWEIS: <u>Diese Seite übersetzt Ihren Text nicht automatisch für Sie</u>, sondern stellt Tools bereit, damit Sie ihn leicht selbst übersetzen können."
multilang_56 = "Auf dieser Seite können Sie mehrere auf dieser REDCap-Installation verfügbare Anzeigesprachen erstellen und konfigurieren, die Projekte für ihre Benutzeroberflächenübersetzungen verwenden können. Wenn sie in einem Projekt verwendet werden, werden hier definierte Benutzeroberflächenübersetzungen in das Projekt kopiert und können dort frei angepasst werden. Vergessen Sie nicht, Ihre Änderungen jederzeit auf dieser Seite zu <b>speichern</b> (Tastenkürzel: <span class='badge badge-secondary shortcut fs11' data-bs-toggle='tooltip' title='On Mac, use CMD-S'>CTRL-S</span>), wenn Sie mit der Bearbeitung fertig sind. HINWEIS: Diese Seite <u>übersetzt</u> Ihren Text <u>nicht automatisch</u>, sondern stellt Tools bereit, damit Sie ihn leicht selbst übersetzen können."
