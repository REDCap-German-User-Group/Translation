dataqueries_251 = "Bitte beachten Sie, dass bei Verwendung des Benutzerfilters zusammen mit der Stichwortsuche die Suche/Filterung jeweils unabhängig auf Thread-Ebene (statt auf Kommentar-Ebene) durchgeführt wird. Das bedeutet beispielsweise: Wenn Sie nach Stichwort suchen und gleichzeitig nach einem Benutzer filtern, werden Ergebnisse (d. h. Threads) zurückgegeben, in denen dieser Benutzer mindestens einen Kommentar zum gesamten Thread beigetragen hat und das Stichwort ebenfalls in mindestens einem Kommentar desselben Threads gefunden wurde. Es werden also nicht nur Threads zurückgegeben, in denen dieser Benutzer einen Kommentar mit diesem Stichwort hinzugefügt hat."
