survey_350 = "Umfrageeinladungsprotokoll"
survey_351 = "[Erste Umfrage]"
survey_352 = "Öffentliche Umfrage noch nicht eingerichtet!"
survey_353 = "Die öffentliche Umfrage wurde noch nicht eingerichtet, daher kann hier kein öffentlicher Umfragelink angezeigt werden. Eine öffentliche Umfrage liegt vor, wenn das erste Instrument in Ihrem Projekt als Umfrage aktiviert wurde. Wenn Sie eine öffentliche Umfrage aktivieren möchten, können Sie auf die Schaltfläche unten klicken; danach können Sie Ihren öffentlichen Umfragelink abrufen und die Teilnehmerliste für die öffentliche Umfrage verwenden."
survey_354 = "Öffentliche Umfrage aktivieren"
survey_355 = "Mit der Teilnehmerliste können Sie <b>eine angepasste E-Mail</b> an jede Person in Ihrer Liste senden und <b>nachverfolgen, wer auf Ihre Umfrage antwortet</b>. Es ist außerdem möglich, die Umfrageantworten einer einzelnen Person zu identifizieren, wenn gewünscht, indem Sie für jeden Teilnehmer eine Kennung angeben (diese Funktion muss zuerst durch Klicken auf die Schaltfläche 'Aktivieren' in der Tabelle unten aktiviert werden)."
survey_357 = "Sie können die Seite 'Survey Distribution Tools' erst verwenden, nachdem Sie eine oder mehrere Umfragen aktiviert haben. Sie können Umfragen hier im Online Designer aktivieren, indem Sie für ein bestimmtes Datenerhebungsinstrument auf die Schaltfläche Aktivieren klicken. Sobald Sie ein Instrument als Umfrage aktiviert haben, können Sie dafür Daten erheben, indem Sie Umfragen über die Seite 'Survey Distribution Tools' im linken Menü verteilen."
survey_358 = "ALLE TEILNEHMENDEN ENTFERNEN?"
survey_360 = "TEILNEHMER ENTFERNEN?"
survey_361 = "Sind Sie sicher, dass Sie den Teilnehmer aus der Liste entfernen möchten? Wenn er die Umfrage bereits abgeschlossen hat, werden dadurch seine gespeicherten Antworten NICHT gelöscht, sondern lediglich die Verbindung zwischen ihm und seinen Antworten zerstört."
survey_362 = "TEILNEHMER ENTFERNT!"
survey_363 = "Der Teilnehmer wurde nun aus der Teilnehmerliste gelöscht."
survey_368 = "Alle entfernen"
survey_369 = "SIND SIE SICHER?"
survey_371 = "Wenn Sie keine durch Umfrageantworten ausgelösten E-Mail-Bestätigungen mehr erhalten möchten, entfernen Sie einfach im Benachrichtigungs-Popup auf der"
survey_372 = "Alle Umfragen anzeigen"
survey_373 = "Option:"
survey_374 = "Umfragestatus"
survey_375 = "Umfrage offline"
survey_376 = "Umfrage aktiv"
survey_377 = "Wenn offline, können Befragte die Umfrage nicht ausfüllen."
survey_378 = "(zuvor eingegeben)"
survey_381 = "Bitte beachten Sie, dass das Löschen der Umfrageeinstellungen KEINE mit der Umfrage erhobenen Antworten löscht. Außerdem löscht das Löschen der Umfrageeinstellungen NICHT das Datenerhebungsinstrument; stattdessen wird das Instrument in den Zustand zurückversetzt, in dem es war, bevor es als Umfrage aktiviert wurde, sodass Daten nur von authentifizierten Benutzern auf dem Dateneingabeformular erhoben werden können."
survey_382 = "Wenn diese Umfrage gelöscht wird, werden alle Teilnehmenden aus Ihren mit dieser Umfrage verbundenen Teilnehmerlisten entfernt, und alle Umfragelinks und Rückkehrcodes funktionieren für diese Umfrage nicht mehr. Alle E-Mail-Einladungen, die für diese Umfrage zum Versand geplant wurden, werden gelöscht. Außerdem wird bei allen Umfrageantworten der Zeitstempel 'survey completion' entfernt, wie er in einer Datenexportdatei oder auf dem Dateneingabeformular zu sehen ist. Wenn Sie die Umfrage löschen, können Sie das Datenerhebungsinstrument erneut als Umfrage aktivieren, verlieren aber weiterhin alle bisher genannten umfragebezogenen Informationen."
survey_384 = "Umfrage erfolgreich gelöscht!"
survey_385 = "Die Umfrage wurde erfolgreich gelöscht. Sie werden nun zurück zum Online Designer weitergeleitet."
survey_386 = "Projekte mit Umfragen"
survey_387 = "Projekte ohne Umfragen"
survey_388 = "Teilnehmende können für diese Umfrage nicht hinzugefügt werden"
survey_389 = "Umfrageteilnehmende können hier nicht hinzugefügt werden, weil sie nur zu einer 'ersten Umfrage' hinzugefügt werden können, also zu Ihrem ersten Datenerhebungsinstrument. Wenn Sie Ihr erstes Datenerhebungsinstrument bereits als Umfrage aktiviert haben, können Sie es aus der Dropdown-Liste der Umfragen in der Teilnehmerliste auswählen; danach ist die Schaltfläche Teilnehmende hinzufügen nicht mehr deaktiviert, und Sie können darauf klicken, um weitere Umfrageteilnehmende hinzuzufügen. Wenn Sie Ihr erstes Datenerhebungsinstrument noch nicht als Umfrage aktiviert haben, können Sie dies auf der Online-Designer-Seite tun."
survey_392 = "Teilnehmer-E-Mail"
survey_393 = "Umfrageeinladung anzeigen"
survey_394 = "Geplant zum Versand um"
survey_395 = "Sendezeit:"
survey_396 = "(konnte nicht gesendet werden)"
survey_397 = "[kein Betreff]"
survey_399 = "Unten sind die Umfrageeinladungen aufgeführt, die bereits an Umfrageteilnehmende in diesem Projekt gesendet wurden oder zum Versand geplant sind. Für jede Einladung werden Teilnehmer-E-Mail, Teilnehmerkennung (falls vorhanden), Umfragename und Datum/Uhrzeit angezeigt, zu der die Einladung gesendet wurde (oder gesendet wird). Sie können sogar die Einladungs-E-Mail selbst anzeigen, indem Sie auf das Symbol in der Spalte 'E-Mail anzeigen' klicken. Bitte beachten Sie, dass alle untenstehenden Zeiten der Zeitzone entsprechen"
survey_401 = "Automatisch gesendet über automatisierte Einladungen von"
survey_402 = "Der Filter 'Beginnzeit' liegt nach dem Filter 'Endzeit'. Bitte ändern Sie einen oder beide, sodass die 'Endzeit' später ist; andernfalls können mit den aktuellen Filtereinstellungen keine Einladungen angezeigt werden."
survey_403 = "Dieses Feld ist ein Formularstatusfeld, dessen Wert bei Umfrageantworten während eines Datenimports nicht geändert werden kann. Da dies eine Umfrageantwort ist, kann der Wert dieses Felds nur in der Umfrage selbst oder durch Markieren als abgeschlossene Antwort auf dem Dateneingabeformular geändert werden."
survey_404 = "eine Umfrage auswählen"
survey_406 = "Beim Definieren der untenstehenden Bedingungen können Sie wählen, ob Umfrageeinladungen durch den Abschluss einer Umfrage oder dadurch ausgelöst werden, dass vordefinierte Logik wahr wird (d. h. wenn die Datenwerte eines bestimmten Datensatzes eine Anforderung erfüllen). Sie können entweder die Logik- oder Umfrageabschlussoptionen als Trigger verwenden oder beide zusammen. (Bitte beachten Sie: Wenn Sie einstellen, dass eine Einladung beim Abschluss einer bestimmten Umfrage ausgelöst wird, umfasst dies auch, wenn ein Nicht-Umfrage-Benutzer das Formularstatusfeld des entsprechenden Dateneingabeformulars dieser Umfrage auf 'Complete' setzt.) Beim Festlegen der Zeit, nach der die Einladungen gesendet werden, können Sie die Einladung sofort nach Erfüllung der Bedingungen oder zu einer relativen oder festen Zeit danach senden lassen. Schließlich müssen Sie die hier definierten automatisierten Einladungseinstellungen aktivieren; das bedeutet, dass Ihre Einstellungen sofort initiiert werden und REDCap aktiv 'lauscht', um Einladungen für Ihre Umfragen anhand der von Ihnen definierten Bedingungen zu senden/zu planen."
survey_407 = "HINWEIS: Da dieses Projekt longitudinal ist, MÜSSEN Sie bei Verwendung von Logik als Bedingung den Event-Namen in der Logik angeben, wenn Sie ein Feld spezifizieren. Wenn Ihre Logik z. B. [age] > 30 lauten soll, sollten Sie zusätzlich den eindeutigen Event-Namen vor den Variablennamen setzen: [enrollment_arm1][age] > 30. Dadurch weiß REDCap, welches Event bei der Auswertung der Logik betrachtet werden soll. Wenn der Event-Name nicht angegeben wird, wird die Logik möglicherweise nicht korrekt ausgewertet, und Umfrageeinladungen werden möglicherweise nicht gesendet, wenn sie gesendet werden sollten."
survey_408 = "Einstellungen für automatisierte Einladungen wurden erfolgreich gespeichert!"
survey_409 = "Ihre Einstellungen, die Sie für das Senden automatisierter Umfrageeinladungen definiert haben, wurden nun gespeichert für"
survey_412 = "Noch keine Einladungen gesendet"
survey_413 = "Einladungsstatus:"
survey_414 = "Es ist außerdem wichtig zu erkennen, dass immer dann, wenn die untenstehenden Bedingungen erfüllt sind, die Umfrageeinladung genau in diesem Moment geplant wird (egal ob sie sofort, nach einer Minute oder nach einem Monat gesendet werden soll). Wenn eine Einladung beispielsweise anhand von Datenwerten mit bedingter Logik geplant wird, wird sie zum Versand geplant, wenn diese Logik wahr ergibt, selbst wenn die Daten anschließend wieder geändert werden und die Logik dann nicht mehr wahr ergibt. Auch wenn die Datenwerte also zurückgesetzt werden, bleibt die Einladung weiterhin als geplant bestehen."
survey_415 = "Bitte beachten Sie: Da Sie gerade das erste Event dieses Arms an eine andere Position verschoben haben (d. h. es ist nicht mehr das erste Event), hat sich Ihr öffentlicher Umfragelink geändert und verweist nun auf eine andere URL (oben auf der Seite Survey Distribution Tools zu finden). Es sind keine Daten verloren gegangen, aber wenn Sie bereits Umfrageantworten über den öffentlichen Umfragelink gesammelt haben, sollten Sie erwägen, das Event mit dem Namen"
