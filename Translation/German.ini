data_access_groups_ajax_40 = "Sie können einen Benutzer einer Zugriffsgruppe zuweisen, indem Sie unten den Benutzernamen und den Gruppennamen auswählen und dann auf den Button 'Zuweisen' klicken. Nach der Zuweisung zu einer Zugriffsgruppe kann der Benutzer NUR die Projektdatensätze sehen, die von ihm selbst und anderen in dieser Gruppe erstellt wurden. Dies umfasst die Möglichkeit, Datensätze in Eingabeformularen, in Reports und in exportierten Datensätzen anzuzeigen. Die Zuweisung von Benutzern zu einer Gruppe kann aufgehoben werden, indem der Benutzername ausgewählt und 'Keine Zuweisung' ausgewählt wird."
data_access_groups_ajax_41 = "Gruppen-ID-Nummer"
data_access_groups_ajax_42 = "Die Gruppen-ID-Nummer wird automatisch von REDCap generiert und verwendet, wenn die automatische Datensatznummerierung in einem Projekt aktiviert wurde. Dabei wird Datensätzen, die von jemandem erstellt werden, der einer Zugriffsgruppe (DAG) zugewiesen ist, automatisch die Gruppen-ID-Nummer mit einem Bindestrich vor den Datensatznamen gesetzt. Beispielsweise könnten die ersten drei Datensätze für eine DAG automatisch 98-1, 98-2 und 98-3 heißen, wenn die Gruppen-ID-Nummer 98 ist. Ohne Nutzung von DAGs in einem Projekt würde der Mechanismus zur automatischen Datensatznummerierung die Datensätze stattdessen 1, 2 bzw. 3 nennen. Die vorangestellte Gruppen-ID-Nummer bietet eine inhärente Gruppierung, durch die Datensätze beim Anzeigen der Datensatzliste in einem Projekt natürlich sortiert und gruppiert werden können. Die Gruppen-ID-Nummer wird in der Tabelle auf dieser Seite angezeigt, damit Benutzer wissen, welche Gruppen-ID-Nummer jede DAG hat."
data_access_groups_ajax_43 = "Die Gruppe konnte nicht gelöscht werden, weil ihr noch ein oder mehrere Datensätze zugewiesen sind. Heben Sie zuerst die Zuweisung aller Datensätze auf. Anschließend können Sie die Gruppe löschen."
data_access_groups_ajax_44 = "Sie können neue DAGs zum Projekt hinzufügen oder den DAG-Namen bestehender DAGs aktualisieren, indem Sie eine CSV-Datei mit einer neuen DAG-Konfiguration hochladen. Das Format der CSV-Upload-Datei erhalten Sie durch Exportieren der CSV-Datei Ihrer bestehenden DAGs. <b>HINWEIS:</b> DAGs können umbenannt werden, indem einfach der DAG-Name in der CSV-Datei geändert wird. DAGs können nicht über die CSV-Datei gelöscht werden. Wenn Sie eine DAG löschen möchten, tun Sie dies bitte über die angegebenen Links für jede DAG auf dieser Seite."
data_access_groups_ajax_45 = "Wählen Sie Ihre CSV-Datei mit hinzuzufügenden oder umzubenennenden DAGs aus:"
data_access_groups_ajax_46 = "Sie können Benutzer jeder Zugriffsgruppe zuweisen, indem Sie eine CSV-Datei hochladen. Das Format der CSV-Upload-Datei erhalten Sie durch Exportieren der CSV-Datei Ihrer bestehenden User-DAG-Zuweisungen. <b>HINWEIS:</b> Wenn Sie eine bestehende Zuordnung ändern möchten, *müssen* Sie den eindeutigen Benutzernamen und Gruppennamen angeben. Wenn die Spalte 'redcap_data_access_group' nicht bereitgestellt wird, wird der Benutzer keiner Gruppe zugewiesen."
data_access_groups_ajax_47 = "Wählen Sie Ihre CSV-Datei mit hinzuzufügenden oder zu ändernden User-DAG-Zuweisungen aus:"
