design_250 = "Was ist die REDCap Shared Library?"
design_251 = "Wenn Ihr REDCap-Projekt den Produktionsstatus hat, können Sie auch eigene Datenerfassungsinstrumente teilen, die Sie erstellt haben, indem Sie einzelne Instrumente in die Shared Library hochladen. Danach sind sie für jeden REDCap-Benutzer weltweit zugänglich und herunterladbar. Sie können einzelne Instrumente in die Shared Library stellen, wodurch Ihr Instrument für REDCap-Benutzer überall verfügbar wird. Wenn Sie jedoch ein ganzes Projekt oder mehrere Instrumente auf einmal mit einer einzelnen Person, z. B. einem Kollegen, teilen möchten, ist es möglicherweise besser, einfach das Data Dictionary zu exportieren und zu senden. (HINWEIS: Urheberrechtlich geschütztes Material darf nur geteilt werden, wenn Sie der Rechteinhaber sind.)"
