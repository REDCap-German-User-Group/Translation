mycap_mobile_app_771 = "<b>Mit einem Alarm:</b> Kopieren Sie den obigen Text und fügen Sie ihn in den Textkörper eines Alarms ein, der nach Erstellung des Datensatzes jederzeit an den Teilnehmer gesendet wird."
