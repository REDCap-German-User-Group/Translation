control_center_383 = "Passwort wurde noch nie zurückgesetzt"
control_center_385 = "Unterstützen Sie REDCap, indem Sie Ihre REDCap-Statistiken an das Konsortium melden, vorzugsweise wöchentlich. Sie können auf der Seite Allgemeine Konfiguration im Control Center festlegen, dass Ihre Statistiken automatisch einmal pro Woche gesendet werden. Ihre Teilnahme hilft, die langfristige Zukunft von REDCap und des Konsortiums zu fördern."
control_center_386 = "Karte der Benutzer"
control_center_387 = "Auf dieser Seite können Sie auf einer Karte die Standorte aller Benutzer anzeigen, die in einem bestimmten Zeitraum auf REDCap zugegriffen haben. (Die Karte schließt Fragebogenteilnehmer aus, da REDCap die IP-Adresse von Fragebogenteilnehmern nicht nachverfolgt.) Sie können das Zeitfenster, das die Karte darstellt, ändern, indem Sie direkt über der Karte eine andere Option in der Drop-down-Liste auswählen."
control_center_388 = "Bitte beachten Sie, dass die auf der Karte angezeigten GPS-Standorte möglicherweise nicht zu 100 % präzise sind und Ungenauigkeiten enthalten können."
control_center_389 = "Setup und Konfiguration"
control_center_390 = "Es scheint, dass Sie diese Seite bisher möglicherweise noch nicht verwendet haben. Um sicherzustellen, dass diese Seite mit Ihrer Serverkonfiguration erfolgreich funktioniert, wird empfohlen, einen initialen Test durchzuführen. (HINWEIS: Wenn Ihr Webserver hinter einer Firewall liegt und keine externen Websites im World Wide Web kontaktieren kann, funktioniert diese Seite nicht, da sie die Nutzung von Webdiensten Dritter erfordert.)"
control_center_391 = "Webdienst testen"
control_center_392 = "Fehlgeschlagen!"
control_center_393 = "Erfolg! Der Webdienst wurde erfolgreich kontaktiert. Die Seite wird nun aktualisiert, damit Sie die Dienste nutzen können."
control_center_394 = "Fehlgeschlagen! Leider konnte Ihr Server den Webdienst nicht kontaktieren, sodass Sie die Dienste auf dieser Seite nicht nutzen können. Der Grund dafür könnte sein, dass der Server hinter einer Firewall liegt und keine ausgehenden Aufrufe ins Web durchführen kann."
