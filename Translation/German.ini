data_access_groups_01 = "Der Zugriff auf bestimmte Projektdatensätze kann durch Zugriffsgruppen (DAGs) eingeschränkt werden. Dabei können nur Benutzer innerhalb einer bestimmten Zugriffsgruppe auf Datensätze zugreifen, die von Benutzern innerhalb dieser Gruppe erstellt wurden. Dies kann bei einem Multi-Site- oder Mehrgruppenprojekt nützlich sein, bei dem Gruppen nicht auf die Daten anderer Gruppen zugreifen dürfen."
data_access_groups_02 = "Unten können Sie Zugriffsgruppen für dieses Projekt erstellen und anschließend jeden aktuellen Benutzer dieser Gruppe zuweisen. Sie können die Gruppe jederzeit löschen, wenn Sie möchten. Um eine bestehende Zugriffsgruppe umzubenennen, klicken Sie einfach unten in der Tabelle auf den Gruppennamen und geben Sie den neuen Namen ein."
data_access_groups_03 = "EINGESCHRÄNKT:"
data_access_groups_04 = "Sie haben keine Berechtigung, diese Seite anzuzeigen, weil Sie einer Zugriffsgruppe zugewiesen wurden."
data_access_groups_06 = "Klicken, um Gruppe umzubenennen"
data_access_groups_07 = "VIDEO: Verwendung von Zugriffsgruppen"
data_access_groups_08 = "DAG Switcher:"
data_access_groups_09 = "Benutzer, die Zugriffsgruppen (DAGs) zugewiesen sind, können optional mehreren *potenziellen* DAGs zugewiesen werden. Dadurch kann ihnen die Berechtigung gegeben werden, jederzeit selbständig in bestimmte DAGs hinein und aus ihnen heraus zu wechseln. Um einen Benutzer mehreren DAGs zuzuweisen, aktivieren Sie unten die Kontrollkästchen für diesen Benutzer. Für einen Benutzer müssen mindestens zwei DAGs aktiviert sein, damit er den DAG Switcher verwenden kann. HINWEIS: Dies überschreibt nicht die <u>aktuelle</u> DAG-Zuweisung eines Benutzers, wie sie oben oder auf der Seite Benutzerrechte festgelegt wurde."
data_access_groups_10 = "Zeilen sind DAGs"
data_access_groups_11 = "Zeilen sind Benutzer"
data_access_groups_12 = "Administratoren sehen alles!"
data_access_groups_13 = "Aktuelle Zugriffsgruppe:"
data_access_groups_14 = "Wählen Sie die Zugriffsgruppe aus, zu der Sie wechseln möchten:"
data_access_groups_15 = "Wechseln"
data_access_groups_16 = "Zugriffsgruppe wechseln"
data_access_groups_17 = "Erfolgreich gewechselt zu"
data_access_groups_18 = "Die DAG-Switcher-Funktion ist deaktiviert, während ein Datensatz in einem Eingabeformular oder auf der Record Home Page angezeigt wird. Wenn Sie den DAG Switcher nutzen möchten, navigieren Sie hierzu außerhalb des aktuellen Datensatzes."
data_access_groups_19 = "Anzeigeoptionen:"
data_access_groups_20 = "Mehrere Zugriffsgruppen für Benutzer aktivieren"
data_access_groups_21 = "Nachdem Sie DAGs erstellt haben, können Sie die optionale DAG-Switcher-Funktion verwenden, wenn Ihre Benutzer in mehreren DAGs sein sollen. Damit können Benutzer sich selbständig in bestimmte DAGs hinein und aus ihnen heraus bewegen."
data_access_groups_22 = "Wenn Sie Benutzer mehreren Zugriffsgruppen zuweisen möchten, kann dies mit der DAG-Switcher-Funktion unten auf dieser Seite erfolgen. Damit können Sie einen Benutzer in mehrere *potenzielle* DAGs aufnehmen. Anschließend können die Benutzer sich jederzeit selbständig in diese spezifischen DAGs hinein und aus ihnen heraus bewegen. Bei Zuweisung zu mehreren DAGs sieht der Benutzer oben auf jeder Projektseite ein blaues Banner, das ihm die Option zum Wechsel in eine andere DAG anbietet. HINWEIS: Benutzer können sich nicht selbst in eine andere DAG bewegen, sofern ihnen nicht jemand mit Rechten für diese Seite ausdrücklich Berechtigungen für mehrere DAGs erteilt hat."
data_access_groups_23 = "Um Benutzer <u>mehreren Gruppen</u> zuzuweisen, verwenden Sie unten den DAG Switcher."
data_access_groups_24 = "Es tut uns leid, aber die DAG-Switcher-Funktion kann nicht verwendet werden, wenn das Projekt eine große Anzahl von Benutzern und/oder DAGs enthält (wenn Benutzer X DAGs > 10.000). Daher wurde der DAG Switcher in diesem Projekt deaktiviert. Wir entschuldigen uns für die Unannehmlichkeiten."
data_access_groups_25 = "Falsches Setup für den DAG Switcher! Es scheint, dass Ihnen die Möglichkeit gegeben wurde, den DAG Switcher zu verwenden; Ihre aktuelle Zugriffsgruppe wurde im DAG Switcher jedoch nicht für Sie aktiviert. Bitte bitten Sie jemanden in Ihrem Projekt mit entsprechenden Rechten, Ihre aktuelle Zugriffsgruppe im DAG Switcher für Sie zu aktivieren. Sie können sich erst dann selbst in DAGs hinein und aus ihnen heraus wechseln, wenn dies behoben ist."
