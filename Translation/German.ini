pmt_75 = "Ziel-Instanz-ID eingeben"
pmt_76 = "<b>HINWEIS:</b> Um das Project Migration Tool zu verwenden, müssen Sie ein <b>aktives API-Token</b> für dieses Projekt haben und außerdem über <b>API-Exportberechtigungen</b> verfügen. Um ein API-Token zu erhalten, muss Ihnen ein Benutzer mit Benutzerrechte-Berechtigungen zunächst API-Exportrechte in diesem Projekt erteilen. Danach können Sie im linken Menü zur API-Seite navigieren, um ein API-Token zu beantragen. Nachdem Sie dies getan haben, kehren Sie hierher zurück und versuchen Sie es erneut."
