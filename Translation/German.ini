data_entry_756 = "Verwenden Sie die Links unten, um zwischen den Abschnitten in diesem Formular zu navigieren."
data_entry_757 = "Seitenanfang"
data_entry_758 = "<p>Der \"Abschnittsnavigator\" zeigt einen Link zu jeder Abschnittsüberschrift in Ihrem Instrument sowie einen Link zurück zum Seitenanfang. Wenn Sie auf einen Link klicken, wird die Seite zum ausgewählten Abschnitt positioniert.</p><p>Wenn Sie Projekt-Design-Rechte haben, können Sie das Aussehen des \"Abschnittsnavigators\" auf einem Instrument anpassen, indem Sie im Online Designer das eigene CSS-Styling für das Instrument bearbeiten. Zum Beispiel: <p class='mb-0 font-weight-bold'>Vollständig ausblenden</p><pre>#formSectionNavigator { display: none; }</pre> <p class='mb-0 font-weight-bold'>Links weißen statt gelben Hintergrund geben</p><pre>.formSectionNavigatorListItem { background-color: white; }</pre>"
data_entry_759 = "Klicken Sie auf <i>'Löschen'</i>, um <b>die Werte der oben in der Liste markierten Felder</b> auf einen leeren Wert zu löschen. <u>Deaktivieren</u> Sie alle Felder, die Sie <u>nicht</u> ausblenden oder deren aktuelle Werte Sie nicht löschen möchten."
data_entry_760 = "Löschen"
data_entry_761 = "FEHLER: Da Sie für dieses bestimmte Instrument keine Rechte für den \"Vollständigen Datensatz\" als Datenexportrechte haben, dürfen Sie dieses Dateneingabeformular nicht drucken/exportieren."

