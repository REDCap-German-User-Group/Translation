shared_library_48 = "Da sich Ihr Projekt derzeit im Produktionsstatus befindet, wurde das neu importierte Instrument noch nicht offiziell zum Projekt hinzugefügt, sondern zu Ihren Änderungen im Entwurfsmodus hinzugefügt. Um das Instrument offiziell hinzuzufügen, müssen Sie auf den Button 'Änderungen zur Prüfung einreichen' klicken, nachdem Sie dem untenstehenden Link gefolgt sind."
shared_library_49 = "Sie haben ausgewählt, ein Datenerhebungsinstrument aus der REDCap Shared Library zu laden. Bitte geben Sie einen Namen für Ihr Instrument an und klicken Sie auf den Button <i>Hinzufügen</i>, um den Importvorgang abzuschließen. Danach wird das Instrument diesem REDCap-Projekt hinzugefügt."
;; shared_library_50 is concatenated with shared_library_52 and shared_library_07.
shared_library_50 = "heruntergeladen aus"
;; shared_library_51 is concatenated with shared_library_52 and shared_library_07.
shared_library_51 = "hochgeladen in"
;; shared_library_52 is concatenated with shared_library_50/51 and shared_library_07.
shared_library_52 = "Dieses Datenerhebungsinstrument wurde bereits"
shared_library_53 = "Wenn Sie mit diesem Vorgang fortfahren, wird eine neue doppelte Kopie aus der Bibliothek heruntergeladen und als neues Instrument im Projekt hinzugefügt."
shared_library_54 = "Bitte geben Sie einen neuen Namen für das Instrument ein, das Sie importieren."
;; shared_library_55 is concatenated with the imported instrument name.
shared_library_55 = "das importierte Instrument mit dem Namen"
;; shared_library_56 is concatenated with a link whose visible text is shared_library_57.
shared_library_56 = "Wenn Sie das Instrument NICHT importieren möchten, können Sie zurückkehren zur"
;; shared_library_57 is used as link text after shared_library_56.
shared_library_57 = "REDCap Instrument Library"
shared_library_58 = "Dieses Instrument wurde bereits importiert und kann nicht erneut importiert werden."
shared_library_59 = "Instrument auswählen"
shared_library_61 = "HINWEIS: Ihr Datenerhebungsinstrument erscheint <u>nicht</u> sofort in der REDCap Shared Library, sondern erst mit einer kleinen Zeitverzögerung, da es zunächst geprüft und genehmigt werden muss, bevor es offiziell zur Bibliothek hinzugefügt wird. Vielen Dank für Ihren Beitrag zur REDCap Shared Library!"
shared_library_63 = "Geben Sie einige Sätze an, um Ihr Instrument und seine Inhalte zu beschreiben."
shared_library_64 = "Der Name Ihres Instruments, wie er in der Shared Library erscheinen wird."
shared_library_65 = "Geben Sie Schlüsselwörter (durch Leerzeichen getrennt) an, die zu Ihrem Instrument passen. Diese helfen anderen Benutzern, Ihr Instrument bei Schlüsselwortsuchen in der Shared Library zu finden. (z. B. diabetes kind kardiologie)"
shared_library_66 = "Geben Sie hier beliebigen Text zu den Bedingungen an, unter denen andere Benutzer Ihr Instrument verwenden, ändern oder verbreiten dürfen. Dieser Text erscheint ganz am Ende der standardmäßigen rechtlichen Vereinbarung, der Benutzer zustimmen müssen, um Ihr Instrument aus der Shared Library herunterzuladen."
shared_library_67 = "Geben Sie beliebigen Text an, der beschreibt, wer oder was bei der Verwendung dieses Instruments genannt werden soll. Dazu gehören Organisationen oder einzelne Autoren, die das Instrument erstellt haben, sowie Verweise auf Veröffentlichungen über das Instrument. Die Danksagung wird unten auf der Webseite in REDCap angezeigt, wenn das Instrument von einem REDCap-Benutzer heruntergeladen und verwendet wird."
shared_library_69 = "(bereits geteilt)"
shared_library_70 = "Bevor Sie Ihr Instrument in die REDCap Shared Library teilen können, müssen Sie zuerst die Vereinbarung für geteilte Inhalte lesen. Klicken Sie auf den Button unten, um die Vereinbarung anzuzeigen."
shared_library_71 = "Vereinbarung für geteilte Inhalte lesen"
shared_library_72 = "Bitte geben Sie einen Grund für das Entfernen dieses Instruments an."
shared_library_73 = "Grund für Entfernung:"
shared_library_74 = "Geben Sie unten einen Grund für das Entfernen dieses Instruments an, das Sie zuvor in die REDCap Shared Library hochgeladen haben. Alle Personen, die Ihr Instrument aus der Shared Library heruntergeladen haben, werden per E-Mail benachrichtigt, dass das Instrument entfernt wurde. Diese E-Mail enthält außerdem den Grund, den Sie hier angeben."
shared_library_75 = "BITTE LESEN SIE DIESEN ABSCHNITT, BEVOR SIE FORTFAHREN:"
shared_library_76 = "Bevor Sie fortfahren, möchten wir sicherstellen, dass Sie die Auswirkungen des Teilens/Beitragens eines Instruments zur REDCap Shared Library vollständig verstehen. Bitte beachten Sie Folgendes:"
;; shared_library_78 is concatenated with the shared_library_82 suggestion link and shared_library_83.
shared_library_78 = "Wenn das Instrument, das Sie teilen möchten, veröffentlicht ist und <b>Sie nicht Inhaber des Urheberrechts sind, reichen Sie es bitte nicht ein</b>. Wenn Sie möchten, können Sie jedoch"
shared_library_79 = "Der Zugriff auf das Instrument, das Sie teilen, <b>kann nicht auf Sie oder eine Gruppe von Kollegen beschränkt werden</b>, obwohl Sie festlegen können, dass Ihr Instrument nur von REDCap-Benutzern an *Ihrer* Einrichtung heruntergeladen werden kann (anstatt weltweit)."
shared_library_80 = "Wenn Sie das Teilen eines Instruments nicht ernsthaft beabsichtigen, sondern lediglich <b>die Funktion zum Teilen von Instrumenten auf dieser Seite testen möchten, reichen Sie bitte kein</b> Instrument ein. Dies ist *nur* für Personen gedacht, die ihr Instrument tatsächlich mit REDCap-Benutzern weltweit (oder nur an ihrer Einrichtung) teilen möchten."
;; shared_library_81 is concatenated with REDCap Shared Library contact information.
shared_library_81 = "Wenn Sie die obigen Aufzählungspunkte gelesen und verstanden haben, fahren Sie unten fort, indem Sie auf den Button klicken, um die Vereinbarung für geteilte Inhalte zu lesen, damit Sie anschließend Ihr Instrument teilen können. Wenn Sie Fragen zur REDCap Shared Library haben, richten Sie diese bitte an"
;; shared_library_82 is used as a link after shared_library_78.
shared_library_82 = "einen Vorschlag machen"
;; shared_library_83 is concatenated after the shared_library_82 link.
shared_library_83 = "für ein neues Instrument, das der Bibliothek hinzugefügt werden soll."
shared_library_85 = "Das Instrument, das Sie aus der Shared Library herunterladen, enthält eine <b>Auto-Scoring-Funktion</b>. Das bedeutet, dass es sich in REDCap etwas anders verhält als traditionelle Instrumente. Beispielsweise können Sie nach dem Herunterladen des Instruments keine Felder des Instruments mehr ändern. Das Instrument wird in diesem Projekt außerdem automatisch als Umfrage aktiviert, und wenn Umfragen für dieses Projekt noch nicht aktiviert wurden, wird dies ebenfalls aktiviert. Dieses Auto-Scoring-Instrument kann nur in Umfrageform verwendet werden. Wenn das Dateneingabeformular für dieses Instrument angezeigt wird, werden alle Felder schreibgeschützt angezeigt."
shared_library_86 = "Das Instrument, das Sie aus der Shared Library herunterladen, ist ein <b>computeradaptiver Test (CAT)</b>. Das bedeutet, dass seine Fragen dynamisch anhand vorheriger Antworten generiert werden. Adaptive Instrumente verhalten sich in REDCap etwas anders als traditionelle Instrumente. Beispielsweise können Sie nach dem Herunterladen des Instruments keine Felder des Instruments mehr ändern. Das Instrument wird in diesem Projekt außerdem automatisch als Umfrage aktiviert, und wenn Umfragen für dieses Projekt noch nicht aktiviert wurden, wird dies ebenfalls aktiviert. Dieses adaptive Instrument kann nur in Umfrageform verwendet werden. Wenn das Dateneingabeformular für dieses Instrument angezeigt wird, werden alle Felder schreibgeschützt angezeigt."
shared_library_87 = "Sprache des Instrumententextes"
shared_library_88 = "Neuen Instrumentnamen eingeben"
shared_library_89 = "Die PROMIS-Batterie konnte nicht gefunden werden! Bitte kehren Sie zur Shared Library zurück und versuchen Sie es erneut."
;; shared_library_90 is concatenated into the battery import prompt.
shared_library_90 = "die gesamte Batterie der unten aufgeführten Instrumente (in der angezeigten Reihenfolge)."
shared_library_91 = "Batterie:"
shared_library_92 = "Beim Importieren einer Batterie, die mehrere Instrumente umfasst, werden alle Instrumente heruntergeladen und in der oben angezeigten Reihenfolge zum Projekt hinzugefügt. Um die korrekte Validierung der Batterie nach dem Herunterladen der Instrumente zu erhalten, ist es *extrem wichtig*, dass die Instrumente im Projekt in derselben Reihenfolge bleiben. Es liegt daher in Ihrer Verantwortung sicherzustellen, dass diese Batterieinstrumente nicht neu angeordnet oder in irgendeiner Weise geändert werden, wenn Sie ihre Validierung erhalten möchten."
shared_library_93 = "Die Batterie von Instrumenten wurde erfolgreich aus der REDCap Shared Library importiert."
shared_library_94 = "Durch das Hochladen Ihres Instruments <b>teilen Sie es mit REDCap-Benutzern auf der ganzen Welt (oder nur an Ihrer Einrichtung)</b>. Dadurch wird es potenziell Millionen von Benutzern an Tausenden anderer Einrichtungen innerhalb des REDCap-Konsortiums verfügbar gemacht."
shared_library_95 = "Sie können Ihr Datenerhebungsinstrument mit anderen REDCap-Benutzern auf der ganzen Welt teilen, indem Sie es in die REDCap Shared Library hochladen. <u>Jeder REDCap-Benutzer mit Designrechten kann diese Shared-Library-Instrumente über die Importoption im Online Designer in eigene Projekte hinzufügen.</u> Um das Instrument erfolgreich zu teilen, bitten wir Sie, unten einige vorläufige Informationen anzugeben, die zusammen mit einer Kopie Ihres Datenerhebungsinstruments an die REDCap Shared Library gesendet werden. Vielen Dank, dass Sie Ihr Instrument teilen!"
shared_library_96 = "Bitte füllen Sie alle Pflichtfelder für dieses Instrument aus."
shared_library_97 = "Ich stimme NICHT zu"
shared_library_98 = "Ich stimme zu"
shared_library_99 = "Vielen Dank für Ihre Bibliothekseinreichung. Manchmal reichen Personen Instrumente versehentlich ein. Um die Effizienz im Prüfprozess zu verbessern, <u>lesen Sie bitte die Kontrollkästchen und aktivieren Sie sie</u>, um Ihr Verständnis zu bestätigen."
shared_library_100 = "Wenn es genehmigt wird, können REDCap-Benutzer dieses Instrument über den Online Designer zu ihren Projekten hinzufügen."
shared_library_101 = "Dies ist keine Methode zur Umfrageverteilung. Wenden Sie sich bei Fragen dazu an Ihr lokales Support-Team."
shared_library_102 = "Instrumente, deren Urheberrecht bei jemand anderem liegt, müssen über den Empfehlungslink auf der Bibliotheksseite eingereicht werden. Nicht hier."
shared_library_103 = "Nein, bitte meine Einreichungsanfrage abbrechen"
shared_library_104 = "Ja, bitte dieses Instrument zur Bibliothekssammlung hinzufügen"
shared_library_105 = "Dieses Datenerhebungsinstrument wird speziell für die MyCap-Administration formatiert."
shared_library_106 = "Diese Liste umfasst PROMIS und andere physische und emotionale <a href='https://www.healthmeasures.net/' target='_blank' style='text-decoration:underline;'>Gesundheitsbewertungen</a>. Klicken Sie unten auf Importieren, um ein Maß hinzuzufügen, das speziell für die MyCap-Administration formatiert ist, fortlaufende Durchführung ermöglicht und Offline-Datenerfassung unterstützt."
shared_library_107 = "Aus REDCap-Bibliothek importieren"

