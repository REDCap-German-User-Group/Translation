survey_1124 = "HINWEIS: Bitte beachten Sie, dass das Ändern der obenstehenden Werte auf einen neuen Wert für Zeitlimit für Umfrageabschluss dazu führt, dass sich alle Linkablaufzeiten für Teilnehmende dieser Umfrage ändern, denen bereits eine Einladung gesendet wurde (ausgenommen Teilnehmende, bei denen Sie die Linkablaufzeit manuell in der Teilnehmerliste geändert/überschrieben haben)."
