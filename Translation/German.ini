info_06 = "Schulungsressourcen"
info_08 = "Bitte beachten Sie, dass jede Publikation, die aus einem Projekt hervorgeht, das REDCap verwendet, die Fördermittelunterstützung zitieren sollte"
info_10 = "Wenn Sie Daten zum Zweck der Forschung an Menschen erheben, ist eine Prüfung und Genehmigung des Projekts durch Ihr Institutional Review Board erforderlich."
;; info_11 is concatenated with a REDCap contact link/name in Home/info.php.
info_11 = "Wenn Sie Unterstützung benötigen oder Fragen zu REDCap haben, kontaktieren Sie bitte"
info_15 = "Schnell und flexibel"
info_19 = "Daten in gängige Analysepakete exportieren"
info_28 = "Automatische Validierung, berechnete Felder"
;; info_29 is concatenated with info_28 and info_30 in a feature list.
info_29 = "Datei-Upload"
;; info_30 is concatenated after info_28 and info_29 in a feature list.
info_30 = "Verzweigungs-/Überspringlogik und Umfrage-Stop-Aktionen."
info_35 = "REDCap bietet automatisierte Exportverfahren für nahtlose Datendownloads nach Excel und in gängige Statistikpakete (SPSS, SAS, Stata, R), außerdem einen integrierten Projektkalender, ein Scheduling-Modul, Ad-hoc-Berichtswerkzeuge und erweiterte Funktionen wie Verzweigungslogik, Datei-Upload und berechnete Felder."
;; info_36 is concatenated with a video link using info_37.
info_36 = "Erfahren Sie mehr über REDCap, indem Sie ein"
;; info_37 is used as linked text after info_36.
info_37 = "kurzes Übersichtsvideo (4 Min.)"
;; info_38 is concatenated before a Training Resources link.
info_38 = "Wenn Sie weitere kurze Video-Tutorials zu REDCap in Aktion und eine Übersicht seiner Funktionen ansehen möchten, besuchen Sie bitte die"
info_41 = "Piping"
info_43 = "Erheben Sie Daten offline mit einer App auf einem Mobilgerät, wenn keine WLAN- oder Mobilfunkverbindung besteht, und synchronisieren Sie die Daten später zurück auf den Server."
info_44 = "REDCap ist eine sichere Webplattform zum Erstellen und Verwalten von Online-Datenbanken und Umfragen. Der optimierte REDCap-Prozess zum schnellen Erstellen und Entwerfen von Projekten bietet eine große Auswahl an Werkzeugen, die sich an nahezu jede Datenerhebungsstrategie anpassen lassen."
info_45 = "e-Consent"
info_46 = "Führen Sie die informierte Einwilligung für Teilnehmende elektronisch per Umfrage durch."
info_47 = "Online-Umfragen und Datenbanken schnell und sicher im Browser erstellen"
info_48 = "Erstellen und gestalten Sie Ihr Projekt mit sicherer Anmeldung von jedem Gerät aus. Keine zusätzliche Software erforderlich. Zugriff von überall und jederzeit."
info_49 = "Von der Projekterstellung bis zum Beginn der Datenerhebung in weniger als einem Tag. Anpassungen und Änderungen sind jederzeit möglich, auch nachdem die Datenerhebung begonnen hat."
info_50 = "Erweiterte Funktionen für Instrumentendesign"
info_51 = "Vielfältige und flexible Optionen zur Umfrageverteilung"
info_52 = "Verwenden Sie eine Liste von E-Mail-Adressen oder Telefonnummern für Ihre Umfragebefragten, kontaktieren Sie diese automatisch mit personalisierten Nachrichten und verfolgen Sie, wer geantwortet hat. Oder erstellen Sie einen einfachen Link für eine anonyme Umfrage, für Massen-E-Mail-Versand, zur Veröffentlichung auf einer Website oder zum Drucken auf einem Flyer."
info_53 = "Datenqualität"
info_54 = "Verwenden Sie Feldvalidierung, Verzweigungs-/Überspringlogik und Missing Data Codes, um die Datenqualität während der Dateneingabe zu verbessern und zu schützen. Öffnen Sie Datenabfragen, um Diskrepanzen und andere Probleme automatisch in Echtzeit zu erkennen und zu lösen. "
info_55 = "Benutzerdefinierte Berichte"
info_56 = "Erstellen Sie benutzerdefinierte Suchläufe zur Erstellung von Berichten, um aggregierte Daten anzuzeigen. Erkennen Sie Trends mit integrierten Basisstatistiken und Diagrammen."
info_57 = "Exportieren Sie Ihre Daten als PDF oder als CSV-Daten zur einfachen Analyse in SAS, Stata, R, SPSS oder Microsoft Excel."
info_58 = "Sichere Dateispeicherung und -freigabe"
info_59 = "Laden Sie beliebige Dateitypen hoch und teilen Sie sie weltweit über die File-Repository-Funktion oder das Send-It-Werkzeug. Funktioniert auch mit Exporten und anderen integrierten Datei-Upload-Funktionen."
info_60 = "Datenbasierte Trigger und Alarme"
info_61 = "Senden Sie Echtzeit-Alarme und Benachrichtigungen an Ihr Team oder andere Beteiligte per E-Mail, Textnachricht oder Telefon, basierend auf bestimmten eingegebenen Daten oder bestimmten Antworten auf bestimmte Fragen."
info_62 = "Mit anderen Ressourcen verbinden"
;; info_63 is concatenated before a list of built-in feature links in Home/info.php.
info_63 = "Verwenden Sie integrierte Funktionen ("
;; info_64 is concatenated after a list of built-in feature links in Home/info.php.
info_64 = "), um Daten in Ihr Projekt oder aus Ihrem Projekt zu übertragen. Erstellen Sie eigene benutzerdefinierte Softwareentwicklungsfunktionen, um Ihr Projekt mit anderen Systemen zu verbinden."
info_65 = "Dieses Projekt ist derzeit OFFLINE und für normale Benutzer nicht zugänglich."
info_66 = "Erheben Sie Daten remote von Teilnehmenden mit dieser teilnehmerorientierten mobilen Anwendung für iOS und Android. Erfassen Sie Umfrageantworten sowie Mobile-Sensing- oder aktive Aufgaben, die von Teilnehmenden mit Sensoren mobiler Geräte durchgeführt werden; die Daten werden automatisch an den REDCap-Server zurückgesendet, sobald sie abgeschlossen sind und eine Internetverbindung verfügbar ist."

lang_updater_02 = "Sprachdatei-Ersteller/-Updater"
lang_updater_03 = "Diese Seite kann verwendet werden, um neue Sprachdateien für die in REDCap verwendeten Texte zu erstellen oder vorhandene Sprachdateien aus früheren REDCap-Versionen zu bereinigen und zu aktualisieren. Diese REDCap-Sprachdateien sind Textdateien mit der Dateiendung INI und enthalten Textzeichenfolgen (Absätze, Phrasen oder Wörter), die bestimmten Variablen in der Sprachdatei zugeordnet sind. Um die englischen REDCap-Texte in eine neue Sprache zu übersetzen, folgen Sie Option Nr. 1 unten. Um die Texte einer vorhandenen Sprachdatei mit neuen Texten aus der aktuellen REDCap-Version zu aktualisieren, verwenden Sie Option Nr. 2, um den Vorgang zu vereinfachen. Bevor Sie eine der beiden Optionen verwenden, sollten Sie prüfen, ob bereits jemand die gewünschte Übersetzung erstellt hat, indem Sie die REDCap-Community-Website aufrufen"
lang_updater_04 = "Englische Sprachdatei abrufen, um eine neue Übersetzung zu beginnen"
lang_updater_05 = "Wenn Sie eine neue Sprachdatei für REDCap erstellen möchten, müssen Sie den englischen Text übernehmen und vollständig in die gewünschte Sprache übersetzen. Gehen Sie dazu wie folgt vor:"
lang_updater_06 = "Klicken Sie auf den Button direkt darunter, kopieren Sie den Text aus dem Textfeld und fügen Sie ihn in einen Texteditor ein (z. B. WordPad, Notepad++)"
lang_updater_07 = "Übersetzen Sie den gesamten englischen Text"
lang_updater_08 = "Speichern Sie die Datei auf Ihrem Computer als INI-Datei mit dem Namen der Sprache"
;; lang_updater_09 is concatenated with a dynamically generated web server folder path.
lang_updater_09 = "Legen Sie die Datei in den Ordner Ihres Webservers mit dem Namen"
lang_updater_10 = "Teilen Sie Ihre Übersetzung mit dem REDCap-Konsortium, indem Sie sie als Anhang auf der REDCap-Community-Website hochladen"
