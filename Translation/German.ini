system_config_935 = "Wenn die untenstehenden Felder leer gelassen werden, verwendet das System standardmäßig \"Keine (öffentlich)\"-Authentifizierung. Wenn Sie jedoch tabellenbasierte Authentifizierung aktivieren und im Rahmen des Installationsprozesses ein initiales Administratorkonto erstellen möchten, füllen Sie die untenstehenden Felder aus."
