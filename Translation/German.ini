;; dash_110 is concatenated with dash_111 as linked text and a period.
dash_110 = "<b>Datenfilterung:</b> Standardmäßig verwenden Smart Functions, Smart Tables und Smart Charts alle Daten aus *allen Datensätzen* im Project. Sie können jedoch eine Teilmenge der Daten im Project verwenden, indem Sie sie auf die Daten eines bestimmten Reports (über einen eindeutigen Report-Namen), auf Datensätze aus einer oder mehreren DAGs und/oder auf Daten in bestimmten Events (falls das Project longitudinal ist) beschränken. Eindeutige Report-Namen finden Sie für jeden Report auf der Seite \"Meine Reports & Exporte\". Sie können eindeutige Report-Namen, eindeutige DAG-Namen und eindeutige Event-Namen an jede Smart Function, Smart Table oder Smart Chart anhängen, indem Sie die Syntax verwenden, die beschrieben ist in der"
;; dash_111 is concatenated as linked text after dash_110.
dash_111 = "Dokumentation zu Smart Variables"
dash_112 = "Standardmäßig verwenden Smart Functions, Smart Tables und Smart Charts alle Daten aus *allen Datensätzen* im Project. Sie können jedoch eine Teilmenge der Daten im Project verwenden, indem Sie sie auf die Daten eines bestimmten Reports (über einen eindeutigen Report-Namen), auf Datensätze aus einer oder mehreren DAGs und/oder auf Daten in bestimmten Events (falls das Project longitudinal ist) beschränken."
dash_114 = "Aus Datenschutzgründen können Sie die Mindestanzahl an Datenpunkten anpassen, die erforderlich ist, wenn ein öffentliches Project Dashboard, ein öffentlicher Report oder eine Umfrageseite mit Smart Charts, Smart Tables oder Smart Functions angezeigt wird. Wenn also eine Smart Chart, Smart Table oder Smart Function auf einem öffentlichen Project Dashboard, öffentlichen Report oder einer Umfrageseite die Mindestanforderungen nicht erfüllt, wird nicht das Diagramm, die Tabelle bzw. der Wert ausgegeben, sondern stattdessen der Text '[NICHT GENÜGEND DATEN FÜR DIE ANZEIGE]'. Hinweis: Diese Datenschutzeinstellung gilt nicht für Dashboards oder Reports, die innerhalb eines REDCap-Projects angezeigt werden, sondern nur für die Anzeige über ihren öffentlichen Link."
dash_115 = "Öffentliche Reports, Project Dashboards, Smart Charts, Smart Tables und Smart Functions"
dash_116 = "Dürfen Reports als 'öffentlich' festgelegt werden?"
dash_117 = "Wenn ein Report öffentlich gemacht wird, kann er über eine eindeutige URL aufgerufen werden, die keine Authentifizierung erfordert. Benutzer müssen im Project Rechte für 'Benutzerrechte' haben, um einen Report öffentlich zu machen oder einen Administrator darum zu bitten. Nachdem ein Report öffentlich gemacht wurde, ist der öffentliche Link zum Report nur für Benutzer im Project mit Rechten für 'Benutzerrechte' zugänglich. Hinweis: <u>Administratoren können einen Report immer öffentlich machen</u>, unabhängig von der Einstellung hier."
dash_118 = "Bevor ein Benutzer oder Administrator (je nach obiger Auswahl) einen Report öffentlich macht, muss er ALLE folgenden Punkte ausführen und ihnen zustimmen:"
dash_119 = "Nein, Reports dürfen nicht öffentlich gemacht werden"
dash_120 = "Ja, Benutzern erlauben, Reports selbst öffentlich zu machen"
dash_121 = "Muss den Report, der öffentlich gemacht wird, zuvor anzeigen."
dash_122 = "Muss bestätigen, dass er versteht, dass das Öffentlichmachen des Reports bedeutet, dass alle Daten im Report für jede Person mit dem öffentlichen Link zum Report vollständig zugänglich sind."
dash_123 = "Muss bestätigen, dass er verantwortlich ist, falls private, sensible oder identifizierende Daten im Report Personen offengelegt werden, die keinen Zugriff auf solche Daten haben sollten."
dash_124 = "Mindestanzahl an Datenpunkten, die erforderlich ist, um Smart Charts, Smart Tables oder Smart Functions auf einem *öffentlichen* Project Dashboard, in Anweisungen zu einem *öffentlichen* Report, im benutzerdefinierten Text der Umfragewarteschlange oder an einer beliebigen Stelle auf einer Umfrageseite anzuzeigen."
dash_125 = "HINWEIS: Sie können in einer einzelnen Smart Chart, Smart Table oder Smart Function nicht gleichzeitig auf einen Report mit DAGs oder Events verweisen. Wenn Sie die Daten über einen Report und DAGs/Events filtern möchten, wird empfohlen, die DAG-/Event-Filterung einfach dem Report-Filter selbst hinzuzufügen, indem Sie den Report bearbeiten."
dash_126 = "Sie können optional in den beiden untenstehenden Editoren benutzerdefinierten E-Mail-Text für E-Mails angeben, die Benutzern zur bevorstehenden Ablaufzeit ihres REDCap-Kontos gesendet werden. Sie können dies sowohl für Benutzer ohne Sponsor als auch für Benutzer mit Sponsor festlegen. Diese E-Mails dienen als Erinnerungen 2 Tage und 14 Tage bevor das Konto eines Benutzers abläuft. <b>HINWEIS: Wenn unten kein benutzerdefinierter Text angegeben wird, verwendet REDCap einfach den Standard-E-Mail-Text für Kontoablauf-E-Mails an Benutzer.</b>"
dash_127 = "Benutzerdefinierte Kontoablauf-E-Mail (Benutzer ohne Sponsor)"
dash_128 = "Geben Sie unten den benutzerdefinierten E-Mail-Text für Benutzer ein, die keinen Sponsor haben. Sie können das Menü für dynamische Variablen verwenden, um den E-Mail-Inhalt bei Bedarf zu personalisieren. Diese Variablen werden beim Senden der E-Mail automatisch durch die entsprechenden Informationen des Benutzers ersetzt."
dash_129 = "Benutzerdefinierte Kontoablauf-E-Mail (Benutzer mit Sponsor)"
dash_130 = "Geben Sie unten den benutzerdefinierten E-Mail-Text für Benutzer ein, die einen Sponsor haben. Sie können das Menü für dynamische Variablen verwenden, um den E-Mail-Inhalt bei Bedarf zu personalisieren. Diese Variablen werden beim Senden der E-Mail automatisch durch die entsprechenden Informationen des Benutzers ersetzt."
