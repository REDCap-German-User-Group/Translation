design_991 = "<b>WICHTIGER HINWEIS, WENN SIE IM ENTWURFSMODUS NEUE INSTRUMENTE ERSTELLT HABEN:</b> Standardmäßig haben keine Benutzer im Projekt Zugriff auf neu erstellte Instrumente. Denken Sie daher bitte daran, allen relevanten Benutzern/Rollen Anzeige-/Bearbeitungsrechte zu gewähren oder sich mit einem Benutzerrechte-Manager des Projekts abzustimmen, um den Zugriff auf Instrumente zu öffnen, die gerade im Entwurfsmodus erstellt wurden."
design_992 = "Liste der ausgewählten Formulare anzeigen"
design_993 = "Ausgewählte Formulare für diese Bedingung"
design_994 = "Unten sind alle ausgewählten Formulare/Events für die aktuelle Bedingung aufgeführt:"
design_995 = "Für diese Bedingung wurde nichts ausgewählt."
design_996 = "Enthält eingebettete Felder"
design_998 = "Tipp für Min-/Max-Grenzen:"
design_999 = "Branching Logic auch für ANDERE Felder bearbeiten?"
design_1000 = "HINWEIS: Es wird empfohlen, @CALCTEXT oder @CALCDATE nicht innerhalb des @IF Action Tag zu verwenden, da die @CALC Action Tags in vielen Kontexten funktionieren, in denen @IF dies nicht tut, was zu unerwarteten Ergebnissen führen kann."
design_1001 = "Diese exakt gleiche Branching Logic wird von mehreren Feldern gemeinsam verwendet. Möchten Sie die Branching Logic ALLER anderen Felder (auch auf anderen Instrumenten), die exakt dieselbe Branching Logic haben, automatisch aktualisieren? <b>HINWEIS: Wenn Sie JA klicken, wird die Branching Logic der anderen Felder sofort aktualisiert.</b>"
design_1002 = "<b>WICHTIGER HINWEIS:</b> Standardmäßig haben ALLE Benutzer im Projekt automatisch Zugriff auf dieses neue Instrument. Wenn Sie also <u>nach Freigabe Ihrer aktuellen Entwurfsmodus-Änderungen</u> nicht möchten, dass Benutzer auf dieses neue Instrument zugreifen, denken Sie bitte daran, allen relevanten Benutzern/Rollen Kein-Zugriff-Rechte zu gewähren oder sich mit einem Benutzerrechte-Manager des Projekts abzustimmen, um Kein-Zugriff-Rechte für dieses Instrument zu setzen."
design_1003 = "<b>WICHTIGER HINWEIS, WENN SIE IM ENTWURFSMODUS NEUE INSTRUMENTE ERSTELLT HABEN:</b> Standardmäßig haben ALLE Benutzer im Projekt vollen Zugriff auf neu erstellte Instrumente. Wenn Sie also nicht möchten, dass Benutzer auf die neuen Instrumente zugreifen, denken Sie bitte daran, allen relevanten Benutzern/Rollen Kein-Zugriff-Rechte zu gewähren oder sich mit einem Benutzerrechte-Manager des Projekts abzustimmen, um Kein-Zugriff-Rechte für Instrumente zu setzen, die gerade im Entwurfsmodus erstellt wurden."
design_1004 = "HINWEIS: Dieses Projekt ist für den Protected Email Mode konfiguriert."
design_1005 = "Beachten Sie, dass der Protected Email Mode nicht für Alarme gilt, die SendGrid-Template-E-Mails verwenden, da diese E-Mails in der REDCap-Webanwendung nicht vollständig gerendert werden können."
design_1006 = "Nur den roten Stern anzeigen"
design_1007 = "Setzt den Wert eines Feldes auf den Benutzernamen des aktuellen REDCap-Benutzers. Wenn dies in einem Fragebogen verwendet wird, ist der Wert '{0}'. Sobald der Wert erfasst wurde, wird er bei späteren Seitenbesuchen nicht geändert."
design_1008 = "Fügt einem Notizfeld die Symbolleiste des Rich Text Editors hinzu, damit Benutzer/Teilnehmer das Aussehen (durch Styling und Formatierung) des Textes steuern können, den sie in das Feld eingeben. Um sicherzustellen, dass alle Rich-Text-Steuerelemente angezeigt werden, setzen Sie <b>Benutzerdefinierte Ausrichtung</b> auf eine der <b>Links</b>-Optionen."
design_1009 = "Zusätzlich wurden allen Benutzern automatisch 'De-Identified'-Datenexportrechte für alle neu erstellten Instrumente gegeben."
design_1018 = "Das wiederholte Erheben von Fragebogendaten kann effizient und mit minimaler Einrichtung durch einen wiederholten Fragebogen erfolgen, also einen Fragebogen, der als wiederholtes Instrument aktiviert ist oder (bei einem longitudinalen Projekt) ein Fragebogeninstrument, das auf einem wiederholten Event verwendet wird. Es kann jedoch manchmal schwierig sein zu wissen, welche Funktionen bei wiederholten Fragebögen verwendet werden sollten, um repetitive Fragebogendaten möglichst effektiv zu erheben. Die folgenden Informationen stellen mehrere Datenerfassungsoptionen für wiederholte Fragebögen dar. Jede Option hat eigene Vor- und Nachteile, die sorgfältig entsprechend Ihrer Situation abgewogen werden sollten. Wichtig ist, dass die untenstehenden Optionen sich nicht gegenseitig ausschließen und in Kombination für mehrere Fragebögen innerhalb eines Projekts verwendet werden können."
design_1019 = "Automated Survey Invitations (ASIs)"
design_1021 = "Klicken Sie im Online Designer beim wiederholten Fragebogen auf den Button 'Automatisierte Einladungen' und füllen Sie anschließend im ASI-Pop-up den Abschnitt 'Wie oft senden' aus, um festzulegen, wie häufig und wie oft die Einladungen wiederholt werden sollen."
design_1022 = "Verschiedene Möglichkeiten zur Datenerhebung für einen wiederholten Fragebogen"
design_1023 = "\"Fragebogen wiederholen\"-Button<br>am Ende des Fragebogens"
design_1024 = "Verwenden Sie den Button \"Fragebogen wiederholen\", der so aktiviert werden kann, dass er am Ende des Fragebogens erscheint und Teilnehmern erlaubt, immer wieder neue Wiederholungsinstanzen für den Fragebogen hinzuzufügen."
design_1025 = "Klicken Sie auf die Buttons unten, um automatische Fragebogeneinladungen einzurichten oder zu ändern."
design_1026 = "Datenerfassungsstrategien für wiederholte Fragebögen"
design_1027 = "Nur wiederholte Instrumente"
design_1028 = "Beides (wiederholte Instrumente und Instrumente auf wiederholten Events)"
design_1030 = "Verwenden Sie einen Alarm, der wiederholt in einem regelmäßigen Intervall gesendet wird und einen speziell formatierten Fragebogenlink für den wiederholten Fragebogen enthält."
design_1031 = "Verwenden Sie eine Automated Survey Invitation, die wiederholt in einem regelmäßigen Intervall gesendet wird."
design_1032 = "Aktivierungsprozess und Nutzung"
design_1033 = "Aktivieren Sie die Option \"Fragebogen wiederholen\" auf der Fragebogeneinstellungsseite. Teilnehmer können dann mehrere Instanzen an Daten direkt hintereinander eingeben (d. h. in einer Sitzung), wobei der Button \"Fragebogen wiederholen\" am Ende des Fragebogens angezeigt wird. Wenn Sie außerdem die Funktion Fragebogen-Warteschlange verwenden und dem Teilnehmer sein Link zur Fragebogen-Warteschlange gegeben wurde, kann er auf der Seite der Fragebogen-Warteschlange jederzeit neue wiederholte Fragebogeninstanzen eingeben."
design_1034 = "Funktioniert es mit wiederholten Instrumenten und/oder wiederholten Events?"
design_1035 = "Erstellen Sie auf der Seite Alarme & Benachrichtigungen einen Alarm und füllen Sie anschließend im Alarm-Pop-up den Abschnitt 'Wie oft senden?' aus, um festzulegen, wie häufig und wie oft die Benachrichtigungen wiederholt werden sollen. Die Nachricht des Alarms muss die Smart Variable <code>[survey-link]</code> enthalten und *MUSS* mit <code>[new-instance]</code> ergänzt werden. Wenn der eindeutige Instrumentname Ihres wiederholten Fragebogens z. B. \"daily_survey\" ist, verwenden Sie <code>[survey-link:daily_survey][new-instance]</code>. Dadurch wird im Alarm ein Fragebogenlink erstellt, der immer auf eine neue, noch nicht erstellte Instanz des wiederholten Fragebogens verweist."
design_1036 = "Nein, dies funktioniert nur mit der Weboberfläche."
design_1037 = "Ja, SMS und Sprachanrufe können beide verwendet werden, um den Fragebogenlink für eine ASI zu versenden."
design_1038 = "Erfordert es eine gesendete E-Mail?"
design_1039 = "Nein. E-Mail-Versand ist nicht erforderlich. Wenn Sie jedoch die Fragebogen-Warteschlange nutzen, müssen Sie dem Teilnehmer optional möglicherweise seinen Link zur Fragebogen-Warteschlange über einen wiederkehrenden Alarm senden. Die Fragebogen-Warteschlange ist dann die Zielseite für den Teilnehmer, bevor er jedes Mal den Fragebogen aufruft."
design_1040 = "Ja"
design_1041 = "Ja, SMS und Sprachanrufe können beide verwendet werden, um den Fragebogenlink für einen Alarm zu versenden."
design_1042 = "Häufige Verwendungen"
design_1043 = "Fragebögen, bei denen dem Teilnehmer in regelmäßigen Abständen eine E-Mail gesendet wird, etwa bei einem täglichen, wöchentlichen oder monatlichen Fragebogen. Zum Beispiel ein täglicher COVID-19-Symptom-Tracking-Fragebogen."
design_1044 = "Fragebögen, bei denen einige Informationen mehrfach eingegeben werden müssen, etwa Fragen zu mehreren Familienmitgliedern oder Medikamenteninformationen für mehrere Medikamente."
design_1045 = "Erinnerung: Niemals private Informationen (z. B. PII, PHI) in E-Mails pipen."
design_1046 = "Entschuldigung, aber leere Instrumente dürfen nicht kopiert werden. Bitte fügen Sie dem Instrument mindestens ein Feld hinzu; anschließend können Sie das Instrument kopieren."
design_1048 = "Besonderer Hinweis: Wenn Sie eine der untenstehenden Textzeichenkettenfunktionen in Branching Logic oder berechneten Feldern verwenden möchten, beachten Sie, dass diese Funktionen NICHT für Datums- oder Datetime-Felder mit MDY- oder DMY-Datumsformatierung verwendet werden sollten. Für YMD-formatierte Datums-/Datetime-Werte sind sie in Ordnung, und sie sind auch bei beliebiger Datumsformatierung außerhalb von Branching Logic oder berechneten Feldern in Ordnung (z. B. Datenqualitätsregeln, Report-Filterlogik, ASI-bedingte Logik). <u>Wenn Sie diese Funktionen mit Datums-/Datetime-Feldern in Branching Logic und Berechnungen verwenden möchten, stellen Sie sicher, dass das Feld das YMD-Datumsformat hat.</u>"
