mycap_mobile_app_916 = "Bitte beachten Sie, dass dieses Instrument Teil einer Health-Measure-Batterie ist. Beim Speichern wird jedes nachfolgende Instrument automatisch festgelegt, für MyCap aktiviert und gemäß der Auswahl für dieselben Events wiederholt."
