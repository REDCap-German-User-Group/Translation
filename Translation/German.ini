messaging_53 = "Einführung in REDCap Messenger"
messaging_54 = "Warum REDCap Messenger verwenden?"
messaging_55 = "Es gibt viele Chat-Produkte, aber nicht alle sind eine gute Wahl für sichere, private Kommunikation, insbesondere wenn Sie mit PHI (Protected Health Information) und anderen Arten sensibler Informationen umgehen. REDCap Messenger ist vollständig sicher, wird von Ihrer lokalen Einrichtung gehostet und erfüllt HIPAA-Compliance-Standards. Er kann (als Teil von REDCap) auch in anderen Compliance-Umgebungen implementiert werden, einschließlich GCP, 21 CFR Part 11 und FISMA-Umgebungen. So wie Ihre Daten in REDCap sicher sind, sind es auch Ihre Unterhaltungen. Sie müssen für die gesamte Kommunikation in Ihren Projects keine E-Mail oder Chat-Apps von Drittanbietern verwenden. Sie können REDCap Messenger einfach als zentrale Anlaufstelle für die gesamte Teamkommunikation und Dateifreigabe nutzen. Und das Beste ist, dass er ein integrierter Bestandteil von REDCap ist. Wenn Sie REDCap also bereits für die Datenerhebung verwenden, ist es nur folgerichtig, REDCap Messenger für die Kommunikation zu nutzen, die ein natürlicher Teil Ihrer Datenerhebung und Ihrer Projects ist."
messaging_56 = "Wo finde ich REDCap Messenger?"
messaging_57 = "Wenn Sie sich bei REDCap anmelden, finden Sie 'Messenger' in der oberen Navigationsleiste der Seite Meine Projects. Innerhalb eines Projects sehen Sie ihn nahe am oberen Rand des linken Project-Menüs. Ein Klick darauf öffnet links auf der Webseite das REDCap-Messenger-Panel, in dem Sie ungelesene Nachrichten anzeigen oder eigene neue Unterhaltungen erstellen können. Wenn Sie mit dem Lesen oder Senden Ihrer Nachrichten fertig sind, klicken Sie einfach oben rechts im Messenger-Panel auf das X, um es zu schließen. REDCap Messenger informiert Sie immer, wenn Sie neue Nachrichten erhalten; Sie müssen das Messenger-Panel also nicht ständig geöffnet lassen, außer wenn Sie es benötigen."
messaging_58 = "Benutzer markieren und Nachrichten als 'wichtig' kennzeichnen"
messaging_59 = "Sie können bestimmte REDCap-Benutzer in einer Gruppenunterhaltung gezielt ansprechen, indem Sie sie in Ihrer Nachricht als @username referenzieren, z. B. 'Danke für die Information, @harrisjt'. Fügen Sie einfach ein @-Zeichen vor dem REDCap-Benutzernamen in einer Nachricht hinzu, um sie zu markieren. Sie können auch jede Nachricht in Ihren Unterhaltungen als wichtig oder dringend markieren, indem Sie das Kontrollkästchen 'als wichtig markieren' unter dem Textfeld aktivieren, in das Sie Ihre Nachricht eingeben. Die Option 'wichtig' und die Markierungsfunktion können dazu dienen, die Aufmerksamkeit eines Benutzers schnell auf eine bestimmte Nachricht zu lenken; sie werden bei der E-Mail-Benachrichtigung priorisiert, wenn der Benutzer derzeit nicht bei REDCap angemeldet ist."
messaging_60 = "Benutzerberechtigungen innerhalb von Unterhaltungen"
messaging_61 = "Sie haben die volle Kontrolle über Ihre Unterhaltungen und können so viele erstellen, wie Sie möchten. Wenn Sie eine neue Unterhaltung erstellen, haben Sie automatisch maximale Rechte in dieser Unterhaltung. Sie können dann andere zu Ihrer Unterhaltung hinzufügen und ihnen (falls gewünscht) auch Rechte als 'Unterhaltungsadministrator' gewähren. Das bedeutet, dass sie andere Benutzer zur Unterhaltung hinzufügen (oder entfernen), die Unterhaltung umbenennen oder sie gegebenenfalls archivieren/löschen können. In einer Unterhaltung gibt es nur zwei Kategorien von Benutzern: 1) einen Unterhaltungsadministrator (Verwaltungsrechte innerhalb der Unterhaltung) und 2) ein Unterhaltungsmitglied (eingeschränkte Rechte, nur zum Anzeigen und Posten von Nachrichten und Anhängen)."
messaging_62 = "E-Mail-Benachrichtigungen für ungelesene Nachrichten"
messaging_63 = "Wenn Sie eine Nachricht erhalten, während Sie derzeit nicht bei REDCap angemeldet sind, sendet Messenger Ihnen kurz danach eine E-Mail-Benachrichtigung, die Sie darüber informiert, dass ungelesene Nachrichten auf Sie warten. Und keine Sorge: Die E-Mail enthält *nicht* den eigentlichen Text Ihrer Nachrichten. Sie müssen sich bei REDCap anmelden, um Ihre ungelesenen Nachrichten sicher anzuzeigen. Wenn Sie Ihre E-Mail-Benachrichtigungseinstellungen für REDCap Messenger ändern möchten, navigieren Sie zur Profilseite (oben rechts auf der Seite Meine Projects); die Optionen finden Sie unten auf dieser Seite."
messaging_64 = "Hat REDCap Messenger eine mobile App?"
messaging_65 = "Nein, aber Messenger funktioniert auf mobilen Geräten. Sie können sich einfach wie gewohnt auf Ihrem Smartphone oder Tablet bei REDCap anmelden und REDCap Messenger genauso verwenden wie auf Ihrem Desktop- oder Laptop-Computer. Das bedeutet, dass Sie REDCap Messenger von jedem Gerät aus zur Kommunikation nutzen können. "
messaging_66 = "Kann ich mit REDCap Messenger Nachrichten an Umfrageteilnehmer senden?"
messaging_67 = "REDCap Messenger ist nicht für Umfrageteilnehmer vorgesehen, sondern nur für REDCap-Benutzer zur Kommunikation untereinander."
messaging_68 = "Weitere Benachrichtigungen"
messaging_69 = "Wahrscheinlich werden von Zeit zu Zeit weitere Benachrichtigungen im Messenger-Panel angezeigt. Einige können von REDCap selbst stammen, z. B. informative Hinweise zu neuen Funktionen, andere können direkte Mitteilungen Ihrer REDCap-Administratoren sein, z. B. Ankündigungen zu Serverausfallzeiten, Hilfesitzungen usw. Hinweis: Benachrichtigungen lösen keine E-Mail-Benachrichtigungen aus wie Unterhaltungsnachrichten; sie sind nur dazu gedacht, im Kontext der REDCap-Nutzung angezeigt zu werden."
