mycap_mobile_app_500 = "[Bitte klicken Sie auf die Schaltfläche \"Änderungen speichern\", um dieses Instrument für MyCap zu aktivieren.]"
mycap_mobile_app_501 = "App-Synchronisierungsprobleme"
mycap_mobile_app_502 = "Ein App-Synchronisierungsproblem wird erstellt, wenn die Android- oder iOS-MyCap-App ein Aufgabenergebnis an den REDCap-Server sendet, das aus irgendeinem Grund nicht mit Ihrem REDCap-Projekt kompatibel ist. Dies geschieht typischerweise, wenn ein Teilnehmer eine alte Version einer Aufgabe/eines Instruments abschließt. Zweck des Mechanismus für Synchronisierungsprobleme ist es, Daten, die von der MyCap-App gesendet werden, immer zu erfassen und Datenverlust zu vermeiden. Synchronisierungsprobleme weisen auf ein Problem hin und sollten untersucht werden."
mycap_mobile_app_503 = "Keine Synchronisierungsprobleme vorhanden"
mycap_mobile_app_504 = "Ungelöst"
mycap_mobile_app_505 = "Sie erstellen eine Aufgabe/ein Instrument mit einem Feld \"Multiple Choice - Radio Buttons (Single Answer)\". Sie geben Auswahloptionen mit folgenden Werten an:<br> <code> 0, No<br>1, Yes<br>2, Sometimes<br></code>"
mycap_mobile_app_506 = "Übersicht"
mycap_mobile_app_507 = "Die Lösung für das Synchronisierungsproblem wurde erfolgreich gespeichert."
mycap_mobile_app_508 = "Teilnehmer"
mycap_mobile_app_509 = "Ergebnis-ID"
mycap_mobile_app_510 = "Fehlender/ungültiger Teilnehmer"
mycap_mobile_app_511 = "<b>Anweisungen:</b> Ein Synchronisierungsproblem wird erstellt, wenn die Android- oder iOS-MyCap-App ein Aufgabenergebnis an den REDCap-Server sendet, das aus irgendeinem Grund nicht mit Ihrem REDCap-Projekt kompatibel ist. Sie müssen bestimmen, wie die Daten korrekt in Ihrem Projekt gespeichert werden sollen. Dies beinhaltet typischerweise das Kopieren der MyCap-Daten in eine neue REDCap-Wiederholungsinstanz für den passenden Datensatz."
mycap_mobile_app_512 = "Empfangen am"
mycap_mobile_app_513 = "Fehlertyp"
mycap_mobile_app_514 = "Lösung"
mycap_mobile_app_515 = "Problem"
mycap_mobile_app_516 = "Schlüssel"
mycap_mobile_app_517 = "Konnte nicht in REDCap gespeichert werden"
mycap_mobile_app_518 = "Teilnehmer konnte nicht gefunden werden"
mycap_mobile_app_519 = "Projekt konnte nicht gefunden werden"
mycap_mobile_app_520 = "Sie veröffentlichen MyCap-Projektkonfigurationsversion 1 und ein Teilnehmer tritt Ihrem Projekt bei."
mycap_mobile_app_521 = "Der Teilnehmer schließt die Aufgabe mit der Antwort&nbsp;&nbsp;<code>No (0)</code> ab, und das Ergebnis wird an REDCap gesendet, um gespeichert zu werden."
mycap_mobile_app_522 = "REDCap <strong>akzeptiert das Ergebnis</strong>, weil&nbsp;&nbsp;<code>No (0)</code> ein gültiger Auswahlwert ist."
mycap_mobile_app_523 = "Später entscheiden Sie, die Werte Ihres Multiple-Choice-Feldes zu ändern in:<br> <code>No, No<br>Yes, Yes<br>Sometimes, Sometimes<br></code>"
mycap_mobile_app_524 = "Sie vergessen, eine neue Version der MyCap-Konfiguration zu veröffentlichen."
mycap_mobile_app_525 = "Der Teilnehmer schließt die Aufgabe erneut mit der Antwort&nbsp;&nbsp;<code>No (0)</code> ab, und das Ergebnis wird an REDCap gesendet, um gespeichert zu werden."
mycap_mobile_app_526 = "REDCap <strong>weist das Ergebnis zurück</strong>, weil&nbsp;&nbsp;<code>No (0)</code> kein gültiger Auswahlwert mehr ist. Er wurde geändert zu&nbsp;&nbsp;<code>No (No)</code>."
mycap_mobile_app_527 = "MyCap erstellt anhand der zurückgewiesenen REDCap-Antwort ein Synchronisierungsproblem."
mycap_mobile_app_528 = "Sie prüfen das Synchronisierungsproblem und sehen, dass das Ergebnis aufgrund eines ungültigen Auswahlwerts nicht gespeichert werden konnte."
mycap_mobile_app_529 = "Sie erstellen den passenden REDCap-Eintrag mit den bereitgestellten Daten des Synchronisierungsproblems und markieren das Synchronisierungsproblem anschließend als gelöst."
mycap_mobile_app_530 = "Sie veröffentlichen MyCap-Projektkonfigurationsversion 2, damit Teilnehmende Ihre aktualisierten Multiple-Choice-Feldwerte erhalten."
mycap_mobile_app_531 = "* Klicken Sie auf \"Veröffentlichen\", wenn kürzlich Änderungen vorgenommen wurden"
;; mycap_mobile_app_534 is concatenated with an instrument name.
mycap_mobile_app_534 = "Dieses Datenerhebungsinstrument muss ein wiederholtes Instrument sein. Nach dem Speichern dieser Einstellungen schaltet MyCap wiederholbare Instrumente EIN für"
mycap_mobile_app_535 = "(in Sekunden)"
mycap_mobile_app_536 = "Aufgabendetails anzeigen (alle)"
mycap_mobile_app_537 = "Aufgabenzeitplan"
mycap_mobile_app_538 = "Unten finden Sie eine Liste aller für MyCap aktivierten Aufgaben. Diese Aufgaben erscheinen für Teilnehmende in der MyCap-Mobile-App gemäß dem Zeitplan, der für die jeweilige Aufgabe festgelegt wurde. Sie können ein REDCap-Instrument aktivieren, eine aktive Aufgabe erstellen sowie bestehende MyCap-Einstellungen im Online Designer ändern oder löschen. <br><b>HINWEIS:</b> Grün angezeigte Aufgaben sind aktive Aufgaben."
mycap_mobile_app_539 = "Gesamtzahl MyCap-aktivierter Aufgaben:"
mycap_mobile_app_540 = "Alle MyCap-Konfigurationen wurden erfolgreich in REDCap konvertiert. <br>Das MyCap-Modul wurde für dieses Projekt nun deaktiviert, und Sie werden zur Projekt-Setup-Seite weitergeleitet."
mycap_mobile_app_541 = "Beim Migrieren der Konfiguration vom MyCap External Module nach REDCap ist etwas schiefgelaufen!"
mycap_mobile_app_542 = "Anzeigen/Antworten"
mycap_mobile_app_543 = "<b>Hinweis:</b> Das Baseline-Datum darf kein Feld auf einem Instrument sein, das als MyCap-Aufgabe aktiviert ist."
mycap_mobile_app_544 = "MyCap wurde nun aktiviert! Ihre nächsten Schritte sind unten beschrieben."
mycap_mobile_app_545 = "<b>Über</b>-Seiten, die Ihr Projekt beschreiben. Diese Seiten erscheinen, wenn Teilnehmende dem Projekt in MyCap beitreten, und können jederzeit aus dem Menü der MyCap-App aufgerufen werden."
mycap_mobile_app_546 = "2) Entwerfen Sie Ihre Instrumente im Online Designer"
mycap_mobile_app_547 = "Das erste Instrument wird zum Erstellen des Teilnehmerdatensatzes verwendet und kann <b>NICHT</b> als MyCap-Aufgabe aktiviert werden, da ein Datensatz existieren muss, bevor ein Teilnehmer Ihrem Projekt in der MyCap-App beitreten kann. <br>Nachdem Sie Ihre Instrumente im Online Designer entworfen haben, können Sie sie für die Verwendung in MyCap aktivieren. Sie können jederzeit neue Instrumente hinzufügen und für MyCap aktivieren."
mycap_mobile_app_548 = "4) Aktivieren Sie Ihre Instrumente im Online Designer für MyCap"
mycap_mobile_app_549 = "Nicht alle Instrumente in einem Projekt müssen für MyCap aktiviert werden. Nachdem Sie bei einem Instrument auf \"Aktivieren\" geklickt haben, werden Sie zur Aufgabeneinrichtungsseite geleitet, um die Aufgabe für MyCap zu konfigurieren. Diese Einstellungen können jederzeit im Verlauf Ihres Projekts geändert werden. <b>Hinweis:</b> Instrumente können als Umfragen und MyCap-Aufgaben aktiviert werden (z. B. wenn nicht alle Teilnehmenden MyCap verwenden)."
mycap_mobile_app_552 = "6) Besuchen Sie die MyCap-Teilnehmerverwaltung (im linken Menü), um die MyCap-Teilnehmerliste, Kommunikation und Einladungen zum Beitritt zu Ihrem Projekt zu verwalten:"
mycap_mobile_app_553 = "<b>MyCap ist eine teilnehmerorientierte mobile Anwendung (für iOS und Android)</b>, die zur Datenerhebung und automatisierten Durchführung aktiver Aufgaben verwendet wird (Aktivitäten, die von Teilnehmenden mit Sensoren mobiler Geräte unter teilkontrollierten Bedingungen durchgeführt werden). Alle in der MyCap-App erhobenen Daten werden automatisch an den REDCap-Server zurückgesendet, sobald eine Internetverbindung verfügbar ist (d. h. sie kann auch für Offline-Datenerhebung bei Teilnehmenden verwendet werden)."
mycap_mobile_app_554 = "Mit der MyCap-Teilnehmerliste können Sie Teilnehmende, die MyCap in diesem Projekt verwenden, einladen, verwalten und ihnen Nachrichten senden. Teilnehmende erscheinen in dieser Liste, sobald im Projekt ein Datensatz erstellt wurde. Jedem Teilnehmer kann ein eindeutiger Hyperlink oder QR-Code zum Beitritt zum Projekt gesendet werden. Wenn Sie möchten, können Sie die Datensätze, die in der Teilnehmerliste erscheinen, mit der Option \"<b>Teilnehmer-Anzeigelogik</b>\" beschränken. Sie können auch <b>ein benutzerdefiniertes Teilnehmer-Label festlegen</b>, um eine besser erkennbare Kennung für jeden Teilnehmer anzuzeigen."
mycap_mobile_app_555 = "<b>HINWEIS:</b> Da Sie einer Zugriffsgruppe zugewiesen wurden, können Sie Ankündigungen nur an Teilnehmende aus Ihrer Gruppe senden."
mycap_mobile_app_556 = "Dieses Instrument kann nicht als MyCap-Aufgabe aktiviert werden."
mycap_mobile_app_557 = "<b>Kontakte</b> zeigen Projektpersonal oder Kontaktinformationen an, die Teilnehmenden helfen können."
mycap_mobile_app_558 = "<b>Links</b> bieten dauerhaften Zugriff auf wichtige webbasierte Ressourcen wie Videos und Websites"
mycap_mobile_app_559 = "<b>Design</b> ermöglicht die Auswahl des Farbschemas der App (<b>Hinweis</b>: Dies funktioniert NUR auf iOS-Geräten; Android-Geräte verwenden standardmäßig das blaue Farbschema)."
mycap_mobile_app_560 = "<b>Teilnehmende</b> - Dieser Tab ermöglicht Benutzern, ein benutzerdefiniertes Teilnehmer-Label zu aktivieren, festzulegen, welche Datensätze in der MyCap-Teilnehmerliste angezeigt werden, und Teilnehmer-Zugangsinformationen (z. B. einen datensatzspezifischen QR-Code oder dynamischen Link) zum Beitritt zum Projekt abzurufen."
mycap_mobile_app_561 = "<b>Nachrichten</b> - Dieser Tab ermöglicht Ihnen, Nachrichten von Teilnehmenden anzuzeigen, Nachrichten an einzelne Teilnehmende zu senden oder Ankündigungen an alle Teilnehmenden zu machen. (<b>Hinweis:</b> REDCap-Benutzer erhalten keinen Alarm, wenn Teilnehmende eine Nachricht senden. Bitte prüfen Sie daher regelmäßig, wenn Sie häufige Kontaktaufnahmen erwarten.)"
mycap_mobile_app_562 = "<b>App-Synchronisierungsprobleme</b> - Dieser Tab ermöglicht Ihnen, Daten anzuzeigen, die nicht korrekt vom Mobilgerät der Teilnehmenden mit dem REDCap-Projekt synchronisiert wurden. Beschreibende Informationen helfen Ihnen zu verstehen, warum Daten nicht synchronisiert wurden. (<b>Hinweis:</b> Synchronisierungsprobleme können nicht automatisch in Ihr Projekt importiert werden, aber die Aufgabendaten, die korrekt synchronisiert worden wären, werden in einer Tabelle dargestellt und können bei Bedarf manuell in eine CSV kopiert, neu formatiert und manuell in das Projekt importiert werden.)"
mycap_mobile_app_563 = "MyCap ist eine No-Code-Lösung für Forschungsteams, die longitudinal angelegte Projekte oder Projekte mit häufigem Teilnehmerkontakt durchführen. MyCap erleichtert außerdem Teilnehmerbindung und -engagement, indem es schnellen Zugriff auf Projektpersonal und Zwei-Wege-Kommunikation (z. B. Nachrichten und Ankündigungen) innerhalb der App bietet. MyCap ist auf jedem iOS-Gerät (iOS v11.0+) und jedem Android-Gerät (Android v8.0+) verfügbar."
mycap_mobile_app_564 = "Alle MyCap-Einstellungen werden in REDCap vorhanden sein, sodass kein Wechsel zwischen REDCap und External Module mehr erforderlich ist."
mycap_mobile_app_565 = "Neue Funktionen werden nur für diejenigen verfügbar sein, die den neuen MyCap Core in REDCap verwenden."
mycap_mobile_app_566 = "Für das External Module werden nur größere Fehlerbehebungen veröffentlicht. "
mycap_mobile_app_567 = "Konfigurationseinstellungen werden übertragen."
mycap_mobile_app_568 = "Teilnehmende in bestehenden Projekten müssen dem Projekt nicht erneut beitreten."
mycap_mobile_app_569 = "Neue Teilnehmende können Projekten weiterhin über die MyCap-Teilnehmerzugangsinformationen beitreten (d. h. MyCap-QR-Code oder URL)."
mycap_mobile_app_570 = "Warum sollte ich mein Projekt migrieren?"
mycap_mobile_app_571 = "Wie wirkt sich die Migration auf mein Projekt aus?"
mycap_mobile_app_572 = "Die Benutzeroberfläche zur Verwaltung der MyCap-Einstellungen und -Konfiguration wird neu sein. Diese Funktionen gewährleisten jedoch einen reibungslosen Übergang: "
mycap_mobile_app_573 = "Bestehende MyCap-Aufgaben"
;; mycap_mobile_app_574 is concatenated with a task count and mycap_mobile_app_575.
mycap_mobile_app_574 = "Da Ihre MyCap-Konfiguration insgesamt"
;; mycap_mobile_app_575 is concatenated after a task count and mycap_mobile_app_574.
mycap_mobile_app_575 = "Aufgaben enthält, werden alle Aufgabeneinstellungen (einschließlich Aufgabentitel) jeder MyCap-Aufgabe kopiert und im REDCap-Projekt unverändert beibehalten. Wenn Sie nach der Migration Aufgabeninformationen, optionale Einstellungen oder Zeitplaneinstellungen ändern möchten, können Sie dies im <b>Online Designer</b> über die Aktivieren-Schaltfläche oder den Link \"Bearbeiten\" in der Spalte <b>\"Als MyCap-Aufgabe aktiviert\"</b> für jedes Datenerhebungsinstrument tun."
mycap_mobile_app_576 = "Bestehende sonstige Konfiguration"
mycap_mobile_app_577 = "Wenn Sie nach der Migration Informationen zu Ihren MyCap-Über-Seiten, Kontakten, Links oder Design-Einstellungen verwalten möchten, können Sie dies über den Link <b>MyCap Mobile App</b> tun, der im linken Bereich hinzugefügt wurde."
mycap_mobile_app_578 = "<b>HINWEIS:</b> Für dieses Projekt ist bereits eine MyCap-Konfiguration verfügbar. Bitte prüfen Sie die bestehende Konfiguration und beginnen Sie mit der Migration Ihrer bestehenden MyCap-Einstellungen/-Daten in die integrierte MyCap-Funktion von REDCap."
mycap_mobile_app_579 = "Nachdem Sie MyCap in Ihrem Projekt aktiviert haben, folgen Sie den untenstehenden Schritten, um die Einrichtung abzuschließen:"
mycap_mobile_app_580 = "Gesamte MyCap-Daten vom External Module (EM) nach REDCap migrieren"
mycap_mobile_app_581 = "MyCap EM nach REDCap"
mycap_mobile_app_582 = "Die gesamte MyCap-Konfiguration kann in die neue Benutzeroberfläche migriert werden, die REDCap zur Verwaltung der MyCap-Konfiguration anbietet."
mycap_mobile_app_583 = "Hinweis: Nach der Migration Ihres Projekts vom EM zu REDCap Core können Sie und andere Benutzer nicht mehr auf das MyCap External Module zugreifen. Die gesamte MyCap-Konfiguration wird nach REDCap migriert, und es gibt KEINE Möglichkeit, zur Benutzeroberfläche des External Module zurückzukehren.<br>Bei der Migration konvertiert REDCap die Informationen zum Teilnehmerbeitritt (QR-Code, Hyperlink), die zuvor vom MyCap External Module erzeugt wurden. Das bedeutet, dass sich das HTML geändert hat, das zur Anleitung von Teilnehmenden beim Beitritt zu Ihrem Projekt bereitgestellt wurde. Während der Migration wird das HTML automatisch aktualisiert, wenn es in Alarme & Benachrichtigungen und Umfrage-Abschlusstext eingefügt wurde, damit neue Teilnehmende Ihrem Projekt sofort nach der Migration beitreten können. Wenn Sie jedoch das HTML \"Participant Access Info\" des External Module an anderen Stellen verwendet haben, ersetzen Sie es bitte durch das HTML, das unter MyCap Mobile App > Teilnehmende > \"Teilnehmer einladen (HTML)\" bereitgestellt wird."
mycap_mobile_app_584 = "Bitte prüfen Sie vor der Migration vom EM nach REDCap, ob die untenstehenden Details Ihre MyCap-EM-Einstellungen, Seiten, Aufgaben und Teilnehmenden wiedergeben."
mycap_mobile_app_585 = "<b>Installationsdatum: </b>Das Datum, an dem ein Teilnehmer den QR-Code gescannt hat, um Ihr Projekt zu laden."
mycap_mobile_app_588 = "Dieses Instrument muss ein wiederholtes Instrument sein."
mycap_mobile_app_589 = "MyCap muss einige Änderungen an diesem Instrument vornehmen, um diese Probleme zu beheben:"
mycap_mobile_app_590 = "ERFOLG! Alle aufgeführten MyCap-Probleme für dieses Instrument wurden erfolgreich behoben. Die Seite wird nun neu geladen, um die Änderungen anzuzeigen."
mycap_mobile_app_591 = "MyCap-Problem beheben in"
mycap_mobile_app_592 = "alle"
mycap_mobile_app_593 = "Fortfahren"
mycap_mobile_app_594 = "Mit Änderungen fortfahren?"
mycap_mobile_app_596 = "Baseline-Datum-Aufgabeneinrichtung:"
mycap_mobile_app_597 = "Wenn das Baseline-Datum <b>nicht in REDCap eingegeben ist, wenn ein Teilnehmer Ihrem Projekt beitritt</b>, muss er die untenstehenden Fragen beantworten und ein Baseline-Datum angeben, bevor er Aufgaben in MyCap abschließen kann."
mycap_mobile_app_611 = "MyCap aktivieren"
mycap_mobile_app_612 = "Wenn Sie MyCap in diesem Projekt aktivieren möchten, muss zuerst eine Anfrage zur Genehmigung an einen REDCap-Administrator gesendet werden. Klicken Sie auf die Schaltfläche unten, um die Anfrage an einen Administrator zu senden; anschließend erhalten Sie eine E-Mail, sobald Ihre Anfrage genehmigt wurde."
mycap_mobile_app_613 = "Anfrage zum Aktivieren von MyCap senden"
mycap_mobile_app_614 = "Ein Benutzer hat angefordert, dass ein REDCap-Administrator MyCap in diesem Projekt aktiviert. Klicken Sie auf die Schaltfläche unten, um MyCap zu aktivieren; anschließend wird der Benutzer per E-Mail über seine Anfrage benachrichtigt."
;; mycap_mobile_app_615 is concatenated with the requester name and project details in an email.
mycap_mobile_app_615 = "hat angefordert, dass MyCap im folgenden Projekt aktiviert wird:"
mycap_mobile_app_616 = "Anfrage zum Aktivieren von MyCap"
mycap_mobile_app_617 = "Anfrage zum AKTIVIEREN VON MYCAP genehmigen"
mycap_mobile_app_618 = "MyCap wurde aktiviert"
;; mycap_mobile_app_619 is concatenated with the project title in an email.
mycap_mobile_app_619 = "MyCap wurde aktiviert in Ihrem Projekt mit dem Namen"
mycap_mobile_app_620 = "Wichtige Informationen zum Start mit MyCap in Ihrem Projekt anzeigen"
mycap_mobile_app_621 = "MyCap wurde aktiviert, und der Anfragende wurde per E-Mail benachrichtigt."
mycap_mobile_app_622 = "Einstellungen für MyCap-Aufgabe ändern"
mycap_mobile_app_624 = "Entwerfen Sie die Hauptkomponenten, die Teilnehmende sehen, wenn sie die MyCap-App auf ihrem Mobilgerät anzeigen. Verwenden Sie die Tabs unten, um jede Komponente anzupassen. Um Ihre Änderungen an alle Teilnehmenden zu übertragen, klicken Sie auf Veröffentlichen."
mycap_mobile_app_625 = "MyCap-Teilnehmende"
mycap_mobile_app_626 = "MyCap-Teilnehmerliste"
mycap_mobile_app_627 = "<b>Baseline-Datum: </b>Einige Projekte planen Aufgaben relativ zu einem Baseline-Datum. In einem Physiotherapieprojekt könnte das Baseline-Datum beispielsweise das Datum angeben, an dem der Teilnehmer mit der Physiotherapie begonnen hat. Siehe <b>Online Designer > Baseline-Datum-Einstellungen</b>. Dort können Sie Baseline-Datum-Einstellungen <b>ein-/ausschalten</b>, wenn Sie Aufgabenzeitpläne anhand eines bestimmten Ereignisses auslösen möchten (z. B. Entlassungsdatum, Klinikbesuch)."
mycap_mobile_app_628 = "MyCap-Teilnehmerverwaltung"
mycap_mobile_app_629 = "Teilnehmende zur Nutzung von MyCap verwalten und einladen sowie Nachrichten senden/empfangen"
mycap_mobile_app_631 = "MyCap-App entwerfen und konfigurieren"
mycap_mobile_app_633 = "Titel der Kontaktseite"
mycap_mobile_app_635 = "MyCap-bezogene Optionen"
mycap_mobile_app_636 = "Umfrage- und MyCap-bezogene Optionen"
mycap_mobile_app_637 = "MyCap-Einstellungen"
mycap_mobile_app_638 = "MyCap-App-Konfiguration ist veraltet. Erwägen Sie, eine neue Version zu veröffentlichen."
mycap_mobile_app_639 = "MyCap-Erstanweisungen anzeigen"
mycap_mobile_app_640 = "MyCap-Erstanweisungen"
mycap_mobile_app_641 = "1) MyCap-Benutzerrechte anpassen"
mycap_mobile_app_642 = "Benutzer mit Rechten für \"Project Design and Setup\" können MyCap-Aufgaben (Instrumente) und Zeitpläne aktivieren und konfigurieren. <u>Benutzern kann außerdem das Benutzerrecht \"MyCap-Teilnehmende verwalten\" gegeben werden</u>, um Teilnehmende einzuladen, Nachrichten an einzelne Teilnehmende zu senden oder Ankündigungen an alle Teilnehmenden gleichzeitig zu senden. Wenn ein Benutzer zu einer Zugriffsgruppe gehört, kann er nur Teilnehmende einladen und mit ihnen interagieren, die seinem DAG zugewiesen sind."
mycap_mobile_app_643 = "HINWEIS: Nur REDCap-Administratoren dürfen die MyCap-EM-Migration durchführen. Bitte wenden Sie sich an Ihren lokalen REDCap-Administrator, wenn Sie dies tun möchten."
mycap_mobile_app_644 = "3) Aktivieren Sie bei Bedarf die Verwendung eines Baseline-Datums."
mycap_mobile_app_645 = "alle MyCap-Aufgaben werden anhand des Installationsdatums des Teilnehmers geplant, also des Datums, an dem er Ihrem Projekt in seiner MyCap-App beitritt. <b>Wenn Sie einige oder alle MyCap-Aufgaben anhand eines anderen Datums auslösen möchten</b>, z. B. eines Entlassungsdatums oder Klinikbesuchs, <b>können Sie \"Baseline-Datum-Einstellungen\" über Online Designer > MyCap-Optionen konfigurieren</b>. <br>Das Baseline-Datum ist kein REDCap-Instrument; es ist nur ein Textfeld mit Datumsvalidierung. Außerdem <b>muss dieses Feld auf einem Instrument liegen, das nicht für MyCap aktiviert ist</b>, falls Projektbenutzer dieses Datum eingeben oder erfassen möchten, bevor der Teilnehmer dem Projekt in seiner MyCap-App beitritt. Sobald das Textfeld existiert (z. B. in Ihrem ersten Instrument, das nicht in MyCap aktiviert ist), können Sie dieses Feld beim Konfigurieren der Baseline-Einstellungen auswählen."
mycap_mobile_app_646 = "7) Veröffentlichen Sie Ihre MyCap-Aufgaben und Ihr Design"
mycap_mobile_app_648 = "8) Testen Sie Ihr Projekt auf iOS und Android"
mycap_mobile_app_649 = "Nach dem Veröffentlichen Ihrer Aufgaben und Designs sind Sie bereit, Ihr Projekt zu testen. Wir empfehlen, Ihr Projekt auf Android- (v8.0+) und iOS-Geräten (v11.0+) zu testen, bevor Sie Teilnehmende aufnehmen. Wir empfehlen außerdem Tests auf allen Gerätetypen (Telefone, Tablets), die Teilnehmende möglicherweise verwenden. <br><b>Hinweis:</b> Wenn Sie sehen möchten, wie Aufgaben für Teilnehmende erscheinen, können Sie alle MyCap-Aufgabenzeitpläne auf \"unendlich\" setzen, da Sie dadurch die Aufgaben nach vorgenommenen und veröffentlichten Änderungen abschließen können. Sobald die Aufgabenansicht zufriedenstellend ist, richten Sie den richtigen Zeitplan ein und <b>veröffentlichen Sie eine neue MyCap-Version</b>."
mycap_mobile_app_650 = "9) Veröffentlichen Sie immer dann eine neue MyCap-Version, wenn Sie Änderungen vornehmen."
mycap_mobile_app_651 = "Sie können jederzeit Änderungen an Ihrem Projekt vornehmen. Alle MyCap-bezogenen Änderungen müssen jedoch 'veröffentlicht' werden, bevor bestehende oder neue Teilnehmende das Update sehen. <br>Teilnehmende sehen die aktualisierte Version automatisch, wenn sie das nächste Mal ihre MyCap-App öffnen. Von Teilnehmenden ist keine Aktion erforderlich."
mycap_mobile_app_652 = "Was nach der Migration meines Projekts vom MyCap External Module zur REDCap-Oberfläche zu tun ist:"
mycap_mobile_app_653 = "Nach der Migration Ihres Projekts vom MyCap External Module zur REDCap-Oberfläche müssen Sie keine Änderungen vornehmen. Bestehende Teilnehmende können ihre App weiterhin verwenden, um Aufgaben abzuschließen, und neue Teilnehmende können Ihrem Projekt beitreten."
mycap_mobile_app_654 = "1) **NEUE FUNKTION** MyCap-Benutzerrechte anpassen."
mycap_mobile_app_655 = "2) Aktualisieren Sie bei Bedarf Ihre Instrumente im Online Designer."
mycap_mobile_app_656 = "Das erste Instrument wird weiterhin zum Erstellen des Teilnehmerdatensatzes verwendet und kann <b>NICHT</b> als MyCap-Aufgabe aktiviert werden, da ein Datensatz existieren muss, bevor ein Teilnehmer Ihrem Projekt in der MyCap-App beitreten kann. <br>Sie können jederzeit neue Instrumente hinzufügen und für MyCap aktivieren."
mycap_mobile_app_657 = "3) Aktivieren Sie Ihre Instrumente im Online Designer für MyCap"
mycap_mobile_app_658 = "Aufgabenzeitpläne, die im External Module erstellt wurden, werden nach der Migration nicht geändert. Nach der Migration können Sie jedoch Aktualisierungen vornehmen oder neue Instrumente im Online Designer aktivieren. Zur Erinnerung: Nicht alle Instrumente in einem Projekt müssen für MyCap aktiviert werden. Nachdem Sie bei einem Instrument auf \"Aktivieren\" geklickt haben, werden Sie zur Aufgabeneinrichtungsseite geleitet, um die Aufgabe für MyCap zu konfigurieren. Diese Einstellungen können jederzeit im Verlauf Ihres Projekts geändert werden. <br><b>Hinweis:</b> Instrumente können als Umfragen und MyCap-Aufgaben aktiviert werden (z. B. wenn nicht alle Teilnehmenden MyCap verwenden)."
mycap_mobile_app_659 = "4) Bei Bedarf 'Baseline-Datum-Einstellungen' im Online Designer anzeigen/bearbeiten."
;; mycap_mobile_app_660 is concatenated with mycap_mobile_app_697 and mycap_mobile_app_645.
mycap_mobile_app_660 = "Baseline-Datum-Einstellungen werden nach der Migration Ihres Projekts nicht geändert. Sie können jedoch ein Baseline-Datum im Online Designer ändern oder hinzufügen. Zur Erinnerung,"
mycap_mobile_app_661 = "5) Aussehen und Bediengefühl von MyCap über MyCap App Design bearbeiten"
;; mycap_mobile_app_662 is concatenated with a link/string that follows.
mycap_mobile_app_662 = "Das Aussehen und Bediengefühl Ihrer App ändert sich nach der Migration für Teilnehmende nicht. Wenn Sie Aktualisierungen vornehmen möchten,"
mycap_mobile_app_663 = "7) Veröffentlichen Sie immer dann eine neue MyCap-Version, wenn Sie Änderungen vornehmen."
mycap_mobile_app_664 = "Sie können jederzeit Änderungen an Ihrem Projekt vornehmen. Wenn Sie Änderungen an für MyCap aktivierten Instrumenten, Aufgabenzeitplänen oder am App-Design vornehmen, stellen Sie sicher, dass Sie über die Seiten MyCap App Design oder Online Designer eine <b>neue MyCap-Version veröffentlichen</b>. Sie müssen nur an EINER dieser Stellen veröffentlichen. Teilnehmende sehen die aktualisierte Version automatisch, wenn sie das nächste Mal ihre MyCap-App öffnen. Von Teilnehmenden ist keine Aktion erforderlich."
mycap_mobile_app_665 = "MyCap-Hinweis:"
mycap_mobile_app_669 = "Weitere Informationen zu MyCap finden Sie auf der <a href=\"https://projectmycap.org/\" target=\"_blank\"><u>MyCap-Website</u></a>, in der <a href=\"https://academic.oup.com/jamiaopen/article/5/2/ooac047/6601324\" target=\"_blank\"><u>Publikation</u></a>, in den <a href=\"https://projectmycap.org/mycap-resources/\" target=\"_blank\"><u>Ressourcen</u></a> und in einer Liste von <a href=\"https://projectmycap.org/mycap-use-cases/\" target=\"_blank\"><u>MyCap-Anwendungsfällen</u></a>."
