api_91 = "Sie können neue Arms zum Project hinzufügen oder den Namen vorhandener Arms aktualisieren, indem Sie eine CSV-Datei mit einer neuen Arms-Konfiguration hochladen. Das Format der CSV-Upload-Datei erhalten Sie, indem Sie die CSV-Datei Ihrer vorhandenen Arms exportieren. <b>HINWEIS:</b> Arms können umbenannt werden, indem einfach der Arm-Name in der CSV-Datei geändert wird. Arms können nicht mit der CSV-Datei gelöscht werden. Wenn Sie einen Arm löschen oder die Nummer eines Arms ändern möchten, verwenden Sie bitte die angegebenen Links für jeden Arm auf dieser Seite."
api_92 = "Sie können neue Events zum Project hinzufügen oder Event-Namen bzw. Event-Reihenfolge vorhandener Events aktualisieren, indem Sie eine CSV-Datei mit einer neuen Events-Konfiguration hochladen. Das Format der CSV-Upload-Datei erhalten Sie, indem Sie die CSV-Datei Ihrer vorhandenen Events exportieren. <b>HINWEIS:</b> Wenn Sie ein vorhandenes Event ändern möchten, *müssen* Sie dessen eindeutigen Event-Namen angeben. Wenn die Spalte 'unique_event_name' nicht bereitgestellt wird, wird das Event einfach als neues Event erstellt. Sie können Events nicht mit der CSV-Datei löschen, sondern nur durch Klicken auf das Löschsymbol neben dem jeweiligen Event."
