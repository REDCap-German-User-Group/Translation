econsent_47 = "e-Consent für einen Fragebogen aktivieren"
econsent_48 = "Für alle Fragebögen im Projekt ist e-Consent aktiviert. Wenn Sie die e-Consent-Einstellungen eines Fragebogens ändern möchten, können Sie dies über die Tabelle auf dieser Seite tun."
econsent_49 = "Sie können das e-Consent Framework für jeden Fragebogen im Projekt aktivieren. Wählen Sie zunächst unten den Fragebogen aus, für den Sie e-Consent aktivieren möchten; anschließend werden Sie aufgefordert, alle e-Consent-Einstellungen für diesen Fragebogen anzugeben."
econsent_50 = "e-Consent aktivieren"
econsent_51 = "e-Consent-Einstellungen für Fragebogen"
econsent_52 = "Sie können diesen Dialog verwenden, um Ihr statisches Einwilligungsformular (oder den Text des Einwilligungsformulars) bereitzustellen, das auf der Fragebogenseite dem Teilnehmer angezeigt wird. Unten können Sie ein Einwilligungsformular hinzufügen oder ein vorhandenes durch eine neue Version ersetzen. Wenn Sie ein einfaches Projekt haben, können Sie Ihr Einwilligungsformular über den Online Designer einem beschreibenden Feld hinzufügen. Wenn Sie jedoch ein komplexeres Projekt haben, das mehrere Zugriffsgruppen und/oder mehrere MLM-Sprachen verwendet, die jeweils ein eigenes eindeutiges Einwilligungsformular erfordern könnten, kann die Bereitstellung Ihrer Einwilligungsformulare über diese Oberfläche übersichtlicher sein."
econsent_53 = "Wählen Sie ein beschreibendes Feld im Fragebogen aus, das als Ort des Einwilligungsformulars dienen soll. Das Einwilligungsformular wird unmittelbar unter diesem Feld auf der Fragebogenseite angezeigt. Hinweis: Das ausgewählte beschreibende Feld muss für alle Einwilligungsformulare dieses Fragebogens dasselbe sein. Wenn das Feld geändert wird, wird es für alle Einwilligungsformulare dieses Fragebogens geändert."
econsent_54 = "Keine Sprachen auf MLM-Seite definiert"
econsent_55 = "Wenn der Teilnehmer keine Sprache ausgewählt hat"
econsent_56 = "Dieses Einwilligungsformular nur anzeigen, wenn der Fragebogen in der ausgewählten Sprache angezeigt wird."
econsent_57 = "Keine Zugriffsgruppen vorhanden"
econsent_58 = "Wenn Datensatz keiner DAG zugewiesen ist (Standard)"
econsent_59 = "Dieses Einwilligungsformular nur anzeigen, wenn der Datensatz der ausgewählten Zugriffsgruppe zugewiesen ist. Hinweis: Die Standardoption wird verwendet, wenn keine DAG-spezifischen Einwilligungsformulare vorhanden sind."
econsent_60 = "Einstellungen speichern"
