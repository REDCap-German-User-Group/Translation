design_719 = "Projekt erfolgreich gelöscht!"
design_720 = "Ihr Projekt wurde sofort gelöscht, weil festgestellt wurde, dass das Projekt keine Datensätze enthielt. Daher war es nicht nötig, eine Anfrage an den REDCap-Administrator zu senden. Das Projekt wurde nun erfolgreich gelöscht. Sie werden jetzt zurück zur Seite Meine Projekte weitergeleitet."
