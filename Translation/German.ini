survey_1609 = "Die Test-E-Mail wurde erfolgreich gesendet an"
survey_1610 = "Für Befragten drucken"
survey_1611 = "Diese Option ist nicht verfügbar, wenn die Option Umfrage-Auto-Fortsetzen oder Auto-Start der Umfrage-Warteschlange aktiviert ist. Wenn ein Feld außerdem das Action Tag @HIDDEN-PDF verwendet, wird es nicht in der PDF angezeigt."
