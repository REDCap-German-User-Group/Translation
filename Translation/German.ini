econsent_01 = "Teilnehmer"
econsent_02 = "Aktiv?"
econsent_03 = "Ausgewählte Instrumente"
econsent_04 = "Alle Instrumente"
econsent_05 = "Das REDCap e-Consent Framework stellt standardisierte Tools bereit, um Einwilligungen einzuholen und Einwilligungsdokumentation mit einer Zertifizierungsseite und einer Speicherfunktion abzulegen, die automatisch ein PDF als \"Ausdruck\" des unterschriebenen Formulars erzeugt. Das e-Consent Framework bietet viele Optionen zur Anpassung an Ihre spezifischen Anforderungen. Das e-Consent Framework kann für jeden Fragebogen in diesem Projekt aktiviert werden. Optional können Sie Einwilligungsformulare entweder als eingebettetes PDF oder als Rich Text bereitstellen, der im Einwilligungsfragebogen selbst angezeigt wird. Die Einwilligungsformulare können kontextspezifisch sein, wenn Sie MLM-Sprachen und/oder Zugriffsgruppen verwenden, sodass für einen Teilnehmer mit einer bestimmten Sprache und/oder zugewiesener DAG das passende Einwilligungsformular angezeigt wird. Weitere Details finden Sie nach dem Aktivieren von e-Consent für einen Fragebogen über den Link \"Einwilligungsformular hinzufügen\"."
