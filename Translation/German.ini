data_entry_607 = "Dies ist eine MyCap-Annotation, die mit Textfeldern verwendet wird. Dieses Feld erfasst das Installationsdatum des MyCap-Teilnehmers, wenn der Teilnehmer dem Projekt über die mobile MyCap-App beitritt. HINWEIS: Nur zur Verwendung in der mobilen MyCap-App."
