pmt_80 = "Abschlussaktion (wird am ursprünglichen Projekt durchgeführt):"
pmt_81 = "In diese REDCap-Instanz migrierte Projekte"
pmt_82 = "<b>Hinweis: Dieses Projekt enthält {0} Dynamic-SQL-Feld(er).</b> Bitte beachten Sie, dass SQL-Felder aus Sicherheitsgründen nicht unverändert in andere REDCap-Instanzen migriert werden können, sondern während der Migration stattdessen in statische Drop-down-Felder umgewandelt werden."
pmt_83 = "<b>Hinweis: Es scheint, dass Ihr Projekt *möglicherweise* bestimmte [X-id] Smart Variables enthält</b>, wie [project-id], [event-id], [record-dag-id] und andere, die auf eine ID-Nummer verweisen. Solche Smart Variables könnten in Branching Logic, Berechnungen, ASI-bedingter Logik und/oder an vielen anderen Stellen in Ihrem Projekt verwendet werden. Bitte beachten Sie, dass Smart Variables, die ID-Nummern zurückgeben, nach der Migration des Projekts in eine andere REDCap-Instanz nicht wie erwartet funktionieren, weil die ID-Nummern an Dinge gebunden sind, die für jede REDCap-Instanz eindeutig sind. Falls möglich, ersetzen Sie solche Smart Variables durch gleichwertige, die stattdessen auf eindeutige automatisch generierte Werte verweisen. Ersetzen Sie beispielsweise [event-id] durch [event-name] oder [record-dag-id] durch [record-dag-name]. Bedenken Sie aber, dass Sie auch den vom Smart Variable referenzierten Wert ändern müssen."
pmt_84 = "*Bitte beachten Sie: Alarme und ASI-Einstellungen können zwar migriert werden (wenn ausgewählt), aber alle geplanten Benachrichtigungen und Einladungen (wie im Notification Log und Survey Invitation Log angezeigt) können nicht migriert werden."
pmt_86 = "WICHTIGER HINWEIS: Bei der Migration sind unbekannte Fehler aufgetreten, und einige Dinge wurden möglicherweise nicht vollständig migriert. Die folgenden Dinge unten sind als nicht vollständig migriert vermerkt. Bitte prüfen Sie Ihr neues Projekt, um dies zu bestätigen. Wir entschuldigen uns für diese Probleme."
pmt_87 = "Projektmigrations-Dashboard"
pmt_88 = "Diese Seite dient zur Überwachung des Fortschritts aller Projekte, die mit dem Project Migration Tool auf diese REDCap-Serverinstanz migriert werden."
