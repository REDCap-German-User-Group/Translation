survey_1375 = "SendGrid-Webdienst für E-Mail-Dienste aktivieren?"
survey_1376 = "Dadurch können SendGrid-Dienste in REDCap-Projekten verwendet werden, z. B. zum Senden von Alarmen und Benachrichtigungen mit SendGrid-Templates."
survey_1377 = "Hinweis: Um den SendGrid-Dienst zu verwenden, muss der REDCap-Webserver ausgehende HTTP/HTTPS-Anfragen an die folgende URL stellen können:"
survey_1378 = "Weitere Informationen zu SendGrid siehe"
survey_1379 = "Wer kann SendGrid-Dienste in einem bestimmten Projekt aktivieren?"
survey_1380 = "Wenn 'Nur Administratoren' ausgewählt ist, sehen normale Benutzer die Einstellung nicht einmal auf der Projekt-Setup-Seite des Projekts (nur Administratoren können sie sehen und aktivieren). Wenn 'Alle Benutzer' ausgewählt ist, kann jeder Benutzer mit Projekt-Design-/Setup-Rechten in diesem Projekt die Einstellung sehen und auch selbst aktivieren, um SendGrid-Dienste in seinem Projekt zu nutzen."
survey_1381 = "Informationen zu SendGrid-Diensten für <u>alle Benutzer</u> auf der Projekt-Setup-Seite in einem Projekt anzeigen?"
survey_1382 = "Nein, alle Informationen zu SendGrid-Diensten ausblenden"
survey_1383 = "Ja, Informationen zu SendGrid-Diensten anzeigen"
survey_1384 = "Wenn 'Nein' ausgewählt ist, werden SendGrid-Template-E-Mail-Dienste Benutzern auf der Projekt-Setup-Seite nicht beworben, und Informationen zu SendGrid werden nirgends in einem Projekt angezeigt. Die Einstellung 'Nein' ist vorzuziehen, wenn Sie SendGrid-Dienste nur einer begrenzten Anzahl von Benutzern bekannt machen möchten, ohne sie allen Benutzern zu bewerben."
survey_1385 = "EINRICHTUNG & KONFIGURATION: Diese Integration erfordert, dass Sie ein Konto auf <a href='https://sendgrid.com' target='_blank'><u>sendgrid.com</u></a> eingerichtet haben. Nach dem Erstellen eines SendGrid-Kontos müssen Sie Absender für das Konto konfigurieren, die dynamischen Templates erstellen, die Sie für REDCap-Alarme verwenden möchten, und einen API-Key mit passenden Berechtigungen für REDCap generieren. Beim Konfigurieren von Absendern in Ihrem SendGrid-Konto können Sie einzelne Absender angeben, eine ganze Domain authentifizieren, sodass jede E-Mail-Adresse dieser Domain als Absender verwendet werden kann, oder beides. Bitte lesen Sie die SendGrid-Dokumentation zum Einrichten von <a href='https://docs.sendgrid.com/ui/account-and-settings/how-to-set-up-domain-authentication' target='_blank'><u>Domain Authentication</u></a> und zum Hinzufügen einzelner <a href='https://docs.sendgrid.com/ui/sending-email/senders' target='_blank'><u>Verified Senders</u></a>. Um ein dynamisches Template in Ihrem SendGrid-Konto zu erstellen, melden Sie sich bei Ihrem SendGrid-Konto an und navigieren Sie über die Seitenleiste zu <b>Email API→Dynamic Templates</b>. Dort können Sie ein dynamisches Template erstellen, ihm einen Namen geben und ein E-Mail-Design damit verknüpfen. Weitere Informationen zum Erstellen von Templates in Ihrem SendGrid-Konto finden Sie in der SendGrid-Dokumentation zu <a href='https://sendgrid.com/solutions/email-api/dynamic-email-templates/' target='_blank'>Dynamic Templates</a> und <a href='https://docs.sendgrid.com/for-developers/sending-email/using-handlebars' target='_blank'><u>Handlebars</u></a>. Um schließlich einen API-Key für REDCap zu erstellen, melden Sie sich bei Ihrem SendGrid-Konto an und navigieren Sie über die Seitenleiste zu <b>Settings→API Keys</b>. Dort können Sie einen neuen API-Key erstellen und dessen Berechtigungen festlegen. Es wird empfohlen, einen API-Key mit <b>Restricted Access</b> zu erstellen und dem API-Key nur die Berechtigungen zu geben, die REDCap zum Funktionieren benötigt. REDCap benötigt Full Access auf <b>Mail Send</b>, Read Access auf <b>Sender Authentication</b>, Read Access auf <b>Template Engine</b> und Read Access auf <b>Unsubscribe Groups</b> im Abschnitt <b>Suppression</b>. Sobald Sie Ihren API-Key haben, können Sie ihn verwenden, um SendGrid-Template-E-Mail-Dienste für Alarme & Benachrichtigungen über die REDCap-Projekt-Setup-Seite zu konfigurieren."
survey_1386 = "KOSTEN: Wenn REDCap API-Aufrufe an SendGrids Email API mit dem API-Key Ihres Kontos durchführt, verfolgt Ihr SendGrid-Konto die Nutzung durch REDCap, und Ihrem SendGrid-Konto werden entsprechend Gebühren berechnet. Dies geschieht nicht durch REDCap, sondern intern durch SendGrid, während Sie dessen Dienste verwenden. Auf diese Weise werden keine Geldtransaktionen durch REDCap vorgenommen; daher liegt es in Ihrer Verantwortung, genügend Guthaben in Ihrem SendGrid-Konto zu halten, um sicherzustellen, dass der Dienst für Ihr REDCap-Projekt weiterhin funktioniert. Wenn Ihr SendGrid-Konto kein Guthaben mehr hat, funktionieren die SendGrid-Dienste in REDCap nicht mehr. Sie können auf <a href='https://sendgrid.com/pricing/' target='_blank'><u>SendGrids Preisseite</u></a> verweisen, um die aktuellen Preise zu erhalten."
survey_1387 = "SendGrid-Template-E-Mail-Dienste für Alarme & Benachrichtigungen"
survey_1388 = "REDCap kann <a href='https://sendgrid.com/solutions/email-api/dynamic-email-templates' target='_blank'><u>SendGrid Dynamic Templates</u></a> zum Senden E-Mail-basierter Alarme & Benachrichtigungen verwenden. SendGrid-Templates geben Ihnen deutlich mehr Kontrolle über Stil und Design Ihrer E-Mails im Vergleich zum Standard-E-Mail-Alarmtyp. Durch Aktivieren dieser Funktion erhalten Sie auf der Seite Alarme & Benachrichtigungen einen weiteren Alarmtyp namens <b>SendGrid Template</b>."
survey_1389 = "SendGrid-Template-E-Mail-Dienste"
survey_1390 = "ALARME & BENACHRICHTIGUNGEN: Mit dem SendGrid-Alarmtyp können Sie eine Absender-E-Mail-Adresse angeben, die in der Liste der <a href='https://docs.sendgrid.com/ui/sending-email/senders' target='_blank'><u>Verified Senders</u></a> Ihres SendGrid-Kontos enthalten ist, oder eine E-Mail-Adresse, die zu einer mit Ihrem SendGrid-Konto verknüpften <a href='https://docs.sendgrid.com/ui/account-and-settings/how-to-set-up-domain-authentication' target='_blank'><u>Authenticated Domain</u></a> passt. Außerdem haben Sie eine Oberfläche zur Auswahl der dynamischen Templates Ihres SendGrid-Kontos, die Sie für den Alarm verwenden möchten, sowie eine Oberfläche zur Angabe von Schlüssel/Wert-Paaren, mit denen Ihr Template mit REDCap-Daten befüllt wird. Die Auswahl der Empfänger für SendGrid-Alarme funktioniert genauso wie die Auswahl der Empfänger für E-Mail-Alarme."
