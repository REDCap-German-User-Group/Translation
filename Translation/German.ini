mycap_mobile_app_841 = "Das Projekt muss zuerst im Entwurfsmodus sein, bevor Sie MyCap aktivieren, da dies Änderungen am ersten Datenerhebungsinstrument umfasst.<br><br><b>Hinweis:</b> Nachdem Sie MyCap im Entwurfsmodus aktiviert haben, reichen Sie anschließend unbedingt Ihre Entwurfsänderungen ein."
mycap_mobile_app_842 = "Das Projekt muss zuerst im Entwurfsmodus sein, bevor Sie Datenerhebungsinstrumente für MyCap aktivieren. Klicken Sie oben auf der Seite auf die Schaltfläche 'Entwurfsmodus aktivieren', um das Projekt in den Entwurfsmodus zu versetzen."
mycap_mobile_app_843 = "Das Projekt muss zuerst im Entwurfsmodus sein, bevor Sie eine neue MyCap-Version veröffentlichen, da Warnungen vorhanden sind, die beim Veröffentlichen automatisch behoben werden. Klicken Sie oben auf der Seite auf die Schaltfläche 'Entwurfsmodus aktivieren', um das Projekt in den Entwurfsmodus zu versetzen."
mycap_mobile_app_844 = "Neue MyCap-Version kann nicht veröffentlicht werden!"
mycap_mobile_app_845 = "Diese Instrumente haben ungültige Zeitpläne:"
mycap_mobile_app_846 = "Die Einrichtung des Aufgabenzeitplans für Instrument(e) sieht falsch aus. Beim Beheben wird sie auf die Standardeinstellung gesetzt. Alternativ können Sie dies manuell auf der MyCap-Aufgabeneinrichtungsseite tun."
mycap_mobile_app_847 = "Diese Events haben ungültige Zeitpläne:"
mycap_mobile_app_848 = "Sie können die untenstehenden Optionen zur Unterstützung beim Testen verwenden. Das Anhängen der benutzerdefinierten Event-ID oder des Event-Labels hilft, beim Testen der Zeitplanung in der App zu erkennen, zu welchem Event anstehende Aufgaben gehören. Wir empfehlen, diese Option auszuschalten, sobald Teilnehmende bereit sind, Ihrem Projekt beizutreten. Die Event-ID und das Event-Label, die Events zugewiesen sind, finden Sie auf der Seite \"Meine Events definieren\"."
mycap_mobile_app_849 = "Benutzerdefiniertes Event-Label auswählen:"
mycap_mobile_app_850 = "Wert [event-id] wird an den Aufgabentitel angehängt"
mycap_mobile_app_851 = "Wert [event-label] wird an den Aufgabentitel angehängt"
mycap_mobile_app_852 = "Keine Event-ID oder kein Event-Label wird an den Aufgabentitel angehängt."
mycap_mobile_app_853 = "Benutzerdefinierte Einstellungen (App)"
mycap_mobile_app_854 = "Event-Anzeigeformat (App-seitig) wurde erfolgreich gespeichert."
mycap_mobile_app_855 = "Die Mobile Toolbox (MTB) ist eine Forschungsplattform, die eine Bibliothek kognitiver und anderer Tests umfasst, die remote auf einem Smartphone durchgeführt werden können. Die MTB-Messungen umfassen Smartphone-Versionen von Assessments aus der NIH Toolbox, der International Cognitive Ability Resource und dem Patient Reported Outcomes Measurement Information System. Die MTB umfasst außerdem Kurzversionen kognitiver Tests für Forschung mit Burst-Design. Die unten aufgeführten Elemente sind die MTB-Aufgaben, die zur Verwendung in der MyCap-Mobile-App verfügbar sind. <b>Hinweis:</b> Teilnehmende mit iOS-Gerät müssen iOS-Version 13+ verwenden."
mycap_mobile_app_856 = "Aufgabenstatus"
mycap_mobile_app_857 = "Wenn \"Nicht aktiv\", können Teilnehmende diese Aufgabe in der App nicht sehen."
mycap_mobile_app_858 = "Bitte beachten Sie, dass das Projekt zuerst im Entwurfsmodus sein muss, um diese fehlenden Felder zum ausgewählten Instrument hinzuzufügen."
mycap_mobile_app_859 = "Ihr Projekt befindet sich derzeit im Entwurfsmodus. Sie können Warnungen im Entwurfsmodus nicht beheben, wenn dieses Instrument vor dem Wechsel in den Entwurfsmodus noch nicht im Projekt existierte. Bitte prüfen Sie die Änderungen, die Sie im Entwurfsmodus vorgenommen haben, und klicken Sie entweder auf die Schaltfläche 'Änderungen zur Prüfung einreichen'. Nachdem Ihre Änderungen genehmigt wurden (oder Sie alle Entwurfsänderungen entfernen), können Sie diese Warnungen beheben."
mycap_mobile_app_860 = "Warnungen können im Entwurfsmodus nicht behoben werden"
mycap_mobile_app_861 = "(nur aus ResearchKit)"
mycap_mobile_app_862 = "Erstellte Mobile-Toolbox-(MTB)-Aufgaben"
mycap_mobile_app_863 = "Aus PROMIS-Messungen erstellte MyCap-Aufgaben"
mycap_mobile_app_864 = "Sie können dieses Instrument nicht für MyCap aktivieren. Sie müssen das erste Instrument in dieser Messung aktivieren. Sobald das erste Instrument aktiviert ist, werden alle nachfolgenden Instrumente in dieser Messung automatisch aktiviert."
mycap_mobile_app_865 = "Dieses Instrument muss nicht für MyCap aktiviert werden, da das erste Instrument in dieser Messung aktiviert wurde. Alle nachfolgenden Instrumente in dieser Messung wurden automatisch aktiviert. Teilnehmende können alle in dieser Messung enthaltenen Instrumente in MyCap abschließen."
mycap_mobile_app_867 = "Benachrichtigungseinstellungen"
mycap_mobile_app_868 = "Die Benachrichtigungseinstellungen wurden aktualisiert."
mycap_mobile_app_869 = "Teilnehmende erhalten an Tagen, an denen eine MyCap-Aufgabe fällig ist, eine tägliche Benachrichtigung. Sie können die Uhrzeit wählen, zu der Teilnehmende diese tägliche Benachrichtigung erhalten sollen. Teilnehmende erhalten zur gewählten Uhrzeit eine Push-Benachrichtigung mit dem Text \"[Profile Name] has a task due today.\". Wenn die Uhrzeit nicht geändert wird, ist die Standardbenachrichtigungszeit 8:00 Uhr in der Zeitzone des Teilnehmers."
mycap_mobile_app_870 = "Benachrichtigung senden um:"
mycap_mobile_app_871 = "Bitte wählen Sie eine Benachrichtigungszeit aus."
mycap_mobile_app_872 = "Benachrichtigungseinstellungen bearbeiten"
mycap_mobile_app_874 = "Wenn Sie eine Nachricht senden, erhält der Teilnehmer auf seinem Gerät eine Push-Benachrichtigung mit dem Text \"You have a secure message waiting.\". Der Teilnehmer kann die Nachricht lesen, nachdem er die MyCap-Mobile-App geöffnet und zum Tab Nachrichten navigiert hat. Wenn der Teilnehmer Push-Benachrichtigungen nicht erlaubt, kann er die Nachricht trotzdem lesen, sieht aber keine Push-Benachrichtigung, die auf eine neue Nachricht hinweist."
mycap_mobile_app_875 = "Wenn Sie eine Ankündigung an alle Teilnehmenden senden, erhalten alle Teilnehmenden auf ihrem Gerät eine Push-Benachrichtigung mit dem Text \"You have a secure message waiting.\". Teilnehmende können die Ankündigung lesen, nachdem sie die MyCap-Mobile-App geöffnet und zum Tab Nachrichten navigiert haben."
mycap_mobile_app_876 = "App-Einstellungen"
mycap_mobile_app_877 = "MyCap-App-Einstellungen"
mycap_mobile_app_878 = "Entwerfen Sie die Hauptkomponenten und die Benutzeroberfläche, die Ihre Teilnehmenden sehen, wenn sie die MyCap-App auf ihrem Mobilgerät anzeigen. Erstellen Sie eine Über-Seite mit einer Liste von Links und Kontakten, definieren Sie ein Farbschema für das Erscheinungsbild der MyCap-Mobile-App und passen Sie an, wann Teilnehmende an Tagen mit fälligen Aufgaben eine MyCap-Benachrichtigung erhalten sollen."
mycap_mobile_app_879 = "<b>Sie müssen eine neue Konfiguration veröffentlichen, wenn Änderungen an App-Einstellungen vorgenommen werden.</b>"
mycap_mobile_app_880 = "5) Aussehen und Bediengefühl von MyCap über MyCap-App-Einstellungen entwerfen"
mycap_mobile_app_881 = "Sie können auf die Seite \"MyCap-App-Einstellungen\" entweder über den Online Designer oder über den MyCap-Schritt auf der Projekt-Setup-Seite zugreifen. In MyCap-App-Einstellungen können Sie Folgendes konfigurieren:"
mycap_mobile_app_882 = "Nachdem Sie alle Aufgaben, Zeitpläne und App-Einstellungen konfiguriert haben, verwenden Sie <b>Neue MyCap-Version veröffentlichen</b> auf den Seiten MyCap-App-Einstellungen oder Online Designer. Sie müssen nur an EINER dieser Stellen veröffentlichen."
mycap_mobile_app_883 = "Wählen Sie ein bestehendes Feld aus Ihren Instrumenten als Baseline-Datum für jeden Arm aus. Bitte wählen Sie für mindestens einen Arm ein Feld aus. Die Option für Baseline-Datum-Einstellungen in der Aufgabeneinrichtung wird sichtbar, sobald ein Baseline-Datum-Feld für den Arm ausgewählt wurde."
mycap_mobile_app_884 = "Bitte wählen Sie für mindestens einen Arm ein Baseline-Datum-Feld aus."
mycap_mobile_app_885 = "ResearchKit-Aktive Aufgaben"
mycap_mobile_app_886 = "Instrument wird importiert..."
;; mycap_mobile_app_887 is concatenated with a form completion status label/icon.
mycap_mobile_app_887 = "Sie können einen Formularabschlussstatus auswählen von"
mycap_mobile_app_888 = "Wenn Aufgaben über die MyCap-App eingereicht werden, werden sie mit dem ausgewählten Status für das Form-Status-Complete-Feld des Instruments gespeichert, wie es im Record Status Dashboard und auf der Record Home Page angezeigt wird."
mycap_mobile_app_889 = "Baseline-Einstellungen haben sich geändert. <br>Um diese Änderungen zu speichern, drücken Sie Speichern.<br><br>Veröffentlichen Sie anschließend unbedingt eine neue MyCap-Version."
mycap_mobile_app_890 = "Sie können diesem Teilnehmer keine Nachricht senden, weil er Ihrem Projekt in der MyCap-App noch nicht beigetreten ist."
mycap_mobile_app_891 = "Für dieses Projekt wurde noch keine MyCap-Version veröffentlicht, sodass Teilnehmende dem Projekt in MyCap nicht beitreten können. Um Ihre erste Version zu veröffentlichen, <u>gehen Sie zum Online Designer und klicken Sie oben auf die grüne Schaltfläche Veröffentlichen</u>."
