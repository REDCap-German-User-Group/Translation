global_232 = "<b><u>AM/PM-Zeitformate:</u></b> Beim Pipen eines Zeit- oder Datetime-Feldes können Sie dessen Zeitanteil vom 24-Stunden-Format in das 12-Stunden-AM/PM-Format umwandeln, indem Sie die Option '<b>:ampm</b>' anhängen, z. B. <code>[visit_time:ampm]</code>. Dabei wird die 12-Stunden-Zeit mit kleingeschriebenem 'am' oder 'pm' angezeigt. Hinweis: Der Sekundenanteil von Datetime-Feldern (falls vorhanden) wird entfernt. Außerdem werden führende Nullen entfernt. Zum Beispiel würde der Wert '23:59' in '11:59pm' umgewandelt, und '07:13' wird als '7:13am' angezeigt."
