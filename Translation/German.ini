econsent_99 = "Trigger für PDF-Snapshot hinzufügen/bearbeiten"
econsent_100 = "Möchten Sie e-Consent für diesen Fragebogen wirklich deaktivieren?"
econsent_101 = "Verwenden Sie die untenstehenden Optionen, um einen Trigger zum Erfassen eines PDF-Snapshots eines Datensatzes zu erstellen. Der Snapshot kann durch den Abschluss eines Fragebogens *oder* dadurch ausgelöst werden, dass angegebene bedingte Logik wahr wird (aber nicht durch beides). Sie können den Umfang des Snapshots angeben, also welche Instrumente/Events Sie in den Snapshot aufnehmen möchten (ein Instrument, mehrere Instrumente oder alle Instrumente). Bei Auslösung können Snapshots im Datei-Repository und/oder in einem einzelnen Datei-Upload-Feld gespeichert werden. Zusätzlich können Sie ein benutzerdefiniertes Präfix für den Dateinamen des Snapshots angeben, wenn er gespeichert wird. Sie können beliebig viele Trigger erstellen und sie jederzeit deaktivieren/reaktivieren."
