design_598 = "Sobald diese Funktion für ein Feld aktiviert ist, wird beim Tippen im Textfeld darunter eine Liste von Optionen mit Schlüsselworttreffern aus der angegebenen Ontologie angezeigt (siehe Abbildung unten). Wenn ein Wert aus der Liste ausgewählt wird, wird dieser Wert in das Textfeld eingefügt. Die *einzigen* Werte, die für das Feld gespeichert werden können, sind Werte aus der Suchliste. Daher können Sie keinen Freitext in das Feld eingeben, es sei denn, es handelt sich um einen gültigen Wert aus der Suchliste. HINWEIS: Der Rohwert, der letztlich für das Feld gespeichert wird, ist die 'Notation' (oft ein alphanumerischer Code) für die angegebene Ontologie. Das zugehörige Label wird dagegen nicht als Rohwert gespeichert, kann aber neben dem Rohwert in einem Report und auch in einem CSV-Labels-Datenexport angezeigt werden."
design_599 = "Unten sehen Sie einen Screenshot der Suchfunktion in Aktion, während ein Benutzer beginnt, in das Textfeld zu tippen."
design_600 = "Ein gewöhnliches Textfeld in einem Fragebogen oder Eingabeformular kann mit einer besonderen Funktion aktiviert werden, die Auto-Suggest für Echtzeitsuchen innerhalb biomedizinischer Ontologien bereitstellt, z. B. RxNorm, ICD-9, ICD-10, Snomed CT, LOINC usw. Es stehen über 400 Ontologien zur Auswahl."
design_601 = "Um die Ontologiesuche für ein bestimmtes Textfeld zu aktivieren, wählen Sie einfach im Pop-up Feld hinzufügen/bearbeiten eine Ontologie aus der Drop-down-Liste aus und klicken Sie auf Speichern. Sie können die Suchfunktion hier im Online Designer sogar testen, um sie in Aktion zu sehen."
design_602 = "Auto-Complete für dieses Drop-down aktivieren"
design_603 = "Für jedes Drop-down-Feld können Sie die Auto-Complete-Funktion aktivieren. Sie verwandelt das Drop-down in eine Combobox, die wie eine normale Drop-down-Liste funktioniert, aber zusätzlich eine Textsuche in den Optionen des Drop-downs bietet, damit Sie eine Option viel schneller finden. Statt durch die gesamte Drop-down-Liste scrollen zu müssen, um eine bestimmte Option auszuwählen, können Sie einfach einige Zeichen der gewünschten Option eingeben, und es wird eine kurze Liste passender Optionen zurückgegeben. Die Auto-Complete-Funktion ist besonders nützlich, wenn Ihre Drop-down-Liste sehr lang ist und viele Optionen enthält. Hinweis: Auch wenn Sie beim Suchen im Auto-Complete-Drop-down Text von Hand in das Textfeld eingeben können, lässt es nicht zu, dass ein Wert gespeichert wird, sofern er keine gültige Option in der Drop-down-Liste ist."
design_604 = "Auto-Complete-Funktion für Drop-downs aktivieren"
