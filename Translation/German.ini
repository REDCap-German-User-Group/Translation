survey_1170 = "Wenn eine der obenstehenden Informationen nicht korrekt ist, können Sie auf die Schaltfläche 'Vorherige Seite' klicken, um zurückzugehen und sie zu korrigieren."
survey_1171 = "Ich bestätige, dass alle meine Informationen im obigen Dokument korrekt sind. Ich verstehe, dass das Klicken auf 'Absenden' das Formular elektronisch signiert und dass das elektronische Signieren dieses Formulars dem Signieren eines physischen Dokuments entspricht."
