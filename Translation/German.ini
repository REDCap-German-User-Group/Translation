file_download_13 = "<b>Administratornachricht:</b> Wenn Sie mehrere Webserver für REDCap mit einem Load Balancer verwenden, könnte ein Problem mit 'Stickiness' (d. h. Persistenz) vorliegen, bei dem ein Benutzer innerhalb einer REDCap-Sitzung vom Load Balancer von einem Webserver zu einem anderen verschoben wird. Auf dem Load Balancer muss eine 'Stickiness'-Richtlinie implementiert werden, um sicherzustellen, dass ein REDCap-Benutzer während der gesamten Sitzung auf demselben Webserver bleibt."

