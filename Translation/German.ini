dataqueries_117 = "Alle benutzerdefinierten"
dataqueries_118 = "Für diesen Datensatz wurden bei den unten aufgeführten Datenqualitätsregeln Diskrepanzen gefunden. Prüfen Sie die untenstehende Tabelle, um zu sehen, welche Regeln verletzt wurden, damit die Datenwerte der beteiligten Felder bei Bedarf korrigiert werden können. Sie können ein Ergebnis in der Tabelle ausschließen, indem Sie rechts auf den Link 'ausschließen' klicken; danach wird diese Regel für diesen Datensatz nicht mehr angezeigt, wenn der Datensatz gespeichert wird."
dataqueries_119 = "Verletzte Regel(n)"
dataqueries_120 = "Beteiligte Felder"
dataqueries_121 = "Sie können Verletzungen von Datenqualitätsregeln für einen bestimmten Datensatz ausblenden, indem Sie sie ausschließen; dadurch wird verhindert, dass sie künftig immer wieder angezeigt werden. Klicken Sie einfach auf den Link 'ausschließen' für eine Regel, und diese Regel wird nicht mehr in der Tabelle der verletzten Regeln angezeigt. Wenn eine Regel versehentlich ausgeschlossen wurde, können Sie ihren Ausschlussstatus entfernen, solange das Pop-up noch geöffnet ist, indem Sie in der Tabelle auf den Link 'Ausschluss entfernen' klicken."
dataqueries_122 = "[Daten können aufgrund von Einschränkungen der Benutzerrechte nicht angezeigt werden]"
dataqueries_123 = "Echtzeit-Ausführung"
dataqueries_124 = "In Echtzeit auf Eingabeformularen ausführen"
dataqueries_125 = "Das Aktivieren der Funktion 'Echtzeit-Ausführung' für eine benutzerdefinierte Regel ist eine gute Möglichkeit, einem Eingabeformular zusätzliche Datenvalidierung hinzuzufügen, um sicherzustellen, dass Daten *in dem Moment*, in dem sie eingegeben werden, korrekt erfasst werden, statt die Datenqualität rückwirkend durch Ausführen der Regeln hier auf dieser Seite zu prüfen. Die Funktion 'Echtzeit-Ausführung' ist eine ausgezeichnete Möglichkeit, proaktiv Qualität und Integrität Ihrer Daten zu erhalten."
dataqueries_126 = "Wenn die Checkbox 'Echtzeit-Ausführung' für eine benutzerdefinierte Datenqualitätsregel aktiviert wird, wird die Regel unsichtbar auf Eingabeformularen ausgeführt, wenn ein Benutzer auf den Speichern-Button klickt, um einen Datensatz zu erstellen oder zu ändern. Nach dem Klicken auf Speichern werden alle relevanten Datenqualitätsregeln unsichtbar (d. h. im Hintergrund) ausgeführt, und es wird eine Warnmeldung als Pop-up angezeigt, wenn Regeln verletzt wurden. Darin werden die verletzten Datenqualitätsregeln sowie die beteiligten Felder mit ihren Datenwerten angezeigt. Wenn keine Regeln verletzt wurden, wird der Datensatz wie gewohnt gespeichert und es wird kein Pop-up angezeigt. Genau wie die Ergebnisse, die beim Ausführen von Regeln auf der Datenqualitätsseite selbst zurückgegeben werden, können Ergebnisse, die auf Eingabeformularen für die 'Echtzeit-Ausführung' angezeigt werden, bei Bedarf ausgeschlossen werden, damit sie künftig nicht erneut angezeigt werden, wenn sie weiterhin verletzt sind."
dataqueries_127 = "HINWEIS: Für die vordefinierten Regeln kann die 'Echtzeit-Ausführung' nicht aktiviert werden, sondern nur für benutzerdefinierte Regeln. Außerdem funktioniert die 'Echtzeit-Ausführung' nicht auf Fragebogenseiten und wird auch bei Datenimporten (entweder über das Datenimport-Tool oder über die API) nicht ausgeführt. Sie funktioniert daher nur auf Eingabeformularen."
dataqueries_128 = "Klicken Sie nach dem Ändern des Werts hier auf den Button, um ihn zu speichern."
dataqueries_129 = "Dieses Pop-up zeigt den Data Resolution Workflow für den angegebenen Datensatz für ein bestimmtes Feld und/oder eine Datenqualitätsregel an. Benutzer mit entsprechenden Benutzerrechten können Datenabfragen öffnen, um einen dokumentierten Prozess zur Lösung eines Problems mit den Daten zu beginnen. Geöffnete Datenabfragen können dann von Benutzern mit entsprechenden Rechten beantwortet werden, und sie können geschlossen werden, sobald das Problem gelöst wurde. Alle Datenabfragen können auch auf der Seite Probleme lösen in diesem Projekt angezeigt werden."
dataqueries_130 = "Problem lösen"
dataqueries_131 = "Was ist der Data Resolution Workflow?"
dataqueries_132 = "Mit dem Datenqualitätsmodul gefundene Datenprobleme können mithilfe des Data Resolution Workflow gelöst werden. Nachdem Sie eine bestimmte Datenqualitätsregel ausgeführt und die Ergebnisse im Pop-up-Fenster angezeigt haben, sehen Sie in der Spalte 'Problem lösen' einen Button, mit dem Sie und andere Benutzer im Projekt Kommentare hinterlassen und/oder einen formalen Datenlösungsprozess zur Dokumentation von Details des Datenproblems abschließen können, einschließlich der Entstehung des Problems, wer das Problem gelöst hat und wie es gelöst wurde (falls zutreffend). Sobald der Datenlösungsprozess für ein Element geöffnet wurde, erscheint es in 'Probleme lösen', wo Sie alle offenen Elemente anzeigen können, die gelöst werden müssen."
dataqueries_133 = "Feldkommentar-Log oder Data Resolution Workflow (Datenabfragen) aktivieren?"
dataqueries_134 = "Für dieses Projekt können Sie entweder das Feldkommentar-Log oder den Data Resolution Workflow (auch als Datenabfragen-Modul bekannt) aktivieren. Das Feldkommentar-Log (standardmäßig aktiviert) erlaubt Benutzern, für ein beliebiges Feld auf einem Eingabeformular Kommentare zu hinterlassen, indem sie auf das Sprechblasen-Symbol neben dem Feld klicken. Alle Kommentare können auch auf der Seite Feldkommentar-Log angezeigt, durchsucht und heruntergeladen werden. Alternativ können Benutzer bei aktiviertem Data Resolution Workflow einen Workflow öffnen, um den Prozess zur Lösung von Datenproblemen im Projekt zu dokumentieren (d. h. Datenabfragen öffnen, beantworten und schließen)."
