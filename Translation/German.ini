control_center_4901 = "Geben Sie eine <b>Projekt-ID</b> ein (oder <b>cc</b> für Control Center), optional gefolgt von einem der folgenden Zielcodes:"
control_center_4902 = "Tipp: Verwenden Sie Shortcuts ohne Projekt-ID oder cc, um innerhalb eines Projekts bzw. innerhalb des Control Center zu navigieren. Wenn Sie <code>CTRL</code> gedrückt halten, während Sie <code>ENTER</code> drücken oder auf einen Ziellink klicken, wird dieses Ziel in einem neuen Tab geöffnet. Verwenden Sie <code>CTRL</code><code>ALT</code><code>N</code>, um den Fokus auf die Navigationseingabe zu setzen oder dieses Pop-up umzuschalten, wenn der Fokus bereits auf der Navigationseingabe liegt."
