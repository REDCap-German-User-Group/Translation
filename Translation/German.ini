control_center_4528 = "Ein anderer Benutzer hat Ihr Super API Token angezeigt"
control_center_4529 = "Ihnen wurde ein Super API Token gewährt, das zum Erstellen neuer REDCap-Projekte über die API-Methode Create Project verwendet werden kann. Um Ihr Super Token abzurufen, klicken Sie unten auf den Link 'Token anzeigen', um es auf dieser Seite einzublenden."
