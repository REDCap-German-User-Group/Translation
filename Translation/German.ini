mobile_app_90 = "Unten sind alle Protokolldateien aufgeführt, die von der Mobile App für dieses Projekt gesendet wurden. Nur die neueste wird vollständig angezeigt. Sie können auf das Dateisymbol rechts klicken, um sie herunterzuladen. Laden Sie die Seite neu, um auf die neuesten Protokoll-Uploads zuzugreifen."
mobile_app_91 = "Unten werden die Geräte angezeigt, die die REDCap Mobile App für dieses Projekt verwenden, sowie ein Protokoll wichtiger Aktivitäten, nämlich der neueste Projekt-Download und die fünf (5) neuesten Synchronisierungen. Sie können jedem Gerät einen Spitznamen geben, um das Gerät in der untenstehenden Aktivität und auf anderen Mobile-App-Seiten leichter zu identifizieren. Sie können auch ein einzelnes Gerät 'blockieren', sodass es keine Daten mehr synchronisieren, keine Daten herunterladen oder sogar das Projekt innerhalb der Mobile App auf dem Gerät nicht mehr zugänglich haben kann. Sie möchten das Gerät beispielsweise blockieren, wenn es gestohlen wurde. Dies hilft, Ihre Daten davor zu schützen, beschädigt zu werden oder in die falschen Hände zu geraten."
