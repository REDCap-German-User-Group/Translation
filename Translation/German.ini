docs_1147 = "Bitte verlassen Sie die Seite nicht, während Dateien hochgeladen werden"
docs_1148 = "HINWEIS: Bitte bedenken Sie, dass beim Löschen dieser Datei alle Links, die zum Herunterladen dieser Datei verwendet werden (z. B. in einer Feldbezeichnung, einem Projekt-Dashboard, Fragebogeneinladungen usw.),
	zu toten Links werden und dadurch niemand die Datei erneut herunterladen kann."
docs_1149 = "Dateien, die hier im Ordner 'Sonstige Dateianhänge' gespeichert sind, werden automatisch hinzugefügt, wenn Benutzer Dateianhänge in den Rich-Text-Editor dieses Projekts hochladen, etwa
	beim Verfassen einer Fragebogeneinladung, Hinzufügen einer Feldbezeichnung oder Erstellen eines Projekt-Dashboards, unter anderem. <b>Bitte achten Sie darauf, hier keine Dateien zu löschen, es sei denn, Sie
	sind absolut sicher, dass die Datei nicht mehr verwendet wird.</b> Das Löschen einer hier gespeicherten Datei, die an anderer Stelle im Projekt verwendet wird, führt dazu, dass der Download-Link der Datei nicht mehr funktioniert und zu einem toten Link wird."
