global_266 = "TIPP: Ihre Logik und Berechnungen können <b>Kommentare</b> enthalten, die nicht ausgewertet werden, sondern nur als Annotationen dienen, um zu dokumentieren oder zu erklären, was die Berechnung/Logik macht. Kommentare müssen in eigenen Zeilen stehen und mit // (doppelter Schrägstrich) oder # (Raute) beginnen, optional mit vorangestellten Leerraumzeichen (Leerzeichen, Tabs). Sie dürfen keinen Kommentar an eine Zeile anhängen, die Teil des Logik- oder Berechnungsausdrucks ist."
