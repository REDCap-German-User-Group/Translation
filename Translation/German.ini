data_entry_715 = "Diese Hintergrundlöschung wird derzeit verarbeitet, aber Sie können sie anhalten, wenn Sie möchten. Bitte beachten Sie, dass das Anhalten keine Datensatzlöschungen rückgängig macht, die bisher durchgeführt wurden, aber verhindert, dass weitere Datensätze gelöscht werden."
