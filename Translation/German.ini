system_config_729 = "GOOGLE-CLOUD-STORAGE-API-EINSTELLUNGEN: Wenn 'Google Cloud Storage' als Speicheroption verwendet wird, legen Sie die Werte für Account-ID, Secret Key und den Namen des 'Bucket' fest, in dem alle REDCap-Dateien gespeichert werden sollen."
