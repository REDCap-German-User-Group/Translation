report_builder_193 = "Um diesen Report \"öffentlich\" zu machen und den Zugriff auf den Report über einen öffentlichen Link zu ermöglichen, müssen Sie zunächst die Anforderungen erfüllen und außerdem den untenstehenden Aussagen zustimmen, indem Sie <u>nach dem Lesen die zugehörigen Kontrollkästchen aktivieren</u>. Sobald dies abgeschlossen ist, klicken Sie unten auf den Button \"Report öffentlich machen\", um den Vorgang abzuschließen."
