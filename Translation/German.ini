system_config_301 = "Um REDCap-Hooks zu verwenden, müssen Sie den vollständigen Dateipfad zu Ihrer Hook-Functions-Datei angeben. Dies ist eine PHP-Datei auf Ihrem REDCap-Webserver, die alle Ihre Hook-Funktionen enthält. Sie können die Hook-Functions-Datei in einem beliebigen Verzeichnis ablegen und beliebig benennen. Nachdem Sie sie erstellt haben, geben Sie hier ihren vollständigen Dateipfad an, damit REDCap die darin enthaltenen Hook-Funktionen verwenden kann. Weitere Informationen zu REDCap-Hooks finden Sie in der Dokumentation, indem Sie im linken Menü auf den Link 'Plugin, Hook, & External Module Documentation' klicken"
