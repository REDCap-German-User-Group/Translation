api_203 = "die folder_id eines bestimmten Ordners im File Repository, in dem Sie die Datei speichern möchten. Wenn keine bereitgestellt wird, wird die Datei im obersten Verzeichnis des File Repository gespeichert."
api_204 = "Liste von Dateien/Ordnern aus dem File Repository exportieren"
api_205 = "Ordner-folder_id:"
api_206 = "Diese Methode ermöglicht Ihnen, eine Liste aller Dateien und Unterordner aus einem bestimmten Ordner im File Repository eines Projects zu exportieren. Jeder Unterordner hat eine zugehörige folder_id-Nummer, und jede Datei hat eine zugehörige doc_id-Nummer."
api_207 = "die folder_id eines bestimmten Ordners im File Repository, für den Sie eine Liste seiner Dateien und Unterordner exportieren möchten. Wenn keine bereitgestellt wird, wird das oberste Verzeichnis des File Repository verwendet."
api_208 = "Die Liste aller Dateien und Ordner innerhalb eines angegebenen Unterordners im File Repository im angegebenen Format."
api_209 = "Neuen Ordner im File Repository erstellen"
api_210 = "Ordner-folder_id, unter der der Unterordner erstellt werden soll:"
api_211 = "Name des neuen Ordners:"
api_212 = "Diese Methode ermöglicht Ihnen, einen neuen Ordner im File Repository zu erstellen. Sie können optional die folder_id des übergeordneten Ordners angeben, unter dem dieser Ordner erstellt werden soll. Das Bereitstellen einer dag_id und/oder role_id ermöglicht Ihnen, den Zugriff nur auf Benutzer innerhalb einer bestimmten DAG (Data Access Group) bzw. Benutzerrolle zu beschränken."
api_213 = "die folder_id eines bestimmten Ordners im File Repository, für den Sie diesen Unterordner erstellen möchten. Wenn keine bereitgestellt wird, wird der Ordner im obersten Verzeichnis des File Repository erstellt."
api_214 = "Der gewünschte Name des zu erstellenden Ordners (maximale Länge = 150 Zeichen)"
api_215 = "die dag_id der DAG (Data Access Group), auf die Sie den Zugriff für diesen Ordner beschränken möchten. Wenn keine bereitgestellt wird, ist der Ordner für Benutzer in allen DAGs und für Benutzer in keiner DAG zugänglich."
api_216 = "die role_id der Benutzerrolle, auf die Sie den Zugriff für diesen Ordner beschränken möchten. Wenn keine bereitgestellt wird, ist der Ordner für Benutzer in allen Benutzerrollen und für Benutzer in keiner Benutzerrolle zugänglich."
api_217 = "Die folder_id des neu erstellten Ordners im angegebenen Format. Wenn z. B. format=json verwendet wird, würde die Ausgabe ähnlich aussehen wie: <code>[{\"folder_id\":45}]</code>."
