report_builder_220 = "Dateien herunterladen (zip)"
;; report_builder_221 is concatenated with a dynamic report link/title.
report_builder_221 = "den Report mit dem Namen"
report_builder_222 = "Wenn Sie noch komplexere Filterungen durchführen möchten, können Sie das Filterformat auf 'Erweiterte Logik' umstellen. Dadurch können Sie die Filterlogik manuell in ein großes Textfeld eingeben. Die Filterlogik verwendet im Wesentlichen dieselbe Syntax wie Verzweigungslogik und Gleichungen für berechnete Felder. Sie können dabei alle Sonderfunktionen verwenden, z. B. if(), datediff() und verschiedene mathematische Funktionen. REDCap prüft Ihre manuell eingegebene Logik auf Syntaxfehler und lässt das Speichern des Reports erst zu, wenn alle Fehler behoben wurden. Achten Sie bei der Verwendung der erweiterten Logik darauf, dass Ihre Logik letztlich entweder TRUE oder FALSE ergibt und nicht einen Wert wie etwa eine Zahl. Zum Beispiel ist datediff([dob], 'today', 'y') nicht gültig, weil es eine Zahl ergibt, aber datediff([dob], 'today', 'y') > 30 ist gültig, weil es entweder TRUE oder FALSE ergibt. Wenn das Projekt longitudinal ist, müssen Sie in bestimmten Kontexten möglicherweise zusätzlich den eindeutigen Event-Namen angeben. Dieser muss ebenfalls in Klammern stehen und dem Variablennamen vorangestellt werden, um dieses Feld in einem bestimmten Event anzusprechen, z. B. [event_2_arm_1][variable_name]."
