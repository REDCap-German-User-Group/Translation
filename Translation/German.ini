design_496 = "Was ist eine gerankte Feldmatrix?"
design_497 = "Nur 1 Auswahl pro Spalte zulassen (nur Radio-Buttons)"
design_499 = "Eine gerankte Feldmatrix ist eine Matrix, mit der die enthaltenen Optionen 'gerankt' werden können, sodass keine zwei Felder in der Matrix für eine bestimmte Spalte denselben ausgewählten Wert haben können. Wenn z. B. Ranking für eine Matrix aktiviert ist und ein Benutzer dann für ein Feld eine Option auswählt, die bereits für ein anderes Feld ausgewählt wurde, wird der Wert für dieses andere Feld automatisch abgewählt und eine kurze Meldung 'Wert entfernt!' angezeigt, um darauf hinzuweisen, dass der Wert für das andere Feld entfernt wurde. Dadurch wird verhindert, dass zwei Felder in der Matrix denselben ausgewählten Wert haben."
design_500 = "HINWEIS: Ranking kann NUR für eine RADIO-BUTTON-MATRIX verwendet werden. Für eine Checkbox-Matrix kann es nicht verwendet werden, da dort pro Feld mehr als eine Option ausgewählt werden kann."
design_501 = "EMPFEHLUNG: Für beste Ergebnisse bei Verwendung einer gerankten Matrix sollte die Anzahl der Felder und Optionen gleich sein."
