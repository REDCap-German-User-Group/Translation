edit_project_245 = "Warnung: Es wird empfohlen, das sekundäre eindeutige Feld in einem Fragebogen NICHT für ein Identifikatorfeld zu verwenden, etwa Medical Record Number, Social Security Number, oder E-Mail-Adresse, weil ein Fragebogenteilnehmer dadurch möglicherweise testen kann, ob bestimmte Werte für dieses Feld bereits verwendet wurden, um die Identität einer bestimmten Person zu ermitteln, die den Fragebogen ausgefüllt hat."
edit_project_246 = "Wenn im Projekt Datensätze zu fehlen scheinen oder wenn einige Seiten keine aktuellen Datenaktualisierungen erhalten (in Reports, Datensatzstatus-Dashboards oder anderswo), dann ist der Datensatzlisten-Cache (eine sekundäre Liste aller Datensatznamen) oder Rapid Retrieval (ein Cache-Mechanismus auf Seitenebene) möglicherweise nicht synchron und muss daher geleert werden. Durch das Leeren wird der Datensatzlisten-Cache neu generiert und alle Caches auf Seitenebene im Projekt werden geleert. (HINWEIS: Dies ist normalerweise nicht erforderlich.)"
