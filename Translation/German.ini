create_project_95 = "Sind Sie sicher, dass Sie das untenstehende Projekt als Vorlagenprojekt entfernen möchten? Wenn ja, bleibt das Projekt für seine Benutzer vollständig zugänglich, wird aber lediglich nicht mehr in der Liste der Projektvorlagen aufgeführt."
