system_config_663 = ", wodurch Sie Zugriff auf einen API Key erhalten, der mit Ihrem MailChimp-Konto verbunden ist. HINWEIS: Sie müssen dort ein Konto erstellen und das API-Token erzeugen, um es hier in REDCap zu verwenden. Befolgen Sie alle Anweisungen auf der Mandrill-Website zum Erhalten und Verwenden des API-Tokens."
