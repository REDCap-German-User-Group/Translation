random_119 = "Datensätze bereits Daten für das von Ihnen gewählte Randomisierungsfeld enthalten. Vor dem Einrichten Ihres Randomisierungsmodells dürfen keine Daten für Ihr Randomisierungsfeld existieren; daher werden ALLE diese Werte für diese Datensätze automatisch GELÖSCHT (keine anderen Daten außer diesem einen Feld werden gelöscht). Möchten Sie dies wirklich tun?"
