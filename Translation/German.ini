cdp_auto_adjudication_settings_description1 = "Zeitbezogene Felder können mehrere Werte vom externen Quellsystem zurückgeben. Sobald Sie für ALLE Ihre Mappings einen \"preselect\"-Wert festgelegt haben, können Sie 'Sofort-Adjudizierung' aktivieren, und REDCap überspringt die Vorschau der 'Adjudizierungs'-Tabelle und speichert den besten oder korrektesten Wert."
cdp_auto_adjudication_settings_description = "Adjudizierung bezeichnet den Prozess der Prüfung und Entscheidung, welche Werte akzeptiert werden sollen, wenn für zeitbezogene Felder mehrere Werte von einem externen Quellsystem zurückgegeben werden. REDCap bietet verschiedene Methoden für die Adjudizierung: <code>Manuell</code>, <code>Sofort</code> und <code>Auto</code>."
cdp_auto_adjudication_settings_note = "Hinweis: Die Methoden <code>Sofort</code> und <code>Auto</code> können nur verwendet werden, wenn allen zeitbezogenen Feldern eine 'preselect'-Strategie zugewiesen wurde, damit der geeignetste Wert ohne manuelle Prüfung ausgewählt wird."
