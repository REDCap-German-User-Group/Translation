survey_93 = "Wenn die E-Mail-Adresse eines Teilnehmers geändert werden muss, nachdem sie zur Teilnehmerliste hinzugefügt wurde, können Sie einfach auf die E-Mail-Adresse in der Liste klicken, um mit der Bearbeitung zu beginnen. Um die Umfrageantworten eines bestimmten Teilnehmers identifizieren zu können, können Sie nach dem Hinzufügen zur Teilnehmerliste eine <b>Teilnehmerkennung</b> angeben, die als separates Feld in den exportierten Datenergebnissen angezeigt wird. Die Kennung kann der Name des Teilnehmers, eine ID-Nummer oder etwas anderes nach Wunsch sein. <b>HINWEIS:</b> Wenn eine gesendete E-Mail zurückgewiesen wird, weil die E-Mail-Adresse falsch eingegeben wurde oder weil das E-Mail-Konto inaktiv ist oder nicht existiert, wird die zurückgewiesene E-Mail an den Absender zurückgeleitet, um ihn darüber zu informieren, dass der Empfänger die E-Mail nicht erhalten hat."
