create_project_98 = "Titel und/oder Beschreibung der Projektvorlage wurden jetzt erfolgreich geändert."
create_project_99 = "Das Projekt wurde jetzt erfolgreich als Vorlagenprojekt hinzugefügt und wird daher nun als Auswahl in der Liste der Projektvorlagen sichtbar sein, aus der Benutzer beim Erstellen eines neuen Projekts wählen können."
