index_70 = "Die untenstehenden Tabellen bieten allgemeine Dashboard-Informationen, z. B. eine Liste aller Benutzer mit Zugriff auf dieses Projekt, allgemeine Projektstatistiken und bevorstehende Kalender-Events (falls vorhanden)."
index_72 = "Derzeit ist die doppelte Dateneingabe aktiviert, sie funktioniert jedoch nicht korrekt, da das erste Datenerhebungsinstrument in Ihrem Projekt als Fragebogen verwendet wird. Dieses Problem muss behoben werden, bevor fortgefahren werden kann. Die drei Möglichkeiten zur Behebung sind: 1) die Verwendung von Umfragen in diesem Projekt deaktivieren (siehe oben auf der Projekt-Setup-Seite), 2) den ersten Fragebogen über den Button Umfrageeinstellungen im Online Designer löschen oder 3) Ihren REDCap-Administrator bitten, das Modul doppelte Dateneingabe für dieses Projekt zu deaktivieren."
index_73 = "Benutzerliste herunterladen (CSV)"
index_74 = "Dies stellt den gesamten Server-Speicherplatz dar, der von Dokumenten verwendet wird, die in diesem Projekt hochgeladen und gespeichert wurden. Dazu gehören Dateien aus Datei-Upload-Feldern und Unterschriftsfeldern in Datenerhebungsinstrumenten, Dateien auf der Datei-Repository-Seite (einschließlich archivierter Datenexportdateien), Anhänge in beschreibenden Feldern, Dateianhänge des Rich-Text-Editors, Alarmanhänge und mehr. Dies umfasst nicht den Speicherplatz, der von den eigentlichen Daten im Projekt verwendet wird, sondern nur gespeicherte Dateien."
