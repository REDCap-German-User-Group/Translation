data_entry_300 = "ALLE DATEN AUF DIESER EVENT-INSTANZ FÜR DATENSATZ LÖSCHEN"
data_entry_303 = "REDCap kann ein Datenerfassungsinstrument oder ein ganzes Event von Instrumenten unbegrenzt oft wiederholen, ohne dass die benötigte Anzahl angegeben werden muss. Dies wird manchmal One-to-many-Datenerfassung genannt, bei der ein Projekt einen oder mehrere wiederholte Teile haben kann. Wenn z. B. jeder Datensatz in einem hypothetischen Projekt eine Person darstellt, könnte es ein wiederholtes Instrument für Medikamente, eines für Familienmitglieder, eines für unerwünschte Ereignisse und eines für die Datenerfassung über mehrere Besuche (oder wöchentliche Fragebögen) geben, sodass jedes wiederholte Element mit dem gesamten Datensatz verbunden ist, aber unabhängig von den anderen Instrumenten wiederholt werden kann. Wenn also wiederholte Instrumente oder wiederholte Events verwendet werden, kann jeder Datensatz im Projekt eine unterschiedliche Anzahl wiederholter Instanzen eines bestimmten Instruments oder Events haben. Ein Datensatz kann zum Beispiel fünf Medikamente haben, ein anderer zwei oder keines. Diese Flexibilität macht die Funktion sehr leistungsstark, und das Einrichten wiederholter Instrumente und/oder wiederholter Events in einem Projekt ist sehr schnell und einfach. Die Funktion für wiederholte Instrumente/Events kann aktiviert und eingerichtet werden, indem Sie im Abschnitt Optionale Module auf der Projekt-Setup-Seite auf den Button Aktivieren klicken."
data_entry_304 = "Wiederholte Instrumente (für klassische und longitudinale Projekte)"
data_entry_305 = "Klassische Projekte (d. h. Projekte, in denen das longitudinale Modul nicht aktiviert ist) können wiederholte Instrumente als sehr einfache Möglichkeit longitudinaler Datenerfassung nutzen. Bei der traditionellen Nutzung des longitudinalen Moduls in einem Projekt besteht ein Nachteil darin, dass alle Events (d. h. die Wiederholungen von Instrumenten) im Voraus angegeben werden müssen, wobei die maximal benötigte Anzahl von Events angelegt werden muss, obwohl wahrscheinlich nicht alle von allen Datensätzen verwendet werden. Mit der Funktion Wiederholte Instrumente muss jedoch nicht im Voraus festgelegt werden, wie viele Wiederholungen benötigt werden; ein Instrument kann einfach unbegrenzt oft wiederholt werden. Wichtig ist, dass mehrere Instrumente in einem Projekt als wiederholte Instrumente aktiviert werden können (bei Bedarf sogar alle). Projekte, die das longitudinale Modul nutzen, können ebenfalls wiederholte Instrumente haben, wobei ein oder mehrere Instrumente auf einem definierten Event so eingestellt werden können, dass sie innerhalb dieses Events wiederholt werden. Die Funktion Wiederholte Instrumente verhält sich in klassischen und longitudinalen Projekten weitgehend gleich."
data_entry_306 = "Wiederholte Events (nur für longitudinale Projekte)"
data_entry_307 = "Wenn in einem Projekt das longitudinale Modul aktiviert ist, kann die Funktion Wiederholte Events verwendet werden, die etwas anders funktioniert als die Funktion Wiederholte Instrumente. Während mit wiederholten Instrumenten ein bestimmtes Instrument als einzelne Einheit wiederholt werden kann, erlaubt die Funktion Wiederholte Events, ein ganzes Event von Instrumenten gemeinsam zu wiederholen. Dies kann nützlich sein, wenn mehrere Instrumente zusammengehörige Daten enthalten, etwa wenn mehrere Fragebögen für einen bestimmten Zeitpunkt oder Besuch direkt nacheinander ausgefüllt werden. Früher musste man möglicherweise X identische Events erstellen, um wiederholte Daten für die Instrumente auf diesen Events zu erfassen (z. B. Woche 1, Woche 2, ...). Die Funktion Wiederholte Events macht dies deutlich einfacher, indem nur ein einziges Event erstellt werden muss, das unbegrenzt wiederholt werden kann."
data_entry_308 = "Fragebögen für wiederholte Instrumente aktivieren"
data_entry_310 = "Reports und Datenexporte mit wiederholten Instrumenten und Events"
data_entry_311 = "Wenn ein Report erstellt wird, der Daten aus einem wiederholten Instrument oder wiederholten Event enthält, wird ein Feld namens 'redcap_repeat_instance' eingeschlossen, das die Instanznummer darstellt. Dies ist ein automatisch nummerierter Wert (beginnend mit '1'), der bei jeder Wiederholung des Instruments/Events erhöht wird. Wenn der Report Daten speziell aus einem wiederholten Instrument enthält (im Gegensatz zu einem wiederholten Event), wird zusätzlich ein Feld namens 'redcap_repeat_instrument' eingeschlossen, das den Instrumentnamen darstellt und angibt, zu welchem Instrument die Datenzeile gehört. Diese beiden Felder werden im Report oder Datenexport nur dann automatisch eingeschlossen, wenn Daten aus einem wiederholten Instrument oder Event stammen. Hinweis: Jede wiederholte Instanz eines Instruments oder Events wird als neue Zeile im Report oder in der Exportdatei angezeigt. Das bedeutet zum Beispiel, dass ein Medikamentenfragebogen, der für einen Datensatz dreimal wiederholt wird, als drei Zeilen im Report angezeigt wird."
