user_01 = "Formular für grundlegende Benutzerinformationen"
user_02 = "Bevor Sie auf REDCap zugreifen, benötigen wir zunächst einige grundlegende Informationen über Sie. Bitte füllen Sie ALLE untenstehenden Felder aus und klicken Sie anschließend auf den Button Absenden. Sobald diese Informationen gespeichert sind, können Sie sie jederzeit ändern, indem Sie zur Profilseite navigieren. Den Link dazu finden Sie oben rechts auf jeder Seite."
user_08 = "Ihr Benutzerprofil bearbeiten"
user_09 = "Ihre Änderungen wurden gespeichert!"
user_10 = "Änderungen konnten nicht vorgenommen werden."
user_11 = "Wenn Sie möchten, können Sie unten die Informationen in Ihrem Benutzerprofil bearbeiten. Diese Informationen werden nicht an andere weitergegeben, sondern helfen uns dabei, nachzuvollziehen, wer REDCap verwendet, und Sie bei Bedarf bezüglich Ihres Zugriffs auf REDCap zu kontaktieren."
user_12 = "IHR PASSWORT ZURÜCKSETZEN?"
user_13 = "Möchten Sie Ihr Passwort für die Anmeldung bei REDCap zurücksetzen? Falls ja, werden Sie jetzt gebeten, Ihr neues Passwort festzulegen."
user_15 = "E-Mail erneut eingeben"
user_16 = "HINWEIS: Die oben eingegebene E-Mail-Adresse muss zuerst verifiziert werden, bevor der Zugriff auf REDCap gewährt wird. Nachdem Sie auf den Button Absenden geklickt haben, wird eine E-Mail an dieses E-Mail-Konto gesendet. Anschließend müssen Sie auf den Link in der E-Mail klicken, um Ihr E-Mail-Konto zu verifizieren, bevor Sie auf REDCap zugreifen können."
user_17 = "Bitte füllen Sie alle Felder aus"
user_18 = "Die erneut eingegebene E-Mail-Adresse stimmt nicht mit der ersten überein. Bitte geben Sie Ihre E-Mail-Adresse erneut ein."
user_19 = "Ihre E-Mail-Adresse verifizieren"
user_21 = "Klicken Sie hier, um Ihre E-Mail-Adresse zu bestätigen"
user_22 = "Verifizierung des E-Mail-Kontos ausstehend"
user_24 = "Bitte prüfen Sie dieses E-Mail-Konto auf die von REDCap gesendete E-Mail zur Kontoverifizierung und folgen Sie den darin enthaltenen Anweisungen."
user_25 = "Konto erstellt / Verifizierungs-E-Mail gesendet"
;; user_26 is concatenated with a dynamic email address and user_27.
user_26 = "Ihr REDCap-Konto wurde nun erstellt. Um die Kontoeinrichtung abzuschließen, müssen Sie Ihre E-Mail-Adresse bestätigen, indem Sie Ihr E-Mail-Konto prüfen"
;; user_27 is concatenated after user_26 and a dynamic email address.
