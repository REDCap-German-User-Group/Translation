control_center_4406 = "Um einen Massen-Upload zum Erstellen neuer Benutzer durchzuführen, müssen Sie eine Excel-/CSV-Datei hochladen, die folgende Elemente enthält: gewünschter REDCap-Benutzername (Spalte A), Vorname des Benutzers (Spalte B), Nachname des Benutzers (Spalte C), E-Mail-Adresse des Benutzers (Spalte D), optionale Institutions-ID (Spalte E), optionaler Sponsor-Benutzername, also der REDCap-Benutzername einer sekundären Kontaktperson (Spalte F), optionaler Ablaufzeitpunkt des Benutzers, der im Format YYYY-MM-DD HH:MM oder MM/DD/YYYY HH:MM vorliegen muss (Spalte G) - falls keine Uhrzeit angegeben wird, wird 00:00 angenommen - sowie sonstige Kommentare zum Benutzer (Spalte H). Unten sehen Sie Beispieltext für die Kopfzeile zum erwarteten Dateiformat. Es wird angenommen, dass die hochgeladene Datei eine Kopfzeile enthält, daher wird die erste Zeile immer ignoriert. Die Datei sollte nur einen Benutzer pro Zeile enthalten. Nach der Erstellung erhält jeder Benutzer eine E-Mail mit Anmeldeinformationen. Wenn Fehler in der hochgeladenen Datei vorhanden sind, werden diese Fehler angezeigt."
