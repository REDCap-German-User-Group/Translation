control_center_4371 = "Institutions-Keywords: Legen Sie die Institutionsnamen fest, die bei der Suche nach Publikationen in Online-Publikationsdatenbanken explizit verwendet werden sollen"
control_center_4372 = "Wenn mehrere Einrichtungen verwendet werden, trennen Sie jeden Institutionsnamen durch einen Zeilenumbruch, sodass jeder in einer eigenen Zeile steht."
control_center_4373 = "Dieses Modul kann verwendet werden, um REDCap-Projekte Publikationen zuzuordnen, die in Online-Publikationsdatenbanken gelistet sind (derzeit wird nur PubMed durchsucht). Wenn aktiviert, verwendet das Modul automatisch die Principal Investigators (und deren zugehörige Einrichtungen), die für Ihre REDCap-Projekte aufgeführt sind, um Online-Publikationsdatenbanken zu durchsuchen. Verwenden Sie den Setup-Tab für allgemeine Einstellungen und die To-do-Liste, um benötigte Informationen für einzelne P.I.s nachzutragen (falls Informationen fehlen). Die von Ihnen angegebenen P.I.s werden bei der nächtlichen REDCap-Suche in Online-Publikationsdatenbanken verwendet. Bitte beachten Sie, dass P.I.s von diesem Modul *nicht* per E-Mail kontaktiert werden, bis die Einstellung 'P.I. Emailing' aktiviert wurde."
