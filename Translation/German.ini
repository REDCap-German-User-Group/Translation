econsent_131 = "Möchten Sie das aktuell gespeicherte Einwilligungsformular wirklich inaktiv setzen und damit das Einwilligungsformular und seine Einstellungen entfernen, sodass es nicht mehr verwendet werden kann? HINWEIS: Dies hat keine Auswirkungen auf Teilnehmende, die bereits mit diesem Einwilligungsformular eingewilligt haben; es verhindert nur, dass dieses Einwilligungsformular künftig verwendet wird."
econsent_132 = "Einwilligungsformular wurde erfolgreich entfernt"
econsent_133 = "Alle Einwilligungsformulare und Versionen anzeigen"
econsent_134 = "Die untenstehende Tabelle listet alle Einwilligungsformulare und ihre Versionen auf, die für den Fragebogen hinzugefügt wurden"
econsent_135 = "Mehr anzeigen"
econsent_136 = "Inhalt des Einwilligungsformulars wird angezeigt"
econsent_137 = "Zeitpunkt des Hinzufügens"
econsent_138 = "Text oder Datei des Einwilligungsformulars"
econsent_139 = "Anzahl der Datensätze mit Einwilligung"
econsent_140 = "SCHRITT 1: Triggerbedingungen"
econsent_141 = "- Definieren, wann der Snapshot ausgelöst wird."
econsent_142 = "Umfang des Snapshots"
econsent_143 = "SCHRITT 3:"
econsent_144 = "SCHRITT 4:"
econsent_145 = "[Alle Instrumente]"
econsent_146 = "Verwenden Sie die untenstehenden Einstellungen, um das e-Consent Framework für diesen Fragebogen einzurichten. e-Consent erfordert häufig, dass der Name des einwilligenden Teilnehmers (und manchmal dessen Geburtsdatum) auf dem endgültigen Einwilligungsformular als Dokumentation der Identität erfasst wird. Unten können Sie Felder auswählen, mit denen diese Informationen erfasst werden; die Werte dieser Felder werden automatisch in die Fußzeile des PDF-Einwilligungsformulars eingefügt, das der Teilnehmer am Ende des Fragebogens prüft. Anschließend wird dieser PDF-\"Ausdruck\" im Datei-Repository archiviert (mit der zusätzlichen Option, das PDF auch in einem Datei-Upload-Feld zu speichern). Weitere e-Consent-bezogene Optionen können unten festgelegt werden, z. B. ein benutzerdefinierter Tag/Kategorie, ein benutzerdefiniertes Label für die PDF-Kopfzeile, Speicherort(e) für den unterschriebenen e-Consent-Snapshot und das Dateinamenformat der gespeicherten Snapshots."
econsent_147 = "Primäre Einstellungen"
econsent_148 = "Zusätzliche Einstellungen"
econsent_149 = "PDF-Snapshots manuell auslösen oder erneut auslösen"
econsent_150 = "Snapshot-ID"
econsent_151 = "Trigger"
econsent_152 = "Bereits ausgelöst?"
econsent_153 = "Auslösen?"
econsent_154 = "Es ist manchmal erforderlich, einen PDF-Snapshot manuell auszulösen oder erneut auszulösen. Sie können die unten aufgeführten aktiven PDF-Snapshot-Trigger manuell auslösen oder erneut auslösen, indem Sie auf die grünen Trigger-Buttons klicken. Wenn Buttons ausgegraut sind, können sie aufgrund des aktuellen Kontexts oder aufgrund eingeschränkter Benutzerrechte nicht ausgelöst werden. <u>Trigger für den Abschluss von Fragebögen können nicht erstmalig ausgelöst, sondern nur erneut ausgelöst werden, nachdem der Fragebogen abgeschlossen wurde.</u> Um Trigger für den Abschluss von Fragebögen erneut auszulösen, benötigen Sie Bearbeitungsrechte für dieses Fragebogeninstrument. Außerdem können Trigger für den Abschluss von Fragebögen nur erneut ausgelöst werden, wenn dieses spezifische Fragebogeninstrument im Kontext eines Eingabeformulars angezeigt wird. Bei logikbasierten PDF-Snapshots beachten Sie bitte, dass logikbasierte Trigger ausgelöst werden können, <u>auch wenn ihre bedingte Logik derzeit nicht als wahr ausgewertet wird</u>. HINWEIS: Wenn ein PDF-Snapshot ursprünglich von einem Teilnehmer ausgelöst und in einer bestimmten MLM-Sprache gespeichert wurde, wird der Snapshot beim erneuten Auslösen möglicherweise nicht in derselben Sprache wie zuvor gespeichert, weil der Snapshot immer die aktuelle Sprache des Benutzers/Teilnehmers zum Zeitpunkt des Auslösens verwendet."
econsent_155 = "Erneut auslösen"
econsent_156 = "PDF-Snapshots auslösen"
econsent_157 = "PDF-Snapshot wurde erfolgreich ausgelöst!"
econsent_158 = "Auslösen"
econsent_159 = "Möchten Sie wirklich Snapshot-ID auslösen"
econsent_160 = "Ich bestätige, dass ich diesen e-Consent-Fragebogen erneut auslöse, wodurch elektronisch ein PDF-Snapshot neu erzeugt und gespeichert wird, der einem physischen Dokument entspricht."
econsent_161 = "Durch Klicken auf den untenstehenden Absende-Button stimme ich dem folgenden Text zu:"
econsent_162 = "Das e-Consent Framework fügt dem typischen Prozess der Fragebogenteilnahme zwei Dinge hinzu. 1) Bevor ein Teilnehmer den Fragebogen abschließt, wird am Ende des Fragebogens eine zusätzliche Zertifizierungsseite hinzugefügt, die eine eingebettete PDF-Kopie seiner Fragebogenantworten anzeigt. Dort wird er gebeten zu bestätigen, dass alle Informationen im Dokument korrekt sind. Sobald er bestätigt, dass alles korrekt ist, wird der Fragebogen als abgeschlossen markiert. Der Fragebogen gilt erst dann als abgeschlossen, wenn der Zertifizierungsschritt erfüllt ist. 2) Nach Abschluss des Fragebogens wird eine statische Kopie der Antworten in Form eines einwilligungsspezifischen PDFs im Datei-Repository des Projekts gespeichert. In das einwilligungsspezifische PDF werden unten auf jeder Seite die Werte der Optionen des e-Consent Framework eingefügt. Diese Werte (d. h. Name, Geburtsdatum usw.) werden dem PDF als zusätzliche Dokumentation der Identität der einwilligenden Person hinzugefügt."
econsent_163 = "Was sind e-Consent-Version und benutzerdefinierter Tag/Kategorie?"
econsent_164 = "e-Consent-Version und benutzerdefinierter Tag/Kategorie sind beide Freitextfelder, deren Wert in die Fußzeile jeder Seite des PDFs eingefügt wird. Die Versionierung eines Einwilligungsformulars ist ein Konzept, bei dem Sie ihm eine Nummer oder alphanumerische Bezeichnung geben können, um die aktuelle Version oder den aktuellen Zustand des Einwilligungsformulars darzustellen. Wenn das Einwilligungsformular also NACH Beginn der Datenerhebung geändert wird, wird empfohlen, eine neue Version zu vergeben. Beispielsweise könnte die erste Version einfach '1' sein; nachdem die Einwilligung einiger Teilnehmender erhoben wurde, wird eine Frage geändert oder hinzugefügt, was eine neue Version des Formulars darstellt, sodass Sie die Version auf '2' erhöhen könnten (und so weiter). Die Verwendung von Einwilligungsformularen ist eine optionale Funktion. Sobald e-Consent für einen Fragebogen aktiviert ist, können Sie bei Bedarf ein oder mehrere Einwilligungsformulare hinzufügen; jedem Einwilligungsformular muss dabei eine Version zugewiesen werden. Der e-Consent-'benutzerdefinierte Tag/Kategorie' ist eine weitere optionale Einstellung: ein Freitextfeld, das lediglich als Textlabel dient, das Sie ggf. in der PDF-Fußzeile anzeigen möchten, um die Art des e-Consent zu kennzeichnen, die dieser Fragebogen darstellt (z. B. pädiatrisch). Der Tag/die Kategorie wird häufig verwendet, um mehrere e-Consent-Formulare innerhalb eines Projekts zu unterscheiden."
econsent_165 = "Benutzerdefinierter Tag/Kategorie für PDF-Fußzeile"
econsent_166 = "Hier hinzugefügte Einwilligungsformulare werden dynamisch auf dem Fragebogen basierend auf dem aktuellen Kontext angezeigt. Wenn Sie beispielsweise ein DAG-spezifisches Einwilligungsformular haben, können Sie festlegen, dass dieses Einwilligungsformular nur für Teilnehmende in dieser DAG angezeigt wird, während Teilnehmende in anderen DAGs ein anderes Einwilligungsformular sehen. Die hier bereitgestellten Einwilligungsformulare werden unmittelbar unter einem bestimmten beschreibenden Feld (unten angegeben) im Fragebogen angezeigt. <b>HINWEIS: Nachdem Sie auf \"Neues Einwilligungsformular hinzufügen\" geklickt haben, wird das Einwilligungsformular SOFORT im e-Consent-Fragebogen LIVE geschaltet.</b>"
econsent_167 = "WARNUNG: Das Auslösen dieses PDF-Snapshots überschreibt jede Datei, die bereits in dem Datei-Upload-Feld gespeichert ist, in dem der Snapshot gespeichert wird."
