survey_1067 = "Eine Twilio-Funktion namens Request Inspector bewirkt, dass alle Aktivitäten detailliert protokolliert und auf Twilios Servern gespeichert werden. Für das höchste Datenschutzniveau MUSS diese Funktion in Ihrem Twilio-Konto DEAKTIVIERT sein, damit Sie Twilio-Dienste in REDCap verwenden können. Sie finden diese Einstellung auf der Configure-Seite unter 'Programmable Voice'."
survey_1069 = "Nein, sie bleibt aktiviert. Bitte deaktivieren Sie sie in Ihrem Twilio-Konto auf der Configure-Seite unter 'Programmable Voice'. Sie dürfen die Twilio-Dienste in diesem Projekt nicht aktivieren, bis der Request Inspector deaktiviert wurde."
