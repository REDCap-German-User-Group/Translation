data_entry_482 = "Gesamten Datensatz sperren"
data_entry_483 = "Gesamten Datensatz entsperren"
data_entry_484 = "Dies sperrt den GESAMTEN Datensatz, nicht nur ein einzelnes Instrument. Danach kann niemand diesen Datensatz bearbeiten, bis er von jemandem mit Sperren-/Entsperren-Rechten entsperrt wird."
data_entry_485 = "Erweiterung für Sperren auf Datensatzebene: PDF-Bestätigung & automatische externe Dateispeicherung"
data_entry_486 = "Diese Funktion ermöglicht jedem Projekt, zusätzliche Funktionalität für die Nutzung der Funktion Sperren auf Datensatzebene in einem Projekt zu verwenden. Wenn sie unten und auch in einem Projekt aktiviert ist, wird jeder Benutzer, der einen GESAMTEN Datensatz sperrt (im Gegensatz zum Sperren auf Instrumentebene), gebeten, eine PDF-Kopie des gesamten Datensatzes zu prüfen, um zu bestätigen, dass es der richtige Datensatz und/oder die richtige Datei ist. Sobald das PDF geprüft und bestätigt wurde, wird der Datensatz gesperrt. Danach wird die PDF-Datei im Datei-Repository des Projekts gespeichert und eine Duplikatkopie wird auf einem sicheren externen Server mit den unten definierten Konfigurationseinstellungen gespeichert. Diese Funktion kann für Projekte genutzt werden, die bestimmte regulatorische Anforderungen erfüllen möchten, z. B. 21 CFR Part 11 für FDA-Studien. Hinweis: Diese Funktion ist standardmäßig für alle Projekte deaktiviert, aber Benutzer mit Rechten für 'Projekt-Setup & Design' können sie für ein Projekt im Popup Zusätzliche Anpassungen auf der Projekt-Setup-Seite aktivieren."
data_entry_487 = "Erweiterung für Sperren auf Datensatzebene aktivieren: PDF-Bestätigung & automatische externe Dateispeicherung?"
data_entry_488 = "Wenn aktiviert, erhalten Benutzer beim Sperren eines gesamten Datensatzes (d. h. beim Sperren auf Datensatzebene, nicht beim Sperren auf Instrumentebene) eine Aufforderung, in der sie eine PDF-Kopie des gesamten Datensatzes prüfen sollen, um zu bestätigen, dass es der richtige Datensatz und/oder die richtige Datei ist. Sobald das PDF geprüft und bestätigt wurde, wird der Datensatz gesperrt. Danach wird eine Kopie der PDF-Datei des Datensatzes im Datei-Repository des Projekts gespeichert. Diese Funktion wurde speziell für Projekte erstellt, die bestimmte Vorschriften einhalten möchten, z. B. 21 CFR Part 11 für FDA-Studien. Hinweis: Wenn diese Funktion aktiviert ist, wird für alle Datensätze, die mit Sperren auf Datensatzebene gesperrt werden, automatisch eine Duplikatkopie der PDF-Datei auf einem sicheren Dateiserver außerhalb von REDCap gespeichert (bitte wenden Sie sich bei Fragen oder Details zu diesem externen Server an Ihren REDCap-Administrator)."
data_entry_489 = "PDF-Archiv gesperrter Datensätze"
data_entry_490 = "Ich genehmige die in diesem Datensatz enthaltenen Daten."
data_entry_491 = "Zeitpunkt der Datensatzsperre"
data_entry_492 = "Unten werden PDF-Dateien angezeigt, die automatisch erfasst und gespeichert wurden, wenn Datensätze gesperrt wurden (d. h. über Sperren auf Datensatzebene). Nur Benutzer mit Datenexportrechten für den 'Vollständigen Datensatz' können die archivierten PDF-Dateien herunterladen. Hinweis: Die unten aufgeführten PDFs wurden beim Sperren des Datensatzes archiviert. Das bedeutet, dass sie sich von anderen herunterladbaren PDFs im Projekt unterscheiden können, die bei Bedarf mit den aktuellen Daten erzeugt werden."
data_entry_493 = "Dieses Instrument sperren?"
data_entry_494 = "Wenn gesperrt, kann kein Benutzer dieses Instrument für diesen Datensatz ändern, bis jemand mit Rechten zum Sperren/Entsperren auf Instrumentebene es entsperrt."
