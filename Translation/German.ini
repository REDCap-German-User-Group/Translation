data_export_tool_312 = "Ich bestätige dies... Bitte fortfahren"
data_export_tool_313 = "Wenn Sie in Schritt 3 (Filtern) einen Report für ein Projekt erstellen, das longitudinal ist und/oder wiederholte Instrumente oder wiederholte Events hat, werden alle im Report definierten Filter auf jeden Datensatz als Ganzes angewendet. Dies ist das Standardverhalten, wenn die Checkbox 'Daten für alle Events und wiederholten Instrumente/Events für jeden zurückgegebenen Datensatz anzeigen' AKTIVIERT ist. Wenn sie jedoch DEAKTIVIERT ist, werden die Filter zusätzlich auf jedes Event und/oder jede wiederholte Instanz innerhalb jedes zurückgegebenen Datensatzes angewendet, wodurch einige (oder alle) Events oder wiederholten Instanzen in den zurückgegebenen Datensätzen aus den Ergebnissen entfernt werden könnten. Wenn also AKTIVIERT, werden *alle* Events oder wiederholten Instanzen für jeden Datensatz zurückgegeben, wenn jedoch DEAKTIVIERT, können einige Events oder wiederholte Instanzen in jedem Datensatz *möglicherweise* entfernt werden (abhängig vom angegebenen Filter)."
