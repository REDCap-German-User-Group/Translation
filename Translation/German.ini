control_center_4803 = "Datenbankabfrage-Tool"
control_center_4804 = "Diese Seite erlaubt Administratoren, die MySQL/MariaDB-Datenbank von REDCap direkt abzufragen. Sie können eine SQL-Abfrage in das Textfeld unten eingeben, um sie auszuführen. Da nur schreibgeschützte Abfragen unterstützt werden (d. h. show, select, explain), kann dieses Tool Datenbanktabellen in keiner Weise ändern. Sie können außerdem links über einen Pop-up-Dialog benutzerdefinierte Abfragen speichern. Das Speichern einer benutzerdefinierten Abfrage erlaubt Ihnen, die Abfrage jederzeit einfach durch Klicken auf einen Link im linken Menü dieser Seite auszuführen."
control_center_4805 = "HINWEIS: Dieses Tool ist derzeit DEAKTIVIERT und kann erst verwendet werden, wenn jemand mit besonderen Rechten es aktiviert. Da die Seite Ihnen erlaubt, Daten direkt aus der Backend-MySQL/MariaDB-Datenbank anzuzeigen, kann dieses Tool nur von jemandem mit direktem Datenbankzugriff aktiviert werden. Diese Person muss die Abfrage unten in der MySQL/MariaDB-Datenbank ausführen, in der die REDCap-Tabellen gespeichert sind. Nachdem die Abfrage ausgeführt wurde, laden Sie diese Seite neu."
control_center_4806 = "HINWEIS: Nur Administratoren mit dem Admin-Recht 'Zugriff auf alle Projekte und Daten mit maximalen Benutzerrechten' können auf diese Seite zugreifen."
