mycap_mobile_app_754 = "<b>Eine neue MyCap-App ist im App Store verfügbar</b>, damit neue und bestehende Teilnehmende Funktionen in REDCap v13.10.0 oder höher nutzen können. Der Wechsel zur neuen MyCap-App ist nur erforderlich, wenn Ihr Projekt dies für neuere MyCap-bezogene Funktionen benötigt."
