survey_156 = "Einen schönen Tag!"
survey_157 = "Die unten aufgeführten E-Mails sind keine gültigen E-Mail-Adressen. Es wurden keine Teilnehmenden hinzugefügt. Bitte korrigieren Sie die ungültigen E-Mails und reichen Sie Ihre Teilnehmerliste erneut ein."
survey_158 = "UNGÜLTIG"
survey_159 = "Ein Fehler ist aufgetreten! Die Änderungen wurden nicht vorgenommen. Bitte versuchen Sie es erneut."
survey_160 = "Sie können die grundlegenden Informationen der Umfrage bearbeiten, indem Sie die Felder unten ändern und auf die Schaltfläche Änderungen speichern klicken."
survey_161 = "Der eingegebene Rückkehrcode war falsch. Bitte versuchen Sie es erneut."
survey_162 = "Sie haben die gesamte Umfrage nicht abgeschlossen; Ihre Antworten gelten daher nur als teilweise abgeschlossen. Aus Sicherheitsgründen dürfen Sie die Umfrage nicht an der Stelle fortsetzen, an der Sie aufgehört haben. Sie haben daher die Möglichkeit, 1) Ihre Umfrageantworten unverändert zu lassen, oder 2) die Umfrage von vorn zu beginnen, damit Sie sie abschließen können (dadurch werden alle zuvor bestehenden Antworten gelöscht, wenn Sie erneut beginnen). Um die Umfrage erneut zu starten, klicken Sie auf die Schaltfläche unten."
survey_163 = "Sie haben diese Umfrage teilweise abgeschlossen."
survey_165 = "Die Verwendung eines öffentlichen Umfragelinks ist die einfachste und schnellste Möglichkeit, Antworten für Ihre Umfrage zu sammeln. Sie können den untenstehenden Umfragelink abrufen, um ihn per E-Mail an Ihre Teilnehmenden zu senden. Antworten werden anonym erfasst (es sei denn, die Umfrage enthält Fragen nach identifizierenden Daten des Teilnehmers). <b>HINWEIS:</b> Da diese Methode einen einzigen Umfragelink für alle Teilnehmenden verwendet, ermöglicht sie, dass Teilnehmende die Umfrage mehrfach ausfüllen, was in einigen Fällen erforderlich sein kann. "
survey_166 = "Alle Teilnehmenden entfernen"
survey_167 = "Umfrageergebnisse anzeigen"
survey_168 = "Leider können die Umfrageergebnisse derzeit nicht angezeigt werden, da die Mindestanzahl abgeschlossener Antworten für diese Umfrage noch nicht erreicht wurde. Bitte kehren Sie in naher Zukunft erneut zu dieser Seite zurück, um die Umfrageergebnisse anzusehen. <b>WICHTIG:</b> Notieren Sie unbedingt Ihren Umfrageergebniscode, bevor Sie diese Seite verlassen."
survey_169 = "Auf dieser Seite werden die aggregierten Ergebnisse dieser Umfrage angezeigt, wobei jede Frage in der Reihenfolge aufgeführt ist, in der sie in der Umfrage erscheint."
