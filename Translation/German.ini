mobile_app_116 = "Die Daten, die Sie aus der Datei importiert haben, wurden erfolgreich in das Projekt importiert. Wenn Sie weitere Daten importieren möchten, können Sie im Feld oben eine Datei auf Ihrem Computer auswählen oder unten zum Mobile-App-Dashboard zurückkehren."
mobile_app_117 = "Alle Daten aus dem Notfall-Datendump existieren bereits im Projekt."
;; mobile_app_118 is concatenated after mobile_app_71 and a dynamic singular record count.
mobile_app_118 = "Datensatz."
mobile_app_119 = "Das Entsperren eines Geräts erlaubt ihm, frei mit dem REDCap-Server zu kommunizieren. Dies ist der normale Betriebsmodus."
mobile_app_120 = "Das Blockieren eines Geräts verbietet diesem einen Gerät, frei mit dem REDCap-Server zu kommunizieren. Dieser Schritt sollte durchgeführt werden, wenn das Gerät kompromittiert wurde oder wenn jemand unbefugten Zugriff erhält (z. B. Gerät verloren oder gestohlen), um zu verhindern, dass möglicherweise kompromittierte Daten an den REDCap-Server zurückgesendet werden. Das Blockieren eines Geräts ähnelt dem Widerrufen eines Tokens, mit dem Unterschied, dass das Blockieren nur auf bestimmte Geräte abzielt, während das Widerrufen eines Tokens stattdessen alle Geräte betreffen würde."
