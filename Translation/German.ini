survey_1085 = "HINWEIS: Da diese Seite ein wiederholtes Instrument ist oder sich auf einem wiederholten Event befindet und noch keine Daten dafür gespeichert wurden, können die Umfrageoptionen erst verwendet werden, nachdem dieses Instrument zuerst gespeichert wurde. Bitte klicken Sie auf die Schaltfläche 'Speichern & bleiben', um mit der Verwendung der Umfrageoptionen fortzufahren."
survey_1086 = "Hinweis: Alle gesammelten Umfrageantworten gelten als anonym, sofern Sie nicht 1) Teilnehmerkennungen verwenden oder 2) das festgelegte E-Mail-Feld für Einladungen aktiviert haben."
