multilang_123 = "<b>HINWEIS:</b> Ähnlich wie bei einem festgelegten E-Mail-Feld wird der Wert dieses Feldes über alle Instanzen/Events hinweg synchronisiert, wenn dieses Feld in longitudinalen Projekten auf mehreren Events, auf einem wiederholten Instrument oder auf einem wiederholten Event vorhanden ist, sodass eine Änderung an einem Ort den Wert in allen Events/Instanzen ändert, in denen das Feld vorkommt."
multilang_124 = "<b>Warnung:</b> Die Optionen des Feldes enthalten nicht alle aktiven Sprachen!"
multilang_125 = "Wenn auf einem Feld verwendet, wird das Eingabeformular oder der Fragebogen, auf dem sich das Feld befindet, in der angegebenen Sprache gerendert (die mit der Funktion Multi-Language Management eingerichtet worden sein muss). Das Format muss dem Muster @LANGUAGE-FORCE=\"???\" folgen, wobei die ID der gewünschten Sprache in einfachen oder doppelten Anführungszeichen stehen sollte - z. B. @LANGUAGE-FORCE=\"de\". Piping wird unterstützt - z. B. @LANGUAGE-FORCE=\"[field_name]\" (wenn das Quellfeld ein Radio-Feld ist, fügen Sie unbedingt den Qualifizierer <i>:value</i> hinzu). Wenn die Sprache erfolgreich erzwungen wird (d. h. sie existiert und ist aktiv), wird die Sprachauswahl ausgeblendet. Dieses Action Tag wird beim Laden des Formulars oder Fragebogens ausgewertet. Zusammen mit @LANGUAGE-CURRENT-FORM/SURVEY auf dem Quellfeld für @LANGUAGE-FORCE kann es verwendet werden, um einen Benutzer auf seine ausgewählte Sprache 'festzulegen'."
multilang_126 = "Wie @LANGUAGE-FORCE, aber die Wirkung ist auf Eingabeformulare beschränkt (d. h. dies betrifft keine Fragebögen)."
multilang_127 = "Wie @LANGUAGE-FORCE, aber die Wirkung ist auf Fragebögen beschränkt (d. h. dies betrifft keine Eingabeformulare)."
