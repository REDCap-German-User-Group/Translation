system_config_214 = "Datei-Upload-Einstellungen"
system_config_215 = "Die untenstehenden Einstellungen betreffen Dateien, die von Benutzern in mehreren verschiedenen Modulen in REDCap hochgeladen werden. Bitte beachten Sie, dass ALLE hochgeladenen Dateien auf Ihrem lokalen REDCap-Webserver (oder auf einem externen Server, falls nicht die Einstellung 'Lokal' verwendet wird) gespeichert werden."
system_config_216 = "FELDTYPEN 'FILE UPLOAD' AKTIVIEREN: Dokumenten-Upload für einzelne Projektdatensätze auf Formularen/Fragebögen aktivieren?"
system_config_217 = "Wenn deaktiviert, erscheint diese Auswahl Benutzern nicht als verfügbarer Feldtyp. Alle 'File Upload'-Felder, die vor der Deaktivierung bereits erstellt wurden, funktionieren nicht mehr, wenn sie auf Formularen/Fragebögen angezeigt werden."
system_config_219 = "'File Upload'-Felder"
system_config_220 = "Erklärung der obigen Optionen:"
system_config_221 = "Die obigen Optionen reichen von streng bis weniger streng (von oben nach unten) hinsichtlich der Bedingungen, unter denen sie automatische Genehmigung erlauben. Wenn Option 1 ausgewählt ist, müssen REDCap-Administratoren immer alle Produktionsänderungen prüfen und genehmigen, die von Benutzern vorgenommen wurden. Option 2 erlaubt automatische Genehmigung NUR, wenn dem Projekt neue Felder hinzugefügt werden (oder wenn Felder lediglich neu angeordnet werden), während Option 3 automatische Genehmigung erlaubt, wenn das Projekt keine Datensätze hat ODER wenn nur neue Felder hinzugefügt werden (d. h. keine vorhandenen Felder geändert wurden). Option 4 erlaubt KEINE automatische Genehmigung, wenn kritische Probleme bestehen (z. B. gelöschte Felder, gelöschte Multiple-Choice-Optionen, geänderter Feldtyp), während Option 5 KEINE automatische Genehmigung erlaubt, wenn BEIDES zutrifft: Das Projekt hat Datensätze UND kritische Probleme bestehen. HINWEIS: Wenn ein Projekt keine Datensätze hat, verhält sich der automatische Genehmigungsprozess bei Option 3 oder 5 gleich; Optionen 3 und 5 verhalten sich jedoch sehr unterschiedlich, wenn ein Projekt einen oder mehrere Datensätze enthält."
