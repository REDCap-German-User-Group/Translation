dash_83 = "Ein Benutzer hat angefragt, dass ein Project Dashboard als \"öffentlich\" festgelegt wird. Das bedeutet, dass das Dashboard für jede Person mit einem Link zum Dashboard öffentlich sichtbar wäre (d. h. ohne erforderliche Authentifizierung zur Anzeige). Als Administrator können Sie auf den untenstehenden Link klicken, um die Anfrage zu genehmigen. Dadurch wird das Dashboard öffentlich gemacht und der Anfragende über die Genehmigung informiert."
