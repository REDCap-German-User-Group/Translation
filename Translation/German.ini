econsent_77 = "Jedes Einwilligungsformular muss versioniert werden (z. B. \"<code>1.1</code>\", \"<code>2.3.1 2024-06-01</code>\"), damit Sie künftige Änderungen verwalten und alle Versionen des Einwilligungsformulars unterscheiden können. Es wird empfohlen, die Versionsnummer nicht mit dem Buchstaben \"v\" zu beginnen."
