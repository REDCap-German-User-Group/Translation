plus_09 = "HINWEIS: Ihr REDCap+-Abonnement ist abgelaufen, aber Sie befinden sich derzeit in einem Kulanzzeitraum."
plus_10 = "Sie haben noch {0} Tage, bis Ihre REDCap+-Funktionen inaktiv werden. Klicken Sie auf den Button unten, um zu erfahren, wie Sie Ihr Abonnement verlängern können."
plus_11 = "HINWEIS: Ihr REDCap+-Abonnement ist abgelaufen. <u>Ihre REDCap+-Funktionen sind nicht mehr aktiv.</u> Klicken Sie auf den Button unten, um zu erfahren, wie Sie Ihr Abonnement reaktivieren können."
plus_13 = "<b>Warum REDCap+ existiert:</b> REDCap+ hilft, die langfristige Nachhaltigkeit von REDCap sicherzustellen, indem es die Entwicklung neuer, innovativer Funktionen unterstützt und gleichzeitig den freien Zugang zur REDCap-Core-Plattform für die gesamte globale Community erhält. Dieses Modell ermöglicht REDCap, die steigenden Betriebskosten zu decken - z. B. die Prüfung neuer Lizenznehmer von gemeinnützigen Organisationen weltweit, die Pflege der Plattform mit Sicherheitskorrekturen und technischen Upgrades, die Unterstützung des External Module Repository sowie globalen Support über die REDCap-Community-Website und wöchentliche Konsortiums-Calls - und verantwortungsvoll zu wachsen, ohne eine Paywall einzuführen oder Kernfunktionen einzuschränken. Die REDCap-Core-Plattform bleibt für alle Einrichtungen vollständig kostenlos und voll funktionsfähig, genau wie bisher. Die Entscheidung, REDCap+ nicht zu abonnieren, wird Ihre Fähigkeit zur Nutzung von REDCap niemals beeinträchtigen."
plus_14 = "<b>So funktioniert es:</b> REDCap+ wird als kostenpflichtiges jährliches Abonnement mit einem gestaffelten Preismodell angeboten, das auf der Anzahl aktiver Benutzer einer bestimmten REDCap-Produktionsinstallation basiert. Die Preisbewertung erfolgt separat für jede eindeutige Produktionsinstanz. Diese gestaffelte Struktur stellt sicher, dass REDCap weltweit auf faire und gerechte Weise über Einrichtungen aller Größen und Ressourcenniveaus hinweg zugänglich und nachhaltig bleibt."
plus_15 = "Ihr REDCap+-Abonnement verlängern"
plus_16 = "REDCap+ abonnieren"
plus_17 = "Haben Sie Fragen? Die meisten Antworten finden Sie auf der REDCap+-FAQ-Seite."
plus_18 = "REDCap+-FAQ anzeigen"
plus_19 = "(bis {0})"
plus_20 = "REDCap+-Abonnementschlüssel eingeben"
plus_21 = "Nachdem Sie Ihren REDCap+-Abonnementschlüssel gekauft und erhalten haben, klicken Sie auf den Button, um ihn unten einzugeben."
plus_22 = "<b>Tier- und Preisbewertung:</b> Für diese REDCap-Instanz beträgt die Anzahl eindeutiger Benutzer, die sich in den letzten 6 Monaten angemeldet haben, {0}. Klicken Sie auf den Button unten, um zu sehen, in welches Tier diese Instanz fällt und welcher jährliche Abonnementpreis dazugehört."
plus_23 = "Nachdem Sie Ihren REDCap+-Abonnementschlüssel gekauft und erhalten haben, geben Sie ihn unten ein. Wenn Sie bereits ein REDCap+-Abonnement haben, sehen Sie unten Ihren bestehenden Abonnementschlüssel. Das Speichern eines neuen Schlüssels überschreibt Ihren bestehenden Abonnementschlüssel."
plus_24 = "Glückwunsch! Ihr REDCap+-Abonnement wurde für diese REDCap-Instanz aktiviert. Die Seite wird aktualisiert, um Ihre aktuellen Abonnementinformationen anzuzeigen."
plus_25 = "Schlüssel speichern"
plus_26 = "Ungültiger Abonnementschlüssel"
plus_27 = "Der von Ihnen eingegebene REDCap+-Abonnementschlüssel scheint nicht gültig zu sein. Bitte versuchen Sie, ihn erneut einzugeben."
plus_29 = "Bereit für REDCap+? Starten Sie den Prozess zum Erhalt eines REDCap+-Abonnements."
plus_30 = "Vorteile & Funktionen"
plus_31 = "Auf dieser REDCap-Instanz ist ein REDCap+-Abonnement aktiv. Vielen Dank für Ihre Unterstützung!"
plus_32 = "HINWEIS: Diese Funktion ist nicht aktiv, da sie ein aktives REDCap+-Abonnement erfordert."
plus_35 = "REDCap+-Tiers und Preise anzeigen"
plus_36 = "REDCap+-Tiers und Preise"
plus_37 = "Basierend auf der Anzahl eindeutiger Benutzer, die sich in den letzten 6 Monaten bei dieser Instanz angemeldet haben (<b>{0} Benutzer</b>), fällt diese REDCap-Installation in das <b>\"{1}\"-Tier</b>. Siehe Preise unten."
plus_38 = "Tier"
plus_39 = "Preis pro Jahr (USD)"
plus_40 = "(kommt bald)"
plus_41 = "Ja, diese Angaben sind korrekt"
plus_42 = "<b>1)</b> Kopieren Sie Ihren REDCap+-Purchase Code:"
plus_43 = "Der Purchase Code ist eindeutig für diese REDCap-Instanz. Sie geben den Code auf der unten verlinkten Zahlungswebsite ein."
plus_45 = "Bereit, REDCap+ zu kaufen?"
plus_46 = "<b>Folgen Sie den Schritten unten, um ein REDCap+-Abonnement zu kaufen. Beachten Sie, dass <u>jedes Abonnement 1 Jahr läuft</u></b>. Danach müssen Sie das Abonnement verlängern, um den Zugriff auf alle REDCap+-Funktionen in dieser REDCap-Instanz aufrechtzuerhalten. Sie werden automatisch ein und zwei Monate vor Ablauf Ihres Abonnements per E-Mail benachrichtigt."
plus_47 = "Bitte beachten Sie, dass die Aktion des Akzeptierens des REDCap+ License Agreement Addendum Teil des Prozesses beim Kauf eines REDCap+-Abonnements ist. Wenn Ihr Rechtsteam das Agreement Addendum vor dem Kauf eines Abonnements prüfen möchte, kann es {0} auf der öffentlichen REDCap-Website."
plus_48 = "das Agreement Addendum hier anzeigen"
plus_49 = "REDCap+-Abonnement aktiviert!"
plus_50 = "<b>2)</b> Navigieren Sie zum untenstehenden Vanderbilt-Website-Link (oder teilen Sie ihn mit der zuständigen Stelle in Ihrer Einrichtung), um das REDCap+ License Agreement Addendum zu akzeptieren und ein REDCap+-Abonnement für <b>Tier \"{0}\"</b> für diese REDCap-Instanz zu kaufen. Nachdem Sie den Kauf abgeschlossen haben, erhalten Sie eine E-Mail-Bestätigung Ihres Kaufs. Später erhalten Sie in einer separaten E-Mail Ihren REDCap+-Abonnementschlüssel. Nachdem Sie Ihren Abonnementschlüssel erhalten haben, können Sie ihn hier auf dieser Seite eingeben, um REDCap+ auf dieser REDCap-Instanz zu aktivieren."
plus_51 = "Auf der Website können Sie mit verschiedenen elektronischen Zahlungsmethoden bezahlen (Kreditkarte, Purchase Order, ACH, Überweisung).<br>Bitte beachten Sie, dass die Zahlung per Scheck nicht verfügbar ist, auch wenn die Website dies möglicherweise vorschlägt."
plus_52 = "REDCap-Instanz-ID:"
plus_53 = "Ungültige ConID"
plus_54 = "Basierend auf Ihren REDCap-Statistiken, die diese REDCap-Instanz jede Woche meldet, scheint diese Instanz zu einer anderen Einrichtung zu gehören als derjenigen, zu der der REDCap+-Abonnementschlüssel gehört."
plus_55 = "Ungültige Instanz-ID"
plus_56 = "Die Instanz-ID aus dem REDCap+-Abonnementschlüssel stimmt nicht mit der Instanz-ID dieser REDCap-Instanz überein."
plus_57 = "Ungültiges Tier"
plus_58 = "Das Tier aus dem REDCap+-Abonnementschlüssel stimmt nicht mit der geschätzten REDCap+-Tiergröße dieser REDCap-Instanz überein."
plus_59 = "NON-PROD-Schlüssel wird für PROD-Instanz verwendet"
plus_60 = "Der bereitgestellte REDCap+-Abonnementschlüssel ist ein NON-PROD-Schlüssel, der nur auf Nicht-Produktions-REDCap-Instanzen verwendet werden kann. Die aktuelle REDCap-Instanz wurde jedoch von Vanderbilt so erfasst, dass sie ihre REDCap-Statistiken gemeldet hat. Nur Produktionsserver sollten ihre Statistiken melden. Dies impliziert, dass die aktuelle Instanz eine REDCap-Produktionsinstanz ist. Daher können Sie auf dieser Instanz keinen Nicht-Produktions-REDCap+-Abonnementschlüssel verwenden. Wenn dies ein Fehler ist, kontaktieren Sie bitte redcap@vumc.org und geben Sie die vollständige REDCap-URL dieser Instanz an, um mitzuteilen, dass es sich nicht um eine Produktionsinstanz handelt und gemeldete Statistiken dieser Instanz ignoriert werden sollten."
plus_61 = "(HINWEIS: Diese Instanz ist als Nicht-Produktions-REDCap-Instanz vermerkt.)"
plus_62 = "Sie benötigen ein REDCap+-Abonnement, um diese Einstellung zu aktivieren und zu konfigurieren."
plus_63 = "<b>REDCap+ ist eine sich weiterentwickelnde Suite leistungsstarker Funktionen und Dienste, die die Möglichkeiten der vertrauenswürdigen REDCap-Plattform erweitern.</b> Als optionales Abonnement pro Instanz hilft REDCap+ sicherzustellen, dass REDCap Einrichtungen weltweit weiterhin frei zur Verfügung steht, und stellt gleichzeitig erweiterte Funktionen für Einrichtungen entsprechend ihrem Bedarf zu einem Preis bereit, der auf ihre Kapazität zugeschnitten ist."
plus_64 = "Um alles zu erkunden, was in einem REDCap+-Abonnement enthalten ist, besuchen Sie oben den Tab \"Vorteile & Funktionen\"."
plus_65 = "Zur Referenz sieht Ihr bestehender Abonnementschlüssel wie folgt aus:"
plus_66 = "Es scheint ein Fehler mit dem Ablaufzeitpunkt des Abonnements vorzuliegen."
plus_67 = "Diese REDCap+-Instanz ist lizenziert für {0} (läuft ab am {1})"

pmt_01 = "Projekt auf einen anderen REDCap-Server migrieren"
pmt_02 = "Project Migration Tool"
pmt_03 = "Das Project Migration Tool kann verwendet werden, um ein vollständiges Projekt einschließlich seiner Daten, Dateien, Logging und vieler Projektkomponenten einfach auf eine andere REDCap-Serverinstanz zu verschieben."
pmt_04 = "Ein REDCap+-Abonnement ist NICHT erforderlich, um diese Funktion zu verwenden. Die Ziel-REDCap-Instanz (auf die das Projekt verschoben wird) muss jedoch ein REDCap+-Abonnement haben."
pmt_05 = "Migrationsschlüssel generieren"
pmt_06 = "Wählen Sie unten die Projektkomponenten aus, die Sie in die andere REDCap-Installation migrieren möchten:"
pmt_07 = "Dieser Prozess generiert einen eindeutigen Project Migration Key, den Sie mitnehmen und in die Ziel-REDCap-Installation eingeben (die REDCap-Instanz, in die Sie das Projekt migrieren möchten). <b>Der Schlüssel läuft nach 3 Tagen ab.</b> Ihr Migrationsschlüssel ist privat und eindeutig für Sie, bewahren Sie ihn daher sicher auf. Der Migrationsprozess nutzt die REDCap-API, um Ihre Projektinformationen und Daten von diesem Server auf den anderen REDCap-Server zu ziehen. Daher ist es <b>erforderlich, dass Sie ein API-Token</b> für dieses Projekt haben."
pmt_08 = "<b>Kopieren Sie unten Ihren Project Migration Key. Der Schlüssel läuft nach 3 Tagen ab.</b> Der Schlüssel ist privat und eindeutig für Sie, bewahren Sie ihn daher sicher auf. Navigieren Sie zu der REDCap-Instanz, in die Sie das Projekt migrieren möchten, und geben Sie den Schlüssel auf der Seite \"Neues Projekt erstellen\" ein (wählen Sie die Projekterstellungsoption \"Projektmigrationsschlüssel eingeben\"). Danach beginnt die Migration Ihres REDCap-Projekts in die andere REDCap-Instanz automatisch über Hintergrundprozesse."
pmt_09 = "Migrationsschlüssel:"
pmt_10 = "Projektmigrationsschlüssel eingeben"
pmt_13 = "Der angegebene Migrationsschlüssel war nicht gültig. Bitte versuchen Sie es erneut."
pmt_14 = "Der angegebene Migrationsschlüssel ist abgelaufen. Bitte beschaffen Sie einen neuen Migrationsschlüssel und versuchen Sie es erneut."
pmt_15 = "Verbindung zum REDCap-Server unter <b>{0}</b> fehlgeschlagen.<br><br>Zurückgegebener Fehler: \"<b>{1}</b>\""
pmt_16 = "Das Project Migration Tool importiert derzeit Informationen aus dem Remote-Projekt in dieses Projekt. <u>Sie erhalten eine E-Mail</u>, sobald der Prozess abgeschlossen ist. Danach wird dieses Projekt normal zugänglich und nutzbar."
pmt_17 = "Gültiger Migrationsschlüssel!"
pmt_18 = "Dieser Prozess migriert das Projekt mit dem Namen \"<b>{0}</b>\" vom REDCap-Server unter <b>{1}</b>. Bitte prüfen Sie alle untenstehenden Informationen, um sicherzustellen, dass sie korrekt sind."
pmt_19 = "Ja, das ist korrekt"
pmt_20 = "Nein, abbrechen"
pmt_21 = "Zum neuen Projekt navigieren"
pmt_22 = "Ihre Projektmigration wurde abgeschlossen!"
pmt_23 = "Ihre REDCap-Projektmigration begann am {0} und wurde am {1} abgeschlossen. Das Projekt \"<b>{2}</b>\" (PID {3}) wurde vom REDCap-Server unter {4} in das Projekt \"<b>{5}</b>\" (PID {6}) unter {7} migriert."
;; pmt_24 is appended to component labels when the user lacks privileges to export/migrate that component.
pmt_24 = "(HINWEIS: Sie müssen hierfür Berechtigungen haben, um es exportieren zu können.)"
pmt_25 = "Legacy-Logging anzeigen"
pmt_26 = "Benutzern erlauben, das Project Migration Tool zu verwenden, um Projekte <u>VON DIESEM SERVER</u> zu verschieben?"
pmt_27 = "Wenn diese Einstellung aktiviert wird, kann das Project Migration Tool innerhalb jedes REDCap-Projekts verwendet werden, um den Prozess zum Verschieben des Projekts auf eine andere REDCap-Instanz zu starten. Nach der Aktivierung erscheint auf der Projekt-Setup-Seite \"Weitere Funktionen\" ein Button, mit dem Benutzer einen Migrationsschlüssel erhalten können, den sie dann auf der Seite \"Neues Projekt erstellen\" einer anderen REDCap-Instanz eingeben können. Dieser Prozess erlaubt ihnen, den Projektmigrationsprozess zu starten, der im Hintergrund durch den REDCap-Cronjob ausgeführt wird. Der Benutzer erhält automatisch eine Bestätigungs-E-Mail, nachdem die Migration seines Projekts vollständig abgeschlossen wurde."
pmt_28 = "Fragebogenteilnehmer und Fragebogen-Zeitstempel"
pmt_29 = "Datensatzsperrstatus und Zeitstempel"
pmt_30 = "Kalender-Events (einschließlich Datensatzplanung)"
pmt_31 = "Randomisierungszuweisungen und Allocation Tables"
pmt_32 = "(HINWEIS: Da Sie derzeit einer DAG zugewiesen sind, können Sie nur Datensätze in Ihrer DAG migrieren.)"
pmt_33 = "Projektmigration läuft"
pmt_34 = "Deaktiviert: Vor allen verborgen"
pmt_35 = "Aktiviert: Nur für Administratoren sichtbar"
pmt_36 = "Aktiviert: Für alle Benutzer sichtbar"
pmt_37 = "Ein REDCap+-Abonnement ist erforderlich, um diese Funktion zu verwenden."
pmt_38 = "Dateien im Datei-Repository (alle Ordner und von Benutzern hochgeladene Dateien)"
pmt_39 = "PDF-Snapshot-Archivdateien"
pmt_40 = "Das Projekt kann nicht erstellt werden, weil die Anzahl der mit diesem Projekt zu migrierenden Datensätze die maximale Anzahl von Datensätzen überschreitet, die ein Entwicklungsprojekt haben darf."
pmt_41 = "HINWEIS: Das Projekt, das auf dem Zielserver erstellt wird, beginnt nach der Migration im Status {0}."
pmt_42 = "Benutzern erlauben, das Project Migration Tool zu verwenden, um Projekte <u>AUF DIESEN SERVER</u> zu verschieben?"
pmt_43 = "Wenn diese Einstellung aktiviert wird, kann das Project Migration Tool auf der Seite \"Neues Projekt erstellen\" der aktuellen REDCap-Instanz verwendet werden. Nach der Aktivierung erscheint eine neue Auswahl, mit der Benutzer ein neues Projekt mit einem Migrationsschlüssel erstellen können, den sie aus einem Projekt auf einer anderen REDCap-Instanz erhalten haben. Nach Eingabe des Migrationsschlüssels wird der Schlüssel validiert, und ein Bestätigungsdialog zeigt alle Details der Migration an. Der Antrag wird zur Genehmigung an einen Administrator gesendet. Danach wird der Prozess gestartet und im Hintergrund durch den REDCap-Cronjob abgeschlossen. Der Benutzer erhält automatisch eine Bestätigungs-E-Mail, nachdem die Migration seines Projekts vollständig abgeschlossen wurde."
pmt_44 = "HINWEIS: Ein Administrator muss immer jeden Projektmigrationsantrag genehmigen, auch wenn Benutzer normalerweise Projekte ohne Admin-Genehmigung selbst erstellen dürfen. Diese zusätzliche Aufsicht erlaubt Administratoren mehr Kontrolle und Sichtbarkeit hinsichtlich der Projekte, die in ihre REDCap-Instanz migriert werden."
