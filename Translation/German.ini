system_config_325 = "Universelle FROM-E-Mail-Adresse für ALLE von REDCap gesendeten E-Mails festlegen (optional)"
system_config_326 = "Leer lassen (Standard), damit alle von REDCap gesendeten E-Mails als 'From'-Adresse die Adresse des Absenders haben. Wenn oben eine E-Mail-Adresse angegeben wird, haben *alle* E-Mails diese als 'From'-Adresse (obwohl alle E-Mails weiterhin den 'Reply-To'-Wert als Absender haben). Diese Option ist nützlich, wenn Ihr SMTP-E-Mail-Server sich weigert, E-Mails von einer externen Domainadresse zu senden (z. B. Gmail, Yahoo)."
system_config_328 = "Feldkommentar-Log standardmäßig in neuen Projekten aktivieren?"
