survey_1075 = "Beispiel anzeigen"
survey_1076 = "Unten wird ein Screenshot-Beispiel angezeigt, wie erweiterte Radio Buttons und Checkboxen in einer Umfrage aussehen, anstatt als Standard-Radio- und Checkbox-Elemente angezeigt zu werden. Textfarbe und Hintergrundfarbe sind anpassbar. Normalerweise werden die Auswahloptionen auf der Umfrageseite in zwei Spalten angezeigt; wenn die Umfrage jedoch auf schmalen Bildschirmen wie Mobilgeräten angezeigt wird, werden die Auswahloptionen für eine bessere Benutzererfahrung in einer einzelnen Spalte gestapelt."
