missing_data_04 = "Missing Data Codes"
missing_data_05 = "Missing Data Codes aus Export entfernen"
missing_data_08 = "Missing Data Codes: Missing Data Codes für dieses Projekt einrichten"
missing_data_09 = "Felder mit leerem/fehlendem Wert können mit einem benutzerdefinierten 'Missing Data Code' markiert werden, um zu dokumentieren, warum der Wert leer ist. Diese Missing Codes können die Datenanalyse unterstützen, indem sie angeben, warum einem Feld ein Wert fehlt. Um diese Funktion unten zu aktivieren, geben Sie sowohl die Codes ALS AUCH ihre Labels für alle Kategorien fehlender Daten ein, die Sie in diesem Projekt verwenden möchten. Die Missing Codes sollten wie die Choices eines Mehrfachauswahlfeldes codiert werden, mit <i>Code + Komma + Label</i>. Die Codes dürfen nur Buchstaben, Zahlen, Punkte, Bindestriche und Unterstriche enthalten (z. B. '-999, Nicht gefragt' oder 'UNK, Unbekannt'). Wenn keine Codes eingegeben werden, bleibt diese Funktion deaktiviert."
missing_data_10 = "Code aus standardisierter Liste von Missing Data Codes hinzufügen (optionale Vorschläge):"
missing_data_11 = "NUTZUNG: Nachdem Ihre Missing Data Codes eingerichtet wurden, sehen Sie beim Anzeigen eines Eingabeformulars neben jedem Feld ein 'M'-Symbol. Klicken Sie auf das Symbol, um Ihre Liste der Missing Data Codes zu öffnen, und wählen Sie einen aus. Nach der Auswahl wird der Missing Code als wörtlicher Datenwert für das Feld gespeichert. Missing Data Codes können für jeden Feldtyp verwendet werden (z. B. Datum, Slider, Datei-Upload-Felder). Da ein Missing Data Code als Feldwert gespeichert wird, bedeutet dies, dass der Missing Data Code des Feldes optional in einem Datenexport exportiert oder in einem Report angezeigt werden kann (wenn Sie dies wünschen - dies ist eine Option beim Erstellen eines Reports). Die Eingabe eines Missing Data Code muss manuell durch einen Benutzer über die Benutzeroberfläche oder über einen Datenimport (API oder Data Import Tool) erfolgen, wobei Sie die Missing Data Codes als Feldwerte in Ihrer Datenimportdatei importieren können."
missing_data_12 = "Eingegebener Missing Data Code:"
missing_data_13 = "Hinweis: Als 'Missing' aufgeführte Werte können Datensätze mit einem Missing Data Code enthalten (falls Missing Data Codes definiert sind)."
missing_data_14 = "Missing Data Codes anstelle leerer Werte anzeigen (wo zutreffend)"
missing_data_15 = "Zusätzliche Anweisungen und Hinweise:"
missing_data_16 = "TIPP: Denken Sie beim Definieren Ihrer Missing Data Codes daran sicherzustellen, dass Ihr Missing Code niemals mit einem echten Wert eines Feldes in Ihrem Projekt kollidiert/überlappt. Wenn Sie beispielsweise ein Integer-Feld haben, bei dem '-999' ein möglicher Wert ist, sollten Sie -999 nicht als Missing Data Code verwenden. Der Grund ist, dass REDCap nicht erkennen kann, ob dies ein echter Wert ist oder ein Missing Code, der angibt, dass das Feld leer ist. Unten rechts finden Sie einige optionale Vorschläge für Missing Data Codes, die Sie verwenden könnten. Sie können jedoch beliebige Missing Data Codes verwenden."
missing_data_17 = "HINWEIS: Verhalten mit Branching Logic - Wenn ein Feld durch Branching Logic ausgeblendet werden soll, fragt REDCap den Benutzer normalerweise (außer bei Fragebögen), ob der Wert des ausgeblendeten Feldes gelöscht werden soll. Wenn für das Feld jedoch ein Missing Data Code gespeichert ist, wird das Feld weiterhin ausgeblendet, aber der Missing Data Code wird nicht als Feldwert entfernt. Dadurch kann ein Feld weiterhin 'leer' sein und einen Missing Code haben, während es durch Branching Logic ausgeblendet ist."
missing_data_18 = "LOGIK: Da Missing Data Codes als wörtliche Feldwerte gespeichert werden, können sie in Logik in ganz REDCap verwendet und referenziert werden (d. h. Logik für Report-Filter, Datenqualitätsregeln, Survey Queue, automatisierte Fragebogeneinladungen, Branching Logic). Wenn Sie beispielsweise ein Feld auf einem Formular nur anzeigen möchten, wenn das vorherige Feld leer ist und mit dem Missing Data Code 'NASK' markiert wurde, könnte Ihre Branching Logic lauten: [field] = 'NASK'. Zusätzlich kann eine spezielle Funktion 'isblankormissingcode()' in Logik als Catch-all verwendet werden, um festzustellen, ob der Wert eines Feldes wirklich leer ist oder einen Missing Data Code enthält. Beispiel: isblankormissingcode([age]); wenn age den Wert UNK hat (was in einem Projekt ein Missing Data Code sein könnte), wird TRUE zurückgegeben. Wenn das Feld einen nicht leeren/nicht null-Wert hat, der auch kein Missing Data Code ist, wird FALSE zurückgegeben."
missing_data_19 = "ACTION TAG: Standardmäßig ist die Missing-Data-Code-Funktionalität für ALLE Felder im Projekt aktiviert, kann aber feldweise deaktiviert werden, indem dem jeweiligen Feld das Action Tag @NOMISSING hinzugefügt wird. Dadurch wird das 'M'-Symbol für das Feld im Eingabeformular ausgeblendet und die Verwendung von Missing Data Codes für dieses Feld verhindert."
missing_data_20 = "Missing Data Codes ändern"
missing_data_21 = "Bitte beachten Sie, dass das Umbenennen oder Entfernen von Missing Data Codes, die in einem Produktionsprojekt verwendet werden, in dem die Datenerhebung bereits begonnen hat, zu Datenproblemen führen kann. Es wird empfohlen, nur neue Missing Data Codes hinzuzufügen und keine bestehenden zu entfernen oder umzubenennen, wenn im Projekt bereits Daten erhoben wurden."
