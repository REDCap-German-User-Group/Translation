setup_69 = "Ihre Instrumente über die REDCap Shared Library mit anderen teilen"
setup_70 = "In Produktion können Sie einzelne Datenerhebungsinstrumente aus diesem Projekt mit anderen REDCap-Benutzern auf der ganzen Welt teilen. Dies erfolgt durch Hochladen Ihrer Instrumente in die REDCap Shared Library. Wählen Sie unten das Instrument aus, das Sie teilen möchten. Bevor Sie Ihr Instrument teilen dürfen, werden Sie gebeten, einige grundlegende Informationen auszufüllen. (HINWEIS: Urheberrechtlich geschütztes Material darf nicht geteilt werden, es sei denn, Sie sind der Inhaber.)"
