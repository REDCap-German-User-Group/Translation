design_1355 = "Validierungstyp:"
design_1356 = "Führt eine Datumsberechnung durch, indem eine angegebene Zeitmenge zu einem angegebenen Datums- oder Datetime-Feld addiert oder davon subtrahiert wird, und gibt das Ergebnis als Datums- oder Datetime-Wert zurück - z. B. @CALCDATE([visit_date], 7, 'd'). Der erste Parameter innerhalb der Funktion @CALCDATE() sollte ein Textfeld mit date-, datetime- oder datetime_seconds-Validierung sein, wobei Sie (falls nötig) Event und Wiederholungsinstanz angeben können - z. B. @CALCDATE([baseline_event][visit_date], 7, 'd'). Alternativ kann der erste Parameter Logik sein, etwa eine if()-Anweisung, die zu einem Datums- oder Datetime-Feld/-Wert führt. Der zweite Parameter stellt die Offset-Zahl dar, die addiert oder subtrahiert werden soll. Er kann eine Dezimalzahl oder Ganzzahl sein. Tipp: Zum Subtrahieren (d. h. zeitlich rückwärts) verwenden Sie eine negative Zahl. Der dritte Parameter stellt die Einheit der Offset-Menge dar, die durch folgende Optionen dargestellt wird: 'y' (Jahre, 1 Jahr = 365.2425 Tage), 'M' (Monate, 1 Monat = 30.44 Tage), 'd' (Tage), 'h' (Stunden), 'm' (Minuten), 's' (Sekunden). Die Einheitsoption muss in Anführungszeichen oder Apostrophe gesetzt werden. HINWEIS: Sowohl das Quellfeld als auch das Ergebnisfeld müssen Textfelder mit date-, datetime- oder datetime_seconds-Validierung sein. Es ist wichtig zu verstehen, dass ein Feld mit @CALCDATE auf der Fragebogenseite oder im Eingabeformular nicht bearbeitbar ist und fast genau wie ein normales berechnetes Feld funktioniert. Sein Wert kann über einen Datenimport, beim Ausführen von Datenqualitätsregel H oder in Echtzeit während der normalen Dateneingabe in einem Formular oder Fragebogen aktualisiert werden."
