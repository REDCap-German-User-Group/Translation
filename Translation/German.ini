multilang_772 = "<b>Hinweis:</b> Bitte stellen Sie sicher, dass Sie eine Sprach-ID aus der Liste verwenden, wenn Sie eine bestimmte Sprache in der MyCap-App nutzen möchten."
multilang_773 = "Liste anzeigen"
multilang_774 = "Liste ausblenden"
multilang_775 = "Diese Option bestimmt, ob eine Sprache für die <i>MyCap</i>-App aktiv ist. Anders als Formulare und Fragebögen, die für jede Sprache einzeln aktiviert werden können, ist das Aktivieren einer Sprache für <i>MyCap</i> eine Alles-oder-nichts-Einstellung. Wenn eine Sprache für MyCap nicht aktiv ist, erscheint sie nicht in der <i>MyCap</i>-App."
multilang_776 = "Sie können unten auf die Sprach-ID aus der Liste klicken, um Sprach-ID und Sprach-Anzeigename auszufüllen."
multilang_777 = "Übersetzungen von Survey-Queue-Elementen"
multilang_779 = "Sprachnotizen"
multilang_780 = "Notizen zu dieser Sprache eingeben"
multilang_781 = "Notizen können nützlich sein, um zusätzliche Informationen zur Sprache, zur Quelle der Übersetzungen oder andere Informationen bereitzustellen, die <b>für Sie relevant</b> sind. Notizen werden nur auf Anforderung exportiert und niemals importiert (außer beim Erstellen einer neuen Sprache)."
