system_config_541 = "Die beiden untenstehenden Buckets dürfen nicht denselben Namen haben. Sie müssen unterschiedlich sein."
system_config_542 = "GOOGLE-CLOUD-STORAGE-EINSTELLUNGEN: Wenn REDCap auf Google Cloud Platform gehostet wird, müssen Sie die Google-Cloud-Storage-Option zum Speichern von Dateien verwenden. Geben Sie die Namen von zwei Buckets in GCS an (einen für temporären Dateispeicher und den anderen für dauerhafte Speicherung von REDCap-Dateien)."
system_config_543 = "Andere Sicherheitseinstellungen:"
system_config_544 = "Domain-Allowlist für domänenübergreifende HTTP-Zugriffskontrolle (optional)"
system_config_545 = "Standardmäßig können aus Flexibilitätsgründen AJAX-Anfragen (über JavaScript) von jeder Domain/URL an REDCap gestellt werden. Wenn Sie dies einschränken möchten, sodass nur bestimmte Domains domänenübergreifende AJAX-Anfragen an REDCap stellen können, müssen Sie die Domainnamen aller erlaubten Access-Control-Origins (d. h. die Domain der URLs) im Textfeld rechts festlegen. Wenn das Textfeld leer gelassen wird (Standard), kann jede Domain domänenübergreifende AJAX-Anfragen an REDCap stellen. Die Einschränkung der Zugriffskontrolle auf bestimmte Domains gilt allgemein als sicherer, um mögliche Cross-Site-Scripting-Angriffe durch böswillige Benutzer zu verhindern."
system_config_546 = "Leer lassen, um domänenübergreifenden Zugriff von jeder Domain zu erlauben. Geben Sie nur den Domainnamen (keine vollständige URL) mit jeder Domain in einer eigenen Zeile ein."
