control_center_4920 = "Benutzerdefinierte Abfragen importieren (CSV)"
control_center_4921 = "Sie können neue benutzerdefinierte Abfragen hinzufügen oder den Titel bzw. die SQL-Abfrage bestehender Abfragen aktualisieren, indem Sie eine CSV-Datei mit einer neuen Konfiguration für Custom Queries hochladen. Das Format der CSV-Upload-Datei erhalten Sie durch Exportieren der CSV-Datei Ihrer bestehenden Custom Queries. <b>HINWEIS:</b> Custom Queries können umbenannt werden, indem einfach der Custom-Query-Titel oder die SQL-Abfrage in der CSV-Datei geändert wird. Custom Queries können nicht über die CSV-Datei gelöscht werden. Wenn Sie eine Custom Query löschen möchten, tun Sie dies bitte über das auf dieser Seite bereitgestellte Pop-up \"Add or edit custom queries\"."
control_center_4922 = "Wählen Sie Ihre CSV-Datei mit hinzuzufügenden oder zu ändernden Custom Queries aus:"
