mycap_mobile_app_698 = "<b>Diesen Instrumenten fehlen die Felder mit erforderlichen Annotationen:</b>"
mycap_mobile_app_699 = "Diese Instrumente müssen wiederholte Instrumente sein: "
mycap_mobile_app_700 = "MyCap-Probleme beheben"
mycap_mobile_app_701 = "MyCap muss einige Änderungen an den Instrumenten vornehmen, um diese Probleme zu beheben:"
mycap_mobile_app_702 = "ERFOLG! Alle aufgeführten MyCap-Probleme wurden erfolgreich behoben. Die Seite wird nun neu geladen, um die Änderungen anzuzeigen."
mycap_mobile_app_703 = "MyCap erfordert, dass 7 Felder (mit spezifischen Annotationen) auf Instrumenten enthalten sind, die für MyCap aktiviert sind. Diese Felder erfassen Details wie geplante, gestartete und abgeschlossene Aufgaben sowie zusätzliche Daten, die hilfreich sein können, wenn beim Speichern von Daten aus der App auf dem REDCap-Server Fehler auftreten. Hinweis: Diese Felder sind für Teilnehmende ausgeblendet."
mycap_mobile_app_704 = "<b>Diesem Instrument fehlen die Felder mit diesen Annotationen:</b>"
mycap_mobile_app_705 = "Bitte beachten Sie, dass Sie MyCap für dieses Projekt aktiviert haben. Dadurch werden alle MyCap-Daten gelöscht (einschließlich MyCap-Teilnehmende, Nachrichten, Synchronisierungsprobleme). HINWEIS: Aufgabeneinstellungen, Über-Seiten, Kontakte, Links und Design werden NICHT gelöscht."
mycap_mobile_app_706 = "Bitte beachten Sie, dass MyCap-Aufgabeneinstellungen für dieses Instrument gespeichert wurden. Sobald Sie MyCap für dieses Projekt aktivieren, werden die Aufgabeneinstellungen wiederhergestellt."
mycap_mobile_app_707 = "Bitte beachten Sie, dass dadurch alle MyCap-Daten gelöscht werden (einschließlich MyCap-Teilnehmende, Nachrichten, Synchronisierungsprobleme)."
mycap_mobile_app_708 = "Ihr Projekt befindet sich derzeit im Entwurfsmodus. Sie können ein Instrument im Entwurfsmodus nicht für MyCap aktivieren, wenn dieses Instrument vor dem Wechsel in den Entwurfsmodus noch nicht im Projekt existierte. Bitte prüfen Sie die Änderungen, die Sie im Entwurfsmodus vorgenommen haben (durch Klicken auf den Link 'Detaillierte Zusammenfassung aller Entwurfsänderungen anzeigen'), und klicken Sie entweder auf die Schaltfläche 'Änderungen zur Prüfung einreichen' oder auf den Link 'Alle Entwurfsänderungen entfernen'. Nachdem Ihre Änderungen genehmigt wurden (oder Sie alle Entwurfsänderungen entfernt haben), steht Ihnen die Schaltfläche 'Aktivieren' zur Verfügung und Sie können Ihr Instrument für MyCap aktivieren."
mycap_mobile_app_710 = "Dieses Instrument wurde noch keinem Event zugewiesen. Um dies zu beheben, gehen Sie (1) zu \"Instrumente für meine Events festlegen\" und fügen Sie dieses Instrument einem oder mehreren Events hinzu, und kehren Sie dann (2) zurück, um die MyCap-Aufgabeneinstellungen im Online Designer abzuschließen."
