check_071 = "Einige wichtige Funktionen von REDCap funktionieren nicht korrekt, wenn Sie nicht mindestens die Mindestversion oder höher verwenden."
check_072 = "<b>DOM-Erweiterung in PHP ist nicht installiert - KRITISCH:</b> Es wird empfohlen, die <a target='_blank' href='http://php.net/manual/en/book.dom.php'>DOM-Erweiterung</a> in PHP auf Ihrem Webserver zu installieren. Einige wichtige Funktionen in REDCap sind ohne diese Installation nicht verfügbar."
check_073 = "<b>XMLReader-Erweiterung in PHP ist nicht installiert - KRITISCH:</b> Es wird empfohlen, die <a target='_blank' href='http://php.net/manual/en/book.xmlreader.php'>XMLReader-Erweiterung</a> in PHP auf Ihrem Webserver zu installieren. Einige wichtige Funktionen in REDCap sind ohne diese Installation nicht verfügbar."
check_074 = "GD-Bibliothek (Version 2 oder höher) ist installiert"
check_075 = "<b>GD-Bibliothek (Version 2 oder höher) ist nicht installiert - KRITISCH:</b> Es wird empfohlen, die <a target='_blank' href='http://php.net/manual/en/image.installation.php'>GD2-Bibliothek</a> in PHP auf Ihrem Webserver zu installieren. Einige Funktionen in REDCap sind ohne installiertes GD2 nicht verfügbar, etwa die Möglichkeit für Benutzer, QR-Codes für Fragebogenlinks zu erzeugen."
; check_076 is concatenated with a dynamic Imagick/Ghostscript error message.
check_076 = "<b>Imagick-Erweiterung kann PDFs nicht rendern</b>. Obwohl die Imagick-PHP-Erweiterung installiert und aktiviert ist, ist das Rendern eingebetteter PDFs nicht möglich, weil <b>Ghostscript</b> nicht verfügbar ist. Siehe <a target='_blank' href='https://www.ghostscript.com/'>https://www.ghostscript.com</a>. Der zurückgegebene Detailfehler war:"
check_077 = "<b>PHP-Imagick-Erweiterung ist installiert</b>"
check_078 = "<b>Imagick-Erweiterung in PHP ist nicht installiert - EMPFOHLEN:</b> Es wird empfohlen, die <a target='_blank' href='https://www.php.net/manual/en/book.imagick.php'>Imagick-Erweiterung</a> in PHP auf Ihrem Webserver zu installieren. Einige Funktionen in REDCap sind ohne diese Installation nicht verfügbar. Beispielsweise können eingebettete PDF-Anhänge in beschreibenden Textfeldern *nicht* innerhalb eines PDF-Exports eines Formulars oder Fragebogens angezeigt werden, wenn die Imagick-Erweiterung in PHP nicht installiert ist."
; check_079 is concatenated with a dynamic Imagick security policy snippet.
check_079 = "<b>Die Sicherheitsrichtlinie von Imagick ist zu restriktiv:</b> Obwohl die Imagick-Erweiterung in PHP aktiviert ist, ist ihre Sicherheitsrichtlinie zu restriktiv. Um PDF-Dateien als Bilder zu rendern, muss das Lesen von PDF-Dateien erlaubt sein. Fügen Sie die entsprechende Sicherheitsrichtlinie hinzu oder ändern Sie sie:"
check_080 = "Weitere Informationen finden Sie auf <a target='_blank' href='https://stackoverflow.com/questions/52998331/imagemagick-security-policy-pdf-blocking-conversion'>dieser StackOverflow-Seite</a>. Ein Neustart des Webservers ist erforderlich, um die Änderungen anzuwenden."
; check_081 is concatenated with a dynamic Imagick error message.
check_081 = "<b>Imagick-Erweiterung funktioniert nicht:</b> Die Imagick-PHP-Erweiterung ist zwar aktiviert, gibt aber einen Fehler aus, den REDCap nicht verarbeiten kann. Bis dies behoben ist, funktioniert das Rendern eingebetteter PDFs in beschreibenden Feldern nicht. Die zurückgegebene Fehlermeldung war:"
check_082 = "<b>PHP-Fileinfo-Erweiterung ist installiert</b>"
check_083 = "<b>Auf Ihrem Webserver ist die PHP-Fileinfo-Erweiterung NICHT installiert.</b>Die Fileinfo-Erweiterung für PHP ist für den normalen Betrieb von REDCap NICHT erforderlich, wird aber dringend empfohlen. Fileinfo wird für einige optionale Funktionen in REDCap verwendet, etwa für Dateiimportvorgänge beim Import ganzer REDCap-Projekte als XML-Dateien (d. h. CDISC-ODM-Dateiimporte). Es wird empfohlen, die Fileinfo-Erweiterung herunterzuladen und anschließend mit PHP auf Ihrem Webserver zu installieren und zu konfigurieren. Sie finden <a href='http://php.net/manual/en/book.fileinfo.php' target='_blank' style='text-decoration:underline;'>Anweisungen zur Fileinfo-Installation hier</a>."
check_084 = "<b>OpenSSL-Erweiterung nicht installiert - KRITISCH:</b> Es wird empfohlen, die <a target='_blank' href='http://php.net/manual/en/book.openssl.php'>PHP-OpenSSL-Erweiterung</a> auf Ihrem Webserver zu installieren, da bestimmte Anwendungsfunktionen davon abhängen. Starten Sie nach der Installation der Erweiterung Ihren Webserver neu und laden Sie diese Seite erneut."
check_085 = "<b>ZipArchive ist nicht installiert - KRITISCH:</b> Es wird empfohlen, die <a target='_blank' href='http://php.net/manual/en/book.zip.php'>PHP-Zip-Erweiterung</a> zu installieren. Einige Funktionen in REDCap sind ohne diese installierte Erweiterung nicht verfügbar, etwa die Funktion im Datenexport-Tool, mit der Benutzer eine ZIP-Datei aller hochgeladenen Dateien für Datensätze in einem Projekt herunterladen können."
check_086 = "<b>PHP-Erweiterung \"mbstring\" nicht installiert - KRITISCH:</b> Diese Erweiterung ist erforderlich, weil sie von vielen verschiedenen Prozessen und Funktionen in REDCap verwendet wird. Um sie zu aktivieren, müssen Sie die <a href='http://php.net/manual/en/mbstring.setup.php' target='_blank'>PHP-Erweiterung \"mbstring\"</a> auf Ihrem Webserver installieren. Starten Sie nach der Installation Ihren Webserver neu."
; check_087 is concatenated with strings check_088, check_089 and dynamic user/path/version values.
check_087 = "Diese E-Mail wurde gesendet, als der Benutzer"
; check_088 is concatenated with strings check_087, check_089 and dynamic user/path/version values.
check_088 = "die Seite Konfigurationsprüfung geöffnet hat für"
; check_089 is concatenated with strings check_087, check_088 and a dynamic REDCap version.
check_089 = "REDCap-Version"
check_090 = "REDCap-E-Mail-Test"
check_091 = "REDCap-Konfigurationsprüfung:"
check_092 = "REDCap kann E-Mails senden"
check_093 = "REDCap kann keine E-Mails senden - KRITISCH:</b>Es sieht so aus, als sei Ihre SMTP-Konfiguration (E-Mail-Sendefunktion) auf dem Webserver entweder nicht eingerichtet oder nicht korrekt konfiguriert. Es wird DRINGEND empfohlen, Ihren E-Mail-/SMTP-Server in der PHP.INI-Konfigurationsdatei Ihres Webservers korrekt zu konfigurieren, andernfalls können keine E-Mails aus REDCap versendet werden. REDCap benötigt E-Mail-Sendefunktionen für viele wichtige Anwendungsfunktionen. Weitere Details zur Konfiguration von E-Mail-Sendefunktionen auf Ihrem Webserver finden Sie auf <a href='http://php.net/manual/en/mail.configuration.php' target='_blank'>PHPs Mail-Konfigurationsseite.</a>"
check_094 = "<b>Fehlende Administrator-E-Mail-Adresse:</b> Es sieht so aus, als sei die systemweite E-Mail-Adresse des REDCap-Administrators nicht auf der Seite Allgemeine Konfiguration im Control Center gesetzt. Einige Funktionen funktionieren möglicherweise nicht korrekt, wenn keine gültige E-Mail-Adresse hinzugefügt wird."
check_095 = "<b>Fehler in einer REDCap-Konfigurationsdatei:</b> Es sieht so aus, als gebe es in einer oder mehreren REDCap-Konfigurationsdateien (z. B. database.php, webtools2/ldap/ldap_config.php, webtools2/webdav/webdav_connection.php) zusätzlichen \"Whitespace\", etwa nachgestellte Leerzeichen oder Leerzeilen, die entweder vor dem öffnenden PHP-Tag '&lt;?php' oder nach dem schließenden PHP-Tag '?&gt;' auftreten. Bitte stellen Sie sicher, dass alle vorangestellten Leerzeichen, nachgestellten Leerzeichen und Leerzeilen vor oder nach den PHP-Tags in diesen Dateien entfernt werden. Bestimmte Dinge in REDCap funktionieren nicht korrekt, bis dies behoben ist."
check_096 = "<b>InnoDB-Engine ist in MySQL NICHT aktiviert - KRITISCH:</b> Es sieht so aus, als sei die InnoDB-Tabellen-Engine auf Ihrem MySQL-Datenbankserver nicht aktiviert; sie ist erforderlich, damit REDCap korrekt läuft. Um sie zu aktivieren, öffnen Sie Ihre my.cnf- (oder my.ini-)Konfigurationsdatei für MySQL und entfernen Sie alle Vorkommen von \"--innodb=OFF\" und \"--skip-innodb\". Starten Sie dann MySQL neu und laden Sie diese Seite erneut. Wenn dies nicht funktioniert, lesen Sie in der offiziellen MySQL-Dokumentation nach, wie InnoDB für Ihre spezifische MySQL-Version aktiviert wird."
check_097 = "<b>Die MySQL-Einstellung \"max_allowed_packet\" sollte erhöht werden - EMPFOHLEN:</b> Es sieht so aus, als sei die Einstellung \"max_allowed_packet\" Ihres MySQL-Datenbankservers niedriger als für optimale REDCap-Nutzung empfohlen. Es wird empfohlen, diese Einstellung auf <code>128M</code> (d. h. 128 MB) oder höher zu erhöhen, <b>vorzugsweise auf den Maximalwert von <code>1G</code> (d. h. 1 GB)</b>. Die Einstellung auf den Maximalwert 1G hat keine negativen Nebenwirkungen. Um diese Einstellung zu ändern, öffnen Sie Ihre my.cnf- (oder my.ini-)Konfigurationsdatei für MySQL und ändern Sie die Zeile für max_allowed_packet wie folgt: <code>max_allowed_packet=1G</code>. Starten Sie dann MySQL neu und laden Sie diese Seite erneut."
; check_098 is concatenated with strings check_099, check_100 and dynamic max_input_vars values.
check_098 = "<b>'max_input_vars' könnte größer sein - EMPFOHLEN:</b> Es wird dringend empfohlen, den Wert für 'max_input_vars' in Ihrer PHP.INI-Konfigurationsdatei zu ändern auf einen Wert von"
; check_099 is concatenated with strings check_098, check_100 and dynamic max_input_vars values.
check_099 = "oder höher. Wenn er nicht erhöht wird, kann REDCap möglicherweise Daten nicht erfolgreich speichern, wenn sie in einem sehr langen Fragebogen oder Eingabeformular eingegeben werden. Sie können diese Einstellung in der PHP.INI-Konfigurationsdatei Ihres Servers ändern. Wenn 'max_input_vars' in Ihrer PHP.INI-Datei nicht gefunden wird, sollten Sie es hinzufügen als <i style='color:#800000;'>max_input_vars ="
; check_100 is concatenated with strings check_098, check_099 and dynamic max_input_vars values.
check_100 = "</i>. Starten Sie danach Ihren Webserver neu, damit die Änderungen wirksam werden."
check_101 = "<b>'upload_max_filesize' und 'post_max_size' sind zu klein:</b> Es wird DRINGEND empfohlen, Ihre Werte für sowohl 'upload_max_filesize' als auch 'post_max_size' in PHP auf einen höheren Wert zu ändern, vorzugsweise größer als 10MB (z. B. 32M). Sie können dies in der PHP.INI-Konfigurationsdatei Ihres Servers ändern und anschließend Ihren Webserver neu starten. Bei derart kleinen Werten werden Ihre Benutzer wahrscheinlich Probleme beim Hochladen von Dateien haben, wenn Sie diese Werte nicht erhöhen."
check_102 = "<b>'upload_max_filesize' und 'post_max_size' könnten größer sein - EMPFOHLEN:</b> Es wird empfohlen, Ihre Werte für sowohl 'upload_max_filesize' als auch 'post_max_size' in PHP auf einen höheren Wert zu ändern, vorzugsweise größer als 10MB (z. B. 32M). Sie können dies in der PHP.INI-Konfigurationsdatei Ihres Servers ändern und anschließend Ihren Webserver neu starten. Bei derart kleinen Werten könnten Ihre Benutzer möglicherweise Probleme beim Hochladen von Dateien haben, wenn Sie diese Werte nicht erhöhen."
; check_104 is concatenated with string check_105 and a dynamic hook functions filename.
check_104 = "<b>EMPFEHLUNG: Einige Hook-Funktionen fehlen in Ihrer Hook-Functions-Datei</b><br>Es sieht so aus, als enthalte Ihre Hook-Functions-Datei"
; check_105 is concatenated with strings check_104, check_106, check_107 and dynamic hook data.
check_105 = "eine oder mehrere REDCap-Hook-Funktionen nicht, die in Ihrer aktuellen REDCap-Version genutzt werden können.<b>HINWEIS:</b> Diese Hook-Funktionen sind nur erforderlich, wenn Sie in dieser REDCap-Installation benutzerdefinierte REDCap Hooks verwenden (dies umfasst NICHT Hooks, die in External Modules verwendet werden; diese sind nicht betroffen). Es wird empfohlen, diese Hook-Funktionen zu dieser Datei auf Ihrem Webserver hinzuzufügen. Die folgenden Hooks fehlen in der Hook-Functions-Datei:"
; check_106 is concatenated with strings check_105, check_107 and a dynamic hook functions path.
check_106 = "Um den Standardcode für diese Hook-Funktionen zu erhalten, wird empfohlen, die neueste Installations-ZIP-Datei von REDCap (Standard Release) von der REDCap-Community-Website herunterzuladen und in der ZIP-Datei die Datei \"redcap/hook_functions.php\" in einem Texteditor zu öffnen. Suchen Sie die Funktionen in dieser PHP-Datei und kopieren Sie die gesamte(n) Funktion(en) in Ihre Hook-Functions-Datei (befindet sich unter"
; check_107 is concatenated with strings check_105, check_106 and a dynamic hook functions path.
check_107 = "auf Ihrem Webserver). Speichern Sie dann die Datei. Nachdem sie hinzugefügt wurden, sollte diese Warnmeldung nicht mehr angezeigt werden."
; check_108 is concatenated with strings check_109, check_110, check_111 and dynamic size values.
check_108 = "<b>'innodb_buffer_pool_size' könnte größer sein - EMPFOHLEN:</b> Es wird empfohlen, Ihren Wert für 'innodb_buffer_pool_size' in MySQL auf einen höheren Wert zu ändern. Allgemein wird empfohlen, ihn auf 10 % mehr als die Größe Ihrer Datenbank zu setzen, die derzeit"
; check_109 is concatenated with strings check_108, check_110, check_111 and dynamic size values.
check_109 = "MB groß ist. Idealerweise sollte <b>'innodb_buffer_pool_size' also mindestens gesetzt werden auf"
; check_110 is concatenated with strings check_108, check_109, check_111 and dynamic size values.
check_110 = "MB</b>, falls möglich (derzeit ist es"
; check_111 is concatenated with strings check_108, check_109, check_110 and dynamic size values.
check_111 = "MB). Außerdem wird empfohlen, dass die Größe von 'innodb_buffer_pool_size' <b>80 % Ihres gesamten RAM (Speichers), der MySQL auf Ihrem Datenbankserver zugewiesen ist, nicht überschreitet</b>. Sie können dies in Ihrer MY.CNF-Konfigurationsdatei (oder MY.INI unter Windows) ändern und anschließend MySQL neu starten. Wenn Sie diesen Wert nicht erhöhen, können Leistungsprobleme in MySQL auftreten."
check_112 = "<b>Datenbank-Konfigurationsproblem:</b> Es gibt ein Konfigurationsproblem mit der MySQL-Einstellung \"optimizer_switch\", das behoben werden muss. Wenn es nicht behoben wird, funktionieren manche Dinge in REDCap möglicherweise nicht korrekt oder der Datenbankserver könnte unerwartet abstürzen. Um dies zu beheben, fügen Sie die Zeile<br><code><b>optimizer_switch=rowid_filter=OFF</b></code><br> im Abschnitt [mysqld] Ihrer MY.CNF- (oder MY.INI-)Konfigurationsdatei für MySQL/MariaDB hinzu. Wenn es bereits eine Zeile in der Datei gibt, die mit \"optimizer_switch\" beginnt, fügen Sie diese neue Zeile direkt darunter hinzu. Nachdem die neue Zeile hinzugefügt wurde, speichern Sie die Konfigurationsdatei und starten Sie den MySQL/MariaDB-Dienst neu. Laden Sie diese Seite anschließend erneut, um sicherzustellen, dass die Korrektur erfolgreich wirksam wurde."
check_113 = "<b>Datenbank-Konfigurationsänderung - EMPFOHLEN:</b> Es wird empfohlen, die MySQL-Einstellung \"innodb_file_format\" zu ändern. Um künftige Probleme mit REDCap-Upgrades zu vermeiden, wird empfohlen, dass der Datenbankserver innodb_file_format=Barracuda verwendet. Um dies zu beheben, fügen Sie die Zeile<br><code><b>innodb_file_format=Barracuda</b></code><br> im Abschnitt [mysqld] Ihrer MY.CNF- (oder MY.INI-)Konfigurationsdatei für MySQL/MariaDB hinzu. Wenn es bereits eine Zeile in der Datei gibt, die mit \"innodb_file_format\" beginnt, ändern Sie diese Einstellung so, dass ihr Wert jetzt <b>Barracuda</b> ist. Stellen Sie zusätzlich sicher, dass die MySQL-Einstellung \"innodb_file_per_table\" auf ON gesetzt ist. Falls nicht, fügen Sie die Zeile wie folgt hinzu/aktualisieren Sie sie:<br><code><b>innodb_file_per_table=ON</b></code><br> Speichern Sie dann die Konfigurationsdatei und starten Sie den MySQL/MariaDB-Dienst neu. Laden Sie diese Seite erneut, um sicherzustellen, dass die Korrektur erfolgreich wirksam wurde."
; check_114 is concatenated with string check_115 and a dynamic table count.
check_114 = "<b>Einige Datenbanktabellen müssen geändert werden - EMPFOHLEN:</b> Es wird empfohlen, dass"
; check_115 is concatenated with string check_114 and a dynamic table count/list.
check_115 = "REDCap-Datenbanktabellen geändert werden, damit sie neueren Standards für InnoDB-Datenbanktabellen entsprechen. Um künftige Probleme mit REDCap-Upgrades zu vermeiden, wird empfohlen, dass alle REDCap-Datenbanktabellen ROW_FORMAT=DYNAMIC verwenden. Einige Ihrer Tabellen haben kein dynamisches Zeilenformat und sollten daher mit den unten bereitgestellten Abfragen korrigiert werden. HINWEIS: Wenn Sie eine recht große oder alte REDCap-Installation haben, <b>kann jede Abfrage Minuten oder Stunden laufen</b>. Sie können diese einzeln ausführen, wenn Sie möchten, und/oder langsam in Batches über einen Zeitraum von Wochen, bis alle korrigiert wurden. Jedes Mal, wenn Sie diese Seite aktualisieren, wird unten eine neue dynamische Liste der Tabellen aufgebaut, die noch nicht korrigiert wurden. <u>Dies ist keine Anforderung, wird aber dringend empfohlen.</u><b>WICHTIGER HINWEIS: Stellen Sie sicher, dass Sie eine vollständige Datenbanksicherung durchführen</b>, bevor Sie eine der untenstehenden Abfragen ausführen. Führen Sie die folgenden SQL-Abfragen aus, um die Datenbanktabellen zu korrigieren:"
check_116 = "Konfigurationseinstellungen erscheinen ausreichend für optimale Leistung und Stabilität"
; check_117 is concatenated with string check_118 and a dynamic day count.
check_117 = "<b>Mögliches Problem mit Windows Scheduled Task für den REDCap-Cron-Job - EMPFEHLUNG:</b></span> Es sieht so aus, als sei <u>REDCaps Cron-Job in den letzten"
; check_118 is concatenated with string check_117 and a dynamic day count.
check_118 = "Tagen laut Cron-Job-Log nicht jede Minute gelaufen</u>. Dies könnte bedeuten, dass die geplante Aufgabe auf Ihrem Windows-Server nicht korrekt konfiguriert ist. Prüfen Sie die Windows-Aufgabenplanung auf Ihrem REDCap-Webserver und stellen Sie sicher, dass die geplante Aufgabe für den REDCap-Cron-Job im Reiter Einstellungen dieser Aufgabe auf \"<u>Neue Instanz parallel ausführen</u>\" gesetzt ist. Falls nicht, ändern Sie sie auf diese Einstellung.<br><br> Wenn Sie sicher sind, dass dies nicht der Fall ist, können Sie diese Empfehlung ignorieren; es könnten jedoch andere Probleme bestehen, falls der REDCap-Cron-Job aus irgendeinem Grund nicht wie erwartet jede Minute läuft."
