control_center_4972 = "Die Verwendung von Easy Upgrade auf einem <u>Produktions</u>server wird aus Sicherheitsgründen nicht mehr empfohlen. Easy Upgrade erfordert, dass die REDCap-Anwendung Dateien in das Hauptverzeichnis \"redcap\" auf dem Webserver schreiben kann. Dies ist für Produktionsumgebungen keine empfohlene Sicherheitspraxis, da es Ihren Server anfällig für bestimmte Angriffe machen kann. Wenn dies eine REDCap-Produktionsinstanz ist, wird empfohlen, Ihr IT-Team zu bitten, die Dateiberechtigungen Ihres Hauptverzeichnisses \"redcap\" so zu ändern, dass die REDCap-Anwendung selbst keine neuen Dateien/Verzeichnisse erstellen kann (mit Ausnahme des REDCap-Ordners \"temp\")."
control_center_4973 = "Für die unten aufgeführten Versionen sind Upgrades verfügbar. Angezeigt werden jeweils die REDCap-Versionsnummer, eine kurze Beschreibung und das Veröffentlichungsdatum."
control_center_4974 = "Durch Klicken auf einen Button unten wird der Easy-Upgrade-Prozess gestartet. Dabei wird die Upgrade-ZIP-Datei von der REDCap-Community-Website heruntergeladen und anschließend das Upgrade-SQL-Skript automatisch ausgeführt, um das Upgrade vollständig abzuschließen."
