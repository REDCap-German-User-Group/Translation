control_center_4899="<b>Hinweis:</b> Der Webserver und der Cronjob verwenden unterschiedliche PHP.INI-Konfigurationsdateien. Der Cronjob verwendet die Datei unter: <code>{0}</code>. Dies kann zu unerwünschten Nebeneffekten führen, wenn sich die Konfigurationen unterscheiden (z. B. unterschiedliche Zeitzoneneinstellungen). Häufig wird empfohlen, dass der Cronjob dieselbe Konfigurationsdatei wie der Webserver verwendet."
