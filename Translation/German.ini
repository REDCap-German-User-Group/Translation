system_config_665 = "SendGrid API Key"
system_config_666 = "Beim Senden ausgehender E-Mails kann REDCap die SendGrid-API als Alternative zu den Standardmethoden des REDCap-Webservers verwenden, die E-Mails über PHPMailer senden. Sie müssen zuerst ein Konto auf der SendGrid-Website einrichten"
system_config_667 = ", wodurch Sie Zugriff auf einen Email API Key erhalten, der mit Ihrem SendGrid-Konto verbunden ist. HINWEIS: Sie müssen dort ein Konto erstellen und das API-Token erzeugen, um es hier in REDCap zu verwenden. Befolgen Sie alle Anweisungen auf der SendGrid-Website zum Erhalten und Verwenden des API-Tokens."
