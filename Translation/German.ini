data_access_groups_ajax_54 = "<b>Hinweis: </b>Sie können einen Benutzer nur einer Zugriffsgruppe zuweisen. Wenn Sie Benutzer mehreren Zugriffsgruppen zuweisen möchten, kann dies mit der DAG-Switcher-Funktion unten auf dieser Seite erfolgen."
data_access_groups_ajax_55 = "Die Gruppe konnte nicht gelöscht werden, weil ein oder mehrere Ordner im Datei-Repository auf diese Zugriffsgruppe beschränkt sind. Bitte löschen Sie zuerst alle DAG-beschränkten Ordner, die mit dieser DAG verknüpft sind. Anschließend können Sie die Gruppe löschen."

