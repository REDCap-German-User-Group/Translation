openai_124 = "<b>Azure OpenAI (cloud-hosted) BEVORZUGT:</b> Die KI-Dienste von REDCap können die Microsoft-Azure-OpenAI-Bereitstellung von ChatGPT verwenden. Sie finden {0}hier Anweisungen{1} dazu, wie Sie eine isolierte Instanz von ChatGPT in Microsoft Azure einrichten und bereitstellen."
openai_125 = "Ihre API-Endpunkt-URL folgt dem Format <br><b>https://{your-resource-name}.openai.azure.com/openai/deployments/[AI_DEPLOYMENT_NAME]</b><br><br>[AI_DEPLOYMENT_NAME]: Der Bereitstellungsname der bereitgestellten KI-Ressource. Dies ist nicht der KI-Modellname (z. B. gpt-4o), sondern der benutzerdefinierte Name, der von der Person definiert wurde, die die KI-Ressource erstellt hat. Er enthält typischerweise nur Buchstaben, Zahlen, Bindestriche und Unterstriche.<br><br>Modellversion: Die Modellversion, die bei der Erstellung der KI-Ressource ausgewählt wurde (häufig ein Datum im YMD-Format). HINWEIS: Der hier benötigte Wert kann von der angezeigten Modellversion abweichen. Verwenden Sie daher unbedingt die api-version, die in der bereitgestellten Endpoint Target URI zu sehen ist, z. B. '2024-08-01-preview'."
openai_126 = "<b>Zusätzliche cloud-gehostete OpenAI-kompatible Dienste: </b>Es gibt viele verschiedene cloud-gehostete KI-Dienste, die OpenAI-kompatibel sind, darunter {0}Mistral AI{1}, {2}Nebius AI Studio{3}, {4}GroqCloud{5} und {6}Together AI{7} sowie weitere. Diese Dienste erlauben Entwicklern, ihre Modelle über eine standardisierte OpenAI-API-Struktur zu nutzen. Jeder Dienst hat seine eigene Endpunkt-URL. Zusätzlich müssen Sie einen API-Schlüssel und eine Modellversion/einen Modellnamen beschaffen, die unten angegeben werden müssen. HAFTUNGSAUSSCHLUSS: REDCap/Vanderbilt steht mit keinem dieser KI-Dienste in Verbindung und kann nicht für die Sicherheitsstandards und -praktiken dieser Dienste bürgen. Es wird dringend empfohlen, dass Sie deren Dokumentation und Sicherheitsinformationen prüfen, bevor Sie ihre Nutzung in Betracht ziehen."
openai_127 = "<b>Lokal gehostete OpenAI-kompatible Dienste:</b> Sie können Ihren eigenen OpenAI-Server lokal in Ihrer Einrichtung einrichten und hosten. Dies erfordert die Installation von Software, die eine OpenAI-API auf einem lokalen Server bereitstellt. Zu den wichtigsten Optionen gehören {0}LM Studio{1}, {2}LocalAI{3}, {4}GPT4All{5} und {6}Ollama{7}. Alle diese Optionen erlauben Ihnen, Open-Source-Sprachmodelle lokal auszuführen, die den OpenAI-Standard nutzen. Ihre lokale OpenAI-Installation hat eine eigene Endpunkt-URL, und zusätzlich müssen Sie einen API-Schlüssel (möglicherweise nicht zutreffend) und eine Modellversion/einen Modellnamen beschaffen, die unten angegeben werden müssen. Bitte konsultieren Sie die Dokumentation zur Einrichtung einer dieser Optionen."
openai_128 = "Unten sind 3 mögliche OpenAI-Optionen:"
openai_129 = "Hinweis: Bei lokalen OpenAI-Bereitstellungen können Sie dies leer lassen."
openai_130 = "Beispielmodelle für Azure-gehostetes OpenAI: <code>2024-02-01</code>, <code>2024-08-01-preview</code>. Für andere OpenAI-kompatible KI-Dienste verwenden Sie je nach Dienst unbedingt den Modellnamen oder Modellidentifier - z. B. <code>hermes-3-llama-3.2-3b</code>, <code>mistral-tiny</code>. Wenn Sie einen lokal gehosteten KI-Dienst verwenden, stellen Sie sicher, dass ein gültiges Modell hinzugefügt wurde, das von diesem spezifischen KI-Dienst unterstützt wird."
openai_131 = "Google Gemini (cloud-hosted): Die KI-Dienste von REDCap können den Google-Gemini-KI-Dienst verwenden. Sie finden {0}hier Anweisungen{1} dazu, wie Sie einen neuen API-Schlüssel erstellen und Gemini auf der Google Cloud Platform bereitstellen."
openai_132 = "Liste der Gemini-KI-Modelle anzeigen"
openai_133 = "Einzelne KI-Funktionen für <u>alle Projekte</u> aktivieren"
openai_134 = "Funktion #1: Funktion \"Schreibtools\" im Rich-Text-Editor zur Textverbesserung"
openai_135 = "Funktion #2: Freitextdaten in Reports zusammenfassen"
openai_136 = "Funktion #3: Text auf der MLM-Setup-Seite automatisch übersetzen"
openai_137 = "Geben Sie unten die KI-Dienstwerte ein, um sie für alle Projekte im System zu verwenden. Sie können durch projektweite Werte auf der Seite Projekteinstellungen bearbeiten eines bestimmten Projekts überschrieben werden, wenn Sie möchten. Wenn Sie die KI-Funktionen nicht global, sondern nur in bestimmten Projekten aktivieren möchten, können Sie die Felder unten leer lassen und dann die Werte für die KI-Konfigurationsfelder auf der Seite Projekteinstellungen bearbeiten eines bestimmten Projekts eingeben. <u>Standardmäßig werden die oben aktivierten KI-Funktionen in allen Projekten aktiviert.</u>"
openai_138 = "{0} Textstück(e) auf dieser Seite werden übersetzt."

cdis_token_priority_rules_short_description_title = "CDIS-Access-Token-Prioritätsregeln"
cdis_token_priority_rules_short_description_text = "<strong>Access-Token-Prioritätsregeln</strong> helfen zu bestimmen, welches <code>Access Token</code> eines Benutzers verwendet werden soll, wenn REDCap mit einem FHIR-System integriert ist, um Daten abzurufen. Obwohl <strong>diese Funktion optional ist</strong>, kann sie in Sonderfällen besonders nützlich sein, z. B. wenn ein Project auf die in Epic-FHIR-Systemen verfügbare Funktion <code>Break The Glass</code> angewiesen ist oder automatisierte Prozesse (CRON-Jobs) umfasst, bei denen spezielle Regeln erzwungen werden müssen. Wenn keine Regeln festgelegt sind, folgt REDCap einer Standard-Auswahlstrategie."
cdis_token_priority_rules_short_description_link = "Access-Token-Prioritätsregeln verwalten"
cdis_token_priority_rules_label = "Token-Prioritätsregeln"
cdis_token_priority_intro = "Wenn REDCap mit einem FHIR-System integriert ist, um Daten abzurufen, verwendet es <code>Access Tokens</code>, die wie digitale Schlüssel sind und die Berechtigung zum Zugriff auf die erforderlichen Informationen gewähren. In einigen Fällen, insbesondere in Projects mit mehreren Benutzern und automatisierten Prozessen, ist es wichtig zu entscheiden, welche Benutzer diese Tokens bereitstellen dürfen oder nicht. Hier kommen <strong>Prioritätsregeln</strong> ins Spiel. <strong>Prioritätsregeln</strong> ermöglichen es Ihnen, ein klares und flexibles System dafür zu definieren, wessen Tokens in welcher Reihenfolge verwendet werden sollen. Das Einrichten dieser Regeln ist optional, kann aber dazu beitragen, dass das System reibungslos und sicher arbeitet. Wenn keine Regeln konfiguriert sind, folgt REDCap einem Standardverhalten. Diese Funktion ist besonders hilfreich, um den Zugriff in komplexen Projects anzupassen und gleichzeitig einfache Anwendungsfälle unkompliziert zu halten."
cdis_token_priority_context_title = "Wie REDCap die Verwendung von Access Tokens in verschiedenen Kontexten bestimmt"
cdis_token_priority_context_description = "REDCap benötigt ein gültiges <code>Access Token</code>, um Daten aus einem FHIR-System abzurufen. Wenn REDCap in einem Benutzerkontext arbeitet (d. h. es gibt eine spezifische Benutzer-ID), wird nur das <code>Access Token</code> des aktuellen Benutzers berücksichtigt. Die Allow-/Disallow-Regeln werden jedoch weiterhin angewendet, um zu bestimmen, ob der aktuelle Benutzer ein Token bereitstellen darf. Wenn kein Benutzerkontext vorhanden ist (z. B. während eines Cron-Jobs), versucht REDCap, das beste Token zu bestimmen, indem definierte Prioritätsregeln angewendet werden oder eine Fallback-Strategie verwendet wird, falls keine Regeln existieren."
cdis_token_priority_how_rules_applied_title = "Wie benutzerbasierte Prioritätsregeln angewendet werden"
cdis_token_priority_how_rules_applied_description = "Wenn Regeln definiert sind, verarbeitet REDCap sie in aufsteigender Prioritätsreihenfolge (Priorität 1 zuerst, dann 2 usw.), um zu entscheiden, welcher Benutzer ein Token bereitstellen soll - und wählt damit das diesem Benutzer zugeordnete Token."
cdis_token_priority_how_rules_applied_bullet_1 = "Wenn die Regel eines Benutzers \"Allow\" lautet, versucht REDCap, das Token dieses Benutzers zu verwenden."
cdis_token_priority_how_rules_applied_bullet_2 = "Wenn für diesen Benutzer kein gültiges Token gefunden wird, geht REDCap zur nächsten Regel über."
cdis_token_priority_how_rules_applied_bullet_3 = "Wenn eine Regel \"Disallow\" lautet, wird das Token dieses Benutzers niemals berücksichtigt."
cdis_token_priority_how_rules_applied_bullet_4 = "Jeder Benutzer, der in keiner Regel erwähnt ist, wird durch die globale Regel (siehe unten) oder durch den Standard-Fallback gesteuert, wenn keine globale Regel festgelegt ist."
cdis_token_priority_default_behavior_title = "Standardverhalten (keine Regeln definiert)"
cdis_token_priority_default_behavior_description = "Wenn keine Regeln definiert sind, wählt REDCap ein Token mit folgender Logik aus:"
cdis_token_priority_default_behavior_bullet_1 = "Es werden nur Tokens berücksichtigt, die Benutzern gehören, die dem aktuellen Project zugewiesen sind."
cdis_token_priority_default_behavior_bullet_2 = "Patientenspezifische Tokens (über EHR Launch für einen bestimmten Patienten erhalten) werden gegenüber nicht patientenspezifischen Tokens priorisiert."
cdis_token_priority_default_behavior_bullet_3 = "Wenn mehrere Tokens übrig bleiben, wird das zuletzt ausgestellte Token ausgewählt."
cdis_token_priority_rules_list_title = "Regelliste"
cdis_token_priority_rules_list_description = "Verwenden Sie die folgende Tabelle, um zu definieren, welche Benutzer auf jeder Prioritätsstufe erlaubt oder nicht erlaubt sind. Benutzer mit niedriger nummerierten Prioritäten haben höheren Vorrang. Wenn also ein Benutzer bei Priorität 1 als 'Erlaubt' markiert ist, hat sein gültiges Access Token Vorrang vor Benutzern mit höher nummerierten Prioritäten. Wenn ein Benutzer hier nicht aufgeführt ist, gilt die globale Regel oder das Standardverhalten."
token_priority_order_description = "Um die Reihenfolge der Regeln anzupassen, ziehen Sie sie per Drag-and-drop an die gewünschte Position. Alternativ können Sie die Pfeile nach oben oder unten neben jeder Regel verwenden, um sie an eine neue Position zu verschieben."
cdis_token_priority_global_rule_title = "Globale Regel"
cdis_token_priority_global_rule_description = "Diese abschließende Regel gilt für jeden Benutzer, der in den individuellen Regeln nicht erwähnt wird. Wenn sie auf 'Allow All' gesetzt ist, dürfen Benutzer ohne explizite Regel ein <code>Access Token</code> bereitstellen. Wenn sie auf 'Disallow All' gesetzt ist, können nur Benutzer mit einer expliziten 'Allow'-Regel ein Token bereitstellen."
cdis_token_priority_global_rule_allow_all_title = "Alle erlauben"
cdis_token_priority_global_rule_allow_all_description = "Benutzer, die nicht von einer spezifischen Regel abgedeckt sind, dürfen automatisch ein Token bereitstellen."
cdis_token_priority_global_rule_disallow_all_title = "Alle nicht erlauben"
cdis_token_priority_global_rule_disallow_all_description = "Nur Benutzer mit einer expliziten 'Allow'-Regel dürfen ein Token bereitstellen."
cdis_token_priority_info_alert_title = "Bitte beachten"
cdis_token_priority_info_alert_text = "Das Einrichten von Prioritätsregeln ist <strong>optional</strong> und nur für Projects mit spezifischen Zugriffsanforderungen erforderlich. Wenn keine Regeln konfiguriert sind, folgt REDCap einer Standardstrategie zur Auswahl des geeigneten Tokens."
cdis_token_priority_table_header_priority = "Priorität"
cdis_token_priority_table_header_user = "Benutzer"
cdis_token_priority_table_header_allow_disallow = "Erlauben/Nicht erlauben"
cdis_token_priority_table_header_actions = "Aktionen"
cdis_token_priority_button_add_rule = "Regel hinzufügen"
cdis_token_priority_button_save = "Speichern"

