design_1088 = "HINWEIS: Sie können Piping in der URL des Medien-Textfeldes verwenden."
design_1089 = "<b>Externes Video einbetten:</b> Sie können ein eingebettetes Video auf einem Eingabeformular oder einer Fragebogenseite anzeigen, indem Sie einfach die URL (Webadresse) des Videos im Textfeld 'Medien einbetten' angeben. Sie können das Video inline auf der Seite anzeigen lassen oder es zunächst ausblenden und erst nach Klick auf einen Button anzeigen. Jedes Video kann bei Bedarf im Vollbildmodus angezeigt werden. Anders als bei der Anhangsoption für beschreibende Felder, die das Hochladen einer Datei in REDCap impliziert, wird ein eingebettetes Video nicht von REDCap gehostet, sondern auf einem anderen Server irgendwo im Web gehostet und an den Webbrowser des Benutzers gestreamt. YouTube- und Vimeo-Videos sind die kompatibelsten Video-Streaming-Dienste, und die URL für solche Videos erhalten Sie auf diesen Websites."
design_1090 = "<b>Website einbetten:</b> Sie können eine andere Website auf einem Eingabeformular oder einer Fragebogenseite anzeigen, indem Sie die URL im Textfeld 'Medien einbetten' angeben. Diese Option eignet sich am besten mit dem Anzeigeformat 'inline', damit die Website eingebettet im Fragebogen oder Formular erscheint. Die URL kann ein anderes Eingabeformular oder eine Fragebogenseite im selben Projekt sein, ein Eingabeformular oder Fragebogen in einem anderen Projekt oder eine REDCap-interne/-externe URL. Wenn das eingebettete Medium in einem anderen Projekt oder vollständig außerhalb von REDCap liegt, können Sie die URL direkt in das Textfeld 'Medien einbetten' eingeben, damit sie auf dem Eingabeformular oder Fragebogen erscheint. Wenn das eingebettete Medium im selben Projekt liegt, funktionieren Smart Variables wie [survey-url:instrument] oder [form-url:instrument] und verbinden die Eingabeformulare oder Fragebögen mit dem aktuellen Datensatz."
