global_173 = "Neue Logik hier eingeben"
global_174 = "HINWEIS: Bitte beachten Sie, dass es nicht möglich ist, das Optionslabel eines Mehrfachauswahlfeldes in eine der unten aufgeführten Spezialfunktionen zu pipen. Mit anderen Worten: Sie können die Option ':label', z. B. [my_field:label], nicht verwenden, um das Textlabel in eine Funktion auszugeben. <b>Die Spezialfunktionen nutzen nur den Wert eines Feldes, niemals sein Label.</b>"
global_176 = "Es ist möglich, ein beschreibendes Feld in ein anderes Feld einzubetten, obwohl beschreibende Felder kein tatsächliches Eingabeelement zum Speichern von Daten haben. Das Einbetten eines beschreibenden Feldes würde lediglich das Label des Feldes an die neue Position verschieben, an der es eingebettet ist. Dies ist typischerweise nur nützlich, wenn das beschreibende Feld Branching Logic hat, wodurch Sie den Text des beschreibenden Feldes bedingt an einer bestimmten Stelle auf der Seite erscheinen lassen können."
global_177 = "Daten können an den oben aufgeführten Stellen *AUS* jedem Feldtyp in REDCap gepipt werden. Wenn Sie die Antwort *AUS* einem Mehrfachauswahlfeld pipen (z. B. Radio, Drop-down), wird standardmäßig das Optionslabel (nicht der codierte Datenwert) an der Stelle angezeigt, an die das Feld gepipt wird; bei allen anderen Feldtypen wird der wörtliche Datenwert gepipt. Unten sehen Sie, wie Sie ':value' an den Variablennamen in eckigen Klammern anhängen, um bei Mehrfachauswahlfeldern den Wert (statt des Labels) zu pipen. Siehe unten auch, wie Daten aus Checkbox-Feldern gepipt werden, was sich etwas von anderen Feldtypen unterscheidet."
global_179 = "<b><u>Datei-Upload-Felder:</u></b> Datei-Upload-Felder haben besondere Piping-Optionen. Wenn Sie *AUS* einem Datei-Upload-Feld oder Signaturfeld pipen, wird standardmäßig der numerische Wert des Feldes gepipt. Sie können jedoch den ursprünglichen Dateinamen der hochgeladenen Datei pipen, indem Sie die Option '<b>:label</b>' anhängen, z. B. <code>[my_field:label]</code>. Wenn Sie außerdem die Option '<b>:inline</b>' für ein Datei-Upload-Feld verwenden, z. B. <code>[my_field:inline]</code>, und die hochgeladene Datei eine PDF-Datei oder Bilddatei ist (JPG, JPEG, GIF, PNG, TIF, BMP), wird die Datei inline angezeigt, sodass sie auf der Seite sichtbar ist. (Das @INLINE Action Tag muss nicht auf einem Feld verwendet werden, um die Piping-Option :inline zu nutzen. Während das @INLINE Action Tag also verwendet werden kann, um das PDF/Bild auf dem Instrument des Feldes anzuzeigen, erlaubt die Piping-Option :inline, das PDF/Bild an Stellen außerhalb des Instruments des Feldes anzuzeigen.) Hinweis: Inline-Bilder können nicht in einem heruntergeladenen PDF eines Fragebogens/Instruments angezeigt werden, das Daten enthält. Außerdem <b>funktioniert die Option :inline auch innerhalb von E-Mails, sodass Sie ein Feld per :inline im E-Mail-Body pipen und dadurch Inline-Bilder in Fragebogeneinladungen oder Alarmen & Benachrichtigungen anzeigen können</b>. Wenn die per :inline in einer E-Mail gepipte Datei kein Bilddateityp ist, wird die Datei trotzdem an die E-Mail angehängt, aber der Dateiname wird im E-Mail-Text als Alternative zur Anzeige als Inline-Bild angezeigt. Datei-Upload-Felder können auch die Piping-Option '<b>:link</b>' nutzen, z. B. <code>[my_field:link]</code>, wobei <b>der Dateiname als anklickbarer Hyperlink zum Herunterladen der Datei angezeigt wird</b>. Dies funktioniert auf Webseiten und auch im Body von E-Mail-Texten (d. h. Fragebogeneinladungen oder Alarme & Benachrichtigungen)."
global_180 = "Der Mittelwert/Durchschnittswert eines Feldes über alle Datensätze im Projekt (einschließlich aller Events und/oder Wiederholungsinstanzen in allen Datensätzen). Mehrere Felder können verwendet werden und müssen kommasepariert sein."
global_181 = "Aggregatfunktionen, Diagramme und Tabellen"
global_182 = "Projekt-Dashboards"
global_183 = "Der Mindestwert eines Feldes über alle Datensätze im Projekt (einschließlich aller Events und/oder Wiederholungsinstanzen in allen Datensätzen). Mehrere Felder können verwendet werden und müssen kommasepariert sein."
global_184 = "Der Höchstwert eines Feldes über alle Datensätze im Projekt (einschließlich aller Events und/oder Wiederholungsinstanzen in allen Datensätzen). Mehrere Felder können verwendet werden und müssen kommasepariert sein."
global_185 = "Der Medianwert eines Feldes über alle Datensätze im Projekt (einschließlich aller Events und/oder Wiederholungsinstanzen in allen Datensätzen). Mehrere Felder können verwendet werden und müssen kommasepariert sein."
global_186 = "Die Summe aller Werte eines Feldes über alle Datensätze im Projekt (einschließlich aller Events und/oder Wiederholungsinstanzen in allen Datensätzen). Mehrere Felder können verwendet werden und müssen kommasepariert sein."
global_187 = "Die Anzahl aller Werte eines Feldes über alle Datensätze im Projekt (einschließlich aller Events und/oder Wiederholungsinstanzen in allen Datensätzen). Mehrere Felder können verwendet werden und müssen kommasepariert sein."
global_188 = "Die Standardabweichung eines Feldes über alle Datensätze im Projekt (einschließlich aller Events und/oder Wiederholungsinstanzen in allen Datensätzen). Mehrere Felder können verwendet werden und müssen kommasepariert sein."
global_189 = "Die Anzahl eindeutiger Werte (d. h. eine Anzahl, die doppelte Werte nicht berücksichtigt) eines Feldes über alle Datensätze im Projekt (einschließlich aller Events und/oder Wiederholungsinstanzen in allen Datensätzen). Mehrere Felder können verwendet werden und müssen kommasepariert sein."
global_190 = "[Ein auf der Seite angezeigtes Diagramm]"
global_191 = "[Eine auf der Seite angezeigte Tabelle]"
global_192 = "Zeigt ein Kreisdiagramm für ein einzelnes Mehrfachauswahlfeld an."
global_193 = "Zeigt ein Donut-Diagramm für ein einzelnes Mehrfachauswahlfeld an. Hinweis: Ein Donut-Diagramm ist im Wesentlichen dasselbe wie ein Kreisdiagramm, jedoch mit entfernter Mitte."
global_194 = "Zeigt ein Balkendiagramm für ein einzelnes Mehrfachauswahlfeld an. Optional kann eine Farbgruppierung durchgeführt werden, wenn ein zweites Feld (nur Mehrfachauswahl) angegeben wird. Die Felder müssen kommasepariert sein."
global_195 = "Zeigt ein Streudiagramm eines Zahlen-/Datums-/Datetime-Feldes für die x-Achse und eines zweiten Feldes (nur Zahlenfeld) für die y-Achse an. (Wenn kein zweites Feld angegeben wird, wird der y-Achse ein Zufallswert zugewiesen.) Optional kann eine Farbgruppierung durchgeführt werden, wenn ein drittes Feld (nur Mehrfachauswahl) angegeben wird. Alle Felder müssen kommasepariert sein."
global_196 = "Zeigt ein Liniendiagramm eines Zahlen-/Datums-/Datetime-Feldes für die x-Achse und eines zweiten Feldes (nur Zahlenfeld) für die y-Achse an. Optional kann eine Farbgruppierung durchgeführt werden, wenn ein drittes Feld (nur Mehrfachauswahl) angegeben wird. Alle Felder müssen kommasepariert sein. Hinweis: Ein Liniendiagramm ist im Wesentlichen dasselbe wie ein Streudiagramm, nur dass die Punkte mit einer Linie verbunden sind."
global_197 = "Zeigt eine Tabelle beschreibender Statistiken für ein oder mehrere Felder (kommasepariert) an, wobei jedes Feld als Zeile in der Tabelle dargestellt wird. Es gibt keine Begrenzung für die Anzahl der verwendbaren Felder. Standardmäßig werden alle Spalten angezeigt: Count, Missing, Unique, Min, Max, Mean, Median, StDev, Sum. Um nur eine Teilmenge der Spalten anzuzeigen, können Sie eine der folgenden Bezeichnungen (kommasepariert) angeben, die jeweils eine bestimmte Spalte in der Tabelle darstellen: count, missing, unique, min, max, mean, median, stdev, sum."
global_198 = "Optionale Parameter für Aggregatfunktionen, Diagramme und Tabellen"
global_199 = "<u>Eindeutiger Reportname</u> - Für Aggregatfunktionen, Diagramme und Tabellen können die verwendeten Daten gefiltert werden, indem ein eindeutiger Reportname angehängt wird. Neben jedem Report auf der Seite 'Meine Reports & Exporte' steht sein eindeutiger Reportname, der aus 'R-' gefolgt von alphanumerischen Zeichen besteht. Standardmäßig verwenden alle Aggregatfunktionen, Diagramme und Tabellen die Werte aller Datensätze im Projekt. Wenn jedoch ein eindeutiger Reportname an eine davon angehängt wird, werden nur Daten aus diesem bestimmten Report verwendet. Einen Report als Stellvertreter zum Filtern von Daten zu verwenden, ist eine sehr nützliche Technik, um komplexe Filterlogik für Aggregatfunktionen, Diagramme und Tabellen auszuführen."
global_200 = "\"<u>record-name</u>\" - Für Aggregatfunktionen, Diagramme und Tabellen die verwendeten Daten mit dem literal Wert 'record-name' auf den *aktuellen Datensatz* filtern. Hinweis: Dieser Parameter funktioniert nur in einem Kontext, in dem ein einzelner Datensatz angezeigt/aufgerufen wird, z. B. auf einer Fragebogenseite, einem Eingabeformular usw. Dieser Parameter kann mit allen anderen Parametern außer eindeutigen Reportnamen verwendet werden."
global_201 = "\"<u>event-name</u>\" - Für Aggregatfunktionen, Diagramme und Tabellen die verwendeten Daten mit dem literal Wert 'event-name' auf das *aktuelle Event* filtern (nur longitudinale Projekte). Hinweis: Dieser Parameter funktioniert nur in einem Kontext, in dem ein einzelner Datensatz/Event angezeigt/aufgerufen wird, z. B. auf einer Fragebogenseite, einem Eingabeformular usw. Dieser Parameter kann mit allen anderen Parametern außer eindeutigen Reportnamen verwendet werden."
global_202 = "<u>Eindeutige Eventnamen</u> - Für Aggregatfunktionen, Diagramme und Tabellen die verwendeten Daten auf bestimmte Events filtern (nur longitudinale Projekte), indem der eindeutige Eventname eines Events angegeben wird (zu finden auf der Seite Events definieren). Sie können einen oder mehrere eindeutige Eventnamen verwenden (kommasepariert). Hinweis: Dieser Parameter kann mit allen anderen Parametern außer eindeutigen Reportnamen verwendet werden."
global_203 = "\"<u>user-dag-name</u>\" - Für Aggregatfunktionen, Diagramme und Tabellen die verwendeten Daten mit dem literal Wert 'user-dag-name' auf die Datensätze filtern, die der *Zugriffsgruppe des aktuellen Benutzers* zugewiesen sind. Hinweis: Dieser Parameter funktioniert nur in einem Kontext, in dem ein authentifizierter Benutzer zu einem Projekt gehört und im Projekt einer DAG zugewiesen wurde (Fragebogenseiten und öffentliche Projekt-Dashboards sind ausgenommen). Dieser Parameter kann mit allen anderen Parametern außer eindeutigen Reportnamen verwendet werden."
global_204 = "<u>Eindeutige DAG-Namen</u> - Für Aggregatfunktionen, Diagramme und Tabellen die verwendeten Daten auf Datensätze filtern, die bestimmten Zugriffsgruppen zugewiesen sind, indem der eindeutige Gruppenname einer DAG angegeben wird (zu finden auf der Seite Zugriffsgruppen). Sie können einen oder mehrere eindeutige DAG-Namen verwenden (kommasepariert). Hinweis: Dieser Parameter kann mit allen anderen Parametern außer eindeutigen Reportnamen verwendet werden."
global_205 = "\"<u>bar-vertical</u>\" - Zeigt ein Balkendiagramm mit vertikal statt horizontal verlaufenden Balken (Standard) an, indem der literal Wert 'bar-vertical' verwendet wird. Hinweis: Dieser Parameter kann mit allen anderen Parametern verwendet werden."
global_206 = "\"<u>bar-stacked</u>\" - Nur für Balkendiagramme mit zwei Feldern: Zeigt das Balkendiagramm mit übereinander gestapelten Balken für jede Option an. In der Standardansicht werden die Balken der einzelnen Felder nebeneinander angezeigt, um die Farbgruppierung zu zeigen. Zur Aktivierung verwenden Sie den literal Wert 'bar-stacked'. Hinweis: Dieser Parameter kann mit allen anderen Parametern verwendet werden."
global_207 = "FEHLER: Öffentliche Dashboards sind auf dieser REDCap-Installation nicht aktiviert."
global_208 = "Verwenden Sie das Textfeld unten, um Ihre Logik, Berechnung, Action Tags usw. zu verfassen. Wenn Sie mehr Platz benötigen, klicken Sie auf den Button Vollbildmodus, um das Textfeld zu vergrößern. Wenn Sie fertig sind, klicken Sie auf den Button 'Aktualisieren', um das Editorfenster zu minimieren."
global_209 = "\"<u>no-export-link</u>\" - Nur für [stats-table] verwendet; blendet den Link \"Tabelle exportieren (CSV)\" aus, der standardmäßig direkt unter der Smart Table angezeigt wird."
