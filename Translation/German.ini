pmt_57 = "Wählen Sie aus, was mit dem <u>aktuellen Projekt</u> geschehen soll, nachdem der Migrationsprozess auf der anderen REDCap-Instanz erfolgreich abgeschlossen wurde."
pmt_58 = "Einstellung Abschlussaktion:"
pmt_59 = "Option \"Unverändert lassen\" nicht anzeigen"
pmt_60 = "Option \"Unverändert lassen\" anzeigen"
pmt_61 = "Instanz-ID abrufen"
pmt_62 = "Um ein Projekt von einer anderen REDCap-Instanz in diese zu migrieren, müssen Sie die Instanz-ID für diese REDCap-Instanz abrufen (unten zu finden) und die ID dann im Project Migration Tool auf der Ursprungs-REDCap-Instanz eingeben (d. h. jener Instanz, von der das Projekt migriert wird). <b>Kopieren Sie die ID unten und geben Sie sie im Project Migration Tool des Ursprungsservers ein, um einen Migrationsschlüssel zu generieren.</b>"
pmt_63 = "Instanz-ID:"
pmt_64 = "Um sicherzustellen, dass Ihr Projekt nur in eine bestimmte REDCap-Instanz migriert werden kann, müssen Sie eine gültige Instanz-ID der <u>Ziel-REDCap-Instanz</u> eingeben, in die dieses Projekt migriert werden soll. Die Instanz-ID kann auf der Seite \"Neues Projekt erstellen\" der Zielinstanz abgerufen werden. Die Instanz-ID ist eindeutig für diese REDCap-Instanz."
pmt_65 = "Instanz-ID der Ziel-REDCap-Instanz eingeben"
pmt_66 = "*Eine Instanz-ID ist erforderlich"
pmt_67 = "Instanz-ID vergessen"
pmt_68 = "Das Projekt kann nicht erstellt werden, weil die <b>Instanz-ID für diese REDCap-Instanz nicht gültig ist</b>. Rufen Sie die Instanz-ID für diesen Server ab und verwenden Sie diese ID, um auf dem Ursprungs-REDCap-Server einen neuen Migrationsschlüssel zu generieren. Kehren Sie dann mit Ihrem neuen Migrationsschlüssel hierher zurück."
pmt_69 = "Sie können mit dem Project Migration Tool ein vollständiges Projekt von einer anderen REDCap-Instanz in diese migrieren. Dazu müssen Sie einen Migrationsschlüssel aus dem Projekt abrufen, das Sie migrieren möchten. Gehen Sie innerhalb des zu migrierenden Projekts auf die Seite Weitere Funktionen und klicken Sie auf den Button \"Project Migration Tool\". Folgen Sie dann den Schritten, um den Migrationsschlüssel zu erhalten. Zuvor müssen Sie zunächst die Instanz-ID für diese aktuelle REDCap-Instanz abrufen. Ohne die Instanz-ID dieser REDCap-Instanz können Sie auf der anderen REDCap-Instanz keinen Migrationsschlüssel generieren."
;; pmt_70 is appended to string pmt_36 in the Project Migration Tool setting.
pmt_70 = "(erfordert Admin-Genehmigung)"
;; pmt_71 is appended to string pmt_36 in the Project Migration Tool setting.
pmt_71 = "(Admin-Genehmigung ist NICHT erforderlich)"
