docs_28 = "Das Datei-Repository ermöglicht Benutzern, Dateien zu speichern, zu organisieren und zu teilen, die für dieses Projekt verwendet werden. Ordner und Unterordner können erstellt werden, und es gibt keine Begrenzung für die Anzahl der Ordner, die erstellt werden können, oder die Anzahl der Dateien, die darin gespeichert werden können. Wenn Sie Zugriffsgruppen oder Benutzerrollen im Projekt verwenden, können Sie den Zugriff auf einen neuen Ordner einschränken, sodass er DAG-beschränkt und/oder rollenbeschränkt ist. Alle gelöschten Dateien werden in den Papierkorb verschoben, wo sie bis zu 30 Tage lang wiederhergestellt werden können; danach werden sie dauerhaft gelöscht."
