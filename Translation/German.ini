design_409 = "in der Fragebogen-Drop-down-Liste nicht auswählen, weil der Fragebogen, der in der 'Info'-Box des Pop-ups für automatische Einladungen aufgeführt ist, bereits so eingestellt wurde, dass er durch den Abschluss des gerade im Drop-down ausgewählten Fragebogens ausgelöst wird. Mit anderen Worten: Es würde eine zirkuläre Schleife entstehen, in der keiner der beiden Fragebögen jemals von einem Teilnehmer ausgefüllt werden könnte, weil ihre Einladungen gegenseitig ausgelöst werden sollen. Dies ist ein Paradox und nicht möglich. Sie müssen einen anderen Fragebogen aus der Drop-down-Liste auswählen."
