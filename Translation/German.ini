create_project_112 = "Datei bereits von Benutzer hochgeladen."
create_project_113 = "Standardmäßig verwenden neue Projekte das 'klassische' Datenerhebungsformat. Dies ist die beste Option, wenn alle Datenerhebungsinstrumente nur einmal pro Datensatz im Projekt verwendet werden müssen. Wenn einige Instrumente eine bestimmte *endliche* Anzahl von Malen wiederholt verwendet werden müssen (z. B. ein Instrument namens 'Visit Data' über zehn Besuche desselben Teilnehmers hinweg), ist die 'longitudinale' Datenerhebung wahrscheinlich am besten geeignet. Zusätzlich erlaubt das longitudinale Format bei Bedarf auch die Nutzung des Terminplanungsmoduls."
