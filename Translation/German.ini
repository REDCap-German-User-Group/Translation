random_213 = "FEHLER: Es existieren keine Zuteilungen!"
random_214 = "Randomisierung kann automatisiert in Echtzeit erfolgen, wenn ein Dateneingabeformular oder eine Umfrageseite gespeichert wird und der unten eingegebene Logikausdruck wahr wird (d. h. ohne dass jemand auf die Schaltfläche Randomisieren klickt). Wenn Strata im Randomisierungsmodell verwendet werden, müssen alle erforderlichen Strata-Felder gespeicherte Werte haben, bevor die automatische Auslösung erfolgen kann. Bitte geben Sie mit den untenstehenden Optionen 1) die Auslöseoption, 2) das Instrument (und Event, falls longitudinal), in dem die automatische Randomisierung erfolgen soll, und 3) die Auslöselogik an, die wahr werden muss, um die automatische Randomisierung auszulösen. Hinweis: Bei mehrseitigen Umfragen wird der Logikausdruck beim Absenden jeder Umfrageseite geprüft; wenn Sie jedoch bevorzugen, dass die Randomisierung beim Abschluss einer mehrseitigen Umfrage ausgelöst wird, sollten Sie erwägen, <code>[form_complete]='2'</code> an die Auslöselogik anzuhängen, wobei 'form' im Variablennamen durch den eindeutigen Instrumentnamen der Umfrage ersetzt werden sollte."
random_215 = "Auslöseoption speichern"
random_216 = "FEHLER: Es scheint, dass der aktuelle Datensatz bereits existiert (wahrscheinlich von einem anderen Benutzer erstellt). Daher können Sie hier keinen Datensatz mit demselben Namen randomisieren. Es wird empfohlen, das Formular zu verlassen und dann zu versuchen, einen anderen Datensatz zu erstellen; danach können Sie versuchen, ihn zu randomisieren."
