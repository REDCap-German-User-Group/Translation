design_355 = "Matrixbeispiel anzeigen"
design_356 = "Matrixbeispiele"
design_357 = "REDCap kann eine Matrixgruppe von Feldern entweder als Einzelauswahl (Radio-Buttons) oder als Mehrfachauswahl (Checkboxen) anzeigen. Die erste Matrix unten zeigt eine Gruppe von Feldern als Radio-Buttons an, während die zweite Matrix eine Gruppe als Checkboxen anzeigt. Die Verwendung einer Abschnittsüberschrift ist beim Erstellen einer Matrix optional. Die Feldlabels auf der linken Seite jedes Feldes erhalten immer dieselbe Breite, aber die Breite jeder einzelnen Optionsspalte variiert abhängig davon, wie viele Optionen vorhanden sind. Je mehr Optionen Sie also haben, desto schmaler wird jede Optionsspalte."
design_358 = "Mehr über Matrixfelder in Hilfe & FAQ lesen."
design_359 = "Beispiele für Matrixfelder in REDCap"
design_360 = "HINWEIS: Abschnittsüberschrift des Feldes wurde mit einer anderen Abschnittsüberschrift zusammengeführt"
design_361 = "Das Feld, das Sie gerade verschoben haben, hatte unmittelbar davor eine Abschnittsüberschrift, und auch das darauf folgende Feld hatte eine Abschnittsüberschrift. Da zwei Abschnittsüberschriften nicht direkt nebeneinander stehen können, wurden diese beiden Abschnittsüberschriften nun automatisch zusammengeführt."
design_362 = "HINWEIS: Abschnittsüberschrift des Feldes wurde entfernt"
design_363 = "Das Feld, das Sie gerade verschoben haben, hatte unmittelbar davor eine Abschnittsüberschrift. Da dieses Feld vor dem Verschieben das letzte Feld im Formular war, musste die Abschnittsüberschrift automatisch entfernt werden, weil es keinen Platz mehr dafür gab."
