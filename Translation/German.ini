control_center_285 = "REDCap-Cronjob einrichten"
control_center_286 = "REDCap erfordert, dass auf Ihrem REDCap-Webserver ein Cronjob eingerichtet wird, der im Tagesverlauf in regelmäßigen Abständen vom Webserver ausgeführt wird. Der Cron führt alle erforderlichen Aufgaben aus und startet diese als asynchrone Hintergrundprozesse. Die Schritte unten führen Sie durch die Einrichtung dieses Cronjobs und die Behebung möglicher Fehler."
control_center_287 = "Cronjobs"
control_center_288 = "FEHLER: Cronjob läuft nicht!"
control_center_289 = "Es scheint, dass Ihr REDCap-Cronjob entweder nicht eingerichtet wurde oder nicht im richtigen Intervall läuft. Details zur Einrichtung finden Sie auf der Seite Cronjobs im Control Center. Dieser Cronjob ist sehr wichtig und muss regelmäßig im vorgeschriebenen Intervall laufen, damit bestimmte Hintergrundaufgaben korrekt ausgeführt werden."
control_center_290 = "Zur Seite Cronjobs gehen"
control_center_291 = "Der Pfad zur ausführbaren PHP-Datei auf Ihrem Webserver konnte nicht ermittelt werden. Sie müssen daher den Pfad bestimmen und"
control_center_292 = "im Textfeld durch den tatsächlichen Pfad ersetzen."
control_center_293 = "Eine erforderliche Datei fehlt, aber Sie können"
control_center_295 = "Legen Sie die Datei cron.php nach dem Download im Verzeichnis ab"
control_center_297 = "REDCap-Cronjob auf einem Windows-Server planen"
control_center_298 = "Öffnen Sie die Eingabeaufforderung (cmd.exe) in Windows und führen Sie den Befehl unten aus. Dadurch wird eine geplante Windows-Aufgabe erstellt, die einmal pro Minute ausgeführt wird. Wenn diese geplante Aufgabe unter einem bestimmten Benutzerkonto ausgeführt werden soll, müssen Sie zusätzlich die folgenden Parameter setzen:"
control_center_299 = "Wenn Sie Hilfe benötigen, finden Sie hier weitere Details zu"
control_center_300 = "Planung einer Windows-Aufgabe per Befehlszeile"
control_center_301 = "Diesen Befehl in eine Windows-Eingabeaufforderung einfügen und Enter drücken:"
control_center_302 = "REDCap-Cronjob für einen Linux-/Unix-Server mit CronTab planen"
control_center_303 = "Starten Sie eine Telnet-/SSH-Sitzung auf Ihrem Linux-/Unix-Server und fügen Sie den Text im Feld Ihrer CronTab-Datei hinzu (verwenden Sie 'crontab -e', um Ihre Cron-Liste zur Bearbeitung zu öffnen). Dadurch wird ein geplanter Job erstellt, der einmal pro Minute ausgeführt wird. Wenn nach dem Start von 'crontab -e' ein Berechtigungsfehler angezeigt wird, müssen Sie möglicherweise sudo verwenden (d. h. 'sudo crontab -e'). Um Ihre aktuellen bestehenden Crons in CronTab aufzulisten, verwenden Sie 'crontab -l'. Wenn CronTab auf Ihrem Server nicht installiert ist, müssen Sie es herunterladen und installieren."
control_center_304 = "Fügen Sie die folgenden zwei Zeilen zu Ihrer CronTab-Datei hinzu:"
