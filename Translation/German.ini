survey_744 = "In diesem Pop-up können Sie Ihre Bedingungen für automatisierte Umfrageeinladungen definieren, die für die im Infofeld unten aufgeführte Umfrage (und das Event, falls longitudinales Projekt) versendet werden."
survey_745 = "Automatisierte Umfrageeinladungen können als Möglichkeit verstanden werden, Einladungen an Ihre Umfrageteilnehmenden senden zu lassen. Statt sie jedoch manuell über die Teilnehmerliste zu senden oder zu planen, können die Einladungen automatisch geplant werden (d. h. ohne dass eine Person die Einladung sendet), basierend auf bestimmten Bedingungen, z. B. wenn der Teilnehmer eine andere Umfrage in Ihrem Projekt abschließt oder wenn bestimmte Datenwerte für einen Datensatz erfüllt sind. Mit den untenstehenden Einstellungen können Sie Ihre Umfrageeinladungsnachricht verfassen und dann die Bedingungen angeben, die erfüllt sein müssen, damit die Einladung gesendet/geplant wird. Sie müssen außerdem die Zeit angeben, zu der die Einladung gesendet wird."
