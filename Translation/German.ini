data_export_tool_255 = "HINWEIS: Für dieses Feature muss ein API-Token für das Projekt erzeugt worden sein."
data_export_tool_256 = "Warum Tableau?"
data_export_tool_257 = "<b>Tableau</b> ist ein leistungsstarkes und schnell wachsendes Datenvisualisierungstool, das in der Business-Intelligence-Branche verwendet wird. Es hilft, Rohdaten in einem sehr leicht verständlichen Format zu vereinfachen. Tableau hilft, Daten zu erstellen, die von Fachleuten auf jeder Ebene einer Organisation verstanden werden können. <br><b>Tableau</b> ist eine Visual-Analytics-Engine, die das Erstellen interaktiver visueller Analysen in Form von Dashboards erleichtert. Diese Dashboards erleichtern es nichttechnischen Analysten und Endbenutzern, Daten in verständliche, interaktive Grafiken umzuwandeln."
data_export_tool_258 = "Ein REDCap-Benutzer mit API-Token kann Daten aus seinem REDCap-Projekt in seine <b>Tableau-Desktop-Instanz (v10.0+)</b> herunterladen. Bitte folgen Sie den folgenden Schritten, um Daten über den Tableau Web Data Connector herunterzuladen."
data_export_tool_259 = "Gehen Sie in Tableau 10.0+ zu Connect -> To a Server -> More und suchen Sie \"Web Data Connector\""
data_export_tool_260 = "Kopieren Sie die unten stehende URL als \"web data connector URL\" in den Dialog und drücken Sie Enter:"
data_export_tool_261 = "Geben Sie in Tableau Ihr Projekt-API-Token in das Textfeld ein und wählen/geben Sie nach Wunsch weitere Optionen ein."
