extres_01 = "Datensatzinformationen an URL anhängen"
extres_02 = "Bitte beachten Sie, dass bei Auswahl dieser Option der Datensatzname (und bei einem longitudinalen Projekt zusätzlich der eindeutige Eventname) an die URL des Ziellinks angehängt wird. Wenn die Datensatznamen für dieses Projekt ein Identifier sind (d. h. PHI), z. B. Sozialversicherungsnummer oder Krankenaktennummer, sollten Sie diese Funktion wahrscheinlich nicht verwenden, insbesondere wenn Sie nicht an der Verwaltung oder Entwicklung der Website beteiligt sind, an die Sie diese Datensatzinformationen senden. Dies ist lediglich eine Warnung, um sicherzustellen, dass Sie private Informationen schützen, die möglicherweise in den Datensatznamen Ihres Projekts enthalten sind, damit Sie diese nicht unwissentlich an eine Drittanbieter-Website senden. Wenn dies in Ordnung ist, klicken Sie unten auf den Button Speichern."
extres_03 = "Name nicht aufgeführt"
extres_05 = "Zusammenfassung"
extres_07 = "Welche Informationen werden genau an die URL angehängt?"
;; extres_08 is concatenated with a literal query-string example and string extres_09.
extres_08 = "Beim Anzeigen eines Datensatzes in einem Datenerhebungsinstrument werden ein oder zwei Informationen an die URL angehängt: der Name des angezeigten Datensatzes und (bei einem longitudinalen Projekt) der eindeutige Eventname des aktuellen Events. Folgendes wird zum Query String der URL hinzugefügt: "
;; extres_09 is concatenated after the literal query-string example from extres_08.
extres_09 = ", wobei RECORDNAME und UNIQUEEVENTNAME durch den aktuell angezeigten Datensatz bzw. das aktuell angezeigte Event ersetzt werden. Bei klassischen, nicht longitudinalen Projekten würde nur der Datensatzname enthalten sein. Der eindeutige Eventname für longitudinale Projekte ist derselbe wie auf der Seite Define My Events."
extres_10 = "Beispiele (angenommen, der Benutzer zeigt ein Datenerhebungsformular an):"
;; extres_11 is concatenated with a sample URL and strings extres_12/extres_13/extres_14/extres_15.
extres_11 = "Wenn die definierte URL lautet"
;; extres_12 is concatenated with string extres_11, a sample URL, a sample record name, and optionally strings extres_13/extres_14/extres_15.
extres_12 = "und der aktuelle Datensatzname lautet"
;; extres_13 is concatenated with string extres_11, a sample URL, string extres_12, a sample record name, a sample event name, and string extres_15.
extres_13 = "und der eindeutige Eventname für das aktuelle Event lautet"
extres_14 = "(klassisches Projekt):"
extres_15 = "(longitudinales Projekt):"
extres_16 = "Dieses Modul erlaubt Ihnen, Projekt-Lesezeichen (d. h. benutzerdefinierte Links) einzurichten, die auf Webseiten verweisen, die innerhalb von REDCap existieren (d. h. andere REDCap-Projekte) oder außerhalb von REDCap liegen (d. h. Webseiten auf einem anderen Server im Web). Sie können einfache Weblinks zur Navigation zu diesen Webseiten erstellen. Die Links werden im linken Projektmenü angezeigt. Sie können verschiedene Einstellungen für jeden Link festlegen, z. B. das Label, wie es im linken Menü erscheint, ob der Link ein neues Fenster/einen neuen Tab in Ihrem Webbrowser öffnet und welche einzelnen Benutzer (oder Zugriffsgruppen) in Ihrem Projekt diese Lesezeichen nutzen können."
;; extres_17 is concatenated with a link using string extres_69 and string extres_19 or extres_58.
extres_17 = "Sie können"
;; extres_19 is concatenated after string extres_17 and a link using string extres_69.
extres_19 = "unten auf dieser Seite. Sie müssen lediglich ein Label und eine Webadresse (URL) angeben. Wenn Sie den Benutzer nur zur Zielwebsite führen möchten, sollte die Option Einfacher Link ausreichen. Sie können Links zu anderen REDCap-Projekten erstellen, auf die Sie Zugriff haben, indem Sie den Linktyp REDCap-Projekt auswählen. Dadurch wird eine Liste Ihrer Projekte angezeigt, aus der Sie eines auswählen können, um den Link dorthin zu erstellen. Links zu anderen REDCap-Projekten können nützlich sein, wenn mehrere Projekte zusammenhängen und Benutzer häufig zwischen ihnen hin- und hernavigieren müssen."
extres_20 = "Mehr über die Option Erweiterter Link erfahren"
extres_21 = "Option Erweiterter Link"
extres_22 = "Die Option Erweiterter Link bietet mehr Möglichkeiten als die Option Einfacher Link. Der einfache Link führt den Benutzer lediglich anonym zur Zielwebsite, sodass die Website nicht erkennen kann, wer sie besucht. Der erweiterte Link führt den Benutzer nicht nur zur Zielwebsite, sondern sendet auch Informationen an diese Website, die dann zur Überprüfung der Identität des Benutzers verwendet werden können. HINWEIS: Für die Nutzung der Option Erweiterter Link sind technische Kenntnisse (z. B. Webentwicklung/Programmierkenntnisse) erforderlich, und sie setzt voraus, dass Sie (oder Ihr Team/Ihre Partner/Kollegen) die externe Website verwalten oder entwickeln, um diesen Dienst ordnungsgemäß nutzen zu können. Details sind unten aufgeführt."
