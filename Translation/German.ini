design_945 = "Benutzerdefinierter Text, der auf der Fragebogenseite angezeigt wird, wenn offline:"
design_946 = "Bitte beachten Sie, dass es auf der Fragebogeneinstellungsseite für ein bestimmtes Instrument weitere Stop-Action-Einstellungen gibt, z. B. die Möglichkeit, benutzerdefinierten Text festzulegen, wenn ein Fragebogen per Stop Action endet."
design_948 = "Setzt den Wert eines Feldes auf statischen Text oder dynamischen/gepipten Text, immer wenn ein Eingabeformular oder eine Fragebogenseite geladen wird, wobei ein bestehender Feldwert <u>immer überschrieben</u> wird. Das Format muss dem Muster @SETVALUE=\"????\" folgen, wobei der gewünschte Wert in einfachen oder doppelten Anführungszeichen stehen sollte. Bei Textfeldern können Sie Werte aus anderen Feldern im Projekt pipen und verketten - z. B. @SETVALUE='Name: [first_name] [last_name], DOB: [dob]'. Bei Checkbox-Feldern trennen Sie mehrere Checkbox-Werte einfach mit Kommas - z. B. @SETVALUE='1,3,[other_field:value]'. HINWEIS: Der gepipte Wert wird bei Datenimporten (über API oder Datenimport-Tool) *nicht* angewendet, sondern funktioniert nur beim Anzeigen von Fragebogenseiten und Eingabeformularen. <u>HINWEIS: Ein Feld mit @SETVALUE aktualisiert seinen Wert NUR beim Laden der Seite. Das bedeutet, dass sein Wert nicht in Echtzeit aktualisiert wird, wenn Sie andere Felder auf derselben Seite ändern, die in das @SETVALUE-Tag gepipt werden.</u> HINWEIS: Wenn dies für ein Datums- oder Datetime-Feld verwendet wird, muss der Datumswert innerhalb der Anführungszeichen im Format Y-M-D stehen - z. B. @SETVALUE='2007-12-25' - unabhängig vom eingestellten Datumsformat des Feldes. HINWEIS: Der einzige Unterschied zwischen @SETVALUE und @DEFAULT besteht darin, dass @DEFAULT nur angewendet wird, wenn ein Instrument noch keine Daten hat, während @SETVALUE immer auf ein Instrument angewendet wird. Das bedeutet, dass @SETVALUE den Wert IMMER überschreibt, wenn bereits ein Feldwert existiert. TIPP: Um den Wert eines Mehrfachauswahlfeldes in ein anderes Mehrfachauswahlfeld zu pipen, hängen Sie ':value' an die gepipte Variable an - z. B. @SETVALUE='[my_dropdown:value]'. (In früheren REDCap-Versionen hieß das @SETVALUE Action Tag @PREFILL, das aus Gründen der Abwärtskompatibilität weiterhin äquivalent zu @SETVALUE funktioniert.)"
design_949 = "Entschuldigung, aber Events können im Produktionsstatus nur von REDCap-Administratoren umbenannt werden. Das Umbenennen eines Events kann gravierende Folgen haben, wenn der eindeutige Eventname in Berechnungen, Branching Logic, Report-Filtern oder anderer bedingter Logik im Projekt verwendet wird. Bitte wenden Sie sich an Ihren lokalen REDCap-Administrator, wenn Sie ein Event umbenennen müssen; er kann dies für Sie tun."
design_950 = "Entschuldigung, aber Arms können im Produktionsstatus nur von REDCap-Administratoren umbenannt werden. Das Umbenennen eines Arms kann gravierende Folgen haben, wenn ein eindeutiger Eventname aus dem Arm in Berechnungen, Branching Logic, Report-Filtern oder anderer bedingter Logik im Projekt verwendet wird. Bitte wenden Sie sich an Ihren lokalen REDCap-Administrator, wenn Sie einen Arm umbenennen müssen; er kann dies für Sie tun."
