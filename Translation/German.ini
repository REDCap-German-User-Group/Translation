mycap_mobile_app_999 = "In Nachricht suchen:"
mycap_mobile_app_1000 = "Für Inhalt können Sie optional den Rich-Text-Editor verwenden, um Ihren Inhalt mit grundlegenden Textformatierungsoptionen zu gestalten. Mit dem Rich-Text-Editor können Sie einen Link im Inhalt einfügen/bearbeiten."
mycap_mobile_app_1001 = "Sind Sie sicher, dass Sie diese Nachricht ENTFERNEN möchten? Wenn ja, ist sie für den Teilnehmer nicht mehr verfügbar."
