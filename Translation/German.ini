multilang_144 = "Wenn nur auf einem Dropdown- oder Radio-Button-Feld verwendet, erlaubt dieses Action Tag dem Feldwert, die aktuell angezeigte Sprache zu steuern (genauso wie beim Umschalten der Sprache über die Buttons oben auf der Seite). Tipp: Bei Verwendung in einem Fragebogen könnte dieses Feld vorbefüllt (und damit automatisch ausgewählt) werden, indem die Sprach-ID eines Teilnehmers direkt in die Fragebogen-URL eingebettet wird (Details siehe FAQ-Abschnitt \"How to pre-fill survey questions\")."
multilang_145 = "Übersetzungs-Fallbacks auf Nicht-Projektseiten hervorheben"
multilang_146 = "Der Standardtext hat sich geändert, seit dieses Element übersetzt wurde."
multilang_148 = "Mehrsprachige Unterstützung in REDCap funktioniert durch Bereitstellung von Übersetzungen für jedes Anzeigeelement, d. h. Feldlabels, Auswahl-Labels und Benutzeroberflächenelemente, aber auch für Elemente wie E-Mail-Betreffs und Nachrichtentexte von Alarmen und automatisierten Umfrageeinladungen. Übersetzungen für jedes unterstützte Element können auf dieser Seite festgelegt werden. Wenn ein Element nicht übersetzt ist, wird es in der als Fallback definierten Sprache angezeigt oder, wenn dort ebenfalls nicht gesetzt, der Standardtext verwendet."
multilang_150 = "Instrumentennamen übersetzen"
multilang_151 = "Änderungen konnten nicht gespeichert werden. Bitte prüfen Sie die Browserkonsole (F12) für Details."
multilang_153 = "Verwenden Sie diese Seite, um zu verwalten, welche Alarme übersetzt werden sollen. Deaktivierte Alarme werden für andere Sprachen nicht angezeigt (und nicht übersetzt). Da Alarme für verschiedene Zwecke eingerichtet und in unterschiedlichen Kontexten ausgelöst werden können, ist es nicht möglich, automatisch zu bestimmen, welche Sprache zum Rendern eines Alarms verwendet werden soll. Daher muss für jeden Alarm die Quelle der Sprachinformation festgelegt werden. Dies kann entweder das <b>'Feld für Sprachpräferenz'</b> sein (wie auf dem Tab 'Sprachen' festgelegt; dies ist der Standard) oder die <b>'aktive Sprache des Benutzers oder Umfragebefragten'</b> (wie im Profil/Browser-Cookie gesetzt)."
multilang_155 = "Aktivieren, um diesen Alarm von der Übersetzung auszuschließen"
multilang_156 = "Es gibt keine Alarme, die übersetzt werden können."
