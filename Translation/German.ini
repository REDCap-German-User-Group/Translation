system_config_519 = "Falls gewünscht, können Sie ein alternatives Authentifizierungsintervall für Geräte in bestimmten IP-Bereichen festlegen. Beispielsweise möchten Sie das Intervall für Benutzer in einem halbwegs sicheren Netzwerk auf 30 Tage setzen, für Benutzer außerhalb eines sicheren Netzwerks jedoch auf 1 Tag. Sie können das Intervall auf X Tage setzen, für die dem Gerät des Benutzers vertraut wird, wenn es sich in einem bestimmten IP-Bereich befindet."
