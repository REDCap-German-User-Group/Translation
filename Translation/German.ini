dataqueries_99 = "FEHLER! In der Logik sind Syntaxfehler vorhanden. Bitte prüfen Sie die Logik, um sicherzustellen, dass keine unzulässigen Zeichen oder unzulässigen Funktionen verwendet werden und dass keine Klammern, Anführungszeichen oder eckigen Klammern versehentlich ausgelassen wurden."
dataqueries_100 = "Was ist Datenqualität?"
dataqueries_101 = "Das Datenqualitätsmodul ist eine Seite, die Ihnen helfen kann, Daten-Diskrepanzen oder Fehler in Ihren Projektdaten leicht zu finden, indem Sie Datenqualitäts-'Regeln' erstellen und ausführen können. Wenn ein Benutzer für Datenqualität das Recht 'Regeln erstellen & bearbeiten' hat, kann er auf das Datenqualitätsmodul zugreifen und dort benutzerdefinierte Regeln erstellen, bearbeiten, neu anordnen und löschen. Wenn diese Benutzereinstellung nicht aktiviert ist, kann er dies nicht tun. Wenn er für Datenqualität das Recht 'Regeln ausführen' hat, kann er auf das Datenqualitätsmodul zugreifen und sieht auf dieser Seite die Buttons 'Ausführen', sodass er alle erstellten Regeln (einschließlich der vordefinierten Regeln) ausführen kann; dadurch wird eine detaillierte Liste aller Daten-Diskrepanzen angezeigt. Wenn diese Benutzereinstellung nicht aktiviert ist, erhält er nicht die Möglichkeit, Regeln auszuführen. Wenn bei einem Benutzer keine der beiden Checkboxen für Datenqualitätsrechte gesetzt ist, wird das Datenqualitätsmodul nicht im linken Projektmenü angezeigt, und er kann nicht auf das Modul zugreifen."
dataqueries_108 = "TIMEOUT"
dataqueries_109 = "Die folgenden in Ihrer Logik aufgeführten Begriffe scheinen entweder unzulässige oder nicht erkannte Funktionen zu sein und sind daher in Ihrer Logik nicht erlaubt. Sie müssen aus der Logik entfernt werden, bevor Sie fortfahren können. Um eine Liste erlaubter Funktionen zu sehen, klicken Sie auf dieser Seite auf den Link 'Wie verwende ich spezielle Funktionen?'."
dataqueries_110 = "Ein oder mehrere Felder werden nicht mit einem Event referenziert. Da dies ein longitudinales Projekt ist, müssen Sie beim Verweisen auf ein Feld in der Logik den eindeutigen Eventnamen angeben. Verwenden Sie beispielsweise statt [age] [enrollment_arm1][age], vorausgesetzt enrollment_arm1 ist ein gültiger eindeutiger Eventname in Ihrem Projekt. Eine Liste aller eindeutigen Eventnamen Ihres Projekts finden Sie auf der Seite Define My Events."
dataqueries_111 = "Ein oder mehrere in der Logik referenzierte eindeutige Eventnamen sind ungültig. Bitte ersetzen Sie die untenstehenden ungültigen Eventnamen durch einen gültigen eindeutigen Eventnamen. Eine Liste aller eindeutigen Eventnamen Ihres Projekts finden Sie auf der Seite Define My Events."
