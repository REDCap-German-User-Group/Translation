alerts_341 = "Die Template Data Keys, die Sie oben konfigurieren können, entsprechen den Handlebars-Ausdrücken, die in Ihrem SendGrid Template konfiguriert sind. Wenn Sie beispielsweise den Handlebars-Ausdruck <code>{{name}}</code> in Ihrem SendGrid Template verwenden, sollten Sie <code>name</code> als Template Data Key konfigurieren; der Template Data Value ist entweder statischer Text oder ein gepipter Variablenname (einschließlich Smart Variables), z. B. <code>[first_name]</code>. Um beispielsweise einen Umfragelink in den Alarm einzufügen, legen Sie den Handlebars-Ausdruck in Ihrem SendGrid Template als <code>{{surveylink}}</code> fest und setzen dann Data Key und Value auf <code>surveylink</code> bzw. <code>[survey-url:instrument]</code>, wobei \"instrument\" den eindeutigen Instrumentnamen Ihrer Umfrage darstellt. Lesen Sie in der SendGrid-Dokumentation zu <a href='https://docs.sendgrid.com/for-developers/sending-email/using-handlebars' target='_blank'><u>Handlebars</u></a>, um mehr zu erfahren."
