econsent_23 = "Ein Einwilligungsformular, dargestellt entweder als Rich Text oder als eingebettetes PDF, wie auf der Seite e-Consents & PDF Snapshots definiert. Diese Smart Variable wird durch das passende Einwilligungsformular ersetzt, wobei der aktuelle Kontext für ein Teilnehmer-Einwilligungselement berücksichtigt wird, das für einen bestimmten Fragebogen auf der Seite e-Consents & PDF Snapshots definiert wurde, einschließlich Zugriffsgruppe und MLM-Sprache (falls zutreffend)."
