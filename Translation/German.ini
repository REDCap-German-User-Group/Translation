pub_042 = "REDCap sendet Principal Investigators E-Mails gemäß den Einstellungen, die Sie im Setup-Tab angegeben haben. Unten sehen Sie ein Beispiel der E-Mail, die ein P.I. erhält, wenn REDCap passende Publikationen findet. Ganz unten auf dieser Seite befindet sich außerdem eine Tabelle mit den P.I.s, die per E-Mail kontaktiert werden sollen. Sie enthält für jeden einen Button, der zu der Seite navigiert, zu der der P.I. geführt wird, wenn er auf den Link in seiner E-Mail klickt, um das Matching durchzuführen."
pub_043 = "Sie erhalten diese Nachricht, weil wir ein oder mehrere kürzlich veröffentlichte Manuskripte identifiziert haben, die möglicherweise von der REDCap Data Management Platform unterstützt wurden. REDCap wird durch mehrere NIH-Grants und andere lokale Infrastrukturförderquellen unterstützt. Die fortlaufende Unterstützung des Programms beruht auf Impact Assessment und Evaluation. Daher hoffen wir, dass Sie sich 1-2 Minuten Zeit nehmen, um anzugeben, ob REDCap bei der Unterstützung Ihres/Ihrer neuen Manuskripts/Manuskripte verwendet wurde."
