design_276 = "Änderungen wurden automatisch vorgenommen"
design_277 = "Die gerade eingereichten Änderungen wurden <u>AUTOMATISCH</u> vorgenommen."
design_278 = "Warum wurden meine Änderungen automatisch vorgenommen?"
design_279 = "Ihre Änderungen wurden automatisch vorgenommen, weil Ihr Projekt derzeit entweder keine Datensätze enthält ODER weil festgestellt wurde, dass die im Entwurfsmodus vorgenommenen Änderungen keine potenziell kritischen Probleme enthalten (z. B. Löschen von Feldern, Neucodierung von Mehrfachauswahl-Feldoptionen)."
design_280 = "Sie wurden sofort übernommen und sind bereits wirksam. Daher müssen Sie NICHT warten, bis ein REDCap-Administrator Ihre Änderungen freigibt, weil die Änderungen bereits vorgenommen wurden. Keine Ihrer bestehenden Daten (falls vorhanden) war von Ihren Änderungen betroffen."
design_281 = "Ihre Änderungen wurden automatisch vorgenommen, weil sie alle als geringfügig eingestuft wurden und keine Änderung bestehender Felder betrafen (z. B. Hinzufügen neuer Felder, Neuordnen von Feldern)."
design_282 = "Unter diesen Bedingungen wird REDCap Ihre Änderungen sofort automatisch freigeben, ohne dass Sie auf die Freigabe durch einen REDCap-Administrator warten müssen."
design_283 = "Warum wurden meine Änderungen nicht automatisch vorgenommen?"
design_284 = "Ihre Änderungen wurden nicht automatisch vorgenommen, weil Ihr Projekt derzeit einen oder mehrere Datensätze enthält UND weil festgestellt wurde, dass die im Entwurfsmodus vorgenommenen Änderungen potenziell kritische Probleme enthalten (z. B. Löschen von Feldern, Neucodierung von Mehrfachauswahl-Feldoptionen)."
design_285 = "Ihre Änderungen wurden nicht automatisch vorgenommen, weil diese Änderungen die Änderung bestehender Felder umfassten."
design_286 = "Unter diesen Bedingungen wird REDCap Ihre Änderungen NICHT sofort automatisch freigeben. Daher müssen Sie warten, bis ein REDCap-Administrator sie freigibt. Vielen Dank für Ihre Geduld."
design_287 = "<b>HINWEIS:</b> Bitte beachten Sie, dass Änderungen, die im Entwurfsmodus vorgenommen wurden, automatisch freigegeben werden können, wenn sie bestimmte Voraussetzungen erfüllen. Das bedeutet, dass sie sofort vorgenommen werden, statt auf die Freigabe durch einen REDCap-Administrator warten zu müssen."
design_288 = "Ihre Änderungen wurden automatisch vorgenommen, weil Ihr Projekt derzeit entweder keine Datensätze enthält ODER weil sie alle als geringfügig eingestuft wurden und keine Änderung bestehender Felder betrafen (z. B. Hinzufügen neuer Felder, Neuordnen von Feldern)."
design_289 = "Ihre Änderungen wurden automatisch vorgenommen, weil festgestellt wurde, dass die im Entwurfsmodus vorgenommenen Änderungen keine potenziell kritischen Probleme enthalten (z. B. Löschen von Feldern, Neucodierung von Mehrfachauswahl-Feldoptionen)."
design_290 = "Ihre Änderungen wurden nicht automatisch vorgenommen, weil Ihr Projekt derzeit einen oder mehrere Datensätze enthält UND weil festgestellt wurde, dass die im Entwurfsmodus vorgenommenen Änderungen die Änderung bestehender Felder umfassten."
design_291 = "Ihre Änderungen wurden nicht automatisch vorgenommen, weil festgestellt wurde, dass die im Entwurfsmodus vorgenommenen Änderungen potenziell kritische Probleme enthalten (z. B. Löschen von Feldern, Neucodierung von Mehrfachauswahl-Feldoptionen)."
design_292 = "Nein, ein Administrator muss diese Änderungen prüfen."
design_293 = "Für die unten aufgeführten Optionen schien kein Rohwert angegeben zu sein, sondern nur ein Label. Daher wurde für sie automatisch ein Rohwert vergeben. Wenn Sie mit diesen automatisch erzeugten Werten nicht zufrieden sind, können Sie sie ändern, bevor Sie Ihre Änderungen für dieses Feld speichern. Die Optionen im Textfeld 'Choices' wurden automatisch angepasst, um diese Änderungen widerzuspiegeln."
design_294 = "Rohwerte für Optionen wurden automatisch hinzugefügt"
design_300 = "Matrixgruppenname:"
design_302 = "Matrixgruppe:"
design_303 = "Was ist ein Matrixgruppenname?"
design_304 = "Ein Matrixgruppenname ist erforderlich, damit REDCap weiß, wie Felder auf einem Fragebogen oder Formular gemeinsam als Gruppe im Matrix-/Rasterformat angezeigt werden sollen. Der Gruppenname ist erforderlich. Wenn er nicht angegeben wird, müssen Sie das Feld über das Drop-down Feldtyp wieder in ein normales Radio-Button- oder Checkbox-Feld ändern. <b>Damit verschiedene Felder zusammen in derselben Matrix/demselben Raster angezeigt werden, müssen sie denselben Matrixgruppennamen erhalten.</b> Andernfalls werden sie als separate Matrixgruppen dargestellt."
design_305 = "Das Textfeld Choices wurde nun mit den Optionen der Matrixgruppe vorausgefüllt, die Sie gerade ausgewählt haben. Sie sollten diese Werte *NICHT* ändern."
design_307 = "Feldmatrix hinzufügen"
design_309 = "Feld hinzufügen"
design_310 = "Sie können diesem Datenerfassungsinstrument eine Matrix (d. h. ein Raster) von Projektfeldern hinzufügen oder bearbeiten, indem Sie die Felder unten ausfüllen. Wenn Sie unten alle erforderlichen Angaben machen und auf Speichern klicken, wird die neue Feldmatrix dem Formular auf dieser Seite hinzugefügt. Für jedes Feld in der Matrix müssen ein Feldlabel und ein Variablenname angegeben werden. Außerdem müssen Sie die Choices (d. h. Matrixspaltenüberschriften) und das Antwortformat (Einzelauswahl vs. Mehrfachauswahl) für die gesamte Matrix festlegen."
