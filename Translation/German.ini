data_entry_738 = "(Optional) Wird oben auf der Seite angezeigt. Aggregat-Smart-Variables können im Text verwendet werden."
data_entry_739 = "Dies ist eine MyCap-Annotation, die in einem File-Upload-Feld verwendet wird. Für dieses Action Tag werden keine Parameter benötigt, daher sollte es wörtlich nur als <code>@MC-FIELD-FILE-IMAGECAPTURE</code> verwendet werden. Beachten Sie, dass die Research-Kit-Eigenschaften <code>templateImage</code>, <code>templateImageInsets</code>, <code>accessibilityInstructions</code> und <code>accessibilityHint</code> nicht implementiert sind."
data_entry_740 = "Dies ist eine MyCap-Annotation, die in einem File-Upload-Feld verwendet wird. Das Format muss @MC-FIELD-FILE-VIDEOCAPTURE=[MAX DURATION IN SECONDS]:[AUDIO MUTE(YES/NO)]:[FLASH MODE(AUTO/ON/OFF)]: [DEVICE POSITION(BACK/FRONT/UNSPECIFIED)] sein. Beispiel: <code>@MC-FIELD-FILE-VIDEOCAPTURE=20:YES:OFF:BACK</code> ist Videoaufnahme, maximale Dauer 20 Sekunden, Audio ist stummgeschaltet, Kamerablitz ist AUS, Kamera auf der RÜCKSEITE des Geräts verwenden. Beachten Sie, dass REDCap-File-Upload-Felder standardmäßig eine Größenbeschränkung von 35 MB haben und Videoaufnahmen große Dateien erzeugen."
data_entry_741 = "Sie können diese Seite verwenden, um mehrere Datensätze aus dem Projekt zu löschen oder alternativ Daten für mehrere Instrumente über mehrere Datensätze hinweg zu löschen. Treffen Sie unten Ihre Auswahl und klicken Sie dann auf den Button \"Löschen\". Um eine dieser beiden Löschaktionen durchzuführen, müssen Sie Folgendes haben:"
data_entry_742 = "Um ganze Datensätze zu löschen, benötigen Sie Rechte zum \"Datensätze löschen\"."
data_entry_743 = "Um die Option Teilweise löschen durchzuführen, benötigen Sie entweder Rechte zum \"Datensätze löschen\" ODER Sie benötigen \"Löschen\"-Rechte auf Instrumentebene für die ausgewählten Instrumente."
data_entry_744 = "Duo-Push-Benachrichtigung senden"
data_entry_745 = "Benutzern erlauben, mit ihrer 6-stelligen PIN für die Zwei-Faktor-Authentifizierung oder per Duo-Push-Benachrichtigung anstelle ihres Passworts zu e-signieren."
data_entry_746 = "Beim E-Signieren Benutzern erlauben, ihre 6-stellige PIN anzugeben oder eine Duo-Push-Benachrichtigung <u>nur einmal</u> pro Sitzung durchzuführen."
data_entry_747 = "Diese Einstellung ist nur für Benutzer zu verwenden, die beim E-Signieren eine 2FA-PIN oder Duo-Push-Benachrichtigung anstelle eines Passworts verwenden müssen. Wenn aktiviert, müssen Benutzer, nachdem sie bereits eine E-Signatur geleistet haben, ihre 6-stellige PIN während derselben REDCap-Sitzung nicht erneut eingeben (oder, falls zutreffend, keine Duo-Push-Benachrichtigung erneut durchführen)."
data_entry_748 = "Alternativ können Sie eine Duo-Push-Benachrichtigung an Ihr Gerät senden:"
data_entry_749 = "Hinweis: Es wurde erkannt, dass <u>Sie Ihr Passwort oben nicht zum E-Signieren verwenden können</u>, sondern stattdessen nur mit Ihrer 6-stelligen PIN für die Zwei-Faktor-Authentifizierung e-signieren können (oder, falls zutreffend, per Duo-Push-Benachrichtigung)."
