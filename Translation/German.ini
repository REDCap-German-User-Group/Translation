report_builder_233 = "<p>Die Funktion <i>Schnell festlegen</i> bietet eine Möglichkeit, Report-Felder schnell in einem einzigen Vorgang festzulegen. Fügen Sie einfach die Feldnamen, die Sie in den Report aufnehmen möchten, in das untenstehende Textfeld ein. Feldnamen müssen durch Leerzeichen, Komma, Semikolon, Tabulator oder Zeilenumbruch getrennt werden.</p><p>Durch Klicken auf <b>Hinzufügen</b> werden zusätzliche Felder in der hier aufgeführten Reihenfolge am Ende des Reports hinzugefügt. Durch Klicken auf <b>Ersetzen</b> werden die vorhandenen Report-Felder durch die hier aufgeführten Felder ersetzt.</p>"
