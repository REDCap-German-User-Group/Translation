rep_forms_events_02 = "Wiederholte Instrumente und Events exportieren"
rep_forms_events_03 = "Diese Methode erlaubt Ihnen, eine Liste der wiederholten Instrumente und wiederholten Events für ein Projekt zu exportieren. Dies umfasst den eindeutigen Instrumentnamen, wie er in der zweiten Spalte des Data Dictionary zu sehen ist, sowie das zugehörige benutzerdefinierte Label des jeweiligen wiederholten Instruments. Bei longitudinalen Projekten wird außerdem der eindeutige Eventname für jedes wiederholte Instrument zurückgegeben. Zusätzlich werden wiederholte Events als separate Elemente zurückgegeben, bei denen der Instrumentname leer/null ist, um anzuzeigen, dass es sich um ein wiederholtes Event handelt (und nicht um ein wiederholtes Instrument)."
