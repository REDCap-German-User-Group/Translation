create_project_43 = "SCHRITT 1: Wählen Sie den Projekttyp aus, den Sie erstellen möchten"
create_project_44 = "Jede der folgenden Optionen steht für einen anderen Projekttyp, der erstellt werden kann. Wenn Sie lediglich einen Fragebogen erstellen und damit Ergebnisse von Teilnehmern erfassen möchten, ist 'Einzelner Fragebogen' möglicherweise am besten geeignet. Wenn Sie an traditioneller Projektdatenerhebung interessiert sind, bei der alle Personen, die Daten eingeben, als REDCap-Benutzer autorisiert wurden, sind Eingabeformulare wahrscheinlich der passendste Projekttyp. Der Projekttyp 'Einzelner Fragebogen + Eingabeformulare' ist nützlich, wenn Sie neue Datensätze in Ihrem Projekt anhand von Fragebogenantworten der Teilnehmer anlegen möchten; die Fragebogenantwort startet also die Datenerhebung (z. B. ein Vorab-Screening-Fragebogen), und anschließend können autorisierte REDCap-Benutzer mit den von Ihnen definierten Datenerhebungsinstrumenten weitere Daten zu jeder Fragebogenantwort/jedem Datensatz hinzufügen."
create_project_45 = "(z. B. klassische Datenbank)"
create_project_47 = "SCHRITT 2: Erhebungsformat für Eingabeformulare wählen"
create_project_48 = "Das 'klassische' Datenerhebungsformat ist die beste Option, wenn alle Datenerhebungsinstrumente nur einmal pro Teilnehmer/Datensatz im Projekt verwendet werden müssen. Wenn einige Instrumente wiederholt verwendet werden müssen, um Daten mehrfach zu erheben (z. B. ein Instrument namens 'Visit Data' über zehn Besuche desselben Teilnehmers hinweg), ist die Option 'longitudinal / wiederholte Formulare' wahrscheinlich am besten geeignet. Zusätzlich erlaubt das longitudinale Format bei Bedarf auch die Verwendung des Terminplanungsmoduls (siehe weitere Informationen unten)."
create_project_49 = "Klassisch"
create_project_50 = "(jedes Formular kann <u>einmal</u> für jeden Teilnehmer/Datensatz verwendet werden)"
create_project_51 = "Longitudinal / wiederholte Formulare"
create_project_52 = "(jedes Formular kann <u>einmal oder mehrmals</u> für jeden Teilnehmer/Datensatz verwendet werden)"
create_project_53 = "Terminplanungsmodul aktivieren?"
create_project_54 = "Das Terminplanungsmodul kann Zeitpläne für Ihren Projektkalender erzeugen, die automatisch aus projektdefinierten Events (z. B. Besuche, Zeitpunkte) generiert werden. Terminplanung ist nur für Projekte mit longitudinaler Datenerhebung verfügbar."
create_project_55 = "Vorname"
create_project_56 = "MI"
create_project_57 = "Nachname"
create_project_58 = "Name des P.I. wie in Publikationen angegeben (falls zutreffend):"
create_project_59 = "E-Mail des P.I. (falls zutreffend)"
create_project_60 = "Zusätzliche Optionen:"
create_project_61 = "Randomisierungsmodul aktivieren?"
create_project_63 = "Benutzerrechte können so gesetzt werden, dass nur bestimmte Benutzer die Randomisierung einrichten, die Randomisierung durchführen oder das Zuweisungs-Dashboard zur Fortschrittsanzeige ansehen dürfen. Wenn jemand 'Randomize'-Rechte erhält, kann diese Person bereits erhobene Daten für die Randomisierungs-Strata-Felder anzeigen und ändern (falls Stratifizierung verwendet wird), während sie die Randomisierung durchführt, selbst wenn sie nicht ausdrücklich formularbezogene Rechte zum Anzeigen des Formulars hat, auf dem ein Strata-Feld existiert. In dieser Weise übersteuern Randomize-Rechte formularbezogene Rechte, allerdings nur für die Randomisierungs-Strata-Felder."
create_project_64 = "(z. B. Datenerfassung + Folgefragebögen; Vorab-Screening-Fragebogen + nachgelagerte Datenerfassung)"
create_project_66 = "Projektvorlage wählen"
create_project_67 = "Leeres Projekt (blanko)"
create_project_68 = "Vorlage verwenden (unten auswählen)"
create_project_69 = "Vorlagenbeschreibung"
create_project_71 = "Nachdem Sie in den folgenden Schritten Datenerhebungsinstrumente erstellt haben, können Sie und andere Benutzer in diesem Projekt Daten für diese Instrumente eingeben. Zusätzlich können Sie jedes Instrument als Fragebogen aktivieren und dann Daten für dieses Instrument von Fragebogenteilnehmern erheben. Der einzige Unterschied besteht darin, wer die Daten eingibt: Projektbenutzer, Fragebogenteilnehmer oder beide. Für Fragebögen können Sie eine Teilnehmerliste verwenden, um Ihre Empfänger per E-Mail einzuladen und nachzuverfolgen, wer Ihre Fragebögen ausgefüllt hat. Wenn Ihre erste Datenerhebung als Fragebogen aktiviert ist, können Sie außerdem einen öffentlichen Fragebogenlink verwenden, also einen einzelnen Link, der an alle Teilnehmer per E-Mail gesendet oder sogar auf einer Website veröffentlicht werden kann."
create_project_72 = "Ich stimme zu"
create_project_73 = "Vorlagentitel"
create_project_74 = "Vorlage auswählen"
create_project_77 = "Keine Vorlagen verfügbar"
create_project_78 = "Vorlagen hinzufügen (nur Admins)"
create_project_79 = "Projektvorlagen"
create_project_80 = "Jedes beliebige Projekt in REDCap kann von einem Administrator als Projektvorlage festgelegt werden. Sobald es als Vorlage festgelegt wurde, steht dieses Projekt beim Erstellen eines neuen Projekts als Option zur Verfügung. Ein Benutzer kann dieses Projekt dann als Vorlage wählen, von der aus er sein neues Projekt erstellt. Beim Erstellen eines neuen Projekts mit einer Vorlage werden alle Datenerhebungsinstrumente, Felder, Fragebögen und allgemeinen Projekteinstellungen der Vorlage zum Zeitpunkt der Erstellung dem neuen Projekt hinzugefügt. Unten finden Sie Optionen zum Verwalten aller verfügbaren Vorlagen, einschließlich Hinzufügen, Bearbeiten oder Entfernen eines Projekts als Vorlage."
create_project_81 = "Liste der Projektvorlagen"
create_project_82 = "[Projekttitel fehlt]"
create_project_83 = "Neue Vorlage hinzufügen"
create_project_84 = "Vorlage bearbeiten"
create_project_85 = "anderes Projekt wählen"
create_project_86 = "Hinzugefügt!"
create_project_87 = "Projekt:"
create_project_88 = "Unten können Sie den Titel und die Beschreibung der Vorlage für dieses Projekt hinzufügen oder bearbeiten, so wie sie Benutzern beim Erstellen eines neuen Projekts angezeigt werden. Ein Projekt als Vorlage festzulegen erlaubt, es als schnellen Ausgangspunkt zu verwenden, wenn Benutzer ein neues Projekt erstellen, sowie verschiedene Projektdesigns in REDCap zu veranschaulichen."
