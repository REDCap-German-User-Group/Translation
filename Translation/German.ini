system_config_635 = "Verwendung der Universal FROM-E-Mail-Adresse für angegebene E-Mail-Domains unterdrücken"
system_config_636 = "Standardmäßig wird die Universal FROM-E-Mail-Adresse für alle ausgehenden E-Mails verwendet. Wenn hier jedoch eine oder mehrere Domainnamen (z. B. vanderbilt.edu) angegeben sind, wird die Universal FROM-E-Mail-Adresse NICHT für ausgehende E-Mails verwendet, bei denen die FROM-/Absender-E-Mail-Adresse mit einer dieser Domains übereinstimmt; stattdessen bleibt die FROM-/Absender-E-Mail-Adresse unverändert."
system_config_637 = "Konfiguration für ausgehende E-Mails"
system_config_638 = "TIPP: Sie möchten diese Option wahrscheinlich nicht verwenden, es sei denn, REDCap kann einige oder alle ausgehenden E-Mails nicht erfolgreich senden (häufig, weil E-Mail-Anbieter E-Mails blockieren, deren 'From'-Adresse nicht mit dem Domainnamen des REDCap-Servers übereinstimmt, z. B. wenn eine E-Mail von joeuser@gmail.com vom Server https://redcap.vumc.org gesendet wird)."
system_config_639 = "Im Feld 'Verwendung der Universal FROM-E-Mail-Adresse für angegebene E-Mail-Domains unterdrücken' liegt ein Fehler vor; die unten aufgeführten Elemente sind keine gültigen Domainnamen. Bitte korrigieren Sie die ungültigen Domainnamen unten und versuchen Sie es erneut. Denken Sie daran, dass pro Zeile nur eine Domain eingegeben werden sollte."
system_config_641 = "External Module aktivieren"
system_config_642 = "Einstellungen zum External Module Framework"
system_config_643 = "Integrierten Prozess aktivieren, mit dem Benutzer anfragen können, dass ein External Module für ein Projekt aktiviert wird?"
system_config_644 = "Ja, Button 'Aktivierung anfragen' für alle auffindbaren Module anzeigen"
system_config_645 = "Nein, Button 'Aktivierung anfragen' für alle auffindbaren Module ausblenden"
system_config_646 = "HINWEIS: Das Aktivieren dieser Einstellung zeigt den Button nur für Module an, die im System als 'Discoverable' markiert wurden."
system_config_647 = "Display Name in allen ausgehenden E-Mails verwenden?"
system_config_648 = "Ja, Anzeigenamen des Absenders einschließen (bevorzugt)"
system_config_649 = "Nein, Anzeigenamen des Absenders nicht einschließen"
system_config_650 = "Anzeigenamen werden in E-Mails verwendet, um im E-Mail-Client des Empfängers neben der E-Mail-Adresse des Absenders beispielsweise den Namen einer Person anzuzeigen und so weiteren Kontext zur Identität des Absenders bereitzustellen. Beispiel: 'Joe User <joe.user@mysite.edu>'. Wenn der Anzeigename hier ausgeschlossen/deaktiviert wird, sieht der Empfänger im E-Mail-Client lediglich die E-Mail-Adresse des Absenders und nicht dessen Namen; außerdem werden alle Optionen zum Hinzufügen eines Display Name in der Benutzeroberfläche ausgeblendet (z. B. für ausgehende Umfrageeinladungen)."
system_config_651 = "GRUND FÜR DIE VERWENDUNG: Die Display-Name-Funktion muss möglicherweise deaktiviert werden, wenn Ihre Institution unverhältnismäßig viele nicht zugestellte E-Mails hat, weil E-Mail-Server sie blockieren, manchmal aufgrund der Verwendung des Display Name. Wenn dieses Problem auftritt, empfehlen wir, sowohl mit aktivierter als auch deaktivierter Display-Name-Einstellung zu testen, um zu prüfen, ob der Display Name die Ursache für nicht zugestellte E-Mails sein könnte."
system_config_653 = "Wenn außerdem auf 'Ja' gesetzt, können normale Benutzer auf der Seite 'Designate Instruments For My Events' Instrumente Events zuweisen, die noch nicht zugewiesen wurden; sie können jedoch keine bereits zugewiesenen Instrumente wieder abwählen."
