report_builder_209 = "Um diesen Report \"öffentlich\" zu machen und den Zugriff auf den Report über einen öffentlichen Link zu ermöglichen, müssen Sie zunächst die Anforderungen erfüllen und außerdem den untenstehenden Aussagen zustimmen, indem Sie <u>nach dem Lesen die zugehörigen Kontrollkästchen aktivieren</u>. Sobald dies abgeschlossen ist, klicken Sie unten auf den Button \"Genehmigung beantragen, um Report öffentlich zu machen\", um den Vorgang abzuschließen. <b>HINWEIS: Diese Anfrage wird an einen REDCap-Administrator gesendet, der sie genehmigen muss</b>. Danach erhalten Sie eine E-Mail-Benachrichtigung, sobald der Report genehmigt wurde."
