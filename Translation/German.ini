design_477 = "HINWEIS: Umbenanntes Feld wird in Berechnungsgleichung oder Branching Logic verwendet"
design_478 = "HINWEIS: Das Feld, das Sie gerade umbenannt haben, wird in der Branching Logic oder Berechnungsgleichung eines oder mehrerer Felder verwendet. Unten finden Sie eine Liste der Felder (mit Variable und Label), die das umbenannte Feld verwenden. Sie müssen die Branching Logic oder Berechnungsgleichung ALLER unten aufgeführten Felder ändern, andernfalls entsteht beim Eingeben von Daten ein Fehler in Ihrem Eingabeformular/Fragebogen. Andernfalls könnten Sie das Feld einfach wieder auf seinen ursprünglichen Variablennamen zurückbenennen, um dieses Problem zu vermeiden."
