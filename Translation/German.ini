survey_886 = "Berechnete Felder können in SMS- oder Sprachanruf-Umfragen nicht verwendet werden."
survey_887 = "Feldtyp ist unbekannt"
survey_888 = "Datei-Upload-Felder können in SMS- oder Sprachanruf-Umfragen nicht verwendet werden."
survey_889 = "Textfelder können in Sprachanruf-Umfragen nur verwendet werden, wenn sie Integer- oder Number-Validierung haben."
survey_890 = "Multiple-Choice-Felder (Dropdown, Radio Buttons) können in Sprachanruf-Umfragen nur verwendet werden, wenn *alle* ihre roh codierten Werte numerisch sind."
survey_891 = "Checkbox-Felder können in Sprachanruf-Umfragen nicht verwendet werden."
survey_892 = "Notizfelder können in Sprachanruf-Umfragen nicht verwendet werden."
survey_893 = "PROBLEM:"
survey_894 = "Es wurden keine Umfragen aktiviert, daher gibt es hier nichts anzuzeigen."
survey_895 = "Die untenstehende Tabelle zeigt mögliche Probleme, die auftreten können, wenn eine Umfrage als Sprachanruf-Umfrage oder als SMS-Konversation verwendet wird. Um die Details eines Problems anzuzeigen, klicken Sie daneben auf den Link 'Anzeigen'; dadurch wird das Feld mit dem Problem sowie eine Beschreibung angezeigt, warum dieses Feld problematisch wäre. HINWEIS: Wenn eine untenstehende Umfrage als Sprachanruf-Umfrage oder SMS-Konversation durchgeführt wird, wird <b>jedes Feld mit einem Problem übersprungen</b>, es sei denn, das unten beschriebene Problem wird durch Ändern oder Entfernen des Felds behoben."
survey_898 = "(Wert von 0 bis 100 eingeben.)"
survey_899 = "Wenn Sie mit der nächsten Umfrage fortfahren möchten, drücken Sie eine beliebige Zahl."
survey_900 = "Wenn Sie mit der nächsten Umfrage fortfahren möchten, antworten Sie mit beliebigem Text auf diese Nachricht."
survey_901 = "Einladung anzeigen"
survey_902 = "Klicken, um die Einladung anzuzeigen"
survey_903 = "[nicht offengelegte Telefonnummer]"
survey_904 = "Sie müssen mindestens eines der Kontrollkästchen für die zu verwendenden Umfrageeinladungstypen auswählen."
survey_905 = "Um diese Frage zu überspringen, drücken Sie null."
survey_906 = "(Mit 0 antworten, um Frage zu überspringen)"
survey_907 = "HINWEIS: Jede Zeile muss entweder eine E-Mail-Adresse oder eine Telefonnummer (oder beides) enthalten. Wenn der Teilnehmer eine Telefonnummer, aber keine E-Mail-Adresse hat, können Sie die Zeile mit der Telefonnummer beginnen."
survey_908 = "Wer kann Twilio-Dienste in einem bestimmten Projekt aktivieren?"
survey_909 = "Alle Benutzer (mit Projekt-Design-Rechten)"
survey_910 = "Nur Administratoren können die Einstellung sehen und aktivieren"
survey_911 = "Wenn 'Nur Administratoren' ausgewählt ist, sehen normale Benutzer die Einstellung nicht einmal auf der Projekt-Setup-Seite des Projekts (nur Administratoren können sie sehen und aktivieren). Wenn 'Alle Benutzer' ausgewählt ist, kann jeder Benutzer mit Projekt-Design-/Setup-Rechten in diesem Projekt die Einstellung sehen und auch selbst aktivieren, um Twilio-Dienste in seinem Projekt zu nutzen."
survey_912 = "HINWEIS: Diese Einstellung gilt nur, wenn für die unmittelbar darüberliegende Einstellung die Option 'Nur Administratoren' ausgewählt ist."
survey_917 = "[Betreff wird in SMS- und Sprachanrufeinladungen nicht verwendet]"
survey_918 = "[Obiger Nachrichtentext wird in Sprachanrufeinladungen nicht verwendet]"
survey_919 = "FEHLER: Verbindung zu Twilio konnte nicht erfolgreich hergestellt werden, was wahrscheinlich bedeutet, dass Account SID oder Auth Token nicht korrekt eingegeben wurde. Die Twilio-Einstellung kann erst aktiviert werden, wenn dies behoben ist."
survey_920 = "FEHLER: Die angegebene Telefonnummer gehört nicht zum Twilio-Konto. Bitte prüfen Sie, ob Sie die richtige Telefonnummer eingegeben haben. Wenn Sie noch keine Telefonnummer für Ihr Twilio-Konto gekauft haben, melden Sie sich bei Twilio.com an, gehen Sie zur Seite 'Numbers' und klicken Sie auf die Schaltfläche 'Buy a number', die Sie dann für dieses Projekt verwenden können. Die untenstehenden Nummern sind alle Telefonnummern, die dem Konto zugeordnet sind. Die Twilio-Einstellung kann erst aktiviert werden, wenn dies behoben ist."
survey_921 = "Unten wird die Umfrageeinladungsnachricht angezeigt, wie sie an den Umfrageteilnehmer gesendet wurde. Enthalten sind die Uhrzeit, zu der die Einladung gesendet wurde, der Absender, die E-Mail-Adresse (oder Telefonnummer) des Umfrageteilnehmers sowie Betreff und Nachricht der Einladung."
survey_922 = "Sicherstellen, dass Logik vor dem Senden der Einladung weiterhin wahr ist?"
survey_923 = "Diese Einstellung ist optional für automatisierte Umfrageeinladungen. Wenn aktiviert, wertet REDCap die Logik anhand der Datenwerte des Datensatzes erneut aus, wenn Datensatzwerte geändert werden, NACHDEM die Einladung geplant, aber BEVOR sie an den Befragten gesendet wurde. Wenn die Logik nicht mehr wahr ist (d. h. wenn sich Datenwerte in der Zeit nach Planung der Umfrageeinladung geändert haben), wird die Einladung nicht an den Befragten gesendet, sondern gelöscht (als wäre sie nie geplant worden). Wenn Einladungen aufgrund dieser Einstellung gelöscht werden, können Einladungen später *möglicherweise* erneut geplant werden, wenn Datenwerte so geändert werden, dass die Logik wieder wahr ergibt. Das Aktivieren dieser Einstellung gibt Ihnen mehr Kontrolle darüber, wann und wie Einladungen gesendet werden, wenn Sie bedingte Logik für automatisierte Umfrageeinladungen verwenden."
survey_925 = "<u>Standard-Einladungspräferenz</u> für neue Umfrageteilnehmende auswählen"
survey_926 = "FEHLER: Ihre Standard-Einladungspräferenz wurde nicht als Kontrollkästchen im Abschnitt 'Zu verwendende Umfrageeinladungstypen auswählen' markiert. Bitte markieren Sie entweder das entsprechende Kontrollkästchen oder ändern Sie Ihre Standard-Einladungspräferenz auf einen anderen Wert."
survey_927 = "Wurde Twilios 'Request Inspector' für dieses Konto deaktiviert?"
survey_929 = "Wurde nicht geprüft! Sie müssen dies jetzt prüfen, bevor Twilio-Dienste aktiviert werden können."
survey_930 = "Jetzt prüfen?"
survey_931 = "Hinweis: Diese Prüfung kostet einen kleinen Geldbetrag, wobei Ihrem Twilio-Konto ein einminütiger Telefonanruf berechnet wird."
survey_934 = "Ja, er wurde deaktiviert."
survey_935 = "Zuletzt geprüft am"
survey_936 = "Jetzt erneut prüfen?"
survey_937 = "HINWEIS: Nur ein REDCap-Administrator kann die Twilio-Dienste in Ihrem Projekt aktivieren. Bitte kontaktieren Sie ihn, um zu besprechen, wie dies erfolgen kann."
survey_938 = "Sie können die Twilio-Dienste selbst aktivieren, indem Sie auf die Schaltfläche Aktivieren klicken; anschließend müssen Sie den bereitgestellten Anweisungen folgen, um diese Funktionalität in Ihrem Projekt vollständig zu aktivieren."
survey_940 = "HINWEIS: Das Ändern der Präferenz hier ändert sie für ALLE Umfragen in diesem Projekt für diesen Teilnehmer."
survey_941 = "HINWEIS: Einladungen hier werden in Echtzeit versendet. Bitte haben Sie Geduld, wenn Sie viele Einladungen versenden, da es ein paar Sekunden dauern kann, jede einzelne zu senden."
survey_942 = "Sie haben eingegeben"
survey_943 = "SMS-Konversationsoption kann nicht aktiviert werden"
survey_945 = "Antwortanweisungen automatisch an Fragen anhängen?"
survey_946 = "Wenn diese Option auf 'Nein' gesetzt ist, erhält der Umfragebefragte nur das Feldlabel einer Frage und den Text der Auswahloptionen unverändert. Das bedeutet, dass Sie Ihren Fragetext z. B. anpassen müssen zu 'Für Schokolade drücken Sie 1. Für Vanille drücken Sie 2...'. Wenn Sie diese Option jedoch auf 'Ja' setzen, können Sie Ihren bestehenden Fragetext 'Schokolade, Vanille, ...' belassen, und REDCap fügt bei einem Sprachanruf z. B. automatisch 'Drücken Sie 1' an das Ende des Auswahltexts 'Schokolade' an. Für eine SMS-Nachricht wird '(1)' an den Anfang des Auswahltexts in der Nachricht gesetzt."
survey_947 = "Nein, nicht anhängen"
survey_948 = "Ja, Antwortanweisungen automatisch anhängen"
survey_949 = "Vorschlag: Wenn Sie planen, dass alle Befragten die Umfrage nur über ein einziges Medium ausfüllen (Webseite, SMS oder Sprachanruf), ist es oft am besten, diese Option auf 'Nein' zu setzen und den Text jeder Frage für dieses Medium anzupassen. Wenn Sie jedoch zwei oder mehr verschiedene Medien zur Erhebung von Antworten verwenden, kann 'Ja' mehr Flexibilität bieten, weil REDCap den Text für jedes Medium passend anzeigt."
survey_951 = "Drücken Sie"
survey_952 = "(Für FALSE 0 eingeben. Für TRUE 1 eingeben.)"
survey_953 = "(Für NEIN 0 eingeben. Für JA 1 eingeben.)"
survey_954 = "Teilnehmenden erlauben, Fragen zu überspringen?"
survey_955 = "SMS-Einladung (enthält Umfragelink)"
survey_956 = "Um die Umfrage zu beginnen, besuchen Sie"
survey_957 = "Umfrageeinladung mit Umfragelink per SMS senden"
survey_958 = "HINWEIS: Die Twilio-Telefonnummer"
survey_959 = "wird derzeit von einem anderen REDCap-Projekt auf diesem Server verwendet. Dieselbe Twilio-Telefonnummer kann nicht in mehreren REDCap-Projekten verwendet werden. Sie müssen daher in Ihrem Twilio-Konto eine neue Telefonnummer kaufen und diese neue Nummer für dieses Projekt verwenden."
survey_960 = "Um eine untenstehende Umfrage zu beginnen, antworten Sie mit ihrem Zugangscode:"
survey_961 = "Bitte wählen Sie eine der folgenden Umfragen."
survey_963 = "Teilnehmer wählen lassen, welche Umfrage als Nächstes auszufüllen ist"
survey_964 = "Verhalten bei überlappenden SMS-Einladungen"
survey_967 = "DATENSCHUTZ- & SICHERHEITSINFO: Es ist wichtig zu verstehen, dass diese Funktion den Drittanbieterdienst Twilio.com verwendet, was bedeutet, dass alle Sprachanrufe und SMS-Nachrichten über Twilios Server geleitet werden. REDCap unternimmt jedoch große Anstrengungen, um sicherzustellen, dass Sprachanrufaufzeichnungen und SMS-Transkriptionen nicht in Twilios Protokollen verbleiben, sondern kurz nach Abschluss entfernt werden. Dies geschieht aus Sicherheits- und Datenschutzgründen (z. B. HIPAA), sodass die Telefonnummern Ihrer Umfrageteilnehmenden und ihre Umfrageantworten nicht dauerhaft auf Twilios Servern protokolliert werden, sondern sicher in REDCap verbleiben."
survey_970 = "SPRACHANRUF-UMFRAGEN: Wenn Teilnehmende eine Umfrage als Sprachanruf ausfüllen, werden Fragen einzeln gestellt. Der Twilio-Dienst verwendet Text-to-Speech-Technologie, um die Fragen dem Teilnehmer hörbar am Telefon vorzulesen. Sie können Sprache und/oder Dialekt wählen, in dem der Text vorgelesen werden soll. Teilnehmende antworten durch Eingabe von Zahlen auf der Telefontastatur; daher können aufgrund dieser Einschränkung nur numerische Antworten verwendet werden (dies umfasst Integer-/Number-Felder sowie Multiple-Choice-Fragen mit numerischen Codierungen, wobei der Teilnehmer den numerisch codierten Wert auf seiner Tastatur eingibt, nicht das Label, das ihm vorgelesen wird). Eine Frage könnte z. B. eine Ja-Nein-Frage sein wie 'Mögen Sie Eiscreme? Ja, drücken Sie 1. Nein, drücken Sie 0.' oder eine Zahlenfrage wie 'Wie alt sind Sie?'."
survey_971 = "Um mehr über die Verwendung von Twilio-SMS- und Sprachanrufdiensten in REDCap zu erfahren, kontaktieren Sie Ihren lokalen REDCap-Administrator."
survey_972 = "UMFRAGEKOMPATIBILITÄT: Die meisten Umfragefunktionen von REDCap funktionieren auch beim Ausfüllen einer Umfrage per SMS oder als Sprachanruf weitgehend gleich. Dazu gehören das Erzwingen erforderlicher Felder, Feldvalidierung, Verzweigungslogik, Verwendung der Umfrage-Warteschlange für mehrere Umfragen (funktioniert nur mit aktiviertem Auto-Start), Umfrage-E-Mail-Benachrichtigungen und -Bestätigungen, Teilnehmerliste, automatisierte Umfrageeinladungen, Umfrage-Stop-Aktionen und computeradaptive Tests (CATs), die aus der REDCap Shared Library heruntergeladen wurden. Eine der wenigen nicht kompatiblen Umfragefunktionen ist die Umfrage-Login-Funktion."
survey_973 = "SMS-UMFRAGEN: Wenn Teilnehmende eine SMS-Umfrage ausfüllen, werden Fragen einzeln als SMS-Textnachrichten-Konversation/Thread gestellt. SMS-Umfragen bieten mehr Antwortmöglichkeiten als Sprachanrufe. Während Teilnehmende bei Sprachanrufen nur mit Zahlen antworten können, können sie bei einer SMS-Umfrage mit jeder Art von alphanumerischem Text antworten. HINWEIS:"
survey_975 = "KOSTEN: Um die Twilio-SMS- und Sprachanrufdienste in einem REDCap-Projekt zu verwenden, müssen Sie Ihr Projekt mit Ihrem Twilio-Konto verbinden, indem Sie während des Einrichtungsprozesses Ihre Twilio-Zugangsdaten in REDCap eingeben. Wenn REDCap über diesen Dienst Anrufe tätigt und/oder SMS-Nachrichten sendet, werden alle Gebühren Ihrem Twilio-Konto gemäß der Nutzung berechnet. Dies geschieht nicht durch REDCap, sondern intern durch Twilio, während Sie dessen Dienste verwenden. Auf diese Weise werden keine Geldtransaktionen durch REDCap vorgenommen; daher liegt es in Ihrer Verantwortung, genügend Guthaben in Ihrem Twilio-Konto zu halten, um sicherzustellen, dass der Dienst für Ihr REDCap-Projekt weiterhin funktioniert. Wenn Ihr Twilio-Konto kein Guthaben mehr hat, funktionieren die Twilio-Dienste in REDCap nicht mehr. Informationen zu den Kosten jedes Anrufs oder jeder SMS-Nachricht finden Sie in Ihrem Twilio-Konto bei den Tarifen."
survey_976 = "ANWEISUNGEN ZUR TWILIO-KONTOEINRICHTUNG:"
survey_977 = "Text auf separater Seite anzeigen"
survey_978 = "Umfragen in derselben Reihenfolge ausfüllen, in der der Teilnehmer die Einladungen erhalten hat"
survey_979 = "Nur neueste Einladung verwenden (frühere Einladungen ignorieren)"
survey_980 = "Wenn Sie SMS-Einladungen für mehrere Umfragen innerhalb dieses Projekts senden, müssen Sie das Standardverhalten für den Fall wählen, dass ein Teilnehmer gleichzeitig SMS-Einladungen zu mehreren Umfragen erhalten hat und im selben SMS-Thread auf mehrere Einladungen antwortet. (Dies ist selten, muss aber dennoch berücksichtigt werden.) Wenn der Teilnehmer mehrere SMS-Einladungen erhalten hat, kann das Verhalten gemäß der rechts im Dropdown ausgewählten Option erfolgen."
survey_981 = "Nur verwendet, wenn SMS-Einladungen für mehrere Umfragen in diesem Projekt gesendet werden."
survey_982 = "IHRE ANTWORTEN LÖSCHEN? Sind Sie sicher, dass Sie die Umfrage von vorn beginnen möchten? Bitte beachten Sie, dass dadurch ALLE bereits für diese Umfrage eingegebenen Antworten gelöscht werden."
survey_984 = "Text-to-Speech-Funktionalität"
survey_985 = "(Ermöglicht, Text auf der Umfrageseite für Teilnehmende hörbar vorzulesen.)"
survey_986 = "Wenn aktiviert, werden neben jedem Text auf der Umfrageseite Symbole angezeigt; beim Klicken wird der Text dem Teilnehmer laut vorgelesen (Computerlautsprecher müssen eingeschaltet sein)."
survey_987 = "Administratoren: Wenn Sie die Text-to-Speech-Funktionalität deaktivieren möchten, damit diese Option hier nicht angezeigt wird, können Sie dies auf der Seite Module-/Dienstekonfiguration im Control Center tun. Nach der Deaktivierung können Benutzer diese Option nicht mehr sehen oder diese Funktion verwenden."
survey_988 = "Sprache des vorzulesenden Textes:"
survey_990 = "Administratoren: So deaktivieren Sie diese Funktion"
survey_991 = "* Führt keine Übersetzung durch, sondern liest den Text nur in der hier angegebenen Sprache vor."
survey_995 = "(anfangs Ein, kann aber vom Teilnehmer ausgeschaltet werden)"
survey_996 = "(anfangs Aus, kann aber vom Teilnehmer eingeschaltet werden)"
survey_997 = "Sprachausgabe aktivieren"
survey_998 = "Sprachausgabe deaktivieren"
survey_999 = "Nächstes Umfrageinstrument nach Abschluss dieser Umfrage automatisch starten"
survey_1000 = "Das Verknüpfen von Umfragen wird nur innerhalb desselben Events unterstützt und muss für jede Umfrage aktiviert werden, die Sie verknüpfen möchten. Diese Funktion ermöglicht es, separate Umfrageinstrumente so aneinanderzureihen, dass sie für den Umfrageteilnehmer wie eine einzige Umfrage erscheinen. Dies ist besonders nützlich für komplexe longitudinale Projekte, in denen unterschiedliche Kombinationen von Instrumenten in separaten Events gegeben werden. Wenn aktiviert und dies die letzte Umfrage ist, wird die unten ausgewählte Beendigungsoption verwendet. HINWEIS: Wenn Sie erweiterte bedingte Logik verwenden möchten, um zu steuern, zu welcher Umfrage der Teilnehmer als Nächstes gelangt, sollten Sie die Umfrage-Warteschlange verwenden, die im Online Designer aktiviert werden kann."
survey_1001 = "Automatisch mit nächstem Umfrageinstrument fortfahren"
survey_1003 = "Ihre Umfrageeinstellungen wurden erfolgreich gespeichert!"
survey_1006 = "Wenn neue Teilnehmende über ein Dateneingabeformular erstellt werden (anstatt über eine Umfrage), können Sie deren Standard-Einladungspräferenz auswählen, die ihnen bei Erstellung ihres Datensatzes zugewiesen wird. Dies ist nützlich, wenn Sie Datensätze über Datenimport oder auf einem Dateneingabeformular erstellen, aber später Umfrageeinladungen für SMS-Umfragen oder Sprachanruf-Umfragen senden möchten; diese Einstellung setzt dann automatisch die Einladungspräferenz für Sie. Ohne diese Einstellung müssten Sie die Präferenz jedes Teilnehmers einzeln in der Teilnehmerliste setzen. Außerdem wird dieser Wert als vorausgewählte Einstellung der Zustellpräferenz auf der Teilnehmerlistenseite verwendet, wenn neue Teilnehmende zur Liste hinzugefügt werden."
survey_1007 = "Um an der Umfrage teilzunehmen, rufen Sie bitte unter dieser Telefonnummer zurück."
survey_1008 = "(die nicht vollständig geantwortet haben)"
survey_1009 = "HINWEIS: Jeder gesprochene Text wird an einen von Vanderbilt University Medical Center gehosteten Dienst gesendet, der den IBM Watson Text-to-Speech API-Dienst verwendet. Beachten Sie: Wenn die Umfrage Piping verwendet, werden aus Datenschutzgründen Daten, die aus Identifikatorfeldern gepiped werden, *nicht* zusammen mit dem restlichen Text an den Dienst gesendet, sondern geschwärzt."
