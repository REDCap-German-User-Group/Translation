design_267 = "Automatische Benennung der Variable anhand ihres Feldlabels aktivieren?"
design_268 = "Automatische Variablenbenennung aktivieren?"
design_269 = "<b>HINWEIS: Best Practices empfehlen, die automatische Benennung deaktiviert zu lassen, damit Sie eigene Variablennamen manuell definieren können.</b> Bitte beachten Sie, dass bei Aktivierung der automatischen Variablenbenennung unerwünschte Variablennamen entstehen können, die die statistische Analyse Ihrer Daten erschweren, umständlich machen oder verwirrend sein können."
design_270 = "Es wird empfohlen, Variablen so zu benennen, dass sie ausreichend beschreibend und zugleich kurz sind. Zum Beispiel könnte die Frage 'What is your sex?' von einem Benutzer manuell als Variable 'sex' definiert werden. Bei aktivierter automatischer Variablenbenennung würde daraus stattdessen 'what_is_your_sex', was weniger prägnant und unnötig lang ist."
design_271 = "Wenn Sie Ihre Variablennamen nicht manuell definieren möchten, etwa weil Sie keine ernsthafte Datenanalyse durchführen werden oder aus anderen Gründen, können Sie die automatische Benennung aktivieren, indem Sie unten auf den Button 'Aktivieren' klicken."
design_272 = "FEHLER! Nur Administratoren dürfen 'sql'-Felder hinzufügen oder ändern."
design_273 = "HINWEIS: Das Feld, das Sie gerade gelöscht haben, wird in der Branching Logic oder Berechnungsgleichung eines oder mehrerer Felder verwendet. Unten finden Sie eine Liste der Felder (mit Variable und Label), die das gelöschte Feld verwenden. Sie müssen die Branching Logic oder Berechnungsgleichung ALLER unten aufgeführten Felder ändern, andernfalls entsteht beim Eingeben von Daten ein Fehler in Ihrem Eingabeformular/Fragebogen, weil dieses Feld nicht mehr existiert."
