ws_169 = "Vorschaudaten werden abgerufen von"
ws_170 = "REDCap ruft derzeit Vorschaudaten für diesen Datensatz ab."
ws_171 = "Nachdem dies abgeschlossen ist, prüfen Sie die untenstehenden Vorschaudaten, um sicherzustellen, dass die Werte mit dem Datensatz übereinstimmen, den Sie aus dem externen Quellsystem abrufen möchten. Wenn sie korrekt sind, klicken Sie auf Speichern, um diesen Wert zu speichern und automatisch mit dem Abrufen von Daten aus dem Quellsystem zu beginnen. Wenn die unten angezeigten Daten für den von Ihnen eingegebenen Wert nicht korrekt sind, klicken Sie auf Abbrechen, um den Wert zu ändern."
