random_150 = "Die dem Datensatz zugewiesene Randomisierungsnummer. Bei Randomisierung in einem Textfeld (verblindete Zuteilung) entspricht dies dem Piping des Randomisierungsfeldes. Bei Randomisierung in einem kategorialen Feld (offene Zuteilung) ist dies die Randomisierungsnummer, die mit der Randomisierungsgruppen-Zuteilung verknüpft ist, sofern eine hochgeladen wurde (dies ist optional).<br>Verwenden Sie <code>:n</code>, um auf eine bestimmte Randomisierung zu verweisen, wenn ein Project mehr als eine hat (Standard=1)."
random_151 = "Das <strong>Server</strong>-Datum und die Uhrzeit, zu der ein Datensatz randomisiert wurde. In einem Piping-Kontext, z. B. in einem Feldlabel, einer Umfrageeinladung oder innerhalb des @DEFAULT Action Tags, wird das Format von Datum und Uhrzeit basierend auf den Anzeigeeinstellungen für Datum/Uhrzeit des aktuellen Benutzers angezeigt. Wenn Sie den Rohwert zurückgeben lassen möchten, der stattdessen im Format 'YYYY-MM-DD HH:MM:SS' vorliegt und besser für bedingte Logik oder berechnete Felder geeignet wäre, hängen Sie einfach <code>:value</code> an.<br>Verwenden Sie <code>:n</code>, um auf eine bestimmte Randomisierung zu verweisen, wenn ein Project mehr als eine hat (Standard=1)."
random_152 = "Das <strong>UTC</strong>-Datum und die Uhrzeit, zu der ein Datensatz randomisiert wurde. In einem Piping-Kontext, z. B. in einem Feldlabel, einer Umfrageeinladung oder innerhalb des @DEFAULT Action Tags, wird das Format von Datum und Uhrzeit basierend auf den Anzeigeeinstellungen für Datum/Uhrzeit des aktuellen Benutzers angezeigt. Wenn Sie den Rohwert zurückgeben lassen möchten, der stattdessen im Format 'YYYY-MM-DD HH:MM:SS' vorliegt und besser für bedingte Logik oder berechnete Felder geeignet wäre, hängen Sie einfach <code>:value</code> an.<br>Verwenden Sie <code>:n</code>, um auf eine bestimmte Randomisierung zu verweisen, wenn ein Project mehr als eine hat (Standard=1)."
