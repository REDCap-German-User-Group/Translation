identifier_check_06 = "Dieses Modul hilft Ihnen einzuschätzen, ob einige Felder möglicherweise Identifikatoren sind, und ermöglicht es Ihnen anschließend, solche Felder für höhere Datensicherheit einfach als Identifikatoren zu markieren. Obwohl derselbe Vorgang auch im Data Dictionary oder Online Designer durchgeführt werden kann, bietet diese Seite eine optimierte Möglichkeit, Felder sehr schnell als Identifikatoren zu markieren. Basierend auf dem Variablennamen oder der Feldbeschriftung können die unten aufgeführten Felder möglicherweise Identifikatoren enthalten (z. B. Name, Telefonnummer, Adresse). Bitte prüfen Sie die Einträge und wählen Sie alle Identifikatoren aus, wo dies zutrifft. Felder, die bereits als Identifikatoren markiert sind, sind unten bereits aktiviert."
