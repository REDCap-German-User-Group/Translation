data_export_tool_292 = "Da Sie für ein oder mehrere Datenerfassungsinstrumente Exportrechte 'De-identifiziert' oder 'Alle Identifikatorfelder entfernen' haben, können einige Felder basierend auf Ihren instrumentbezogenen Datenexportrechten automatisch aus den exportierten Daten entfernt werden. Wenn Sie außerdem eine der Checkboxen für die Einstellungen unten aktivieren, wird diese De-Identifizierungseinstellung auf alle verbleibenden Felder im resultierenden Datenexport angewendet."
data_export_tool_293 = "Dieses Feature ermöglicht Tableau-Benutzern (v10.0+), Tableau über ein API-Token mit einem REDCap-Projekt zu verbinden. Projektdaten können bei Bedarf exportiert werden und stehen dann innerhalb von Tableau zur Erstellung von Zusammenfassungen und Visualisierungen zur Verfügung. Klicken Sie rechts auf den Button und folgen Sie der Anleitung, um Ihre Daten nach Tableau zu exportieren."
