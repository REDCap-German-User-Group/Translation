control_center_4933 = "Hinweis: Wenn keine Projekt-ID gesetzt ist, ist Smart-Variable-Piping erheblich eingeschränkt."
control_center_4934 = "Hinweis: Nicht alle Smart Variables können auf dieser Seite verwendet werden."
control_center_4935 = "Abfragekontext bereitstellen"
control_center_4936 = "<p>Wenn <i>Abfragekontext verwenden</i> aktiviert ist, kann Kontext (Projekt-ID, Datensatzname, Event-ID usw.) gesetzt werden. Dieser Kontext wird verwendet, um <b>[<i class='fa-solid fa-bolt fa-xs' style='margin:0 1px;'></i>] Smart Variables</b> in SQL-Abfragen aufzulösen. Welche davon aufgelöst werden können, hängt davon ab, wie vollständig der Kontext definiert ist. Beispielsweise ist für die meisten Smart Variables eine Projekt-ID erforderlich (außer für jene, die auf dieser Seite explizit gesetzt werden).</p><p>Einige zusätzliche Smart Variables sind nur auf dieser Seite verfügbar: <code>[survey-id]</code>, <code>[user-id]</code>.</p><p>Außerdem werden bei aktiviertem Abfragekontext durch Klicken auf eine Tabelle in der Liste der REDCap-Datenbanktabellen automatisch <code>WHERE</code>-Klauseln für mehrere Felder hinzugefügt, wenn entsprechende Werte aus dem verfügbaren Kontext abgeleitet werden können.</p><p><b>Tipp:</b> Kontext kann manuell gesetzt werden, aber auf verschiedenen Seiten gibt es Shortcuts, die Kontextwerte automatisch setzen. Solche Shortcuts sind z. B. auf Dateneingabe- und Fragebogenseiten sowie auf verschiedenen anderen Projektseiten wie <i>Projektstart</i> und <i>Record Home Page</i> verfügbar (im Aktionen-Drop-down). Die Verwendung des Widgets <i>Zur Seite navigieren</i> mit dem Befehl <code>cc dqt</code> setzt in den meisten Fällen ebenfalls den Kontext der Seite, auf der es verwendet wird.</p><p>Um den Kontext zu löschen, deaktivieren Sie einfach <i>Abfragekontext verwenden</i> und wählen Sie erneut eine Datenbanktabelle aus.</p>"
