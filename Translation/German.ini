descriptive_popups_05 = "Popup-Beschreibung"
descriptive_popups_06 = "Diese Seite kann verwendet werden, um eingebettete beschreibende Popups zu erstellen und zu verwalten. Beschreibende Popups sind eigene Text-Popups, die sichtbar werden, wenn man mit der Maus über ein bestimmtes Wort oder eine bestimmte Phrase in einem Dateneingabeformular oder Fragebogen fährt. Sie bestehen aus zwei Hauptkomponenten: 1) dem Linktext, der einem Wort oder einer Phrase auf einem Formular oder Fragebogen entsprechen sollte, und 2) dem eigenen Text für den Popup-Inhalt. Sie können ein beschreibendes Popup so einstellen, dass es auf allen Instrumenten/Fragebögen (Standard) oder nur auf bestimmten funktioniert. Beschreibende Popups sind eine gute Möglichkeit, zusätzliche Informationen auf einem Formular oder Fragebogen zu vermitteln, ohne dass der Text Platz auf der Seite einnimmt."
