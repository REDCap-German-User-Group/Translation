messaging_21 = "REDCap Messenger ist eine Kommunikationsplattform, die direkt in REDCap integriert ist. Sie ermöglicht REDCap-Benutzern, einfach, effizient und sicher miteinander zu kommunizieren. Im Kern ist REDCap Messenger eine Chat-Anwendung, mit der REDCap-Benutzer direkte Einzel-Nachrichten senden oder Gruppenunterhaltungen mit anderen REDCap-Benutzern organisieren können."
