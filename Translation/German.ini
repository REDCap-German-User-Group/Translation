alerts_414 = "Diese Einstellung ist für Alarme & Benachrichtigungen optional. Wenn sie zusammen mit der Einstellung <b><i>'Vor dem Senden der Benachrichtigung sicherstellen, dass die Logik weiterhin wahr ist?'</i></b> und der Einstellung <b><i>'Mehrmals auf wiederkehrender Basis senden'</i></b> aktiviert ist, pausiert REDCap bereits geplante Wiederholungen dieses Alarms (anstatt sie zu löschen), wenn die Logik des Alarms falsch wird. Dies ist nützlich, wenn Sie erwarten, dass die Logik in Zukunft wieder wahr wird. Dies kann insbesondere bei zeitbasierter Logik der Fall sein, z. B. <code>datediff()</code>."
