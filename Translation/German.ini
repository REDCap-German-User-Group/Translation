mycap_mobile_app_674 = "Die MyCap-App aus Sicht eines Teilnehmers ansehen."
mycap_mobile_app_675 = "Einem Demo-Projekt mit der MyCap-Mobile-App beitreten"
mycap_mobile_app_676 = "Für dieses Projekt wurde noch keine MyCap-Version veröffentlicht. Daher schlägt ein Beitrittsversuch eines Teilnehmers zu diesem Projekt in der MyCap-Mobile-App fehl. <u>Gehen Sie zum Online Designer und klicken Sie oben auf die grüne Schaltfläche Veröffentlichen</u>, um Ihre erste Version zu veröffentlichen."
mycap_mobile_app_677 = "<b>MYCAP-ERINNERUNG:</b> Da Sie MyCap in diesem Projekt verwenden, ist es häufig wichtig, nach Änderungen an Ihren Feldern oder Instrumenten eine neue MyCap-Version zu veröffentlichen. Bitte vergessen Sie dies bei Bedarf nicht, <u>indem Sie oben auf dieser Seite auf die grüne Schaltfläche Veröffentlichen klicken</u>."
mycap_mobile_app_678 = "<b>MYCAP-ERINNERUNG:</b> Da Sie MyCap in diesem Projekt verwenden, ist es häufig wichtig, nach Änderungen an Ihren Feldern oder Instrumenten eine neue MyCap-Version zu veröffentlichen. Bitte vergessen Sie dies bei Bedarf nicht, <u>indem Sie zum Online Designer navigieren und oben auf der Seite auf die grüne Schaltfläche Veröffentlichen klicken</u>."
