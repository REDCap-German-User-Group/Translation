date_shift_01 = "Datumsverschiebung zur De-Identifizierung"
date_shift_02 = "Was ist Datumsverschiebung?"
; date_shift_03 is concatenated with strings date_shift_04 and a dynamic day value.
date_shift_03 = "Als Teil der De-Identifizierungsoptionen in REDCap können alle Datumsangaben im Projekt um bis zu"
; date_shift_04 is concatenated with string date_shift_03 and a dynamic day value.
date_shift_04 = "Tage in die Vergangenheit verschoben werden, sodass sie nicht die tatsächlichen Datumsangaben widerspiegeln. Wenn Sie festlegen, dass alle Datumsangaben verschoben werden, werden sie für jeden Datensatz um eine konsistente Zeitspanne verschoben, wodurch der Abstand zwischen Datumsangaben erhalten bleibt. Wenn eine Teilnehmerin namens Mary beispielsweise drei aufeinanderfolgende Termine am 2. April, 15. April und 26. April hatte, bleiben die Termine nach der Verschiebung in derselben Reihenfolge und mit demselben Abstand bestehen: 16. November, 29. November und 10. Dezember."
; date_shift_05 is concatenated with strings date_shift_06, date_shift_07, a dynamic day value and a dynamic record ID label.
date_shift_05 = "Die Datumsverschiebung lässt den Projektdatensatz unverändert und wirkt sich nicht auf die tatsächlich im Projekt gespeicherten Datumsangaben aus. Sie verändert lediglich die Datumsangaben im resultierenden Format bei einem Datenexport in REDCap (wenn die Option Datumsverschiebung aktiviert ist). Die verschobenen Datumsangaben sind bei jedem Datenexport für jeden Datensatz immer gleich. Die Datumsangaben werden um bis zu"
; date_shift_06 is concatenated with strings date_shift_05, date_shift_07, a dynamic day value and a dynamic record ID label.
date_shift_06 = "Tage verschoben, wobei der verschobene Wert basiert auf dem"
; date_shift_07 is concatenated with strings date_shift_05, date_shift_06, a dynamic day value and a dynamic record ID label.
date_shift_07 = "unter Verwendung eines komplexen Algorithmus. Da der verschobene Wert auf dem Datensatznamen basiert, ist der Betrag, um den Datumsangaben verschoben werden, für jeden Datensatz eindeutig; innerhalb jedes Datensatzes ist der Verschiebungsbetrag jedoch gleich, um interne Konsistenz zu wahren."
date_shift_08 = "Warum ist Datumsverschiebung wichtig?"
date_shift_09 = "Datumsverschiebung ist für die De-Identifizierung wichtig, weil Datumsangaben, ähnlich wie Name und Sozialversicherungsnummer, Identifikatoren sind, die zur Identifizierung einer Person verwendet werden können und dadurch möglicherweise vertrauliche personenbezogene Informationen offenlegen. Datumsverschiebung verhindert, dass Datumsangaben als Identifikatoren für einzelne Projektdatensätze verwendet werden, während der Abstand zwischen Datumsangaben erhalten bleibt."

; define_events_03 is concatenated with strings define_events_04, define_events_05, define_events_06 or define_events_07, and define_events_08.
define_events_03 = "Diese Anwendung ermöglicht Ihnen, 'Events' für Ihr Projekt zu definieren, die die <b>mehrfache Nutzung von Datenerfassungsformularen für einen beliebigen Projektdatensatz</b> erlauben (häufig verwendet bei der Erfassung longitudinaler Daten)"
; define_events_04 is concatenated with strings define_events_03 and define_events_05 and a Calendar link.
define_events_04 = "sowie zum <b>Erzeugen neuer Terminpläne</b>, die angezeigt werden im"
; define_events_05 is concatenated with strings define_events_03, define_events_04, define_events_06 or define_events_07, and define_events_08.
define_events_05 = ". Ein 'Event' kann ein zeitliches Ereignis im Verlauf Ihres Projekts sein, z. B. ein Teilnehmerbesuch oder eine durchzuführende Aufgabe. Nachdem Events definiert wurden, "
; define_events_06 is concatenated with strings define_events_03, define_events_05 and define_events_08.
define_events_06 = "können Sie sie und ihren Wert Tageversatz verwenden, um Terminpläne zu erzeugen. Für Datenerfassungszwecke müssen Sie zusätzlich "
; define_events_07 is concatenated with strings define_events_03, define_events_05 and define_events_08.
define_events_07 = "müssen Sie "
; define_events_08 is concatenated with strings define_events_03, define_events_05 and define_events_06 or define_events_07.
define_events_08 = "die Datenerfassungsinstrumente festlegen, die Sie für einige oder alle Events verwenden möchten. Dadurch können Sie ein Formular für mehrere Events für denselben Projektdatensatz verwenden. Sie können Events in 'Arme' gruppieren, wobei Ihr Projekt einen oder mehrere Arme/Gruppen haben kann. Jeder Arm kann beliebig viele Events haben. Sie können die Tabelle unten verwenden, um neue Events und/oder Arme zu erstellen oder vorhandene zu ändern. (Ein Arm und ein Event werden für alle Projekte zunächst standardmäßig definiert.)"
