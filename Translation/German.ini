alerts_30 = "Vor dem Senden der Benachrichtigung sicherstellen, dass die Logik weiterhin wahr ist?"
alerts_31 = "Diese Einstellung ist für Alarme & Benachrichtigungen optional. Wenn sie aktiviert ist, wertet REDCap die bedingte Logik erneut anhand der Datenwerte des Datensatzes aus, sobald Datensatzwerte geändert werden, NACHDEM die Benachrichtigung geplant wurde, aber BEVOR sie an den Empfänger gesendet wurde. Wenn die Logik nicht mehr wahr ist (d. h. wenn sich die Datenwerte in der Zeit nach der Planung der Benachrichtigung geändert haben), wird die Benachrichtigung nicht an den Empfänger gesendet, sondern gelöscht (als wäre sie nie geplant worden). Wenn Benachrichtigungen aufgrund dieser Einstellung gelöscht werden, können sie später *möglicherweise* erneut geplant werden, wenn Datenwerte so geändert werden, dass die Logik wieder als wahr ausgewertet wird. Die Aktivierung dieser Einstellung gibt Ihnen mehr Kontrolle darüber, wann und wie Benachrichtigungen bei Verwendung bedingter Logik für Alarme & Benachrichtigungen gesendet werden."
alerts_32 = "Mehr erfahren"
alerts_33 = "So verwenden Sie 'Stopplogik', um einen geplanten Alarm zu deaktivieren"
alerts_34 = "Wenn Sie Alarme haben, die nicht sofort gesendet werden, sondern später geplant sind, kann es sinnvoll sein, in Ihrer bedingten Logik eine 'Stopplogik' (auch als 'Kill Switch' bekannt) zu verwenden, um diese geplanten Alarme bei Bedarf manuell zu stoppen. Dies kann verwendet werden, wenn ein Alarm versehentlich geplant wurde und Sie ihn schnell löschen müssen. HINWEIS: Damit die 'Stopplogik' funktioniert, muss das Kontrollkästchen 'Sicherstellen, dass die Logik weiterhin wahr ist' aktiviert sein. Wenn dieses Kontrollkästchen aktiviert ist, prüft REDCap jedes Mal, wenn ein bestimmter Datensatz gespeichert oder geändert wird, ob für diesen Datensatz ein Alarm geplant ist, und prüft dann erneut, ob diese Bedingung/Logik weiterhin wahr ist. Wenn die Bedingung nicht mehr wahr ist, wird die Benachrichtigung gelöscht, sodass sie niemals gesendet wird. Wenn der Datensatz später erneut geändert wird und die Bedingung dann wieder wahr wird, wird die Benachrichtigung erneut geplant. Ohne aktiviertes Kontrollkästchen 'Sicherstellen, dass die Logik weiterhin wahr ist' lässt REDCap den geplanten Alarm unverändert bestehen und löscht ihn nie."
alerts_35 = "Die 'Stopplogik' kann ein komplexer Satz bedingter Logik sein oder so einfach wie ein einzelnes Feld im Project (d. h. der Kill Switch). Wenn Sie beispielsweise einen Alarm planen möchten, wenn ein Teilnehmer mindestens 18 Jahre alt ist, könnte Ihre Logik '[age] >= 18' lauten. Und wenn Sie die 'Stopplogik' hinzufügen möchten, um einen geplanten Alarm manuell löschen zu können, könnten Sie '[age] >= 18 and [remove_alert] <i> 1' verwenden, wobei das Feld 'remove alert' ein Ja/Nein-Feld ist. In diesem Fall könnten Sie zum Löschen des geplanten Alarms einfach zum Dateneingabeformular gehen, in dem sich das Feld 'remove alert' befindet, und es auf 'Ja' setzen. Dies kann auf viele verschiedene Arten erfolgen. Dies ist lediglich ein einfaches Beispiel, um das Konzept einzuführen. <b>Denken Sie daran: Der Schlüssel zur Verwendung der 'Stopplogik' ist, dass das Kontrollkästchen 'Sicherstellen, dass die Logik weiterhin wahr ist' aktiviert sein MUSS.</b>"
