data_entry_405 = "Legt die maximale Anzahl von Wörtern fest, die in ein Textfeld oder Notizfeld eingegeben werden können, und zeigt außerdem die Anzahl verbleibender Wörter an. Das Format muss dem Muster @WORDLIMIT=?? folgen, wobei ?? die gewünschte maximale Wortanzahl ist (alternativ kann der Zahlenwert in einfachen oder doppelten Anführungszeichen stehen). HINWEIS: Dieses Action Tag kann nicht gleichzeitig mit @CHARLIMIT für dasselbe Feld verwendet werden. HINWEIS: Dieses Action Tag wird bei keinem Datenimport angewendet (weder per API noch per Data Import Tool), sondern funktioniert nur beim Anzeigen von Fragebogenseiten und Dateneingabeformularen."
data_entry_406 = "Legt die maximale Anzahl von Zeichen fest, die in ein Textfeld oder Notizfeld eingegeben werden können, und zeigt außerdem die Anzahl verbleibender Zeichen an. Das Format muss dem Muster @CHARLIMIT=?? folgen, wobei ?? die gewünschte maximale Zeichenzahl ist (alternativ kann der Zahlenwert in einfachen oder doppelten Anführungszeichen stehen). HINWEIS: Dieses Action Tag kann nicht gleichzeitig mit @WORDLIMIT für dasselbe Feld verwendet werden. HINWEIS: Dieses Action Tag wird bei keinem Datenimport angewendet (weder per API noch per Data Import Tool), sondern funktioniert nur beim Anzeigen von Fragebogenseiten und Dateneingabeformularen."
data_entry_407 = "Randomisiert die Reihenfolge von Auswahlfeldoptionen, wie sie auf Fragebogenseiten und Dateneingabeformularen angezeigt werden, sodass ihre Reihenfolge bei jedem Laden der Seite durch einen bestimmten Benutzer immer anders ist. HINWEIS: Dieses Action Tag kann nur für die folgenden Feldtypen verwendet werden: Checkbox, Radio, Dropdown, Ja-Nein und Wahr-Falsch. Dieses Tag funktioniert auch für erweiterte Radios und Checkboxen in Fragebögen. Es funktioniert jedoch nicht für eine Matrix von Feldern."
