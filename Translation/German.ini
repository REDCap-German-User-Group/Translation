report_builder_161 = "Die Report-ID, die in der Report-Liste angegeben ist, wird rechts neben jedem Report angezeigt. Die Report-ID kann referenziert werden, wenn ein Smart Chart per Piping in Text eingefügt wird, indem <code>:reportID</code> innerhalb der eckigen Klammern angehängt wird (z. B. <code>[bar-chart:status_field:178]</code>) oder wenn die API-Report-Export-Methode für die REDCap-API aufgerufen wird. Mit der API-Report-Export-Methode können Sie alle Daten aus REDCap für einen bestimmten Report programmgesteuert über einen Computer-zu-Computer-Aufruf exportieren, ohne sich auf einer Webseite bei REDCap anmelden zu müssen, um die Report-Daten herunterzuladen. Die Report-ID muss im API-Report-Export-Aufruf explizit angegeben werden. Weitere Informationen zur API und Details zur Verwendung dieser spezifischen API-Methode finden Sie in der"
report_builder_162 = "Eindeutiger Report-Name"
report_builder_163 = "Wenn Sie diese Funktion unten aktivieren, wird automatisch ein öffentlicher Link zum Anzeigen des Reports generiert, ohne dass eine Anmeldung bei REDCap erforderlich ist."
report_builder_164 = "Report ist für alle Personen mit dem öffentlichen Link öffentlich einsehbar"
report_builder_165 = "[Hinweis: Der Report muss zuerst gespeichert werden, bevor er öffentlich gemacht werden kann. Bitte speichern Sie ihn und kehren Sie anschließend hierher zurück.]"
report_builder_166 = "Anfrage zur Aktivierung des Reports"
report_builder_167 = "Ein Benutzer beantragt, dass sein Report \"öffentlich\" gemacht wird. Dies bedeutet, dass er für alle Personen mit einem Link zum Report öffentlich einsehbar wäre (d. h. ohne dass eine Authentifizierung zum Anzeigen erforderlich ist). Als Administrator können Sie auf den Link unten klicken, um die Anfrage zu genehmigen. Dadurch wird der Report öffentlich gemacht, und der Antragsteller wird über die Genehmigung benachrichtigt."
report_builder_168 = "ANFRAGE GENEHMIGEN, um den Report öffentlich zu machen"
report_builder_169 = "Ihre Anfrage für einen öffentlichen Report wurde erfolgreich an einen REDCap-Administrator gesendet. Sie erhalten eine E-Mail-Benachrichtigung, sobald Ihre Anfrage genehmigt wurde. Vielen Dank!"
report_builder_174 = "ERFOLG! Der Report wurde erfolgreich als \"öffentlich\" festgelegt. Bitte beachten Sie, dass der Report nicht mehr geändert werden kann, solange er öffentlich ist. Wenn Sie diesen Report in irgendeiner Weise ändern möchten, müssen Sie ihn zuerst wieder nicht-öffentlich machen, Ihre Änderungen am Report vornehmen und ihn anschließend erneut öffentlich machen."
