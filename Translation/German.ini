mycap_mobile_app_762 = "<b>Hinweis:</b> Ein neues Datumsfeld (\"Install Date\") mit Annotation @MC-PARTICIPANT-JOINDATE und ein neues Textfeld (\"Code\") mit Annotation @MC-PARTICIPANT-CODE werden auf dem ersten Instrument erstellt. Diese Felder erfassen das Beitrittsdatum, wenn Teilnehmende aus der App beitreten, sowie den Code, wenn Teilnehmende erstellt werden. Diese Felder werden ausgeblendet und können beim Erstellen eines Berichts verwendet werden."
