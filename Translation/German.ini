queue_system_monitor_menu = "Queue-Monitor"
queue_system_monitor_page_title = "Queue-Monitor"
queue_system_monitor_page_description = "Queues ermöglichen es REDCap, die Verarbeitung einer zeitaufwendigen Aufgabe, z. B. das Senden einer E-Mail, auf einen späteren Zeitpunkt zu verschieben. Das Verschieben dieser zeitaufwendigen Aufgaben beschleunigt Webanfragen erheblich. REDCap verwendet einen Cron-Job, um die <em>Queue</em> jede Minute zu prüfen, und erstellt einen <em>Worker</em>, wenn eine <em>Message</em> gefunden wird, die auf Verarbeitung wartet. Der <em>Worker</em> übersetzt jede <em>Message</em> in eine <em>Task</em> und beginnt mit der Verarbeitung (FIFO). Wenn der <em>Worker</em> nach einer Minute nicht alle <em>Messages</em> in der <em>Queue</em> verarbeitet hat, wird ein weiterer <em>Worker</em> zur Unterstützung erstellt. Wenn ein <em>Worker</em> länger als 10 Minuten gearbeitet hat, verarbeitet er keine weitere <em>Message</em>; dies hilft, Fehler wegen 'Maximum execution time' zu vermeiden. Standardmäßig können maximal 5 <em>Worker</em> gleichzeitig laufen, diese Zahl kann jedoch erhöht werden."
