system_config_505 = "Wenn auf 'Ja' gesetzt, sehen Benutzer mit Zugriff auf mindestens ein ausgenommenes Projekt die 2-Schritt-Login-Seite weder beim anfänglichen Login in REDCap noch beim Betreten eines ausgenommenen Projekts, sie *sehen* die 2-Schritt-Login-Seite jedoch, wenn sie versuchen, ein reguläres (nicht ausgenommenes) Projekt zu betreten oder zu ihrer Profilseite zu navigieren."
system_config_506 = "2-Schritt-Login in diesem Projekt für JEDE Login-Sitzung immer erzwingen?"
system_config_507 = "Kann verwendet werden, um den 2-Schritt-Login für Projekte zu deaktivieren, in denen der zusätzliche Login-Schritt die Nutzung des Projekts erschweren könnte oder beispielsweise nicht benötigt wird."
system_config_508 = "Ja, sicherstellen, dass Benutzer vor Betreten des Projekts den 2-Schritt-Login durchgeführt haben"
system_config_509 = "Kann für Projekte mit sehr sensiblen Daten (z. B. klinischen Daten) verwendet werden, um die Sicherheit des Projekts über die normalen REDCap-2-Schritt-Login-Sicherheitsstandards hinaus zu erhöhen."
system_config_510 = "HINWEIS: Diese Option ist nur nützlich, wenn Sie das optionale systemweite 2-Schritt-Login-Authentifizierungsintervall auf einen anderen Wert als '0' gesetzt haben."
system_config_511 = "Wenn auf 'Ja' gesetzt, wird ein Benutzer, der den 2-Schritt-Login während seiner aktuellen REDCap-Sitzung nicht durchführen musste (weil er sich in einer vorherigen Sitzung per 2-Schritt-Login angemeldet hatte), gezwungen, den 2-Schritt-Login durchzuführen, bevor er dieses Projekt betritt."
