random_208 = "Randomisierungseinstellungen"
random_209 = "Dies ist das Feld, in dem die Schaltfläche \"Randomisieren\" auf Ihrem Datenerhebungsformular angezeigt wird. Der Typ des von Ihnen gewählten Feldes (Textfeld vs. Single-Select-Multiple-Choice-Feld) bestimmt den Zuteilungstyp für dieses Randomisierungsmodell.<br><strong>Für offene Randomisierung:</strong><ul class='mb-0'><li>Wählen Sie ein Single-Select-Feld (Dropdown oder Radio). Die randomisierte <strong>Gruppenzuteilung</strong> wird in diesem Feld gespeichert.</li></ul><strong>Für verdeckte (verblindete) Randomisierung:</strong><ul class='mb-0'><li>Wählen Sie ein Textfeld, das <u>keine Feldvalidierung</u> hat. Die zugewiesene <strong>Randomisierungsnummer</strong> wird in diesem Feld gespeichert.</li></ul><p>Beachten Sie, dass die Randomisierungsnummer über die Smart Variable <code>[rand-number]</code> verfügbar ist.</p>"
random_210 = "Die folgende Tabelle zeigt alle Sequenzen (d. h. Zeilen in der Zuteilungstabelle) für die oben aufgeführte spezifische Kombination von Strata. Als REDCap-Administrator können Sie die Aktionen in der Spalte Bearbeiten verwenden, um manuelle Randomisierung durchzuführen, die Randomisierung eines bereits randomisierten Datensatzes zu entfernen, eine bestimmte Sequenz/Zeile von der Verwendung in der Randomisierung auszuschließen oder die Strata-Werte und/oder den Randomisierungs-/Zielwert für eine bestimmte Sequenz zu ändern. Hinweis: Das Durchführen dieser Aktionen ist typischerweise selten und erfolgt nur, wenn im Project Dinge nicht wie geplant verlaufen sind. Alle unten durchgeführten Aktionen werden entsprechend protokolliert."
