control_center_4546 = "Unten sind alle von Benutzern eingereichten Anträge aufgeführt, die von einem REDCap-Administrator verarbeitet werden müssen."
control_center_4547 = "Um einen Antrag zu genehmigen, klicken Sie auf den grünen Häkchen-Button. Dadurch wird ein Pop-up-Fenster geöffnet, in dem Sie den Antrag auf dieser Seite verarbeiten können. Jeder ausstehende Antrag kann in die Liste mit niedriger Priorität verschoben und jederzeit wieder zurück verschoben werden. Alle verarbeiteten Anträge werden in die Tabelle 'Abgeschlossen & archiviert' unten verschoben. Wenn Sie einen Antrag nicht verarbeiten müssen, können Sie auf das Archivsymbol klicken, wodurch er nach unten verschoben wird. HINWEIS: Diese Seite zeigt immer den aktuellen Status aller Anträge, unabhängig davon, ob sie über die Tabellen unten oder über den Link in der E-Mail an den Administrator verarbeitet wurden (falls E-Mail-Benachrichtigungen aktiviert sind)."
