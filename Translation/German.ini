design_420 = "HINWEIS: Alle Felder in diesem Eingabeformular wurden nun gelöscht, daher werden Sie nun zurück zur vorherigen Seite geleitet."
design_421 = "HINWEIS: Da das gerade gelöschte Feld das letzte Feld im Formular war UND unmittelbar davor eine Abschnittsüberschrift stand, wurde diese Abschnittsüberschrift automatisch entfernt, da Abschnittsüberschriften nicht ganz unten im Formular stehen können. Wir entschuldigen uns für diese Unannehmlichkeit."
