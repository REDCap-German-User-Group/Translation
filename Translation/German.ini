system_config_610 = "Wenn aktiviert, wird ein Benutzer beim Löschen eines Datensatzes im Projekt gefragt, ob er auch alle Datenwerte und Aktionen löschen möchte, die auf der Projekt-Logging-Seite für diesen Datensatz geloggt wurden. Dabei muss der Benutzer 'DELETE' eingeben, um zu bestätigen, dass er dies tun möchte. Benutzer müssen dies beim Löschen des Datensatzes für jeden Datensatz einzeln entscheiden. Hinweis: Bei longitudinalen Projekten mit mehreren Arms löscht diese Funktion das Logging des Datensatzes nur im aktuellen Arm."
