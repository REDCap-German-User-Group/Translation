report_builder_113 = "Ergebnisse zurückgegeben"
report_builder_114 = "Exportformat auswählen"
report_builder_115 = "Report wird gerendert... bitte warten"
report_builder_116 = "Unten finden Sie einige zusätzliche Exportoptionen, die für Ihr Projekt verfügbar sind. Für jede Exportart werden Anweisungen bereitgestellt. Sie können auf das entsprechende Symbol rechts klicken, um die jeweilige Datei herunterzuladen."
report_builder_117 = "Mit diesem Modul können Sie Reports Ihrer Daten einfach anzeigen, Diagramme und deskriptive Statistiken Ihrer Daten prüfen sowie Ihre Daten zur Analyse nach Microsoft Excel, SAS, Stata, R oder SPSS exportieren (sofern Sie über die entsprechenden Berechtigungen verfügen). Wenn Sie Ihren *gesamten* Datensatz exportieren oder als Report anzeigen möchten, ist Report A der beste und schnellste Weg. Wenn Sie jedoch spontan nur Daten aus bestimmten Instrumenten (oder Events) anzeigen oder exportieren möchten, ist Report B die beste Wahl. Sie können unten auch eigene benutzerdefinierte Reports erstellen (sofern Sie über die entsprechenden Berechtigungen verfügen), in denen Sie den Report mit einer großen Auswahl an Filterwerkzeugen auf bestimmte Felder, Datensätze oder Events filtern können, damit Sie genau die gewünschten Daten erhalten. Sobald Sie einen Report erstellt haben, können Sie ihn als Webseite anzeigen, in einem bestimmten Format (Excel, SAS, Stata, SPSS, R) aus REDCap exportieren oder die Diagramme und deskriptiven Statistiken für diesen Report anzeigen."
report_builder_118 = "Sie können einen neuen Report erstellen, indem Sie unten die Felder/Variablen auswählen, die Sie in den Report aufnehmen möchten. Sie können Ihrem Report beliebig viele Felder hinzufügen und auswählen, welche Benutzer diesen Report anzeigen dürfen. Außerdem müssen Sie einen Namen für Ihren Report angeben, der dann im linken Projektmenü für alle angezeigt wird, denen Sie Zugriff gewährt haben. Sie können die im Report zurückgegebenen Ergebnisse auf verschiedene Arten filtern, einschließlich komplexer UND/ODER-Logik. Wenn Sie fertig sind, klicken Sie unten auf den Button Report speichern. Der neue Report wird dann zu Ihrer Report-Liste hinzugefügt. Anschließend können Sie ihn sofort anzeigen oder exportieren."
report_builder_119 = "Verwendung von Filtern und UND/ODER-Logik"
report_builder_120 = "In Reports können Sie beliebig viele Filter hinzufügen, und Sie können mit mehreren Feldern sowie UND- und ODER-Bedingungslogik sehr komplexe Filterlogik erstellen. Um einen Filter hinzuzufügen, wählen Sie ein Feld aus, nach dem Sie filtern möchten. Danach müssen Sie sowohl einen Operator als auch einen Wert festlegen. Wenn es sich um ein Multiple-Choice-Feld handelt, lädt REDCap automatisch alle Auswahlmöglichkeiten dieses Feldes in eine Dropdown-Liste, sodass Sie eine Auswahl treffen können. Wenn es kein Multiple-Choice-Feld ist, wird stattdessen ein Textfeld zur Eingabe des Filterwerts bereitgestellt."
report_builder_121 = "Die Verwendung von UND und ODER mit mehreren Feldern ermöglicht komplexeres Filtern. Wenn Sie beispielsweise zwei Filter mit einem UND dazwischen haben, bedeutet dies, dass beide beim Filtern gemeinsam angewendet werden. Wenn Sie jedoch ODER verwenden, werden Ergebnisse zurückgegeben, auf die entweder der eine oder der andere Filter zutrifft. Im Allgemeinen schränkt die Verwendung von UND die Ergebnisse oft stärker ein, indem im Report weniger Daten zurückgegeben werden als bei der Verwendung von ODER."
report_builder_122 = "Es gibt keine Begrenzung, wie oft Sie ein Feld in einem einzelnen Report als Filter verwenden dürfen. TIPP: Wenn Sie Instanzen in Ihren Daten finden möchten, bei denen der Wert eines Feldes leer/null ist, lassen Sie das Textfeld für den Wert einfach leer. Umgekehrt setzen Sie den Operator auf 'not =' mit leerem Textfeld, um Instanzen zu finden, bei denen das Feld einen Wert hat (d. h. nicht leer ist)."
report_builder_123 = "Wenn Ihre Filterung sowohl ODER als auch UND verwendet, ist es sehr wichtig zu wissen, in welcher Reihenfolge REDCap ODER und UND auswertet, damit Ihre Logik sich wie erwartet verhält. Im Wesentlichen werden alle ODER-Verknüpfungen für aufeinanderfolgende Filterfelder als Gruppe ausgewertet, und alle Gruppen werden anschließend miteinander als UND ausgewertet. Zum Beispiel sieht dies aus wie (dies ODER dies ODER dies) UND (dies ODER dies ODER dies), wobei alle ODER-Verknüpfungen innerhalb der Klammern zuerst ausgewertet werden und diese ODER-Gruppen anschließend gemeinsam mit UND ausgewertet werden."
report_builder_125 = "Report-ID"
report_builder_126 = "Verwendung der Report-ID beim API-Report-Export"
report_builder_128 = "Es tut uns leid, aber offenbar kann der Report nicht angezeigt werden. Möglicherweise werden einfach zu viele Daten auf einmal angezeigt, wodurch REDCap abstürzt. Wenn dieser Fehler erneut auftritt, wird empfohlen, den Report kleiner zu machen (weniger Felder und/oder möglicherweise weniger Datensätze), damit dieser Fehler nicht auftritt. Wir entschuldigen uns für diese Unannehmlichkeit."
report_builder_129 = "Es tut uns leid, aber der Datenexport kann offenbar nicht erfolgreich abgeschlossen werden. Möglicherweise werden einfach zu viele Daten auf einmal exportiert, wodurch REDCap abstürzt. Wenn dieser Fehler erneut auftritt, wird empfohlen, einen kleineren Datensatz zu exportieren (weniger Felder und/oder möglicherweise weniger Datensätze), damit dieser Fehler nicht auftritt. Wir entschuldigen uns für diese Unannehmlichkeit."
report_builder_130 = "Erlaubt dem Benutzer außerdem, ALLE Reports anzuzeigen (aber nicht unbedingt alle Daten in den Reports)"
report_builder_131 = "Verwendung von Datenexporten, Reports und Statistiken"
report_builder_132 = "Der Report kann nicht angezeigt werden, weil anscheinend ein Fehler in den Filtern Ihres Reports vorliegt oder die Filterlogik möglicherweise zu lang ist (Hinweis: Sie sollten in Ihrer Logik nicht mehr als 900 Feldvariablen referenzieren). Bitte gehen Sie zur Seite Report bearbeiten, um dies zu beheben."
report_builder_133 = "Auswählen, wer diesen Report im linken Projektmenü sieht"
report_builder_134 = "Durch die Verwendung von Benutzerzugriffskontrollen für einen Report kann erreicht werden, dass der Report für bestimmte Benutzer im linken Projektmenü (unterhalb der Anwendungsliste) erscheint und für andere Benutzer verborgen und unzugänglich bleibt. Bitte beachten Sie, dass jeder Benutzer mit der Benutzerberechtigung 'Reports hinzufügen/bearbeiten' alle Reports im Projekt anzeigen kann. Dies verursacht keine Konflikte mit Benutzerrechten, da Reports Benutzern keinen Zugriff auf Daten gewähren, auf die sie nicht bereits Zugriff haben. Mit anderen Worten: Wenn einem Benutzer kein Zugriff auf Formularebene für ein bestimmtes Datenerhebungsinstrument gewährt wurde, kann er Daten aus diesem Instrument auch innerhalb eines Reports nicht anzeigen. Dasselbe gilt, wenn der Benutzer einer Zugriffsgruppe zugewiesen ist; in diesem Fall kann er weiterhin nur Daten aus Datensätzen seiner eigenen Zugriffsgruppe anzeigen. Auch wenn ein Benutzer also über Berechtigungen zum 'Reports hinzufügen/bearbeiten' verfügt und dadurch Reports anzeigen kann, für die ihm kein expliziter Zugriff gewährt wurde, kann er keine Daten anzeigen, auf die er nicht bereits Zugriff hat. Die Implementierung des Benutzerzugriffs für einen Report ist daher nicht ganz dasselbe wie das Festlegen der Benutzerberechtigungen einer Person. Reports dienen sozusagen nur als Fenster zur Anzeige einer Teilmenge der Daten, auf die ein Benutzer Zugriff hat, wobei beim Anzeigen eines Reports die Benutzerberechtigungen angewendet werden. Benutzerzugriffskontrollen für einen Report bieten lediglich eine Möglichkeit, Reports im linken Projektmenü bestimmter Benutzer anzuzeigen, und unterscheiden sich daher vom Festlegen der Benutzerrechte eines Benutzers."
report_builder_135 = "Benutzerzugriff für Reports"
report_builder_136 = "Schnell hinzufügen"
report_builder_137 = "Um Felder für diesen Report schnell hinzuzufügen oder zu entfernen, aktivieren oder deaktivieren Sie unten die zugehörigen Kontrollkästchen. Die Felder werden *automatisch* zum Report hinzugefügt bzw. daraus entfernt, während Sie sie aktivieren/deaktivieren. Aktivierte Felder werden am Ende des Reports hinzugefügt."
