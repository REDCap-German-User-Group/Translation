data_entry_218 = "Dieses Instrument ist ein computeradaptiver Test (CAT), daher werden seine Fragen dynamisch auf Basis der gegebenen Antworten erzeugt. Da es dynamisch ist, kann es nur als Fragebogen ausgefüllt werden; alle Felder unten sind daher dauerhaft gesperrt und nicht bearbeitbar."
data_entry_219 = "Diese Fragebogenantwort kann nicht bearbeitet werden, weil dieses Instrument ein computeradaptiver Test (CAT) ist. Sie ist daher schreibgeschützt."
data_entry_220 = "Dieser Fragebogen ist ein computeradaptiver Test (CAT). Bitte beachten Sie, dass einige Einstellungen unten deaktiviert wurden, weil sie für einen CAT nicht verwendet werden können. CATs werden jeweils Frage für Frage ausgefüllt, und ihre Fragen werden dynamisch anhand der gegebenen Antworten erzeugt. Es wird dringend empfohlen, dass CATs vom Teilnehmer die Beantwortung jeder Frage verlangen und kein Überspringen erlauben. Wenn es jedoch absolut notwendig ist, können Sie Teilnehmern erlauben, eine bestimmte Frage im Fragebogen zu überspringen, indem Sie die Option unten auf 'Ja' setzen."
