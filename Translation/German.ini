cdis_info_auto_login_active = "Auto-Login ist im Kontext <code>Launch from EHR</code> aktiviert."
cdis_info_auto_login_inactive = "Auto-Login kann nach einem erfolgreichen <code>Launch from EHR</code> aktiviert werden."
cdis_info_auto_login_title = "Auto-Login-Informationen"
cdis_info_auto_login_what_is_summary = "Was ist Auto-Login?"
cdis_info_auto_login_what_is_description = "Auto-Login ist eine Funktion, die während des Prozesses <code>Launch from EHR</code> verwendet wird. Nachdem sich ein Benutzer zum ersten Mal erfolgreich angemeldet hat, verknüpft REDCap das REDCap-Konto des Benutzers mit seinem EHR-Konto. Diese Verknüpfung ermöglicht eine automatische Erkennung bei zukünftigen Interaktionen zwischen REDCap und dem EHR und reduziert die Notwendigkeit wiederholter Anmeldungen."
cdis_info_auto_login_how_to_enable_summary = "Wie aktiviert man Auto-Login?"
cdis_info_auto_login_how_to_enable_description = "Auto-Login wird nach einem erfolgreichen <code>Launch from EHR</code> automatisch eingerichtet. Sobald die Verknüpfung besteht, erfordern zukünftige REDCap-Interaktionen über die EHR-Oberfläche keine Eingabe von Anmeldedaten mehr. Dieser Prozess verbessert die Benutzererfahrung und erleichtert das Abrufen und Verwalten von EHR-Daten."
cdis_info_auto_login_1 = "Auto-Login ist eine Funktion, die während des Prozesses <code>Launch from EHR</code> verwendet wird. Wenn sich ein Benutzer zum ersten Mal erfolgreich authentifiziert, erstellt REDCap eine Verknüpfung zwischen seinem REDCap-Konto und seinem EHR-Konto. Diese Verbindung ermöglicht REDCap, den Benutzer in zukünftigen Sitzungen automatisch zu erkennen, wenn die CDIS-Funktion innerhalb des EHR-Systems verwendet wird."
cdis_info_auto_login_2 = "Wenn Auto-Login aktiviert ist, müssen Benutzer nicht jedes Mal wiederholt ihre REDCap-Anmeldedaten eingeben, wenn sie von der EHR-Oberfläche aus mit REDCap interagieren; dies vereinfacht den Authentifizierungsprozess."

cdis_info_ehr_access_info_title = "EHR-Zugriffsinformationen"
cdis_info_ehr_access_active = "Der Benutzer hat aktiven EHR-Zugriff und kann mit der CDIS-Funktion Daten aus dem EHR-System abrufen."
cdis_info_ehr_access_inactive = "Der Benutzer sollte EHR-Zugriff erhalten, bevor er Daten aus dem EHR-System abrufen kann."
cdis_info_ehr_access_inactive_02 = "Der Benutzer sollte eine Verbindung zum EHR-System herstellen, bevor er Daten abrufen kann."
cdis_info_ehr_access_awaiting_refresh = "Der EHR-Zugriff des Benutzers wartet auf Erneuerung und kann aktiv werden, sobald die Verbindung aktualisiert wird."
cdis_info_ehr_access_forbidden = "Dem Benutzer ist der Zugriff auf das EHR-System aufgrund von Token-Prioritätsregeln untersagt."
cdis_info_ehr_access_info_summary = "Informationen zum EHR-Zugriff..."
cdis_info_ehr_access_info_description = "Wenn ein Benutzer eine Verbindung zum EHR-System herstellt, erzeugt REDCap ein <code>EHR access token</code>, das dem Benutzer temporär erlaubt, auf Patientendaten aus dem EHR zuzugreifen und sie abzurufen. Dieses Token ist wie ein digitaler Ausweis, der die Berechtigung erteilt, Daten sicher aus dem EHR-System abzurufen. Wenn das Token aktiv ist, hat der Benutzer EHR-Zugriff; wenn es abläuft, muss der Benutzer erneut eine Verbindung herstellen, um ein neues Token zu erhalten."
cdis_info_ehr_access_get_access_summary = "Wie Sie Zugriff erhalten..."
cdis_info_ehr_access_get_access_summary_02 = "Wie Sie eine Verbindung zum EHR-System herstellen..."
cdis_info_ehr_access_get_access_description = "EHR-Zugriff kann auf zwei Arten erhalten werden:"
cdis_info_ehr_access_get_access_method_1 = "<strong>Standalone Launch</strong>: Direkte Verbindung zum EHR-System aus REDCap heraus herstellen."
cdis_info_ehr_access_get_access_method_2 = "<strong>Launch from EHR</strong>: Der Zugriff wird vom EHR-System aus gestartet, das dem Benutzer EHR-Zugriff gewährt und die Interaktion mit REDCap innerhalb der EHR-Oberfläche ermöglicht."
cdis_info_ehr_access_get_access_note = "Benutzer müssen gültige Zugangsdaten für das EHR-System haben, um auf das System zuzugreifen."
cdis_info_ehr_access_usage_summary = "Wie Ihr Zugriff verwendet wird..."
cdis_info_ehr_access_usage_description_1 = "Sobald EHR-Zugriff gewährt wurde, ermöglicht er Echtzeit-Datenabruf über REDCaps CDIS-Funktion und erlaubt auch Hintergrundprozessen (z. B. Cron-Jobs), auf Daten zuzugreifen."
cdis_info_ehr_access_usage_description_2 = "<strong>Für Hintergrundprozesse:</strong>"
cdis_info_ehr_access_usage_criteria_1 = "REDCap wählt den am besten geeigneten EHR-Zugriff wie folgt aus:"
cdis_info_ehr_access_usage_criteria_2 = "Es werden nur Tokens von Benutzern berücksichtigt, die dem aktuellen Project zugewiesen sind."
cdis_info_ehr_access_usage_criteria_3 = "Patientenspezifische Tokens (über <strong>Launch from EHR</strong> erhalten) werden priorisiert."
cdis_info_ehr_access_usage_criteria_4 = "Wenn mehrere Tokens verfügbar sind, wird das zuletzt ausgestellte verwendet."

draft_preview_01 = "Entwurfsvorschau-Modus"
draft_preview_02 = "Der Entwurfsvorschau-Modus erlaubt Ihnen, <b>Ihre Eingabeformulare mit Ihren aktuellen Entwurfsänderungen in einer Vorschau anzuzeigen, <u>als wären sie live</u></b>. Dadurch können Sie die Änderungen, die Sie im Entwurfsmodus vorgenommen haben, vollständig testen, einschließlich aller Branching Logic, Berechnungen, Action Tags und eingebetteten Felder, bevor Sie Ihre Entwurfsänderungen zur Genehmigung einreichen."
draft_preview_03 = "Entwurfsvorschau-Modus einschalten"
draft_preview_04 = "<b>ENTWURFSVORSCHAU-MODUS</b> ist derzeit aktiviert. <b>Alle eingegebenen Daten sind vorübergehend und werden nicht dauerhaft gespeichert. Mehrere Funktionen sind derzeit inaktiv.</b> Um den Entwurfsvorschau-Modus auszuschalten, gehen Sie zum {0:LinkStart}Online Designer{1:LinkEnd} oder klicken Sie im linken Menü auf den ENTWURFSVORSCHAU-Indikator."
draft_preview_05 = "ENTWURFSVORSCHAU"
draft_preview_06 = "{0:RecordID-Label} <b>{1:RecordID}</b> {2:Instance} wurde für Tests nur während der ENTWURFSVORSCHAU an einem <b>temporären Ort</b> gespeichert."
draft_preview_07 = "Während <b>ENTWURFSVORSCHAU</b> aktiviert ist, ist der Zugriff auf das Randomization-Modul <b>deaktiviert</b>.<br>Um den ENTWURFSVORSCHAU-Modus auszuschalten, gehen Sie zum {0:LinkStart}Online Designer{1:LinkEnd} oder klicken Sie im linken Menü auf den ENTWURFSVORSCHAU-Indikator."
draft_preview_08 = "Im ENTWURFSVORSCHAU-Modus deaktiviert"
draft_preview_09 = "Während <b>ENTWURFSVORSCHAU</b> aktiviert ist, ist das Erstellen neuer Datensätze <b>deaktiviert</b>.<br>Um den ENTWURFSVORSCHAU-Modus auszuschalten, gehen Sie zum {0:LinkStart}Online Designer{1:LinkEnd} oder klicken Sie im linken Menü auf den ENTWURFSVORSCHAU-Indikator."
draft_preview_10 = "<b>ENTWURFSVORSCHAU-MODUS</b> ist derzeit aktiviert. Neue Datensätze können im Entwurfsvorschau-Modus nicht erstellt werden."
draft_preview_11 = "Deaktiviert, während ENTWURFSVORSCHAU-MODUS aktiv ist"
draft_preview_12 = "Es wurde keine neue Instanz erstellt. Das Erstellen neuer Datensätze oder Instanzen <b>ist deaktiviert</b>, während <b>Entwurfsvorschau-Modus</b> aktiviert ist."
draft_preview_13 = "Löschvorgänge auf Datensatzebene <b>sind deaktiviert</b>, während <b>Entwurfsvorschau-Modus</b> aktiviert ist."
draft_preview_14 = "Sie befinden sich derzeit im <b>Entwurfsvorschau-Modus</b>. Um diesen Modus abzubrechen, klicken Sie hier.<br><small>(Hinweis: Die Seite wird automatisch neu geladen.)</small>"
draft_preview_15 = "Bitte beachten Sie, dass Änderungen an einem Datensatz im <b>Entwurfsvorschau-Modus</b> in Reports oder Datenexporten nicht berücksichtigt werden. Um den ENTWURFSVORSCHAU-Modus auszuschalten, gehen Sie zum {0:LinkStart}Online Designer{1:LinkEnd} oder klicken Sie im linken Menü auf den ENTWURFSVORSCHAU-Indikator."
draft_preview_16 = "Bitte beachten Sie, dass <b>Entwurfsvorschau-Modus</b> Datenimporte mit dem Data Import Tool oder der API weder unterstützt noch beeinflusst. Das bedeutet: Auch wenn ENTWURFSVORSCHAU derzeit aktiviert ist, wirken sich alle Importe <b>dauerhaft auf die in diesem Projekt gespeicherten Daten aus</b>, und jeder Bezug auf Entwurfsänderungen am Data Dictionary führt zu einem Fehler. Um den ENTWURFSVORSCHAU-Modus auszuschalten, gehen Sie zum {0:LinkStart}Online Designer{1:LinkEnd} oder klicken Sie im linken Menü auf den ENTWURFSVORSCHAU-Indikator."
draft_preview_17 = "ENTWURFSVORSCHAU kann auf dieser REDCap-Instanz nicht verwendet werden, weil <code>session.serialize_handler</code> mit der aktuellen Einstellung nicht unterstützt wird. Er muss <code>php</code> oder <code>php_binaray</code> sein. Bitte wenden Sie sich an Ihren REDCap-Administrator, damit dies behoben wird."
draft_preview_18 = "Beachten Sie, dass der Entwurfsvorschau-Modus <u>nur für Sie aktiv</u> ist. Er bleibt aktiv, bis er ausgeschaltet wird oder bis Ihre aktuelle REDCap-Sitzung endet."
draft_preview_19 = "<b>ENTWURFSVORSCHAU-MODUS</b> ist derzeit aktiviert. Alle eingegebenen Daten sind vorübergehend und werden nicht dauerhaft gespeichert."
draft_preview_20 = "Zusätzlich wird der Entwurfsvorschau-Modus <b><u>Live-Dateneingabe</u> auf Eingabeformularen simulieren</b>. Dadurch können Sie *flüchtige Daten* eingeben, die nur in Ihrer Sitzung gespeichert werden; <b>es werden jedoch keine Daten tatsächlich im Projekt gespeichert</b>. Sobald Sie den Entwurfsvorschau-Modus verlassen, verschwinden alle eingegebenen flüchtigen Daten.<br><br><b>EINSCHRÄNKUNGEN</b>: Im Entwurfsvorschau-Modus bestehen die folgenden Einschränkungen...<ul><li>Es können keine neuen Datensätze erstellt werden</li><li>Es können keine Daten im Projekt geändert oder gespeichert werden (alle Datenänderungen sind vorübergehend und an Ihre Anmeldesitzung gebunden)</li><li>Nur Änderungen an <u>bereits vorhandenen Formularen</u> können in der Vorschau angezeigt werden</li><li>Löschvorgänge (Löschen ganzer Datensätze oder Löschen von Daten für Formulare/Events) sind deaktiviert</li><li>Datensatzsperren und Sperren/Entsperren auf Formularebene sind deaktiviert</li><li>Randomisierung eines Datensatzes und Zugriff auf das Randomization-Modul sind deaktiviert</li><li>Feldkommentare/Data Resolution Workflow und das Datenverlaufs-Pop-up sind deaktiviert</li><li>Keine Alarme, ASIs oder Data Entry Triggers werden ausgelöst</li><li>Form Display Logic ist deaktiviert</li><li>Hinweis: Der Entwurfsvorschau-Modus arbeitet nur auf Dateneingabeseiten, dem Record Status Dashboard und der Record Home Page. Er wirkt sich auf keine anderen Seiten aus und funktioniert derzeit <b>nicht auf Fragebogenseiten.</b></li></ul>"
draft_preview_21 = "<b>Entwurfsvorschau-Modus wurde aktiviert.</b> Sie können beginnen, Ihre Entwurfsänderungen auf Eingabeformularen für bestehende Datensätze zu testen."

