data_entry_464 = "Die Dateiversionshistorie ermöglicht Benutzern, frühere Versionen einer Datei für ein File-Upload-Feld in einem Formular oder Fragebogen aufzubewahren. Wenn eine neue Version einer Datei für das Feld hochgeladen werden muss, kann ein Benutzer statt die aktuelle Datei vor dem Hochladen der neuen zu löschen einfach eine neue Datei hochladen; dabei bleiben alle älteren Versionen erhalten und sind im Popup Datenhistorie für das Feld zum Anzeigen/Herunterladen zugänglich."
