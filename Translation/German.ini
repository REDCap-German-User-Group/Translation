control_center_150 = "Feldvalidierungstypen"
control_center_151 = "REDCap bietet verschiedene Typen von Feldvalidierung, die Benutzer in ihren Projekten nutzen können, um gute Datenqualität sicherzustellen. In der Tabelle unten können Sie alle Feldvalidierungstypen aktivieren oder deaktivieren, die in Ihrer aktuellen REDCap-Version mitgeliefert werden. Sobald ein Validierungstyp aktiviert wurde, wird er in der Validierungs-Drop-down-Liste im Online Designer angezeigt (im Pop-up Feld hinzufügen/bearbeiten). Wenn er nicht aktiviert ist, bleibt er als Option ausgeblendet. Unten sind alle verfügbaren Feldvalidierungstypen aufgeführt. Das Label jedes Typs ist fett dargestellt, während der eindeutige Validierungsname, der im Data Dictionary verwendet wird, direkt darunter in Klammern steht. "
control_center_152 = "Derzeit für alle Projekte verfügbare Validierungstypen"
control_center_153 = "Deaktivieren"
control_center_154 = "Wenn Validierungstypen für Felder in einem Projekt verwendet und später hier von einem REDCap-Administrator deaktiviert werden, funktionieren sie in allen Projekten, die sie nutzen, weiterhin korrekt. HINWEIS: Obwohl nur die unten aktivierten Typen als Option im Online Designer angezeigt werden, ist <u>jeder</u> unten aufgeführte Validierungstyp zugänglich und kann in einem hochgeladenen Data Dictionary verwendet werden (d. h. alle deaktivierten Validierungstypen funktionieren als 'Easter Egg'-Option)."
control_center_155 = "Derzeit sind keine Benutzer auf der Allowlist"
control_center_156 = "Neue Benutzer zur Allowlist hinzufügen"
control_center_157 = "Sie können einen einzelnen Benutzer oder mehrere Benutzer gleichzeitig zur Allowlist hinzufügen, indem Sie ihre Benutzernamen einfach in das Textfeld unten kopieren und einfügen, getrennt durch <b>einen Benutzernamen pro Zeile</b>."
control_center_158 = "Benutzer wurden zur Allowlist hinzugefügt!"
control_center_159 = "Wenn Sie eine externe Authentifizierungsmethode verwenden (z. B. LDAP, Shibboleth), haben Sie die Möglichkeit, die Benutzer-Allowlist zu aktivieren. Standardmäßig (d. h. bei deaktivierter Allowlist) würde REDCap bei Verwendung externer Authentifizierungsmethoden den Benutzer normalerweise authentifizieren und ihm automatisch Zugriff auf die Anwendung gewähren. Dadurch kann jeder mit einem gültigen Benutzernamen für diese externe Authentifizierung ohne Genehmigungsprozess Zugriff auf REDCap erhalten."
control_center_160 = "Alternativ können extern authentifizierte Benutzer bei aktivierter Allowlist <u>nicht</u> auf REDCap zugreifen, bis sie zur Allowlist hinzugefügt wurden. Jeder, der nicht auf der Allowlist steht und sich über eine externe Methode authentifiziert, erhält daher eine Meldung, dass er nicht auf REDCap zugreifen kann, bis ein Administrator ihn zur Allowlist hinzufügt. Wenn die Allowlist aktiviert ist, erhalten Sie die Option, alle Benutzer, die bereits auf REDCap zugegriffen haben, automatisch zur Allowlist hinzuzufügen. Alle Administratoren werden bei Aktivierung der Allowlist immer automatisch zur Allowlist hinzugefügt."
control_center_161 = "Benutzer-Allowlist aktivieren?"
control_center_162 = "Benutzer-Allowlist"
control_center_163 = "Beim Aktivieren der Benutzer-Allowlist haben Sie zwei verschiedene Optionen. Sie können 1) alle bestehenden REDCap-Benutzer zur Allowlist hinzufügen (nur bei externer Authentifizierung) oder 2) die Allowlist unverändert lassen, ohne bestehende Benutzer hinzuzufügen (wobei alle Administratoren dennoch automatisch hinzugefügt werden). "
control_center_164 = "Benutzer-Allowlist für externe Authentifizierungsmethoden"
control_center_165 = "Wenn bereits Benutzer REDCap nutzen und Sie nun lediglich die Einführung neuer Benutzer in REDCap über die Allowlist begrenzen möchten, sollten Sie Option 1 wählen. Wenn Sie Option 2 wählen, kann niemand mit externer Authentifizierung (außer Administratoren) auf REDCap zugreifen, auch dann nicht, wenn die Person zuvor auf REDCap zugreifen konnte, bis sie zur Allowlist hinzugefügt wurde (es sei denn, sie existiert bereits in der Allowlist, falls diese früher schon einmal aktiviert war)."
