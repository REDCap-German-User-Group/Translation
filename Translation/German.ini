pub_051 = "Alle fehlenden Daten müssen eingegeben werden, bevor Sie auf Bereit klicken können."
pub_052 = "Zum Schutz Ihrer Daten ist das Kopieren für Zeilen mit Status Bereit deaktiviert."
pub_053 = "Die folgenden Artikel wurden Projekten zugeordnet, die von REDCap nachverfolgt werden. Sie werden in absteigender Reihenfolge nach Publikationsdatum angezeigt."
pub_054 = "Es wurden noch keine Publikationen REDCap-Projekten zugeordnet."
pub_055 = "Publication Matching ist derzeit DEAKTIVIERT! Das bedeutet, dass REDCap NICHT nach Publikationen sucht, die mit Ihren Principal Investigators zusammenhängen. Diese Funktionalität kann im Setup-Tab aktiviert werden."
pub_056 = "P.I.-Emailing"
pub_057 = "Publication-Matching-E-Mails sind derzeit DEAKTIVIERT! Das bedeutet, dass REDCap Ihre Principal Investigators NICHT per E-Mail über Publikationen informiert, die möglicherweise mit ihren Projekten zusammenhängen. Diese Funktionalität kann im Setup-Tab aktiviert werden."
pub_058 = "Die Aktivierung des P.I.-Emailing erlaubt REDCap, Projekt-P.I.s per E-Mail zu kontaktieren, wenn neue passende Publikationen gefunden werden. Verwenden Sie den Tab 'P.I. Emails', um E-Mails in der Vorschau anzuzeigen und weitere Informationen zu sehen."
pub_059 = "Tage zwischen E-Mails"
pub_060 = "So viele Tage warten, bevor dem P.I. eine weitere E-Mail über neue passende Publikationen gesendet wird."
pub_061 = "E-Mail-Limit"
pub_062 = "Maximal so viele E-Mails zu einer bestimmten Publikation an einen P.I. senden."
pub_063 = "E-Mail-Betreff"
pub_064 = "Die Betreffzeile in E-Mails an den P.I."
pub_065 = "E-Mail-Text"
pub_066 = "Der Text, der in E-Mails an den P.I. angezeigt wird."
pub_067 = "Die Aktivierung von Publication Matching erlaubt REDCap, regelmäßig nach Publikationen zu suchen, die mit den P.I.s von Projekten zusammenhängen, die Sie im Tab 'ToDo List' angeben können."
pub_068 = "Verwenden Sie unten eine Suchmethode, um projektspezifische Publication-Matching-Einstellungen abzurufen"
pub_069 = "Erlaubt Ihnen auszuwählen, welche To-do-Zeilen mit diesem P.I.-Namen, dieser E-Mail, diesem Alias und diesen Statusdaten befüllt werden sollen."
pub_070 = "P.I.-Ansicht"
pub_071 = "Eine Suche in Publikationsdatenbanken (z. B. PubMed) hat die folgenden Publikationen gefunden, die Ihren Namen in der Autorenliste enthalten. Bitte geben Sie an, ob dies Ihre Publikationen sind, indem Sie neben jeder 'Ja' oder 'Nein' auswählen. Wenn Sie 'Ja' auswählen, werden Sie aufgefordert anzugeben, welche Projekte mit der Publikation verbunden sind."
pub_072 = "Ist dies Ihre Publikation?"
pub_073 = "P.I.-Name, E-Mail und Alias in diese Zeile kopieren"
pub_074 = "Publikationen Projekten zuordnen"
pub_075 = "Verbleibende zu prüfende Publikationen:"
pub_076 = "Welche Projekte hängen mit dieser Publikation zusammen?"
pub_077 = "Pubs"
pub_078 = "Ausstehende Pubs"
pub_079 = "In der Tabelle unten finden Sie Einstellungen zur Anpassung der Funktionsweise des Publication-Matching-Dienstes, z. B. Änderung des Institutionsnamens, der bei der Abfrage von Autoren verwendet wird, die mit Ihrer Einrichtung verbunden sind, sowie Steuerung von Häufigkeit und Inhalt der an Principal Investigators gesendeten E-Mails. Alle unten aufgeführten Werte sind erforderlich, damit dieses Modul korrekt funktioniert."
pub_080 = "Vorschläge (zum Kopieren anklicken):"
pub_081 = "Damit REDCap die bestmöglichen Publikationssuchergebnisse erhalten kann, geben Sie bitte die in der To-do-Liste angeforderten Informationen zum Principal Investigator an. Manchmal fehlen diese P.I.-Informationen, weshalb sie hier manuell nachgetragen werden müssen. (Bitte beachten Sie, dass Sie durch das Hinzufügen der P.I.-Informationen unten diese dem Projekt selbst hinzufügen. Danach sind sie im Pop-up Projekteinstellungen ändern für das jeweilige Projekt sichtbar.) Zu Ihrer Bequemlichkeit gruppiert REDCap P.I.s nach Name und präsentiert sie jeweils als Gruppe. Verwenden Sie das Drop-down unten, um eine andere Gruppe (d. h. P.I.) auszuwählen."
pub_082 = "Von Verwendung ausschließen"
pub_083 = "Bereit zur Verwendung"
pub_084 = "Diese Seite neu laden, wenn abgeschlossen."
pub_085 = "Speichern"
pub_086 = "Alle speichern"
pub_087 = "Bitte schließen Sie mich noch nicht - ich speichere Ihre Daten noch!"
pub_088 = "Speichern FEHLGESCHLAGEN, erneuter Versuch..."
pub_089 = "Wird gespeichert..."
pub_090 = "Nach P.I.-Name suchen"
pub_091 = "Möchten Sie von einem bestehenden P.I. kopieren? Beginnen Sie, seinen Namen einzugeben..."
pub_092 = "Tippen, um nach P.I.-Name zu suchen..."
pub_093 = "Beginnen Sie, einen P.I.-Namen einzugeben, und drücken Sie dann ENTER, um zu suchen."
pub_094 = "Nach Projekt suchen"
pub_095 = "Wählen Sie ein Projekt aus, um dessen Publication-Matching-Einstellungen anzuzeigen."
pub_096 = "Setup"
pub_097 = "Statistiken"
pub_098 = "BETREFF:"
pub_099 = "ToDo"
pub_100 = "Alles erledigt - nichts mehr zu tun!"
pub_101 = "To-do-Liste"
pub_102 = "alle umschalten"
pub_103 = "Derzeit bearbeitet:"
pub_105 = "REDCap base URL"
pub_106 = "Die von Ihnen angegebene REDCap-URL scheint nicht gültig zu sein!"
pub_107 = "Die Liste der P.I.s unten enthält jene P.I.s, die Publikationen zugeordnet wurden und anschließend per E-Mail kontaktiert werden, damit sie das Publication Matching durchführen können. Die Liste kann P.I.s enthalten, die bereits per E-Mail kontaktiert wurden, sowie solche, die in der nächsten Charge per E-Mail kontaktiert werden. Sobald der P.I. das Matching aller seiner Publikationen durchgeführt hat, erscheint er nicht mehr in der Liste unten. Um die 'Matching'-Seite anzuzeigen, die der P.I. sehen wird, klicken Sie auf den Button 'P.I.-Ansicht'."
pub_108 = "FERTIG? Sobald Sie oben Ihre Publikationen ausgewählt haben, können Sie diesen Tab/dieses Fenster in Ihrem Webbrowser schließen. VIELEN DANK, dass Sie sich die Zeit genommen haben, diesen Prozess abzuschließen!"
pub_109 = "HINWEIS: Sobald dieses Modul aktiviert ist, werden alle zugeordneten Publikations-ID-Nummern (z. B. PubMed-IDs) jede Woche zusammen mit Ihren REDCap-Statistiken gesendet, damit sie aggregiert werden können, um den Impact im gesamten Konsortium zu messen. Es werden nur die Publikations-ID-Nummern selbst gesendet."
pub_110 = "Die Basis-Webadresse Ihrer REDCap-Installation (z. B. https://redcap.vumc.org/, https://YOURSITE.edu/redcap/). Diese wird verwendet, um die URL zu erstellen, wenn Benutzer durch REDCap navigieren, sowie zum Erstellen von Fragebogen-URLs, die in E-Mail-Einladungen enthalten sind."
pub_111 = "P.I.-Pub-Treffer"
pub_112 = "Projekt-Pub-Treffer"
pub_113 = "HINWEIS: Nur Projekte mit Zweck 'Research', die sich im Produktionsstatus befinden, können im Publication-Matching-Modul verwendet werden. Außerdem wird der Erstellungszeitpunkt des REDCap-Projekts als untere Datumsgrenze für Publikationen verwendet, wenn REDCap in Online-Publikationsdatenbanken nach Treffern sucht. Es wird daher angenommen, dass das Projekt vor Veröffentlichung der Publikation erstellt wurde."
pub_114 = "Noch keine P.I.s per E-Mail zu kontaktieren"

