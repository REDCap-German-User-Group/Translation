setup_219 = "Die Aktivierung der Mosio-SMS-Dienste für dieses Projekt erfordert die Genehmigung eines REDCap-Administrators. Nach dem Absenden wird ein Admin über Ihre Anfrage benachrichtigt. Nachdem die Anfrage genehmigt wurde, erhalten Sie eine E-Mail bezüglich der Antwort."
setup_220 = "Ein Benutzer hat beantragt, dass ein REDCap-Administrator Mosio in diesem Projekt aktiviert. Er hat seine Mosio-Kontozugangsdaten bereits eingegeben und gespeichert; diese wurden verifiziert. Klicken Sie auf den Button unten, um Mosio zu aktivieren. Anschließend wird der Benutzer per E-Mail über seine Anfrage benachrichtigt."

