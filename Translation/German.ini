check_153 = "Dieser Benutzer muss entweder alle vier Rechte (CREATE, ALTER, DROP, REFERENCES) haben oder keines dieser vier. Wenn dies nicht behoben wird, erstellt REDCap möglicherweise fälschlicherweise viele Datenbanktabellen mit Namen, die mit \"redcap_ztemp_\" beginnen; diese werden als temporäre Tabellen erstellt, wenn die Rechte Ihres MySQL-Benutzers getestet werden. Wenn Sie das Easy-Upgrade-Modul verwenden möchten, muss der MySQL-Benutzer außerdem alle vier Rechte haben (CREATE, ALTER, DROP, REFERENCES)."
check_154 = "<b>Unsichere REDCap-Versionen vom Webserver entfernen - EMPFOHLEN:</b> Es wird empfohlen, alle unten aufgeführten REDCap-Versionsverzeichnisse von Ihrem Webserver zu entfernen. Diese Versionen weisen bekannte Sicherheitslücken auf, die möglicherweise von böswilligen Angreifern ausgenutzt werden könnten, wenn sie auf Ihrem REDCap-Webserver verbleiben."
check_155 = "<b>EMPFOHLEN: Aktualisieren Sie Ihre REDCap-Datenbanktabellen zur Unterstützung von vollständigem Unicode</b><br>REDCap-Installationen, die ursprünglich mit einer Version vor REDCap 8.5.0 installiert wurden, haben eine ältere, veraltete Art der Datenbankkodierung-/Charset-Konfiguration (Zeichensatz). Dies betrifft Ihre REDCap-Installation; es wird *dringend* empfohlen, die Schritte auf der unten verlinkten Seite zu befolgen, um Ihre Datenbank zu aktualisieren. Bitte beachten Sie, dass dies KEIN dringendes Problem ist, aber etwas, das Sie eher früher als später angehen sollten, da Ihre aktuelle Datenbankkollation und Ihr Charset (UTF8 oder UTFMB3) in den neuesten Versionen von MySQL/MariaDB veraltet sind und daher in zukünftigen Versionen von MySQL/MariaDB irgendwann vollständig entfernt werden."
check_156 = "Erfahren, wie REDCap-Datenbanktabellen zur Unterstützung von vollständigem Unicode aktualisiert werden"
check_157 = "<b>Auf Ihrem Webserver ist die PHP-Bibliothek Zlib NICHT installiert.</b> Zlib ist erforderlich, um viele wichtige Funktionen in REDCap zu verwenden. Um Zlib zu REDCap hinzuzufügen, müssen Sie Zlib herunterladen und anschließend mit PHP auf Ihrem Webserver installieren und konfigurieren. Sie finden <a href='https://www.php.net/manual/en/zlib.setup.php' target='_blank' style='text-decoration:underline;'>Anweisungen zur Zlib-Installation hier</a>."
