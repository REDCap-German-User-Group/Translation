cdp_instant_adjudication_background_process_description_01 = "Die Hintergrundverarbeitung verwendet dieselbe Dashboard-Seite, die derzeit unten angezeigt wird. Sie können eine CDIS-Nachricht erhalten, sobald sie abgeschlossen ist."
cdp_instant_adjudication_background_process_description_02 = "Die Hintergrundverarbeitung verwendet dieselbe Dashboard-Seite, die derzeit unten angezeigt wird. REDCap berechnet die aktuelle ausstehende Anzahl vor der Verarbeitung. Sie können eine CDIS-Nachricht erhalten, sobald sie abgeschlossen ist."
cdp_instant_adjudication_background_process_completion_note = "Sie können optional eine CDIS-Nachricht erhalten, sobald der Vorgang abgeschlossen ist."
cdp_instant_adjudication_process_details_foreground = "<strong>Verarbeiten</strong> berechnet zuerst die aktuelle ausstehende Anzahl nur für die derzeit auf der Record Status Dashboard-Seite angezeigten Datensätze und verarbeitet dann die verifizierten Felder. Die Anzahl kann sich ändern, bevor die Verarbeitung beginnt."
cdp_instant_adjudication_process_details_background = "<strong>Im Hintergrund verarbeiten</strong> verwendet denselben aktuellen Umfang der Dashboard-Seite. REDCap berechnet die aktuelle ausstehende Anzahl im Hintergrund vor der Verarbeitung, sodass die Oberfläche nicht blockiert wird. Sie können optional eine CDIS-Nachricht erhalten, sobald der Vorgang abgeschlossen ist."
