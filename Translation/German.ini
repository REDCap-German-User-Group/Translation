esignature_14 = "Alle Datensätze"
esignature_18 = "Gesperrt?"
esignature_19 = "E-signiert?"
esignature_20 = "Datensatz anzeigen"
esignature_21 = "Bevor Formulare mit einer E-Signatur gesperrt werden können, müssen Sie Ihren REDCap-Benutzernamen und Ihr Passwort eingeben, damit diese validiert werden können. Nach drei aufeinanderfolgenden erfolglosen Versuchen werden Sie automatisch von REDCap abgemeldet, wodurch diese Sitzung beendet wird."
esignature_24 = "Der eingegebene Benutzername oder das Passwort war falsch! Bitte versuchen Sie es erneut."
esignature_25 = "E-Signaturen sind eine Erweiterung der Funktionalität zum Sperren/Entsperren von Datensätzen."
;; esignature_26 is concatenated with the e-signature checkbox label/icon, esignature_28, the Locked label/icon, and esignature_30.
esignature_26 = "Sobald ein Datenerhebungsinstrument für einen bestimmten Datensatz im Project gesperrt wurde, kann eine Person mit E-Signatur-Rechten anschließend bei Bedarf eine E-Signatur auf dieses Formular anwenden. Die E-Signatur-Option erscheint als Kontrollkästchen mit der Beschriftung"
;; esignature_28 is concatenated after the e-signature checkbox label/icon and before the Locked label/icon.
esignature_28 = "das direkt oberhalb der Speichern-Schaltflächen und unmittelbar unterhalb des Kontrollkästchens"
esignature_29 = "Gesperrt"
;; esignature_30 is concatenated after the Locked label.
esignature_30 = "angezeigt wird."
esignature_31 = "So funktioniert es:"
esignature_32 = "Obwohl das Sperren eines Datensatzes verhindert, dass seine Daten geändert werden, geht die E-Signatur einen Schritt weiter und dient als Entsprechung einer handschriftlichen Unterschrift. Wenn ein Datensatz e-signiert wurde, dann <b>bedeutet dies, dass seine Daten sowohl gesperrt (um weitere Änderungen zu verhindern) als auch autorisiert wurden</b> (d. h. durch einen Benutzer mit E-Signatur-Rechten). Wichtig ist außerdem: <b>Jede Person mit Sperrrechten (auch ohne E-Signatur-Berechtigung) hebt die E-Signatur auf einem Formular auf, wenn der Datensatz entsperrt wird</b>; danach können Datenänderungen am Datensatz vorgenommen werden. Die E-Signatur kann nach solchen Datenänderungen erneut angewendet werden. Für jeden Datensatz kann eine E-Signatur auf einem Formular unbegrenzt oft gespeichert und aufgehoben werden. Beim Speichern einer E-Signatur wird ein Benutzer aufgefordert, zur Verifizierung seinen Benutzernamen und sein Passwort einzugeben. Wenn die Verifizierung von Benutzername/Passwort dreimal hintereinander fehlschlägt, wird der Benutzer automatisch von REDCap abgemeldet."
esignature_33 = "So zeigen Sie das Protokoll der E-Signatur-Aktivität an:"
esignature_34 = "Ähnlich wie bei der Datensatzsperrung wird auch der Verlauf der E-Signatur in REDCaps Audit Trail auf der Logging-Seite gespeichert. Wenn man den historischen Verlauf der E-Signaturen im Project anzeigen möchte, kann man dies tun, indem man das Audit-Protokoll nach 'Datensatzsperrung & E-Signaturen' filtert, entweder für einen bestimmten Datensatz oder für alle Datensätze im Project."
esignature_35 = "(gesamter Datensatz)"

