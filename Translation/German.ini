data_export_tool_07 = "SPSS-Statistiksoftware"
data_export_tool_08 = "Laden Sie alle 3 Dateien rechts herunter und speichern Sie sie an einem gemeinsamen Speicherort. Doppelklicken Sie zuerst auf die Datei Pathway Mapper (.bat), die schnell und unsichtbar ausgeführt wird. (Wenn Sie kein Windows-Betriebssystem verwenden, z. B. Mac oder Linux, lesen Sie bitte die <i>Zusätzlichen Anweisungen</i>.) Doppelklicken Sie nun auf die *.sps-Datei, wodurch SPSS geöffnet wird. Wenn die Datei geladen und angezeigt wird, wählen Sie im oberen Menü Run-->All. Diese Aktion startet das Skript, das automatisch alle Daten einliest und Datenfelder mit Bezeichnungen, Optionswerten usw. verarbeitet."
data_export_tool_08b = "Zusätzliche Anweisungen"
; data_export_tool_08c is concatenated with an example folder path.
