survey_1121 = "Ablaufzeit des Teilnehmerlinks ändern"
survey_1122 = "Um die Ablaufzeit des Teilnehmerlinks zu ändern, ändern Sie sie im untenstehenden Textfeld ODER klicken Sie alternativ auf die Schaltfläche 'Jetzt ablaufen lassen' und dann auf Speichern. <b>HINWEIS: Dadurch wird die Standard-Ablaufzeit des Teilnehmerlinks dauerhaft überschrieben</b>, die auf der Einstellung 'Zeitlimit für Abschluss' der Umfrage basiert. Wenn außerdem die Zeitlimit-Einstellung der Umfrage künftig geändert wird (d. h. für die gesamte Umfrage), wirkt sich dies *nicht* auf die hier für den Teilnehmer festgelegte überschriebene Zeit aus (es sei denn, die Einstellung wird für die Umfrage vollständig deaktiviert)."
