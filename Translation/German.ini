survey_1175 = "(einschließlich Zertifizierung am Ende der Umfrage und Archivierung des PDF-Einwilligungsformulars)"
survey_1176 = "Electronic Consent (e-Consent) ist eine Plattform zur Einwilligung von Patienten oder Forschungssubjekten vor Ort oder zu Hause mithilfe eines computerbasierten Einwilligungsformulars anstelle traditioneller Papierdokumentation. Einwilligungsformulare können in einer REDCap-Umfrage per Computer, Mobiltelefon oder Tablet umgesetzt werden."
survey_1179 = "Was ist das e-Consent Framework?"
survey_1180 = "Auto-Archiver aktiviert"
survey_1181 = "Unten werden PDF-Dateien angezeigt, die automatisch durch die PDF-Auto-Archiver-Einstellung erfasst und gespeichert wurden, die von einer oder mehreren Umfragen auf deren Seite Umfrageeinstellungen aktiviert wurde. Nur Benutzer mit Datenexportrechten 'Vollständiger Datensatz' können die archivierten Dateien herunterladen. Hinweis: Die PDFs unten wurden archiviert, als ein Teilnehmer eine Umfrage abgeschlossen hat; daher können sie sich von anderen herunterladbaren PDFs im Projekt unterscheiden, die bei Bedarf mit den aktuellen Daten generiert werden."
survey_1183 = "Wie kann der 'Signatur'-Prozess für e-Consent gehandhabt werden?"
survey_1184 = "Patienten/Subjekte können ihre Einwilligungen durch Eingabe ihres Namens oder durch Verwendung des REDCap-Feldtyps 'Signatur' (d. h. 'nasse Signatur') in der Umfrage 'signieren'. Man könnte potenziellen Teilnehmenden auch PIN-Nummern zuweisen, um den Signaturprozess zu unterstützen. <u>Bitte beachten Sie, dass der Signaturprozess von REDCap NICHT automatisch implementiert wird,</u> daher liegt es in Ihrer Verantwortung als Umfrageadministrator, Ihre Umfrage mit einer der oben genannten Methoden zu erstellen, damit die Signatur angemessen erfasst wird."
survey_1185 = "Wie das e-Consent Framework funktioniert"
survey_1186 = "Was ist e-Consent?"
survey_1187 = "Warum heißt dies 'Framework'?"
survey_1188 = "Das 'e-Consent Framework' wird als 'Framework' bezeichnet, weil das Aktivieren dieser Option allein keinen e-Consent-Prozess bereitstellt, sondern lediglich den allgemeinen Rahmen oder Mechanismus, damit Sie Patienten/Subjekten e-Consent bereitstellen können. Als Umfrageadministrator müssen Sie weiterhin Ihre e-Consent-Umfrage und alle darin enthaltenen Fragen erstellen, einschließlich Name, Geburtsdatum und wie Sie die Signatur erfassen möchten. Dieses Framework ermöglicht die Umsetzung Ihres e-Consent-Prozesses durch standardisierte Werkzeuge (Zertifizierungsbildschirm + automatische Speicherung des Einwilligungsformulars als 'Hard-copy'-PDF), während Sie Ihre Umfrage weiterhin nach Wunsch anpassen können."
survey_1191 = "Hinweis: Wenn Sie ein einzelnes Feld zur Erfassung des vollständigen Namens verwenden, können Sie es oben entweder für Vor- oder Nachname auswählen und das andere Namensfeld unausgewählt lassen."
