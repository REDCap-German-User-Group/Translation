control_center_4681 = "Klicken Sie auf diesen Button, um das Problem automatisch zu beheben."
control_center_4682 = "Ihre aktuelle Datenbanktabellenstruktur entspricht nicht der von REDCap erwarteten Tabellenstruktur. Das bedeutet, dass Datenbanktabellen und/oder Teile von Tabellen fehlen. Dies kann passieren, wenn während eines Upgrades ein Problem auftritt und danach nicht behoben wird."
control_center_4683 = "Kopieren Sie das SQL im Feld unten und führen Sie es auf dem MySQL-Datenbankserver aus, auf dem die REDCap-Datenbanktabellen gespeichert sind. Laden Sie anschließend diese Seite neu, um diese Prüfung erneut auszuführen."
control_center_4684 = "Auf diesem REDCap-Server wurden mehrere REDCap-Versionen erkannt, die mögliche Upgrade-Pfade darstellen. Bei einigen Versionen muss REDCap möglicherweise offline genommen werden, um das Upgrade abzuschließen, bei anderen möglicherweise nicht. Unten sind die möglichen Versionen aufgeführt, auf die Sie upgraden können. Klicken Sie auf den Link einer Version, um zur Upgrade-Seite dieser Version zu navigieren."
control_center_4685 = "(schnelles Upgrade - erfordert <u>nicht</u>, REDCap offline zu nehmen)"
control_center_4686 = "(erfordert, REDCap vorübergehend offline zu nehmen)"
control_center_4687 = "Upgrade auf"
control_center_4688 = "HINWEIS: Die Easy-Upgrade-Funktion kann nicht verwendet werden, wenn der REDCap-Webserver Load Balancing verwendet (mehrere Anwendungsserver). Der Grund ist, dass der Quellcode während des Upgrade-Prozesses nur auf einen einzelnen Server heruntergeladen würde (statt auf alle)."
