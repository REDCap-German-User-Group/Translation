global_304 = "Cookie-Richtlinie"
global_305 = "<h4>REDCap Cookie-Nutzungsrichtlinie</h4><br><b>1. Was sind Cookies?</b><br><br>Cookies sind kleine Textdateien, die auf Ihrem Gerät (Computer, Tablet oder Mobilgerät) abgelegt werden, wenn Sie eine Website besuchen. Sie werden häufig verwendet, damit Websites effizienter funktionieren, und um den Betreibern der Website Informationen bereitzustellen.<br><br><b>2. Verwendete Cookie-Arten</b><br><br>REDCap verwendet zwei Hauptarten von Cookies: notwendige Cookies und funktionale Cookies. Details zu jeder Art und ihrem Zweck finden Sie unten.<br><br><b>3. Notwendige Cookies</b><br><br>Notwendige Cookies sind für das ordnungsgemäße Funktionieren dieser Webanwendung (REDCap) unerlässlich. Diese Cookies stellen grundlegende Funktionen und Sicherheitsfunktionen der Website sicher. Ohne diese Cookies sind bestimmte Funktionen und Dienste möglicherweise nicht verfügbar. Beispiel für notwendige Cookies: Session-Cookies, die Sie eingeloggt halten, während Sie zwischen verschiedenen Seiten navigieren.<br><br><b>4. Funktionale Cookies</b><br><br>Funktionale Cookies ermöglichen der Webanwendung erweiterte Funktionalität und Personalisierung. Wenn Sie diese Cookies nicht zulassen, funktionieren einige oder alle dieser Dienste möglicherweise nicht korrekt. Beispiele für funktionale Cookies: 1) Cookies, die Ihre Einstellungen speichern, z. B. Sprache, und 2) Cookies, die erweiterte Funktionen bereitstellen, z. B. das Speichern Ihrer gewünschten benutzerdefinierten Textgröße auf Fragebogenseiten.<br><br><b>5. Cookies verwalten</b><br><br>Sie haben das Recht, Cookies anzunehmen oder abzulehnen. Die meisten Webbrowser akzeptieren Cookies automatisch, aber Sie können Ihre Browsereinstellungen normalerweise ändern, um Cookies zu löschen oder abzulehnen, wenn Sie dies bevorzugen. Bitte beachten Sie, dass Sie bei Ablehnung von Cookies nicht alle Funktionen dieser Webanwendung (REDCap) nutzen können."
