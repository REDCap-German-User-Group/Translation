mycap_mobile_app_684 = "Aktuelle Einschränkungen von MyCap:"
mycap_mobile_app_685 = "Mehrere Standard-REDCap-Funktionen werden von MyCap nicht unterstützt, teilweise weil die MyCap-App absichtlich nur sehr wenige Teilnehmerdaten zu einem bestimmten Zeitpunkt auf dem Mobilgerät speichert. Die folgenden REDCap-Funktionen werden <u>in der MyCap-Mobile-App nicht unterstützt</u>: Piping, Smart Variables, Field Embedding, spezielle Funktionen, berechnete Felder und die meisten Action Tags (@HIDDEN und alle mit @MC- beginnenden Action Tags *werden* unterstützt). <u>Verzweigungslogik wird teilweise unterstützt</u>: einfache, einzeilige Verzweigungslogik (d. h. enthält kein AND, OR oder spezielle Funktionen), z. B. <code>[field]='1'</code>, wird unterstützt."
