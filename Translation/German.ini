dash_05 = "Project Dashboards sind Seiten mit dynamischem Inhalt, die zu einem Project hinzugefügt werden können. Sie können spezielle Smart Variables verwenden, die <b>Smart Functions, Smart Tables und Smart Charts</b> genannt werden und jeweils aggregierte mathematische Funktionen ausführen, Tabellen mit deskriptiven Statistiken anzeigen und verschiedene Diagrammtypen darstellen können. Project Dashboards haben zwei grundlegende Eigenschaften: einen Titel und einen Inhalt. Benutzerzugriffsrechte können für jedes Dashboard angepasst werden, und jeder mit Rechten für Project Design kann sie erstellen und bearbeiten. Auf der Erstellungsseite für Project Dashboards steht ein Assistent bereit, der Ihnen hilft, die Syntax für Smart Functions, Smart Tables oder Smart Charts in Ihren Dashboards zu erstellen; außerdem ist eine Liste hilfreicher Beispiele enthalten."
