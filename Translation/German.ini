messaging_82 = "Unterhaltung löschen?"
messaging_83 = "Möchten Sie diese Unterhaltung wirklich archivieren? Das Archivieren einer Unterhaltung bedeutet, dass sie *nicht* gelöscht wird, sondern einfach für alle Benutzer in dieser Unterhaltung aus der Liste der REDCap-Messenger-Unterhaltungen entfernt wird. Mitglieder der Unterhaltung können darin keine neuen Nachrichten mehr posten, es sei denn, sie wird wieder in den aktiven Status versetzt. Dies kann jederzeit durch einen Unterhaltungsadministrator erfolgen."
