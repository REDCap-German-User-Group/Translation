check_169 = "<b>Sicherheitsverbesserung - EMPFEHLUNG:</b></span>Es sieht so aus, als würden Sie REDCap über SSL/HTTPS betreiben (was Sie *sollten*, wenn dies ein Produktionsserver ist). Für bessere Sicherheit wird empfohlen, die Option <i>session.cookie_secure</i> in der PHP.INI-Datei Ihres Webservers zu aktivieren. Um \"session.cookie_secure option\" zu aktivieren, öffnen Sie einfach die PHP.INI-Datei Ihres Webservers zur Bearbeitung und ändern Sie den Wert der Option \"session.cookie_secure\" auf \"On\" oder fügen Sie, falls sie noch nicht existiert, die folgende Zeile im Abschnitt <code>[Session]</code> der PHP.INI hinzu:<br><code>session.cookie_secure = On</code><br>Starten Sie danach Ihren Webserver neu. Dies ist nicht erforderlich, wird aber empfohlen, da es die Gesamtsicherheit des REDCap-Systems verbessert."
check_170 = "GLÜCKWUNSCH!"
check_171 = "<b>Es sieht so aus, als sei die REDCap-Software korrekt auf Ihrem System installiert/aktualisiert und konfiguriert. Sie ist einsatzbereit.</b> Sie können REDCap verwenden, indem Sie zuerst die REDCap-Startseite unter dem untenstehenden Link besuchen. (Es kann hilfreich sein, diesen Link als Lesezeichen zu speichern.)"
check_172 = "REDCap-Startseite:"
check_173 = "<b>Derzeit verwendet REDCap die Authentifizierungsmethode \"None (Public)\"</b>, die ausschließlich von einem generischen Benutzer namens \"<b>site_admin</b>\" genutzt wird. Diese Authentifizierungsmethode eignet sich am besten, wenn Sie einen Entwicklungsserver verwenden oder wenn Sie noch nicht alle Probleme mit der Benutzerauthentifizierung auf Ihrem System gelöst haben. Sobald die Authentifizierung Ihrer Site korrekt funktioniert, können Sie im Control Center auf der Seite Sicherheit & Authentifizierung die Authentifizierungsmethode auf diejenige ändern, die Sie auf Ihrem System implementieren werden (d. h. LDAP, tabellenbasiert, RSA SecurID, LDAP/Tabellen-Kombination, Shibboleth).<b>Wenn Sie sich entscheiden, von \"None\"-Authentifizierung auf \"tabellenbasiert\" zu wechseln</b>, stellen Sie bitte sicher, dass Sie sich selbst als neuen tabellenbasierten Benutzer hinzufügen (im Reiter Benutzerverwaltung im Control Center), bevor Sie die Authentifizierungsmethode umstellen; andernfalls können Sie sich nicht anmelden."
check_174 = "<b>HINWEIS: Die Read-Replica-Datenbank ist möglicherweise offline!</b> Im Moment kann REDCap keine Verbindung zur sekundären schreibgeschützten Datenbank herstellen. Sie ist möglicherweise offline. REDCap funktioniert weiterhin normal, aber bitte beachten Sie, dass die Read Replica derzeit möglicherweise auf keiner REDCap-Seite zur Leistungsverbesserung genutzt wird."
; check_175 is concatenated with strings check_176, check_190 and dynamic lag values.
check_175 = "<b>HINWEIS:</b> Die Read-Replica-Datenbank liegt derzeit hinter der Primary Database zurück um"
; check_176 is concatenated with strings check_175, check_190 and dynamic lag values.
check_176 = "Sekunden. Dies kann eine vorübergehende Verzögerung sein. Wenn die Replica mehr als"
; check_178 is concatenated with string check_179 and a dynamic lag value.
check_178 = "Die Read-Replica-Datenbank liegt derzeit zurück um"
; check_179 is concatenated with string check_178 and a dynamic lag value.
check_179 = "Sekunden hinter der Primary Database, was gut genug ist, damit die Replica für viele REDCap-Seiten genutzt werden kann, die große Leseoperationen durchführen."
check_180 = "Die Read-Replica-Datenbank arbeitet gut"
check_181 = "<b>HINWEIS: Die Verzögerungszeit der Read-Replica-Datenbank kann nicht bestimmt werden!</b> Aus unbekannten Gründen ist es REDCap nicht möglich zu erkennen, um wie viel Zeit die Read-Replica-Datenbank hinter der Primary Database zurückliegt. Bitte prüfen Sie die MySQL/MariaDB-Benutzerrechte auf der Read Replica, um sicherzustellen, dass sie die SQL-Abfrage <code>SHOW SLAVE STATUS</code> erfolgreich ausführen darf, damit korrekt bestimmt werden kann, ob die Read Replica von REDCap genutzt werden kann."
check_182 = "Replica Lag (Sekunden):"
check_183 = "<b>Die Zeitzoneneinstellung des Cron-Jobs ist falsch - KRITISCH:</b> Es wird DRINGEND empfohlen, die PHP.INI-Datei zu ändern, die vom REDCap-Cron-Job verwendet wird. Es sieht so aus, als würden zwei PHP.INI-Dateien verwendet (eine für die Haupt-Weboberfläche unter <code>{0}</code> und eine für den Cron-Job unter <code>{1}</code>). Die PHP.INI der Weboberfläche hat die Zeitzoneneinstellung <b>{2}</b>, während der Cron-Job die Zeitzoneneinstellung <b>{3}</b> hat. Wenn sie nicht identisch sind, können Probleme bei der korrekten Ausführung des REDCap-Cron-Jobs auftreten. Bitte ändern Sie eine der beiden so, dass sie identisch sind."
check_184 = "<b>Datenbank-Konfigurationsproblem - KRITISCH:</b> Es ist erforderlich, dass die MySQL-Einstellung \"sql_generate_invisible_primary_key\" deaktiviert wird, da sie zu falsch positiven Ergebnissen bei der REDCap-Prüfung 'Database structure issues exist' führen kann. Um dies zu beheben, fügen Sie die Zeile<br><code><b>sql_generate_invisible_primary_key=OFF</b></code><br> zu Ihrer MY.CNF- (oder MY.INI-)Konfigurationsdatei für MySQL hinzu. Wenn es bereits eine Zeile in der Datei gibt, die mit \"sql_generate_invisible_primary_key\" beginnt, ändern Sie diese Einstellung so, dass ihr Wert jetzt <b>OFF</b> ist. Speichern Sie dann die Konfigurationsdatei und starten Sie den MySQL-Dienst neu. Laden Sie diese Seite erneut, um sicherzustellen, dass die Korrektur erfolgreich wirksam wurde."
check_185 = "<b>Verbindung zum WebDAV-Dateiserver nicht möglich - KRITISCH:</b><br>Es wird DRINGEND empfohlen, Ihre WebDAV-Serverkonfiguration oder Ihre WebDAV-Verbindungsinformationen in <b>{0}</b> zu ändern. Die aktuellen Verbindungsinformationen versuchen, mit dem WebDAV-Server \"{1}\" unter dem Pfad \"{2}\" zu kommunizieren, und dies schlägt fehl. Bitte stellen Sie sicher, dass alle Verbindungswerte korrekt sind und das Verzeichnis beschreibbar ist. Einige Funktionen innerhalb von REDCap funktionieren nicht, bis dies behoben ist."
check_186 = "Der WebDAV-Client hat diesen Fehler gemeldet ({0}):<br><code>{1}</code>"
check_187 = "<b>Datei-Upload-Verzeichnis ist auf dem WebDAV-Server NICHT beschreibbar - KRITISCH:</b><br>Es wird DRINGEND empfohlen, Ihre WebDAV-Serverkonfiguration oder Ihre WebDAV-Verbindungsinformationen in <b>{0}</b> zu ändern. Die aktuellen Verbindungsinformationen versuchen, mit dem WebDAV-Server \"{1}\" unter dem Pfad \"{2}\" zu kommunizieren, und dies schlägt fehl. Bitte stellen Sie sicher, dass alle Verbindungswerte korrekt sind und das Verzeichnis beschreibbar ist. Einige Funktionen innerhalb von REDCap funktionieren nicht, bis dieses WebDAV-Verzeichnis beschreibbar ist."
check_188 = "<b>Datei-Upload-Verzeichnis ist auf WebDAV-Server \"{0}\" unter Pfad \"{1}\" beschreibbar</b>"
check_189 = "<b>Rapid-Retrieval-Verzeichnis nicht beschreibbar - KRITISCH:</b> Es wird DRINGEND empfohlen, das alternative Cache-Dateispeicherverzeichnis von Rapid Retrieval zu ändern (befindet sich unter <b>{0}</b>), damit das Verzeichnis für alle Serverbenutzer beschreibbar ist. Die Rapid-Retrieval-Caching-Funktionalität funktioniert nicht, bis dieser Ordner beschreibbar ist."
; check_190 is concatenated with strings check_175, check_176 and dynamic lag values.
check_190 = "Sekunden hinter Primary liegt, wird die Replica in vielen Fällen wahrscheinlich nicht verwendet. Eine solche Verzögerung ist oft vorübergehend und sollte sich später von selbst auflösen, wenn die Datenbank nicht so stark ausgelastet ist."
check_191 = "Einstellung 'Generated Invisible Primary Keys' sollte deaktiviert werden - KRITISCH:"
check_192 = "Es sieht so aus, als sei die MySQL-Funktion 'Generated Invisible Primary Keys' auf Ihrem Datenbankserver aktiviert. Diese Funktion ist NICHT mit REDCap kompatibel und sollte daher deaktiviert werden. Sie sollten <code>sql_generate_invisible_primary_key</code> in Ihrer <b>my.cnf</b>- (oder <b>my.ini</b>-)Konfigurationsdatei auf <code>OFF</code> setzen können oder alternativ die Abfrage <code>SET GLOBAL sql_generate_invisible_primary_key = OFF;</code> direkt in der MySQL-Datenbank ausführen, um diese Einstellung zu deaktivieren."
check_193 = "Konnte NICHT mit dem internen REDCap-Fragebogen-Endpunkt ({0}) kommunizieren. Das bedeutet, dass REDCap serverseitige Anfragen an sich selbst aus irgendeinem Grund nicht durchführen kann. Dieses Problem tritt manchmal bei Verwendung eines Proxys oder Load Balancers auf oder kann durch eine spezifische Netzwerkkonfiguration verursacht werden, bei der ein ausgehender HTTP-Aufruf vom REDCap-Webserver bei einem HTTP-Aufruf an sich selbst nicht vollständig zurück zu sich selbst geroutet wird. Unabhängig davon kann dies nicht durch eine Konfiguration innerhalb von REDCap behoben werden; Sie sollten Ihr IT-/Netzwerkteam kontaktieren, um dies server-/netzwerkseitig zu lösen."
check_194 = "(Optional) Wenn auf Ihrem Datenbankserver Clustering oder Replikation implementiert ist, wobei es erforderlich sein könnte, dass jede Datenbanktabelle einen auto-inkrementierten Primary Key hat, können Sie das SQL im Feld unten ausführen, um allen REDCap-Datenbanktabellen Primary Keys hinzuzufügen. Bitte bedenken Sie, dass diese Abfragen je nach Größe Ihrer Datenbank Minuten oder möglicherweise Stunden zur Ausführung benötigen können. Hinweis: Wir empfehlen nicht, das untenstehende SQL auszuführen, es sei denn, Sie glauben, dass Sie es wirklich benötigen."
check_195 = "Das REDCap-\"temp\"-Verzeichnis ist beschreibbar<br>Ort:"
check_196 = "<b>REDCap kann keine Unterordner unter dem REDCap-\"temp\"-Verzeichnis erstellen - DRINGEND EMPFOHLEN:</b><br>Mehrere Funktionen in REDCap müssen Unterordner im Temp-Verzeichnis von REDCap erstellen (befindet sich unter <code>{0}</code>) und Dateien in diesen Unterordnern speichern. Aufgrund der Serverrechte kann REDCap dies nicht tun. Bitte ändern Sie die Ordnerrechte Ihres Servers so, dass der Webserver Unterordner unter dem REDCap-Temp-Verzeichnis erstellen sowie Dateien in diesen Unterordnern lesen und schreiben kann."
check_197 = "<b>Datenbank-Konfigurationsänderung - KRITISCH:</b> Es wird DRINGEND empfohlen, die MySQL-Einstellung \"restrict_fk_on_non_standard_key\" aus Kompatibilitätsgründen zu ändern. Um dies zu beheben, fügen Sie die Zeile<br><code><b>restrict_fk_on_non_standard_key=OFF</b></code><br> im Abschnitt [mysqld] Ihrer MY.CNF- (oder MY.INI-)Konfigurationsdatei für MySQL hinzu. Wenn es bereits eine Zeile in der Datei gibt, die mit \"restrict_fk_on_non_standard_key\" beginnt, ändern Sie diese Einstellung so, dass ihr Wert jetzt <b>OFF</b> ist. Speichern Sie dann die Konfigurationsdatei und starten Sie den MySQL-Dienst neu. Laden Sie diese Seite erneut, um sicherzustellen, dass die Korrektur erfolgreich wirksam wurde."
check_198 = "<b>max_memory_limit ist zu niedrig - KRITISCH:</b> PHPs Einstellung max_memory_limit ist derzeit auf {0} gesetzt, was weniger ist als REDCaps erforderlicher Wert {1}. Bitte ändern Sie max_memory_limit in PHP.INI entweder auf -1 oder auf einen Wert gleich oder größer als 2G."
check_202 = "<b>Das REDCap-Hauptverzeichnis sollte nicht beschreibbar sein - EMPFOHLEN:</b>"
; check_203 is formatted with a dynamic General Configuration page link.
check_203 = "Laut {0} scheint dies ein"
check_204 = "Produktionsserver"
check_205 = "Entwicklungs-/Test-/Staging-Server"
check_206 = "Daher"
check_207 = "Falls es tatsächlich ein Produktionsserver ist,"
; check_208 is formatted with a dynamic REDCap application code path.
check_208 = "wird aus Sicherheitsgründen DRINGEND empfohlen, dem Webserver (Apache, IIS, nginx usw.) Schreibzugriff auf den Ordner zu verweigern, in dem der REDCap-Anwendungscode gespeichert ist (<code>{0}</code>) - mit Ausnahme der REDCap-Ordner <code>/temp/</code> und <code>/modules/</code>, die beschreibbar bleiben müssen. Dadurch wird verhindert, dass beliebiger Code (z. B. Code von Angreifern) Dateien in REDCap-Verzeichnissen erstellt oder ändert. HINWEIS: Wenn dies kein Produktionsserver ist oder wenn Ihr REDCap-Webserver hinter einer Firewall steht und nicht über das Web erreichbar ist, ist dies nur eine Empfehlung. Zusätzlich gilt: <u>Wenn Sie derzeit die Easy-Upgrade-Funktion</u> zur Durchführung von REDCap-Upgrades auf diesem Server verwenden, führt die Anwendung dieser empfohlenen Sicherheitsverbesserungen dazu, dass die Easy-Upgrade-Funktion nicht mehr funktioniert."
check_209 = "<b>MIME-Typ nicht auf dem Webserver registriert - EMPFOHLEN:</b> Einige Funktionen in REDCap verwenden Dateien, für die offenbar kein MIME-Typ auf dem REDCap-Webserver registriert ist (oder nicht korrekt registriert ist). Das bedeutet, dass diese Funktionen möglicherweise nicht korrekt funktionieren oder angezeigt werden. Stellen Sie in der Konfiguration Ihres Webservers (d. h. für Apache, IIS oder nginx) sicher, dass {0}-Dateitypen den folgenden MIME-Typ registriert haben: {1}."
check_210 = "<b>Die Einstellung \"Eingeschränkte Dateitypen für hochgeladene Dateien\" ist nicht gesetzt</b> auf der Seite Datei-Upload-Einstellungen im Control Center. Bitte tragen Sie einen Wert für diese Einstellung ein, um Ihrem Webserver ein höheres Schutzniveau vor gefährlichen Dateien zu bieten. Wenn Sie eine Standardempfehlung benötigen, können Sie die folgenden Dateitypen hinzufügen:"
check_211 = "<b>Verzeichnis, in dem von Benutzern hochgeladene Dokumente gespeichert werden, ist über das Web erreichbar:</b><br> Es wird DRINGEND empfohlen, den Speicherort zu ändern, an dem von Benutzern hochgeladene Dateien gespeichert werden. Derzeit werden sie in einem Verzeichnis gespeichert, das vollständig über das Web erreichbar ist (<code>{0}</code>), was ein potenzielles Sicherheitsrisiko darstellt.<br><br> Es wird empfohlen, im Control Center zur Seite Datei-Upload-Einstellungen zu gehen und einen neuen Pfad für Ihren \"Lokalen Dateispeicherort\" festzulegen, und zwar einen Pfad auf Ihrem Webserver, der NICHT über das Web erreichbar ist. Nachdem Sie diesen Wert geändert haben, gehen Sie in das vorherige Verzeichnis und kopieren alle vorhandenen Dateien in diesem Ordner an den neuen Ort, den Sie gerade festgelegt haben."

api_docs_001 = "Einführung in die REDCap-API"
api_docs_002 = "Hier finden Sie die gesamte Dokumentation zur Nutzung der REDCap-API. Allgemeine Informationen zur REDCap-API oder zu den von der REDCap-API unterstützten Methoden finden Sie in der Liste im Menü links. Jede API-Methode stellt eine bestimmte Aktion bereit, die REDCap ausführen kann."
api_docs_003 = "Die Abkürzung 'API' steht für 'Application Programming Interface'. Eine API ist einfach ein definierter Weg, mit dem ein Programm eine Aufgabe ausführen kann. Die REDCap-API ist eine Schnittstelle, über die externe Anwendungen aus der Ferne eine Verbindung zu REDCap herstellen können. Sie wird verwendet, um Daten oder Einstellungen in REDCap programmatisch abzurufen oder zu ändern, z. B. für automatisierte Datenimporte/-exporte für ein bestimmtes REDCap-Projekt. Programmierer können mit der REDCap-API Anwendungen, Websites, Apps, Widgets und andere Projekte erstellen, die mit REDCap interagieren. Programme kommunizieren mit der REDCap-API über HTTP, dasselbe Protokoll, das Ihr Browser zum Aufrufen und Interagieren mit Webseiten verwendet."
api_docs_004 = "Um mit der REDCap-API zu beginnen, öffnen Sie im linken Menü den Abschnitt Allgemeine API-Informationen. Außerdem gibt es in jedem Ihrer REDCap-Projekte eine API-Playground-Seite, auf der Sie mit der REDCap-API experimentieren und den Funktionsumfang ansehen können, ohne Code schreiben zu müssen."
api_docs_005 = "Um die REDCap-API für ein bestimmtes REDCap-Projekt zu verwenden, muss Ihnen zuerst ein Token zugewiesen werden, das spezifisch für Ihren Benutzernamen in diesem Projekt ist. Statt Benutzername/Passwort verwendet die REDCap-API Tokens als sichere Authentifizierung; ein Token muss in jeder API-Anfrage enthalten sein. Bitte beachten Sie, dass jeder Benutzer für jedes REDCap-Projekt, auf das er Zugriff hat, ein eigenes Token hat. Für API-Anfragen an mehrere Projekte sind daher mehrere Tokens erforderlich."
api_docs_006 = "Um ein API-Token für ein Projekt zu erhalten, navigieren Sie zu diesem Projekt und klicken Sie dann in der Seitenleiste Anwendungen auf den API-Link. Auf dieser Seite können Sie bei Ihrem REDCap-Administrator ein API-Token für das Projekt anfordern; außerdem wird dort Ihr API-Token angezeigt, falls es bereits zugewiesen wurde. Wenn Sie im linken Menü Ihres Projekts keinen Link zur API-Seite sehen, muss Ihnen zuerst jemand API-Berechtigungen im Projekt geben (über die Seite Benutzerrechte des Projekts)."
api_docs_007 = "HTTP-Statuscodes:"
api_docs_008 = "Die REDCap-API versucht, für jede Anfrage passende HTTP-Statuscodes zurückzugeben. Unten finden Sie eine umfassende Liste aller möglichen HTTP-Codes, die von der API zurückgegeben werden können, sowie deren Bedeutung."
api_docs_009 = "200 OK: "
api_docs_010 = "Erfolg!"
api_docs_011 = "400 Bad Request: "
api_docs_012 = "Die Anfrage war ungültig. Eine begleitende Meldung erklärt den Grund."
api_docs_013 = "401 Unauthorized: "
api_docs_014 = "API-Token fehlte oder war falsch."
api_docs_015 = "403 Forbidden: "
api_docs_016 = "Sie haben keine Berechtigung, die API zu verwenden."
api_docs_017 = "404 Not Found: "
api_docs_018 = "Die angeforderte URI ist ungültig oder die Ressource existiert nicht."
api_docs_019 = "406 Not Acceptable: "
api_docs_020 = "Die importierten Daten waren falsch formatiert."
api_docs_021 = "500 Internal Server Error: "
api_docs_022 = "Beim Verarbeiten Ihrer Anfrage ist auf dem Server ein Fehler aufgetreten."
api_docs_023 = "501 Not Implemented: "
api_docs_024 = "Die angeforderte Methode ist nicht implementiert."
api_docs_025 = "Fehlermeldungen:"
api_docs_026 = "Wenn die API Fehlermeldungen zurückgibt, geschieht dies in dem Rückgabeformat, das Sie in Ihrer API-Anfrage angegeben haben (und wenn keines angegeben ist, im Standardformat). Sie können das gewünschte Format mit dem Parameter <b>returnFormat</b> angeben. Ein Fehler aus einer XML-Methode könnte zum Beispiel so aussehen:"
api_docs_027 = "ausführliche Fehlermeldung"
api_docs_028 = "Obwohl API-Anfragen an REDCap über SSL (HTTPS) erfolgen, wodurch der Datenverkehr zum und vom REDCap-Server verschlüsselt wird, kann noch mehr getan werden, um bei der Nutzung der API das höchste Sicherheitsniveau sicherzustellen. Dies ist besonders wichtig, wenn Sie sensible Daten in REDCap hinein oder aus REDCap heraus übertragen. Es wird *dringend* empfohlen, dass Ihr API-Skript/-Programm (also die Komponente, die die Anfrage an die REDCap-API stellt) bei der API-Anfrage <b>das SSL-Zertifikat des REDCap-Webservers validiert</b>."
api_docs_029 = "Hintergrund zu SSL-Zertifikaten:"
api_docs_030 = "Man-in-the-Middle-Angriff"
api_docs_031 = "Java verify ssl certificate"
api_docs_032 = "Durch das Hinzufügen der SSL-Zertifikatsprüfung haben Sie somit die Möglichkeit von MiM-Angriffen vollständig verhindert und verwenden die sicherste Form der Kommunikation mit der REDCap-API."
;; api_docs_033 is concatenated with link text api_docs_030 and continuation string api_docs_034.
api_docs_033 = "Webserver besitzen SSL-Zertifikate, damit ihre Identität validiert und ihnen vertraut werden kann; danach kann eine sichere, verschlüsselte Kommunikation mit dem Server stattfinden. Der Grund, warum die Validierung des SSL-Zertifikats des Servers wichtig ist, liegt darin, dass es möglich ist (wenn auch extrem selten), Opfer eines "
;; api_docs_034 is concatenated after link text api_docs_030.
api_docs_034 = " zu werden, selbst wenn Ihr Webverkehr über SSL/HTTPS gesichert ist. Ein Man-in-the-Middle-Angriff (MiM) kann von einer Person durchgeführt werden, die sich mit einem gefälschten/ungültigen SSL-Zertifikat als REDCap-Webserver ausgibt. Dadurch kann Ihr API-Skript fälschlicherweise annehmen, dass diese Person tatsächlich der REDCap-Server ist, und Ihre Anfrage unbemerkt nicht an REDCap, sondern an diese Person senden. Diese kann dann den Inhalt Ihrer Anfrage sehen, einschließlich Ihres API-Tokens, und Ihr Token künftig verwenden, um in Ihrem Namen API-Anfragen an REDCap zu stellen."
api_docs_035 = "So verhindern Sie Man-in-the-Middle-Angriffe:"
;; api_docs_036 is concatenated with a cURL link and api_docs_037.
api_docs_036 = "MiM-Angriffe zu verhindern ist ziemlich einfach. Im Wesentlichen müssen Sie Ihr API-Skript nur dazu zwingen, das SSL-Zertifikat des REDCap-Servers zu validieren. Das SSL-Zertifikat von REDCap wird immer gültig sein, während das gefälschte Zertifikat eines Angreifers bei einer Validierung niemals als gültig bestätigt werden kann. In vielen Programmen oder Programmiersprachen, die API-Anfragen stellen können, ist das Validieren eines SSL-Zertifikats oft so einfach wie das Setzen eines Flags. Zum Beispiel wird "
;; api_docs_037 is concatenated after the cURL link and before api_docs_032.
api_docs_037 = " häufig von vielen API-Skripten in Programmiersprachen wie PHP, R, SAS und vielen weiteren verwendet, um die Webanfrage an REDCap zu stellen. <b>Wenn Ihr API-Skript cURL verwendet, müssen Sie Ihr Skript lediglich so ändern, dass es die cURL-Option CURLOPT_SSL_VERIFYPEER auf TRUE setzt.</b> Danach versucht Ihr API-Skript, die API-Anfrage an REDCap *nur* dann zu stellen, wenn es das SSL-Zertifikat von REDCap validieren kann. "
;; api_docs_038 is concatenated after api_docs_032 and before a Java SSL link.
api_docs_038 = " Wenn Sie cURL nicht verwenden, gibt es im Web viele weitere Beispiele dafür, wie man ein SSL-Zertifikat in verschiedenen Programmiersprachen validiert. Solche Beispiele finden Sie einfach, indem Sie den Namen Ihrer Programmiersprache + 'verify ssl certificate' googeln (z. B. '"
;; api_docs_039 is concatenated after a Java SSL link.
api_docs_039 = "'), was Ihnen viele hilfreiche Ergebnisse liefern sollte."
api_docs_040 = "ERINNERUNG:"
api_docs_041 = "Bitte denken Sie daran: REDCap selbst verfügt zwar über viele Sicherheitsebenen, die Sie schützen und ein hohes Maß an Sicherheit und Datenintegrität gewährleisten sollen, aber es liegt in *Ihrer* Verantwortung, bei der Nutzung der REDCap-API die sichersten Methoden und Best Practices einzusetzen."
api_docs_042 = "Die REDCap-API kann von unterschiedlichen Clients aus mit jeder gängigen clientseitigen oder Web-Entwicklungssprache aufgerufen werden, die Sie implementieren können (z. B. .NET, Python, PHP, Java). Unten können Sie eine ZIP-Datei mit mehreren Beispielen herunterladen, die zeigen, wie die API mit verschiedenen Software-Sprachen aufgerufen wird. Die darin enthaltenen Dateien dürfen Sie beliebig ändern."
api_docs_045 = "API-Beispiele herunterladen (.zip)"
api_docs_046 = "Hinweis zu Exportrechten: "
api_docs_047 = "Methodenname"
api_docs_048 = "Datensätze exportieren"
api_docs_049 = "Beschreibung"
api_docs_050 = "URL"
api_docs_051 = "Unterstützte Anfragemethode"
api_docs_052 = "Mit dieser Methode können Sie eine Menge von Datensätzen für ein Projekt exportieren."
api_docs_053 = "Bitte beachten Sie, dass die Benutzerrechte für den Datenexport auf diese API-Anfrage angewendet werden. Wenn Sie im Projekt beispielsweise Datenexportrechte 'Kein Zugriff' haben, schlägt der API-Datenexport fehl und gibt einen Fehler zurück. Wenn Sie Datenexportrechte 'De-identifiziert' oder 'Alle Identifikatorfelder entfernen' haben, werden möglicherweise einige Datenfelder aus dem von der API zurückgegebenen Datensatz entfernt und herausgefiltert. Um sicherzustellen, dass aus Ihrer API-Anfrage keine Daten unnötig herausgefiltert werden, sollten Sie im Projekt Exportrechte für den 'Vollständigen Datensatz' haben."
api_docs_054 = "Parameter (Groß-/Kleinschreibung beachten)"
api_docs_055 = "Das API-Token, das spezifisch für Ihr REDCap-Projekt und Ihren Benutzernamen ist (jedes Token ist für jeden Benutzer in jedem Projekt eindeutig). Siehe Abschnitt im linken Menü zum Erhalten eines Tokens für ein bestimmtes Projekt."
api_docs_056 = "record"
api_docs_057 = "csv, json, xml [Standard]"
api_docs_058 = "* 'record' bezieht sich auf die Datensatz-ID des Projekts"
api_docs_059 = "flat - Ausgabe als ein Datensatz pro Zeile [Standard]"
api_docs_060 = "eav - Ausgabe als ein Datenpunkt pro Zeile"
api_docs_061 = "Nicht-longitudinal: Enthält die Felder - record*, field_name, value"
api_docs_062 = "Longitudinal: Enthält die Felder - record*, field_name, value, redcap_event_name"
api_docs_063 = "Erforderlich"
api_docs_064 = "Optional"
api_docs_065 = "ein Array von Datensatznamen, das bestimmte Datensätze angibt, die Sie abrufen möchten (standardmäßig werden alle Datensätze abgerufen)"
api_docs_066 = "ein Array von Feldnamen, das bestimmte Felder angibt, die Sie abrufen möchten (standardmäßig werden alle Felder abgerufen)"
api_docs_067 = "ein Array von Formularnamen, für die Sie Datensätze abrufen möchten. Wenn der Formularname ein Leerzeichen enthält, ersetzen Sie das Leerzeichen durch einen Unterstrich (standardmäßig werden alle Datensätze abgerufen)"
api_docs_068 = "ein Array von eindeutigen Event-Namen, für die Sie Datensätze abrufen möchten - nur für longitudinale Projekte"
api_docs_069 = "raw [Standard], label - die roh codierten Werte oder Labels der Optionen von Multiple-Choice-Feldern exportieren"
api_docs_070 = "raw [Standard], label - (nur für Format 'csv' und Typ 'flat') für CSV-Kopfzeilen entweder Variablen-/Feldnamen (raw) oder Feldlabels (label) exportieren"
api_docs_071 = "true, false [Standard] - gibt speziell beim Exportieren der Daten als Labels (d. h. wenn rawOrLabel=label) im Flat-Format (d. h. wenn type=flat) das Format von Checkbox-Feldwerten an. Beim Exportieren von Labels erhalten standardmäßig (ohne Angabe des Flags exportCheckboxLabel oder wenn exportCheckboxLabel=false) alle Checkboxen entweder den Wert 'Checked', wenn sie aktiviert sind, oder 'Unchecked', wenn sie nicht aktiviert sind. Wenn exportCheckboxLabel jedoch auf true gesetzt ist, wird stattdessen das Label der Checkbox-Option (z. B. 'Choice 1') exportiert, wenn sie aktiviert ist, oder leer/ohne Wert, wenn sie nicht aktiviert ist. Wenn rawOrLabel=false oder type=eav ist, wird das Flag exportCheckboxLabel ignoriert. (Der Parameter exportCheckboxLabel wird für type=eav ignoriert, da der Typ 'eav' Checkboxen ohnehin immer anders exportiert: Checkboxen werden mit ihrem echten Variablennamen exportiert (während der Typ 'flat' sie im Format variable___code exportiert), und ein weiterer Unterschied ist, dass der Typ 'eav' Checkbox-Werte beim Label-Export *immer* als Auswahl-Label exportiert oder beim Raw-Export als 0 oder 1 (nicht aktiviert bzw. aktiviert).)"
api_docs_072 = "csv, json, xml - gibt das Format von Fehlermeldungen an. Wenn Sie dieses Flag nicht übergeben, wird das Standardformat anhand des übergebenen Flags 'format' ausgewählt; wenn kein format-Flag übergeben wurde, wird standardmäßig 'xml' verwendet."
api_docs_073 = "true, false [Standard] - gibt an, ob das Umfrage-Identifikatorfeld (z. B. 'redcap_survey_identifier') oder Umfrage-Zeitstempelfelder (z. B. instrument+'_timestamp') exportiert werden sollen, wenn im Projekt Umfragen verwendet werden. Wenn Sie dieses Flag nicht übergeben, ist der Standardwert 'false'. Bei 'true' wird das Feld redcap_survey_identifier sowie das Umfrage-Zeitstempelfeld für eine bestimmte Umfrage zurückgegeben, wenn mindestens ein Feld aus dieser Umfrage exportiert wird. HINWEIS: Wenn das Umfrage-Identifikatorfeld oder Umfrage-Zeitstempelfelder per API-Datenimport importiert werden, werden sie einfach ignoriert, da sie keine echten Felder im Projekt sind, sondern Pseudofelder."
api_docs_074 = "true, false [Standard] - gibt an, ob das Feld 'redcap_data_access_group' exportiert werden soll, wenn im Projekt Zugriffsgruppen verwendet werden. Wenn Sie dieses Flag nicht übergeben, ist der Standardwert 'false'. HINWEIS: Dieses Flag ist nur wirksam, wenn der Benutzer, dessen Token für die API-Anfrage verwendet wird, *nicht* in einer Zugriffsgruppe ist. Ist der Benutzer in einer Gruppe, fällt dieses Flag auf seinen Standardwert zurück."
api_docs_075 = "Gibt zurück"
api_docs_076 = "Daten aus dem Projekt im angegebenen Format und Typ, sortiert nach Datensatz (Primärschlüssel des Projekts) und dann nach Event-ID"
api_docs_077 = "EAV XML:"
api_docs_078 = "Flat XML:"
api_docs_079 = "jeder Datenpunkt als Element"
api_docs_080 = "die Bericht-ID-Nummer, die neben dem Berichtsnamen auf der Berichtsliste angezeigt wird"
api_docs_081 = "csv, json, xml - gibt das Format von Fehlermeldungen an. Wenn Sie dieses Flag nicht übergeben, wird das Standardformat anhand des übergebenen Flags 'format' ausgewählt; wenn kein format-Flag übergeben wurde, wird standardmäßig 'xml' verwendet."
api_docs_082 = "raw [Standard], label - (nur für Format 'csv' und Typ 'flat') für CSV-Kopfzeilen entweder Variablen-/Feldnamen (raw) oder Feldlabels (label) exportieren"
api_docs_083 = "true, false [Standard] - gibt speziell beim Exportieren der Daten als Labels (d. h. wenn rawOrLabel=label) das Format von Checkbox-Feldwerten an. Beim Exportieren von Labels erhalten standardmäßig (ohne Angabe des Flags exportCheckboxLabel oder wenn exportCheckboxLabel=false) alle Checkboxen entweder den Wert 'Checked', wenn sie aktiviert sind, oder 'Unchecked', wenn sie nicht aktiviert sind. Wenn exportCheckboxLabel jedoch auf true gesetzt ist, wird stattdessen das Label der Checkbox-Option (z. B. 'Choice 1') exportiert, wenn sie aktiviert ist, oder leer/ohne Wert, wenn sie nicht aktiviert ist. Wenn rawOrLabel=false ist, wird das Flag exportCheckboxLabel ignoriert."
api_docs_084 = "Berichte exportieren"
api_docs_085 = "Mit dieser Methode können Sie den Datensatz eines Berichts exportieren, der auf der Projektseite 'Datenexporte, Berichte und Statistik' erstellt wurde."
api_docs_086 = "Bitte beachten Sie, dass die Benutzerrechte für den Datenexport auf diese API-Anfrage angewendet werden. Wenn Sie im Projekt beispielsweise Datenexportrechte 'Kein Zugriff' haben, schlägt der API-Berichtsexport fehl und gibt einen Fehler zurück. Wenn Sie Datenexportrechte 'De-identifiziert' oder 'Alle Identifikatorfelder entfernen' haben, werden möglicherweise einige Datenfelder aus dem von der API zurückgegebenen Datensatz entfernt und herausgefiltert. Um sicherzustellen, dass aus Ihrer API-Anfrage keine Daten unnötig herausgefiltert werden, sollten Sie im Projekt Exportrechte für den 'Vollständigen Datensatz' haben."
api_docs_087 = "Bitte beachten Sie außerdem, dass die Methode 'Berichte exportieren' den Parameter 'type' (flat/eav), der in der Methode 'Datensätze exportieren' verwendet werden kann, *nicht* nutzt. Alle Daten der Methode 'Berichte exportieren' werden daher im Flat-Format exportiert. Wenn der Parameter 'type' in der API-Anfrage angegeben wird, wird er ignoriert."
api_docs_088 = "Daten aus dem Projekt im angegebenen Format und Typ, sortiert nach Datensatz (Primärschlüssel des Projekts) und dann nach Event-ID"
api_docs_089 = "eav - Eingabe als ein Datenpunkt pro Zeile"
api_docs_090 = "normal - leere Werte werden ignoriert [Standard]"
api_docs_091 = "overwrite - leere Werte sind gültig und überschreiben Daten"
api_docs_092 = "** Event-Name ist der eindeutige Name eines Events, nicht das Event-Label"
api_docs_093 = "Die formatierten zu importierenden Daten."
api_docs_094 = "HINWEIS: "
api_docs_095 = "Beim Importieren von Daten im EAV-Typformat beachten Sie bitte, dass Checkbox-Felder ihren field_name als variable+'___'+optionCode und ihren Wert entweder als '0' oder '1' (nicht aktiviert bzw. aktiviert) angeben müssen. Für ein Checkbox-Feld mit Variablennamen 'icecream' würde es beispielsweise als EAV mit field_name 'icecream___4' und Wert '1' importiert, um die mit '4' codierte Option (möglicherweise 'Chocolate') als 'aktiviert' zu setzen."
