multilang_159 = "Übersetzungs-Snapshots"
multilang_160 = "Snapshot erstellen"
multilang_161 = "Snapshots anzeigen/ausblenden"
multilang_162 = "Ein Snapshot Ihrer aktuellen Übersetzungseinstellungen (alle Übersetzungen und Einstellungen für alle Sprachen) kann gespeichert und abgelegt werden, indem Sie auf dieser Seite auf den Button 'Snapshot erstellen' klicken. Alle Snapshots können jederzeit über die untenstehende Tabelle aufgerufen und heruntergeladen werden (klicken Sie auf den Link 'Snapshots anzeigen/ausblenden', um die Tabelle ein- oder auszublenden). Es gibt keine Begrenzung für die Anzahl der Snapshots. Das Erstellen eines Snapshots kann nützlich sein, um Ihre Übersetzungen bei Bedarf auf einen bestimmten Zeitpunkt zurückzusetzen, indem Sie den Snapshot (eine ZIP-Datei) herunterladen und die darin enthaltenen einzelnen Dateien (eine pro Sprache) erneut importieren. Beachten Sie, dass die Wiederherstellung auf diese Weise nach einem <i>Best-Effort</i>-Ansatz erfolgt, da sich die zugrunde liegende Projektstruktur seit Erstellung des Snapshots geändert haben kann."
