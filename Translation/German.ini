data_entry_451 = "Erweiterung für 'File Upload'-Felder aktivieren: Passwortprüfung & automatische externe Dateispeicherung?"
data_entry_452 = "Wenn aktiviert, erhalten Benutzer beim Hochladen einer Datei für ein beliebiges File-Upload-Feld eine Aufforderung, in der sie bestätigen müssen, dass sie die richtige Datei hochladen; außerdem werden sie gebeten, ihr REDCap-Passwort als Prüfschritt erfolgreich erneut einzugeben (Fragebogenteilnehmer werden in einem Fragebogen nicht gebeten, ein Passwort einzugeben). Diese Funktion wurde speziell für Projekte erstellt, die bestimmte Vorschriften einhalten möchten, z. B. 21 CFR Part 11 für FDA-Studien. Hinweis: Wenn diese Funktion aktiviert ist, wird für alle Dateien, die über ein File-Upload-Feld hochgeladen werden, automatisch eine Duplikatkopie der Datei auf einem sicheren Dateiserver außerhalb von REDCap gespeichert (bitte wenden Sie sich bei Fragen oder Details zu diesem externen Server an Ihren REDCap-Administrator)."
