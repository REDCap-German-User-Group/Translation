upgrade_059 = "Öffnen Sie ein Terminalfenster (Kommandozeile) zu Ihrem MySQL-Datenbankserver und wechseln Sie auf diesem Server in das Verzeichnis, in dem Sie die Upgrade-Skriptdatei abgelegt haben (mit \"cd\" oder einem ähnlichen Befehl)."
