system_config_940 = "Wenn Sie die Scopes manuell festlegen möchten, geben Sie ALLE erforderlichen Scopes als kommaseparierte Werte an (z. B. <code>openid, profile, email</code>). Wenn dies nicht gesetzt ist, versucht REDCap, die Scopes automatisch zu bestimmen (Standardverhalten)."
