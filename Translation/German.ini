system_config_198 = "Änderungen im Produktions-Draft-Mode unter bestimmten Bedingungen automatisch genehmigen?"
system_config_199 = "Dies bezieht sich darauf, wenn Benutzer ihre im Draft Mode vorgenommenen Änderungen einem REDCap-Administrator zur Genehmigung übermitteln. Wenn bestimmte Bedingungen bezüglich ihrer Änderungen erfüllt sind, genehmigt REDCap diese Änderungen automatisch, ohne dass ein Administrator sie genehmigen muss."
