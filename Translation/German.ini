tango_api_settings_intro="Konfigurieren Sie Ihre API-Einstellungen für das Tango-Rewards-System. Bitte füllen Sie die erforderlichen Informationen aus, um eine Verbindung zur Tango-API herzustellen und sich zu authentifizieren. Stellen Sie sicher, dass alle Felder korrekt ausgefüllt sind, um eine ordnungsgemäße Kommunikation mit dem Rewards-Anbieter zu ermöglichen."
tango_group_identifier_label="Gruppenkennung"
tango_group_identifier_description="Eine Kennung auf Organisationsebene, mit der mehrere Konten zusammengefasst werden können, falls zutreffend. In Tango-Begriffen wird dies als 'Customer' bezeichnet. Wenn Ihre Struktur mehrere Konten umfasst, verwenden Sie dieses Feld, um die Gruppe anzugeben, zu der sie gehören. Bei Einrichtungen mit nur einem Konto genügt eine einzelne Gruppenkennung."
tango_campaign_identifier_label="Kampagnenkennung (Konto)"
tango_campaign_identifier_description="Dieses Feld identifiziert das 'Account' innerhalb von Tango, das wir als 'Campaign' bezeichnen. Konten (oder Kampagnen) sind der Ort, an dem alle Mittel verwaltet und Reward-Bestellungen verarbeitet werden. Je nach Bedarf können Sie ein oder mehrere Konten haben. Dieses Feld ist entscheidend, um das Zielkonto für Transaktionen und Mittelverwaltung anzugeben."
tango_campaign_identifier_note="In Tango wird dies als Account Identifier bezeichnet"
tango_api_credentials_title="API-Zugangsdaten (optional)"
tango_api_credentials_description="In diesem Abschnitt können Sie die standardmäßigen systemweiten API-Zugangsdaten mit projektspezifischen Zugangsdaten überschreiben. Wenn Sie hier Zugangsdaten definieren, haben sie Vorrang vor allen auf Systemebene festgelegten Zugangsdaten."
tango_environment_label="Umgebung"
tango_environment_description_1="Wählen Sie die Umgebung aus, in der Ihre Anwendung mit der Tango-API interagiert. Wählen Sie <code>Sandbox</code> für Tests und Entwicklung oder <code>Production</code> für Live-Transaktionen."
tango_environment_description_2="Wählen Sie <code>Systemstandard verwenden</code>, um systemweite API-Zugangsdaten statt projektspezifischer Einstellungen zu verwenden. Wenn dies ausgewählt ist, werden keine projektspezifischen Zugangsdaten verwendet, und verfügbare systemweite Zugangsdaten werden angewendet."
tango_environment_no_selection_option="Keine Umgebung ausgewählt"
tango_client_id_label="Tango Client-ID"
tango_client_id_description="Die eindeutige Kennung, die Ihrer Anwendung von Tango zu Authentifizierungszwecken für die API zugewiesen wurde."
tango_secret_label="Tango Secret"
tango_secret_description="Der von Tango bereitgestellte geheime Schlüssel, der zusammen mit der Client-ID zur sicheren Authentifizierung Ihrer Anwendung verwendet wird."
tango_service_account_username_label="Tango Service-Account-Benutzername"
tango_service_account_username_description="Der Benutzername für Ihr Tango-Service-Account. Tango erfordert ein Service-Account-Token (Password Grant) für die Authentifizierung."
tango_service_account_password_label="Tango Service-Account-Passwort"
tango_service_account_password_description="Das Passwort für Ihr Tango-Service-Account, das zusammen mit Client-ID und Client Secret verwendet wird, um ein Service-Account-Token zu erhalten."
rewards_api_invalid_environment_message_01="Wählen Sie eine gültige Umgebung aus."
rewards_api_system_default_incomplete_error_01="Systemstandardwerte sind unvollständig. Fehlend: %s. Bitte aktualisieren Sie das Control Center oder wählen Sie eine spezifische Umgebung."
rewards_api_system_default_summary_title="Control-Center-Systemstandardwerte werden verwendet"
rewards_api_system_default_summary_description_01="Dieses Projekt übernimmt derzeit seine Reward-Services-Umgebung und API-Zugangsdaten aus dem Control Center. Die projektspezifischen Zugangsdatenfelder werden nicht gelöscht; sie werden lediglich ignoriert, solange <code>Systemstandard verwenden</code> ausgewählt ist."
rewards_api_system_default_environment_label="Übernommene Umgebung"
rewards_api_system_default_status_configured="Konfiguriert"
rewards_api_system_default_status_missing="Fehlt"
rewards_api_system_default_warning_01="Die Control-Center-Standardwerte sind unvollständig. Aktualisieren Sie dort die fehlenden Werte oder wählen Sie auf dieser Seite eine projektspezifische Umgebung."
rewards_api_system_default_missing_label="Fehlende Systemstandardwerte"

rewards_project_settings_intro="Diese Seite stellt Benutzern Tools zur Anpassung und Verwaltung von Einstellungen im Zusammenhang mit dem System für Teilnehmervergütung bereit. Die hier verfügbaren Einstellungen stellen sicher, dass die Kommunikation mit Teilnehmenden personalisiert und effizient ist und dass das gesamte Vergütungssystem auf die spezifischen Anforderungen des Projekts abgestimmt ist."
custom_reward_label_label="Benutzerdefiniertes Reward-Label"
custom_reward_label_description="Mit diesem Feld können Sie definieren, wie Teilnehmerinformationen in der Participant-Manager-Tabelle angezeigt werden. Mithilfe von Smart Variables können Sie ein Label erstellen, das Teilnehmerdaten dynamisch enthält. Dies hilft, Teilnehmende schnell anhand wichtiger Details zu identifizieren."
custom_reward_label_example="Beispiel: Wenn {last_name}, {first_name} eingegeben wurde, würde für Datensatz '102' '102 (Doe, John)' angezeigt."
participant_details_label="Zusammenfassende Teilnehmerdetails"
participant_details_description="Mit diesem Feld können Sie eine detaillierte Zusammenfassung der Informationen jedes Teilnehmers erstellen, die während des Prüfprozesses als Schnellreferenz angezeigt wird, ohne einzelne Datensätze öffnen zu müssen. Ähnlich wie beim benutzerdefinierten Reward-Label können Sie Smart Variables verwenden, um wichtige Teilnehmerdaten dynamisch einzubinden, z. B. Kontaktinformationen, demografische Angaben oder andere relevante Details. Diese Zusammenfassung ermöglicht Reviewern, Teilnehmende effizient zu beurteilen und zu verwalten, indem wesentliche Informationen auf einen Blick sichtbar sind."
participant_details_example="Beispiel: Wenn {last_name}, {first_name} eingegeben wurde, würde für Datensatz '102' '102 (Doe, John)' angezeigt."
rewards_from_email_label="Von"
rewards_from_email_description="Diese Einstellung steuert den Absender, der in Reward-Benachrichtigungs-E-Mails angezeigt wird. Wählen Sie zuerst die Absenderquelle: entweder eine spezifische Absender-E-Mail oder die systemweite Universal FROM-E-Mail. Wenn ein zuvor gespeicherter Absender nicht mehr mit einem Projektbenutzer verknüpft ist, kann er unverändert bleiben oder durch eine aktuelle Projekt-Benutzer-E-Mail ersetzt werden."
rewards_from_email_help="Wählen Sie eine spezifische Absender-E-Mail, wenn Sie die Option spezifische Quelle verwenden. Wählen Sie die systemweite Universal FROM-Quelle, um die Control-Center-Einstellung zu verwenden."
rewards_email_subject_label="E-Mail-Betreff"
rewards_email_subject_description="Die Betreffzeile der E-Mail, die Teilnehmende erhalten. Sie können sie personalisieren, indem Sie Smart Variables wie <code>[first_name]</code> einfügen, um die E-Mail ansprechender zu machen. Beispielsweise kann 'Your Reward is Ready to be Redeemed, <code>[first_name]</code>!' den Vornamen des Teilnehmers dynamisch einfügen."
rewards_email_template_label="E-Mail-Vorlage"
rewards_email_template_description="Der Hauptinhaltsbereich für die Reward-Benachrichtigungs-E-Mail. Mit dieser Vorlage können Sie die E-Mail mit Piping und REDCap-Smart Variables schreiben und formatieren. Einige wichtige Smart Variables sind:"
rewards_email_template_variables_redemption_details="Fügt den besten verfügbaren Einlösungsblock auf Bestellebene ein, einschließlich Link, Zugangsdaten und Anweisungen, sofern vorhanden."
rewards_email_template_variables_redemption_link="Fügt einen anklickbaren expliziten Einlösungslink ein, wenn der Anbieter einen zurückgibt."
rewards_email_template_variables_redemption_url="Fügt die explizite Einlösungs-URL als Klartext ein, wenn der Anbieter eine zurückgibt."
rewards_email_template_variables_redemption_code="Fügt einen Wert im Stil eines Einlösecodes ein, der aus den auf der Bestellung gespeicherten strukturierten Zugangsdaten abgeleitet wird."
rewards_email_template_variables_redemption_instructions="Fügt die auf der Bestellung gespeicherten Anbieteranweisungen ein."
rewards_email_template_variables_redemption_credentials="Fügt die auf der Bestellung gespeicherten strukturierten Anbieter-Zugangsdaten ein."
rewards_email_template_variables_reward_link_alias="Alias für <code>[reward-redemption-link]</code>."
rewards_email_template_variables_reward_url_alias="Alias für <code>[reward-redemption-url]</code>."
rewards_token_legend_title="Farblegende"
rewards_token_legend_intro="Diese Farben werden beim Tippen automatisch angewendet. Sie müssen nichts tun; sie dienen nur dazu, den Text schneller lesen zu können."
rewards_token_legend_field="Grün: Projektfeldnamen (zum Beispiel <code>[first_name]</code>)."
rewards_token_legend_smart_variable="Hellblau: Smart Variables (zum Beispiel <code>[reward-status]</code>)."
rewards_token_legend_error="Rot: Formatierungsproblem. Häufiges Beispiel: <code>[first_name][last_name]</code> (fehlendes Leerzeichen). Besser: <code>[first_name] [last_name]</code>."

