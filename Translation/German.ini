econsent_62 = "E-Consent-Einstellungen wurden erfolgreich für Fragebogen \"{0}\" geändert."
econsent_63 = "Version des Einwilligungsformulars:"
econsent_64 = "Die Version des Einwilligungsformulars, das von e-Consent für den aktuellen Kontext verwendet wird (aktueller Datensatz, Event, Fragebogen, Zugriffsgruppe, MLM-Sprache usw.). Dies kann verwendet werden, um die Version des Einwilligungsformulars zu erfassen, wenn ein Fragebogenteilnehmer seine informierte Einwilligung gibt. HINWEIS: Dieses Action Tag fügt dem Feld nur dann einen neuen Wert hinzu, wenn dessen Feldwert leer ist, und nur dann, wenn das Instrument als Fragebogen ausgefüllt wird."
