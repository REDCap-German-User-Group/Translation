econsent_39 = "Einstellungen des e-Consent Framework"
econsent_40 = "e-Consent kann nicht verwendet werden, weil im Projekt noch keine Fragebögen vorhanden sind. e-Consent kann nur für Fragebögen verwendet werden."
econsent_41 = "Logikbasiert"
