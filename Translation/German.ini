survey_252 = "Sind Sie sicher, dass Sie Teilnehmerkennungen AKTIVIEREN möchten?"
survey_253 = "Sind Sie sicher, dass Sie Teilnehmerkennungen DEAKTIVIEREN möchten?"
survey_254 = "Teilnehmerkennungen ermöglichen es Ihnen, die Umfrageantworten einer einzelnen Person zu identifizieren. Wenn Sie einem Teilnehmer in der Teilnehmerliste eine identifizierende Nummer oder Bezeichnung zuordnen, <b><u>kann die Umfrage niemals als anonym betrachtet werden</u></b>."
survey_255 = "Wenn Sie Teilnehmerkennungen deaktivieren, können Sie <b>keinen Wert mehr in der Spalte Teilnehmerkennungen der Teilnehmerliste hinzufügen oder bearbeiten</b>. Außerdem werden durch das Deaktivieren der Kennungen <u>ALLE bestehenden Kennungen gelöscht</u> (ausgenommen solche für teilweise oder vollständig abgeschlossene Antworten)."
survey_256 = "Ja, Teilnehmerkennungen AKTIVIEREN"
survey_257 = "Ja, Teilnehmerkennungen DEAKTIVIEREN"
survey_258 = "Teilnehmerkennungen wurden nun DEAKTIVIERT, und alle bestehenden Kennungen wurden DAUERHAFT GELÖSCHT."
survey_259 = "Die Option zum Aktivieren oder Deaktivieren der Verwendung von Kennungen ist nur verfügbar, solange sich das Projekt im Entwicklungsstatus befindet. Sobald es in Produktion ist, kann nur ein REDCap-Administrator dies rückgängig machen."
survey_260 = "Teilnehmerkennungen wurden nun AKTIVIERT."
survey_261 = "Die Teilnehmerliste wird nun neu geladen, um die Änderungen anzuzeigen."
survey_262 = "Teilnehmerkennungen sind derzeit deaktiviert und können erst verwendet werden, wenn Sie sie durch Klicken auf die Schaltfläche 'Aktivieren' in der Kopfzeile der Teilnehmerliste aktivieren."
survey_263 = "Teilnehmerkennungen sind deaktiviert und können daher in diesem Projekt nicht verwendet werden. Nur ein REDCap-Administrator kann Teilnehmerkennungen aktivieren, sobald sich das Projekt im Produktionsstatus befindet."
