setup_106 = "Einige Optionen unten sind deaktiviert, weil sie nicht geändert werden können, sobald sich das Projekt im Produktionsstatus befindet."
setup_107 = "Die Option zum Aktivieren der automatischen Nummerierung wurde deaktiviert, weil Ihr erstes Datenerhebungsinstrument als Umfrage aktiviert wurde. In diesem Fall ist die automatische Nummerierung für das Projekt verpflichtend."
setup_108 = "Die Option zum Aktivieren des Terminplanungsmoduls wurde deaktiviert, weil Sie die longitudinale Datenerhebung nicht aktiviert haben, die für die Verwendung der Terminplanung erforderlich ist. Wenn Sie longitudinale Datenerhebung verwenden möchten, können Sie sie oben auf der Seite aktivieren."
setup_109 = "Longitudinale Datenerhebung deaktivieren?"
setup_110 = "Sind Sie sicher, dass Sie die longitudinale Datenerhebung deaktivieren möchten? Wenn Sie dies tun, beachten Sie bitte, dass alle Arms und Events, die Sie bisher erstellt haben, ausgeblendet und nicht mehr zugänglich sein werden. Wenn Sie bereits Daten erhoben haben, bleiben nur die Daten erhalten, die für Ihr erstes Event (im ersten Arm) erhoben wurden. Wenn Sie die longitudinale Datenerhebung wieder aktivieren möchten, kehren alle Ihre Events und alle darauf erhobenen Daten zurück."
setup_111 = "Verwendung von Umfragen in diesem Projekt deaktivieren?"
setup_112 = "Sind Sie sicher, dass Sie die Verwendung von Umfragen in diesem Projekt deaktivieren möchten? Wenn Sie dies tun, beachten Sie bitte, dass alle Umfragen, die Sie bisher erstellt haben, ausgeblendet und nicht mehr zugänglich sein werden. Ihre Datenerhebungsinstrumente bleiben unverändert, können jedoch einfach nicht mehr als Umfragen verwendet werden. Wenn Sie die Verwendung von Umfragen in diesem Projekt wieder aktivieren möchten, kehren alle zuvor erstellten Umfragen zurück."
setup_115 = "Wenn die E-Mail-Adresse des Teilnehmers bereits direkt in der Teilnehmerliste erfasst wurde, überschreibt diese E-Mail-Adresse den Wert des E-Mail-Feldes hier, wenn Umfrageeinladungen an den Teilnehmer gesendet werden."
setup_116 = "E-Mail-Feld auswählen, das für Einladungen an Umfrageteilnehmer verwendet werden soll:"
setup_117 = "Sie haben kein Feld aus der Dropdown-Liste ausgewählt. Bitte wählen Sie ein Feld aus."
setup_118 = "Sind Sie sicher, dass Sie dieses E-Mail-Feld für Einladungen an Umfrageteilnehmer nicht mehr festlegen möchten? Wenn einige Umfrageantworten es bereits verwenden, kann dies künftig verhindern, dass manche Einladungs-E-Mails gesendet werden, falls diese Teilnehmer zusätzliche Umfragen ausfüllen müssen."
setup_119 = "Festlegung des E-Mail-Felds aufheben"
setup_120 = "Feldfestlegung aufheben"
setup_121 = "Derzeit festgelegtes Feld:"
setup_122 = "Die Verwendung des festgelegten E-Mail-Adressfeldes kann besonders wertvoll sein, wenn Ihr erstes Datenerhebungsinstrument nicht als Umfrage aktiviert ist, während ein oder mehrere andere Instrumente als Umfragen aktiviert wurden. Da E-Mail-Adressen nur für das erste Datenerhebungsinstrument direkt in die Teilnehmerliste eingegeben werden können, bietet das festgelegte E-Mail-Feld eine weitere Möglichkeit, die E-Mail-Adresse von Umfrageteilnehmern zu erfassen."
setup_123 = "Testen Sie Ihr Projekt gründlich"
setup_124 = "Es ist wichtig, die wesentlichen Bestandteile Ihres Projekts zu testen, bevor Sie es in Produktion verschieben. Erstellen Sie einige Testdatensätze und geben Sie für jeden einige Daten ein, um sicherzustellen, dass Ihre Datenerhebungsinstrumente so aussehen und sich so verhalten, wie Sie es erwarten, insbesondere Verzweigungslogik und Berechnungen. Prüfen Sie dann Ihre Testdaten, indem Sie Reports erstellen und Ihre Daten exportieren, um sie in Excel oder einem Statistikpaket anzusehen. Wenn Sie Umfragen haben, füllen Sie die Umfragen so aus, als wären Sie ein Teilnehmer, indem Sie den öffentlichen Umfragelink oder die Teilnehmerliste verwenden und sich selbst eine Umfrageeinladung senden. Wenn andere Projektmodule regelmäßig verwendet werden sollen, testen Sie auch diese ein wenig. Am besten testen Sie Ihr Projekt, indem Sie es so verwenden, als würden Sie echte Produktionsdaten eingeben. Außerdem ist es immer hilfreich, wenn Kollegen (insbesondere Teammitglieder) Ihr Projekt ansehen und mit einem frischen Blick darauf schauen."
setup_125 = "Kein Name oder keine E-Mails aufgeführt"
setup_126 = "Benachrichtigungen aktiviert"
setup_127 = "E-Mail-Adresse des Empfängers"
setup_128 = "nicht ausgewählt"
setup_129 = "Wenn Sie oder andere Benutzer per E-Mail <u>jedes Mal</u> benachrichtigt werden möchten, wenn ein Teilnehmer eine Umfrage abschließt, wählen Sie unter jeder unten aufgeführten Umfrage die zu benachrichtigenden Benutzer aus, indem Sie deren E-Mail-Adresse in der Dropdown-Liste des Benutzers auswählen. Diese kann die primäre, sekundäre oder tertiäre E-Mail-Adresse des jeweiligen Benutzers für sein REDCap-Konto enthalten. Um einen Benutzer als Empfänger für die Umfragebenachrichtigungen zu entfernen, ändern Sie seine E-Mail-Dropdown-Option auf 'nicht ausgewählt'. Danach erhält er keine Benachrichtigungs-E-Mails für diese Umfrage mehr."
setup_130 = "(Primär)"
setup_131 = "(Sekundär)"
setup_132 = "(Tertiär)"
setup_133 = "Bitte beachten Sie, dass das Festlegen eines E-Mail-Feldes bedeutet, dass Umfrageantworten NIEMALS ANONYM sein können, weil die E-Mail-Adresse des Teilnehmers auf einem Dateneingabeformular angezeigt werden kann. Dadurch lässt sich der Datensatz/die Antwort, zu dem bzw. der die E-Mail-Adresse gehört, leicht identifizieren."
setup_135 = "Ich stimme zu"
setup_136 = "FEHLER: Dieses Projekt verwendet das Randomisierungsmodul und kann noch nicht in den Produktionsstatus verschoben werden, weil keine Randomisierungs-Zuordnungstabelle für die Verwendung im Produktionsstatus hochgeladen wurde. Jemand mit entsprechenden Rechten muss zuerst zur Randomisierungsseite gehen und eine Zuordnungstabelle hochladen."
setup_137 = "ALLE DATEN LÖSCHEN?"
setup_139 = "WARNUNG: DATEN DES RANDOMISIERUNGSFELDES WERDEN GELÖSCHT"
setup_140 = "Da Sie das Randomisierungsmodul aktiviert haben, beachten Sie bitte, dass Werte für Ihr Randomisierungsfeld (d. h. randomisierte Datensätze), sofern vorhanden, DAUERHAFT GELÖSCHT werden, sobald das Projekt in Produktion verschoben wird. (Nur Daten für dieses Feld werden gelöscht. Andere Felder werden nicht berührt.) Ist das in Ordnung?"
setup_141 = "JA, in Produktionsstatus verschieben"
setup_142 = "Ja, Admin bitten, in Produktionsstatus zu verschieben"
setup_143 = "API Playground"
setup_144 = "Anfrage ausstehend"
setup_145 = "Wiederholte Instrumente"
setup_146 = "Wiederholte Instrumente und Events"
setup_147 = "Sind Sie sicher, dass Sie wirklich alle vorhandenen Daten löschen möchten, wenn das Projekt in Produktion verschoben wird? Falls nicht, klicken Sie auf Abbrechen und ändern Sie die Einstellung im gelben Feld."
setup_148 = "Dieses Instrument wiederholen?"
setup_149 = "Gesamtes Event oder ausgewählte Instrumente wiederholen?"
setup_151 = "Gesamtes Event wiederholen (alle Instrumente gemeinsam wiederholen)"
setup_152 = "Instrumente wiederholen (unabhängig voneinander wiederholen)"
setup_153 = "Verschieben Sie das Projekt in den Produktionsstatus, damit echte Daten erhoben werden können. Sobald es in Produktion ist, können Sie die Projektfelder nicht mehr in Echtzeit bearbeiten. Sie können jedoch Änderungen im Entwurfsmodus vornehmen, die automatisch genehmigt werden oder andernfalls möglicherweise von einem REDCap-Administrator genehmigt werden müssen, bevor sie wirksam werden."
;; setup_154 is concatenated with setup_155 in a repeating instruments label/help title.
setup_154 = "Benutzerdefinierte Beschriftung für"
;; setup_155 is concatenated after setup_154.
setup_155 = "wiederholte Instrumente"
setup_156 = "Eine 'Benutzerdefinierte Beschriftung für wiederholte Instrumente' kann optional zu jedem Instrument hinzugefügt werden, das als wiederholt festgelegt wurde. Benutzerdefinierte Beschriftungen ähneln benutzerdefinierten Datensatzbeschriftungen, da sie es ermöglichen, Daten (per Piping) aus einem bestimmten Instrument auf der Datensatz-Startseite eines Datensatzes anzuzeigen. Diese per Piping eingefügten Daten werden in einer speziellen Tabelle angezeigt, die alle wiederholten Instanzen dieses Instruments enthält. Wenn ein Instrument beispielsweise einen einzelnen Besuch einer Person darstellt und Sie das Datum in einem Feld namens 'visit_date' in jeder wiederholten Instanz des Instruments erfassen, können Sie die benutzerdefinierte Beschriftung als '[visit_date]' festlegen. Dies liefert nützlichen Kontext, wenn Sie eine Tabelle aller wiederholten Instanzen des Instruments auf der Datensatz-Startseite ansehen. Sie können auch fortgeschritteneres Piping verwenden, indem Sie mehrere Felder und sogar statischen Text einsetzen. Zum Beispiel: '[visit_date], [weight] kg'."
setup_157 = "Ihre Einstellungen für wiederholte Instrumente und/oder Events wurden erfolgreich gespeichert. (Die Seite wird nun neu geladen.)"
setup_158 = "Unten können Sie ein Datenerhebungsinstrument als unbegrenzt wiederholbar festlegen. Das bedeutet, dass ein Instrument immer wieder wiederholt werden kann (für jeden Datensatz unterschiedlich oft), auch ohne REDCaps longitudinales Modul zu aktivieren. Sobald ein Instrument als wiederholt festgelegt ist, sehen Sie auf der Datensatz-Startseite Optionen, um für den aktuell ausgewählten Datensatz eine weitere Instanz des Instruments hinzuzufügen. Alle Instanzen eines wiederholten Instruments werden dann als Tabelle nahe dem unteren Rand der Datensatz-Startseite angezeigt, sodass die Instanzen angesehen und einfach innerhalb dieser navigiert werden kann."
setup_159 = "Unten können Sie ein Datenerhebungsinstrument oder ein ganzes Event von Instrumenten als unbegrenzt wiederholbar festlegen, wobei jedes wiederholte Instrument oder Event für jeden Datensatz unterschiedlich oft wiederholt werden kann. Sie können jedes Event im Projekt als wiederholbar festlegen *oder* alternativ ausgewählte Instrumente innerhalb eines Events als wiederholbar festlegen. <b>Die Option 'Gesamtes Event wiederholen' bedeutet, dass alle Instrumente des Events gemeinsam wiederholt werden und verbunden bleiben, während die Option 'Instrumente wiederholen' bedeutet, dass die Instrumente in diesem Event getrennt und unabhängig voneinander wiederholt werden.</b> Sobald ein Instrument oder Event als wiederholt festgelegt ist, sehen Sie auf der Datensatz-Startseite Optionen, um für den aktuell ausgewählten Datensatz eine weitere Instanz des Instruments/Events hinzuzufügen."
setup_160 = "-- nicht wiederholt --"
setup_161 = "FEHLER: Für ein oder mehrere Events ist die Option 'Instrumente wiederholen' ausgewählt, aber es wurden keine Instrumente ausgewählt. Bitte wählen Sie entweder einige Instrumente für dieses Event aus oder ändern Sie den Wert in der Dropdown-Liste für die Wiederholungsoption."
setup_162 = "Longitudinale Datenerhebung mit definierten Events verwenden?"
setup_163 = "Eine ausgezeichnete Möglichkeit, wiederholte Daten in REDCap zu erfassen, ist die Verwendung wiederholter Instrumente und/oder wiederholter Events. Dies wird manchmal als One-to-many-Datenerhebung bezeichnet. Beispiele können unter anderem Daten aus mehreren Besuchen oder Beobachtungen, Begleitmedikationen, unerwünschte Ereignisse oder wiederholte Umfragen (täglich, wöchentlich usw.) sein."
setup_164 = "(zu wiederholende Instrumente auswählen)"
setup_165 = "Umfragespezifisches E-Mail-Einladungsfeld"
setup_166 = "Hinweis: Diese Option überschreibt das E-Mail-Einladungsfeld auf Projektebene (falls auf der Projekt-Setup-Seite aktiviert) und überschreibt außerdem jede E-Mail-Adresse, die ursprünglich in die Teilnehmerliste eingegeben wurde. Wenn dieses Feld keinen Wert hat und das E-Mail-Feld auf Projektebene aktiviert ist, wird stattdessen der Wert des E-Mail-Feldes auf Projektebene verwendet."
setup_167 = "E-Mail-Feld zum Senden von Umfrageeinladungen <u>nur für diese Umfrage</u> festlegen"
setup_168 = "Wenn das E-Mail-Einladungsfeld auf mehreren longitudinalen Events, auf einem wiederholten Instrument oder auf einem wiederholten Event existiert, wird der Wert des Feldes außerdem über alle Instanzen/Events hinweg synchronisiert, sodass eine Änderung an einer Stelle den Wert in allen Events/Instanzen ändert, in denen das Feld erscheint."
setup_169 = "Ein umfragespezifisches E-Mail-Einladungsfeld kann für jede beliebige Umfrage aktiviert werden. Dabei können Sie ein beliebiges E-Mail-Feld in Ihrem Projekt festlegen, das zum Senden von Umfrageeinladungen für diese bestimmte Umfrage verwendet wird. So können Sie mehrere E-Mail-Adressen erfassen (z. B. für einen Schüler, ein Elternteil und eine Lehrkraft) und jede E-Mail-Adresse für eine andere Umfrage im Projekt verwenden. Anschließend können Sie jeder Person eine Einladung zu ihrer eigenen Umfrage senden, wonach alle Umfrageantworten als ein einzelner Datensatz im Projekt gespeichert werden."
setup_170 = "Das umfragespezifische E-Mail-Feld ähnelt dem E-Mail-Einladungsfeld auf Projektebene, wird jedoch nur für die Umfrage verwendet, für die es aktiviert wurde. Auf diese Weise kann das E-Mail-Feld auf Umfrageebene eine vorhandene E-Mail-Adresse überschreiben, die ursprünglich in die Teilnehmerliste eingegeben wurde, oder das E-Mail-Feld auf Projektebene (falls verwendet). Diese Funktion ermöglicht Benutzern Dateneingabe-Workflows, die mehrere Umfragen erfordern, bei denen der Teilnehmer für jede Umfrage unterschiedlich ist. (Hinweis: Das E-Mail-Feld kann auf jedem Instrument im Projekt existieren, und Sie können für jede Umfrage ein anderes E-Mail-Feld verwenden. Sie können dasselbe E-Mail-Feld auch für mehrere Umfragen verwenden.)"
setup_171 = "Während das hier besprochene E-Mail-Einladungsfeld eine Einstellung auf Projektebene ist, ist es hilfreich zu wissen, dass es auch eine Option für ein E-Mail-Einladungsfeld auf Umfrageebene gibt, die für bestimmte Umfragen im Projekt verwendet werden kann (während das Feld auf Projektebene auf ALLE Umfragen angewendet würde)."
setup_172 = "Siehe die Seite 'Umfrageeinstellungen' im Online Designer für diese Einstellung auf Umfrageebene."
setup_173 = "PDF-Anpassungen"
setup_174 = "Herunterladbare PDFs von Dateneingabeformularen und Umfragen können mit den untenstehenden Optionen angepasst werden. Hinweis: Die Optionen werden auf ALLE Instrumente im Projekt angewendet."
setup_176 = "Standardtext:"
setup_177 = "REDCap-Logo und Website-URL unten rechts auf jeder PDF-Seite anzeigen oder ausblenden?"
setup_178 = "REDCap-Logo und Website-URL anzeigen (Standard)"
setup_179 = "REDCap-Logo/URL ausblenden und stattdessen folgenden Text anzeigen:"
setup_181 = "Ausblenden"
setup_183 = "Sie können ein Textfeld festlegen, das als eindeutige Einschränkung dient, dessen Wert von keinem anderen Datensatz im Projekt dupliziert oder geteilt werden darf. Wenn ein Wert für das sekundäre eindeutige Feld eingegeben oder importiert wird, wird in Echtzeit geprüft, ob er nicht von einem anderen Datensatz geteilt wird. Falls doch, wird der Benutzer aufgefordert, einen anderen Wert einzugeben. Unten gibt es zusätzliche Optionen, die festlegen, ob und wie das sekundäre eindeutige Feld zusammen mit einem Datensatznamen auf verschiedenen Seiten im Projekt angezeigt wird."
setup_184 = "Wert des sekundären eindeutigen Feldes oben rechts im PDF anzeigen oder ausblenden? (Diese Option gilt nur, wenn das sekundäre eindeutige Feld oben aktiviert ist und auf Anzeige gesetzt wurde.)"
setup_185 = "Angezeigt lassen"
setup_186 = "CODING-FEHLER: Es gibt Probleme mit der Formatierung Ihrer Codes für fehlende Daten. Bitte sehen Sie sich die unten aufgeführten Probleme an. Sie müssen sie beheben oder entfernen, um die Codes für fehlende Daten speichern zu können."
;; setup_188 is concatenated after a dynamic missing data code in JavaScript validation.
setup_188 = "liegt nicht im korrekten Codeformat vor. Codes dürfen nur Buchstaben, Zahlen, Punkte, Bindestriche und Unterstriche enthalten (z. B. '-999, Nicht gefragt')."
setup_189 = "Record-ID aus PDF-Kopfzeile ausblenden? (Dadurch wird die Record-ID aus der Kopfzeile jeder PDF-Seite entfernt.)"
setup_190 = "Es scheint, dass das E-Mail-Einladungsfeld auf Projektebene bereits aktiviert wurde. Bitte beachten Sie, dass <u>es nicht erforderlich ist, hier ein umfragespezifisches E-Mail-Feld auszuwählen</u>, wenn bereits ein E-Mail-Feld auf Projektebene definiert wurde. Dies ist nur eine optionale Einstellung."
setup_191 = "E-Mail-Feld für Kommunikation festlegen (einschließlich Umfrageeinladungen und Alarme)"
setup_192 = "Durch Aktivieren dieser Funktion kann REDCap bestimmte E-Mail-Kommunikation an die angegebene E-Mail-Adresse richten. Dazu gehören das Senden von Umfrageeinladungen, automatisierten Umfrageeinladungen, Umfragebestätigungs-E-Mails sowie Alarmen & Benachrichtigungen. Wenn ein Feld für diesen Zweck festgelegt ist, wird bei allen Datensätzen in Ihrem Projekt, für die eine E-Mail-Adresse in diesem bestimmten Feld erfasst wurde, diese E-Mail-Adresse als E-Mail-Adresse des Teilnehmers in der Teilnehmerliste angezeigt (sofern für diesen Teilnehmer nicht bereits direkt in der Teilnehmerliste eine E-Mail-Adresse eingegeben wurde)."
setup_193 = "MyCap Mobile App in diesem Projekt verwenden?"
setup_194 = "Verwendung von MyCap in diesem Projekt deaktivieren?"
setup_195 = "Sind Sie sicher, dass Sie die Verwendung von MyCap in diesem Projekt deaktivieren möchten? Falls ja, beachten Sie bitte, dass alle bisher erstellten MyCap-Aufgabeneinstellungen und -Konfigurationen ausgeblendet und nicht mehr zugänglich sein werden. Ihre Datenerhebungsinstrumente bleiben unverändert, können jedoch einfach nicht mehr von MyCap verwendet werden. Wenn Sie die Verwendung von MyCap in diesem Projekt wieder aktivieren möchten, kehren alle zuvor erstellten MyCap-Aufgabeneinstellungen und -Konfigurationen zurück."
setup_196 = "Teilnehmerorientierte MyCap Mobile App verwenden?"
setup_197 = "Die Option zum Aktivieren der longitudinalen Datenerhebung wurde deaktiviert, weil Sie MyCap für dieses Projekt aktiviert haben, das NUR klassische/nicht-longitudinale Projekte unterstützt. Wenn Sie longitudinale Datenerhebung verwenden möchten, können Sie MyCap auf dieser Seite (im Abschnitt 'Optionale Module und Anpassungen') deaktivieren."
setup_198 = "MyCap unterstützt NUR klassische/nicht-longitudinale Projekte. Die MyCap-Option wurde in diesem Projekt deaktiviert, weil Sie derzeit longitudinale Datenerhebung verwenden. Wenn Sie MyCap für dieses Projekt verwenden möchten, müssen Sie die longitudinale Datenerhebung oben auf der Seite deaktivieren."
setup_199 = "<b>HINWEIS:</b> Ein oder mehrere Instrumente sind als MyCap aktiviert, und diese Instrumente müssen wiederholbar sein, damit die Datenerhebung über die MyCap Mobile App korrekt funktioniert. Sie können diese Instrumente nicht als nicht wiederholend markieren. Wenn Sie ein Instrument nicht wiederholbar machen möchten, müssen Sie zuerst die MyCap-Aufgabeneinstellungen für dieses Instrument im Online Designer löschen."
setup_200 = "Das MyCap External Module ist für dieses Projekt bereits aktiviert. Um die MyCap-Konfiguration aus REDCap zu aktivieren oder zu verwalten, müssen Daten aus dem MyCap External Module zuerst nach REDCap migriert werden. Nur REDCap-Administratoren dürfen Daten aus dem MyCap External Module nach REDCap migrieren. Bitte wenden Sie sich an Ihren lokalen Administrator, wenn Sie Hilfe benötigen."
setup_201 = "Sie müssen den untenstehenden Nutzungsbedingungen zustimmen, bevor Sie die gewünschte Aktion ausführen dürfen"
setup_202 = "<b>HINWEIS:</b> Ein oder mehrere Event-Instrumente sind als MyCap aktiviert, und diese Instrumente müssen wiederholbar sein, damit die Datenerhebung über die MyCap Mobile App korrekt funktioniert. Sie können diese Event-Instrumente nicht als nicht wiederholend markieren. Wenn Sie ein Instrument nicht wiederholbar machen möchten, müssen Sie zuerst das Event in den MyCap-Aufgabeneinstellungen für dieses Instrument im Online Designer deaktivieren."
setup_206 = "Benutzerdefinierten Kopfzeilentext festlegen, der oben links auf jeder PDF-Seite angezeigt wird (er kann bei Bedarf leer bleiben). Es kann nur statischer Text eingegeben werden; Piping kann hier daher nicht verwendet werden. Dieser Text wird nicht in PDFs angezeigt, die an Umfrageteilnehmer per E-Mail gesendet, von ihnen angesehen oder heruntergeladen werden."
setup_207 = "Ein Benutzer hat beantragt, dass ein REDCap-Administrator Twilio in diesem Projekt aktiviert. Er hat seine Twilio-Kontozugangsdaten bereits eingegeben und gespeichert; diese wurden verifiziert. Klicken Sie auf den Button unten, um Twilio zu aktivieren. Anschließend wird der Benutzer per E-Mail über seine Anfrage benachrichtigt."
setup_208 = "Twilio aktivieren"
setup_209 = "Twilio wurde aktiviert, und der Antragsteller wurde per E-Mail benachrichtigt."
