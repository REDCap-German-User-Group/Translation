mycap_mobile_app_930 = "<p>Änderungen an <b>Instrumenten</b> (neue Felder, überarbeitete Antwortoptionen) erfordern keine Veröffentlichung einer neuen Version und sind in der App verfügbar: 1) sofort für Projekte im Entwicklungsstatus und 2) nach Bestätigung der Entwurfsänderungen für Projekte im Produktionsstatus.</p><p>Änderungen an <b>MyCap-Einstellungen</b> (Aufgabeneinstellungen/-zeitpläne, App-Einstellungen, zusätzliche Einstellungen) erfordern die Veröffentlichung einer neuen Version, bevor Teilnehmende die Änderungen sehen. Die Schaltfläche \"Neue MyCap-Version veröffentlichen\" wird aktiv, wenn Änderungen an MyCap-Einstellungen vorgenommen wurden, die veröffentlicht werden sollten.</p>"
mycap_mobile_app_931 = "Sind Sie sicher, dass Sie diesen Teilnehmer AKTIVIEREN möchten? Durch Aktivieren eines Teilnehmers kann dieser dem Projekt in MyCap beitreten, falls er dies noch nicht getan hat. Teilnehmende, die bereits beigetreten sind, erhalten wieder Zugriff, um Aufgaben abzuschließen und mit dem Projekt in MyCap zu interagieren."
mycap_mobile_app_932 = "Teilnehmer aktivieren?"
mycap_mobile_app_933 = "Teilnehmer deaktivieren?"
mycap_mobile_app_934 = "Sind Sie sicher, dass Sie diesen Teilnehmer DEAKTIVIEREN möchten? Das Deaktivieren eines Teilnehmers bedeutet, dass er dem Projekt in MyCap nicht mehr beitreten kann, falls er dies noch nicht getan hat. Teilnehmende, die bereits beigetreten sind, verlieren den Zugriff zum Abschließen von Aufgaben, können aber weiterhin Nachrichten senden und empfangen. Bitte beachten Sie, dass diese Aktion den Datensatz des Teilnehmers nicht aus dem Projekt löscht."
mycap_mobile_app_935 = "Der Teilnehmer wurde nun deaktiviert."
mycap_mobile_app_936 = "Der Teilnehmer wurde nun aktiviert."
mycap_mobile_app_937 = "Der Teilnehmer wurde außerdem mit der bereitgestellten Nachricht benachrichtigt."
mycap_mobile_app_938 = "Hinweis: Durch Auswahl von 'Teilnehmer benachrichtigen' können Sie dem Teilnehmer eine Nachricht senden. Sie können die Nachricht unten bearbeiten."
mycap_mobile_app_939 = "Teilnehmer benachrichtigen?"
mycap_mobile_app_941 = "Sie haben nun Zugriff auf dieses Projekt und können mit dem Abschließen verfügbarer Aufgaben beginnen."
mycap_mobile_app_942 = "Neue App-Links im MyCap-Leitfaden"
mycap_mobile_app_943 = "Google Firebase wird seine <a href='https://firebase.google.com/docs/dynamic-links' target='_blank' style='text-decoration:underline;color:#A00000;'>Dynamic-Link</a>-Lösung nach dem 25. August 2025 nicht mehr unterstützen. Als Reaktion darauf hat MyCap eine Ersatzlösung erstellt - App Links - für den Beitritt zu Projekten in MyCap. QR-Codes sind nicht betroffen."
mycap_mobile_app_944 = "Ihr REDCap-Server wurde aktualisiert, sodass keine unmittelbare Aktion erforderlich ist. Neue Teilnehmende erhalten den neuen App Link, wenn sie zum Beitritt zum Projekt eingeladen werden, und der frühere Dynamic Link wurde überall dort durch den neuen App Link ersetzt, wo Sie den MyCap-Vorlagentext zum Einladen von Teilnehmenden verwendet haben. <br><b>Hinweis:</b> Wenn bestehende Teilnehmende nach dem 25. August 2025 Ihrem Projekt erneut beitreten müssen, benötigen sie den aktualisierten App Link oder den QR-Code. Erwägen Sie bitte, eine Ankündigung an alle Teilnehmenden zu senden, damit sie Sie kontaktieren, wenn sie das Gerät wechseln."
mycap_mobile_app_945 = "Bestätigen und schließen"
mycap_mobile_app_946 = "Lesen Sie vor der Bestätigung den"
mycap_mobile_app_947 = "Öffnen Sie die MyCap-App, wählen Sie Ihr Profil aus oder erstellen Sie ein neues, tippen Sie auf \"Projekt beitreten\" und tippen Sie auf \"QR-Code scannen\", um den untenstehenden QR-Code zu scannen."
mycap_mobile_app_948 = ", öffnen Sie die MyCap-App, wählen Sie Ihr Profil aus oder erstellen Sie ein neues, tippen Sie auf \"Projekt beitreten\" und tippen Sie auf \"QR-Code scannen\", um den untenstehenden QR-Code zu scannen."
mycap_mobile_app_949 = "Nachdem MyCap geöffnet ist, wählen Sie Ihr Profil aus oder erstellen Sie ein neues und tippen Sie auf \"NEUES PROJEKT: Hier klicken, um beizutreten.\""
mycap_mobile_app_950 = "während Sie auf Ihrem Mobilgerät sind; dadurch gelangen Sie zur MyCap Project Launcher-Seite. Klicken Sie auf \"Projekt beitreten\", wenn MyCap bereits installiert ist, oder klicken Sie auf \"Get on Play/App Store\", um MyCap zu installieren."
mycap_mobile_app_951 = "Drücken Sie \"QR-Code scannen\"."
mycap_mobile_app_952 = "Klicken Sie von einem Mobilgerät aus auf diesen Link."
mycap_mobile_app_953 = "Klicken Sie auf der MyCap Project Launcher-Seite auf \"Projekt beitreten\", wenn MyCap bereits installiert ist, oder klicken Sie auf \"Get on Play/App Store\", um MyCap zu installieren."
mycap_mobile_app_954 = "Klicken Sie auf \"NEUES PROJEKT: Hier klicken, um beizutreten\"."
mycap_mobile_app_955 = "Öffnen Sie MyCap und wählen Sie Ihr Profil aus oder erstellen Sie ein neues."
