piping_10 = "Die Webadresse (URL) des angegebenen Eingabeformulars für den aktuellen Datensatz/das aktuelle Event/die aktuelle Instanz. Das Format muss [form-url:instrument] sein, wobei 'instrument' der eindeutige Formularname des gewünschten Instruments ist."
piping_11 = "Der HTML-Weblink, der beim Anklicken zum angegebenen Eingabeformular für den aktuellen Datensatz/das aktuelle Event/die aktuelle Instanz navigiert. Das Format muss [form-link:instrument] oder [form-link:instrument:Custom Text] sein, wobei 'instrument' der eindeutige Formularname des gewünschten Instruments ist. 'Custom Text' ist ein optionaler Parameter, mit dem Sie den sichtbaren Linktext angeben können. Wenn er nicht angegeben wird, wird standardmäßig das Formularlabel des Eingabeformulars verwendet. Das Format [form-link:Custom Text] kann ebenfalls verwendet werden, wenn das Instrument angenommen wird, z. B. beim Anzeigen eines Formulars oder in einer Fragebogeneinladung. Außerdem kann es im Inhalt einer Fragebogeneinladung einfach als [form-link] verwendet werden, wobei 'instrument' als aktuelles Fragebogeninstrument angenommen wird."
piping_12 = "Die Webadresse (URL) des angegebenen Fragebogens für den aktuellen Datensatz/das aktuelle Event/die aktuelle Instanz. Das Format muss [survey-url] oder [survey-url:instrument] sein, wobei 'instrument' der eindeutige Formularname des gewünschten Instruments ist. Dies kann im Inhalt einer Fragebogeneinladung einfach als [survey-url] verwendet werden, wobei 'instrument' als aktuelles Fragebogeninstrument angenommen wird."
piping_13 = "Der HTML-Weblink, der beim Anklicken zum angegebenen Fragebogen für den aktuellen Datensatz/das aktuelle Event/die aktuelle Instanz navigiert. Das Format muss [survey-link], [survey-link:instrument] oder [survey-link:instrument:Custom Text] sein, wobei 'instrument' der eindeutige Formularname des gewünschten Instruments ist. 'Custom Text' ist ein optionaler Parameter, mit dem Sie den sichtbaren Linktext angeben können. Wenn er nicht angegeben wird, wird standardmäßig der Fragebogentitel des Fragebogens verwendet. Das Format [survey-link:Custom Text] kann ebenfalls verwendet werden, wenn das Instrument angenommen wird, z. B. beim Anzeigen eines Formulars oder in einer Fragebogeneinladung. Außerdem kann es im Inhalt einer Fragebogeneinladung einfach als [survey-link] verwendet werden, wobei 'instrument' als aktuelles Fragebogeninstrument angenommen wird."
piping_14 = "Die Webadresse (URL) der Survey Queue für den aktuellen Datensatz."
piping_15 = "Der HTML-Weblink, der beim Anklicken zur Survey Queue für den aktuellen Datensatz navigiert. Das Format muss [survey-queue-link] oder [survey-queue-link:Custom Text] sein, wobei 'Custom Text' ein optionaler Parameter ist, mit dem Sie den sichtbaren Linktext angeben können. Wenn er nicht angegeben wird, ist der Standard 'Survey Queue Link'."
piping_16 = "Survey Queue Link"
piping_17 = "(nur longitudinal) Das aktuelle Event (das Event-Label, nicht der eindeutige Eventname)."
piping_18 = "(nur longitudinal) Das Event (das Event-Label, nicht der eindeutige Eventname), das unmittelbar vor dem aktuellen Event liegt (leer, wenn das aktuelle Event das erste Event ist)."
piping_19 = "(nur longitudinal) Das Event (das Event-Label, nicht der eindeutige Eventname), das unmittelbar nach dem aktuellen Event liegt (leer, wenn das aktuelle Event das letzte Event ist)."
piping_20 = "(nur longitudinal) Die aktuelle Arm-Nummer."
piping_22 = "Erkennt, ob das aktuelle Instrument als Fragebogen durchgeführt wird (gibt 1 für True, 0 für False zurück), im Gegensatz zu einem Formular."
piping_23 = "Erkennt, ob das aktuelle Instrument als Eingabeformular angezeigt wird (gibt 1 für True, 0 für False zurück), im Gegensatz zu einem Fragebogen."
;; piping_24 is prepended to several repeating-instance Smart Variable descriptions.
