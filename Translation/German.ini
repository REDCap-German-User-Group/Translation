dataqueries_36 = "Spezielle Funktionen können ebenfalls innerhalb der Logik verwendet werden (ähnlich wie Funktionen in berechneten Feldern); alle sind aufgeführt auf der"
dataqueries_37 = "Wenn für eine bestimmte Regel eine Diskrepanz gefunden wurde, kann jede einzelne Diskrepanz in der Ergebnisliste künftig aus diesen Ergebnissen ausgeschlossen werden. Durch das Ausschließen eines Ergebnisses wird lediglich verhindert, dass es in die Anzahl der Diskrepanzen aufgenommen wird, wenn die Regel später erneut ausgeführt wird. Ausgeschlossene Ergebnisse können erneut aufgerufen werden, indem Sie oben in der Ergebnistabelle für diese Regel auf den Link 'anzeigen' klicken; danach können sie bei Bedarf wieder eingeschlossen werden."
