design_1420 = "Gibt einen booleschen Wert (true oder false) zurück, wenn der Feldwert ein Missing Data Code ist, wobei Missing Data Codes im Projekt auf der Projekt-Setup-Seite unter Zusätzliche Anpassungen ausdrücklich definiert wurden. Z. B. ismissingcode([age]), wobei, wenn 'age' den Wert 'UNK' hat (was in einem Projekt ein Missing Data Code sein könnte), <i>true</i> zurückgegeben wird. Wenn das Feld keinen Missing Data Code hat, wird <i>false</i> zurückgegeben."
design_1421 = "Gibt einen booleschen Wert (true oder false) zurück, wenn der Feldwert leer/null/'' und kein Missing Data Code ist. Z. B. isblanknotmissingcode([age]), wobei, wenn 'age' den Wert 'UNK' hat (was in einem Projekt ein Missing Data Code sein könnte), <i>false</i> zurückgegeben wird. Wenn das Feld einen leeren/null-Wert hat und kein Missing Data Code ist, wird <i>true</i> zurückgegeben."
design_1422 = "Gibt einen booleschen Wert (true oder false) zurück, wenn der Feldwert ein Missing Data Code ist und außerdem genau einem der Missing Data Codes entspricht, die als kommaseparierte Zeichenkette im zweiten Parameter angegeben werden. Z. B. hasmissingcode([age], 'UNK') oder hasmissingcode([age], 'NASK,NI,UNK'), wobei, wenn 'age' den Wert 'UNK' hat (was in einem Projekt ein Missing Data Code sein könnte), <i>true</i> zurückgegeben wird. Wenn der Feldwert kein Missing Data Code ist oder keinem der im zweiten Parameter angegebenen Missing Data Codes entspricht, wird <i>false</i> zurückgegeben."
design_1423 = "Das Gegenteil von contains(). Gibt einen booleschen Wert (true oder false) dafür zurück, ob \"needle\" NICHT innerhalb der Textzeichenkette \"haystack\" existiert (als Teilzeichenkette). Groß-/Kleinschreibung wird ignoriert. Z. B. gibt not_contain(\"Rob Taylor\", \"TAYLOR\") <i>false</i> zurück und not_contain(\"Rob Taylor\", \"paul\") gibt <i>true</i> zurück. HINWEIS: Diese Funktion funktioniert *nicht* für berechnete Felder, funktioniert aber an allen anderen Stellen (Datenqualität, Report-Filter, Fragebogen-Warteschlange usw.)."
design_1424 = "Gibt einen booleschen Wert (true oder false) dafür zurück, ob \"needle\" innerhalb der Textzeichenkette \"haystack\" existiert (als Teilzeichenkette). Groß-/Kleinschreibung wird ignoriert. Z. B. gibt contains(\"Rob Taylor\", \"TAYLOR\") <i>true</i> zurück und contains(\"Rob Taylor\", \"paul\") gibt <i>false</i> zurück. HINWEIS: Diese Funktion funktioniert *nicht* für berechnete Felder, funktioniert aber an allen anderen Stellen (Datenqualität, Report-Filter, Fragebogen-Warteschlange usw.)."
design_1425 = "Gibt einen booleschen Wert (true oder false) zurück, wenn die Textzeichenkette \"haystack\" mit der Textzeichenkette \"needle\" beginnt. Groß-/Kleinschreibung wird ignoriert. Z. B. gibt starts_with(\"Rob Taylor\", \"rob\") <i>true</i> zurück und starts_with(\"Rob Taylor\", \"Tay\") gibt <i>false</i> zurück. HINWEIS: Diese Funktion funktioniert *nicht* für berechnete Felder, funktioniert aber an allen anderen Stellen (Datenqualität, Report-Filter, Fragebogen-Warteschlange usw.)."
design_1426 = "Gibt einen booleschen Wert (true oder false) zurück, wenn die Textzeichenkette \"haystack\" mit der Textzeichenkette \"needle\" endet. Groß-/Kleinschreibung wird ignoriert. Z. B. gibt ends_with(\"Rob Taylor\", \"Lor\") <i>true</i> zurück und ends_with(\"Rob Taylor\", \"Tay\") gibt <i>false</i> zurück. HINWEIS: Diese Funktion funktioniert *nicht* für berechnete Felder, funktioniert aber an allen anderen Stellen (Datenqualität, Report-Filter, Fragebogen-Warteschlange usw.)."
design_1427 = "Gibt einen booleschen Wert (true oder false) zurück, wenn der Feldwert leer/null/'' ist oder wenn der Wert ein Missing Data Code ist, wobei Missing Data Codes im Projekt auf der Projekt-Setup-Seite unter Zusätzliche Anpassungen ausdrücklich definiert wurden. Z. B. isblankormissingcode([age]), wobei, wenn 'age' den Wert 'UNK' hat (was in einem Projekt ein Missing Data Code sein könnte), <i>true</i> zurückgegeben wird. Wenn das Feld einen nicht-leeren/nicht-null-Wert hat, der auch kein Missing Data Code ist, wird <i>false</i> zurückgegeben."
design_1428 = "Blendet das Feld nur im heruntergeladenen PDF eines oder mehrerer Instrumente aus (einschließlich leerer PDFs, PDFs mit Daten und kompakter PDFs mit Daten). Hinweis: Andere @HIDDEN Action Tags blenden Felder in PDF-Exporten nicht aus, außer bei <u>teilnehmerseitigen</u> PDF-Downloads/Snapshots, wie e-Consent-PDF-Snapshots, bei denen die Action Tags @HIDDEN und @HIDDEN-SURVEY das Feld im PDF ausblenden, um genau zu simulieren, was der Teilnehmer auf der Fragebogenseite gesehen hat. Im Allgemeinen sollte jedoch @HIDDEN-PDF speziell verwendet werden, um Felder in PDFs auszublenden."
design_1429 = "Bestimmt den Wochentag für ein angegebenes Datum oder Datetime. Es wird eine Ganzzahl zurückgegeben, die einem bestimmten Wochentag wie folgt entspricht: 1=Montag, 2=Dienstag, 3=Mittwoch, 4=Donnerstag, 5=Freitag, 6=Samstag, 7=Sonntag. HINWEIS: Sie können \"today\" oder \"now\" als Datumsparameter in der Funktion verwenden."
design_1430 = "HINWEIS: Sie können \"today\" oder \"now\" als einen der Datumsparameter in der Funktion verwenden."
design_1433 = "<b>Was sind CDEs?</b> Common Data Elements (CDEs) sind standardisierte, präzise definierte Felder, die verwendet werden, um Daten konsistent über Studien, Systeme oder Organisationen hinweg zu erfassen und zu teilen. Sie stellen sicher, dass alle dieselben Definitionen, Formate und Codierungen für bestimmte Informationen verwenden."
design_1434 = "Standardisiertes Feld hinzufügen (CDE)"
design_1435 = "Mit der CDE Library (früher Field Bank) können Sie unten in verschiedenen Katalogen nach standardisierten Feldern (Common Data Elements) suchen, indem Sie einen Katalog auswählen und ein bestimmtes Suchwort eingeben. Wenn Sie die Suchergebnisse prüfen, klicken Sie auf den Button \"Feld hinzufügen\", um dieses Feld dem aktuellen Datenerfassungsinstrument hinzuzufügen."
design_1436 = "Die einzigen zulässigen Zeichen, die in codierten Werten verwendet werden können, sind: Buchstaben (Groß- oder Kleinbuchstaben), Zahlen, Unterstriche, Bindestriche und Punkte."
design_1437 = "Mehrfachauswahlfelder dürfen nur codierte Werte haben (in den Optionen in Spalte F), die folgende Zeichen enthalten: Buchstaben (Groß- oder Kleinbuchstaben), Zahlen, Unterstriche, Bindestriche und Punkte. Daher dürfen sie keine Codierungen enthalten, die Leerzeichen oder andere Zeichen enthalten. Bitte nehmen Sie die folgenden Korrekturen vor: "
design_1438 = "Berechnet das Alter einer Person in Jahren anhand ihres Geburtsdatums und eines anderen Datums. Standardmäßig wird eine Ganzzahl zurückgegeben. Wenn Sie das Alter im Dezimalformat zurückgeben möchten (z. B. 0.24 Jahre für ein Neugeborenes), hängen Sie den Parameter 'returnDecimal' an, der entweder <i>false</i> (Standard) oder <i>true</i> sein muss. Hinweis: Wenn Datetime-Felder angegeben werden, wird der Zeitanteil des Datetime-Wertes ignoriert, und nur der Datumsanteil wird verwendet."
design_1439 = "Alter an einem angegebenen Datum"
design_1440 = "Die REDCap Shared Library ist ein globales Repository von Datenerfassungsinstrumenten, die heruntergeladen und in Ihren REDCap-Projekten verwendet werden können. Wenn Sie zur Shared Library navigieren, können Sie alle Instrumente der Bibliothek auf der Bibliotheks-Webseite oder als PDF ansehen. Sie ermöglicht es Ihnen, jedes Instrument aus der Bibliothek in Ihr REDCap-Projekt zu importieren. Um mit der Suche nach Instrumenten in der Shared Library zu beginnen, klicken Sie auf der Online-Designer-Seite auf den Button 'Importieren'."
design_1441 = "Gibt eine zufällige Ganzzahl zwischen den angegebenen Zahlen min und max zurück (einschließlich min und max) - z. B. gibt random(1, 100) eine Zufallszahl von 1 bis 100 zurück (einschließlich 1 und 100)."
design_1442 = "Diese Meldung in diesem Projekt nicht erneut anzeigen."
design_1443 = "Fragebogen"

design_ic_01 = "Dieses Action Tag ist nützlich, um die Warnabfrage \"Änderungen speichern?\" unter bestimmten Bedingungen zu verhindern, wenn von einem Eingabeformular oder einer Fragebogenseite weg navigiert wird. Wenn es einem Feld hinzugefügt wird, verhindern Änderungen am Wert dieses Feldes für sich genommen, dass die Abfrage \"Änderungen speichern?\" ausgelöst wird, <b>wenn jemand die Seite verlässt, ohne auf den Speichern-Button zu klicken</b>. Bitte beachten Sie, dass bei Verwendung dieses Action Tags die Abfrage \"Änderungen speichern?\" dem Benutzer *angezeigt wird*, wenn auf der Seite auch der Wert eines anderen Feldes geändert wird, weil <u>dieses Action Tag nur die Fähigkeit des einzelnen Feldes beeinflusst, die Warnabfrage auszulösen</u>. Dies wird typischerweise bei Feldern verwendet, bei denen der zu speichernde Feldwert nicht wichtig ist, sofern nicht auch andere Felddaten eingegeben werden - z. B. beim Vorbefüllen eines Feldes \"Zuletzt geändert von\", das sowohl @READONLY als auch @SETVALUE=\"[user-name]\" hat. <b>Warnung:</b> Mit Vorsicht verwenden, da unbeabsichtigter Datenverlust <u>NUR bei Feldern auftreten könnte, in denen dieses Action Tag implementiert ist</u>, wenn ein Benutzer die Seite verlässt, ohne auf Speichern zu klicken."
design_ic_02 = "Dieses Action Tag ähnelt dem Action Tag <code>@SAVE-PROMPT-EXEMPT</code>, seine Wirkung ist jedoch auf das anfängliche Setzen des Feldwertes beschränkt, wenn der Wert beim Laden der Formular-/Fragebogenseite leer ist. Verwenden Sie dieses Action Tag, um zu verhindern, dass Action Tags wie <code>@DEFAULT</code>, <code>@SETVALUE</code>, <code>@TODAY</code> oder <code>@NOW</code> die Abfrage \"Änderungen speichern?\" auslösen, <b>wenn jemand die Seite verlässt, ohne auf den Speichern-Button zu klicken</b>. Bitte beachten Sie, dass bei Verwendung dieses Action Tags die Abfrage \"Änderungen speichern?\" dem Benutzer *angezeigt wird*, wenn dieses oder ein anderes Feld später auf der Seite geändert wird, weil <u>dieses Action Tag nur die Fähigkeit des einzelnen Feldes beeinflusst, die Warnabfrage auszulösen, und nur während des anfänglichen Setzens des Feldwertes</u>. <b>Warnung:</b> Mit Vorsicht verwenden, da unbeabsichtigter Datenverlust <u>NUR bei Feldern auftreten könnte, in denen dieses Action Tag implementiert ist</u>, wenn ein Benutzer die Seite verlässt, ohne auf Speichern zu klicken."

