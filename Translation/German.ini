survey_1108 = "teilweise und abgeschlossene Antworten"
survey_1109 = "nur abgeschlossene Antworten (Teilantworten ausschließen)"
survey_1110 = "Ein wichtiger Hinweis zur Verwendung der Antwortlimit-Funktion ist, dass eine Umfrage, wenn das Limit für eine bestimmte Umfrage erreicht wurde, nicht mehr in der Umfrage-Warteschlange eines Teilnehmers angezeigt wird (falls aktiviert), die Option Umfrage-Auto-Fortsetzen (falls auf der Seite Umfrageeinstellungen aktiviert) diese Umfrage überspringt und automatisierte Umfrageeinladungen (falls aktiviert) für die Umfrage nicht mehr geplant werden."
survey_1111 = "LONGITUDINALER HINWEIS: Wenn in Ihrem Projekt das longitudinale Modul aktiviert ist, beachten Sie bitte, dass das Antwortlimit auf jedes Event einzeln angewendet wird, in dem die Umfrage verwendet wird. Wenn das Antwortlimit beispielsweise auf 50 gesetzt ist, bleibt die Umfrage auf Event 2 und folgenden Events weiterhin offen, auch wenn die Umfrage auf Event 1 das Limit erreicht hat, sofern die Umfrage auf diesen Events das Limit noch nicht erreicht hat."
survey_1112 = "HINWEIS ZUR DATENSATZLÖSCHUNG: Wenn Datensätze/Antworten aus dem Projekt gelöscht werden, nachdem das Antwortlimit erreicht wurde, sodass die Anzahl Antworten wieder unter das Limit fällt, erscheint die Umfrage wieder in der Umfrage-Warteschlange, die Option Umfrage-Auto-Fortsetzen funktioniert wieder normal, und automatisierte Umfrageeinladungen werden wieder geplant. In diesem Fall werden jedoch Einladungen, die nach Erreichen des Limits nicht über automatisierte Umfrageeinladungen geplant wurden, *nicht* automatisch erneut geplant, wenn die Antwortanzahl aufgrund der Löschung von Datensätzen/Antworten unter das Limit fällt; diese Einladungen müssten dann manuell geplant werden."
survey_1113 = "HINWEIS: Das Antwortlimit dieser Umfrage wurde erreicht, daher wäre es derzeit nicht sinnvoll, weitere Einladungen zu senden."
survey_1114 = "HINWEIS: Das Antwortlimit dieser Umfrage wurde erreicht, was bedeutet, dass derzeit keine weiteren Einladungen geplant werden."
survey_1115 = "HINWEIS: Das Antwortlimit dieser Umfrage wurde *für dieses Event* erreicht, was bedeutet, dass derzeit keine weiteren Einladungen geplant werden."
survey_1116 = "Benutzerdefinierter Text, der dem Befragten in der Umfrage angezeigt wird, wenn das Limit erreicht ist:"
