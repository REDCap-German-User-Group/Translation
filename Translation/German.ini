cdp_instant_adjudication_cronjob_settings_title = "Auto-adjudizieren"
cdp_instant_adjudication_cronjob_settings_description = "Aktivieren Sie \"auto-adjudicate\", und REDCap adjudiziert abgerufene Datensätze automatisch in einem Hintergrundprozess"
cdp_instant_adjudication_cronjob_settings_label = "Alle klinischen Daten einmal täglich automatisch adjudizieren"
override_system_bundle_ca_title = "CA-Zertifikate"
override_system_bundle_ca_description = "Um mit FHIR-Ressourcen zu interagieren, muss REDCap die Identität des EHR-Systems mithilfe eines Bündels von CA-Zertifikaten (Certificate Authority) verifizieren können. Ein digitales Zertifikat bestätigt den Besitz eines öffentlichen Schlüssels durch das benannte Subjekt des Zertifikats. Sie können wählen, ob Sie das in REDCap enthaltene Bündel von CA-Zertifikaten oder die von Ihrem Webserver bereitgestellte Systemverifizierung verwenden möchten."
override_system_bundle_ca_use_redcap = "Das in REDCap enthaltene CA-Bündel verwenden"
override_system_bundle_ca_use_system = "Die von Ihrem Webserver bereitgestellte Verifizierung verwenden"
fhir_identity_provider_title = "Identity Provider (optional)"
fhir_identity_provider_subtitle = "Der Identity Provider wird im OAuth2-Autorisierungsprozess verwendet, um den Server zu identifizieren, der das FHIR-Access-Token mit REDCap austauscht."
fhir_identity_provider_description = "Setzen Sie diesen Parameter nur, wenn sich die echte FHIR-Basis-URL Ihres EHR-Systems von der auf dieser Seite angegebenen unterscheidet (z. B. wenn Ihr EHR-System hinter einem Proxy liegt)."
fhir_identity_provider_description2 = "Weitere Informationen zur Launch-Sequenz finden Sie <a href=\"https://build.fhir.org/ig/HL7/smart-app-launch/app-launch.html#request-4\" target=\"_blank\">hier</a>."
cdis_diff_category_1 = "Häufigste Anwendungsfälle"
cdis_diff_category_2 = "Datenmapping zu EHR-Feldern"
cdis_diff_category_3 = "Aktivierungsprozess"
cdis_diff_category_4 = "Benutzerrechte"
cdis_diff_category_5 = "Nutzung"
cdis_diff_ddp_1 = "Echtzeit-Datenerhebung"
cdis_diff_ddp_2 = "Prospektive klinische Studien/Trials"
cdis_diff_ddp_3 = "Longitudinale und/oder Multi-Arm-Studien"
cdis_diff_ddp_4 = "Feldmapping muss vor dem Datenabruf von einem Benutzer mit CDP-Setup-/Mapping-Rechten im Project eingerichtet werden. Dies erfolgt über die CDP-Mapping-Seite (Zugriff über die Project-Setup-Seite)."
cdis_diff_ddp_5 = "Mapping kann in einem CDP-Project jederzeit angepasst werden und kann komplex sein, wenn EHR-Felder auf REDCap-Felder gemappt werden (ermöglicht One-to-many-, Many-to-one- oder Many-to-many-Mapping)."
cdis_diff_ddp_6 = "Zeitbezogene Daten (z. B. Vitalzeichen und Laborwerte) müssen ein zugehöriges Datums- oder Datum-/Uhrzeitfeld (z. B. Besuchsdatum) haben, um das Zeitfenster zu bestimmen, in dem Daten abgerufen werden (unter Verwendung des +/- Tages-Offsets). Zeitbezogene Daten können auf Felder in einem klassischen Project, auf Events in einem longitudinalen Project oder auf wiederholte Instrumente/Events gemappt werden."
cdis_diff_ddp_7 = "Alle Werte für Allergien, Medikamente und Problemliste werden für jede Kategorie zusammengeführt und jeweils in einem eigenen Notizen-/Absatzfeld gespeichert (falls gemappt)."
cdis_diff_ddp_8 = "Die lokale Einrichtung kann einen formalen Prozess zur Bewertung der Benutzer/des Projects vor der Genehmigung haben (empfohlen) - z. B. Prüfung des IRB-Status, Prüfung des EHR-Zugriffs der Benutzer."
cdis_diff_ddp_9 = "Ein REDCap-Administrator muss CDP für das Project auf der Project-Setup-Seite des Projects aktivieren."
cdis_diff_ddp_10 = "Project-Benutzer können Feldmapping einrichten und Daten aus dem EHR adjudizieren, wenn sie entsprechende Project-Rechte haben. Um Daten aus dem EHR zu adjudizieren, müssen Benutzer Zugriff auf das EHR haben und mindestens einen Patienten im REDCap-Fenster innerhalb der EHR-Benutzeroberfläche gestartet haben."
cdis_diff_ddp_11 = "REDCap-Administrator und Team können optional einen User Access Web Service erstellen, um den Benutzerzugriff während der Adjudizierung weiter zu steuern (Informationen sind auf dieser Seite dokumentiert)."
cdis_diff_ddp_12 = "Benutzer müssen einen Patienten im REDCap-Fenster innerhalb der EHR-Benutzeroberfläche starten und können den Patienten zu jedem CDP-aktivierten REDCap-Project hinzufügen, auf das sie Zugriff haben. Sobald der Patient in einem Project ist, kann der Benutzer manuell Daten aus dem EHR für den Patienten abrufen."
cdis_diff_ddp_13 = "Aus dem EHR abgerufene Daten werden nicht sofort im Project gespeichert, sondern temporär in einem Cache gespeichert; Benutzer müssen zuerst alle Datenwerte prüfen/adjudizieren, bevor sie im Project gespeichert werden."
cdis_diff_ddp_14 = "Sobald ein Patient zu einem Project hinzugefügt wurde, sucht CDP automatisch (über einen Cron-Job) bis zu X Tage lang weiter nach neuen Daten, die dem EHR hinzugefügt wurden. X ist dabei der Wert der Einstellung \"Zeit der Inaktivität, nach der REDCap die Suche nach neuen Daten beendet\" (Informationen sind auf dieser Seite dokumentiert)."
cdis_diff_ddm_1 = "Register"
cdis_diff_ddm_2 = "Prospektive oder retrospektive klinische Studien/Trials"
cdis_diff_ddm_3 = "Suche nach spezifischen Laborwerten oder Diagnosecodes für eine Patientenkohorte über einen festgelegten Zeitraum"
cdis_diff_ddm_4 = "Mapping ist nicht erforderlich, da Projectstruktur/Instrumente beim Erstellen des Projects vordefiniert sind. Demografie wird als einzelnes Datenerhebungsformular erstellt, und die folgenden Formulare werden als wiederholte Instrumente erstellt: Vitalzeichen, Laborwerte, Allergien, Medikamente und Problemliste. Jeder Datenwert auf den wiederholten Instrumenten wird als eigene wiederholte Instanz des Formulars dargestellt."
cdis_diff_ddm_5 = "Der Benutzer definiert die Datenabrufkonfiguration beim Erstellen des Projects - z. B. Auswahl spezifischer MRNs, Datumsbereich und Datenfelder aus dem EHR."
cdis_diff_ddm_6 = "Project-weite Einstellungen steuern, ob Benutzer im Project 1) Daten nur einmal oder beliebig oft abrufen können, 2) die Datenabrufkonfiguration ändern dürfen oder nicht und 3) ob neue Daten automatisch einmal täglich per Cron-Job abgerufen werden. Diese Einstellungen können nur von einem REDCap-Administrator geändert werden."
cdis_diff_ddm_7 = "Die lokale Einrichtung kann einen formalen Prozess zur Bewertung der Benutzer/des Projects vor der Genehmigung haben (empfohlen) - z. B. Prüfung des IRB-Status, Prüfung des EHR-Zugriffs der Benutzer."
cdis_diff_ddm_8 = "Das Project wird zuerst von einem Benutzer erstellt, aber jede Überarbeitung der Datenabrufkonfiguration durchläuft einen Audit-Prozess und wird über die Aufgabenliste von einem REDCap-Administrator genehmigt (wenn die Project-weite Einstellung zur Zulassung von Konfigurationsänderungen aktiviert wurde)."
cdis_diff_ddm_9 = "Dem REDCap-Konto eines Benutzers müssen von einem REDCap-Administrator auf der Seite Benutzer durchsuchen im Control Center Data-Mart-Rechte gegeben werden. Danach kann der Benutzer ein Data-Mart-Project erstellen und EHR-Daten abrufen. (Hinweis: Dies ist kein Project-weites Benutzerrecht, sondern ein REDCap-Benutzerkonto-Recht.) Außerdem gibt es keinen optionalen User Access Web Service wie bei CDP, um den Benutzerzugriff für das Abrufen von Daten weiter zu steuern."
cdis_diff_ddm_10 = "Um Daten aus dem EHR abzurufen, müssen Benutzer Zugriff auf das EHR haben und mindestens einen Patienten im REDCap-Fenster innerhalb der EHR-Benutzeroberfläche gestartet haben."
cdis_diff_ddm_11 = "Benutzer mit Project-Setup-/Design-Rechten in einem Data-Mart-Project können Änderungen an der Datenabrufkonfiguration anfordern (falls erforderlich und falls die Project-weite Einstellung aktiviert wurde)."
cdis_diff_ddm_12 = "Data Mart ruft Daten aus dem EHR ab, wenn ein Benutzer mit entsprechenden Rechten auf die Schaltfläche \"Klinische Daten abrufen\" klickt. Außerdem kann über die Project-weiten Einstellungen ein Cron-Job eingerichtet werden, der neue Daten einmal täglich automatisch abruft."
cdis_diff_ddm_13 = "Um neue Datenwerte im EHR abzurufen, muss ein Benutzer manuell erneut auf die Abrufen-Schaltfläche klicken (vorausgesetzt, die Project-weite Einstellung erlaubt mehr als einen Datenabruf)."
cdis_diff_ddm_14 = "Zusätzliche Instrumente oder Events können dem Data-Mart-Project hinzugefügt werden, aber wenn eines der vordefinierten Felder oder Instrumente geändert wird, kann dies danach einen erfolgreichen Datenabruf verhindern."

