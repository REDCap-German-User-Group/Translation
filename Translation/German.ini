control_center_4777 = "Gesperrte IP-Adressen"
control_center_4778 = "Unten ist die Liste aller IP-Adressen aufgeführt, die für diese REDCap-Installation gesperrt/blockiert wurden. Jeder, der versucht, eine REDCap-Seite (einschließlich Fragebögen) von einer gesperrten IP-Adresse zu laden, erhält sofort eine Meldung, dass er REDCap in keiner Weise nutzen kann, weil seine IP-Adresse gesperrt wurde. Die hier aufgeführten IP-Adressen sind IPv4- oder IPv6-Adressen, die manuell über diese Seite blockiert wurden oder automatisch über die Rate-Limiter-Funktion gesperrt wurden (aktiviert auf der Seite Allgemeine Konfiguration im Control Center)."
