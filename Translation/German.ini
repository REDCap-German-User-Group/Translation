mapping_helper_01 = "EHR-Mapping-Hilfe"
mapping_helper_02 = "Das Dienstprogramm Mapping-Hilfe unterstützt Sie dabei, die Felder in Ihrem EHR (elektronisches Patientenaktensystem) zu finden, die Sie in Ihrem Clinical Data Pull Project oder Clinical Data Mart Project verwenden möchten. Wenn Sie bereits über geeignete Rechte verfügen, um Daten aus Ihrem EHR nach REDCap zu ziehen, können Sie in einem beliebigen Tab der Mapping-Hilfe eine gültige MRN (Medical Record Number) eingeben, um alle Daten für diesen Patienten in den jeweiligen Datenkategorien abzurufen. Sobald die Daten abgerufen wurden, werden sie auf der Seite angezeigt. Die EHR-Feldnamen und LOINC-Codes werden angezeigt, sodass Sie die spezifischen Felder finden können, die Sie beim Feldmapping-Prozess Ihres CDP- oder Data-Mart-Projects verwenden müssen."
break_the_glass_settings_01 = "Break-the-Glass"
break_the_glass_disabled = "Deaktiviert"
break_the_glass_enabled = "Aktiviert"
break_glass_description = "Sobald Break-the-Glass für das System aktiviert ist, muss sich der Benutzer nicht in Hyperspace anmelden, um für einen Patienten Break-the-Glass auszuführen. Alle Break-the-Glass-Anfragen werden sowohl in REDCap als auch in Epic protokolliert."
break_glass_ehr = "Der Typ des EHR-Benutzers, den REDCap im EHR-Launch-Prozess dem aktuellen Benutzer zugeordnet hat"
break_glass_usertype_ehr = "Der in Epic verwendete Benutzertyp - typischerweise \"Internal\""
cdis_cache_filesystem_path_label = "CDIS-Cache-Ordner"
cdis_cache_filesystem_path_description = "Überschreibt den Dateisystempfad, der für temporäre CDIS-Dateien verwendet wird."
cdis_cache_filesystem_path_help = "Leer lassen, um das standardmäßige REDCap-Temporärverzeichnis (APP_PATH_TEMP) zu verwenden."
break_glass_003 = "\"Break-the-Glass\"-Funktion (nur für Epic)"
break_glass_004 = "Break-the-Glass (der Name bezieht sich auf das Einschlagen der Glasscheibe, um einen Feueralarm auszulösen) bezeichnet eine schnelle Möglichkeit für eine Person ohne Zugriffsrechte auf bestimmte Informationen, bei Bedarf Zugriff zu erhalten.<br/><br/>In Epic wird das Break-the-Glass-Verfahren verwendet, um den Zugriff auf sensible Daten zu kontrollieren und zu überwachen. "
break_glass_007 = "EHR-Benutzertyp"
break_glass_project_setup_enable_header = "Break-the-Glass-Einstellungen für dieses Project (nur Administratoren)"
break_glass_project_setup_enable_text = "Standardmäßig können Benutzer kein \"Break-the-Glass\" ausführen, wenn REDCap einen geschützten Patienten erkennt. Als Administrator können Sie Project-Benutzern durch Klicken auf die untenstehenden Schaltflächen das Recht gewähren, die \"Break-the-Glass\"-Funktion zu verwenden."
break_glass_project_setup_enable_button_info = "Benutzer können \"Break-the-Glass\" ausführen"
break_glass_overview_header = "Break-the-Glass (BTG)-Übersicht"
break_glass_overview_text = "Break-the-Glass ist eine Funktion innerhalb von Epic, die kontrollierten Zugriff auf sensible Patientendaten ermöglicht, die Einhaltung organisatorischer Richtlinien sicherstellt und die Privatsphäre von Patienten schützt. Beim Zugriff auf bestimmte geschützte Patientendatensätze werden Benutzer aufgefordert, durch Angabe eines gütigen Zugriffsgrundes \"das Glas zu brechen\". Dadurch wird sichergestellt, dass alle Zugriffsversuche zur Sicherheit und Verantwortlichkeit dokumentiert und auditiert werden."
break_glass_workflow_description = "Wenn in dieser Anwendung die Break-the-Glass-Funktion für ein Project aktiviert ist, lösen Interaktionen mit geschützten Patientendaten einen Break-the-Glass-Workflow aus. Ein BTG-Token wird erzeugt, um den Zugriff zu vereinfachen, sodass keine manuelle Anmeldung in Epic Hyperspace erforderlich ist."
break_glass_actions_header = "Break-the-Glass-Aktionen ausführen"
break_glass_actions_text_1 = "Auf dieser Seite können Sie eine Liste identifizierter Patienten anzeigen, deren Datenzugriff durch Break-the-Glass-Regeln eingeschränkt ist. Hier können Sie die Break-the-Glass-Aktion für mehrere Patienten gleichzeitig ausführen."
break_glass_actions_text_2 = "Durch Fortfahren bestätigen Sie Ihren Grund für den Zugriff auf die Daten jedes Patienten, und alle Aktionen werden zu Compliance-Zwecken aufgezeichnet. Nach Abschluss können Daten für den Patienten normal abgerufen werden, ohne dass weitere Eingriffe erforderlich sind."
break_glass_field_descriptions_header = "Feldbeschreibungen"
break_glass_field_patients = "Patienten"
break_glass_field_patients_description = "Wählen Sie mindestens einen Patienten aus der Liste aus, auf dessen Daten Sie zugreifen müssen. Dies ist erforderlich, um den Break-the-Glass-Prozess zu starten."
break_glass_field_reason = "Grund"
break_glass_field_reason_description = "Wählen Sie einen der vordefinierten Gründe für den Zugriff auf geschützte Daten aus, wie vom EHR-System angegeben. Dies stellt die Einhaltung organisatorischer Richtlinien sicher."
break_glass_field_explanation = "Erklärung"
break_glass_field_explanation_description = "Geben Sie eine detaillierte Erklärung an, warum Sie auf die eingeschränkten Daten des Patienten zugreifen müssen. Dies hilft, die Rechtfertigung für Audit-Zwecke zu dokumentieren."
break_glass_field_user = "Benutzer"
break_glass_field_user_description = "Zeigt die EHR-Benutzer-ID an, die dem aktuellen REDCap-Benutzer zugeordnet ist. Dieser Wert wird nach einem erfolgreichen Launch aus dem EHR automatisch gesetzt und kann nicht geändert werden."
break_glass_field_user_type = "Benutzertyp"
break_glass_field_user_type_description = "Gibt den Typ der übergebenen Benutzer-ID an, z. B. Internal, External, Name, CID, SystemLogin, Alias oder Identity ID Types. Diese Information wird zu Verifizierungszwecken verwendet."
break_glass_field_password = "REDCap-Passwort"
break_glass_field_password_description = "Geben Sie Ihr REDCap-Passwort ein, um Ihre Absicht zu bestätigen, die Break-the-Glass-Aktion auszuführen. Diese zusätzliche Schutzmaßnahme stellt Sicherheit und Integrität des Prozesses sicher."
break_glass_submit_request_header = "So senden Sie eine Anfrage ab"
break_glass_submit_request_intro = "Bevor Sie einen Patienten für Break-the-Glass-Zugriff auswählen können, müssen Sie zuerst dessen BTG-Token abrufen."
break_glass_submit_request_step_1 = "Einzelnes Token abrufen:"
break_glass_submit_request_step_1_text = "Klicken Sie in der Zeile des Patienten auf die Schaltfläche <i class=\"fas fa-key text-primary\"></i>, um dessen Token abzurufen."
break_glass_submit_request_step_2 = "Alle Tokens abrufen:"
break_glass_submit_request_step_2_text = "Klicken Sie in der Werkzeugleiste oberhalb der Tabelle auf die Schaltfläche \"Alle Tokens abrufen\", um Tokens für alle Patienten gleichzeitig abzurufen."
break_glass_submit_request_step_3_text = "Sobald der Tokenstatus eines Patienten <span class=\"badge bg-success\"><i class=\"fas fa-check-circle\"></i> Token bereit</span> anzeigt, können Sie ihn über das Kontrollkästchen auswählen."
break_glass_submit_request_step_4_important = "Wichtig:"
break_glass_submit_request_step_4_text = "Abgerufene Tokens sind 10 Minuten gültig. Senden Sie Ihre Anfrage zeitnah nach dem Abrufen der Tokens ab."
break_glass_submit_request_step_5_text = "Nachdem Sie Patienten ausgewählt und die erforderlichen Informationen unten ausgefüllt haben, klicken Sie auf \"Break The Glass\", um Ihre Anfrage abzusenden."
