cdis_pm_share_info_heading = "Über REDCap SHARE"
cdis_pm_share_info_important_notes_label = "Wichtige Hinweise:"
cdis_pm_share_info_intro = "Mit REDCap SHARE können Teilnehmer eine Verbindung zu ihrem eigenen Portal für elektronische Patientenakten herstellen und REDCap autorisieren, Gesundheitsdaten für Forschungszwecke abzurufen. Es verwendet SMART on FHIR, sodass sich der Teilnehmer bei der Gesundheitsorganisation anmeldet und auswählt, ob Zugriff gewährt werden soll."
cdis_pm_share_info_intro_01 = "REDCap SHARE erlaubt Teilnehmern, ihr Portal für elektronische Patientenakten (EHR) mit REDCap zu verbinden und die sichere Weitergabe von Gesundheitsdaten für Forschungszwecke zu autorisieren. Es verwendet SMART-on-FHIR-Technologie, was bedeutet, dass Teilnehmer sich direkt über ihre Gesundheitsorganisation anmelden und auswählen, ob Zugriff erlaubt werden soll."
cdis_pm_share_info_participant_body = "Teilnehmer wählen ihre Gesundheitsorganisation aus, melden sich im Portal dieser Organisation an, prüfen die Autorisierungsanfrage und kehren nach Genehmigung oder Abbruch der Verbindung zu REDCap zurück."
cdis_pm_share_info_participant_heading = "Was Teilnehmer sehen"
cdis_pm_share_info_participant_heading_01 = "Was Teilnehmer erleben"
