mycap_mobile_app_1005 = "Alle Nachrichten"
mycap_mobile_app_1006 = "<b>CSV-Datei mit Nachrichten aller Teilnehmenden hier herunterladen:</b>"
mycap_mobile_app_1007 = "Frühjahr 2026"
mycap_mobile_app_1008 = "Bitte stellen Sie sicher, dass alle Teilnehmenden MyCap <b>v 2.6.4</b> verwenden, um die neuesten Sicherheitsverbesserungen zu erhalten. Ab dem <b>26. Juni 2026</b> können Teilnehmende, die nicht MyCap v2.6.4 verwenden, nicht mehr über die MyCap-App auf dieses Projekt zugreifen. <br><b>EMPFOHLEN:</b> Bitte erwägen Sie, so bald wie möglich über <b>Nachrichten > Ankündigungen</b> eine Ankündigung an alle Teilnehmenden zu senden und sie zu bitten zu prüfen, ob sie MyCap v2.6.4 oder eine neuere Version verwenden."
mycap_mobile_app_1009 = "Schwerwiegender Fehler"
mycap_mobile_app_1010 = "QR-Erzeugung ist nicht verfügbar, da die <b>GD Library (Version 2 oder höher) nicht installiert ist.</b> Bitte kontaktieren Sie den Administrator, damit geeignete Maßnahmen ergriffen werden."
mycap_mobile_app_1011 = "Die folgenden in Ihrer Logik aufgeführten Begriffe scheinen entweder illegale oder nicht erkannte Funktionen zu sein und werden daher in Ihrer Logik nicht erlaubt. Sie müssen aus der Logik entfernt werden, bevor Sie fortfahren können."
mycap_mobile_app_1012 = "Projekte mit von Mobile Toolbox (MTB) unterstützten PROMs"
mycap_mobile_app_1013 = "MyCap-Aufgaben, die aus MTB-unterstützten PROMs erstellt wurden"
mycap_mobile_app_1014 = "Von Mobile Toolbox (MTB) unterstützte PROMs beziehen sich auf PROMIS-Messungen, die über die Schaltfläche \"Aus REDCap-Bibliothek importieren\" unter \"Online Designer > Aktive Aufgaben importieren > Mobile Toolbox -PROMs\" hinzugefügt wurden. Diese Messungen sind speziell für die MyCap-Durchführung formatiert, was fortlaufende Durchführung ermöglicht und Offline-Datenerfassung unterstützt."

