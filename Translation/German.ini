design_723 = "Um Action Tags zu verwenden, wechseln Sie in einem Projekt zum Online Designer und fügen beim Hinzufügen oder Bearbeiten eines Feldes das Tag in das Textfeld Action Tag/Feldannotation im Pop-up Feld bearbeiten ein."
design_724 = "Action Tags sind eine hervorragende Möglichkeit, die Dateneingabeerfahrung für Fragebögen und Formulare anzupassen. Es sind spezielle Begriffe, die mit dem '@'-Zeichen beginnen und beim Hinzufügen oder Bearbeiten eines Feldes in die Feldannotation eines Feldes eingetragen werden können. Jedes Action Tag hat eine entsprechende Aktion, die für das Feld ausgeführt wird, wenn es auf Eingabeformularen und Fragebogenseiten angezeigt wird. Unten finden Sie eine umfassende Liste aller verfügbaren Action Tags, die Sie verwenden können. Sie können beliebig viele Tags für ein einzelnes Feld verwenden, aber wenn Sie mehr als ein Tag für ein Feld verwenden, achten Sie darauf, zwischen ihnen ein Leerzeichen oder einen Zeilenumbruch einzufügen. Da Action Tags als Teil der Feldannotation verwendet werden, werden sie nirgendwo auf der Seite angezeigt."
design_729 = "<b>WARNUNG: DOPPELTE CODIERUNGEN ENTFERNEN</b> - Einige Optionen haben doppelte Codierungen (Rohwerte), was typischerweise unerwünscht ist. Bitte prüfen Sie die Duplikate unten, da Sie die Codierung eines der Duplikate ändern sollten, damit jede Option eine eigene eindeutige Codierung hat. Wenn dieses Feld mit doppelten Codierungen gespeichert wird, wird nur das letzte Duplikat gespeichert und die anderen gehen verloren."
design_730 = "Änderungen am ENTWURF wurden erfolgreich vorgenommen!"
design_731 = "Branching Logic:"
design_732 = "Hinweis zum e-Consent Framework:"
design_733 = "Es scheint, dass Sie für die unten aufgeführten Fragebogeninstrumente eine e-Consent-Version verwenden, wobei diese Instrumente geändert wurden (d. h. Felder wurden hinzugefügt, gelöscht oder geändert). Da diese Instrumente geändert werden, wird DRINGEND empfohlen, die e-Consent-Version für diese Fragebögen unmittelbar nach Freigabe Ihrer eingereichten Änderungen zu ändern."
design_734 = "Geänderte Fragebögen mit e-Consent-Version:"
design_737 = "Überblick über REDCap-Feldvariablen und Feldnotation"
design_738 = "In REDCap haben alle Felder in Datenerfassungsinstrumenten einen zugehörigen 'Feldnamen' oder 'Variablennamen', der eindeutig ist. Der Variablenname eines Feldes kann im Online Designer oder im Data Dictionary definiert werden, wenn ein Feld im Projekt hinzugefügt/geändert wird. Der Variablenname kann an verschiedenen Stellen und in verschiedenen Funktionen in REDCap genutzt werden, z. B. in bedingter Logik, Berechnungen und Piping. REDCap-Variablennamen werden referenziert, indem eckige Klammern [ ] darum gesetzt werden - z. B. <b>[variable_name]</b>. Wenn das Projekt longitudinal ist, müssen Sie in bestimmten Kontexten zusätzlich den eindeutigen Eventnamen angeben, der ebenfalls in Klammern stehen und dem Variablennamen vorangestellt werden muss, um dieses Feld in einem bestimmten Event anzusprechen - z. B. <b>[event_2_arm_1][variable_name]</b>. Die Verwendung von Variablennamen in Klammern wird häufig als REDCap-Feldnotation bezeichnet."
design_739 = "Einführung in Smart Variables"
design_740 = "In der REDCap-Feldnotation verweisen Variablennamen immer auf Datenfelder im Projekt. Es gibt jedoch eine weitere Art von Entität namens 'Smart Variables', mit der Sie andere Informationen als Datenfelder referenzieren können. Smart Variables sind kontextsensitiv und passen sich daher an viele verschiedene Situationen an, in denen sie wissen können, wer der aktuelle Benutzer ist, welches Event gerade angezeigt wird, ob ein Instrument als Fragebogen oder Eingabeformular angezeigt wird usw. Auf diese Weise sind Smart Variables dynamisch (und damit 'smart'), weil sie sich an den aktuellen Kontext anpassen, in dem sie verwendet werden. Smart Variables sind leicht von Feldvariablennamen zu unterscheiden, weil Smart Variables Bindestriche und Doppelpunkte enthalten, während Feldvariablennamen dies nicht dürfen."
design_741 = "Wie und wo Feldnotation & Smart Variables verwendet werden"
design_742 = "Feldnotation (ob mit Verweis auf Variablennamen oder unter Verwendung von Smart Variables) kann an vielen Stellen in REDCap genutzt werden. Dadurch ist sie für verschiedene Zwecke sehr leistungsfähig. Unabhängig davon, wo sie verwendet wird, ist das Format von Variablennamen in Feldnotation immer gleich. Wenn eine Variable allein verwendet wird, lautet sie einfach [variable]. Wenn Sie diese Feldvariable für ein bestimmtes Event angeben möchten (bei longitudinalen Projekten), müssen Sie den eindeutigen Eventnamen voranstellen - z. B. [event][variable]. Wenn Sie auf eine bestimmte Wiederholungsinstanz des Feldes verweisen, hängen Sie die Nummer der Wiederholungsinstanz in Klammern an (nicht davor) - z. B. [variable][2], wobei das Format für wiederholte Instrumente und wiederholte Events gleich ist. Wenn Sie beispielsweise auf die zweite Instanz eines wiederholten Events verweisen, verwenden Sie das Format [event][variable][2]. Wenn Sie bestimmen möchten, ob eine bestimmte Option eines Checkbox-Feldes angekreuzt ist oder nicht, können Sie den Checkbox-Optionswert in Klammern einschließen, die dem Variablennamen in den eckigen Klammern folgen - z. B. [my_checkbox(4)]. Alle diese Komponenten können bei Bedarf zusammen verwendet werden, etwa wenn Sie Checkbox-Option 3 referenzieren möchten, die in der fünften Instanz eines wiederholten Instruments bei 'Event 1' existiert - z. B. [event_1_arm_1][my_checkbox(3)][5]."
design_743 = "Für sich allein - z. B. <i>[record-dag-name]</i>"
design_744 = "In Verbindung mit Feldvariablen - z. B. <i>[previous-event-name][weight_measurement]</i>"
design_745 = "In Verbindung mit anderen Smart Variables - z. B. <i>[previous-event-name][survey-url:prescreening_survey]</i>"
design_746 = "Smart Variables können verwendet werden..."
