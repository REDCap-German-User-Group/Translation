dash_107 = "Dieser Assistent hilft Ihnen beim Erstellen einer neuen Smart Function, Smart Table oder Smart Chart, die Sie anschließend in einem Project Dashboard verwenden können. Treffen Sie einfach in den untenstehenden Dropdown-Listen Ihre Auswahl dazu, welche Smart Variable Sie verwenden möchten, welche Felder darin verwendet werden sollen und welche weiteren optionalen Funktionen verfügbar sind. Nachdem Sie Ihre Auswahl getroffen haben, können Sie unten auf die Schaltfläche 'In Zwischenablage kopieren' klicken und den erzeugten Text anschließend in den Inhalt Ihres Project Dashboards einfügen."
