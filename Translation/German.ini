pmt_93 = "Quell-Abschlussaktion"
pmt_94 = "Datei-Repository-Ordner (und Seeding von Dateien)"
pmt_95 = "Quell-REDCap-Version"
pmt_96 = "Von dieser REDCap-Instanz weg migrierte Projekte"
pmt_97 = "(HINWEIS: Sie müssen Datenexportberechtigungen für ein oder mehrere Instrumente haben, um deren Daten zu migrieren.)"
pmt_98 = "(HINWEIS: Sie haben keine Full-Data-Set-Exportberechtigungen für alle Instrumente im Projekt. Daher können nur EINIGE der Instrumente migriert werden. Wenn Ihnen jemand Full-Data-Set-Exportberechtigungen für alle Instrumente erteilt, können Sie alle Datensätze/Instrumente migrieren.)"
pmt_99 = "*Bitte beachten Sie: MyCap-App-Konfigurationseinstellungen können zwar migriert werden (wenn ausgewählt), aber Teilnehmer, die dem Projekt bereits in der MyCap-App auf ihrem Mobilgerät beigetreten sind, müssen dem Projekt nach der Migration in ihrer App erneut beitreten."

moveprojectdata_1 = "Daten eines Projekts in eine andere redcap_dataX-Tabelle verschieben"
moveprojectdata_2 = "Diese Seite ermöglicht Administratoren, die in einem bestimmten REDCap-Projekt gespeicherten Daten in eine andere redcap_dataX-Tabelle in der Datenbank zu verschieben, um die allgemeine Performance des Projekts zu verbessern. Die Performanceverbesserung hängt stark von Größe und Struktur des Projekts ab und außerdem von vielen Faktoren im Gesamtsystem, z. B. der aktuellen Größe der Tabelle redcap_data und der Leistungsfähigkeit des Datenbankservers. Hinweis: Dieser Prozess führt mehrere Prüfungen durch, um sicherzustellen, dass alle Daten erfolgreich verschoben werden. Wenn etwas schiefgeht, werden alle Änderungen automatisch zurückgerollt."
moveprojectdata_3 = "Geben Sie die PID eines Projekts ein, um dessen Daten aus der Tabelle <code>redcap_data</code> in eine andere Datenbanktabelle zu verschieben:"
moveprojectdata_4 = "Zurück zum Projekt"
moveprojectdata_5 = "FEHLER: Dieses Projekt (PID {0}) existiert nicht. Versuchen Sie eine andere PID."
moveprojectdata_6 = "FEHLER: Dieses Projekt (PID {0}) wurde bereits verschoben (oder wurde bereits mit einer anderen Datentabelle erstellt)."
moveprojectdata_7 = "WARNUNG: Dieses Projekt (PID {0}) befindet sich derzeit im ONLINE-Modus und könnte daher möglicherweise gerade von Benutzern verwendet werden. Es wird dringend empfohlen, zur Seite {1:LinkStart}Projekteinstellungen bearbeiten{2:LinkEnd} zu gehen und das Projekt auf OFFLINE zu setzen, bevor Sie unten fortfahren. Dadurch wird sichergestellt, dass dieser Prozess keine Probleme mit den Projektdaten verursacht. Nachdem Sie die Projektdaten verschoben haben, setzen Sie das Projekt unbedingt wieder in den ONLINE-Modus zurück. Alternativ können Sie unten das Kontrollkästchen aktivieren, um es automatisch wieder ONLINE zu setzen."
moveprojectdata_8 = "ERFOLG: Die Daten dieses Projekts (PID {0}) wurden erfolgreich nach <code>{1}</code> verschoben."
moveprojectdata_9 = "Setzen Sie das Projekt unbedingt wieder in den ONLINE-Modus zurück."
moveprojectdata_10 = "UNBEKANNTER FEHLER: Beim Verschieben der Daten ist etwas schiefgelaufen. Die Projektdaten sind weiterhin in <code>redcap_data</code> gespeichert"
moveprojectdata_11 = "Projekt nach Abschluss automatisch wieder auf \"Online\" setzen?"
moveprojectdata_12 = "SQL, das zum Verschieben der Projektdaten ausgeführt wird:"
moveprojectdata_13 = "Sie können das untenstehende SQL manuell mit einem MySQL-Client ausführen ODER auf den blauen Button klicken, damit REDCap dies ausführt. Dieses SQL manuell ausführen:"
moveprojectdata_14 = "SQL committen"
moveprojectdata_15 = "FEHLER: Die Projekt-PID ist nicht gültig."

