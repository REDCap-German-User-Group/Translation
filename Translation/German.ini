design_482 = "Codebook"
design_483 = "Das Codebook ist eine menschenlesbare, schreibgeschützte Version des Data Dictionary des Projekts und dient als Schnellreferenz zum Anzeigen der Attribute eines bestimmten Feldes im Projekt, ohne das Data Dictionary herunterladen und interpretieren zu müssen. Hinweis: Bei Checkbox-Feldern werden die codierten Werte sowohl in dem Format angezeigt, das Benutzer im Online Designer/Data Dictionary definiert haben, als auch im erweiterten Format, das in Datenimporten und -exporten verwendet wird (d. h. field___code)."
