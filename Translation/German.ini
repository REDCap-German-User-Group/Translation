mycapui_general_030 = "Eigentum"
mycapui_general_031 = "Sie als Benutzer geben Daten in ein Mobilgerät ein. Solange sich die Daten auf dem Mobilgerät befinden, gehören Ihnen alle Daten, die Sie erstellt oder geändert haben. Ihre Daten werden an den Server des Projekts gesendet. Wenn Daten an den Server gesendet werden, gehören die Daten dem Projektadministrator. Alle vom Server abgerufenen Nicht-Benutzerdaten, z. B. Konfigurationsinformationen, gehören dem Projektadministrator."
mycapui_general_032 = "Datenschutz"
mycapui_general_033 = "Ihre Daten werden vertraulich behandelt. Es werden alle Anstrengungen unternommen, um die Daten vor Abfangen von außen zu schützen. Daten werden über eine SSL-Verbindung an den MyCap-Server gesendet, von dem das Projekt stammt."
mycapui_general_034 = "Speicherung"
mycapui_general_035 = "Die Projektkonfiguration und (optional) einige Benutzerdaten werden über eine SSL-Verbindung von einem MyCap-Server heruntergeladen. Die Konfiguration und alle Daten werden in einer oder mehreren verschlüsselten Datenbanken auf dem Mobilgerät gespeichert. Wenn ein Benutzer an mehreren Projekten teilnimmt, gibt es mehrere verschlüsselte Datenbanken. Jedes Projekt hat eine getrennte Datenbank."
mycapui_general_036 = "Zuordnung von Software und Daten"
mycapui_general_037 = "Der übergeordnete MyCap-Server hostet das Projekt und die endgültige Kopie der Daten. Dieser befindet sich bei der Host-Institution/-Organisation, die das MyCap-REDCap-Modul betreibt."
mycapui_general_038 = "Das Mobilgerät hostet die Projektkonfiguration und etwaige temporäre Studiendaten. Die Daten werden erst verbindlich, wenn sie an den MyCap-Server gesendet wurden."
mycapui_general_039 = "Endbenutzer-Lizenzbedingungen für MyCap"
mycapui_general_040 = "Endbenutzer erklären sich durch das Herunterladen und/oder Verwenden von MyCap zusätzlich zur von Apple, Inc. bereitgestellten Licensed Application End User License Agreement mit den folgenden Bedingungen einverstanden."
mycapui_general_041 = "Definitionen"
mycapui_general_042 = "HIPAA: bezeichnet das US-amerikanische Gesetz Health Insurance Portability and Accountability Act von 1996, kodifiziert in 42 U.S.C. §1320d, sowie weiter im Health Information Technology Act von 2009, kodifiziert in 42 U.S.C.A. prec. § 17901 (\"HITECH Act\")"
mycapui_general_043 = "Geschützte personenbezogene Informationen: bezeichnet personenbezogene, private oder Gesundheitsinformationen, die durch Gesetze wie HIPAA, die Europäische Datenschutzrichtlinie und/oder andere anwendbare Gesetze, Regeln und Vorschriften einer Rechtsordnung, denen das Herunterladen und/oder Verwenden von MyCap unterliegen kann, vor Offenlegung geschützt sind."
mycapui_general_044 = "Zusätzliche Nutzungsbedingungen"
mycapui_general_045 = "Sie als Endbenutzer stimmen zu, dass alle Informationen, die auf einem Gerät mit MyCap gespeichert sind, geschützte personenbezogene Informationen sein können, und sichern hiermit zu, solche Informationen keiner Person offenzulegen, außer soweit dies nach den anwendbaren Gesetzen, Regeln und Vorschriften der Rechtsordnung erlaubt oder erforderlich ist, denen Ihr Herunterladen und/oder Verwenden von MyCap unterliegt. In keinem Fall darf der Schutz solcher Informationen mit einem geringeren Sorgfaltsstandard erfolgen, als zur Einhaltung von HIPAA erforderlich wäre. Sie stimmen zu, rechtlichen Rat von einem zugelassenen Rechtsberater einzuholen, um sich über alle anwendbaren Gesetze, Vorschriften oder Regelungen zu informieren, die für Ihre Nutzung von MyCap gelten."
mycapui_general_046 = "Sie als Endbenutzer stellen Vanderbilt University sowie ihre Direktoren, leitenden Angestellten, Mitarbeiter und Studierenden (die \"Freigestellten\") von jeglicher Haftung, Verpflichtung, jedem Schaden, Verlust, nachteiligen Einfluss oder Aufwand (einschließlich angemessener Anwaltsgebühren und Prozesskosten) frei, verteidigen sie und halten sie schadlos, soweit diese den Freigestellten oder einem von ihnen aus Ihrer Nutzung von MyCap entstehen oder auferlegt werden oder damit zusammenhängen, einschließlich, aber nicht beschränkt auf Ansprüche nach HIPAA oder anderen anwendbaren Gesetzen, Regeln und Vorschriften einer Rechtsordnung, denen solche personenbezogenen Informationen durch Ihr Herunterladen und/oder Verwenden von MyCap unterliegen können."
mycapui_general_047 = "Durch das Herunterladen und/oder Verwenden von MyCap erklären Sie als Endbenutzer hiermit: (a) Sie unterwerfen sich unwiderruflich der ausschließlichen Zuständigkeit des United States District Court for the Middle District of Tennessee oder eines lokalen Gerichts in Davidson County, Tennessee (zusammen die \"Gerichte\") für Zwecke jeder Klage, jedes Verfahrens oder sonstigen Rechtsstreits im Zusammenhang mit oder aus dieser Vereinbarung, und (b) Sie stimmen zu, zu keiner Zeit Einwände gegen den Gerichtsstand eines solchen Verfahrens bei einem dieser Gerichte zu erheben oder aufrechtzuerhalten, verzichten unwiderruflich auf jeden Anspruch, dass ein solches Verfahren in einem ungeeigneten Forum eingeleitet wurde, und verzichten ferner unwiderruflich auf das Recht, hinsichtlich eines solchen Verfahrens einzuwenden, dass ein solches Gericht keine Zuständigkeit über eine solche Partei habe."
mycapui_general_048 = "Sollten die Bedingungen dieses Hinweises zur erlaubten Nutzung und der zusätzlichen Endbenutzer-Lizenzbedingungen für Benutzer, die MyCap herunterladen (die \"MyCap-Vereinbarung\"), mit Bedingungen der von Apple, Inc. bereitgestellten Licensed Application End User License Agreement in Konflikt stehen, gelten die Bedingungen dieser MyCap-Vereinbarung."
mycapui_general_049 = "Problem aufgetreten? Tippen Sie hier, um"
