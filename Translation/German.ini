messaging_133 = "Sie können eine Unterhaltung mit einem REDCap-Project verknüpfen, wenn sich die Unterhaltung um ein einzelnes Project und dessen Datenerhebung dreht. Das Verknüpfen eines Projects ist eine gute Möglichkeit, einen zentralen Kommunikationskanal für das Project festzulegen. Außerdem bietet Ihnen die Project-Verknüpfung den zusätzlichen Vorteil, Sie daran zu erinnern, Benutzer aus einer Unterhaltung zu entfernen, wenn ein Benutzer aus dem Project entfernt wird, mit dem sie verknüpft ist. Dadurch wird verhindert, dass Benutzer sensible Daten in Unterhaltungen sehen, sobald sie nicht mehr mit Ihrem Project verbunden sind."
