access_control_groups_37 = "Konformitäts-Alarm-Logs"
access_control_groups_38 = "Diese Seite kann von Administratoren verwendet werden, um festzustellen und Maßnahmen zu ergreifen, wenn Benutzer in diesem Projekt derzeit Benutzerrechte haben, die nicht mit ihrer zugewiesenen Access Control Group (ACG) konform sind. Solche Situationen treten hauptsächlich auf, 1) wenn die ACG-Funktion aktiviert wird, während ein Projekt bereits Benutzer hat, oder 2) wenn die ACG-Zuweisung eines Benutzers geändert wurde. Verwenden Sie die Umschalter und Filter unten, um bestimmte Benutzer in diesem Projekt auszuwählen, die Sie ablaufen lassen oder denen Sie eine Konformitäts-Alarm-E-Mail senden möchten. Die E-Mail kann an Benutzerrechte-Manager in diesem Projekt gesendet werden, um sie über Benutzer außerhalb der Konformität zu informieren, oder sie kann an die nicht konformen Benutzer selbst gesendet werden."
