data_export_tool_309 = "<b>WICHTIG:</b> In diesem Projekt gibt es einige sonstige Dateianhänge, deren Download-Link in Teilen dieses Projekts <b>*hart codiert sein könnte*</b>, z. B. im Text von Feldbezeichnungen, Projekt-Dashboards, Fragebogeneinladungen usw. Wenn dies zutrifft und eine Kopie dieses Projekts erstellt wird, bleiben diese Download-Links im neuen Projekt weiterhin mit den Dateien im alten Projekt verknüpft und zeigen auf diese. Bitte prüfen Sie die Dateien unten (Sie könnten diese Informationen kopieren und einfügen, um sie später aufzubewahren). Nachdem Sie ein neues Projekt erstellt haben, <b>wird empfohlen, diese Links im neuen Projekt durch dieselbe Datei zu ersetzen, indem Sie die Upload-Option für Dateianhänge im Rich-Text-Editor verwenden</b>. Der erneute Upload-Prozess verknüpft die neu hochgeladenen Dateien mit dem neuen Projekt. Um fortzufahren, klicken Sie unten auf den Button \"Ich bestätige dies\"."
