dataqueries_258 = "Seite in diesem Projekt."
dataqueries_259 = "Keine"
dataqueries_260 = "Der Data Resolution Workflow wurde jetzt aktiviert!"
dataqueries_261 = "Bitte lesen Sie die untenstehenden Anweisungen zu Ihren nächsten Schritten oder sehen Sie sich das Video an."
dataqueries_262 = "Benutzerrechte festlegen"
dataqueries_263 = "Bevor die Benutzer in Ihrem Projekt den Data Resolution Workflow nutzen können, müssen ihnen zuerst entsprechende Benutzerrechte erteilt werden. Diese Benutzerrechte bestimmen, was sie innerhalb des Data Resolution Workflow tun dürfen. Navigieren Sie zur Seite Benutzerrechte; dort sehen Sie einen neuen Abschnitt mit Rechten speziell für den Data Resolution Workflow. Sie können jedem Benutzer eines der folgenden Rechte geben: kein Zugriff, nur anzeigen, nur antworten und Abfragen öffnen/schließen/beantworten. Alle Benutzer haben zunächst das Recht 'kein Zugriff'."
dataqueries_264 = "Datenabfragen öffnen"
dataqueries_265 = "Seite Probleme lösen verwenden"
dataqueries_266 = "Eine offene Datenabfrage bedeutet, dass es ein Problem mit einem Datenwert gibt, das gelöst werden muss. Das Öffnen der Abfrage startet den Prozess zur Untersuchung und Lösung des Problems (d. h. zum Schließen der Abfrage). Der typischste Ort zum Öffnen einer Datenabfrage ist ein Feld auf einem Eingabeformular. Klicken Sie auf dem Formular auf die graue Sprechblase neben dem Feld; dadurch wird das Pop-up des Data Resolution Workflow geöffnet. Dort können Sie eine neue Abfrage öffnen, sofern Sie entsprechende Benutzerrechte haben, und einen beschreibenden Kommentar hinterlassen sowie diese bestimmte Datenabfrage optional einem anderen Benutzer zuweisen. Statt eine Abfrage zu öffnen, können Sie alternativ den Datenwert des Feldes verifizieren, wodurch gekennzeichnet wird, dass der Datenwert als korrekt zertifiziert wurde. HINWEIS: Wenn ein verifizierter Datenwert jemals geändert wird, wird er automatisch deverifiziert und kann danach bei Bedarf erneut verifiziert werden."
dataqueries_267 = "Auf Datenabfragen antworten und sie schließen"
dataqueries_268 = "Jeder Benutzer mit 'Antworten'-Rechten kann auf eine offene Abfrage antworten (auch wenn sie einem bestimmten Benutzer zugewiesen ist). Der Antwortende kann einen Antworttyp auswählen (z. B. Tippfehler) und einen beschreibenden Kommentar angeben; optional kann auch eine Datei angehängt werden. Nachdem auf eine Abfrage geantwortet wurde, kann ein Benutzer mit 'Schließen'-Rechten die Abfrage schließen; danach gilt sie als gelöst."
dataqueries_269 = "Während Datenabfragen entweder auf einem Eingabeformular oder über die Ergebnisse einer Datenqualitätsregel geöffnet werden, werden Benutzer Abfragen höchstwahrscheinlich auf der Seite 'Probleme lösen' (im linken Menü sichtbar) beantworten und schließen. Diese Seite dient als Dashboard, das alle Abfragen (offen und geschlossen) übersichtlich organisiert, damit sie geprüft werden können und offene Abfragen leicht beantwortet und geschlossen werden können. Die Seite kann als praktische To-do-Liste zur Bearbeitung aller offenen Abfragen dienen."
dataqueries_270 = "Lösungskennzahlen anzeigen"
dataqueries_271 = "Es kann manchmal nützlich sein, Kennzahlen zu Ihren Datenabfragen anzuzeigen, z. B. wie viele Abfragen offen oder geschlossen sind, die durchschnittliche Zeit, bis Benutzer auf eine offene Abfrage antworten, oder die durchschnittliche Zeit bis zur Lösung einer Abfrage. Die Seite 'Lösungskennzahlen' bietet einige nützliche Statistiken und hilfreiche Balkendiagramme zur Anzeige von Fortschritt und Aktivität. Wenn Ihr Projekt Zugriffsgruppen verwendet, bietet sie noch weitere nützliche Diagramme, um den Fortschritt der verschiedenen Gruppen zu vergleichen und deren Aktivität zu stratifizieren."
dataqueries_272 = "Datenabfragen können auch auf der Datenqualitätsseite geöffnet werden, wenn die Ergebnisse einer ausgeführten Datenqualitätsregel angezeigt werden; dabei erscheint neben jedem Ergebnis im Pop-up ein Button zum Öffnen des Data Resolution Workflow. Wenn der Status einer Datenabfrage entweder 'Geschlossen' oder 'Daten verifiziert' ist, wird sie in den Ergebnissen der Datenqualitätsdiskrepanzen zunächst nicht mehr sichtbar angezeigt, sondern gilt als ausgeschlossen (da sie als gelöst betrachtet wird). Ausgeschlossene Ergebnisse können jederzeit sichtbar gemacht werden, indem im Pop-up der Datenqualitätsergebnisse auf den Link 'anzeigen' geklickt wird."
dataqueries_273 = "Für einen kurzen Überblick sehen Sie sich das Video zum Data Resolution Workflow an."
