multilang_815 = "Auf dieser Seite können Sie mehrere Anzeigesprachen für Ihr Projekt erstellen und konfigurieren (für Fragebögen, Eingabeformulare, Alarme, Umfrageeinladungen usw.) oder alternativ Übersetzungen mithilfe einer Datei exportieren und importieren. Vergessen Sie nicht, Ihre Änderungen jederzeit auf dieser Seite zu <b>speichern</b> (Tastenkürzel: <span class='badge badge-secondary shortcut fs11' data-bs-toggle='tooltip' title='On Mac, use CMD-S'>CTRL-S</span>), wenn Sie mit der Bearbeitung fertig sind. HINWEIS: <u>Diese Seite übersetzt Ihren Text nicht automatisch für Sie</u>, es sei denn, Sie klicken auf den Button AI Auto-translate. Bitte beachten Sie, dass KI-generierte Übersetzungen nicht von Übersetzungsspezialisten zertifiziert sind und auf Genauigkeit geprüft werden sollten."
multilang_815 = "Browserbasierte Übersetzung von Fragebogenseiten entmutigen"
multilang_816 = "Wenn diese Option aktiviert ist, fügt REDCap Fragebogenseiten Markierungen \"nicht übersetzen\" hinzu, um browserbasierte Übersetzung zu entmutigen. Browser und Übersetzungstools können diese Markierungen berücksichtigen oder auch nicht, daher kann Übersetzung nicht zuverlässig verhindert werden. <b>Mit Vorsicht verwenden.</b>"
multilang_817 = "Übersetzungsanweisungen: Füllen oder aktualisieren Sie nur die \"translation\"-Werte mit natürlichem Text für die Sprache, die durch die root-Felder \"key\" und \"display\" identifiziert wird. Verwenden Sie den benachbarten \"default\"-Wert als Ausgangstext und den optionalen \"prompt\"-Wert als Kontext. Bewahren Sie die JSON-Struktur und REDCap-spezifische Syntax unverändert, einschließlich HTML-Tags und -Attribute, Rich-Text-Wrapper, Feld-Piping wie [field], Smart Variables, Action Tags, Feldeinbettungen, Platzhalter wie {field}, Zeilenumbrüche, anzeigerelevante Leerzeichen und alle durch \"valid-translation-values\" eingeschränkten Codes. Übersetzen Sie keine ids, hashes, paths, field names oder import metadata. Teilmengen dieser Datei können importiert werden, solange sie gültiges JSON bleiben; nicht passende Pfade oder ids werden von REDCap beim Import ignoriert."

