system_config_815 = "Geben Sie den GUID-Wert Ihres Tenants an, wenn Sie nicht 'common' verwenden. Wenn leer gelassen, wird 'common' verwendet. Gilt für Endpoint V1 und V2."
system_config_817 = "Azure Communication Services - E-Mail-Konfiguration"
system_config_818 = "Beim Senden ausgehender E-Mails kann REDCap die Azure-Communication-Services-API als Alternative zu den Standardmethoden des REDCap-Webservers verwenden, die E-Mails senden. Sie müssen zuerst ein Konto auf der Microsoft/Azure-Website einrichten"
system_config_819 = ", wodurch Sie Zugriff auf einen Email API Key erhalten, der mit Ihrem Azure-Konto verbunden ist. HINWEIS: Sie müssen dort ein Konto erstellen und das API-Token erzeugen, um es hier in REDCap zu verwenden. Befolgen Sie alle Anweisungen auf der Microsoft/Azure-Website zum Erhalten und Verwenden des API-Tokens."
system_config_820 = "Azure Communication Services API Key"
system_config_821 = "Azure Communication Services Endpoint"
system_config_822 = "<u>Einschränkungen bei Azure Communication Services:</u> Aufgrund von Einschränkungen in der Implementierung dieser API durch Microsoft/Azure kann diese E-Mail-Sendemethode keine Inline-Bilder im Body von E-Mails anzeigen; stattdessen werden Inline-Bilder als reguläre Anhänge dargestellt. Außerdem können die tatsächliche E-Mail-Adresse und der Anzeigename des Absenders dem Empfänger in seinem E-Mail-Client nicht angezeigt werden; der Empfänger sieht daher nur die REDCap Universal 'From' Address als Absender ohne entsprechenden Anzeigenamen."
system_config_826 = "Diese Einstellung überschreibt die Standardeinstellung für neue Benutzer (siehe Benutzereinstellungen), die auf 'Nein' gesetzt sein sollte, wenn Sie <em>nur</em> lokalen Benutzern erlauben möchten, Projekte zu erstellen/kopieren."
