multilang_602 = "Diese Einstellung bestimmt, welche Sprache anfänglich angezeigt wird, wenn ein Benutzer eine mehrsprachige Nicht-Projektseite zum ersten Mal besucht (d. h. wenn keine Informationen zur bevorzugten Sprache aus einem Browser-Cookie verfügbar sind). Dies muss eine der <i>aktiven</i> Sprachen sein."
multilang_603 = "Dies muss auf die Sprache gesetzt werden, die der <i>Language.ini</i>-Datei entspricht, die für diese REDCap-Instanz in <i>Allgemeine Konfiguration</i> gesetzt ist. Diese Sprache muss nicht aktiv sein."
