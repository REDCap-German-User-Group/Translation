survey_1104 = "Wenn der Befragte die Umfrage nach Ablauf dieser Zeit lädt, darf er die Umfrage nicht beginnen oder fortsetzen. (Wenn alle Felder leer gelassen werden, wird das Zeitlimit nicht erzwungen.)"
survey_1105 = "Vielen Dank für Ihr Interesse; das Zeitlimit für den Abschluss der Umfrage wurde jedoch erreicht, daher können Sie die Umfrage nicht beginnen oder fortsetzen."
