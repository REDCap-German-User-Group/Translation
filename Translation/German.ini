design_688 = "Snapshot der Instrumente erstellen"
design_689 = "Ein Snapshot Ihres aktuellen Data Dictionary (CSV-Datei aller Felder und Instrumente) kann gespeichert und abgelegt werden, indem Sie auf dieser Seite einfach auf den Button 'Snapshot der Instrumente erstellen' klicken. Alle Snapshots können jederzeit auf der Seite Projekt-Revisionshistorie aufgerufen und heruntergeladen werden. Es gibt keine Begrenzung dafür, wie viele Snapshots erstellt werden können. Ein Snapshot kann nützlich sein, um bei Bedarf alle Felder auf einen bestimmten Zeitpunkt zurückzusetzen, indem Sie den Snapshot von der Revisionshistorie-Seite nehmen und auf der Data-Dictionary-Upload-Seite hochladen. Zusätzlich wird immer dann, wenn Data Dictionaries in das Projekt hochgeladen werden (auch über API-Metadatenimport), vor dem Übernehmen des neuen Data Dictionary ein Snapshot des aktuellen Data Dictionary erstellt. Dadurch können Sie beruhigt sein, dass Ihre Felder/Formulare automatisch erhalten bleiben, selbst wenn ein Versehen passiert (z. B. falsches Data Dictionary hochgeladen)."
