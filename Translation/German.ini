locking_02 = "Dieses Modul kann verwendet werden, um die Option zur Datensatzsperrung und die E-Signatur-Option für Datenerhebungsinstrumente anzupassen. Die folgenden Einstellungen sind vollständig optional. Nur Benutzer mit der Berechtigung zum Sperren/Entsperren können auf diese Seite zugreifen, und nur sie können Datensätze für ein bestimmtes Formular sperren und entsperren. Wenn sie über die zusätzliche Berechtigung verfügen, können sie für einen beliebigen Datensatz alle Formulare auf einmal sperren. Standardmäßig können alle Benutzer mit Sperren/Entsperren-Berechtigungen die Sperroption am unteren Rand des Datenerhebungsinstruments sehen, andere Benutzer sehen diese Option jedoch nicht. Sobald ein Formular für einen Datensatz gesperrt ist, zeigt das Formular (für alle Benutzer) an, wann es gesperrt wurde und welcher Benutzer es gesperrt hat. Alle Felder im Formular sind deaktiviert/schreibgeschützt, bis jemand mit Sperren/Entsperren-Berechtigungen das Formular entsperrt."
;; locking_03 is concatenated with locking_04, global_47, locking_06, and locking_07.
locking_03 = "Unten können Sie festlegen, dass die Option zur Datensatzsperrung"
;; locking_04 is concatenated with locking_03, global_47, locking_06, and locking_07.
locking_04 = "angezeigt wird"
;; locking_06 is concatenated with locking_03, global_47, locking_04, and locking_07.
locking_06 = "nicht angezeigt wird"
;; locking_07 is concatenated with locking_03, locking_04, global_47, and locking_06.
locking_07 = "für ein beliebiges Formular, indem Sie die Kontrollkästchen ganz links aktivieren/deaktivieren. Standardmäßig wird die Option zur Datensatzsperrung für alle Formulare für Personen mit den entsprechenden Rechten angezeigt. Sie können bei Bedarf auch einen benutzerdefinierten Text angeben, der für die Sperroption angezeigt wird, indem Sie ihn in das Textfeld eingeben und auf 'Speichern' klicken. Wenn Sie die Anzeige der Sperroption aktiviert, aber keinen benutzerdefinierten Text festgelegt haben, wird standardmäßig der folgende Text angezeigt:"
locking_08 = "Diesen Datensatz für dieses Formular sperren? Wenn er gesperrt ist, kann kein Benutzer diesen Datensatz in diesem Formular bearbeiten, bis jemand mit Sperren/Entsperren-Berechtigungen ihn entsperrt."
;; locking_09 is concatenated with icon markup, locking_10, more icon markup, and locking_11.
locking_09 = "Wenn ein benutzerdefinierter Text festgelegt wurde, kann er bearbeitet werden"
;; locking_10 is concatenated with locking_09, icon markup, and locking_11.
locking_10 = "oder entfernt werden"
;; locking_11 is concatenated after locking_09, locking_10, and icon markup.
locking_11 = "jederzeit durch Klicken auf die Symbole auf der rechten Seite. Wenn auf dieser Seite gegenüber den ursprünglichen Einstellungen nichts geändert wird, wird die Sperroption für alle Formulare für jeden Benutzer mit Sperren/Entsperren-Berechtigungen angezeigt und zeigt den oben aufgeführten Standardtext an."
