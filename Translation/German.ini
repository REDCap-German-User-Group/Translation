email_users_87 = "Bevor Sie diese Seite anzeigen und darauf zugreifen, müssen Sie zuerst bestätigen, dass Sie die folgenden wichtigen Informationen und Bedingungen verstehen. Diese Seite ist nur für Benutzer zugänglich, die in diesem Projekt Benutzerrechte-Berechtigungen haben. Die E-Mail-Logging-Funktion ermöglicht Benutzern das Suchen und Anzeigen *aller* ausgehenden E-Mails zu diesem Projekt. Dazu gehört die Möglichkeit, alle Aspekte einer bestimmten E-Mail anzuzeigen (d. h. Empfänger, Absender, Betreff, Nachrichtentext, Namen von Anhängen)."
email_users_88 = "Ich verstehe und stimme zu"
email_users_89 = "Wenn Sie in diesem Projekt anonyme Fragebögen verwenden, beachten Sie bitte, dass das Anzeigen dieser Seite und der dort angezeigten E-Mails <u>versehentlich dazu führen kann, dass anonyme Fragebogenantworten identifizierbar/de-anonymisiert werden</u>. Wenn das Projekt Zugriffsgruppen verwendet, können Sie außerdem <u>die E-Mails zu allen DAGs in diesem Projekt anzeigen</u> (und damit möglicherweise alle Daten, die in den Text dieser E-Mails gepiped wurden). Wenn Sie diese Bedingungen verstehen und ihnen zustimmen, klicken Sie auf den Button unten. <u>Bitte beachten Sie, dass die Zustimmung zu diesem Haftungsausschluss auf der Logging-Seite des Projekts dokumentiert wird.</u>"
email_users_90 = "Bitte beachten Sie, dass die Suchergebnisse auf dieser Seite für dieses Projekt möglicherweise nicht vollständig sind, weil das Projekt erstellt wurde, bevor die E-Mail-Logging-Funktion aktiviert wurde, nämlich am"
