data_entry_470 = "Es scheint, dass Sie in diesem Projekt sowohl das Randomisierungsmodul ALS AUCH das Modul Doppelte Dateneingabe verwenden. Bitte beachten Sie, dass diese beiden Module nicht miteinander kompatibel sind. Es wird daher empfohlen, nur eines von beiden zu verwenden, nicht beide. Die gemeinsame Verwendung kann dazu führen, dass Daten nicht korrekt gespeichert werden."
