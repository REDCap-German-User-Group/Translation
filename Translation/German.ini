survey_1057 = "Unten sind alle gespeicherten Umfragedesigns aufgeführt, die Sie erstellt haben. Sie können jedes davon umbenennen oder löschen, indem Sie auf die Symbole rechts klicken. Hinweis: Wenn Sie ein Design löschen, das derzeit von einer Umfrage verwendet wird, wird diese Umfrage auf das Standard-Umfragedesign zurückgesetzt."
