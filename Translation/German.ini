survey_240 = "Kopieren Sie das HTML im Textfeld unten, um es in den HTML-Code einer beliebigen Webseite einzufügen. Es wird auf dieser Webseite als Link angezeigt, sodass jeder einfach auf den Link klicken kann, um mit Ihrer Umfrage zu beginnen."
survey_243 = "Beim Klicken auf das Symbol 'Geantwortet' können Sie nur Antworten anzeigen, für die eine Teilnehmerkennung definiert ist. Daher können Sie die Antwort dieses Teilnehmers durch Klicken auf dieses Symbol <u>nicht</u> anzeigen. Dies geschieht, um diese Antwort anonym zu halten."
