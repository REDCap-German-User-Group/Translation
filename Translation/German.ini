design_1209 = "Auswahl ändern:"
design_1210 = "Mit den Buttons in der oberen Zeile wählen Sie die Richtung, in die die Auswahl relativ zum aktuell ausgewählten Feld erweitert werden soll. Die Optionen umfassen: Beide Richtungen (Standardverhalten), nach oben oder nach unten; außerdem können Sie alle Felder zwischen dem ersten und letzten ausgewählten Feld oder vom aktuellen Feld aus nach oben bzw. unten bis zum nächsten ausgewählten Feld darüber oder darunter auswählen.<br><br>Mit den Einschließen-/Ausschließen-Buttons können Sie die Auswahl auf bestimmte Feldtypen beschränken, z. B. Textfelder mit E-Mail-Validierung. Wählen Sie eine beliebige Kombination, die Ihrem Bedarf entspricht. Verwenden Sie die Buttons am Anfang der Zeilen, um die Einschluss-/Ausschlusskriterien zurückzusetzen.<br><br>Klicken Sie abschließend auf den Button 'Hinzufügen', um die Auswahl um die ausgewählten Felder zu erweitern, oder auf den Button 'Ersetzen', um die aktuelle Auswahl durch Felder zu ersetzen, die den festgelegten Kriterien entsprechen."
design_1211 = "Als Pflicht markierte Felder"
design_1212 = "Als Identifikatoren markierte Felder"
design_1213 = "Felder, die den festgelegten Kriterien entsprechen, zu den bereits ausgewählten Feldern hinzufügen."
design_1214 = "Bereits ausgewählte Felder durch Felder ersetzen, die den festgelegten Kriterien entsprechen."
design_1215 = "Auf dieser Seite können Sie Ihre Datenerfassungsinstrumente Feld für Feld erstellen und anpassen. Sie können neue Felder hinzufügen oder bestehende bearbeiten. Neue Felder können durch Klicken auf die Buttons Feld hinzufügen hinzugefügt werden. Sie beginnen mit der Bearbeitung eines bestehenden Feldes, indem Sie auf das Symbol <b style='white-space:nowrap'>{0:Icon} Bearbeiten</b> klicken. Wenn Sie ein Feld nicht behalten möchten, können Sie es einfach löschen, indem Sie auf das Symbol <b style='white-space:nowrap'>{1:Icon} Löschen</b> klicken. Um Felder neu zu ordnen, verwenden Sie einfach das <span style='white-space:nowrap'>{2:Icon} Symbol</span>, um ein Feld per <b>Drag-and-drop</b> an eine andere Position im Formular unten zu ziehen (Sie können auch auf dieses Symbol klicken, um erweiterte Verschiebeoptionen zu sehen). Wenn Sie die Checkbox rechts oben an jedem Feld aktivieren, wird das Feld zur Mehrfeldauswahl hinzugefügt, sodass Sie mehrere Felder gleichzeitig schnell ändern können."
design_1216 = "<b>HINWEIS:</b> Im Entwicklungsstatus werden alle Feldänderungen sofort in Echtzeit wirksam."
design_1217 = "Um mehrere Felder gleichzeitig zu kopieren, zu verschieben oder zu löschen, halten Sie die Strg- oder Cmd-Taste auf Ihrer Tastatur gedrückt und klicken Sie auf das Feld, um die Funktion <b style='white-space:nowrap'><i class='fa-solid fa-wrench icon-online-designer-wrench'></i> Schnell</b><b>änderung Feld(er)</b> anzuzeigen."
