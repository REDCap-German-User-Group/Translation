mycap_mobile_app_764 = "Ja, fortfahren"
mycap_mobile_app_765 = "Zur neuen MyCap-App wechseln?"
mycap_mobile_app_766 = "Teilnehmende können Ihrem Projekt in der MyCap-Mobile-App mit einem QR-Code oder Hyperlink beitreten, der eindeutig für ihren Datensatz in Ihrem REDCap-Projekt ist. Der Datensatz eines Teilnehmers muss im REDCap-Projekt bereits existieren, damit er einen QR-Code oder Hyperlink erhalten kann. <br><br>Die untenstehenden Methoden stellen Ihnen Vorlagentext und Anweisungen zur Aufnahme von Teilnehmenden in Ihr Projekt bereit. Um den individuellen QR-Code oder Hyperlink eines Teilnehmers nach Erstellung seines Datensatzes im Projekt zu erhalten, siehe MyCap Participant Management > MyCap Participant List."
