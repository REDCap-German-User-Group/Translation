access_control_groups_28 = "Gruppe löschen"
access_control_groups_29 = "Sind Sie sicher, dass Sie Access Control Groups für alle Projekte aktivieren möchten? <b>WARNUNG: Nach der Aktivierung werden alle bestehenden Benutzer sofort Ihrer Standard-ACG zugewiesen.</b> Wenn Sie ACGs noch nie aktiviert haben oder noch keine neue Standard-ACG definiert haben, werden nach Aktivierung der ACG-Funktion alle Benutzer automatisch der Gruppe \"No Rights\" zugewiesen, der integrierten Standard-ACG, die für alle Benutzerrechtekategorien keine Rechte (oder nur minimale Rechte) hat. Wenn Sie noch keine neue Standard-ACG definiert haben, können Benutzerrechte-Manager in keinem Projekt Benutzer hinzufügen oder Benutzerrechte bearbeiten, bis Sie einige ACGs erstellt und bestehende Benutzer diesen ACGs zugewiesen haben. Sie können die Methode Benutzerzuweisungs-CSV hochladen verwenden, um Benutzer nach Aktivierung der ACG-Funktion gesammelt neuen ACGs zuzuweisen."
