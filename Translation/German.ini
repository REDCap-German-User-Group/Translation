mobile_app_112 = "Durch Klicken auf den Button 'Importieren' unten wird der Importprozess gestartet, um ALLE Datensätze zu importieren, die in der Datendump-CSV enthalten sind. (Hinweis: Alle nicht-leeren Werte überschreiben vorhandene Werte im Projekt.) Sie erhalten die Möglichkeit, die Änderungen in der Vorschau anzusehen. Bitte beachten Sie, dass möglicherweise einige Fehlermeldungen angezeigt werden, wenn Sie Felder oder Instrumente im Projekt geändert haben, nachdem Daten in der Mobile App erfasst wurden. Diese weisen darauf hin, dass Sie stattdessen Ihre Datendump-CSV-Datei herunterladen und die entsprechenden Änderungen vornehmen müssen. Danach können Sie versuchen, die Datendatei manuell im Datenimport-Tool hochzuladen."
