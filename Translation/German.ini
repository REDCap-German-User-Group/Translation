data_export_tool_123 = "Die Daten für alle Datensätze in diesem Projekt können in einer einzigen PDF-Datei heruntergeladen werden. Diese Datei enthält das tatsächliche Seitenformat, wie Sie es auf der Dateneingabeseite oder im Fragebogen sehen würden, und enthält alle Daten für alle Datensätze für alle Datenerfassungsinstrumente. Klicken Sie rechts auf das Symbol, um den Download der Datei zu starten."
data_export_tool_124 = "Hinweis: Wenn Ihr Projekt sehr viele Felder/Fragen oder Datensätze/Antworten enthält, kann die resultierende PDF-Datei sowohl in der Dateigröße als auch in der Seitenlänge sehr groß sein. Bitte haben Sie Geduld, wenn der Download der Datei einige Zeit dauert."
data_export_tool_125 = "Rückkehr-Codes für Fragebögen (für die Funktion Speichern & später fortfahren)"
data_export_tool_126 = "Da in diesem Projekt ein oder mehrere Fragebögen mit aktivierter Funktion Speichern & später fortfahren vorhanden sind, können Sie eine Datei herunterladen, die die Rückkehr-Codes für unvollständige Fragebogenantworten enthält und zur Einordnung außerdem den gesamten Datensatz (CSV-Rohformat) enthält. Sie müssen diese Datei eventuell verwenden, um einen Rückkehr-Code abzurufen, wenn ein Fragebogenteilnehmer den auf der Fragebogenseite erhaltenen Code verlegt hat. Klicken Sie rechts auf das Symbol, um den Download der Datei zu starten."
data_export_tool_127 = "HINWEIS: Da diese Datei die Rückkehr-Codes für unvollständige Antworten enthält, seien Sie bitte vorsichtig, wenn Sie diese Datei verteilen möchten, da andere dadurch unvollständige Fragebogenantworten bearbeiten könnten."
