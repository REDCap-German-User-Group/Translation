multilang_676 = "Eine eindeutige Kennung (Groß-/Kleinschreibung nicht relevant) für diese Sprache. Es wird empfohlen, den ISO-Code zu verwenden, z. B. '<b>en</b>' oder '<b>en-US</b>' für Englisch oder '<b>es</b>' für Spanisch. <b>Nur Buchstaben und Bindestrich verwenden</b> (und optional Zahlen am Ende)."
multilang_677 = "Die obigen Optionen erleichtern die Übersetzung während der Projektentwicklung. Für <small><b>PRODUKTIONS</b></small>-Projekte wird empfohlen, die Hervorhebungsoptionen auszuschalten."
multilang_678 = "Wenn diese Option aktiviert ist, versucht REDCap, die bevorzugte Sprache eines Benutzers/Umfragebefragten, wie im Webbrowser gesetzt, mit den in diesem Projekt verfügbaren Sprachen abzugleichen. Beachten Sie, dass dafür die IDs der Sprachen <b>einem gültigen ISO-Code entsprechen müssen</b>. Die automatische Erkennung wird nur wirksam, wenn der Benutzer noch keine Sprache aktiv ausgewählt hat, d. h. beim ersten Besuch."
