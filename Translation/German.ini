setup_80 = "Sie können benutzerdefinierte Lesezeichen zu Webseiten erstellen, die innerhalb oder außerhalb von REDCap existieren. Diese Lesezeichen werden als Links im linken Projektmenü angezeigt und können jederzeit von Benutzern aufgerufen werden, die dazu berechtigt sind. Jedes Projekt-Lesezeichen verfügt über benutzerdefinierte Einstellungen, mit denen Aussehen und Verhalten gesteuert werden können."
setup_81 = "Randomisierungsmodell einrichten"
