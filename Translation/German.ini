dataqueries_154 = "Dieses Pop-up zeigt alle Feldkommentare für den unten angegebenen Datensatz und das angegebene Feld an. Benutzer mit Zugriff auf Eingabeformulare können einen oder mehrere Kommentare zu jedem Feld eines Datenerhebungsinstruments hinterlassen; danach bleibt das Sprechblasen-Symbol hervorgehoben, um anzuzeigen, dass für dieses Feld in diesem Datensatz Kommentare vorhanden sind. Alle Feldkommentare für alle Datensätze/Felder können außerdem angezeigt, per Stichwort durchsucht und gefiltert werden auf der"
dataqueries_155 = "Was ist der Data Resolution Workflow?"
dataqueries_156 = "Wenn der Data Resolution Workflow aktiviert ist, können Benutzer einen Workflow öffnen, um den Prozess zur Lösung von Datenproblemen im Projekt zu dokumentieren."
dataqueries_157 = "Bei einigen Benutzern können die Rechte so eingeschränkt sein, dass sie keinen Zugriff auf den Data Resolution Workflow haben und daher keine Datenabfragen anzeigen oder bearbeiten können. Benutzer mit 'Nur anzeigen'-Rechten können alle geöffneten Abfragen anzeigen, sie aber nicht ändern oder beitragen. Benutzer mit 'Nur antworten'-Rechten können auf eine geöffnete Abfrage antworten (insbesondere, wenn sie ihnen zugewiesen wurde), können aber keine Datenabfrage öffnen oder schließen. Benutzer mit den höchsten Rechten können alle genannten Aktionen ausführen (Abfragen öffnen, beantworten und schließen)."
