alerts_01 = "Die folgenden Einstellungen können verwendet werden, um auf der Seite Alarme & Benachrichtigungen in allen Projects einzuschränken, an welche E-Mail-Adressen Benutzer Alarme senden dürfen. Dadurch können einige Einrichtungen restriktiver sein, wenn sie Bedenken haben, dass Benutzer diese Funktionalität (absichtlich oder böswillig) auf eine Weise nutzen, die regulatorische Compliance oder Datenschutzgesetze/-vorschriften gefährden könnte, z. B. indem sensible Daten per Piping in die E-Mail-Nachricht eines Alarms eingefügt und an einen Nicht-Project-Benutzer gesendet werden."
alerts_02 = "Normalen Benutzern erlauben, E-Mail-Adressen als <u>Freitext</u> für An, CC oder BCC eines Alarms manuell einzugeben?"
alerts_03 = "Normalen Benutzern erlauben, Project-Variablen für <u>E-Mail-Felder</u> im Project für An, CC oder BCC eines Alarms zu verwenden?"
alerts_05 = "Ja, normalen Benutzern diese Verwendung erlauben"
alerts_06 = "Nein, diese Verwendung nur Administratoren erlauben"
alerts_07 = "Wenn dies auf 'Ja' gesetzt ist, können Benutzer beim Festlegen von An, CC oder BCC eines Alarms E-Mail-validierte Textfelder in der Mehrfachauswahl auswählen. Administratoren können dies in einem Project unabhängig von dieser Einstellung immer tun."
alerts_08 = "Wenn dies auf 'Ja' gesetzt ist, können Benutzer für An, CC oder BCC eines Alarms <u>*beliebige* E-Mail-Adressen manuell eingeben</u>. Administratoren können dies in einem Project unabhängig von dieser Einstellung immer tun."
alerts_09 = "Optional: <u>Domain-Allowlist für E-Mail-Adressen</u>, die manuell als Freitext eingegeben werden (über die obige Option)"
alerts_10 = "Wenn die unmittelbar obige Option auf 'Ja' gesetzt ist, können Sie optional einschränken, welche Arten von E-Mail-Adressen für An, CC oder BCC eines Alarms eingegeben werden können, indem Sie einen oder mehrere Domainnamen (z. B. vanderbilt.edu) angeben, die als Allowlist der einzig zulässigen Domains dienen, die E-Mail-Adressen für einen Alarm haben dürfen. Wenn ein Benutzer eine E-Mail mit einer anderen Domain eingibt, wird ein Fehler angezeigt und die Eingabe wird nicht akzeptiert."
alerts_12 = "Piping von Daten für Identifier-Felder verhindern"
alerts_13 = "Wenn dieses Kontrollkästchen aktiviert ist, werden Feldvariablen (z. B. [date_of_birth]), die im Betreff oder in der Nachricht des Alarms vorkommen, nicht mit ihrem Wert per Piping ersetzt, wenn das Feld als 'Identifier'-Feld markiert wurde. In diesem Fall wird die Feldvariable einfach durch [*DATA REMOVED*] ersetzt, anstatt die tatsächlichen Daten in die Nachricht zu übernehmen."
alerts_14 = "Piping von Daten für Identifier-Felder erlauben?"
alerts_15 = "Felder werden häufig als Identifier markiert, weil sie sensible oder identifizierende Informationen enthalten, z. B. personenbezogene Informationen (PII) oder geschützte Gesundheitsinformationen (PHI). Um ein höchstmögliches Datenschutzniveau zu wahren und zu verhindern, dass potenziell sensible Daten als Alarm aus Ihrem Project versendet werden, wird empfohlen, dieses Kontrollkästchen aktiviert zu lassen."
alerts_16 = "Möchten Sie das Piping von Daten für Identifier-Felder wirklich weiterhin erlauben?"
