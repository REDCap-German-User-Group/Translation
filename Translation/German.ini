control_center_4541 = "Wenn aktiviert, wird für jede der in den Tabellen auf dieser Seite aufgeführten Aktionen eine E-Mail an den REDCap-Administrator gesendet. Die Anträge können dann durch Klicken auf den Link in der E-Mail oder über die Tabellenoberfläche auf dieser Seite verarbeitet werden. Wenn diese Option nicht aktiviert ist, werden keine E-Mails gesendet, und die gesamte Verarbeitung der Anträge muss auf dieser Seite erfolgen."
