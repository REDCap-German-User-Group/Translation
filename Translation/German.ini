survey_184 = "Umfragebefragten erlauben, nach Abschluss der Umfrage aggregierte Umfrageergebnisse anzusehen?"
survey_185 = "Nach Abschluss der Umfrage können Teilnehmende ALLE Antworten in aggregiertem grafischem Format und/oder als deskriptive Statistik anzeigen. Außerdem werden die Antworten des einzelnen Befragten in den Ergebnissen hervorgehoben."
