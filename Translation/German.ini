sqs_001 = "Survey-Queue-Setup hochladen (CSV)"
sqs_002 = "Sie können die Einstellungen für Survey Queue Setup (SQS) für *alle* Fragebögen/Events in einer einzigen CSV-Datei importieren. Diese muss alle erforderlichen Spalten enthalten, jeweils mit einem gültigen Wert (siehe unten). SQS-Einstellungen für Fragebögen, die in der Importdatei nicht enthalten sind, behalten ihre bestehenden Einstellungen. Wenn Sie eine schnelle Vorlage für eine SQS-Importdatei benötigen, können Sie die Survey-Queue-Funktion für einen einzelnen Fragebogen im Projekt aktivieren und dann einen SQS-Export als Grundlage für Ihre eigene SQS-Importdatei durchführen (z. B. per Kopieren und Einfügen in einem Tabellenkalkulationsprogramm, um SQSs für andere Fragebögen/Events zu erstellen)."
sqs_003 = "Die Survey-Queue-Setup-Einstellungen wurden für die folgenden Fragebögen erfolgreich hinzugefügt oder geändert:"
sqs_004 = "Survey-Queue-Setup-Einstellungen wurden erfolgreich hochgeladen!"
sqs_005 = "Vollständige Liste der *erforderlichen* Spalten in den CSV-Import-/Exportdateien anzeigen"
