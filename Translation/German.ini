system_config_571 = "Alternative Modulverzeichnisse (optional)"
system_config_573 = "Clickjacking-Prävention"
system_config_574 = "Standardmäßig kann eine REDCap-Seite in einem iframe auf einer Seite jeder Website eingebettet werden. In einigen Fällen ist dies nützlich, z. B. beim Einbetten von Fragebögen in andere Websites, aber es besteht Missbrauchspotenzial, bei dem böswillige Benutzer versuchen können, andere Benutzer mit einer Technik namens Clickjacking zu täuschen. Wenn Sie dies einschränken möchten, sodass andere Websites keine REDCap-Seiten einbetten können (um Clickjacking zu verhindern), setzen Sie die obige Option. Wenn Sie sie auf 'Allow...' setzen, kann jede Domain im Web eine REDCap-Seite einbetten (vorausgesetzt, diese REDCap-Installation ist öffentlich im Web verfügbar). Die Einschränkung des Zugriffs durch externe Websites gilt allgemein als sicherer, um mögliche Clickjacking-Angriffe durch böswillige Benutzer zu verhindern. Technischer Hinweis: Wenn dies auf 'Prevent...' gesetzt wird, wird der HTTP-Header 'X-Frame-Options: SAMEORIGIN' erzwungen."
system_config_575 = "Clickjacking verhindern / externe Websites daran hindern, REDCap-Seiten einzubetten"
system_config_576 = "Externen Websites erlauben, REDCap-Seiten einzubetten"
system_config_577 = "Wenn Sie External Modules entwickeln und Ihre Module in einem anderen Verzeichnis speichern möchten (nicht nur im Verzeichnis redcap/modules/), können Sie hier ein oder mehrere Verzeichnisse festlegen. Sie müssen nicht unterhalb des REDCap-Webroots (z. B. Verzeichnis 'redcap') liegen, und Sie müssen den vollständigen Pfad des Verzeichnisses angeben. Um mehrere alternative Verzeichnisse zu definieren, trennen Sie sie mit einem Pipe-Zeichen |."
