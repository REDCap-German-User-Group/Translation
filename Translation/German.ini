calendar_popup_32 = "Sie können Ihren REDCap-Kalender synchronisieren oder einen einmaligen Import Ihrer Kalender-Events in externe Kalenderanwendungen wie Google Kalender, Outlook, Office 365, Zoho, Apple Kalender oder jede Anwendung durchführen, die iCal- oder ICS-Dateien unterstützt."
calendar_popup_33 = "Einmaliger Import:"
calendar_popup_34 = "Wählen Sie unten eine der beiden Optionen aus, um Ihre Projekt-Kalender-Events mit einer externen Kalenderanwendung zu synchronisieren oder in diese zu importieren."
calendar_popup_35 = "Die untenstehende Webadresse stellt einen Echtzeit-Live-Feed Ihres REDCap-Projektkalenders dar. <b>Kopieren Sie die URL, um sie als Kalender-URL in Ihre Kalenderanwendung einzufügen</b>, indem Sie die Option \"Kalender aus URL/Internet hinzufügen\" verwenden. Dadurch abonniert Ihre externe Anwendung den REDCap-Projektkalender. Hinweis: Verschiedene Kalenderanwendungen haben unterschiedliche Aktualisierungsraten. Wenn also neue Events im REDCap-Kalender hinzugefügt werden, erscheinen sie möglicherweise nicht sofort in der externen Anwendung, sondern erst nach dem nächsten Aktualisierungsintervall, möglicherweise später am selben Tag oder am nächsten Tag (abhängig von der Kalenderanwendung). Zusätzlich ist dieser Kalender-Feed ein <u>Einweg-Feed</u>. Das bedeutet: Änderungen am Kalender in REDCap werden zwar automatisch in der externen Kalenderanwendung angezeigt, Sie können sie dort aber nicht ändern, weil sie schreibgeschützt sind."
calendar_popup_36 = "Wählen Sie einen Datensatz aus, wenn das Kalender-Event mit einem vorhandenen Datensatz verknüpft ist."
calendar_popup_37 = "Live-Kalender-Feed: Kalender aus URL/Internet hinzufügen"
calendar_popup_38 = "URL in Zwischenablage kopieren"
calendar_popup_39 = "Laden Sie die untenstehende Kalender-ICS-Datei herunter und öffnen Sie sie, um Ihre REDCap-Kalender-Events manuell in Ihre Kalenderanwendung auf Ihrem Computer zu importieren, oder laden Sie die Datei in einen webbasierten Kalenderdienst hoch. Hinweis: Dies ist <u>kein Live-Feed, sondern ein einmaliger Import</u>. Daher werden neue Events, die künftig zu Ihrem REDCap-Kalender hinzugefügt werden, nicht automatisch zu Ihrer externen Kalenderanwendung hinzugefügt. Bitte beachten Sie außerdem, dass beim mehrmaligen Herunterladen und Importieren der ICS-Datei doppelte Events in Ihrer Kalenderanwendung entstehen können."
calendar_popup_40 = "ICS-Datei herunterladen"
