multilang_175 = "Verwendung dieser Datei: Diese Datei kann verwendet werden, um Einstellungen auf der Multi-Language-Management-Seite eines Projekts wiederherzustellen (oder zu aktualisieren). Importieren Sie dazu diese Datei über den Mechanismus 'Allgemeine Einstellungen importieren' auf dem Tab 'Sprachen'. Beachten Sie jedoch, dass zuerst mindestens eine Sprache im Projekt existieren muss. Diese Datei kann vor dem Import manuell bearbeitet werden. Achten Sie dabei darauf, die Struktur der Datei beizubehalten (sie muss gültiges JSON sein). Nur Sprach-IDs, true/false und field/user (alertSources) sind gültige Optionen. Beim Import wird ein Best-Effort-Ansatz verwendet - jede Einstellung, die zum Zeitpunkt des Imports nicht zutrifft, wird stillschweigend ignoriert."
