docs_1138 = "Geben Sie eine Liste aller nicht erlaubten Dateitypen/-erweiterungen (z. B. exe) an, um zu verhindern, dass Benutzer Dateien dieser Typen in REDCap hochladen (oft aus Sicherheitsgründen).
