sendit_19 = "Jeder Empfänger erhält eine E-Mail mit einer eindeutigen Download-URL sowie eine zweite Folge-E-Mail mit dem Passwort (für höhere Sicherheit) zum Herunterladen der Datei. Die Datei wird sicher gespeichert und später nach dem angegebenen Ablaufdatum vom Server entfernt. Send-It ist die perfekte Lösung für alle, die Dateien senden möchten, die zu groß für E-Mail-Anhänge sind oder sensible Daten enthalten."
sendit_20 = "Anweisungen zur Verwendung von Send-It:"
