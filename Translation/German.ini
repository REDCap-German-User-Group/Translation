random_23 = "Entschuldigung, aber die maximale Anzahl von Feldern, die als Randomisierungskriterien verwendet werden können, beträgt"
random_24 = "Randomisierung in REDCap funktioniert, indem Sie Ihre eigene Zuteilungsliste erstellen, die als Nachschlagetabelle dafür dient, wie Probanden randomisiert werden sollen. In Schritt 1 unten richten Sie Ihr Randomisierungsmodell und alle seine Parameter ein; anschließend stellt Schritt 2 einige Beispiele bereit, wie Sie Ihre Zuteilungstabelle einrichten können, bevor Sie sie schließlich in Schritt 3 hochladen. <b>HINWEIS:</b> Das Randomisierungsmodul erstellt die Randomisierungstabelle nicht für Sie. Diese Tabelle muss außerhalb von REDCap mit anderer Software (z. B. SAS, Stata, R) erzeugt werden, sehr wahrscheinlich durch den an Ihrem Project beteiligten Statistiker/Datenanalysten. Die von Ihnen hochgeladene Randomisierungstabelle wird als Nachschlagetabelle für die Randomisierung von Probanden verwendet. Dadurch, dass Sie Ihre eigene Zuteilungstabelle außerhalb von REDCap erstellen, können Sie und Ihr Team genau wählen, wie Sie Ihre Zuteilungen und Zuweisungen strukturieren möchten (z. B. Blockgrößen, Permutationen, Stratifizierungsbalance). Es ist nicht zwingend wichtig, wie Sie Ihre Zuteilungstabelle erstellen oder einrichten, solange Sie sie korrekt strukturieren, wie in den unten in diesem Modul aufgeführten Schritten vorgegeben."
random_25 = "Wenn Randomisierung erfolgt"
random_26 = "Dashboard (alle Zuteilungen)"
random_27 = "Bitte wählen Sie mindestens ein Kriterienfeld"
random_28 = "Die Randomisierung von Probanden erfolgt auf dem Datenerhebungsformular, auf dem sich Ihr Randomisierungsfeld (aus Schritt 2) befindet. Bevor ein Proband randomisiert wird, erscheint neben diesem Feld eine Schaltfläche 'Randomisieren'. Wenn ein Benutzer (dem entsprechende Benutzerrechte für 'Randomisieren' gewährt wurden) auf diese Schaltfläche klickt, erscheint ein Pop-up-Fenster, in dem der Benutzer den Probanden randomisieren kann. Wenn Gruppierung oder Stratifizierung verwendet wird, muss der Benutzer fehlende Gruppen- oder Strata-Werte angeben, bevor er den Probanden randomisieren kann. Nachdem ein Proband randomisiert wurde, werden die Gruppierungs- und/oder Strata-Felder (falls verwendet) dauerhaft gesperrt und können nicht mehr geändert werden. Das Randomisierungsfeld ist sowohl vor als auch nach der Randomisierung eines Probanden immer gesperrt und nicht änderbar. Wenn der Benutzer den Probanden randomisiert, prüft REDCap die Zuteilungstabelle und weist den Wert für das Randomisierungsfeld dieses Probanden zu, der aus der nächsten passenden Zeile in der Tabelle basierend auf den Kriterien (z. B. Strata-Feldwerte, Gruppe) abgeleitet wird. Wenn keine stratifizierte Randomisierung und keine Randomisierung nach Gruppe/Standort verwendet wird, wird einfach der nächste Wert in der Zuteilungstabelle für den Probanden bereitgestellt."
random_29 = "SCHRITT 1: Definieren Sie Ihr Randomisierungsmodell"
random_30 = "SCHRITT 3: Laden Sie Ihre Zuteilungstabelle hoch (CSV-Datei)"
random_31 = "In diesem Schritt können Sie das Randomisierungsmodell definieren, das Sie implementieren werden, sowie alle seine Parameter. Dazu gehört die Definition von Strata (falls zutreffend) und optional die Randomisierung von Probanden pro Gruppe/Standort (bei einer Multi-Site-Studie)."
random_32 = "Nachdem Sie Ihre benutzerdefinierte Zuteilungstabelle als CSV-Datei erstellt und sichergestellt haben, dass Sie das in den Vorlagendateien aus Schritt 2 oben vorgeschriebene Format eingehalten haben, können Sie die Datei nun unten hochladen. Sie wird zuerst auf mögliche Fehler geprüft, bevor sie akzeptiert und in REDCap gespeichert wird. Bitte beachten Sie, dass Sie zwei verschiedene Zuteilungstabellen erstellen müssen: eine für Tests, während sich Ihr Project im Entwicklungsstatus befindet, und eine für die Verwendung im Produktionsstatus. Unten finden Sie einige wichtige Erinnerungen, bevor Sie mit dem Hochladen Ihrer Zuteilungstabellen beginnen."
random_33 = "Unten finden Sie einige Beispieldateien, die Sie herunterladen können, um eine allgemeine Vorstellung davon zu bekommen, wie Sie Ihre eigene Randomisierungstabelle strukturieren können. Sie müssen keine davon verwenden. Tatsächlich <b>empfehlen wir, diese exakten Vorlagen NICHT zu verwenden</b>, sondern sie nur als Beispiel oder Ausgangsbasis zu nutzen, um Ihre eigene benutzerdefinierte Zuteilungsdatei zu erstellen. Nach dem Hochladen Ihrer Zuteilungstabelle in Schritt 3 unten wird sie als Nachschlagetabelle verwendet, um Zuweisungen vorzunehmen, wenn Probanden randomisiert werden. <b>HINWEIS:</b> Datensatznamen (z. B. Studien-ID) sollten NICHT als Spalte in Ihrer Zuteilungstabelle enthalten sein, sondern nur die Felder, die in den untenstehenden Beispieldateien aufgeführt sind."
