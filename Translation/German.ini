survey_473 = "DRAG-N-DROP-LOGIKBUILDER KANN NICHT VERWENDET WERDEN"
survey_474 = "Leider können Sie den Drag-N-Drop-Logikbuilder nicht verwenden! Die erweiterte Syntax der Verzweigungslogik, die Sie verwenden, ist nicht mit dem Drag-N-Drop-Logikbuilder kompatibel, daher kann die Logik nur mit der erweiterten Methode bearbeitet werden. Wenn Sie den Drag-N-Drop-Logikbuilder wieder verwenden möchten, müssen Sie zuerst die Logik löschen oder vereinfachen, sodass sie mit dieser Methode kompatibel ist."
survey_475 = "'SQL'-FELD KANN NICHT GEÄNDERT WERDEN"
survey_476 = "Aus Sicherheitsgründen dürfen Feldtypen 'sql' NUR von REDCap-Administratoren hinzugefügt oder geändert werden. Bitte kontaktieren Sie diese, wenn Sie Unterstützung benötigen."
survey_477 = "Dynamische Abfrage (SQL)"
survey_478 = "Einzelne Checkbox (advcheckbox)"
survey_479 = "Nur Einladungen, deren Versand fehlgeschlagen ist"
survey_480 = "Es scheint, dass automatisierte Einladungen für andere Umfragen eingerichtet wurden, wobei sie durch den Abschluss des ersten Umfrageinstruments ausgelöst werden. Sie haben jedoch kein E-Mail-Feld festgelegt, das zum Senden von Einladungen an Umfrageteilnehmende verwendet werden soll (siehe Abschnitt Optionale Module auf der Projekt-Setup-Seite). Wenn Sie kein E-Mail-validiertes Textfeld als E-Mail-Feld für Umfrageeinladungen festlegen, funktionieren die automatisierten Einladungen für den öffentlichen Umfragelink nicht, weil sie beim Planen der Einladung für die nächste Umfrage keine E-Mail-Adresse haben, an die die Umfrageeinladung gesendet werden kann."
survey_481 = "E-Mail-Feld wurde nicht festgelegt"
survey_482 = "Wenn Sie den öffentlichen Umfragelink nicht verwenden möchten, können Sie diese Nachricht gefahrlos ignorieren."
survey_483 = "Das festgelegte E-Mail-Feld existiert nicht in der ersten Umfrage."
survey_484 = "Es scheint, dass automatisierte Einladungen für Ihre erste Umfrage eingerichtet wurden und dass Sie außerdem ein E-Mail-Feld für das Senden von Einladungen an Umfrageteilnehmende festgelegt haben. Ihr festgelegtes E-Mail-Feld existiert jedoch *nicht* in der ersten Umfrage, sodass es unmöglich ist, die E-Mail-Adresse des Teilnehmers über den öffentlichen Umfragelink zu erfassen. Das bedeutet, dass die automatisierten Einladungen für den öffentlichen Umfragelink nicht funktionieren, weil ihnen beim Planen der Einladung für die nächste Umfrage keine E-Mail-Adresse zum Senden der Umfrageeinladung zur Verfügung steht. Um dies zu beheben, sollten Sie zum Online Designer gehen und das folgende Feld in Ihr erstes Datenerhebungsinstrument verschieben:"
survey_486 = "Geplante Umfrageeinladung löschen"
survey_487 = "Sind Sie sicher, dass Sie diese Umfrageeinladung löschen möchten, die zum Versand geplant ist an"
survey_488 = "Die Umfrageeinladung wurde erfolgreich gelöscht. Die Seite wird nun neu geladen, um die Änderungen anzuzeigen."
survey_489 = "Wenn diese Einladung gelöscht wird, erhält der Teilnehmer KEINE E-Mail-Einladung zur Teilnahme an der Umfrage."
survey_490 = "Sendezeit der Einladung ändern"
survey_491 = "Sind Sie sicher, dass Sie die 'Sendezeit' für diese Umfrageeinladung ändern möchten, die zum Versand geplant ist an"
survey_492 = "Wenn die Sendezeit geändert wird, erhält der Teilnehmer die Umfrageeinladung NICHT zur aktuellen Zeit, sondern zur neu angegebenen Zeit."
survey_493 = "Neues Datum/Uhrzeit zum Senden der Einladung angeben:"
survey_494 = "Die Sendezeit der Umfrageeinladung wurde erfolgreich geändert. Die Seite wird nun neu geladen, um die Änderungen anzuzeigen."
survey_495 = "Wenn Sie Ihren Rückkehrcode abrufen müssen, wenden Sie sich bitte an den Umfrageadministrator, der Ihnen ursprünglich die Umfrageeinladung gesendet hat."
survey_498 = "Kennung kann nicht hinzugefügt oder geändert werden:"
survey_499 = "[nicht offengelegte E-Mail-Adresse]"
survey_501 = "Eine Teilnehmerkennung kann nur <u>vor</u> der Erstellung des Datensatzes *hinzugefügt* werden. Sie kann *geändert* werden, wenn die Kennung <u>vor</u> der Erstellung des Datensatzes existierte; der einzige Ort, an dem sie geändert werden kann, ist jedoch die Teilnehmerliste für eine erste Umfrage (d. h. das erste Instrument)."
survey_502 = "E-Mail-Adresse kann hier nicht geändert werden:"
survey_503 = "Die E-Mail-Adresse eines Teilnehmers kann hier nicht geändert werden, kann aber in der Teilnehmerliste für eine erste Umfrage (d. h. das erste Instrument) geändert werden. Alternativ können Sie, wenn Sie ein 'festgelegtes E-Mail-Feld' verwenden, die E-Mail-Adresse auf dem Datenerhebungsinstrument ändern, auf dem sich das 'festgelegte E-Mail-Feld' befindet."
survey_504 = "Umfrage beginnen"
survey_505 = "Umfrage-Warteschlange"
survey_506 = "Unten ist Ihre Umfrage-Warteschlange aufgeführt, die alle anderen Umfragen auflistet, die Sie noch nicht abgeschlossen haben."
survey_507 = "Abgeschlossen"
survey_508 = "Vielen Dank für Ihr Interesse, aber dieser Link zur Umfrage-Warteschlange ist ungültig."
survey_509 = "Umfrage-Warteschlange schließen"
survey_510 = "Link zu meiner Umfrage-Warteschlange abrufen"
survey_511 = "Um die nächste Umfrage zu beginnen, klicken Sie neben dem Titel auf die Schaltfläche 'Umfrage beginnen'."
survey_512 = "Link zur Umfrage-Warteschlange"
survey_513 = "Link zur Umfrage-Warteschlange kopieren und einfügen"
survey_514 = "Link zur Umfrage-Warteschlange per E-Mail senden"
survey_515 = "E-Mail-Adresse eingeben"
survey_516 = "Um Ihren Link zur Umfrage-Warteschlange zu erhalten, mit dem Sie künftig zu Ihrer Umfrage-Warteschlange zurückkehren können, können Sie den im Textfeld unten angezeigten Link kopieren und einfügen oder ihn sich an Ihre E-Mail-Adresse senden lassen."
survey_520 = "Bitte folgen Sie diesem Link zu Ihrer Umfrage-Warteschlange, um Ihre Umfragen abzuschließen: "
survey_522 = "Bitte geben Sie eine E-Mail-Adresse ein"
survey_523 = "Ihr Link zur Umfrage-Warteschlange"
survey_524 = "E-MAIL GESENDET!"
survey_525 = "Umfrage-Warteschlange einrichten"
survey_526 = "Umfrage in der Umfrage-Warteschlange anzeigen, wenn..."
survey_527 = "So verwenden Sie dies"
survey_528 = "Ihre für die Umfrage-Warteschlange definierten Einstellungen wurden nun gespeichert."
survey_529 = "Automatisch starten?"
survey_531 = "Die Umfrage-Warteschlange zeigt einem Teilnehmer alle seine Umfragen auf einer einzigen Seite als Liste an; die Warteschlange umfasst alle auszufüllenden Umfragen (wie eine 'To-do'-Liste) sowie die Umfragen, die der Teilnehmer bereits abgeschlossen hat."
survey_535 = "(alle anzeigen)"
survey_536 = "Alle Umfragen in Ihrer Warteschlange wurden abgeschlossen!"
survey_537 = "Benutzerdefinierter Text, der oben in der Umfrage-Warteschlange angezeigt wird (optional)"
survey_538 = "Wenn kein benutzerdefinierter Text angegeben wird, dann"
survey_539 = "dieser Text"
survey_540 = "wird standardmäßig angezeigt."
survey_541 = "Benutzerdefinierten Text hinzufügen, der oben in der Umfrage-Warteschlange angezeigt wird"
survey_542 = "Umfragen können so eingestellt werden, dass sie in der Umfrage-Warteschlange erscheinen, basierend darauf, 1) ob der Teilnehmer eine bestimmte Umfrage abgeschlossen hat und/oder 2) ob bestimmte Bedingungen erfüllt sind (basierend auf Datenwerten). Wenn Umfragen in der Umfrage-Warteschlange aktiviert wurden, werden sie dem Teilnehmer nach Abschluss einer Umfrage angezeigt (unter dem Umfrage-Abschlusstext auf der Seite). Der Teilnehmer sieht in seiner Warteschlange nur die Umfragen, die er bereits abgeschlossen hat, und die Umfragen, die er als Nächstes ausfüllen soll (basierend auf den unten definierten Kriterien). Mit den untenstehenden Einrichtungsoptionen können Sie die Bedingungen festlegen, die bestimmen, wann jede Umfrage in der Warteschlange angezeigt wird. Optional können Sie benutzerdefinierten Text angeben, der oben in jeder Teilnehmer-Warteschlange angezeigt wird; dabei können Sie das Styling des Textes mit HTML-Tags anpassen oder Piping verwenden, um Datenwerte einzufügen. Außerdem ist die Funktion 'Auto Start' optional und kann verwendet werden, um den Teilnehmer sofort zur ersten unvollständigen Umfrage in der Warteschlange zu führen, wenn 'Auto Start' für diese Umfrage aktiviert ist. Dies ermöglicht eine schnellere Umfrageteilnahme, wenn der Teilnehmer mehrere Umfragen in einer Sitzung ausfüllt."
survey_543 = "Nicht aktiviert"
survey_544 = "Aktiviert"
survey_545 = "Die folgenden Umfragen wurden zur Aktivierung festgelegt, aber es wurde entweder keine Option in ihrer Umfrage-Dropdown-Liste ausgewählt oder keine bedingte Logik angegeben. Bitte setzen Sie eines oder beide dieser Attribute für die unten aufgeführten Umfragen oder klicken Sie auf die Schaltfläche Deaktivieren, um sie aus der Umfrage-Warteschlange auszuschließen."
survey_546 = "Deaktivieren"
survey_547 = "Aktivieren"
survey_548 = "Umfragebenachrichtigungen"
survey_549 = "Umfrageoptionen:"
survey_550 = "FEHLER: Umfrage wurde nicht korrekt eingerichtet!"
survey_551 = "Diese Umfrage gehört zu einem REDCap-Projekt, das longitudinal ist; dieses Datenerhebungsinstrument wurde jedoch nicht für dieses Event festgelegt. Das bedeutet, dass diese Umfrage nicht für die Datenerhebung festgelegt wurde und daher nicht angezeigt werden kann. Bitte melden Sie sich im REDCap-Projekt an, gehen Sie zur Seite 'Instrumente für meine Events festlegen' und aktivieren Sie dieses Instrument für dieses Event. Danach können Sie diese Umfrage ausfüllen. Wenn Sie kein Umfrageadministrator sind, benachrichtigen Sie bitte Ihren Umfrageadministrator über dieses Problem."
survey_553 = "Link zur Umfrage-Warteschlange"
survey_557 = "Einstellungen für adaptives Instrument"
survey_558 = "'Nein' ist Standard und wird empfohlen"
survey_559 = "Sie müssen entweder 1) einen Wert für die angezeigte Frage auswählen oder 2) diese Frage überspringen, indem Sie unten auf die Schaltfläche 'Frage überspringen' klicken."
survey_560 = "Bitte wählen Sie einen Wert für die angezeigte Frage aus."
survey_561 = "Frage überspringen"
survey_562 = "WARNUNG: Wert nicht ausgewählt"
survey_563 = "Zurückgehen und Wert eingeben"
survey_567 = "Öffentliche Umfrage ist nicht zugänglich!"
survey_568 = "Die öffentliche Umfrage verweist in einem longitudinalen Projekt immer auf das erste Datenerhebungsinstrument im ersten Event. Es scheint, dass Ihr erstes Instrument noch nicht für das erste Event festgelegt wurde, daher kann hier kein öffentlicher Umfragelink angezeigt werden. Um dies zu beheben, können Sie auf die Schaltfläche unten klicken, um zur Seite Instrumente für meine Events festlegen zu navigieren; danach können Sie Ihr erstes Instrument für das erste Event festlegen."
survey_569 = "Erstes Instrument für erstes Event festlegen"
survey_570 = "(in aufsteigender Reihenfolge nach Sendezeit)"
survey_571 = "Vergangene Einladungen anzeigen"
survey_572 = "Zukünftige Einladungen anzeigen"
survey_573 = "Umfrage-Login"
survey_574 = "Bevor Sie diese Umfrage beginnen oder fortsetzen, müssen Sie sich zuerst anmelden, indem Sie die korrekten Werte unten erfolgreich eingeben."
survey_578 = "Sie müssen für ALLE untenstehenden Felder erfolgreich einen Wert eingeben."
survey_581 = "Sie haben entschieden, die Umfrage vorerst zu stoppen und später zurückzukehren, um sie abzuschließen. Um zu dieser Umfrage zurückzukehren, benötigen Sie den Link zu dieser Umfrage."
survey_582 = "Ihnen wurde soeben eine E-Mail mit einem Link zum Fortsetzen der Umfrage gesendet. Wenn Sie die E-Mail nicht bald erhalten, prüfen Sie bitte Ihren Junk-E-Mail-Ordner."
survey_583 = "Sie können diese Seite als Lesezeichen speichern, um zur Umfrage zurückzukehren, ODER Sie können sich den Umfragelink per E-Mail senden lassen, indem Sie unten Ihre E-Mail-Adresse angeben. Wenn Sie die E-Mail anschließend nicht bald erhalten, prüfen Sie bitte Ihren Junk-E-Mail-Ordner."
survey_584 = "Sie können Ihren Fortschritt in dieser Umfrage fortsetzen, indem Sie auf den untenstehenden Link klicken."
survey_587 = "Sie müssen für das untenstehende Feld erfolgreich einen Wert eingeben."
survey_588 = "Sie müssen für alle Pflichtfelder im Login-Formular erfolgreich einen Wert eingeben."
survey_589 = "Leider scheint es, dass für Sie keine Login-Felder angezeigt werden können, weil für diese Login-Felder zuvor keine Daten für Sie eingegeben wurden; daher gibt es keine Möglichkeit, sich anzumelden. Bitte kontaktieren Sie Ihren Umfrageadministrator, damit dieses Problem behoben wird."
survey_590 = "Weiteres Login-Feld hinzufügen"
survey_591 = "Login-Feld"
survey_592 = "Sie können auf einer oder mehreren Umfragen eine Umfrage-Login-Seite aktivieren, die Ihre Umfragebefragten zwingt, sich auf Ihren Umfragen zu authentifizieren (anzumelden), bevor sie die Umfrage anzeigen und ausfüllen dürfen."
survey_593 = "Wählen Sie unten die Felder aus, die als Login-Felder dienen sollen, die der Befragte eingibt, sowie mehrere weitere Einstellungen, die steuern, wie der Umfrage-Login auf die Umfragen in Ihrem Projekt angewendet wird. HINWEIS: Sobald sich ein Befragter bei einer Umfrage angemeldet hat, wird er nicht erneut zur Eingabe seiner Login-Daten aufgefordert, wenn er innerhalb der folgenden"
survey_594 = "Bitte beachten Sie, dass beim Login *nicht* zwischen Groß- und Kleinschreibung unterschieden wird."
survey_595 = "Mindestanzahl der oben genannten Felder, die für den Login erforderlich sind"
survey_596 = "Umfrage-Login auf alle Umfragen im Projekt anwenden?"
survey_597 = "Alle Umfragen"
survey_598 = "Nur ausgewählte Umfragen (auf Seite Umfrageeinstellungen gesetzt)"
survey_599 = "Anzahl fehlgeschlagener Login-Versuche, bevor der Befragte für eine unten festgelegte Zeitdauer gesperrt wird."
survey_600 = "Zeitdauer, für die der Befragte nach Überschreiten der oben festgelegten Anzahl fehlgeschlagener Login-Versuche gesperrt wird."
survey_601 = "Benutzerdefinierte Fehlermeldung: Geben Sie eine benutzerdefinierte Fehlermeldung an, die auf dem Umfrage-Login-Formular angezeigt wird, wenn der Benutzer Probleme hat, z. B. sich nicht erfolgreich anmelden kann, damit er Sie um Hilfe kontaktieren kann."
survey_602 = "Wenn Sie Probleme beim Anmelden zur Umfrage haben, kontaktieren Sie bitte"
survey_603 = "Felder, die auf dem Umfrage-Login-Formular angezeigt werden"
survey_604 = "Anpassungen für Umfrage-Login"
survey_605 = "Erfolgreich gespeichert!"
survey_606 = "Ihre Umfrage-Login-Einstellungen wurden erfolgreich gespeichert!"
survey_609 = "Sicherheitseinstellungen für Umfrage-Login (optional)"
survey_610 = "Ein oder mehrere Login-Felder wurden nicht ausgewählt und leer gelassen. Bitte wählen Sie ein Feld in der/den Dropdown-Liste(n) aus oder klicken Sie alternativ auf das rote X, um deren Zeile aus der Tabelle zu entfernen."
survey_611 = "Sie haben keine benutzerdefinierte Fehlermeldung eingegeben. Bitte geben Sie eine benutzerdefinierte Fehlermeldung an, die auf dem Umfrage-Login-Formular angezeigt wird, wenn der Benutzer Probleme hat."
survey_612 = "Es scheint, dass Sie nur eines der beiden Felder im Abschnitt Sicherheitseinstellungen eingegeben haben. Bitte beheben Sie dies, indem Sie den eingegebenen Wert entfernen oder den noch fehlenden Wert angeben."
survey_613 = "HTML kann verwendet werden, um Links hinzuzufügen oder Text zu gestalten."
survey_614 = "um Hilfe."
survey_615 = "Der Befragte meldet sich bei der Umfrage an, indem er einen oder mehrere bekannte Werte für Felder im Projekt eingibt (bis zu drei) - z. B. Nachname, Geburtsdatum. Diese Werte müssen bereits im Datensatz des Befragten im Projekt gespeichert sein. Sie können von einem Benutzer im Projekt eingegeben oder hochgeladen worden sein oder von den Befragten selbst in einer vorherigen Umfrage eingegeben worden sein. Wenn Umfrage-Login aktiviert wurde und für den Befragten noch kein Datensatz existiert (z. B. wenn er eine öffentliche Umfrage beginnt), wird die Umfrageseite normal angezeigt und die Login-Seite wird ihm nicht angezeigt. Sobald der Datensatz jedoch existiert, wird der Befragte immer aufgefordert, sich bei der Umfrage anzumelden (mit Ausnahme einer öffentlichen Umfrage, dem einzigen Ort, an dem Umfrage-Login nicht verwendet werden kann)."
survey_616 = "Umfrage-Login aktivieren?"
survey_617 = "HINWEIS: Umfrage-Login wird anstelle von Rückkehrcodes für diese Umfrage verwendet, da Umfrage-Login für alle Umfragen im Projekt aktiviert wurde."
survey_618 = "'Umfrage-Login' erzwingen?"
survey_619 = "Bitte geben Sie Ihren Zugangscode ein, um die Umfrage zu beginnen."
survey_620 = "QR-Code scannen"
survey_621 = "Umfrage-Zugangscode oder"
survey_623 = "Damit ein Befragter diese Umfrage beginnen kann, lassen Sie ihn zur untenstehenden URL navigieren und den Umfrage-Zugangscode eingeben. Der Code ist dauerhaft und ändert sich nie. (Hinweis: Die Webadresse ist für alle Projekte und Umfragen gleich, sodass Sie die Adresse auf einem Computer oder Gerät als Lesezeichen speichern können, um schnell mehrfach dorthin zurückzukehren.)"
survey_624 = "2.) Dann diesen Code eingeben:"
survey_625 = "1.) Zu dieser Webadresse gehen:"
survey_626 = "Bitte folgen Sie den untenstehenden Anweisungen, um zur Umfrageseite zu navigieren."
survey_627 = "Umfrage-Zugangscode und<br>QR-Code"
survey_628 = "Umfrage-Zugangscode"
survey_629 = "Umfrage-Zugangscode abrufen"
survey_630 = "Ein Umfrage-Zugangscode und ein QR-Code ermöglichen Befragten beide, eine Umfrage auf einem anderen Computer oder Gerät zu beginnen, ohne dass ihnen jemand eine Einladung per E-Mail senden muss."
survey_631 = "Ein Umfrage-Zugangscode ermöglicht Befragten, eine Umfrage auf einem anderen Computer oder Gerät zu beginnen, ohne dass ihnen jemand eine Einladung per E-Mail senden muss."
survey_632 = "Der Umfragelink wurde in einen QR-Code umgewandelt, der nun von einem Gerät mit einer App zum Lesen von QR-Codes gescannt werden kann. Sobald der untenstehende QR-Code gescannt wird, sollte er den Befragten direkt zur Umfrage in einem Webbrowser führen."
survey_633 = "Um die Umfrage zu starten, können Sie eine der beiden Möglichkeiten verwenden (den Umfrage-Zugangscode oder den QR-Code), je nachdem, was Sie am einfachsten oder schnellsten finden."
survey_634 = "Bitte geben Sie den Umfrage-Zugangscode ein, den Sie erhalten haben."
survey_635 = "HINWEIS: Umfrage-Login wird anstelle von Rückkehrcodes für diese Umfrage verwendet, da Umfrage-Login für diese bestimmte Umfrage aktiviert wurde."
survey_636 = "Wenn auf 'Ja' gesetzt, verwendet diese Umfrage die Umfrage-Login-Funktion gemäß ihren im Online Designer definierten Einstellungen."
survey_637 = "Diese Option stellt Befragten auf der Umfrageseite eine Schaltfläche 'Speichern und später zurückkehren' bereit, mit der sie ihren Fortschritt speichern und künftig dort fortfahren können, wo sie aufgehört haben. Wenn die Funktion 'Umfrage-Login' für diese Umfrage (oder für alle Umfragen im Projekt) aktiviert wurde, muss der Befragte seine Login-Daten eingeben, um die Umfrage fortzusetzen. Wenn 'Umfrage-Login' jedoch nicht verwendet wird, erhält der Befragte stattdessen einen automatisch generierten Rückkehrcode, den er bei der Rückkehr zur Umfrage eingeben muss, um fortzufahren."
survey_638 = "(Alle Befragten müssen Login-Daten eingeben, bevor sie die Umfrage beginnen, und auch jedes Mal, wenn sie erneut zur Umfrage zurückkehren.)"
survey_639 = "HINWEIS: Die Umfrage-Login-Funktion kann nicht für öffentliche Umfragen verwendet werden."
survey_640 = "Befragten erlauben, zurückzukehren und abgeschlossene Antworten zu ändern"
survey_641 = "Bitte beachten Sie, dass beim Rückkehrcode *nicht* zwischen Groß- und Kleinschreibung unterschieden wird."
survey_642 = "Bitte beachten Sie, dass beim Zugangscode *nicht* zwischen Groß- und Kleinschreibung unterschieden wird."
survey_643 = "Standardmäßig dürfen Befragte ihre Umfrageantworten nicht ändern, wenn die Umfrage vollständig abgeschlossen wurde. Durch Aktivieren dieses Kontrollkästchens können Befragte zu einer abgeschlossenen Umfrageantwort zurückkehren (über die Funktion Speichern und später zurückkehren) und beliebige Antworten in der Umfrage ändern. Die Umfrageantwort bleibt während und nach diesem Vorgang eine abgeschlossene Antwort. Das Einzige, was sich am tatsächlichen Status der Umfrageantwort ändert, ist, dass, wenn der Befragte erneut bis zum Ende der Umfrage gelangt und sie erneut abschließt, die Abschlusszeit der Umfrage mit der neuen Abschlusszeit aktualisiert wird. Wenn die Umfrage die Umfrage-Login-Funktion aktiviert hat, muss sich der Benutzer mit seinen Login-Daten anmelden, um zur abgeschlossenen Umfrageantwort zurückzukehren. Wenn diese Funktion nicht aktiviert ist, ist sein automatisch generierter Rückkehrcode erforderlich, um ihm die Rückkehr zu erlauben."
survey_644 = "Seitennummern oben auf der Umfrageseite anzeigen"
survey_645 = "Eine Seite oder mehrere Seiten?"
survey_647 = "Umfrageanpassungen:"
survey_648 = "Dies ist besonders nützlich, wenn sich der Befragte derzeit in der Nähe befindet oder wenn Sie die Umfrageeinladung an eine physische Postadresse senden (d. h. per 'Schneckenpost'). Sie können unten auf die Schaltfläche Drucken klicken, wenn Sie die Anweisungen für den Befragten ausdrucken möchten."
survey_649 = "Umfrageoptionen"
survey_650 = "Starten Sie die Umfrage, indem Sie die untenstehenden Schritte ausführen."
survey_651 = "Alternativ können Sie, wenn Sie ein Gerät mit einer App zum Lesen von QR-Codes haben, den untenstehenden QR-Code scannen, der Sie direkt zur Umfrage in einem Webbrowser führen sollte."
survey_652 = "Umfrage-Zugangscode eingeben"
survey_653 = "Kurzen Code generieren"
survey_654 = "Alternativ können Sie einen kürzeren, temporären Code generieren, der nach einmaliger Verwendung oder nach Ablauf einer Stunde verfällt."
survey_655 = "2.) Gehen Sie zur Webadresse in Schritt 1 oben und geben Sie diesen Code ein:"
survey_656 = "Code verfällt um"
survey_657 = "Rückkehrcode:"
survey_658 = "'Rückkehrcode' erforderlich für Rückkehr"
survey_659 = "Kopieren oder notieren Sie den untenstehenden Rückkehrcode. Ohne ihn können Sie nicht zurückkehren und diese Umfrage fortsetzen. Sobald Sie den Code haben, klicken Sie auf <i>Schließen</i> und folgen Sie den anderen Anweisungen auf dieser Seite."
survey_660 = "Leider müssen Sie zuerst die Option 'Speichern und später zurückkehren' aktivieren, bevor Sie die Kontrollkästchen-Einstellung aktivieren können, die Befragten erlaubt, zurückzukehren und abgeschlossene Antworten zu ändern."
survey_661 = "Um die Umfrage fortzusetzen, geben Sie bitte den RÜCKKEHRCODE ein, der automatisch für Sie generiert wurde, als Sie die Umfrage verlassen haben."
survey_662 = "Rückkehrcode absenden"
survey_663 = "HINWEIS: Stellen Sie sicher, dass Sie *keinen* Umfrage-Zugangscode eingeben, der sich von einem Rückkehrcode unterscheidet. Umfrage-Zugangscodes ermöglichen Ihnen, zur Umfrageseite zu navigieren, aber nur Rückkehrcodes ermöglichen Ihnen die Rückkehr, wenn Sie die Umfrage bereits begonnen haben."
