survey_1153 = "(HINWEIS) Bitte beachten Sie, dass Action Tags keine Wirkung auf SMS-Umfragen oder Sprachumfragen haben, weil sie nur auf einer Webseite funktionieren. Dieses Feld hat die folgenden Action Tags:"
survey_1154 = "Bitte beachten Sie, dass Action Tags keine Wirkung auf Twilio-SMS-Umfragen oder Sprachumfragen haben, weil Action Tags nur auf Umfragen und Formularen für Webseiten funktionieren. Alle Action Tags werden für Felder, die in SMS- und Sprachumfragen verwendet werden, einfach ignoriert."
survey_1155 = "Sie haben die gesamte Umfrage nicht abgeschlossen; Ihre Antworten gelten daher nur als teilweise abgeschlossen. Diese Umfrageantwort wurde jedoch von einem Umfrageadministrator gesperrt, sodass Sie die Umfrage nicht abschließen können, bis jemand sie entsperrt hat. Wenn dies falsch erscheint, kontaktieren Sie bitte Ihren Umfrageadministrator für diese Umfrage."
survey_1156 = "Sie haben diese Umfrage teilweise abgeschlossen, aber Ihre Antwort ist GESPERRT."
