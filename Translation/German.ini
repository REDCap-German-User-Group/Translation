multilang_210 = "Aktive Sprache des Benutzers oder Umfragebefragten"
multilang_212 = "Verwendung dieser Datei: Alle Informationen oberhalb der Spaltentitelzeile sind rein informativ und werden beim Import ignoriert. Die Spaltentitelzeile muss unverändert bleiben, d. h. die Zeile 'section,type,name,index,kind,text' (das Trennzeichen kann entweder Komma, wie gezeigt, oder Semikolon oder Tab sein) und die erste nicht leere Zeile sein, die nicht mit # beginnt (Kommentarzeichen). Wesentlich sind die Zeilen mit 'translation' oder 'value' in der Spalte 'kind'. In diesen Zeilen kann die Übersetzung (oder der Wert) in der Spalte 'text' bearbeitet werden. Alle anderen Zeilen (außer der Art 'hash', siehe unten) werden beim Import der Datei ignoriert. Ändern Sie den Inhalt der Spalten 'section', 'type', 'name', 'index' und 'kind' überhaupt nicht. Außerdem können Teilmengen dieser Datei erstellt und nach Belieben verwendet werden, solange die oben genannten Regeln eingehalten werden. Die Zeilen der Art 'hash' sind nicht wesentlich, helfen aber zu verfolgen, ob sich ein Standardwert seit Erstellung der Datei geändert hat und eine Übersetzung daher veraltet sein könnte. Beim Import wird ein Best-Effort-Ansatz verwendet. Elemente, die beim Import nicht zugeordnet werden können, werden stillschweigend ignoriert."
multilang_213 = "Beachten Sie, dass einige Tabs auf dieser Seite, z. B. Missing Data Codes oder Protected Email Mode, nur angezeigt werden, wenn die entsprechenden Funktionen in diesem Projekt aktiviert sind. Wenn unten nichts angezeigt wird, gibt es hier nichts zu übersetzen."
