design_899 = "Die Anzahl der Tage zwischen dem heutigen Datum und dem Wert eines Datums-/Datetime-Feldes in der Vergangenheit oder Zukunft berechnen."
design_900 = "Den BMI einer Person (in metrischen Einheiten 'cm' und 'kg') berechnen und auf eine Dezimalstelle runden."
design_901 = "Den BMI einer Person (in englischen Einheiten 'lb' und 'in') berechnen und auf eine Dezimalstelle runden."
design_902 = "Ein Präfix und einen Bindestrich vom Anfang eines Datensatznamens entfernen (z. B. '4890-2318' in '2318' umwandeln)."
design_903 = "Vor- und Nachnamen einer Person in ein Format umwandeln, das wie ein Benutzername aussieht (z. B. 'John' und 'Doe' in 'john_doe' umwandeln). Es kann sinnvoll sein, die Werte zu trimmen, falls versehentlich Leerzeichen eingegeben wurden."
design_904 = "Führende Nullen zu einer Ganzzahl hinzufügen, wobei die Zahl nahe dem Ende der Gleichung die maximale Länge des Ergebnisses nach dem Hinzufügen der führenden Nullen darstellt (d. h. wandelt '7' in '007' um). Hinweis: Die Anzahl der in '00' aufgeführten Nullen sollte mindestens eins kleiner sein als der Wert der Zahl nahe dem Ende (z. B. bei '4' benötigen wir '000'; bei '3' dann '00')."
design_905 = "HINWEIS: Der Dienst Biomedical Ontologies, der die Ontologiesuche in REDCap speist, wird von BioPortal (https://bioportal.bioontology.org) über dessen öffentlichen API-Webdienst bereitgestellt. Der BioPortal-Webdienst wird unabhängig von REDCap betrieben und gepflegt, und alle Änderungen oder Aktualisierungen am BioPortal-Dienst (z. B. Hinzufügen neuer Ontologien oder Aktualisieren/Veralten bestehender Ontologien) werden vollständig von BioPortal durchgeführt. Weder REDCap noch Vanderbilt (das REDCap erstellt und pflegt) haben Einfluss oder Zuständigkeit in diesem Prozess. Wenn Sie eine konkrete Frage zum BioPortal-API-Webdienst oder zu einer bestimmten Funktion oder Ontologie haben, die dort gepflegt wird, können Sie BioPortal direkt per E-Mail unter support@bioontology.org kontaktieren."
