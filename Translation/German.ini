piping_107 = "Das Datum, an dem das angegebene Fragebogeninstrument für den aktuellen Datensatz/das aktuelle Event abgeschlossen wurde (enthält nur die Datumskomponente, anders als [survey-time-completed]). Das Format muss [survey-date-completed:instrument] sein, wobei 'instrument' der eindeutige Formularname des gewünschten Instruments ist. In einem Piping-Kontext, z. B. in einem Feldlabel, einer Fragebogeneinladung oder innerhalb des Action Tags @DEFAULT, wird das Format des Datums basierend auf den Datumsanzeigeeinstellungen des aktuellen Benutzers angezeigt. Wenn der Rohwert zurückgegeben werden soll, der stattdessen im Format 'YYYY-MM-DD' vorliegt und für bedingte Logik oder berechnete Felder besser geeignet wäre, hängen Sie einfach ':value' an. Wenn der Fragebogen nicht abgeschlossen wurde, wird ein leerer Wert zurückgegeben."
piping_108 = "Das Datum, an dem das angegebene Fragebogeninstrument für den aktuellen Datensatz/das aktuelle Event gestartet wurde (enthält nur die Datumskomponente, anders als [survey-time-completed]). Das Format muss [survey-date-started:instrument] sein, wobei 'instrument' der eindeutige Formularname des gewünschten Instruments ist. In einem Piping-Kontext, z. B. in einem Feldlabel, einer Fragebogeneinladung oder innerhalb des Action Tags @DEFAULT, wird das Format des Datums basierend auf den Datumsanzeigeeinstellungen des aktuellen Benutzers angezeigt. Wenn der Rohwert zurückgegeben werden soll, der stattdessen im Format 'YYYY-MM-DD' vorliegt und für bedingte Logik oder berechnete Felder besser geeignet wäre, hängen Sie einfach ':value' an. HINWEIS: Wenn die Startzeit ein leerer Wert ist, bedeutet dies, dass die Antwort in einer früheren REDCap-Version begonnen wurde, als Startzeiten noch nicht erhoben wurden."
