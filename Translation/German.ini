survey_1223 = "Hinweis: Da die e-Consent-Framework-Option auf dieser Seite aktiviert ist, wird die hier enthaltene PDF nicht die vollständige PDF sein, sondern die 'kompakte' PDF, die unbeantwortete Fragen und nicht ausgewählte Optionen auslässt."
survey_1224 = "Bitte nehmen Sie an dieser Umfrage teil."
survey_1225 = "Sie können im Textfeld Nachricht verfassen oben beliebigen Text ändern oder entfernen. Stellen Sie sicher, dass Sie entweder [survey-link] oder [survey-url] im Text einschließen, andernfalls hat der Teilnehmer keine Möglichkeit, die Umfrage auszufüllen."
survey_1226 = "Der <b>Umfragelink wird NICHT automatisch eingeschlossen</b> für die Einladungstypen 'E-Mail-Einladung' und 'SMS-Einladung (enthält Umfragelink)'. Daher müssen Sie sicherstellen, dass Sie entweder [survey-link] oder [survey-url] in den Text aufnehmen, andernfalls hat der Teilnehmer keine Möglichkeit, die Umfrage auszufüllen. Die anderen SMS-Einladungstypen stellen automatisch Standard-Anweisungstext bereit."
survey_1227 = "WARNUNG: Der öffentliche Umfragelink ist noch nicht verfügbar, weil das erste Instrument des Projekts nicht für das erste Event festgelegt wurde. Bitte verwenden Sie die Seite 'Instrumente für meine Events festlegen', um das erste Instrument für das erste Event festzulegen; danach können Sie hierher zurückkehren, um den öffentlichen Umfragelink abzurufen."
survey_1228 = "In Ihrem Umfragetext wurden fest codierte Umfragelinks gefunden. Es wird empfohlen, fest codierte Umfragelinks NICHT in den Text einzufügen, sondern <b>stattdessen [survey-link] als Platzhalter für den Umfragelink zu verwenden</b>. Es kann sein, dass diese Links aus zuvor gesendeten Einladungen stammen. Es wird DRINGEND empfohlen, die unten aufgeführten fest codierten Umfragelinks zu entfernen."
