data_entry_445 = "Erweiterung für 'File Upload'-Felder: Passwortprüfung & automatische externe Dateispeicherung"
data_entry_446 = "Diese Funktion ermöglicht jedem Projekt, zusätzliche Funktionalität für die Nutzung von File-Upload-Feldern im Projekt zu verwenden. Wenn sie unten und auch in einem Projekt aktiviert ist, wird jeder Benutzer, der eine Datei für ein File-Upload-Feld in einem Dateneingabeformular oder Fragebogen hochlädt, gebeten zu bestätigen, dass es die richtige Datei ist. Speziell in Dateneingabeformularen wird der Benutzer zusätzlich gebeten, im Rahmen des Prüfprozesses sein REDCap-Passwort einzugeben. Nach Bestätigung/Prüfung wird die Datei erfolgreich hochgeladen und zusätzlich zum normalen Speichern in REDCap wird eine Duplikatkopie der Datei auf einem sicheren externen Server gespeichert, wobei die unten definierten Konfigurationseinstellungen verwendet werden. Diese Funktion kann für Projekte genutzt werden, die bestimmte regulatorische Anforderungen erfüllen möchten, z. B. 21 CFR Part 11 für FDA-Studien. Hinweis: Diese Funktion ist standardmäßig für alle Projekte deaktiviert, aber Benutzer mit Rechten für 'Projekt-Setup & Design' können sie für ein Projekt im Popup Zusätzliche Anpassungen auf der Projekt-Setup-Seite aktivieren."
data_entry_448 = "Hinweis: Durch die Aktivierung hier wird dies NICHT automatisch in Projekten aktiviert. Es ist standardmäßig für alle Projekte deaktiviert. Benutzer mit Rechten für 'Projekt-Setup & Design' müssen diese Funktion im Popup Zusätzliche Anpassungen auf der Projekt-Setup-Seite aktivieren."
