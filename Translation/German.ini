openai_067 = "Antwort wird generiert..."
openai_068 = "Informationen zu KI-Sicherheit & Datenschutz"
openai_069 = "Die Implementierung von Artificial Intelligence (AI) in REDCap wurde mit strengen Sicherheits- und Datenschutzmaßnahmen entwickelt. Die sichere Verbindung von REDCap zum KI-Dienst wird vollständig von Ihrer Einrichtung und Ihrem lokalen REDCap-Team kontrolliert und verwaltet."
openai_070 = "KI-Dienste"
openai_071 = "Systemweite KI-Dienste aktivieren?"
openai_072 = "Sobald KI-Dienste hier aktiviert sind, können die einzelnen untenstehenden KI-Implementierungen aktiviert werden."
openai_074 = "Wenn aktiviert, erscheint in der Symbolleiste aller Rich-Text-Editoren in REDCap ein Zauberstab-Symbol (mit Ausnahme des Action Tags @RICHTEXT). Es erlaubt Benutzern, Text im Rich-Text-Editor zu verändern und zu verbessern, einschließlich Änderung von Länge, Ton, Leseniveau des Textes usw."
openai_076 = "Wenn aktiviert, erscheint neben Freitextfeldern in Reports ein Zauberstab-Symbol, mit dem Benutzer die Textwerte der Felder aus dem Report vom KI-Dienst zusammenfassen lassen können."
openai_077 = "Technische Details des verwendeten KI-Dienstes"
openai_081 = "Projekte, die eine KI-basierte Funktion genutzt haben"
openai_083 = "API-Schlüssel"
openai_086 = "Wenn KI-Dienste global auf der Seite Modules & Services Configuration aktiviert sind, können unten projektweite KI-Dienstwerte eingegeben werden, um eine spezifische KI-Ressource/einen spezifischen Endpunkt für dieses Projekt zu verwenden. Hinweis: Diese projektweiten Werte überschreiben alle möglicherweise definierten systemweiten Werte."
openai_087 = "REDCap kann Artificial Intelligence (AI) verwenden, um Benutzer bei bestimmten Aufgaben in der Anwendung zu unterstützen, die bestehende REDCap-Funktionen erweitern. Verwenden Sie die Einstellungen unten, um verschiedene KI-basierte Dienste in REDCap zu aktivieren und zu konfigurieren. Diese Funktionen werden durch Verbindung mit einem KI-Dienst implementiert, der über einen privaten Endpunkt in einem virtuellen Netzwerk bereitgestellt wird, das Ihre Einrichtung kontrolliert. Dadurch wird ein höchstes Maß an Sicherheit und Datenschutz gewährleistet."
openai_089 = "Zusätzliche Anweisungen: Beim Einrichten und Konfigurieren Ihres KI-Modells in Azure sollten Sie ein Modell verwenden, das mit 'gpt-4' oder 'gpt-35' beginnt. Wenn Sie nicht wissen, welches Sie verwenden sollen, konsultieren Sie die Online-OpenAI-Dokumentation in Azure."
