survey_1614 = "Sie können die Umfrageeinstellungen für *alle* Umfragen in einer einzelnen CSV-Datei importieren, die alle erforderlichen Spalten enthalten muss, jeweils mit einem gültigen Wert (siehe unten). Umfrageeinstellungen für Umfragen, die nicht in der Importdatei vertreten sind, behalten ihre bestehenden Einstellungen bei. Wenn Sie eine schnelle Vorlage für eine Importdatei für Umfrageeinstellungen benötigen, könnten Sie die Umfrage auf einem einzelnen Instrument im Projekt aktivieren und anschließend einen Export der Umfrageeinstellungen als Grundlage für Ihre eigene Importdatei für Umfrageeinstellungen durchführen (z. B. per Kopieren-und-Einfügen in einem Tabellenkalkulationsprogramm, um Umfrageeinstellungen für andere Instrumente zu erstellen)."
