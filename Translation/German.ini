project_settings_03 = "Wenn 'offline', wird normalen Benutzern der Zugriff auf das Projekt verweigert"
project_settings_04 = "OFFLINE"
project_settings_05 = "ONLINE"
project_settings_09 = "Namen der Kontaktpersonen (zur Referenz)"
project_settings_18 = "Erlaubt es, zwei Projektbenutzer als Dateneingabeperson Nr. 1 und Dateneingabeperson Nr. 2 festzulegen (über die Seite Benutzerrechte), und erlaubt ihnen, Datensätze mit demselben Namen zu erstellen und Daten für denselben Datensatz einzugeben, ohne die Daten der jeweils anderen Person zu sehen. Es kann jeweils nur eine Person gleichzeitig als Person Nr. 1 oder Nr. 2 festgelegt werden. Alle anderen Benutzer gelten als Prüfer. Prüfer können einen von Person Nr. 1 und Nr. 2 erstellten Datensatz zusammenführen, nachdem sie Unterschiede angesehen und diese Unterschiede mit dem Datenvergleichstool adjudiziert haben, wodurch ein dritter Datensatz im Set erstellt wird."
project_settings_29 = "Datumsverschiebungsoption zur De-Identifizierung: Bereich der Datumsverschiebung"
project_settings_30 = "Geben Sie die maximale Anzahl von Tagen für den Bereich der Datumsverschiebung an. (Der Bereich variiert von 0 bis zum eingegebenen Wert, wenn Daten mithilfe der Datumsverschiebung auf der Seite Datenexport-Tool exportiert werden.)"
project_settings_31 = "Tage"
project_settings_47 = "Benutzerdefinierter Text, der oben auf der Projekt-Startseite im Projekt angezeigt wird"
project_settings_48 = "Benutzerdefinierter Text, der oben auf allen Dateneingabeseiten im Projekt angezeigt wird"
project_settings_50 = "Automatische Berechnungen für Berechnungsfelder aktivieren?"
project_settings_51 = "Wenn aktiviert (Standard), werden serverseitige automatische Berechnungen für Berechnungsfelder durchgeführt, wenn Daten importiert werden (über Datenimport-Tool oder API) oder wenn ein Formular/eine Umfrage gespeichert wird, das bzw. die formularübergreifende oder eventübergreifende Berechnungen enthält. Wenn deaktiviert, werden Berechnungen nur durchgeführt, nachdem sie per JavaScript (clientseitig) auf dem Dateneingabeformular oder der Umfrageseite ausgeführt wurden, auf der sie sich befinden, und sie werden bei Datenimporten nicht durchgeführt."
project_settings_52 = "Tipp: Diese Einstellung sollte *nur* deaktiviert werden, wenn die automatischen Berechnungen beim Speichern von Daten zu einer übermäßigen Verlangsamung führen. Wenn sie deaktiviert ist, werden einige Berechnungen möglicherweise nicht durchgeführt und müssen dann gegebenenfalls mit Datenqualitätsregel H korrigiert werden."
project_settings_53 = "Shared Library für dieses Projekt aktivieren/deaktivieren?"
project_settings_54 = "Twilio-SMS- und Sprachanrufdienste für dieses Projekt aktivieren/deaktivieren?"
project_settings_55 = "Wenn deaktiviert, bleibt die Twilio-Option für alle Benutzer in diesem Projekt immer deaktiviert und ausgeblendet."
project_settings_56 = "Dieser Text wird nirgendwo im Projekt angezeigt und dient lediglich Verwaltungszwecken für dieses Projekt."
project_settings_57 = "Benutzerdefiniertes Logo und Text festlegen:"
project_settings_58 = "Sonstige Projekteinstellungen:"
project_settings_59 = "Verhindern, dass Verzweigungslogik Felder mit Werten ausblendet"
project_settings_62 = "Wenn diese Einstellung aktiviert ist, ändert sich das Verhalten der Verzweigungslogik so, dass Felder mit Werten nicht dazu führen, dass die Bestätigungsabfrage 'Wert des Feldes löschen?' den Benutzer fragt, ob er den Wert behalten oder das Feld ausblenden möchte. Stattdessen werden Felder mit Werten nicht durch die Verzweigungslogik ausgeblendet und bleiben sichtbar. Sie sind somit von der Verzweigungslogik ausgenommen. Dadurch wird verhindert, dass Daten gelöscht werden, wie es normalerweise geschieht, wenn Felder durch Verzweigungslogik ausgeblendet werden. HINWEIS: Diese Einstellung betrifft sowohl Dateneingabeformulare als auch Umfrageseiten."
project_settings_63 = "Wenn diese Einstellung nicht aktiviert ist (Standard), wird der Benutzer jedes Mal, wenn ein Feld durch Verzweigungslogik auf einem Dateneingabeformular ausgeblendet werden soll, gefragt, ob er das Feld ausblenden und seinen Wert löschen möchte. Auf Umfrageseiten hingegen wird der Wert des ausgeblendeten Feldes automatisch gelöscht, ohne dass die Bestätigungsabfrage angezeigt wird, was schon immer das Standardverhalten für Umfragen war."
project_settings_64 = "Projekteinstellungen bearbeiten"

