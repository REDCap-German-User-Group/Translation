em_manage_40 = "Verfügbare Module suchen"
em_manage_41 = "External Modules sind einzelne Softwarepakete, die von einem REDCap-Administrator heruntergeladen und installiert werden können. Module können REDCaps aktuelle Funktionalität erweitern und außerdem Anpassungen und Erweiterungen des bestehenden Verhaltens und Erscheinungsbilds von REDCap auf System- oder Projektebene bereitstellen."
em_manage_42 = "Als REDCap-Administrator können Sie jedes Modul aktivieren, das für dieses Project in REDCap installiert wurde. Einige Konfigurationseinstellungen müssen möglicherweise gesetzt werden; Administratoren oder Benutzer in diesem Project mit Project-Setup-/Design-Rechten können die Konfiguration eines Moduls jederzeit ändern, nachdem das Modul zuerst von einem Administrator aktiviert wurde. Hinweis: Normale Projektbenutzer können Module nicht aktivieren oder deaktivieren."
em_manage_44 = "Sie können auf den Button 'Module anzeigen' unten klicken, um zum REDCap Repo (Repository of External Modules) zu navigieren, einem zentralen Katalog kuratierter Module, die von verschiedenen REDCap-Partnereinrichtungen eingereicht wurden. Wenn Sie im Repository ein Modul finden, das Sie herunterladen möchten, können Sie es installieren, aktivieren und anschließend ggf. Konfigurationseinstellungen setzen. Wenn Sie das Modul nicht standardmäßig in allen REDCap-Projects aktivieren, müssen Sie zur External Modules-Seite im linken Menü eines bestimmten Projects navigieren, um es dort für dieses Project zu aktivieren. Einige projektbezogene Konfigurationseinstellungen müssen je nach Modul möglicherweise ebenfalls auf der Projektseite gesetzt werden."
em_manage_45 = "<b>HAFTUNGSAUSSCHLUSS:</b> Bitte beachten Sie, dass External Modules nicht Teil der REDCap-Software sind, sondern Add-on-Pakete, die in den meisten Fällen von Softwareentwicklern anderer REDCap-Institutionen erstellt wurden. Beachten Sie, dass das gesamte Risiko hinsichtlich Qualität und Leistung des Moduls bei seiner Nutzung in Ihrem REDCap-Project von Ihnen und Ihrem lokalen REDCap-Administrator getragen wird. Wenn Probleme mit einem Modul auftreten, sollte Ihr REDCap-Administrator den Autor dieses bestimmten Moduls kontaktieren."
em_manage_46 = "<b>HINWEIS:</b> Es wurde erkannt, dass Sie unter <code>{0}</code> eine Entwicklungsversion des External Module Framework installiert haben. Bitte beachten Sie daher, dass REDCap diese Version des Frameworks anstelle der in dieser REDCap-Version gebündelten Version verwendet."
