global_331 = "Projektadministratorgruppen"
global_332 = "Projektadministratorgruppen (PAGs) sind eine Funktion, mit der Projekte unter projektbezogenen Administratoren statt unter Systemadministratoren gruppiert werden. Standardmäßig bearbeitet ein Systemadministrator alle routinemäßigen Benutzeranfragen für ein bestimmtes Projekt, z. B. die Freigabe von Anfragen zur Projekterstellung, das Verschieben von Projekten in die Produktion, Änderungen im Entwurfsmodus usw. Mit Projektadministratorgruppen kann ein Projekt jedoch einer PAG zugewiesen werden. Danach können ein oder mehrere Benutzer als Projektadministrator für die PAG delegiert werden. Diese Projektadministratoren erhalten und bearbeiten alle Benutzeranfragen für die Projekte, die der PAG zugewiesen sind. PAGs sind eine effektive Möglichkeit, die Arbeitslast eines Systemadministrators zu verteilen, indem projektbezogene Benutzeranfragen an vertrauenswürdige, verantwortungsvolle Benutzer ausgelagert werden (die als \"Power User\" gelten könnten), die viel Erfahrung und Vertrautheit mit REDCap haben. Ein häufiger Anwendungsfall für PAGs wäre das Erstellen einer PAG für eine bestimmte Abteilung Ihrer Einrichtung, wobei ein erfahrener REDCap-Benutzer aus dieser Abteilung als Projektadministrator für die PAG fungieren kann. Hinweis: Eine Projektadministratorgruppe kann einen oder mehrere Projektadministratoren haben; Projekte und Benutzer können jedoch jeweils nur einer einzigen PAG zugewiesen werden. Außerdem kann ein Benutzer bei Bedarf als Projektadministrator für mehrere PAGs dienen."
