alerts_258 = "Es kann manchmal notwendig sein, einige oder alle Alarme & Benachrichtigungen für alle Datensätze im Project erneut auszuwerten. <b>Dies ist besonders nützlich, wenn die Bedingungen eines Alarms (in Schritt 1 des Alarm-Einrichtungsprozesses) geändert wurden, nachdem bereits Daten für einige Datensätze eingegeben wurden.</b> Durch die erneute Auswertung eines Alarms für alle Datensätze können diese auf den aktuellen Stand gebracht werden, auf dem sie gemäß den aktuellen Bedingungen des Alarms sein sollten. Die erneute Auswertung kann daher dazu führen, dass einige Benachrichtigungen gesendet und/oder geplant werden."
alerts_259 = "Wenn Sie unten Alarme auswählen und auf die Schaltfläche 'Erneut auswerten' klicken, beginnt der Prozess, jeden Alarm für *jeden* Datensatz im Project erneut auszuwerten. HINWEIS: Wenn Ihr Project Tausende von Datensätzen oder mehr enthält, kann der Prozess einige Minuten dauern; bitte lassen Sie ihn abschließen und verlassen Sie die Seite nicht, bis er abgeschlossen ist. Wenn ein Alarm bedingte Logik hat und die Option 'Vor dem Senden der Benachrichtigung sicherstellen, dass die Logik weiterhin wahr ist?' aktiviert ist, beachten Sie außerdem bitte, dass geplante (d. h. noch nicht gesendete) Benachrichtigungen während der erneuten Auswertung *möglicherweise* aufgehoben/entfernt werden, wenn die bedingte Logik für einen bestimmten Datensatz nicht mehr als WAHR ausgewertet wird."
alerts_260 = "Wählen Sie unten Alarme aus, um ihre Bedingungen erneut auszuwerten:"
alerts_261 = "<u>HINWEIS: Das erneute Auswerten von Alarmen ändert *NICHTS* an bereits geplanten Benachrichtigungen</u>, z. B. E-Mail-Text, Empfänger- oder Absenderadressen und Datum/Uhrzeit, zu dem die Benachrichtigung gesendet werden soll. <u>Das erneute Auswerten eines Alarms plant nur Benachrichtigungen, die noch nicht geplant wurden, aber geplant werden sollten</u>; umgekehrt werden alle aktuell geplanten Benachrichtigungen entfernt, die nicht geplant sein sollten (weil die Alarmbedingung nicht mehr als WAHR ausgewertet wird)."
alerts_262 = "Bitte beachten Sie, dass Benachrichtigungen kurz nach dem Klicken auf die untenstehende Schaltfläche gesendet werden, wenn sie auf 'Sofort' gesetzt sind. Wenn welche nach einer bestimmten Verzögerung gesendet werden sollen, basiert die Verzögerung darauf, wann Sie den Alarm erneut ausgewertet haben."
alerts_263 = "Der Alarm wird nicht erneut ausgelöst, wenn das Formular/die Umfrage erneut gespeichert wird, es sei denn, er ist in Schritt 2 unten auf Jedes Mal senden gesetzt."
alerts_264 = "WARNUNG: Es wird im Allgemeinen nicht empfohlen, 'Bedingte Logik verwenden...' in Schritt 1A zusammen mit der Option '...für jede Instanz eines wiederholten Instruments' in Schritt 1C zu verwenden. Wenn diese zusammen verwendet werden, bedeutet dies, dass dieser Alarm durch JEDE gespeicherte wiederholte Instanz für JEDES wiederholte Instrument im Project ausgelöst wird."
alerts_265 = "Die Funktion Alarme & Benachrichtigungen ermöglicht es Ihnen, Alarme zu erstellen und angepasste Benachrichtigungen zu senden. Diese Benachrichtigungen können an einen oder mehrere Empfänger gesendet und ausgelöst oder geplant werden, wenn ein Formular/eine Umfrage gespeichert wird und/oder basierend auf bedingter Logik, wenn Daten gespeichert oder importiert werden. Beim Hinzufügen/Bearbeiten eines Alarms müssen Sie 1) festlegen, wie der Alarm ausgelöst wird, 2) definieren, wann die Benachrichtigung gesendet werden soll (einschließlich wie oft), und 3) Empfänger, Absender, Nachrichtentext und weitere Einstellungen für die Benachrichtigung angeben. Für die Nachricht können Sie angepasste Optionen wie Rich Text, Piping von Feldvariablen (einschließlich Smart Variables) und das Hochladen mehrerer Dateianhänge verwenden."
