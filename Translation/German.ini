data_entry_497 = "Ermöglicht, dass eine PDF-Datei oder Bilddatei (JPG, JPEG, GIF, PNG, TIF, BMP), die in ein File-Upload-Feld hochgeladen wurde, inline auf der Fragebogenseite oder dem Dateneingabeformular angezeigt wird, sodass der Benutzer oder Fragebogenteilnehmer die PDF-/Bilddatei ansehen kann, ohne sie herunterladen zu müssen. Die PDF-/Bilddatei wird auf der Seite direkt über dem Download-Link für das Feld inline angezeigt und standardmäßig mit 100% Breite dargestellt (d. h. 100% der Breite des Bereichs, in dem sie enthalten ist). Bilder werden mit ihrem nativen Breite:Höhe-Verhältnis angezeigt, PDFs jedoch standardmäßig mit 300 Pixel Höhe. Wenn Sie Breite und/oder Höhe des Bildes/PDFs manuell festlegen möchten, können Sie die Breiten-/Höhenwerte nach dem Action Tag in Klammern angeben: @INLINE(width) oder @INLINE(width,height). Breite/Höhe können ein Prozentwert (z. B. 50%) oder eine Zahl für die Größe in Pixeln sein (z. B. 400). So zeigt @INLINE(50%) ein Bild mit 50% Größe für den Bereich an, in dem es sich auf der Seite befindet, und @INLINE(400,100) würde das Bild immer 400px hoch und 100px breit anzeigen. Um ein Inline-PDF auf der Seite höher erscheinen zu lassen, könnten Sie @INLINE(100%,600) verwenden, da 300px die Standardhöhe für Inline-PDFs ist. Hinweis: Das Action Tag @INLINE funktioniert auch, wenn das File-Upload-Feld in ein anderes Feld auf der Seite eingebettet ist."
data_entry_499 = "Bewirkt, dass eine oder mehrere angegebene Optionen für ein Checkbox-, Radio- oder Dropdown-Feld deaktiviert werden (d. h. angezeigt, aber nicht nutzbar), nachdem eine bestimmte Anzahl von Datensätzen mit dieser Option <u>nur für abgeschlossene Fragebogenantworten</u> gespeichert wurde. Das bedeutet, dass teilweise ausgefüllte Fragebogenantworten oder Daten, die nur über ein Dateneingabeformular eingegeben wurden (im Gegensatz zu einer Fragebogenseite), nicht gezählt werden. Beispielsweise würde @MAXCHOICE-SURVEY-COMPLETE(0=50,1=75,2=50) bedeuten, dass die mit '0' codierte Option, sobald 50 Datensätze sie in abgeschlossenen Fragebogenantworten ausgewählt haben, für jeden danach angezeigten Datensatz deaktiviert wird, der diese Option nicht gespeichert hat, etwa wenn das Formular/der Fragebogen für einen neuen Datensatz geöffnet wird; entsprechend 75 Datensätze für Option '1', 50 für Option '2' usw. Das Format besteht aus dem Namen des Action Tags gefolgt von den Optionsangaben in Klammern, wobei jede Angabe dem Format ChoiceCode=MaxCount folgt und die Optionen durch Kommas getrennt werden. Hinweis: Bei longitudinalen Projekten werden beim Zählen der für Datensätze gespeicherten Optionen alle Events getrennt behandelt. Im obigen Beispiel kann Option '0' also in JEDEM Event des Projekts maximal 50 Auswahlen haben."
data_entry_500 = "Ermöglicht, verschiedene Action Tags basierend auf bedingter Logik festzulegen, die in einer @IF()-Funktion angegeben wird - z. B. <code>@IF(CONDITION, ACTION TAGS if condition is TRUE, ACTION TAGS if condition is FALSE)</code>. Geben Sie einfach eine Bedingung mit normaler Logiksyntax an (ähnlich wie Verzweigungslogik), und je nachdem, ob diese Bedingung wahr oder falsch ist, wird der eine oder der andere Satz von Action Tags umgesetzt. Beispielsweise können Sie <code>@IF([yes_no] = '1', @HIDDEN, @HIDECHOICE='3' @READONLY)</code> verwenden. Dann wird @HIDDEN umgesetzt, wenn der Wert des Feldes 'yes_no' '1' ist; andernfalls werden die beiden Action Tags @HIDECHOICE='3' und @READONLY umgesetzt. Wenn Sie für eine bestimmte Bedingung keine Action Tags ausgeben möchten, setzen Sie als Platzhalter ein Paar Apostrophe/Anführungszeichen - z. B. <code>@IF([my_radio]='1', @READONLY, '')</code>. Sie können mehrere Instanzen von @IF für ein einzelnes Feld haben. Sie können auch mehrere verschachtelte Instanzen von @IF() ineinander haben. Sowohl Feldvariablen als auch Smart Variables können innerhalb der @IF-Bedingung verwendet werden. Das Action Tag @IF wird für ein bestimmtes Feld auch beim Herunterladen des PDFs eines Instruments/Fragebogens ausgewertet, falls PDF-spezifische Action Tags innerhalb von @IF() verwendet werden. Hinweis: Die bedingte Logik wird nur beim initialen Laden der Fragebogenseite oder des Dateneingabeformulars ausgewertet; die Action-Tag-Bedingungen werden daher nicht in Echtzeit ausgewertet, während Daten auf der Seite eingegeben werden."
