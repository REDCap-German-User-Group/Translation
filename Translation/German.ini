survey_1043 = "Sie können beliebige Designeinstellungen der aktuellen Umfrage in andere Umfragen in diesem Projekt kopieren. Markieren Sie die spezifischen Einstellungen, die Sie kopieren möchten, und wählen Sie dann die Umfragen aus, auf die diese Einstellungen angewendet werden sollen."
