system_config_831 = "Die URL, zu der authentifizierende Benutzer nach der Authentifizierung weitergeleitet werden. Dies ist typischerweise die REDCap-Basis-URL"
system_config_832 = "Die URL der Föderation, die das Authentifizierungstoken ausstellt. Dies sollte https://rapid.test.aaf.edu.au für Test-/Entwicklungsservices und https://rapid.aaf.edu.au für Produktionsservices sein."
system_config_833 = "Australian Access Federation (AAF)-Authentifizierungseinstellungen:"
system_config_834 = "Access URL (erforderlich)"
system_config_835 = "Audience URL (erforderlich)"
system_config_836 = "Issuer URL (erforderlich)"
system_config_837 = "Dieser Wert im AAF-Attribut eduPersonScopedAffiliation identifiziert einen lokalen Benutzer. Mehrere Einträge, ein Eintrag pro Zeile, können hier verwendet werden; ein Benutzer, dessen eduScopedPersonAffiliation-Attribut einem der angegebenen Identifikatoren entspricht, wird als lokal behandelt.<br><strong>Beispiel:</strong><br><code>staff@university1.edu.au<br>student@university2.edu.au</code><br>Siehe <a href='https://validator.aaf.edu.au/'>AAF Attribute Validator</a>, um Ihre eigenen Attribute als Referenz zu prüfen."
system_config_838 = "Lokalen Benutzern erlauben, Projekte zu erstellen/kopieren?"
system_config_839 = "Benutzer auf der Seite 'Email Users' anzeigen?"
system_config_840 = "AAF-Attribut, das als Benutzername verwendet wird"
system_config_841 = "Während AAF empfiehlt, eduPersonTargetedID als primären Identifikator eines Benutzers zu verwenden, da dieser im Gegensatz zu mail garantiert nie für eine Person geändert wird, wird das mail-Attribut am häufigsten als Benutzername verwendet. eduPersonTargetedID ist eine lange, nicht menschenlesbare Zeichenfolge. Von der Verwendung von cn (common name) oder displayname wird abgeraten, da dies zu Kollisionen zwischen Personen mit demselben Namen führen kann."
