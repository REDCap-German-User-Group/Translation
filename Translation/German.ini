edit_project_124 = "URL der Website:"
edit_project_125 = "Beispiel:"
edit_project_126 = "Entschuldigung, aber die eingegebene Webadresse scheint keine gültige URL zu sein (z. B. http://google.com). Bitte korrigieren Sie sie und versuchen Sie es erneut."
edit_project_127 = "Weitere Details anzeigen"
edit_project_128 = "In der HTTP-POST-Anfrage sendet REDCap die folgenden Parameter, um Kontext zum Datensatz bereitzustellen, der gerade erstellt/geändert wurde:"
edit_project_129 = "Die eindeutige ID-Nummer des REDCap-Projekts (d. h. der 'pid'-Wert in der URL beim Zugriff auf das Projekt in REDCap)."
edit_project_130 = "Der eindeutige Name des aktuellen Datenerhebungsinstruments (alle eindeutigen Instrumentnamen Ihres Projekts finden Sie in Spalte B des Data Dictionary)."
edit_project_131 = "Der Name des Datensatzes, der erstellt oder geändert wird; dies ist der Wert des ersten Felds des Projekts für den Datensatz"
edit_project_132 = "Der eindeutige Event-Name des Events, für das der Datensatz geändert wurde (nur für longitudinale Projekte)."
edit_project_133 = "Der eindeutige Gruppenname der Data Access Group, zu der der Datensatz gehört (falls der Datensatz zu einer Gruppe gehört)."
edit_project_134 = "Der Status des Datensatzes für dieses bestimmte Datenerhebungsinstrument, wobei der Wert 0, 1 oder 2 ist. Für Eingabeformulare gilt 0=Unvollständig, 1=Ungeprüft, 2=Vollständig. Für Fragebögen gilt 0=teilweise Fragebogenantwort und 2=abgeschlossene Fragebogenantwort. Der Name dieses Parameters ist der Variablenname des Statusfelds dieses bestimmten Instruments, also der Name des Instruments + '_complete'."
edit_project_135 = "Wenn die Namen Ihrer Datensätze (d. h. die Werte Ihres ersten Felds) als Identifikatoren gelten (z. B. SSN, MRN, Name), wird aus Sicherheitsgründen dringend empfohlen, für die URL des Dateneingabe-Triggers eine verschlüsselte Verbindung (d. h. SSL/HTTPS) zu verwenden."
edit_project_136 = "Dateneingabe-Trigger für alle Projekte aktivieren?"
edit_project_137 = "Wenn hier aktiviert, können Benutzer dies im Popup 'Zusätzliche Anpassungen' auf der Projekt-Setup-Seite ihres Projekts einrichten."
