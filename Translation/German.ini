ws_193 = "Nachdem Sie einen Wert für das Source-Identifier-Feld eingegeben haben, klicken Sie unten auf die Speichern-Schaltfläche, um den Wert zu speichern und automatisch mit dem Abrufen von Daten aus dem Quellsystem zu beginnen."
