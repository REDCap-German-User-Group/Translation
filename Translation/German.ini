upgrade_049 = "Nachdem Sie das Upgrade-Skript ausgeführt haben, fahren Sie unten mit Schritt 3 fort. Bitte beachten Sie, dass das Upgrade-Skript je nach Verarbeitungsgeschwindigkeit Ihres Servers und auch je nachdem, von welcher REDCap-Version auf welche Version Sie aktualisieren, mehrere Sekunden, mehrere Minuten oder mehrere Stunden benötigen kann, bis es vollständig ausgeführt ist. Die meisten kleinen Upgrades dauern oft nur wenige Sekunden. HINWEIS: Wenn Sie erwarten, dass das Upgrade-Skript lange läuft, etwa weil Sie viele Versionen auf einmal überspringen, ist Option B am besten, da dadurch Timeouts vermieden werden können, die manchmal beim Ausführen vieler Abfragen in bestimmten MySQL-Clients auftreten, besonders in webbasierten Clients (z. B. phpMyAdmin)."
upgrade_050 = "SQL-Upgrade-Skript wird erzeugt..."
