piping_28 = "Beispielausgabe"
piping_29 = "(nur longitudinal) Der Arm-Labeltext des aktuellen Arms."
piping_31 = "Die Nummer der wiederholten Instanz, die unmittelbar vor der aktuellen Instanz liegt (z. B. aktuelle Instanz minus 1). 'Instanz' bezieht sich auf die Instanz entweder eines wiederholten Instruments oder eines wiederholten Events."
piping_32 = "Die Nummer der wiederholten Instanz, die unmittelbar nach der aktuellen Instanz liegt (z. B. aktuelle Instanz plus 1). 'Instanz' bezieht sich auf die Instanz entweder eines wiederholten Instruments oder eines wiederholten Events."
piping_33 = "Die Nummer der wiederholten Instanz eines wiederholten Instruments oder eines wiederholten Events im aktuellen Kontext."
piping_34 = "Die erste (niedrigste) Nummer einer wiederholten Instanz für den aktuellen Datensatz-/Event-Kontext."
piping_35 = "Die letzte (höchste) Nummer einer wiederholten Instanz für den aktuellen Datensatz-/Event-Kontext."
;; piping_36 is appended to several repeating-instance Smart Variable descriptions.
piping_36 = "Hinweis: Dies kann eigenständig verwendet oder an eine Feldvariable angehängt werden."
;; piping_37 is appended to several event Smart Variable descriptions.
piping_37 = "Hinweis: Dies kann eigenständig verwendet oder einer Feldvariable vorangestellt werden."
piping_38 = "Event & Arm"
piping_39 = "Smart-Variable-Liste"
piping_40 = "Unten sind alle verfügbaren Smart Variables aufgeführt, jeweils mit Beschreibung und einem Beispiel, wie sie verwendet werden könnten. Bitte bedenken Sie: Auch wenn Smart Variables in Calc-Feldern, bedingter Logik und Piping verwendet werden können, bedeutet dies nicht, dass jedes Smart Variable an all diesen Stellen verwendet werden sollte. Beispielsweise werden Sie [survey-link] und [form-url] wahrscheinlich nur für Piping-Zwecke verwenden. Ebenso ist [is-survey] und [next-event-name] wahrscheinlich für Piping nie sinnvoll, sondern eher in bedingter Logik (höchstwahrscheinlich Branching Logic). Denken Sie also daran: Nur weil Sie Smart Variables an bestimmten Stellen verwenden *können*, bedeutet das nicht unbedingt, dass Sie es *sollten*."
piping_41 = "Datum und Uhrzeit, zu der das angegebene Fragebogeninstrument für den aktuellen Datensatz/das aktuelle Event abgeschlossen wurde. Das Format muss [survey-time-completed:instrument] sein, wobei 'instrument' der eindeutige Formularname des gewünschten Instruments ist. In einem Piping-Kontext, z. B. in einem Feldlabel, einer Fragebogeneinladung oder innerhalb des Action Tags @DEFAULT, wird das Format von Datum und Uhrzeit basierend auf den Anzeigeeinstellungen für Datum/Uhrzeit des aktuellen Benutzers angezeigt. Wenn der Rohwert zurückgegeben werden soll, der stattdessen im Format 'YYYY-MM-DD HH:MM:SS' vorliegt und für bedingte Logik oder berechnete Felder besser geeignet wäre, hängen Sie einfach ':value' an. Wenn der Fragebogen nicht abgeschlossen wurde, wird ein leerer Wert zurückgegeben."
;; piping_43 is used as a list item in a Smart Variables help section.
piping_43 = "Innerhalb des Action Tags @DEFAULT"
piping_44 = "Wichtig: Bei Verwendung als eigenständige Variable wird immer das Event zurückgegeben, das *unmittelbar* vor dem aktuellen Event liegt. Wenn sie dagegen einer anderen Variable vorangestellt wird, wird stattdessen das nächstliegende vorherige Event zurückgegeben, für das das Instrument des Feldes vorgesehen wurde. Dies kann sich vom Event direkt vor dem aktuellen Event unterscheiden. Dieses Verhalten liegt daran, dass das Instrument des Feldes möglicherweise nicht immer für das Event direkt vor dem aktuellen Event vorgesehen ist."
piping_45 = "Wichtig: Bei Verwendung als eigenständige Variable wird immer das Event zurückgegeben, das *unmittelbar* nach dem aktuellen Event liegt. Wenn sie dagegen einer anderen Variable vorangestellt wird, wird stattdessen das nächstliegende folgende Event zurückgegeben, für das das Instrument des Feldes vorgesehen wurde. Dies kann sich vom Event direkt nach dem aktuellen Event unterscheiden. Dieses Verhalten liegt daran, dass das Instrument des Feldes möglicherweise nicht immer für das Event direkt nach dem aktuellen Event vorgesehen ist."
piping_46 = "Der Name/das Label der Zugriffsgruppe, zu der der aktuelle Benutzer gehört (leer, wenn nicht in einer DAG)."
piping_47 = "Der Name/das Label der Zugriffsgruppe, zu der der aktuelle Datensatz gehört (leer, wenn nicht in einer DAG)."
piping_48 = "Ihr Fragebogeneinladungstext scheint den Fragebogenlink nicht zu enthalten, der entweder als [survey-link] oder [survey-url] in den Einladungstext eingefügt werden sollte. Ohne Link zum Fragebogen in Ihrer Einladung können Teilnehmer nicht zum Fragebogen navigieren, um ihn auszufüllen. Es wird dringend empfohlen, die Variable [survey-link] zu Ihrem Einladungstext hinzuzufügen, es sei denn, Sie möchten wirklich nicht, dass der Fragebogenlink in der E-Mail an den Teilnehmer erscheint. Möchten Sie den Fragebogenlink automatisch zum Einladungstext hinzufügen oder ihn unverändert lassen?"
piping_50 = "Unverändert ohne Fragebogenlink lassen"
piping_51 = "[survey-link] zum Text hinzufügen"
piping_52 = "Wichtig: Bei Verwendung als eigenständige Variable wird immer das erste Event für den aktuellen Arm zurückgegeben. Wenn sie dagegen einer anderen Variable vorangestellt wird, wird stattdessen das erste Event (für den aktuellen Arm) zurückgegeben, für das das Instrument des Feldes vorgesehen wurde. Dies kann sich vom allerersten Event unterscheiden. Dieses Verhalten liegt daran, dass das Instrument des Feldes möglicherweise nicht immer für das allererste Event vorgesehen ist."
piping_53 = "Wichtig: Bei Verwendung als eigenständige Variable wird immer das letzte Event für den aktuellen Arm zurückgegeben. Wenn sie dagegen einer anderen Variable vorangestellt wird, wird stattdessen das letzte Event (für den aktuellen Arm) zurückgegeben, für das das Instrument des Feldes vorgesehen wurde. Dies kann sich vom allerletzten Event unterscheiden. Dieses Verhalten liegt daran, dass das Instrument des Feldes möglicherweise nicht immer für das allerletzte Event vorgesehen ist."
piping_54 = "(nur longitudinal) Das erste Event (eindeutiger Eventname) für den aktuellen Arm."
piping_55 = "(nur longitudinal) Das letzte Event (eindeutiger Eventname) für den aktuellen Arm."
piping_56 = "(nur longitudinal) Das erste Event (das Event-Label, nicht der eindeutige Eventname) für den aktuellen Arm."
piping_57 = "(nur longitudinal) Das letzte Event (das Event-Label, nicht der eindeutige Eventname) für den aktuellen Arm."
piping_58 = "Die Projekt-ID (d. h. PID) des aktuellen REDCap-Projekts."
piping_59 = "Die Basis-Webadresse für diese REDCap-Installation."
piping_60 = "Die aktuelle REDCap-Versionsnummer dieser REDCap-Installation."
piping_61 = "Die Basis-Webadresse des aktuellen REDCap-Versionsverzeichnisses für diese REDCap-Installation."
piping_62 = "Die Basis-Webadresse für Fragebögen dieser REDCap-Installation."
piping_63 = "Vor- und Nachname des aktuellen Benutzers (wie auf seiner Profilseite aufgeführt)."
piping_64 = "Die primäre E-Mail-Adresse des aktuellen Benutzers (wie auf seiner Profilseite aufgeführt)."
piping_65 = "Der eindeutige Instrumentname des aktuellen Fragebogens oder Eingabeformulars. Gibt einen leeren Wert zurück, wenn kein Instrumentkontext vorhanden ist."
piping_66 = "Das Instrumentlabel des aktuellen Fragebogens oder Eingabeformulars. Gibt einen leeren Wert zurück, wenn kein Instrumentkontext vorhanden ist."
piping_67 = "Der Fragebogentitel des Instruments, das durch den Parameter 'instrument' angegeben wurde (falls angegeben). Wenn der Parameter 'instrument' nicht angegeben ist, wird das aktuelle Fragebogeninstrument verwendet; andernfalls wird ein leerer Wert zurückgegeben, wenn kein Instrument-/Fragebogenkontext vorhanden ist."
piping_68 = "Die Rollen-ID der Benutzerrolle, der der aktuelle Benutzer zugewiesen ist (leer, wenn keiner Benutzerrolle zugewiesen). Dieser Wert wird für jede Benutzerrolle automatisch generiert. HINWEIS: Dieser Wert ist nicht nur für alle Rollen innerhalb des Projekts eindeutig, sondern auch über alle REDCap-Projekte hinweg. Wenn das Projekt und seine Benutzerrollen kopiert werden, unterscheiden sich daher die Rollen-IDs der Benutzerrollen in der resultierenden Kopie von denen im Originalprojekt."
piping_69 = "Der eindeutige Rollenname der Benutzerrolle, der der aktuelle Benutzer zugewiesen ist (leer, wenn keiner Benutzerrolle zugewiesen). Dieser Wert wird für jede Benutzerrolle automatisch generiert. HINWEIS: Dieser Wert ist nur für Rollen innerhalb des Projekts eindeutig. Wenn das Projekt und seine Rollen kopiert werden, behält das neue Projekt daher dieselben eindeutigen Rollennamen. Dadurch können Sie die eindeutigen Rollennamen in bedingter Logik, Berechnungen, Branching Logic usw. verwenden, ohne dass sie beim Kopieren des Projekts brechen."
piping_70 = "Der Name/das Label der Benutzerrolle, der der aktuelle Benutzer zugewiesen ist (leer, wenn keiner Benutzerrolle zugewiesen). Dieser Wert wird vom Benutzer definiert, der die Benutzerrolle erstellt."
piping_71 = "(nur longitudinal) Die Event-ID-Nummer des aktuellen Events."
piping_72 = "Der Survey Access Code des angegebenen Fragebogens für einen bestimmten Datensatz/ein bestimmtes Event/eine bestimmte Instanz. Das Format muss [survey-access-code] oder [survey-access-code:instrument] sein, wobei 'instrument' der eindeutige Formularname des gewünschten Instruments ist. Dies kann im Inhalt einer Fragebogeneinladung einfach als [survey-access-code] verwendet werden, wobei 'instrument' als aktuelles Fragebogeninstrument angenommen wird."
piping_73 = "Der Survey Return Code des angegebenen Fragebogens für einen bestimmten Datensatz/ein bestimmtes Event/eine bestimmte Instanz, damit ein Teilnehmer bei Verwendung der Fragebogenfunktion 'Save & Return Later' zu einer abgeschlossenen oder teilweise abgeschlossenen Fragebogenantwort zurückkehren kann. Das Format muss [survey-return-code] oder [survey-return-code:instrument] sein, wobei 'instrument' der eindeutige Formularname des gewünschten Instruments ist. Dies kann im Inhalt einer Fragebogeneinladung einfach als [survey-return-code] verwendet werden, wobei 'instrument' als aktuelles Fragebogeninstrument angenommen wird."
piping_74 = "HINWEIS: Einladungstext enthält keine Variable [survey-link]"
piping_75 = "(nur longitudinal) Die ordinale Nummer des aktuellen Events, wie auf der Seite Define My Events aufgeführt, die die Reihenfolge des Events innerhalb eines bestimmten Arms angibt."
piping_76 = "Datum und Uhrzeit, zu der das angegebene Fragebogeninstrument für den aktuellen Datensatz/das aktuelle Event gestartet wurde (d. h. der initiale Zeitpunkt, zu dem die Fragebogenseite geöffnet wird). Das Format muss [survey-time-started:instrument] sein, wobei 'instrument' der eindeutige Formularname des gewünschten Instruments ist. In einem Piping-Kontext, z. B. in einem Feldlabel, einer Fragebogeneinladung oder innerhalb des Action Tags @DEFAULT, wird das Format von Datum und Uhrzeit basierend auf den Anzeigeeinstellungen für Datum/Uhrzeit des aktuellen Benutzers angezeigt. Wenn der Rohwert zurückgegeben werden soll, der stattdessen im Format 'YYYY-MM-DD HH:MM:SS' vorliegt und für bedingte Logik oder berechnete Felder besser geeignet wäre, hängen Sie einfach ':value' an. HINWEIS: Wenn die Startzeit ein leerer Wert ist, bedeutet dies, dass die Antwort in einer früheren REDCap-Version begonnen wurde, als Startzeiten noch nicht erhoben wurden."
piping_78 = "Die Zeitspanne, die seit dem Start des Fragebogens vergangen ist (zurückgegeben in den angegebenen Zeiteinheiten, Standard ist 's'), und die Differenz zwischen der Startzeit des Fragebogens und entweder 1) seiner Abschlusszeit (falls abgeschlossen) oder 2) der aktuellen Zeit (falls nicht abgeschlossen) darstellt. Optionen für 'units': 'y' (Jahre, 1 Jahr = 365,2425 Tage), 'M' (Monate, 1 Monat = 30,44 Tage), 'd' (Tage), 'h' (Stunden), 'm' (Minuten), 's' (Sekunden). Tipp: Der units-Wert sollte nicht in Apostrophe oder Anführungszeichen eingeschlossen werden. HINWEIS: Bei Verwendung von [survey-duration] in einem berechneten Feld oder @CALCTEXT-Feld ändert sich der Wert für teilweise abgeschlossene Fragebögen immer, bis der Fragebogen abgeschlossen ist. Daher ist der Wert in Reports oder Datenexporten möglicherweise nicht genau, es sei denn, Sie führen unmittelbar vorher Datenqualitätsregel H aus."
piping_79 = "Die Gesamtzeit, die zum Abschließen des Fragebogens benötigt wurde (zurückgegeben in den angegebenen Zeiteinheiten, Standard ist 's'), und die Differenz zwischen Startzeit und Abschlusszeit des Fragebogens darstellt. HINWEIS: Ein leerer Wert wird zurückgegeben, wenn der Fragebogen nicht abgeschlossen wurde. Optionen für 'units': 'y' (Jahre, 1 Jahr = 365,2425 Tage), 'M' (Monate, 1 Monat = 30,44 Tage), 'd' (Tage), 'h' (Stunden), 'm' (Minuten), 's' (Sekunden). Tipp: Der units-Wert sollte nicht in Apostrophe oder Anführungszeichen eingeschlossen werden."
piping_80 = "Eine neue, noch nicht erstellte wiederholte Instanz für den aktuellen Datensatz-/Event-Kontext, wobei [new-instance] im Wesentlichen [last-instance]+1 ist. Hinweis: Dies kann eigenständig verwendet werden oder alternativ durch Anhängen nur an die folgenden Smart Variables verwendet werden: [survey-link], [survey-url], [survey-access-code], [form-link] und [form-url]."
