data_entry_585 = "Wenn man Fragebogenteilnehmern erlauben möchte, ihre Antworten allein im Fragebogenmodus wiederholt einzugeben, können Sie die optionale Einstellung '<b>Fragebogen wiederholen</b>' unten auf der Seite Fragebogeneinstellungen aktivieren (im Abschnitt zu den Optionen für das Beenden des Fragebogens), *nachdem* ein Instrument als wiederholtes Instrument festgelegt wurde. Es ist also ein zusätzlicher Schritt nach dem Aktivieren des Instruments selbst als wiederholtes Instrument. Wenn die Einstellung Fragebogen wiederholen aktiviert ist, wird am Ende des Fragebogens ein Button angezeigt, über den der Teilnehmer eine weitere Antwort für den Fragebogen eingeben kann, sodass er den Fragebogen mehrmals hintereinander ausfüllen kann. Auf diese Weise kann er so viele Antworten für denselben Fragebogen eingeben wie benötigt, z. B. um Fragen zu mehreren Familienmitgliedern auszufüllen oder Medikamenteninformationen für mehrere Medikamente einzugeben. Alternativ können <b>Automated Survey Invitations (ASIs)</b> und <b>Alerts & Notifications</b> eingerichtet werden, um wiederholt in einem wiederkehrenden Intervall gesendet zu werden und Teilnehmer dazu zu bringen, einen wiederholten Fragebogen auszufüllen. Weitere Informationen zu wiederholten Fragebögen finden Sie unter"
data_entry_589 = "Dies ist eine MyCap-Annotation, die in jedem Feldtyp verwendet wird. <code>@MC-FIELD-HIDDEN</code> blendet ein Feld nur aus, wenn es in der mobilen MyCap-App angezeigt wird,
 während REDCaps Annotation <code>@HIDDEN</code> ein Feld sowohl in REDCap als auch in MyCap ausblendet. Beispiel: Wenn Sie ein berechnetes Feld haben, das in REDCap, aber nicht in MyCap angezeigt werden soll, verwenden Sie die Annotation <code>@MC-FIELD-HIDDEN</code>."
data_entry_590 = "Dies ist eine MyCap-Annotation, die mit Text- oder Notizfeldern verwendet wird. Verwenden Sie die Kamera des Geräts, um einen Barcode zu scannen. Inhalte werden in Ihrem Text-Box- oder Notes-Box-Feld gespeichert. Unterstützte Barcode-Symbologien: <a href=\"https://en.wikipedia.org/wiki/Aztec_Code\" target=\"_blank\">Aztec</a>, <a href=\"https://en.wikipedia.org/wiki/Code_39\" target=\"_blank\">CODE39</a>, <a href=\"https://en.wikipedia.org/wiki/Code_39\" target=\"_blank\">CODE39MOD43</a>, <a href=\"https://en.wikipedia.org/wiki/Code_93\" target=\"_blank\">CODE93</a>, <a href=\"https://en.wikipedia.org/wiki/Code_128\" target=\"_blank\">CODE128</a>, <a href=\"https://en.wikipedia.org/wiki/Data_Matrix\" target=\"_blank\">DataMatrix</a>, <a href=\"https://en.wikipedia.org/wiki/EAN-8\" target=\"_blank\">EAN8</a>, <a href=\"https://en.wikipedia.org/wiki/International_Article_Number\" target=\"_blank\">EAN13</a>, <a href=\"https://en.wikipedia.org/wiki/Interleaved_2_of_5\" target=\"_blank\">Interleaved2of5</a>, <a href=\"https://en.wikipedia.org/wiki/ITF-14\" target=\"_blank\">ITF14</a>, <a href=\"https://en.wikipedia.org/wiki/PDF417\" target=\"_blank\">PDF417</a>, <a href=\"https://en.wikipedia.org/wiki/QR_code\" target=\"_blank\">QR</a>, <a href=\"https://en.wikipedia.org/wiki/Universal_Product_Code#UPC-E\" target=\"_blank\">UCP-E</a>"
data_entry_591 = "Ein erforderliches MyCap-Textfeld, das an jedes MyCap-fähige Instrument in Projekten mit aktiviertem MyCap angehängt wird. Wenn Teilnehmer eine Aufgabe in der mobilen MyCap-App einreichen, wird dieses Feld mit der ID des Aufgabenergebnisses gefüllt. HINWEIS: Nur zur Verwendung in der mobilen MyCap-App."
data_entry_592 = "Ein erforderliches MyCap-Textfeld mit Validierungstyp \"Date\", das an jedes MyCap-fähige Instrument in Projekten mit aktiviertem MyCap angehängt wird. Wenn Teilnehmer eine Aufgabe in der mobilen MyCap-App einreichen, wird dieses Feld mit dem Datum gefüllt, an dem der Benutzer die Aufgabe begonnen hat. HINWEIS: Nur zur Verwendung in der mobilen MyCap-App."
data_entry_593 = "Ein erforderliches MyCap-Textfeld mit Validierungstyp \"Date\", das an jedes MyCap-fähige Instrument in Projekten mit aktiviertem MyCap angehängt wird. Wenn Teilnehmer eine Aufgabe in der mobilen MyCap-App einreichen, wird dieses Feld mit dem Datum gefüllt, an dem der Benutzer die Aufgabe abgeschlossen hat. HINWEIS: Nur zur Verwendung in der mobilen MyCap-App."
data_entry_594 = "Ein erforderliches MyCap-Textfeld mit Validierungstyp \"Date\", das an jedes MyCap-fähige Instrument in Projekten mit aktiviertem MyCap angehängt wird. Wenn Teilnehmer eine Aufgabe in der mobilen MyCap-App einreichen, wird dieses Feld gegebenenfalls mit dem Datum gefüllt, für das die Aufgabe geplant war. <code>.OneTime</code>- und <code>.Infinite</code>-Aufgaben haben kein Planungsdatum. HINWEIS: Nur zur Verwendung in der mobilen MyCap-App."
data_entry_595 = "Ein erforderliches MyCap-Dropdown-Feld, das an jedes MyCap-fähige Instrument in Projekten mit aktiviertem MyCap angehängt wird. Wenn Teilnehmer eine Aufgabe in der mobilen MyCap-App einreichen, wird in diesem Feld der Status des Aufgabenergebnisses ausgewählt. Mögliche Werte sind (0=Gelöscht, 1=Abgeschlossen, 2=Unvollständig). HINWEIS: Nur zur Verwendung in der mobilen MyCap-App."
data_entry_596 = "Ein erforderliches MyCap-Text-Box-Feld, das an jedes MyCap-fähige Instrument in Projekten mit aktiviertem MyCap angehängt wird. Wenn Teilnehmer eine Aufgabe in der mobilen MyCap-App einreichen, wird dieses Feld mit verfügbaren Zusatzdaten gefüllt. Diese liegen im JSON-Format vor. HINWEIS: Nur zur Verwendung in der mobilen MyCap-App."
data_entry_597 = "Ein erforderliches MyCap-Dateifeld, das an jedes MyCap-fähige Instrument in Projekten mit aktiviertem MyCap angehängt wird. Wenn Teilnehmer eine Aufgabe in der mobilen MyCap-App einreichen, wird in dieses Feld eine Datei mit Sicherungs-/Wiederherstellungsdaten hochgeladen. HINWEIS: Nur zur Verwendung in der mobilen MyCap-App."
data_entry_599 = "HINWEIS: Da einige Datenwerte auf dieser Seite geändert, aber noch nicht gespeichert wurden, kann das resultierende PDF sowohl gespeicherte als auch noch nicht gespeicherte Werte enthalten. Wenn Sie dies verstanden haben, klicken Sie auf OK, um fortzufahren."
