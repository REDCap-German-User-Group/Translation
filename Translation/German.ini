mycap_mobile_app_960 = "Siehe <a href='https://mobiletoolbox.org' target='_blank' style='text-decoration:underline;'>Mobile Toolbox</a> und <a href='https://mobiletoolbox.zendesk.com/hc/en-us/articles/37416322010260-Mobile-Toolbox-Data-Analysis' target='_blank' style='text-decoration:underline;'>MTB-Datenanalyse</a>."
mycap_mobile_app_961 = "Projekt beigetreten"
mycap_mobile_app_962 = "Projekt erneut beigetreten"
mycap_mobile_app_963 = "Projekt gelöscht"
mycap_mobile_app_964 = "Siehe <a href='https://projectmycap.org/wp-content/uploads/2025/04/Active-Tasks-Table.pdf' target='_blank' style='text-decoration:underline;'>ResearchKit Active Tasks</a>. Klicken Sie auf eine der Hinzufügen-Schaltflächen, um eine vordefinierte aktive Aufgabe zu erstellen. Alle erforderlichen REDCap-Felder werden automatisch erstellt. <b>ÄNDERN SIE</b> die Felder im Instrument NICHT mit dem Online Designer.<br> Die meisten aktiven Aufgaben werden von Drittanbieter-Programmierern und Forschenden entwickelt. MyCap-Entwickler haben diese aktiven Aufgaben hinzugefügt, besitzen aber keine Expertise zu den zurückgegebenen Ergebnissen. Es liegt an Ihnen sicherzustellen, dass Sie die zurückgegebenen Ergebnisse verstehen. MyCap-Entwickler helfen so weit wie möglich."
mycap_mobile_app_965 = "Mehr erfahren über <a href='https://projectmycap.org/wp-content/uploads/2025/04/Active-Tasks-Table.pdf' target='_blank' style='text-decoration:underline;'>in MyCap unterstützte aktive Aufgaben</a>."
mycap_mobile_app_966 = "Bitte wählen Sie ein Baseline-Datum-Feld aus Zusätzliche Einstellungen -> Baseline-Datum-Einstellungen."
mycap_mobile_app_967 = "Verhindern, dass Teilnehmende in MyCap die Sprache wechseln (empfohlen)"
mycap_mobile_app_968 = "Ihr Projekt hat MTB-Aufgaben in Englisch und Spanisch. Es wird empfohlen, dass Teilnehmende Aufgaben nur in einer Sprache abschließen. Die Funktion Multi-Language Management (MLM) kann verwendet werden, um sicherzustellen, dass Teilnehmende Aufgaben in einer einzigen Sprache abschließen. Aktivieren Sie dafür beide Sprachen im MLM für dieses Projekt. Es sind keine zusätzlichen Einrichtungsschritte oder Übersetzungen erforderlich. MyCap weist Teilnehmenden automatisch Aufgaben in ihrer bevorzugten Sprache zu, wenn sie dem Projekt beitreten.<br><br>Die obige Einstellung verhindert, dass Teilnehmende nach dem Beitritt die Sprache wechseln. Wenn diese Option deaktiviert wird, könnten Teilnehmende dieselbe Aufgabe in mehreren Sprachen abschließen."
mycap_mobile_app_969 = "Mehr über die Verwendung von MTB-Aufgaben in mehreren Sprachen erfahren"
mycap_mobile_app_970 = "Die Funktion Multi-Language Management kann verwendet werden, um englische und spanische MTB-Aufgaben zu filtern (z. B. erscheint nur die spanische Version von Aufgaben, wenn der Teilnehmer Spanisch als bevorzugte Sprache auswählt). Aktivieren Sie dafür beide Sprachen im MLM für dieses Projekt. Es sind keine zusätzlichen Einrichtungsschritte oder Übersetzungen erforderlich. MyCap weist Teilnehmenden automatisch Aufgaben in ihrer bevorzugten Sprache zu, wenn sie dem Projekt beitreten. <br>Standardmäßig und wie von den MTB-Entwicklern empfohlen, können Teilnehmende die Sprache in der App nicht wechseln, um zu verhindern, dass sie dieselbe Aufgabe in mehreren Sprachen abschließen. Um diese Einstellung zu verwalten, gehen Sie zu <b>Online Designer > Zusätzliche Einstellungen</b>."
mycap_mobile_app_971 = "Geben Sie unten den benutzerdefinierten E-Mail-Text ein, der an die Projektbenutzer gesendet werden soll. Sie können den E-Mail-Inhalt personalisieren. Alle dynamischen Variablen werden automatisch durch entsprechende Informationen in der E-Mail ersetzt."
mycap_mobile_app_972 = "Dynamische Variablen: Projekttitel: <b>[project-name]</b>, URL des Posteingangs: <b>[mycap-inbox-url]</b>"
