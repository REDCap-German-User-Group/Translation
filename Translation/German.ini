multilang_685 = "Diese Sprache zusätzlich mit dieser Systemsprache verknüpfen"
multilang_686 = "<b>Hinweis</b>: Sobald mit einer Systemsprache verknüpft, kann dies nicht rückgängig gemacht werden."
multilang_687 = "Diese Seite bietet eine Übersicht über die MLM-Nutzung in Projekten. Klicken Sie auf einen Projektlink, um dieses Projekt in einem neuen Browser-Tab zu öffnen. Klicken Sie auf eine PID, um zur Einstellungsseite dieses Projekts zu gelangen. Bewegen Sie den Mauszeiger über Zählwerte, um weitere Details zu sehen, und klicken Sie, um zur MLM-Setup-Seite dieses Projekts zu gelangen. <i>Hinweis:</i> Sie können nach Projektsprachen oder Statussymbolen anhand ihres Labels suchen."
