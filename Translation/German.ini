multilang_790 = "<i>{0:FieldType}:</i> Auswahl-Labels sind fest und können nicht feldweise übersetzt werden (siehe Übersetzungen der <i>Benutzeroberfläche</i>)."
multilang_791 = "Außerdem enthalten Snapshots im Projektstatus <code>PRODUCTION</code> keine Entwurfsänderungen."
multilang_792 = "Hinweis: Der Standardtext verwendet <i>Feldeinbettung</i>. Achten Sie darauf, eingebettete Felder in der Übersetzung beizubehalten!"
multilang_793 = "Jedes Mal, wenn Entwurfsänderungen genehmigt werden, sowie beim erstmaligen Verschieben in Produktion, wird jedoch automatisch ein Snapshot erstellt."
multilang_794 = "(Optional) Feld zum Speichern der Sprachpräferenz festlegen"
multilang_795 = "Verwenden Sie diese Funktion, um ein Feld als Quelle für die Sprachpräferenz eines Teilnehmers festzulegen, die verwendet wird, wenn keine andere Quelle (z. B. ein Browser-Cookie von einem früheren Besuch) verfügbar ist. Dieses Feld muss ein Radio- oder Dropdown-Feld sein, dessen Auswahlmöglichkeiten jeweils einer Sprach-<code>ID</code> aus der obigen Tabelle entsprechen. Alternativ kann ein Textfeld ohne Feldvalidierung verwendet werden. Der Wert dieses Feldes kann manuell über Dateneingabe/Datenimport oder mit den Action Tags <code>@LANGUAGE-CURRENT-FORM/SURVEY</code> gesetzt werden. Wenn ein festgelegtes Feld gesetzt wurde, bestimmt sein Wert die Sprache, die beim ersten Besuch einer Fragebogenseite durch einen Umfragebefragten anfänglich angezeigt wird, sowie, besonders wichtig, die Sprache für serverseitige Prozesse, bei denen keine andere Quelle für Sprachpräferenz verfügbar ist, z. B. beim Rendern automatisierter Umfrageeinladungen, Alarme und PDFs."
multilang_796 = "<b>Dies ist die Basissprache.</b> Elemente können hier nicht bearbeitet werden, können aber auf der Seite <i>Alerts & Notifications</i> geändert werden. Sie können hier jedoch einzelne Alarme von der Übersetzung ausschließen. <b>Um mit der Übersetzung des Textes der Basissprache zu beginnen oder fortzufahren, klicken Sie oben auf einen Sprachbutton.</b>"
multilang_797 = "<b>Dies ist die Basissprache.</b> Elemente können hier nicht bearbeitet werden, können aber im <i>Online Designer</i> (oder per <i>Data Dictionary</i>-Upload) und auf der Seite <i>Survey Settings</i> geändert werden. Felder und einzelne Umfrageeinstellungen können hier jedoch von der Übersetzung ausgeschlossen werden. <b>Um mit der Übersetzung des Textes der Basissprache zu beginnen oder fortzufahren, klicken Sie oben auf einen Sprachbutton.</b>"
multilang_798 = "Systemsprachen können unten definiert werden; anschließend stehen sie für den Import in jedes Projekt ausschließlich für Benutzeroberflächenübersetzungen zur Verfügung. Das Ändern von Sprachen auf dieser Seite wirkt sich nicht auf bestehende Projekte aus, sondern nur auf künftig erstellte Projekte. Die Basissprache ist die Sprache, die angezeigt wird, wenn keine Benutzersprachpräferenz gefunden wird."
multilang_799 = "Verwenden Sie diese Seite, um zu verwalten, welche Instrumente übersetzt werden, getrennt nach Dateneingabe- und Fragebogenmodus. Verwenden Sie sie außerdem zur Navigation zu den verschiedenen Unterseiten, z. B. Feldausschlüssen (nur Basissprache) oder Übersetzungen von Feldelementen (Labels usw.), Umfrageeinstellungen (Titel, Anweisungen usw.) und ASI-E-Mails."
multilang_800 = "Für die Basissprache gibt es keine einzustellenden Optionen. Bitte wählen Sie eine andere Sprache."
multilang_801 = "Die Basissprache ist als diejenige Sprache definiert, die zur Einrichtung des Data Dictionary des Projekts verwendet wurde (d. h. was im Online Designer angezeigt wird). Eine Basissprache muss immer definiert sein, obwohl es möglich ist, sie dem Benutzer nicht anzubieten (indem ihr <i>Aktiv</i>-Status ausgeschaltet wird). Beachten Sie außerdem, dass eine Sprache standardmäßig für Instrumente im Dateneingabe- und Fragebogenmodus ausgeschaltet ist, sofern sie nicht ausdrücklich eingeschaltet wird."
multilang_802 = "Verwenden Sie die Sprachtabelle, um zu steuern, welche Sprachen im Codebook angezeigt werden, indem Sie auf die entsprechenden Checkboxen klicken. Die Basissprache wird immer angezeigt. Tipp: Schalten Sie alle Sprachen mit der Checkbox in der Kopfzeile der Sprachtabelle ein oder aus. '{0}' kennzeichnet eine fehlende Übersetzung."
multilang_803 = "<b>Dies ist die Basissprache.</b> Auf diesem Tab gibt es keine Elemente, die für die Basissprache bearbeitet werden können.<br><i>Bitte wählen Sie eine andere Sprache.</i>"
multilang_804 = "Nur dieses Formular exportieren"
multilang_805 = "Wenn dieses Action Tag auf einem Feld einer Fragebogenseite vorhanden ist und Multi-Language Management mit mindestens zwei aktiven Sprachen aktiv ist, bleibt das Sprachauswahlmenü auf dieser Fragebogenseite jederzeit sichtbar (d. h. es klappt nicht ein, nachdem ein Sprachbutton angeklickt wurde)."
multilang_806 = "End Users' Guide (PDF)"
multilang_807 = "Weitere Details zur Funktionsweise von MLM finden Sie im {0:LinkStart}Manual (PDF){1:LinkEnd} (öffnet in neuem Tab)."
multilang_808 = "Die verwendete Sprach-ID wird in MyCap nicht unterstützt. Bitte bestätigen Sie, dass Sie die Sprach-ID für Sprachen verwenden, die MyCap unterstützt. Die ersten Zeichen (vor einem Bindestrich, falls verwendet) in der Sprach-ID müssen einer der in MyCap unterstützten Sprachen entsprechen. Wenn Sie eine Sprache oder Sprach-ID verwenden, die von MyCap nicht unterstützt wird, erscheinen Ihre Fragebogenfragen zwar übersetzt, aber die Benutzeroberfläche der App (z. B. Buttons, Header, Tabs) wird nicht übersetzt."
multilang_809 = "Dialogtext zum Sperren/Entsperren"
