survey_1197 = "Für WebDAV muss der Hostname mit http:// oder https:// beginnen (z. B. https://ebldav.mc.vanderbilt.edu), für SFTP jedoch nicht (z. B. sftp.vumc.org). SFTP nimmt immer Port 22 an, während WebDAV Port 80 oder 443 verwendet."
