api_docs_107 = "Metadaten exportieren (Data Dictionary)"
api_docs_108 = "Mit dieser Methode können Sie die Metadaten eines Projekts exportieren"
api_docs_109 = "Metadaten aus dem Projekt (d. h. Data-Dictionary-Werte) im angegebenen Format, sortiert nach Feldreihenfolge"
api_docs_110 = "Der Variablenname eines Feldes. Standardmäßig werden alle Felder zurückgegeben; wenn field angegeben wird, werden nur die Export-Feldnamen für dieses Feld exportiert. Wenn der angegebene Feldname ungültig ist, wird ein Fehler zurückgegeben."
api_docs_111 = "csv, json, xml - gibt das Format von Fehlermeldungen an. Wenn Sie dieses Flag nicht übergeben, wird das Standardformat anhand des übergebenen Flags 'format' ausgewählt; wenn kein format-Flag übergeben wurde, wird standardmäßig 'xml' verwendet. Die zurückgegebene Liste enthält den ursprünglichen Feldnamen (Variable) des Feldes sowie die Export-Feldnamen dieses Feldes."
api_docs_112 = "Liste der Export-Feldnamen exportieren (d. h. Variablen, die bei Exporten und Importen verwendet werden)"
api_docs_113 = "Diese Methode gibt eine Liste der export-/importspezifischen Version von Feldnamen für alle Felder (oder auf Wunsch für ein einzelnes Feld) in einem Projekt zurück. Dies wird meist für Checkbox-Felder verwendet, da Checkbox-Felder bei Datenexporten und Datenimporten einen anderen Variablennamen verwenden als den exakt im Online Designer und Data Dictionary definierten. Dabei wird *jede Checkbox-Option* als eigener Export-Feldname im folgenden Format dargestellt: field_name + dreifacher Unterstrich + umgewandelter codierter Wert der Auswahl. Für Nicht-Checkbox-Felder entspricht der Export-Feldname exakt dem ursprünglichen Feldnamen. Hinweis: Die folgenden Feldtypen werden automatisch aus der von dieser Methode zurückgegebenen Liste entfernt, da sie beim Datenimport nicht verwendet werden können: 'calc', 'file' und 'descriptive'."
api_docs_114 = "Die zurückgegebene Liste enthält für jedes Feld/jede Auswahl die drei folgenden Attribute: 'original_field_name', 'choice_value' und 'export_field_name'. Das Attribut choice_value stellt den roh codierten Wert einer Checkbox-Auswahl dar. Für Nicht-Checkbox-Felder ist das Attribut choice_value immer leer. Das Attribut export_field_name stellt die export-/importspezifische Version dieses Feldnamens dar."
api_docs_115 = "Gibt eine Liste der export-/importspezifischen Version von Feldnamen für alle Felder (oder auf Wunsch für ein einzelnes Feld) in einem Projekt im angegebenen Format und sortiert nach Feldreihenfolge zurück. Die zurückgegebene Liste enthält für jedes Feld/jede Auswahl die drei folgenden Attribute: 'original_field_name', 'choice_value' und 'export_field_name'. Das Attribut choice_value stellt den roh codierten Wert einer Checkbox-Auswahl dar. Für Nicht-Checkbox-Felder ist das Attribut choice_value immer leer. Das Attribut export_field_name stellt die export-/importspezifische Version dieses Feldnamens dar."
api_docs_116 = "die Datensatz-ID"
api_docs_117 = "der Name des Feldes, das die Datei enthält"
api_docs_118 = "der eindeutige Event-Name - nur für longitudinale Projekte"
api_docs_119 = "Eine Datei exportieren"
api_docs_120 = "Mit dieser Methode können Sie ein Dokument herunterladen, das an einen einzelnen Datensatz für ein Datei-Upload-Feld angehängt wurde. Bitte beachten Sie, dass diese Methode auch für Signaturfelder verwendet werden kann (d. h. Datei-Upload-Felder mit Validierungstyp 'signature')."
api_docs_121 = "Hinweis zu Exportrechten: "
api_docs_122 = "Bitte beachten Sie, dass die Benutzerrechte für den Datenexport auf diese API-Anfrage angewendet werden. Wenn Sie im Projekt beispielsweise Datenexportrechte 'Kein Zugriff' haben, schlägt der API-Dateiexport fehl und gibt einen Fehler zurück. Wenn Sie Datenexportrechte 'De-identifiziert' oder 'Alle Identifikatorfelder entfernen' haben, schlägt der API-Dateiexport *nur dann* fehl und gibt einen Fehler zurück, wenn das Datei-Upload-Feld als Identifikatorfeld markiert wurde. Um sicherzustellen, dass Ihre API-Anfrage keinen Fehler zurückgibt, sollten Sie im Projekt Exportrechte für den 'Vollständigen Datensatz' haben."
api_docs_123 = "der Inhalt der Datei"
api_docs_124 = "So erhalten Sie den Dateinamen der Datei: "
api_docs_125 = "Der MIME-Typ der Datei sowie der Name der Datei und ihre Erweiterung befinden sich im Header der zurückgegebenen Antwort. Um diese Attribute der exportierten Datei zu ermitteln, müssen Sie daher den Antwort-Header parsen. Beispiel: content-type = application/vnd.openxmlformats-officedocument.wordprocessingml.document; name='FILE_NAME.docx'"
api_docs_126 = "der Name des Feldes, das die Datei enthält"
api_docs_127 = "der eindeutige Event-Name - nur für longitudinale Projekte"
api_docs_128 = "der Inhalt der Datei"
api_docs_129 = "Eine Datei importieren"
api_docs_130 = "Mit dieser Methode können Sie ein Dokument hochladen, das an einen einzelnen Datensatz für ein Datei-Upload-Feld angehängt wird. Bitte beachten Sie, dass diese Methode NICHT für Signaturfelder verwendet werden kann (d. h. Datei-Upload-Felder mit Validierungstyp 'signature'), da eine Signatur nur über die Weboberfläche erfasst und gespeichert werden kann."
api_docs_131 = "Mit dieser Methode können Sie ein Dokument entfernen, das an einen einzelnen Datensatz für ein Datei-Upload-Feld angehängt wurde. Bitte beachten Sie, dass diese Methode auch für Signaturfelder verwendet werden kann (d. h. Datei-Upload-Felder mit Validierungstyp 'signature')."
api_docs_132 = "Eine Datei löschen"
api_docs_133 = "Instrumente exportieren (Dateneingabeformulare)"
api_docs_134 = "Mit dieser Methode können Sie eine Liste der Datenerhebungsinstrumente eines Projekts exportieren. Dazu gehören ihr eindeutiger Instrumentname, wie er in der zweiten Spalte des Data Dictionary steht, sowie das zugehörige Instrument-Label, das im linken Menü eines Projekts bei der Dateneingabe angezeigt wird. Die Instrumente werden gemäß ihrer Reihenfolge im Projekt sortiert."
api_docs_135 = "Instrumente für das Projekt im angegebenen Format; sie werden gemäß ihrer Reihenfolge im Projekt sortiert."
api_docs_136 = "die Datensatz-ID. Der Wert ist standardmäßig leer. Wenn record leer ist, wird die PDF leer zurückgegeben (d. h. ohne Daten). Wenn record angegeben ist, wird ein einzelnes Instrument oder alle Instrumente mit Daten nur aus diesem Datensatz zurückgegeben."
api_docs_137 = "der eindeutige Event-Name - nur für longitudinale Projekte. Bei einem longitudinalen Projekt gilt: Wenn record nicht leer und event leer ist, werden Daten für alle Events aus diesem Datensatz zurückgegeben. Wenn record nicht leer und event nicht leer ist, werden nur Daten für das angegebene Event aus diesem Datensatz zurückgegeben."
api_docs_138 = "der eindeutige Instrumentname, wie er in der zweiten Spalte des Data Dictionary steht. Der Wert ist standardmäßig leer, wodurch alle Instrumente zurückgegeben werden. Wenn record nicht leer und instrument leer ist, werden alle Instrumente für diesen Datensatz zurückgegeben."
api_docs_139 = "[Der Wert dieses Parameters spielt keine Rolle und wird ignoriert.] Wenn dieser Parameter mit einem beliebigen Wert übergeben wird, werden alle Instrumente (und bei longitudinalen Projekten alle Events) mit Daten aus allen Datensätzen exportiert. Hinweis: Wenn dieser Parameter übergeben wird, werden die Parameter record, event und instrument ignoriert."
api_docs_140 = "csv, json, xml [Standard] - returnFormat wird nur hinsichtlich des Formats etwaiger zurückgegebener Fehlermeldungen verwendet."
api_docs_141 = "PDF-Datei von Datenerhebungsinstrumenten exportieren (entweder leer oder mit Daten)"
api_docs_142 = "Mit dieser Methode können Sie eine PDF-Datei für Folgendes exportieren: 1) ein einzelnes Datenerhebungsinstrument (leer), 2) alle Instrumente (leer), 3) ein einzelnes Instrument (mit Daten aus einem einzelnen Datensatz), 4) alle Instrumente (mit Daten aus einem einzelnen Datensatz) oder 5) alle Instrumente (mit Daten aus ALLEN Datensätzen). Dies ist dieselbe PDF-Datei, die aus einem Dateneingabeformular eines Projekts in der Weboberfläche heruntergeladen werden kann. Zusätzlich werden die Berechtigungen des Benutzers hinsichtlich Datenexporten hier genauso angewendet wie beim Herunterladen der PDF in der Weboberfläche (z. B. werden bei de-identifizierten Datenexportrechten Daten aus bestimmten Feldern in der PDF entfernt). Wenn der Benutzer Datenexportrechte 'Kein Zugriff' hat, kann er diese Methode nicht verwenden, und es wird ein Fehler zurückgegeben."
api_docs_143 = "Eine PDF-Datei, die ein oder alle Datenerhebungsinstrumente aus dem Projekt enthält. Die Instrumente sind je nach den in der API-Anfrage übergebenen Parametern leer (keine Daten), enthalten Daten aus einem einzelnen Datensatz oder enthalten Daten aus allen Datensätzen des Projekts."
api_docs_144 = "die Datensatz-ID. Der Name des Datensatzes im Projekt."
api_docs_145 = "der eindeutige Instrumentname, wie er in der zweiten Spalte des Data Dictionary steht. Dieses Instrument muss im Projekt als Umfrage aktiviert sein."
api_docs_146 = "der eindeutige Event-Name (nur für longitudinale Projekte)."
api_docs_147 = "Einen Umfrage-Link für einen Teilnehmer exportieren"
api_docs_148 = "Diese Methode gibt einen eindeutigen Umfrage-Link (d. h. eine URL) im Klartextformat für einen angegebenen Datensatz und ein Datenerhebungsinstrument (und bei longitudinalen Projekten ein Event) in einem Projekt zurück. Wenn der Benutzer keine Berechtigung für 'Survey Distribution Tools' hat, kann er diese Methode nicht verwenden, und es wird ein Fehler zurückgegeben. Wenn das angegebene Datenerhebungsinstrument im Projekt nicht als Umfrage aktiviert wurde, wird ein Fehler zurückgegeben."
api_docs_149 = "Gibt einen eindeutigen Umfrage-Link (d. h. eine URL) im Klartextformat für den angegebenen Datensatz und das Instrument (und bei longitudinalen Projekten das Event) zurück."
api_docs_150 = "Einen Survey-Queue-Link für einen Teilnehmer exportieren"
api_docs_151 = "Diese Methode gibt einen eindeutigen Survey-Queue-Link (d. h. eine URL) im Klartextformat für den angegebenen Datensatz in einem Projekt zurück, das die Survey-Queue-Funktion verwendet. Wenn der Benutzer keine Berechtigung für 'Survey Distribution Tools' hat, kann er diese Methode nicht verwenden, und es wird ein Fehler zurückgegeben. Wenn die Survey-Queue-Funktion im Projekt nicht aktiviert wurde, wird ein Fehler zurückgegeben."
api_docs_152 = "Gibt einen eindeutigen Survey-Queue-Link (d. h. eine URL) im Klartextformat für den angegebenen Datensatz im Projekt zurück."
api_docs_153 = "der eindeutige Instrumentname, wie er in der zweiten Spalte des Data Dictionary steht. Dieses Instrument muss im Projekt als Umfrage aktiviert sein."
api_docs_154 = "Einen Umfrage-Rückkehrcode für einen Teilnehmer exportieren"
api_docs_155 = "Diese Methode gibt einen eindeutigen Rückkehrcode im Klartextformat für einen angegebenen Datensatz und ein Datenerhebungsinstrument (und bei longitudinalen Projekten ein Event) in einem Projekt zurück. Wenn der Benutzer keine Berechtigung für 'Survey Distribution Tools' hat, kann er diese Methode nicht verwenden, und es wird ein Fehler zurückgegeben. Wenn das angegebene Datenerhebungsinstrument im Projekt nicht als Umfrage aktiviert wurde oder die Funktion 'Save & Return Later' nicht aktiviert hat, wird ein Fehler zurückgegeben."
api_docs_156 = "Gibt einen eindeutigen Rückkehrcode im Klartextformat für den angegebenen Datensatz und das Instrument (und bei longitudinalen Projekten das Event) zurück."
api_docs_157 = "der eindeutige Instrumentname, wie er in der zweiten Spalte des Data Dictionary steht. Dieses Instrument muss im Projekt als Umfrage aktiviert sein."
api_docs_158 = "der eindeutige Event-Name (nur für longitudinale Projekte)."
api_docs_159 = "Eine Umfrage-Teilnehmerliste exportieren"
api_docs_160 = "Diese Methode gibt die Liste aller Teilnehmer für ein bestimmtes Umfrageinstrument (und bei einem longitudinalen Projekt für ein bestimmtes Event) zurück. Wenn der Benutzer keine Berechtigung für 'Survey Distribution Tools' hat, kann er diese Methode nicht verwenden, und es wird ein Fehler zurückgegeben. Wenn das angegebene Datenerhebungsinstrument im Projekt nicht als Umfrage aktiviert wurde, wird ein Fehler zurückgegeben."
api_docs_161 = "Gibt die Liste aller Teilnehmer für das angegebene Umfrageinstrument [und Event] im gewünschten Format zurück. Die folgenden Felder werden zurückgegeben: email, email_occurrence, identifier, invitation_sent_status, invitation_send_time, response_status, survey_access_code, survey_link. Das Attribut 'email_occurrence' stellt die aktuelle Anzahl dar, wie oft die E-Mail-Adresse in der Liste vorkommt (da E-Mails mehr als einmal verwendet werden können); somit bilden email + email_occurrence ein eindeutiges Wertepaar. 'invitation_sent_status' ist '0', wenn noch keine Einladung an den Teilnehmer gesendet wurde, und '1', wenn sie gesendet wurde. 'invitation_send_time' ist Datum/Uhrzeit, zu der die nächste Einladung gesendet wird, und leer, wenn keine Einladung zum Versand geplant ist. 'response_status' gibt an, ob der Teilnehmer auf die Umfrage geantwortet hat; der Wert ist 0, 1 oder 2 für 'No response', 'Partial' bzw. 'Completed'. Hinweis: Wenn eine falsche event_id oder ein falscher Instrumentname verwendet wird oder das Instrument nicht als Umfrage aktiviert wurde, wird ein Fehler zurückgegeben."
api_docs_162 = "ein Array von Arm-Nummern, für die Sie Events abrufen möchten (standardmäßig werden alle Events abgerufen)"
api_docs_163 = "Events exportieren"
api_docs_164 = "Mit dieser Methode können Sie die Events eines Projekts exportieren"
api_docs_165 = "Dies funktioniert nur für longitudinale Projekte."
api_docs_166 = "Events für das Projekt im angegebenen Format"
api_docs_167 = "Arms exportieren"
api_docs_168 = "Mit dieser Methode können Sie die Arms eines Projekts exportieren"
api_docs_170 = "Arms für das Projekt im angegebenen Format"
api_docs_171 = "Instrument-Event-Zuordnungen exportieren"
api_docs_172 = "Mit dieser Methode können Sie die Instrument-Event-Zuordnungen eines Projekts exportieren (d. h. wie Datenerhebungsinstrumente bestimmten Events in einem longitudinalen Projekt zugewiesen sind)."
api_docs_173 = "Instrument-Event-Zuordnungen für das Projekt im angegebenen Format"
api_docs_174 = "Benutzer exportieren"
api_docs_175 = "Mit dieser Methode können Sie die Liste der Benutzer eines Projekts exportieren, einschließlich ihrer Benutzerrechte sowie E-Mail-Adresse, Vorname und Nachname. Hinweis: Wenn der Benutzer einer Benutzerrolle zugewiesen wurde, wird der Benutzer mit den in der Rolle definierten Rechten zurückgegeben."
api_docs_180 = "Projektinformationen exportieren"
api_docs_181 = "Mit dieser Methode können Sie einige grundlegende Attribute eines bestimmten REDCap-Projekts exportieren, z. B. den Projekttitel, ob es longitudinal ist, ob Umfragen aktiviert sind, wann das Projekt erstellt und in Produktion verschoben wurde usw."
api_docs_182 = "Attribute des Projekts im angegebenen Format. Boolesche Werte werden entweder als '0' (nein/false) oder '1' (ja/true) dargestellt. Außerdem werden alle Datums-/Uhrzeitwerte im Format Y-M-D H:M:S zurückgegeben. Die folgenden Attribute werden zurückgegeben:"
api_docs_183 = "REDCap-Version exportieren"
api_docs_184 = "Diese Methode gibt die aktuelle REDCap-Versionsnummer als Klartext zurück (z. B. 4.13.18, 5.12.2, 6.0.0)."
api_docs_185 = "die aktuelle REDCap-Versionsnummer (drei Zahlen, getrennt durch zwei Punkte) als Klartext - z. B. 4.13.18, 5.12.2, 6.0.0"
api_docs_186 = "Hinweis zu Exportrechten: "
api_docs_187 = "Mit dieser Methode können Sie Arms aus einem Projekt löschen. Hinweis: Aufgrund der destruktiven Natur dieser Methode ist sie nur für Projekte im Entwicklungsstatus verfügbar. Beachten Sie außerdem, dass beim Löschen eines Arms automatisch auch alle zu diesem Arm gehörenden Events gelöscht werden, ebenso automatisch alle Datensätze/Daten, die unter diesem Arm erhoben wurden (dies ist ein nicht rückgängig zu machender Datenverlust)."
api_docs_188 = "Arms löschen"
api_docs_189 = "Anzahl gelöschter Arms"
api_docs_190 = "ein Array von Arm-Nummern, die Sie löschen möchten"
api_docs_191 = "Arms importieren"
api_docs_192 = "Mit dieser Methode können Sie Arms in ein Projekt importieren oder bestehende Arms in einem Projekt umbenennen. Sie können den Parameter override=1 als Aktion 'alles löschen + importieren' verwenden, um alle bestehenden Arms im Projekt zu löschen, während neue Arms importiert werden."
api_docs_193 = "Anzahl importierter Arms"
api_docs_194 = "Events löschen"
api_docs_195 = "Mit dieser Methode können Sie Events aus einem Projekt löschen. Hinweis: Aufgrund der destruktiven Natur dieser Methode ist sie nur für Projekte im Entwicklungsstatus verfügbar. Beachten Sie außerdem, dass beim Löschen eines Events automatisch alle Datensätze/Daten gelöscht werden, die unter diesem Event erhoben wurden (dies ist ein nicht rückgängig zu machender Datenverlust)."
api_docs_197 = "Anzahl gelöschter Events"
api_docs_198 = "Events importieren"
api_docs_199 = "Mit dieser Methode können Sie Events in ein Projekt importieren oder Attribute bestehender Events aktualisieren, z. B. den Event-Namen, den Tagesversatz usw. Der eindeutige Event-Name eines Events kann nicht geändert werden, da er von REDCap automatisch generiert wird. Bitte beachten Sie, dass ein bestehendes Event nur aktualisiert werden kann, indem das Attribut unique_event_name angegeben wird. Wenn das Attribut unique_event_name bei einem importierten Event fehlt (wenn override=0), wird angenommen, dass es sich um ein neues Event handelt, das erstellt werden soll."
api_docs_200 = "Anzahl importierter Events"
api_docs_201 = "Instrument-Event-Zuordnungen importieren"
api_docs_202 = "Mit dieser Methode können Sie Instrument-Event-Zuordnungen in ein Projekt importieren (dies entspricht der Seite 'Designate Instruments for My Events' im Projekt)."
api_docs_203 = "Anzahl importierter Instrument-Event-Zuordnungen"
api_docs_204 = "Metadaten importieren (Data Dictionary)"
api_docs_205 = "Mit dieser Methode können Sie Metadaten (d. h. Data Dictionary) in ein Projekt importieren. Hinweis: Aufgrund der destruktiven Natur dieser Methode ist sie nur für Projekte im Entwicklungsstatus verfügbar."
api_docs_206 = "Anzahl importierter Felder"
api_docs_207 = "Ein neues Projekt erstellen"
api_docs_208 = "Mit dieser Methode können Sie ein neues REDCap-Projekt erstellen. Für diese Methode ist ein 64-stelliges Super-API-Token erforderlich (im Gegensatz zu API-Methoden auf Projektebene, die ein reguläres 32-stelliges Token benötigen, das dem Projekt-Benutzer zugeordnet ist). In der API-Anfrage müssen Sie beim Erstellen eines Projekts mindestens die Projektattribute 'project_title' und 'purpose' angeben (mit numerischem Wert 0=Practice/Just for fun, 1=Other, 2=Research, 3=Quality Improvement, 4=Operational Support)."
api_docs_210 = "Benutzer importieren"
api_docs_211 = "Mit dieser Methode können Sie neue Benutzer in ein Projekt importieren und dabei ihre Benutzerrechte setzen oder die Rechte bestehender Benutzer im Projekt aktualisieren."
api_docs_212 = "Anzahl hinzugefügter oder aktualisierter Benutzer"
api_docs_213 = "Einführung"
api_docs_214 = "API-Tokens erhalten"
api_docs_215 = "API-Fehlercodes und Antworten"
api_docs_216 = "API-Sicherheit und Best Practices"
api_docs_217 = "API-Beispiele"
api_docs_218 = "REDCap-API-Dokumentation"
api_docs_219 = "Allgemeine API-Informationen"
api_docs_220 = "Unterstützte Methoden"
api_docs_221 = "Wenn ein Projekt erstellt wird, wird ein 32-stelliges API-Token auf Projektebene zurückgegeben (dem Projekt und dem Benutzer zugeordnet, der das Projekt erstellt). Dieses Token könnte dann für nachfolgende API-Aufrufe an dieses Projekt verwendet werden, etwa um neue Events, Felder, Datensätze usw. hinzuzufügen."
api_docs_222 = "Das Super-API-Token, das spezifisch für einen Benutzer ist"
api_docs_223 = "0 - false [Standard], 1 - true"
api_docs_224 = "Diese Methode ist nur für Projekte im Entwicklungsstatus verfügbar."
api_docs_225 = "Hinweis: Aufgrund der destruktiven Natur des Parameters 'override' darf diese Methode override=1 nur für Projekte im Entwicklungsstatus verwenden."
api_docs_226 = "Die Methode gibt alle unten aufgeführten Attribute zu Benutzerrechten im angegebenen Format zurück. Bitte beachten Sie, dass das Attribut 'forms' das einzige Attribut ist, das Unterelemente enthält (eines für jedes Datenerhebungsinstrument), wobei jedes Formular seinen eigenen Form-Rights-Wert hat (siehe Schlüssel unten, um zu erfahren, wofür jeder numerische Wert steht). Die meisten Benutzerrechte-Attribute sind boolesch (0=No Access, 1=Access). Zurückgegebene Attribute:"
api_docs_227 = "SCHLÜSSEL:"
api_docs_228 = "Benutzer und Benutzerrechte"
api_docs_229 = "Andere Attributwerte: 0=No Access, 1=Access."
api_docs_230 = "Wenn mit dieser Methode ein Projekt erstellt wird, erhält das Projekt automatisch alle projektweiten Standardwerte, so als hätten Sie ein neues leeres Projekt über die Weboberfläche erstellt. Dazu gehören das automatische Erstellen eines einzelnen Datenerhebungsinstruments, das mit einem einzelnen Record-ID-Feld und einem Formularstatusfeld vorbelegt ist, sowie (bei longitudinalen Projekten) ein Arm mit einem Event. Wenn Sie direkt nach dem Erstellen des Projekts eigene Arms oder Events erstellen möchten, wird empfohlen, in der Methode 'Arms importieren' bzw. 'Events importieren' den Parameter override=1 zu verwenden, damit der Standard-Arm und das Standard-Event entfernt werden, wenn Sie Ihre eigenen hinzufügen. Außerdem wird der Benutzer, der das Projekt erstellt, automatisch als Benutzer mit vollständigen Benutzerrechten und einem API-Token auf Projektebene zum Projekt hinzugefügt; dieses Token kann dann für nachfolgende API-Anfragen auf Projektebene verwendet werden."
api_docs_231 = "HINWEIS: Nur Benutzer mit Super-API-Tokens können diese Methode verwenden. Ein Super-Token kann Benutzern nur von einem REDCap-Administrator gewährt werden (über die Seite API-Tokens im REDCap Control Center). Bitte beachten Sie, dass Benutzer mit einem Super-API-Token neue REDCap-Projekte über die API erstellen können, ohne dass eine Genehmigung durch einen REDCap-Administrator erforderlich ist. Wenn Sie ein Super-Token erhalten möchten, wenden Sie sich bitte an Ihren lokalen REDCap-Administrator."
