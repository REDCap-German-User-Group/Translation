system_config_124 = "Das REDCap-DTS-Modul erlaubt, Daten aus externen Systemen (z. B. elektronische Krankenakte, elektronisches Data Warehouse) in REDCap-Projekte zu übertragen, und stellt einen Entscheidungsprozess bereit, bei dem REDCap-Benutzer alle eingehenden Daten aus DTS genehmigen, bevor sie offiziell in ihrem REDCap-Projekt gespeichert werden. DTS muss vorher installiert und konfiguriert werden, damit es funktioniert, wenn es auf dieser Seite aktiviert wird. Nachdem DTS hier global aktiviert wurde, kann es auf der Seite Projekteinstellungen bearbeiten für einzelne REDCap-Projekte aktiviert werden. Für Installations- und Einrichtungsanweisungen wenden Sie sich bitte an die Entwickler der Oregon Health & Science University, die DTS erstellt haben."
system_config_125 = "Das REDCap-DTS-Modul für dieses spezifische REDCap-Projekt aktivieren. Nachdem DTS installiert, konfiguriert und für dieses Projekt aktiviert wurde, erscheint auf der Seite Meine Projekte ein neuer Link, der Benutzer darüber informiert, ob neue Daten aus dem externen System entschieden werden müssen."
system_config_126 = "DTS kann für kein REDCap-Projekt aktiviert werden, bis die globale DTS-Einstellung auf der Seite Modules Configuration im Control Center aktiviert wurde."
