mobile_app_20 = "Unten sind alle Notfall-Datendump-Dateien (Datenexporte) aufgeführt, die von der Mobile App für dieses Projekt gesendet wurden. Diese werden oft gesendet, wenn etwas verhindert hat, dass die App Daten auf normalem Weg an den Server zurücksendet (d. h. Escape Hatch). Sie können auf das Dateisymbol rechts klicken, um die Datei herunterzuladen."
