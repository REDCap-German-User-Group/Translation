;; ws_203 is concatenated with the source-system name in a FHIR access error.
ws_203 = ", oder der Benutzer wurde möglicherweise nicht zur FHIR-Benutzer-Allowlist hinzugefügt oder hat REDCap nie aus dem Inneren von"
;; ws_204 is concatenated with a contact label/link at the end of the FHIR access error.
ws_204 = "Sie können keine Daten anzeigen oder adjudizieren, die aus dem EHR-System stammen. Obwohl Ihnen in diesem Project Benutzerrechte zum Adjudizieren von Daten aus dem EHR gegeben wurden, wurde festgestellt, dass entweder 1) Sie nicht zur FHIR-Benutzer-Allowlist hinzugefügt wurden oder 2) Sie REDCap nie aus dem EHR-System heraus gestartet haben. Sobald eines von beidem erfolgt ist, sollten Sie CDP-Daten aus dem EHR adjudizieren können. Wenn Sie glauben, dass dies ein Fehler ist, wenden Sie sich bitte an Ihren"
ws_205 = "DDP-Adjudizierungsanweisungen anzeigen"
ws_207 = "REDCap kann mit jedem EHR (elektronisches Patientenaktensystem) kommunizieren, das 'SMART on FHIR'-Webservices implementiert hat, die Interoperabilität und Datenextraktion aus dem EHR ermöglichen. Auf diese Weise kann REDCap innerhalb einer EHR-Benutzeroberfläche eingebettet und gestartet werden (z. B. Cerner, Epic Hyperspace). Dies ermöglicht REDCap-Benutzern, Patienten einfach zu ihren Projects hinzuzufügen und/oder auf Patientendaten innerhalb eines REDCap-Projects zuzugreifen. Zusätzlich zum Starten von REDCap innerhalb des EHR kann REDCap mit einer Funktion namens 'Clinical Data Pull' (CDP) auch Daten aus dem EHR extrahieren, um klinische Daten in ein REDCap-Project zu importieren. CDP bietet einen Adjudizierungsprozess, bei dem REDCap-Benutzer alle eingehenden Daten aus dem EHR genehmigen können, bevor die Daten offiziell in ihrem REDCap-Project gespeichert werden."
;; ws_210 is concatenated with the EHR/source-system name in headers.
ws_210 = "Clinical Data Pull von"
ws_211 = "Was ist 'Clinical Data Pull' (CDP)?"
ws_212 = "Clinical Data Pull ist eine spezielle Funktion zum Importieren von Daten aus einem EHR (elektronisches Patientenaktensystem), z. B. Epic, Cerner usw., nach REDCap. Sie bietet einen Adjudizierungsprozess, bei dem REDCap-Benutzer alle eingehenden Daten aus dem EHR genehmigen können, bevor sie offiziell in ihrem REDCap-Project gespeichert werden. Clinical Data Pull kann nur von einem REDCap-Administrator aktiviert werden. Wenden Sie sich daher an ihn, wenn Sie Clinical Data Pull für dieses Project verwenden möchten."
;; ws_213 is concatenated with the EHR/source-system name.
ws_213 = "Clinical Data Pull einrichten von"
ws_214 = "Benutzerdefinierter Name für das EHR-System"
ws_216 = "Sobald Clinical Data Pull für das System aktiviert ist, kann es für ein bestimmtes Project von einem Administrator auf der Project-Setup-Seite des Projects (im Abschnitt 'optionale Module und Anpassungen') aktiviert werden. Außerdem können Benutzer, die REDCap aus dem EHR-System heraus starten, über die EHR-Oberfläche auf ihre Clinical-Data-Pull-Projects zugreifen."
ws_217 = "Patienten-Identifier-Zeichenfolge des EHR für Medical Record Numbers (optional)"
ws_218 = "Die meisten EHRs verwenden Medical Record Number nicht als Backend-Namenskonvention für Patienten. In diesem Fall müssen Sie einen System-Identifier angeben, den REDCap verwendet, um die MRN jedes Patienten aus einem FHIR-Datenbündel abzurufen."
ws_219 = "Client-ID und Client Secret für die FHIR-App/den FHIR-Client, die/der für REDCap im EHR erstellt wurde"
ws_220 = "Dies sind im Wesentlichen ein Benutzername und API Key, die REDCap verwendet, um über SMART-on-FHIR-Services mit Ihrem EHR zu kommunizieren. Diese Client-Werte müssen wahrscheinlich von Ihrem technischen EHR-Team für Sie erzeugt werden."
ws_221 = "Client-ID:"
ws_222 = "Client Secret:"
ws_223 = "Secret anzeigen"
ws_224 = "FHIR-Webservice-URLs"
ws_225 = "Der Basis-URL-Endpunkt sollte Ihnen von Ihrem technischen EHR-Team bereitgestellt worden sein."
ws_226 = "FHIR Token URL:"
ws_227 = "FHIR Authorize URL:"
ws_228 = "FHIR Base URL:"
ws_229 = "Die Token- und Authorize-URLs können häufig mithilfe der oben angegebenen Basis-URL gefunden werden, indem Sie unten auf die Schaltfläche 'Auto-find' klicken. Wenn die Auto-find-Methode nicht erfolgreich ist, müssen Token URL und Authorize URL unten von Ihrem technischen EHR-Team bereitgestellt werden."
ws_230 = "HINWEIS: Dies ist *kein* FHIR-Webservice, sondern ein unabhängiger Webservice, der von Ihrer Einrichtung erstellt wurde, um zu validieren, ob REDCap-Benutzer Zugriff auf Ihr EHR-System haben."
ws_231 = "Token URL und Authorize URL automatisch finden"
ws_232 = "(Stellen Sie sicher, dass das Client Secret der geheime Wert selbst ist und nicht der gespeicherte Hash-Wert des Secrets.)"
ws_233 = "Weitere Einstellungen"
ws_234 = "EHR-spezifische und FHIR-spezifische Einstellungen"
ws_235 = "Dies ist der Name des EHR-Systems, wie er dem Benutzer angezeigt wird. Wenn leer gelassen, wird stattdessen einfach 'EHR' angezeigt."
ws_236 = "Setup-Anweisungen und technische Spezifikationen (ZIP)"
ws_237 = "Redirect URL (zu Ihrer FHIR-App/Ihrem FHIR-Client für REDCap hinzufügen)"
ws_238 = "Kopieren Sie die Redirect URL und stellen Sie sie Ihrem technischen EHR-Team bereit, damit sie zu Ihrer FHIR-App/Ihrem FHIR-Client hinzugefügt wird."
ws_239 = "Redirect URL (schreibgeschützt):"
ws_240 = "benutzerdefiniert"
ws_243 = "HINWEIS: Bevor Benutzer die Data-Mart-Funktion verwenden können, <b>muss ein REDCap-Administrator in ihr Benutzerkonto auf der Seite Benutzer durchsuchen gehen und sie für ihr Konto aktivieren</b>. Zusätzlich kann ein Benutzer diese Funktion erst verwenden, nachdem er sich zuerst aus der EHR-Benutzeroberfläche heraus bei REDCap angemeldet hat. Dies ist vor der Verwendung jeglicher Clinical-Data-Pull-Funktionalität erforderlich."
ws_245 = "WARNUNG: Für dieses Feld wurden mehrere Werte gefunden. Da es jedoch weder ein zeitbezogenes Feld noch ein Checkbox-Feld ist, kann es nur einen Datenwert aufnehmen. Daher müssen die anderen Datenwerte verworfen werden."
ws_246 = "Die unten aufgeführten Fehler sind beim Abrufen von Daten aus dem EHR aufgetreten. Sie sollten ggf. mit Ihrem lokalen EHR-Ansprechpartner über dieses Problem sprechen, um es zu beheben."
ws_247 = "EMPFEHLUNG: Dieses Feld sollte wahrscheinlich in ein Checkbox-Feld umgewandelt werden, damit alle seine Datenwerte dafür importiert werden können."
ws_248 = "Wie 'Clinical Data Pull' funktioniert"
ws_249 = "Clinical Data Pull kann Daten aus dem EHR-System sowohl manuell in Echtzeit als auch automatisch in regelmäßigen Abständen abrufen. Aus der EHR-Oberfläche heraus kann Clinical Data Pull neue Datensätze in einem CDP-aktivierten REDCap-Project erstellen. Wenn ein Benutzer außerdem den Patienten-Identifier kennt (z. B. Medical Record Number), kann er optional die MRN für einen Datensatz in einem CDP-aktivierten REDCap-Project eingeben, woraufhin die Patientendaten sofort in Echtzeit aus dem EHR abgerufen werden."
ws_251 = "DDP Custom"
ws_252 = "Zeitstempel des Quellsystems von GMT in lokale Serverzeit umwandeln?"
ws_253 = "Ja, Zeitstempel von GMT in lokale Zeit umwandeln"
ws_254 = "Nein, Zeitstempel unverändert lassen"
ws_255 = "Wenn das Quellsystem zeitbezogene Daten mit Service-Daten/-Datetimes ausgibt, die in Greenwich Mean Time (GMT) vorliegen, korrigiert die Einstellung 'Ja' automatisch alle zugehörigen Zeitstempel, sodass sie im Adjudizierungs-Pop-up in lokaler Zeit erscheinen."
ws_256 = "Hinweis: Sie sollten dies nur auf 'Ja' setzen, wenn Sie absolut verifizieren können, dass die mit eingehenden Datenwerten verknüpften Zeitstempel in GMT-Zeit und nicht in lokaler Zeit vorliegen. Wenn dies außerdem aktiviert wird, nachdem bereits Daten aus dem externen System in ein Project abgerufen wurden, werden deren Zeitstempel nicht rückwirkend korrigiert; es wirkt sich nur auf danach importierte neue Daten aus."
ws_257 = "Mehr über dieses Modul erfahren: "
ws_258 = "Es gibt einige Demografiefelder (Ethnie/Rasse, Geschlecht und Ethnizität), die, wenn sie in einem Project verwendet werden, ihre Auswahlmöglichkeiten auf eine ganz bestimmte Weise codiert haben müssen. Unten sind die Codierungen aufgeführt, die für diese Felder verwendet werden sollten."
ws_260 = "HINWEIS: Die URL endet nicht mit /metadata, sondern typischerweise ähnlich wie /FHIR/DSTU2/."
ws_262 = "Clinical Data Interoperability Services"
ws_265 = "Clinical Data Pull"
ws_266 = "Informationsseite zur Verwendung von Clinical Data Pull (zur Bereitstellung für Benutzer)"
ws_267 = "Zu aktivierende Services:"
ws_268 = "Um Clinical Data Pull (CDP) für ein REDCap-Project zu verwenden, wenden Sie sich bitte an Ihren REDCap-Administrator bezüglich des erforderlichen Prozesses und der notwendigen Verfahren, damit CDP für das Project aktiviert wird und eine Person die Autorisierung zur Verwendung von CDP erhält."
ws_269 = "Dieser Text wird oben im CDP-Informations-Pop-up-Fenster angezeigt. Ihr Text sollte den Prozess und/oder die Verfahren Ihrer Einrichtung beschreiben, die erforderlich sind, damit CDP für ein Project oder einen Benutzer aktiviert wird. Er kann einen Link zu einer Umfrage oder einem Anfrageformular enthalten, um Anfragen von Benutzern zu sammeln, die CDP verwenden möchten."
ws_270 = "Informationen über CDP auf der Project-Setup-Seite in einem Project anzeigen?"
ws_271 = "Ja, Informationen über CDP anzeigen"
ws_272 = "Nein, alle Informationen über CDP ausblenden"
ws_273 = "Wenn 'Nein' ausgewählt ist, wird CDP Benutzern auf der Project-Setup-Seite nicht beworben, und Informationen über CDP werden nirgendwo in einem Project angezeigt. Die Einstellung 'Nein' ist vorzuziehen, wenn Sie CDP nur einer begrenzten Anzahl von Benutzern bekannt machen möchten, ohne es allen Benutzern zu bewerben."
ws_274 = "Eine gültige Webadresse (URL), die vom REDCap-Webserver erreichbar ist."
ws_275 = "Normalen Benutzern erlauben, anderen Benutzern in einem Project CDP-Benutzerrechte zu gewähren?"
ws_276 = "Ja, normale Benutzer können anderen Benutzern CDP-Rechte gewähren"
ws_277 = "Nein, nur Administratoren können Benutzern CDP-Rechte gewähren"
ws_278 = "Wenn dies auf 'Nein' gesetzt ist, können nur Administratoren Benutzern auf der Seite Benutzerrechte in einem Project CDP-Rechte gewähren. Typischerweise wird 'Ja' ausgewählt, wenn Sie den User Access Web Service verwenden, der Benutzer automatisch daran hindert, aus REDCap heraus auf Daten aus dem externen Quellsystem zuzugreifen, wenn der Webservice feststellt, dass sie keinen Zugriff haben sollten."
ws_279 = "Datensätze in CDP-aktivierten Projects werden in diesem regelmäßigen Zeitintervall auf neue Daten aus dem externen Quellsystem geprüft. Die genaue Zeit des Datenabrufs wird aus dem Zeitpunkt des letzten Datenabrufs für einen bestimmten Datensatz bestimmt. Dieser automatische Datenabruf wird von einem im Hintergrund laufenden Cron-Job ausgeführt."
ws_280 = "Wenn ein CDP-aktiviertes Project in diesem Zeitraum keine protokollierte Aktivität hatte, werden keine Datensätze im Project automatisch im Quellsystem im obigen regelmäßigen Intervall geprüft. Wenn außerdem ein bestimmter Datensatz innerhalb eines aktiven CDP-aktivierten Projects in diesem Zeitraum nicht geändert wurde, wird er nicht automatisch im Quellsystem im obigen regelmäßigen Intervall geprüft."
ws_281 = "Nachdem ein REDCap-Administrator CDP für Ihr REDCap-Project aktiviert hat, kann der Administrator jedem Benutzer im Project Zugriff auf CDP geben (vorausgesetzt, der Benutzer wurde für den Zugriff auf Daten des Quellsystems autorisiert). Dabei können dem Benutzer Rechte für den Mapping-/Setup-Prozess und/oder für das Adjudizieren/Importieren von Daten aus dem Quellsystem gegeben werden. Nur ein Administrator kann Einzelpersonen Zugriff gewähren, um CDP zu nutzen."
ws_282 = "Nachdem ein REDCap-Administrator CDP für Ihr REDCap-Project aktiviert hat, kann eine Person mit Zugriff auf die Seite Benutzerrechte Ihnen und jedem Benutzer im Project Benutzerrechte für den Zugriff auf CDP geben. Dabei können dem Benutzer Rechte für den Mapping-/Setup-Prozess und/oder für das Adjudizieren/Importieren von Daten aus dem Quellsystem gegeben werden."
ws_283 = "Nachdem dem Benutzer Zugriff auf CDP gewährt wurde, sieht er den CDP-Schritt auf der Project-Setup-Seite, von wo er zur CDP-Mapping-/Setup-Seite navigieren kann. Dort kann der Benutzer bereits in seinem REDCap-Project erstellte Felder Feldern aus dem externen Quellsystem zuordnen. Dieses Mapping ermöglicht REDCap zu wissen, wo die Daten beim Import aus dem externen System gespeichert werden sollen."
ws_284 = "VIDEO: Clinical Data Pull (CDP)"
ws_285 = "Clinical Data Pull (CDP) - HINWEIS: Dieses Video verweist auf 'Dynamic Data Pull' (DDP), das in CDP umbenannt wurde. Obwohl es etwas veraltet ist, repräsentieren 90% dieses Videos weiterhin die aktuelle Funktionalität von CDP."
ws_286 = "Der erste Schritt beim Einrichten von Clinical Data Pull (CDP) besteht darin, die Felder in Ihrem Project Feldern aus dem EHR zuzuordnen. Sobald die Felder gemappt wurden, weiß REDCap, welche Daten aus dem EHR importiert und wo sie im REDCap-Project gespeichert werden sollen."
ws_287 = "Mapping für Clinical Data Pull (CDP) einrichten"
ws_288 = "Clinical Data Pull (CDP) ist eine Funktion zum Importieren von Daten aus einem EHR nach REDCap. Sie bietet einen Adjudizierungsprozess, bei dem REDCap-Benutzer alle eingehenden Daten aus dem Quellsystem genehmigen können, bevor sie offiziell in ihrem REDCap-Project gespeichert werden."
ws_289 = "Der erste Schritt beim Einrichten von Clinical Data Pull (CDP) besteht darin, die Felder in Ihrem Project Feldern aus dem EHR zuzuordnen. Sobald die Felder gemappt wurden, weiß REDCap, welche Daten aus dem EHR importiert und wo sie im REDCap-Project gespeichert werden sollen."
ws_290 = "Clinical-Data-Pull-Rechte erklären"
ws_291 = "Wenn Clinical Data Pull (CDP) für ein Project aktiviert ist, können für jeden Benutzer zwei unterschiedliche Benutzerrechte für verschiedene Aspekte von CDP festgelegt werden. Benutzern können Rechte für den Setup-/Mapping-Prozess und/oder für das Adjudizieren der Daten gegeben werden, um sie aus dem EHR in das REDCap-Project zu importieren. Wenn ihnen Setup-/Mapping-Rechte gegeben wurden, sehen sie einen neuen Schritt auf der Project-Setup-Seite, über den sie zur Mapping-Seite navigieren können, wo sie Felder aus dem EHR auf REDCap-Project-Felder mappen und weitere Einstellungen definieren können, die beim Abrufen von Daten aus dem EHR verwendet werden. Wenn der Benutzer Adjudicate-Data-Rechte hat, bedeutet dies, dass er eingehende Daten aus dem EHR anzeigen, adjudizieren und importieren kann; diese Daten sind im Record Status Dashboard und auch oben in Dateneingabeformularen sichtbar."
ws_292 = "CDP"
ws_293 = "Datensatz/Datensätze aktualisieren"
ws_294 = "Wichtige Unterschiede zwischen Clinical Data Pull (CDP) und Clinical Data Mart (CDM)"
ws_295 = "Sobald Clinical Data Interoperability Services über das untenstehende Setup für das System aktiviert wurden, kann die Clinical-Data-Mart-Funktion aktiviert werden, sodass berechtigte Benutzer Projects mit vordefinierten Instrumenten erstellen können, um klinische Daten für viele Medical Records gleichzeitig aus dem EHR abzurufen. Wenn aktiviert, erscheint dies als Option auf der Seite Neues Project erstellen und danach als Seite im linken Menü des Projects."
ws_296 = "Übersicht über Clinical Data Pull und Clinical Data Mart"
ws_297 = "Eine weitere Funktion heißt 'Clinical Data Mart' und funktioniert anders als CDP, da Data Mart Patientendaten in großen Mengen abrufen kann, während CDP Patientendaten jeweils nur für einen Patienten aus dem EHR abruft. Um ihre Unterschiede und Stärken kennenzulernen, lesen Sie die folgenden Abschnitte der Dokumentation."
ws_299 = "Import der E-Mail-Adresse des Patienten aus dem EHR erlauben?"
ws_300 = "Ja, Option 'E-Mail-Adresse' in der EHR-Quellfeldliste anzeigen"
ws_301 = "Nein, Option 'E-Mail-Adresse' in der EHR-Quellfeldliste nicht anzeigen"
ws_303 = "Datensätze mit von Benutzern über CDP adjudizierten Datenwerten"
ws_305 = "Datenwerte, die von Benutzern über CDP adjudiziert wurden"
ws_306 = "Projects mit von Benutzern über CDP adjudizierten Datenwerten"
ws_307 = "Datensätze mit über Data Mart importierten Datenwerten"
ws_308 = "Projects mit über Data Mart importierten Datenwerten"
ws_311 = "Autorisierungstyp zum Erhalten von FHIR Access Tokens"
ws_315 = "Standardmäßig können REDCap-Benutzer eine REDCap-Verbindung zum EHR über einen 'EHR Launch' herstellen, also über die eingebettete REDCap-Seite innerhalb der EHR-Oberfläche. Zusätzlich können andere Optionen aktiviert werden, damit REDCap-Benutzer sich aus REDCap heraus beim EHR anmelden können, um eine Verbindung zum EHR herzustellen. Sobald die Verbindung zum EHR hergestellt wurde, können Benutzer beginnen, klinische Daten in REDCap zu importieren."
ws_316 = "Nur EHR Launch für Autorisierung und Abrufen von FHIR Tokens verwenden (nicht üblich)"
ws_317 = "Bevor 'Clinical Data Interoperability Services' von REDCap-Benutzern verwendet werden kann, muss es zuerst auf dieser Seite eingerichtet und aktiviert werden. Laden Sie zum Start die unten verlinkte ZIP-Datei herunter und folgen Sie den darin enthaltenen Anweisungen. Möglicherweise gibt es Anweisungen für Ihr spezielles EHR; falls nicht, können Sie die Datei 'Instructions - General' verwenden. Nachdem Sie die Setup-Verfahren befolgt haben, kann der REDCap-Benutzer Clinical Data Mart und Clinical Data Pull in REDCap verwenden. Während Data Mart nur auf der REDCap-Seite verwendet werden kann, kann CDP optional entweder innerhalb der EHR-Benutzeroberfläche oder von der REDCap-Seite aus (ohne im EHR zu sein) verwendet werden."
ws_319 = "Online-Statusprüfung"
ws_320 = "Sie werden zur EHR-Anmeldeseite weitergeleitet..."
ws_321 = "EHR-Benutzerlevel-Anmeldung aus REDCap heraus mit Standard Authorization Flow erlauben (empfohlen für Epic & Cerner)"
ws_322 = "Systemlevel-Verbindung zum EHR mit Client Credentials Authorization Flow erlauben"
ws_323 = "Der Client Credentials Authorization Flow verwendet Systemlevel-Zugangsdaten, um mit dem EHR zu kommunizieren, wenn Autorisierung durchgeführt und FHIR Tokens abgerufen werden. Der Standard Authorization Flow erfordert jedoch eine EHR-Anmeldung auf Benutzerebene, um eine Verbindung zum EHR herzustellen. Bei Verwendung von Epic oder Cerner wird der Standard Authorization Flow empfohlen."
ws_324 = "Patient Identifier String finden"
ws_325 = "Hilfe zum Finden des Patient Identifier String"
ws_326 = "Als schnelle Möglichkeit, den spezifischen Patient Identifier String für Medical Record Numbers in Ihrem EHR-System zu bestimmen, können Sie die Social Security Number (SSN) *eines beliebigen* Patienten im EHR eingeben. (HINWEIS: Die eingegebene SSN wird nirgendwo protokolliert oder gespeichert.) Es kann die SSN buchstäblich jedes Patienten im System sein, und sie kann mit oder ohne Bindestriche eingegeben werden. Wenn der Patient Identifier String hier nicht bestimmt werden kann, müssen Sie ihn stattdessen von Ihrem lokalen EHR- oder Health-IT-Team erhalten."
ws_327 = "Nachschlagen"
ws_328 = "Die unten aufgeführten Patient-Identifier-Strings wurden in Ihrem EHR-System gefunden. Zuerst fett angezeigt wird der Patienten-Identifier (z. B. MRN), gefolgt von einem Doppelpunkt und dem Patient-Identifier-String für diesen Identifier. Wählen Sie den einen Identifier, der der MRN (Medical Record Number) Ihres EHR-Systems entspricht, und kopieren/fügen Sie diesen Identifier-String dann in das Textfeld EHR Patient Identifier String auf dieser Seite ein. Speichern Sie anschließend die Seite."
ws_329 = "ANFORDERUNGEN: Bitte beachten Sie, dass zur Verwendung dieser Funktion Client-ID, Client Secret und FHIR Base URL bereits auf dieser Seite eingegeben und gespeichert sein müssen. Außerdem müssen Sie (der aktuelle Benutzer) über entsprechende Rechte im EHR verfügen, um Patientendaten abzurufen."
ws_330 = "(schließt gelöschte DDP-Daten in Analysis-/Cleanup-Projects aus)"
ws_332 = "Datenwerte, die über Data Mart importiert wurden"
ws_333 = "Neue Elemente von {0}"
ws_334 = "Mappbare FHIR-Daten"
ws_335 = "Ressourcen"
ws_336 = "Zusätzliche Mappings anfordern (Umfrage)"
ws_337 = "Benutzerdefinierte Mappings einrichten"
ws_338 = "Einzelne Projects entscheiden lassen"
ws_339 = "Aus Datenschutzgründen möchten Sie möglicherweise das Feld 'E-Mail-Adresse' ausschließen, damit REDCap-Benutzer die E-Mail-Adresse eines Patienten nicht aus dem EHR importieren können. Wenn 'Nein' ausgewählt ist, erscheint die E-Mail-Option für kein Project in der EHR-Quellfeldliste, wodurch der Import von E-Mail-Adressen aus dem EHR im gesamten System verhindert wird. Wenn 'Ja' ausgewählt ist, wird die E-Mail-Option für alle Projects in allen CDIS-Services (Clinical Data Pull, Clinical Data Mart) in der EHR-Quellfeldliste sichtbar und verfügbar, ohne dass sie auf Project-Ebene zusätzlich aktiviert werden muss. Die Auswahl 'Einzelne Projects entscheiden lassen' gibt jedem Project die Autonomie zu bestimmen, ob die E-Mail-Option in seiner EHR-Quellfeldliste angezeigt wird. Diese Einstellung respektiert die Entscheidung, die auf Project-Ebene unter der Seite 'Project-Einstellungen bearbeiten' getroffen wurde."
ws_340 = "DocumentReference - Klinische Notizen"
ws_341 = "Eine DocumentReference-Ressource in FHIR wird verwendet, um klinische Notizen und andere Dokumente zu indexieren und sie Gesundheitssystemen verfügbar zu machen. In REDCap wird die DocumentReference-Ressource speziell verwendet, um klinische Notizen aus dem FHIR-System zu extrahieren. Ein Dokument ist eine Sequenz von Bytes, die identifizierbar ist, ihren eigenen Kontext herstellt (z. B. Betreff, Autor usw.) und ein definiertes Update-Management hat. Die DocumentReference-Ressource kann mit jedem Dokumentformat verwendet werden, das einen anerkannten MIME-Typ hat und dieser Definition entspricht."
ws_342 = "Um klinische Notizen effizient in CDP-Projects zu integrieren, folgen Sie den untenstehenden Richtlinien:"
ws_343 = "Feldkonfiguration: Verwenden Sie die \"Notes Box\" als empfangendes Feld, um den umfangreichen Text zu verarbeiten, der für klinische Notizen typisch ist."
ws_344 = "Erweiterte Formatierung: Implementieren Sie das Action Tag \"@RICHTEXT\", um Rich-Text-Fähigkeiten zu aktivieren, sodass HTML-Formatierung die ursprüngliche Darstellung der Notizen bewahrt."
ws_345 = "Optimale Ausrichtung: Setzen Sie die Ausrichtung auf \"Left / Horizontal (LH)\", um ein konsistentes und professionelles Dokumenterscheinungsbild zu erleichtern."
ws_346 = "Bitte beachten Sie, dass CDP-Projects klinische Notizen nur speichern, wenn sie im HTML-Format vorliegen, auch wenn das FHIR-System sie möglicherweise in verschiedenen Formaten anbietet. Für diejenigen, die mit klinischen Notizen in beliebigem Format arbeiten müssen, empfehlen wir Clinical Data Mart (CDM)-Projects. CDM-Projects akzeptieren verschiedene Datenformate und stellen sicher, dass Sie Zugriff auf alle klinischen Notizen unabhängig von ihrem Format haben."
ws_347 = "Datenabruf ist nicht verfügbar, während sich das Project im Analysis-Status befindet."
ws_348 = "Dynamic Data Pull kann keine neuen Daten abrufen, während sich das Project im Analysis-Status befindet. Bitte wenden Sie sich an Ihren Project-Administrator, um den Project-Status zu ändern, wenn Datenabruf benötigt wird."
ws_383 = "Warum Mehr Ergebnisse abrufen angezeigt wird"
ws_384 = "REDCap prüft EHR-Daten in handhabbaren Batches. In diesem Modal bedeutet eine Seite einen Satz von EHR-Ergebnissen, den REDCap geprüft hat. Eine Seite kann der erste Ergebnissatz für einen gemappten FHIR-Ressourcentyp sein oder ein weiterer Satz für denselben Ressourcentyp, wenn das EHR diese Daten auf mehrere Antworten aufteilt. Wenn weitere Seiten verfügbar sind, setzt Mehr Ergebnisse abrufen dieselbe Aktualisierung fort und kann neue Werte hinzufügen, wenn die verbleibenden EHR-Daten gemappten Feldern entsprechen."
ws_385 = "Hilfe"

cc_cdp_auto_adjudication_title = "Option Clinical Data Pull \"Instant Adjudication\""
cc_cdp_auto_adjudication_description = "Diese Option erlaubt Benutzern, die Funktion Instant Adjudication für alle CDP-aktivierten Projekte zu aktivieren. Sobald sie hier für das gesamte System aktiviert wurde, kann diese Einstellung auf der Field-Mapping-Seite des CDP-Projekts aktiviert werden. Danach können Benutzer den normalen Datenadjudikationsprozess umgehen und alle Daten in das Projekt importieren und speichern, die bereits aus dem EHR-System zwischengespeichert wurden. Dies kann beim Import vieler Patientendatensätze viel Zeit sparen. Nachdem Instant Adjudication in einem CDP-Projekt aktiviert wurde, sehen Benutzer mit CDP-Adjudikationsrechten den Button zum Starten dieses Prozesses auf dem Record Status Dashboard. Nach dem Klicken auf den Button beginnt die Adjudikation der EHR-Daten für alle Datensätze in Echtzeit."
cc_cdp_auto_adjudication_label = "Instant Adjudication für alle CDP-Projekte aktivieren?"

