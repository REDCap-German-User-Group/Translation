multilang_202 = "RTL bezieht sich auf <u>rechts-nach-links</u> hinsichtlich der Textrichtung. Einige Sprachen, z. B. Arabisch, werden von rechts nach links gelesen. Sie können die RTL-Einstellung aktivieren, wenn die Sprache in Rechts-nach-links-Richtung gelesen werden soll."
