setup_211 = "Twilio wurde aktiviert"
setup_212 = "Anfrage zur Aktivierung von Twilio"
setup_213 = "Die Aktivierung der Twilio-Telefoniedienste für dieses Projekt erfordert die Genehmigung eines REDCap-Administrators. Nach dem Absenden wird ein Admin über Ihre Anfrage benachrichtigt. Nachdem die Anfrage genehmigt wurde, erhalten Sie eine E-Mail bezüglich der Antwort."
setup_214 = "Mosio aktivieren"
setup_215 = "Mosio wurde aktiviert, und der Antragsteller wurde per E-Mail benachrichtigt."
