edit_project_108 = "Aktuelle Anzahl Tokens"
edit_project_109 = "Alle API-Tokens löschen?"
edit_project_110 = "<b>Sind Sie sicher, dass Sie alle API-Tokens für dieses Projekt löschen möchten?</b> Niemand kann über die API auf dieses Projekt zugreifen, bis neue Tokens erstellt wurden."
edit_project_111 = "Sind Sie sicher, dass Sie Ihr API-Token löschen möchten?"
edit_project_112 = "<b>Sind Sie sicher, dass Sie Ihr API-Token für dieses Projekt löschen möchten?</b> Dadurch wird Ihr API-Zugriff auf dieses Projekt entfernt, und Sie müssen ein neues API-Token anfordern, um den Zugriff wiederherzustellen."
edit_project_113 = "Sind Sie sicher, dass Sie Ihr API-Token regenerieren möchten?"
edit_project_114 = "<b>Sind Sie sicher, dass Sie Ihr API-Token für dieses Projekt regenerieren möchten?</b> Ihr vorhandenes API-Token wird deaktiviert, und Sie müssen das neue Token für den API-Zugriff verwenden."
edit_project_115 = "Die folgenden Benutzer haben API-Tokens für dieses Projekt:"
edit_project_116 = "Token löschen"
edit_project_117 = "API für dieses Projekt nicht mehr benötigt? Wenn ja, löschen Sie Ihr Token bitte aus Sicherheitsgründen."
edit_project_118 = "Token regenerieren"
edit_project_119 = "Glauben Sie, dass jemand anderes Ihr Token kennt? Wenn ja, regenerieren Sie Ihr Token bitte aus Sicherheitsgründen."
