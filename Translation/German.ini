data_mart_refresh_009 = "Clinical-Data-Mart-Einstellungen für dieses Projekt (nur Administratoren)"
data_mart_refresh_010 = "Standardmäßig können Benutzer, die den Data Mart verwenden, EHR-Daten nur einmal abrufen und ihre ursprüngliche Data-Mart-Konfiguration nicht ändern. Als Administrator können Sie den Projektbenutzern durch Klicken auf die Buttons unten die Berechtigung erteilen, EHR-Daten mehrfach abzurufen, sowie die Berechtigung, Änderungen (d. h. als neue Revisionen) an ihrer bestehenden Data-Mart-Konfiguration einzureichen. Jede Revision der Konfiguration muss dabei von einem Administrator in der To-do-Liste genehmigt werden."
