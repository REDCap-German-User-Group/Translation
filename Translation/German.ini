system_config_848 = "In bestimmten Fällen, z. B. bei Verwendung von OIDC für Azure B2C, muss möglicherweise die Application (client) ID als zusätzlicher Scope angegeben werden, damit die Authentifizierung korrekt funktioniert."
system_config_849 = "Mailgun-Basis-URL (optional)"
system_config_850 = "Wenn leer gelassen, wird die Basis-URL <code>https://api.mailgun.net</code> verwendet. Weitere Optionen umfassen die folgende Basis-URL für die EU-Region: <code>https://api.eu.mailgun.net</code>."
system_config_851 = "Funktion 'variable auto-naming' im Pop-up Feld hinzufügen im Online Designer anzeigen?"
system_config_852 = "Nein, für alle Benutzer ausblenden"
system_config_853 = "Ja, für alle Benutzer anzeigen"
system_config_854 = "Nur für Administratoren anzeigen"
system_config_855 = "Der Aufwand zum Aktivieren der Read-Replica-Funktionalität ist sehr gering, sobald ein Replica-Server erstellt wurde und erfolgreich vom primären REDCap-Datenbankserver repliziert. Der größte Teil der Arbeit besteht einfach darin, den Replica-Server einzurichten. Siehe die folgenden Anweisungen dazu, wie die Read-Replica-Funktion aktiviert wird."
system_config_856 = "<b>Neuen Datenbankserver einrichten und Replikation zum primären Server aktivieren:</b> Zuerst müssen Sie einen neuen Datenbankserver einrichten, der den Spezifikationen Ihres vorhandenen REDCap-Datenbankservers möglichst nahekommt. <u>Idealerweise sollte er dieselbe Version (oder eine sehr nahe Version) von MySQL/MariaDB wie der primäre Server haben, und es wird empfohlen, dass die Replica denselben oder etwas weniger RAM/CPUs als Ihr primärer Server hat.</u> Befolgen Sie einfach die Standardverfahren zum Einrichten der MySQL/MariaDB-Replikation auf diesem Server, sodass er erfolgreich in Echtzeit vom primären REDCap-Datenbankserver repliziert. Nachdem die Replikation aktiviert wurde, kann es viele Stunden dauern, bis die Replica den primären Server endgültig eingeholt hat. <b>HINWEIS:</b> Das REDCap-Entwicklungsteam stellt absichtlich keine Details zur Einrichtung der MySQL/MariaDB-Replikation bereit, weil es keine Experten auf diesem Gebiet sind und weil dies nur von einem IT-Spezialisten, z. B. einem DBA, umgesetzt werden sollte, der Expertise in diesem Bereich hat. <u>Wenn Sie oder Ihre IT-Mitarbeiter nicht wissen, wie Datenbankreplikation implementiert wird, sollte die Aktivierung der Read-Replica-Funktion *nicht* einmal in Betracht gezogen werden.</u>"
system_config_857 = "<b>Verbindungsvariablen für die Replica zu database.php hinzufügen:</b> Erstellen Sie einen MySQL/MariaDB-'user' auf dem Replica-Server, damit REDCap diesen Benutzer zur Verbindung mit der Replica verwenden kann. Öffnen Sie dann die Datei <code>/redcap/database.php</code> zur Bearbeitung auf Ihrem REDCap-Webserver und fügen Sie die Replica-Verbindungsvariablen wie unten gezeigt zur Datei hinzu. "
system_config_858 = "Wenn die Replica eine SSL/TLS-Verbindung erfordert (d. h. MySQL über SSL), müssen Sie außerdem die untenstehenden zusätzlichen Verbindungsvariablen bereitstellen."
system_config_859 = "Read-Replica-Funktionalität ist nicht verfügbar, weil die Verbindungsvariablen in database.php nicht gefunden wurden."
system_config_860 = "<b>Read-Replica-Systemeinstellung auf dieser Seite aktivieren:</b> Nachdem 1 und 2 oben abgeschlossen wurden, laden Sie diese Seite (Allgemeine Konfiguration) neu. Danach sollte das Read-Replica-'enable'-Dropdown nicht mehr schreibgeschützt/deaktiviert erscheinen. Aktivieren Sie die Read Replica durch Auswahl von 'enable' und speichern Sie die Seite. Besuchen Sie dann die Hauptseite des Control Center oder die Seite Configuration Check. Wenn dort eine Warnung angezeigt wird, dass die Read Replica möglicherweise offline ist oder keine Verbindung hergestellt werden kann, prüfen Sie nochmals, ob die korrekten Replica-Verbindungsvariablen korrekt zu database.php hinzugefügt wurden."
system_config_861 = "Read-Replica-Datenbankserver aktivieren, um die Systemleistung zu verbessern?"
system_config_862 = "Um die Serverlast auszugleichen, falls das REDCap-System regelmäßig langsam ist, kann REDCap eine Verbindung zu einem schreibgeschützten sekundären Datenbankserver herstellen, der MySQL/MariaDB-Replikation verwendet, um mit dem primären REDCap-Datenbankserver synchron zu bleiben. <u>Der Read-Replica-Server wird nur für schreibgeschützte Vorgänge an folgenden Stellen in REDCap verwendet:</u> Anzeigen von Reports, Exportieren von Daten (einschließlich API-Exporten), Anzeigen von Datensatzstatus-Dashboards, Anzeigen und Exportieren der Projekt-Logging-Seite (einschließlich API-Logging-Exporten), Verwenden des Datensuch-Tools, Anzeigen der Scheduling-Seite, Ausführen von Datenqualitätsregeln, Anzeigen von Projekt-Dashboards und Anzeigen der Seiten System Statistics und User Activity Log des Control Center."
system_config_863 = "HINWEIS: Die Read Replica wird nur empfohlen, wenn Sie Leistungsprobleme mit Ihrem REDCap-Server erleben, z. B. regelmäßige oder zeitweise Langsamkeit. Vor dem Aktivieren der Read-Replica-Funktion wird empfohlen, zuerst andere Möglichkeiten zur Verbesserung der Datenbankleistung zu prüfen, z. B. mehr RAM und CPUs zu Ihrem Datenbankserver hinzuzufügen, um zu sehen, ob dies eine Verbesserung bringt. Wenn dies nicht hilft, kann die Verwendung der Read Replica eine gute Option sein."
system_config_864 = "Read-Replica-Funktion einrichten"
system_config_865 = "<b>Read Replica überwachen:</b> Wenn REDCap erfolgreich eine Verbindung zur Read Replica herstellen kann, wird die Replica (statt der primären Datenbank) auf bestimmten Seiten in REDCap verwendet, auf denen schreibgeschützte Prozesse durchgeführt werden. <u>Die Replica kann auf der Seite Database Activity Monitor gesehen und ihre Aktivität beobachtet werden. Wenn die Lag-Zeit der Replica über {0} Sekunden steigt, wird sie nicht verwendet, bis ihre Lag-Zeit gegenüber dem primären Server {1} Sekunden oder weniger beträgt.</u> Dies soll verhindern, dass Benutzer 'veraltete' Daten von der Replica sehen, falls die Replica zu weit hinter dem primären Server zurückliegt."
system_config_870 = "Aktivieren Sie diese Option, um die Serverleistung auf langsameren Projektseiten zu verbessern (z. B. Exporte, Reports, Datensatzstatus-Dashboard). Bei aktiviertem Rapid Retrieval ruft das Read-through-Cache-System automatisch die Daten aus Dateisystem oder Datenbank ab und speichert sie, wenn eine angeforderte Seite nicht im Cache gefunden wird, abhängig von der untenstehenden Einstellung. Dieser Prozess reduziert Wartezeiten beim Datenabruf, minimiert direkte Datenbankabfragen und stellt sicher, dass die am häufigsten angeforderten Daten für schnelleren Abruf im Cache gespeichert werden. Zusammengefasst lädt Rapid Retrieval einige REDCap-Seiten deutlich schneller."
system_config_871 = "Rapid Retrieval (Caching-Funktion auf Seitenebene)"
system_config_872 = "Rapid Retrieval aktivieren"
system_config_873 = "Seitengeschwindigkeit wurde mit Rapid Retrieval erhöht"
system_config_874 = "Die aktuelle REDCap-Webseite konnte schneller geladen werden, weil sie die Rapid-Retrieval-Funktion von REDCap verwendet hat. Rapid Retrieval ist eine automatisierte interne Funktion, mit der REDCap bestimmte Seiten in einem temporären Cache speichern kann. Bei Verwendung von Rapid Retrieval gibt REDCap, wenn sich Daten oder Metadaten im Projekt kürzlich nicht geändert haben, den gespeicherten Cache der Seite aus dem Zeitpunkt aus, zu dem sie zuvor geladen wurde. Das bedeutet, dass REDCap nicht die gesamte Arbeit des normalen Ladens der Seite durchführen muss, sondern die Seite viel schneller mithilfe des Cache laden kann. Der Zeitpunkt, zu dem die aktuelle Seite zuletzt gecacht wurde, war"
system_config_875 = "Dateibasierte Speicherung (empfohlen)"
system_config_876 = "Datenbankspeicherung"
system_config_877 = "Alternatives Verzeichnis zum Speichern gecachter Dateien (optional)"
system_config_878 = "Wenn auf 'Dateibasierte Speicherung' gesetzt, speichert die Rapid-Retrieval-Funktion standardmäßig alle gecachten Dateien im 'temp'-Ordner von REDCap. Wenn auf 'Datenbankspeicherung' gesetzt, werden sie in der Datenbanktabelle <code>redcap_cache</code> gespeichert."
system_config_879 = "HINWEIS: Bei Verwendung dateibasierter Speicherung sind die gecachten Dateien auf dem Webserver vollständig verschlüsselt (at rest), und die Dateien werden sofort entfernt, sobald sie invalidiert wurden und nicht mehr verwendet werden können."
system_config_880 = "Wenn auf 'Dateibasierte Speicherung' gesetzt, speichert die Rapid-Retrieval-Funktion standardmäßig alle gecachten Dateien im 'temp'-Ordner von REDCap. Sie können jedoch einen alternativen Speicherort auf Ihrem Webserver zum Speichern der gecachten Dateien festlegen, aus Sicherheits- oder Leistungsgründen."
system_config_881 = "Das Festlegen eines alternativen Verzeichnisses kann helfen, die Wirksamkeit von Rapid Retrieval zu maximieren, wenn Sie Load Balancing oder cloudbasiertes Hosting mit mehreren Knoten verwenden und das alternative Verzeichnis ein zentraler Ort ist, auf den alle Server/Knoten zugreifen können, z. B. ein zu externem Dateispeicher gemapptes Laufwerk. Wenn Sie REDCap nicht auf einem System mit mehreren Webservern/Knoten hosten, ist es am besten, diese Einstellung leer zu lassen."
system_config_882 = "EMPFEHLUNG: Die dateibasierte Speichermethode wird in den meisten Fällen empfohlen, z. B. auf sehr aktiven Servern, weil die Datenbankspeichermethode dazu neigen kann, die Datenbank zu stark zu belasten, wodurch der Server ausgebremst werden und/oder das MySQL-Binary-Log zu schnell wachsen kann. Sie können beide Optionen ausprobieren, um zu sehen, ob eine insgesamt besser funktioniert. Es schadet nicht, diese Einstellung jederzeit zu ändern, während das System läuft."
system_config_883 = "AD-Attribut, das für REDCap-Benutzernamen verwendet wird (Endpoint V1 und V2)"
system_config_884 = "FEHLER: Nur Administratoren mit Rechten 'Admin Rights', Rechten 'Modify system configuration pages' oder Rechten 'Access to all projects and data with maximum privileges' dürfen auf diese Seite zugreifen."
system_config_885 = "Die folgenden 4 Felder dienen der Konfiguration der Microsoft-Entra-ID-Authentifizierung. Informationen zu Client-ID und Client Secret finden Sie hier: (<a href=\"https://docs.microsoft.com/en-us/azure/storage/common/storage-auth-aad-app?tabs=dotnet\" target=\"_blank\">https://docs.microsoft.com/en-us/azure/storage/common/storage-auth-aad-app?tabs=dotnet</a>)."
system_config_886 = "Zusätzliche Microsoft Entra ID (früher Azure AD)-Authentifizierungseinstellungen:"
system_config_887 = "API Client-ID"
system_config_888 = "API Client Secret"
system_config_889 = "Version-2.0-Endpoints erlauben Multi-Tenant-Authentifizierung in REDCap. Um 2.0-Endpoints mit REDCap zu verwenden, melden Sie sich in Ihrem Azure-Portal für App-Registrierungen an, klicken Sie auf den Authorization-Blade und aktivieren Sie unter Supported account type Konten in jedem Organisationsverzeichnis. Unterschiede zwischen den Endpoint-Versionen sind hier zusammengefasst: https://devblogs.microsoft.com/premier-developer/azure-ad-endpoint-v1-vs-v2/"
system_config_890 = "Endpoint-Version"
system_config_891 = "Tenant"
system_config_892 = "FEHLER: Die unten aufgeführten IP-Adressen sind ungültig und müssen korrigiert werden, wenn Sie sie in den Ausnahmen der IP-Bereiche für den Rate Limiter verwenden möchten:"
system_config_893 = "Sie können IPv4-Adressbereiche entweder im Wildcard-Format mit Sternchen ODER als Bereich mit Bindestrich eingeben. IPv6-Subnetzmasken können ebenfalls verwendet werden. Zusätzlich zu Bereichen können einzelne IP-Adressen verwendet werden. Alle IP-Adressen und Bereiche müssen durch Kommas getrennt werden. Beispiel:"
system_config_894 = "Unten können Sie optional IP-Adressen oder Bereiche angeben, die vom Rate Limiter ausgenommen werden sollen. Dies ist nützlich, wenn Sie Sicherheitsscans auf Ihrem Server durchführen; dabei können Sie die IP-Adresse des Scan-Tools hinzufügen, damit sie während der Scans nicht gesperrt wird."
system_config_895 = "Funktion 'Benutzern erlauben, e-Consent-Antworten zu bearbeiten?' des e-Consent Framework aktivieren"
system_config_896 = "Wenn aktiviert (Standard), können Benutzer, die e-Consent für einen Fragebogen aktivieren, wählen, ob Benutzer Fragebogenantworten ändern dürfen, die mit dem e-Consent Framework abgeschlossen wurden. Wenn deaktiviert, können keine Benutzer Fragebogenantworten ändern, die mit dem e-Consent Framework abgeschlossen wurden."
system_config_897 = "Nicht durch e-Consent gesteuerte PDF-Snapshots auf dem externen Speicherserver speichern, wenn der Snapshot eine abgeschlossene e-Consent-Antwort enthält."
system_config_898 = "Wenn aktiviert (Standard), wird jeder PDF-Snapshot, der im Datei-Repository gespeichert wird, zusätzlich auf dem externen Speicherserver gespeichert, wenn der Snapshot mindestens eine abgeschlossene e-Consent-Antwort enthält. Wenn deaktiviert, werden für dieses Projekt nur durch e-Consent gesteuerte PDF-Snapshots auf dem externen Speicherserver gespeichert."
system_config_899 = "HINWEIS: Diese Einstellung hat keine Wirkung, wenn der externe Speicherserver (\"The Vault\") nicht für das e-Consent Framework auf der Seite Modules/Services Configuration aktiviert ist."
system_config_900 = "(optional) URL für benutzerdefinierte Logout-Seite"
system_config_901 = "Shibboleth User First Name Field"
system_config_902 = "Name der Servervariablen, die den Vornamen (given name) des Benutzers enthält, den Shibboleth in PHP definiert (z. B. $_SERVER['givenName']). Standardwert ist 'givenName'"
system_config_903 = "Shibboleth User Last Name Field"
system_config_904 = "Name der Servervariablen, die den Nachnamen (family name) des Benutzers enthält, den Shibboleth in PHP definiert (z. B. $_SERVER['sn']). Standardwert ist 'sn'"
system_config_905 = "Shibboleth User Email Field"
system_config_906 = "Name der Servervariablen, die die E-Mail-Adresse des Benutzers enthält, die Shibboleth in PHP definiert (z. B. $_SERVER['mail']). Standardwert ist 'mail'"
system_config_907 = "Shibboleth-Benutzerinformationseinstellungen:"
system_config_908 = "Wenn sich ein Benutzer zum ersten Mal bei REDCap anmeldet, kann REDCap dessen Namen und E-Mail-Adresse automatisch anhand der von Shibboleth bereitgestellten Informationen setzen. Diese Einstellungen bestimmen, ob REDCap dies tut und welche Serverfelder REDCap verwendet."
system_config_909 = "Benutzerinformationen bei jedem Login setzen"
system_config_910 = "Wenn auf 'Ja' gesetzt, überschreibt REDCap die vorhandenen Werte für Vorname, Nachname und E-Mail-Adresse des Benutzers anhand von Informationen aus Shibboleth. Dies ist nützlich, wenn Änderungen an persönlichen Informationen der Benutzer in der Datenbank des Identity Providers sofort in REDCap widergespiegelt werden sollen. Wenn auf 'Nein' gesetzt, werden Benutzerinformationen nur beim ersten Login in REDCap gesetzt."
system_config_911 = "Benutzerinformationen mit Daten aus Shibboleth setzen"
system_config_912 = "Wenn aktiviert, füllt REDCap Benutzerinformationen mit von Shibboleth bereitgestellten Werten. Wenn deaktiviert, wird Benutzern beim ersten Login ein Bildschirm angezeigt, auf dem sie ihre eigenen Benutzerinformationen setzen können."
system_config_913 = "Dokumentation zur Konfiguration von Shibboleth-Optionen"
system_config_914 = "Diese Einstellung wirkt sich nicht auf bestehende Projekte aus, wird aber künftig auf neue Projekte einzeln zum Zeitpunkt ihrer Erstellung angewendet."
system_config_915 = "Gespeicherte Dateien in Unterordnern nach REDCap-Projekt-ID organisieren?"
system_config_916 = "HINWEIS: Wenn aktiviert und REDCap (z. B. aufgrund eines Verzeichnisberechtigungsproblems) beim Erstellen eines neuen Projekts keinen projektbezogenen Unterordner erstellen kann, speichert REDCap stattdessen standardmäßig alle Projektdateien im Hauptverzeichnis des lokalen Dateispeichers (oben angegeben) für dieses Projekt."
system_config_917 = "<b>Unterordner im Hauptverzeichnis des lokalen Dateispeichers können nicht erstellt werden - EMPFOHLEN:</b> REDCap ist so eingestellt, dass projektbezogene gespeicherte Dateien in einzelnen Unterordnern nach Projekt organisiert werden. Es scheint jedoch, dass REDCap NICHT die Möglichkeit hat, Unterordner im Dateispeicherverzeichnis {0} zu erstellen. Dies liegt wahrscheinlich an einem Ordnerberechtigungsproblem in diesem Hauptverzeichnis. Dies ist nicht kritisch, bedeutet aber, dass bis zur Behebung neu erstellte Projekte ihre Dateien im Hauptverzeichnis des Dateispeichers statt in einem projektbezogenen Unterordner speichern."
system_config_918 = "<b>Unterordner im Hauptverzeichnis des lokalen Dateispeichers sind nicht beschreibbar - EMPFOHLEN:</b> REDCap ist so eingestellt, dass projektbezogene gespeicherte Dateien in einzelnen Unterordnern nach Projekt organisiert werden. Obwohl REDCap Unterordner im Dateispeicherverzeichnis {0} *erstellen kann*, scheint REDCap jedoch NICHT in der Lage zu sein, Dateien in neu erstellten Unterordnern (z. B. {1}) zu schreiben und/oder zu löschen. Dies liegt wahrscheinlich an einem Ordnerberechtigungsproblem in diesem Hauptverzeichnis. Dies ist nicht kritisch, bedeutet aber, dass bis zur Behebung neu erstellte Projekte ihre Dateien im Hauptverzeichnis des Dateispeichers statt in einem projektbezogenen Unterordner speichern."
system_config_919 = "HINWEIS: Diese Einstellung gilt auch bei Verwendung von Google Cloud Storage für Google-App-Engine-Hosting unten."
system_config_920 = "HINWEIS: Die obige Einstellung 'Gespeicherte Dateien in Unterordnern nach REDCap-Projekt-ID organisieren?' für lokalen Speicher <u>gilt auch</u> hier für Google Cloud Storage für Google-App-Engine-Hosting."
system_config_921 = "Wenn Sie Probleme beim Scannen des QR-Codes haben, geben Sie die untenstehenden Werte mit der Methode Manual Entry in Ihre Microsoft/Google-Authenticator-App ein. Stellen Sie außerdem sicher, dass Sie ihn als 'Time-based' setzen."
system_config_922 = "Das Aktivieren der Zwei-Faktor-Authentifizierung (auch als 2-Schritt-Login bekannt) kann die Sicherheit beim Login von Benutzern in das System erhöhen. Während der Standard-Login-Prozess aus der Eingabe von Benutzername und Passwort besteht, stellt Zwei-Faktor-Authentifizierung einen zweiten Schritt nach dem ersten Login bereit, z. B. die Eingabe eines 6-stelligen Verifizierungscodes, der per SMS, per E-Mail oder über die Microsoft/Google-Authenticator-App auf dem Mobilgerät erzeugt wurde, oder die Reaktion auf einen Telefonanruf oder eine Push-Benachrichtigung (nur für Duo-App). Zwei-Faktor-Authentifizierung kann mit den untenstehenden Einstellungen eingerichtet und aktiviert werden; diese steuern, wie und wann Benutzer den 2-Schritt-Login-Prozess durchlaufen müssen."
system_config_923 = "(Gilt für Verifizierungscode für SMS-, E-Mail- und Microsoft/Google-Authenticator-Optionen)"
system_config_924 = "2-Schritt-Login: Dem Benutzer die Microsoft/Google-Authenticator-Einrichtungsanweisungen per E-Mail senden"
system_config_925 = "HINWEIS: Nachdem Sie Microsoft/Google Authenticator eingerichtet haben, LÖSCHEN SIE BITTE AUS SICHERHEITSGRÜNDEN DIESE E-MAIL."
