design_370 = "Das Projekt muss zuerst im Entwurfsmodus sein, bevor Sie Ihr Data Dictionary hochladen können. Klicken Sie oben auf der Seite auf den Button 'Entwurfsmodus starten', um das Projekt in den Entwurfsmodus zu versetzen."
design_371 = "INSTRUMENT WURDE VERSCHOBEN!"
design_372 = "FELD WURDE VERSCHOBEN!"
design_373 = "Das Datenerfassungsinstrument wurde erfolgreich verschoben. Die Seite wird nun neu geladen, um die Änderung anzuzeigen."
design_374 = "Das Projekt muss zuerst im Entwurfsmodus sein, bevor Sie Änderungen an Datenerfassungsinstrumenten vornehmen können. Klicken Sie oben auf der Seite auf den Button 'Entwurfsmodus starten', um das Projekt in den Entwurfsmodus zu versetzen."
