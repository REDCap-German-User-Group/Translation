openai_057 = "Daten zusammenfassen"
openai_058 = "Mithilfe von KI können Sie Daten im Report für angegebene Freitextfelder zusammenfassen (z. B. Notizfelder und nicht validierte Textfelder). Verwenden Sie dieses Pop-up, um die Felder vorzuwählen, die Sie für die KI-Datenzusammenfassungsfunktion verwenden möchten. Diese verwendet den unten für jedes Feld angegebenen Aktionstext. Der standardmäßig bereitgestellte Aktionstext lautet \"Fasse die folgenden Informationen in 150 Wörtern oder weniger zusammen.\", kann aber geändert und für die zukünftige Verwendung der Datenzusammenfassungsfunktion hier gespeichert werden. Hinweis: Alle benutzerdefinierten Aktionstexte werden auf Report-Ebene für jedes Feld gespeichert. Wenn Sie für dasselbe Feld in einem anderen Report anderen Text verwenden möchten, muss dieser benutzerdefinierte Aktionstext im anderen Report gespeichert werden."
