design_1066 = "Sie können einen Wert aus einem anderen Feld pipen, um dynamische Bereichsgrenzen festzulegen - z. B. <code class='fs10'>[visit_date]</code> oder <code class='fs10'>[event_1_arm_1][age]</code>. Sie können für Datums-/Zeitfelder auch das Wort <code class='fs11'>today</code> oder <code class='fs11'>now</code> verwenden (nicht in Anführungszeichen gesetzt)."
