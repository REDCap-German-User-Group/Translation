system_config_943 = "Datensatzlimit:<br>Maximale Anzahl von Datensätzen festlegen, die erstellt werden können, während sich ein Projekt im Entwicklungsstatus befindet"
system_config_944 = "0 = Kein Limit"
system_config_945 = "In der Benutzeroberfläche des Projekts wird eine Warnmeldung angezeigt, um Benutzer darüber zu informieren, dass nach Überschreiten des Limits keine weiteren Datensätze erstellt werden können."
system_config_947 = "<b>HINWEIS:</b> Es können keine neuen Datensätze erstellt werden, da dieses Projekt das Limit von {0} Datensätzen im Entwicklungsstatus bereits erreicht hat. Wenn Sie hierzu Fragen haben, wenden Sie sich bitte an Ihren {1}."
system_config_948 = "<b>HINWEIS:</b> Leider können derzeit keine neuen Antworten zum Fragebogen hinzugefügt werden. Bitte informieren Sie den Fragebogenadministrator, dass Sie diesen Hinweis erhalten haben, weil das Fragebogenprojekt das maximale Limit von Datensätzen im Entwicklungsstatus bereits erreicht hat. Der Fragebogenadministrator möchte sich bei Fragen möglicherweise an seinen REDCap-Administrator wenden."
system_config_949 = "Projekte dürfen im Entwicklungsstatus nicht mehr als {0} Datensätze haben. Daher dürfen Sie kein neues Projekt erstellen, das anfänglich {1} Datensätze enthält, wie in der Projekt-XML-Datei gefunden, die Sie zu importieren versuchen. Wenn Sie hierzu Fragen haben, wenden Sie sich bitte an Ihren REDCap-Administrator."
system_config_950 = "Sie verwenden derzeit {0} von {1} erlaubten Testdatensätzen im Entwicklungsstatus."
system_config_951 = "0 = Der globale Wert wird verwendet."
system_config_952 = "Hinweis: Wenn ein Projekt das Limit bereits überschritten hat, wenn diese Einstellung aktiviert wird, wirkt sich dies nicht auf bestehende Datensätze aus, verhindert aber, dass weitere Datensätze erstellt werden."
system_config_953 = "Für diese Einstellung existiert eine Überschreibung auf Projektebene auf der Seite Projekteinstellungen bearbeiten eines Projekts."
system_config_954 = "Hinweis: Die Datensätze können nicht in das neue Projekt kopiert werden, weil die Menge die maximale Anzahl von Datensätzen überschreitet, die ein Entwicklungsprojekt haben darf."
system_config_955 = "Admin-Genehmigung: Alle Benutzer mit Projekt-Design-Rechten können bei einem Admin anfragen, es zu aktivieren"
system_config_956 = "Wenn 'Admin-Genehmigung' ausgewählt ist, kann jeder Benutzer mit Projekt-Design-/Setup-Rechten in diesem Projekt die Einstellung sehen und sie auch selbst aktivieren, benötigt jedoch die Genehmigung eines Administrators, um mit dem Twilio-Service in seinem Projekt fortzufahren."
system_config_957 = "Dies stellt den URL-Kürzungsservice innerhalb von Projekten bereit, gilt aber nicht für die URL-Shortener-Seite des Control Center."
system_config_958 = "HINWEIS: Diese Einstellung gilt nur für das Löschen einzelner Datensätze. Sie wird daher nicht angewendet, wenn die Funktion 'Alle Daten löschen' verwendet wird oder wenn alle Datensätze beim Verschieben des Projekts in Produktion gelöscht werden; beide löschen immer alle datenbezogenen geloggten Events."
system_config_959 = "Wenn 'Admin-Genehmigung' ausgewählt ist, kann jeder Benutzer mit Projekt-Design-/Setup-Rechten in diesem Projekt die Einstellung sehen und sie auch selbst aktivieren, benötigt jedoch die Genehmigung eines Administrators, um mit dem Mosio-Service in seinem Projekt fortzufahren."
system_config_960 = "Cron-Jobs: Maximale gleichzeitige Jobs"
system_config_961 = "Maximale Anzahl von Cron-Jobs festlegen, die systemweit parallel laufen dürfen. Dieses globale Limit wird vor dem Start jedes neuen Cron-Jobs geprüft."
system_config_962 = "Erlaubter Bereich: 1 bis 50 (Standard: 10)"
system_config_963 = "Hinweis: Eine Erhöhung des Werts kann im Laufe der Zeit zu höherer Leistungslast führen. Wenn erhöht, überwachen Sie unbedingt einige Tage lang die Systemressourcen, falls Leistungsprobleme entstehen."
system_config_964 = "<b>(Optional) Benutzerdefinierte Fehlermeldung, die beim Hinzufügen eines nicht existierenden Benutzers auf der Seite Benutzerrechte angezeigt wird:</b><br>Benutzerdefinierter Text, der angezeigt wird, wenn ein Benutzer versucht, einen anderen Benutzer zu einem Projekt hinzuzufügen, dessen Benutzerkonto im REDCap-System nicht existiert. HINWEIS: Dieser Text unten wird nur verwendet, wenn die obige Einstellung auf \"Nein\" gesetzt ist."
system_config_965 = "Wenn oben kein Text angegeben wird, wird stattdessen der folgende Standardtext verwendet:"
system_config_966 = "Einstellungen zum Hinzufügen von Benutzern zu Projekten"
system_config_967 = "Hinzufügen nicht existierender Benutzer zu Projekten erlauben?"
system_config_968 = "Nein, Benutzer dürfen nur zu Projekten hinzugefügt werden, wenn sie ein Konto haben"
system_config_969 = "Diese Einstellung bestimmt, ob Benutzern, die noch kein REDCap-Konto haben, Zugriff auf ein Projekt gewährt werden kann. In manchen Situationen ist es praktisch, Benutzer hinzufügen zu können, wenn man ihren institutionellen/SSO-Benutzernamen kennt, selbst wenn der Benutzer sich noch nie bei REDCap angemeldet hat."
system_config_970 = "Hinweis: Diese Einstellung wird bei Verwendung tabellenbasierter Authentifizierung immer auf \"Nein\" gesetzt."
system_config_971 = "Wenn das Access-Control-Group-(ACG)-Modul im Projekt aktiviert ist, stellt diese Einstellung die maximal zulässigen Rechte für Dateneingabe und Datenexport dar; die tatsächlich gesetzten Werte hängen von den ACG-Gruppen der jeweiligen Benutzer im Projekt ab, sodass diese Benutzer mit ihren jeweiligen ACG-Gruppenrechten konform bleiben."
system_config_972 = "Benutzer daran hindern, Eingabeformulare über ihren Browser zu drucken, wenn ihnen Vollständiger-Datensatz-Exportrechte für das Formular fehlen?"
system_config_973 = "Ja, Drucken von Formularen verhindern, wenn Benutzer keine Datenexportrechte haben"
system_config_974 = "Nein, Drucken von Formularen unabhängig von Datenexportrechten erlauben"
system_config_975 = "HINWEIS: Dies zu verhindern ist nicht als vollständig undurchdringliche Funktion gedacht, da alle clientseitigen Lösungen hierfür umgangen werden können und daher grundsätzlich umgehbar sind. Diese Einstellung soll lediglich Best Practices fördern und bestimmtes versehentliches Verhalten entmutigen."

training_res_02 = "REDCap-Schulungsvideos"
training_res_03 = "Gerade erst angefangen?"
training_res_05 = "Titel"
training_res_07 = "Video<br>ansehen"
training_res_09 = "Dieses Video bietet einen Überblick über grundlegende Funktionen und Merkmale innerhalb eines REDCap-Projekts. Es dient als Einstieg zum Verständnis der Grundkonzepte von REDCap, was REDCap-Projekte sind, wie man sie erstellt und wie man sie verwendet."
training_res_12 = "Online Designer"
training_res_14 = "5 Minuten"
training_res_15 = "Data Dictionary"
training_res_17 = "Data-Dictionary-Demodatei"
training_res_18 = "10 Minuten"
training_res_19 = "Scheduling-Modul"
training_res_22 = "Arten von REDCap-Projekten"
training_res_23 = "Es gibt verschiedene Arten von REDCap-Projekten, aus denen Sie wählen können, wenn Sie mit der Planung Ihres eigenen Projekts beginnen. Jeder Projekttyp hat Vor- und Nachteile und kann besser zu den spezifischen Anforderungen eines bestimmten Projekttyps passen als ein anderer. Bitte sehen Sie sich die verschiedenen Arten unten an; Sie können auch ein Live-Beispiel jedes Projekttyps in Aktion ansehen oder ein kurzes Video dazu aufrufen."
training_res_24 = "Projekttyp"
training_res_26 = "Traditionelles Projekt"
training_res_27 = "(klassisches Modell mit Eingabeformularen)"
training_res_29 = "5 Minuten"
training_res_30 = "Longitudinales Projekt"
training_res_31 = "(mehrfach verwendbare Eingabeformulare,<br>abstrakte Zeitpunkte)"
training_res_33 = "3 Minuten"
training_res_34 = "Longitudinales Projekt<br>+ Scheduling"
training_res_35 = "(mehrfach verwendbare Eingabeformulare,<br>definierte Zeitpunkte)"
training_res_46 = "Betrieb"
training_res_47 = "(Anwendungsfall für Nicht-Studien/Nicht-Prüfungen)"
training_res_49 = "Spezielle Funktionen in REDCap-Projekten"
training_res_50 = "Jedes REDCap-Projekt kann spezielle Funktionen nutzen, von denen einige von normalen Benutzern und andere von REDCap-Administratoren aktiviert werden können. Unten finden Sie eine Liste dieser Funktionen."
training_res_51 = "Funktion"
training_res_52 = "für multizentrische Projekte"
training_res_56 = "Datensätze sperren"
training_res_60 = "Einzelumfrage-Projekt"
training_res_63 = "VIDEO: Fragebogen erstellen und verwalten"
training_res_69 = "Events in longitudinalen Projekten definieren"
training_res_71 = "Projekttypen"
training_res_73 = "Dieses Video beschreibt zwei wichtige Entscheidungen, die beim Aufbau eines REDCap-Projekts getroffen werden müssen. Es zeigt außerdem kurz, wie sich diese Entscheidungen darauf auswirken, welcher Projekttyp verwendet wird."
training_res_74 = "Das traditionelle Projekt wird für grundlegende Datenerhebung verwendet. Alle Daten werden direkt in REDCap von Benutzern eingegeben, die angemeldet sind. Häufig werden mehrere Datenerhebungsinstrumente definiert. Dieser Projekttyp eignet sich für die meisten Datenerhebungsanforderungen. Er kann longitudinale Daten erfassen, einschließlich Meldungen unerwünschter Ereignisse oder anderer Erhebungen ohne vordefinierten Zeitplan oder Endpunkt."
training_res_75 = "Das Survey-Modul ermöglicht es Umfragebefragten, ein REDCap-Instrument auszufüllen, ohne sich anzumelden. Daten können weiterhin auch von REDCap-Benutzern eingegeben werden, die angemeldet sind. Dieses Video erläutert alle wichtigen Funktionen des Survey-Moduls, einschließlich Umfrageverteilung. Ein Einzelumfrage-Projekt hat nur ein Datenerhebungsinstrument, das als Fragebogen verwendet wird."
training_res_76 = "Das longitudinale Modul ermöglicht es, beliebige Datenerhebungsinstrumente für jeden Datensatz mehrfach auszufüllen. Dieselben Daten können wiederholt erfasst werden. Das Modul verwendet eine Event-Übersicht, um klare Zeitpunkte für die Datenerhebung zu definieren. Das longitudinale Modul eignet sich am besten für sehr strukturierte Studien, die NICHT unbegrenzt laufen. Klinische Prüfungen verwenden häufig diesen Projekttyp."
training_res_77 = "Dieser Projekttyp verwendet zwei Module. Das longitudinale Modul ermöglicht es, beliebige Datenerhebungsinstrumente für jeden Datensatz mehrfach auszufüllen. Das Scheduling-Modul fügt datensatzspezifische Zeitpläne zu einem Studienkalender hinzu, basierend auf einer Reihe von Events oder Zeitpunkten. Zeitpläne können erzeugt und geändert werden. Das longitudinale Modul eignet sich am besten für sehr strukturierte Studien, die NICHT unbegrenzt laufen. Dieser Projekttyp ist daher nützlich für große multizentrische klinische Prüfungen, die eine schnelle und einfache Möglichkeit zur Planung von Patientenvisiten benötigen."
training_res_78 = "REDCap kann für nahezu jede Art der Datenerhebung verwendet werden. Die häufigsten Anwendungsfälle sind klinische Forschung und klinische Prüfungen. REDCap eignet sich jedoch auch für administrative und Bildungsdaten, Workflow-Tracking, Qualitätsverbesserung, Biobanking, Register und nicht-humanbezogene Forschung. Dieses Beispiel zeigt einen traditionellen Projekttyp, der zur Erfassung und Nachverfolgung betrieblicher Buchführungsinformationen verwendet wird."
training_res_79 = "Instrumente für Events in longitudinalen Projekten festlegen"
training_res_81 = "Die Funktion Zugriffsgruppen weist Benutzer Gruppen zu. Jeder Benutzer in einer Zugriffsgruppe kann nur auf die Datensätze seiner Gruppe zugreifen. Jede Gruppe ist gegenüber allen anderen Daten/Datensätzen verblindet. Benutzer, die keiner Gruppe angehören, können auf alle Daten über alle Gruppen hinweg zugreifen. Diese Funktion ist besonders nützlich für multizentrische Projekte, da jede Datenerhebungsstelle normalerweise daran gehindert werden muss, die Datensätze anderer Stellen einzusehen."
training_res_82 = "Die Sperrfunktion friert Daten ein. Benutzer können vorhandene Daten weiterhin anzeigen, sie aber nur ändern, wenn sie die erforderlichen Benutzerrechte haben. Dieses Video veranschaulicht die Grundlagen zum Sperren von Instrumenten. Ausführlichere Anweisungen zur Sperrenverwaltung finden Sie in den integrierten Hilferessourcen und Sperranwendungen."
training_res_83 = "Das Definieren von Events ist eine Voraussetzung des longitudinalen Moduls. Dieses Modul ermöglicht es, beliebige Datenerhebungsinstrumente für jeden Datensatz mehrfach auszufüllen. Das Modul verwendet eine Event-Übersicht, um die für die Datenerhebung verwendeten Zeitpunkte zu definieren. Dieses Video zeigt, wie die Zeitpunkte (auch Events genannt) definiert werden."
training_res_84 = "Das Festlegen von Instrumenten ist ein optionaler Schritt des longitudinalen Moduls. Dieses Modul ermöglicht es, beliebige Datenerhebungsinstrumente für jeden Datensatz mehrfach auszufüllen. Das Modul verwendet eine Event-Übersicht, um die für die Datenerhebung verwendeten Zeitpunkte zu definieren. Dieses Video zeigt, wie festgelegt wird, welche Instrumente zu welchem Zeitpunkt ausgefüllt werden."
training_res_85 = "Eine kurze Zusammenfassung dessen, was REDCap ist und was es leisten kann."
training_res_86 = "Erkunden Sie diese Übersichten zu grundlegenden Konzepten und Funktionen."
training_res_87 = "Eine fokussierte Einführung in den grundlegenden Workflow der Dateneingabe. Geeignet zur Schulung von Dateneingabepersonal."
training_res_88 = "Projekt aufbauen"
training_res_89 = "Lernen Sie, wie Datenerhebungsinstrumente aufgebaut und geändert werden."
training_res_91 = "Eine Einführung in die Methoden Online Designer und Data Dictionary zur Instrumentenentwicklung."
training_res_92 = "Dieses Online-Tool ist die schnellste und intuitivste Methode, um Instrumente zu ändern."
training_res_93 = "Das Data Dictionary ist Ihre Projektstruktur in einer herunterladbaren Tabellenkalkulationsdatei. Die Tabelle kann geändert und in REDCap hochgeladen werden, um Instrumente zu ändern. Um ein Beispiel zu sehen, laden Sie die"
training_res_94 = "Eine Veranschaulichung einiger beliebter Feldtypen."
training_res_95 = "Dieses fortgeschrittene Tool ermöglicht ein leistungsfähiges System zur Verwaltung von Datenabfragen."
training_res_96 = "Grundfunktionen & Module"
training_res_97 = "Anwendungsübersicht"
training_res_99 = "Dieses Tool organisiert Ihre Studie, indem es anstehende Meilensteine und Events verfolgt."
training_res_100 = "Dies ist eine optionale Funktion in longitudinalen Projekten. Das Tool erzeugt datensatzspezifische Zeitpläne auf Basis einer Reihe von Events oder Zeitpunkten. Zusammen mit dem Kalendermodul vereinfacht dieses Tool die longitudinale Dateneingabe erheblich."
training_res_101 = "Einführung in die Instrumentenentwicklung"
training_res_102 = "Eine kurze Einführung in vier beliebte integrierte Funktionen für Projekt- oder Datenmanagement: 1) Benutzerrechte, 2) Datenimport-Tool, 3) Seite Datenexporte, Reports und Statistik und 4) Alarme & Benachrichtigungen."
training_res_103 = "Ein Überblick über die Verwendung von Projekt-Dashboards mit einigen Beispielen unter Nutzung von Smart Charts, Funktionen und Tabellen."
training_res_104 = "Smart Charts, Funktionen und Tabellen"
training_res_105 = "Ein Überblick über die Verwendung einer neuen Kategorie von Smart Variables: Smart Charts, Smart Functions und Smart Tables."
training_res_106 = "VIDEO: Projekt-Dashboards verwenden"
training_res_107 = "VIDEO: Smart Charts, Funktionen und Tabellen verwenden"
training_res_108 = "So verwenden Sie die Multi-Language-Management-Funktion, mit der Benutzer Eingabeformulare, Fragebögen, Alarme und mehrere weitere Elemente in mehreren Sprachen anzeigen können."
training_res_109 = "VIDEO: Multi-Language Management verwenden"
training_res_110 = "Dieses Video bietet einen detaillierten Überblick über den Aufbau eines REDCap-Projekts und viele der dabei häufig beteiligten Funktionen."
training_res_111 = "Ein Überblick über die Verwendung des Randomisierungsmoduls für klinische Studien und Prüfungen."

