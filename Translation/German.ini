data_export_tool_08d = "Sobald Sie den Speicherort des Ordners mit der CSV-Datei haben, doppelklicken Sie auf die Syntaxdatei, um sie in SPSS zu öffnen. Geben Sie im Syntaxeditor in SPSS den Pfad in die erste Zeile des Syntaxcodes ein, sodass NAME nun auf den vollständigen Pfad der Datei auf Ihrem Computer gesetzt ist. Die erste Zeile der SPSS-Syntaxdatei sieht wie folgt aus: "
