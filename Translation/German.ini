data_export_tool_202 = "Das gesamte Projekt (alle Datensätze, Events, Arme, Instrumente, Felder und Projekteigenschaften) kann als einzelne XML-Datei heruntergeladen werden, die im CDISC-ODM-Format vorliegt (ODM-Version 1.3.1)."
data_export_tool_203 = "Diese XML-Datei kann verwendet werden, um einen Klon des Projekts (optional einschließlich seiner Daten) auf diesem REDCap-Server oder auf einem anderen REDCap-Server zu erstellen (sie kann auf der Seite Neues Projekt erstellen hochgeladen werden). Da sie im CDISC-ODM-Format vorliegt, kann sie auch verwendet werden, um das Projekt in ein anderes ODM-kompatibles System zu importieren."
