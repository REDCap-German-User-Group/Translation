alerts_78 = "Obwohl sie Automated Survey Invitations in vieler Hinsicht ähneln, ermöglichen Alarme & Benachrichtigungen größere Komplexität und bieten mehr Funktionen. Beispielsweise gelten Alarme sowohl für Dateneingabeformulare als auch für Umfragen und bieten außerdem mehr Optionen dazu, wer Empfänger einer Benachrichtigung sein kann (Project-Benutzer, Umfrageteilnehmer usw.)."
alerts_79 = "Um mit dem Erstellen von Alarmen zu beginnen, klicken Sie auf die Schaltfläche 'Neuen Alarm hinzufügen', um alle Einstellungen anzuzeigen, die für einen bestimmten Alarm definiert werden müssen. Sobald ein Alarm erstellt wurde, ist er sofort aktiv und kann ab diesem Zeitpunkt jederzeit ausgelöst werden. Wenn Sie einen Alarm entfernen oder nicht mehr verwenden möchten, verwenden Sie die Einstellung Optionen->Alarm deaktivieren, wodurch verhindert wird, dass der Alarm weiterhin ausgelöst wird. Er kann jederzeit wieder aktiviert werden und ist dann sofort wieder aktiv. Um alle Benachrichtigungen anzuzeigen, die bereits gesendet wurden oder zukünftig gesendet werden, können Sie den Tab Benachrichtigungsprotokoll anzeigen."
alerts_80 = "HINWEIS: Da Sie eine ältere Version von Internet Explorer verwenden, kann diese Seite nicht wie erwartet funktionieren. Sie können die Seite unten anzeigen, aber keine Alarme erstellen oder ändern. Wir empfehlen ein Upgrade auf die neueste Version von Internet Explorer oder die Verwendung eines anderen Browsers wie Firefox oder Google Chrome."
