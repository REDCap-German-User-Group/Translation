design_376 = "Entwurfsmodus starten"
design_377 = "Mit dem Online Designer können Sie Projektänderungen an Feldern und Datenerfassungsinstrumenten sehr einfach nur mit Ihrem Webbrowser vornehmen."
design_378 = "Unten haben Sie die Optionen, ein bestehendes Instrument zu ändern, ein Instrument zu löschen, ein neues Instrument zu erstellen, ein Instrument als PDF-Dokument herunterzuladen oder Ihre Instrumente neu zu ordnen."
design_379 = "Um Änderungen an den unten aufgeführten Instrumenten vorzunehmen, müssen Sie das Projekt zuerst in den Entwurfsmodus versetzen, indem Sie oben auf den Button 'Entwurfsmodus starten' klicken."
