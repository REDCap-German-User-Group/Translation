global_272 = "Datei hochladen"
global_273 = "Datei hier ablegen oder klicken<br>um einen Anhang hochzuladen"
global_274 = "HINWEIS: Alle hier mit dem Rich Text Editor hochgeladenen Dateien erhalten einen <b>öffentlich zugänglichen Downloadlink</b>, der in den Text eingefügt wird. Jede Person, die diesen Link besitzt (auch Personen, die nicht in REDCap eingeloggt sind), kann die Datei jederzeit herunterladen. Dateien mit <b>vertraulichen oder sensiblen Informationen (z. B. PHI oder PII) sollten hier *nicht* hochgeladen werden</b>. Außerdem können alle hier hochgeladenen Dateien später im Ordner \"Sonstige Dateianhänge\" des Datei-Repository aufgerufen und/oder gelöscht werden; dessen Inhalte zählen nicht zum gesamten im Projekt verwendeten Dateispeicher."
