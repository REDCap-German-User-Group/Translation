; design_962 is concatenated with a Codebook button/link.
design_962 = "oder öffnen Sie das"
design_963 = "Die unten aufgeführten Eingabeformulare werden durch Form Display Logic gesteuert."
design_964 = "Form Display Logic ist eine erweiterte Funktion, die eine Möglichkeit bietet, mit bedingter Logik bestimmte Eingabeformulare zu deaktivieren, die auf dem Datensatzstatus-Dashboard, der Datensatz-Startseite oder in der Formularliste im linken Menü angezeigt werden. Man kann sie sich als 'Branching Logic auf Formularebene' vorstellen. Form Display Logic kann sehr nützlich sein, wenn Sie verhindern möchten, dass Benutzer Daten in einem bestimmten Formular oder Event eingeben, bevor bestimmte Bedingungen erfüllt sind. Die Formulare werden weiterhin auf der Seite angezeigt, aber deaktiviert, um den Zugriff der Benutzer zu verhindern. Unten können Sie beliebig viele Bedingungen definieren. Ein Formular kann in mehreren Bedingungen ausgewählt werden; beachten Sie in diesem Fall jedoch, dass <u>das Formular aktiviert wird, wenn mindestens eine der Bedingungen erfüllt ist</u>. Form Display Logic wirkt sich nicht auf Datenimporte aus, sondern funktioniert nur in der Benutzeroberfläche zur Dateneingabe, um Formulare zu aktivieren/deaktivieren. Außerdem wird Form Display Logic von der Fragebogen-Warteschlange überhaupt nicht genutzt, kann aber das Verhalten der Funktion Automatisch zum nächsten Fragebogen beeinflussen, wenn die Checkbox dafür unten aktiviert ist."
design_965 = "Formulare aktiviert lassen, wenn sie Daten enthalten"
design_966 = "Nur leere Formulare deaktivieren (die mit grauem Formularstatussymbol)."
design_968 = "Weitere Bedingung hinzufügen"
design_969 = "(Sie können mehrere Formulare auswählen, indem Sie sie anklicken)"
design_970 = "...wenn die untenstehende Logik <i>WAHR</i> ist."
design_971 = "<b>HINWEIS:</b> Ein oder mehrere Formulare wurden in mehreren Bedingungen ausgewählt, was zulässig ist. Bitte beachten Sie, dass das Formular in diesem Fall aktiviert wird, wenn <u>mindestens eine der Bedingungen erfüllt ist</u>. Unten finden Sie eine Liste der Formulare, die in mehreren Bedingungen verwendet werden:"
design_972 = "Möchten Sie wirklich alle Bedingungen entfernen?"
design_974 = "Beim Erheben von Daten per Fragebogen werden alle derzeit ausgeblendeten Formulare übersprungen, wenn die Option \"Automatisch zum nächsten Fragebogen\" verwendet wird."
