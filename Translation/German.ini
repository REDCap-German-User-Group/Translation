asi_000 = "Automatische Einladungen hoch- oder herunterladen"
asi_001 = "Einstellungen für automatisierte Fragebogeneinladungen hochladen (CSV)"
asi_002 = "Alle Einstellungen für automatisierte Fragebogeneinladungen herunterladen (CSV)"
asi_004 = "Wählen Sie mit den Kontrollkästchen unten die Fragebögen aus, auf die Sie die soeben gespeicherten automatisierten Einladungseinstellungen anwenden möchten, und klicken Sie dann auf den Button Kopieren."
asi_005 = "Sie können die Einstellungen für automatisierte Fragebogeneinladungen (ASI) für *alle* Fragebögen/Events in einer einzigen CSV-Datei importieren. Diese muss alle erforderlichen Spalten enthalten, jeweils mit einem gültigen Wert (siehe unten). Das gleichzeitige Hochladen vieler ASI-Einstellungen kann oft weniger zeitaufwändig sein, als sie einzeln einzugeben. Wenn Sie eine schnelle Vorlage für eine ASI-Importdatei benötigen, können Sie manuell eine ASI für einen einzelnen Fragebogen erstellen und dann einen ASI-Export als Grundlage für Ihre eigene ASI-Importdatei durchführen (z. B. per Kopieren und Einfügen in einem Tabellenkalkulationsprogramm, um ASIs für andere Fragebögen/Events zu erstellen)."
asi_006 = "CSV-Datei auswählen und hochladen"
asi_007 = "Vollständige Liste der *erforderlichen* Spalten in den CSV-Import-/Exportdateien anzeigen"
asi_008 = "Bedingung, wenn dieses Fragebogeninstrument abgeschlossen ist"
asi_009 = "Bedingung, wenn dieses Fragebogeninstrument in diesem Event abgeschlossen ist"
asi_010 = "E-Mail-Absender"
asi_011 = "0 für Deaktiviert, 1 für Aktiviert"
asi_012 = "Bedingte Logik"
asi_013 = "0 für Nein, 1 für Ja"
asi_014 = "Speichern & kopieren nach..."
asi_015 = "Automatisierte Einladungseinstellungen wurden erfolgreich kopiert!"
asi_016 = "Automatisierte Einladungseinstellungen in andere Fragebögen kopieren"
asi_017 = "Kopieren"
asi_018 = "Automatisierte Einladungseinstellungen in die folgenden Fragebögen kopieren:"
asi_019 = "Fragebogen, von dem kopiert wird:"
asi_020 = "Die automatisierten Einladungseinstellungen wurden für die folgenden Fragebögen erfolgreich hinzugefügt oder geändert:"
asi_021 = "Automatisierte Einladungseinstellungen wurden erfolgreich hochgeladen!"
asi_022 = "FEHLER: Ihre hochgeladene CSV-Datei enthält Fehler. Ihre Änderungen wurden nicht gespeichert. Die unten aufgeführten Felder in Ihrer Datei hatten entweder einen fehlenden oder ungültigen Wert. Bitte korrigieren Sie diese Fehler und laden Sie Ihre CSV-Datei erneut hoch."
asi_023 = "Bedingungen für Auto Invitations neu auswerten"
asi_024 = "Ausgewählte Fragebögen neu auswerten"
asi_025 = "Es kann manchmal notwendig sein, einige oder alle automatisierten Fragebogeneinladungen (ASIs) für alle Datensätze im Projekt neu auszuwerten. <b>Dies ist besonders nützlich, wenn die Bedingungen einer ASI (in Schritt 2 des ASI-Setup-Prozesses) geändert wurden, nachdem bereits Daten für einige Datensätze eingegeben wurden.</b> Die Neuauswertung einer ASI für alle Datensätze kann daher alle auf den aktuellen Stand bringen, an dem sie basierend auf den aktuellen Bedingungen der ASI sein sollten. Dadurch kann die Neuauswertung dazu führen, dass einige Einladungen gesendet und/oder geplant werden."
asi_026 = "Wenn Sie unten Fragebögen auswählen und auf den Button 'Neu auswerten' klicken, beginnt der Prozess der Neuauswertung jeder ASI für *jeden* Datensatz im Projekt. HINWEIS: Wenn Ihr Projekt Tausende von Datensätzen oder mehr enthält, kann der Prozess einige Minuten dauern. Bitte lassen Sie ihn daher abschließen und verlassen Sie die Seite nicht, bis er abgeschlossen ist. Wenn eine ASI außerdem bedingte Logik hat und die Option 'Sicherstellen, dass Logik vor dem Senden der Einladung noch wahr ist?' aktiviert ist, beachten Sie bitte, dass geplante (d. h. nicht gesendete) Einladungen während der Neuauswertung *möglicherweise* aufgehoben/entfernt werden, wenn die bedingte Logik für einen bestimmten Datensatz nicht mehr als TRUE ausgewertet wird."
asi_027 = "Unten Fragebögen auswählen, deren ASI-Bedingungen neu ausgewertet werden sollen:"
asi_028 = "Verhindern, dass diese Einladung künftig jemals gesendet wird, selbst wenn Bedingungen für automatisierte Fragebogeneinladungen erfüllt sind? Wenn nicht aktiviert, wird diese Einladung zwar gelöscht, könnte aber künftig möglicherweise erneut ausgelöst werden, wenn ASI-Bedingungen erfüllt sind."
asi_029 = "Verhindern, dass diese Einladungen künftig jemals gesendet werden, selbst wenn Bedingungen für automatisierte Fragebogeneinladungen erfüllt sind (falls eine dieser Einladungen ursprünglich per ASI ausgelöst wurde)? Wenn nicht aktiviert, werden diese Einladungen zwar gelöscht, könnten aber künftig möglicherweise erneut ausgelöst werden, wenn ASI-Bedingungen erfüllt sind und sie ursprünglich per ASI ausgelöst wurden."
asi_030 = "Nur gelöschte Einladungen (d. h. dauerhaft storniert)"
asi_031 = "(ohne gelöschte Einladungen)"
asi_032 = "(dauerhaft storniert)"
asi_033 = "Nichts geändert! Es scheint, dass für keine Datensätze im Projekt Fragebogeneinladungen geplant oder entfernt werden mussten."
;; asi_034 is concatenated with a dynamic scheduled-invitation count, a dynamic unscheduled-invitation count, string asi_035, a dynamic record count, string data_entry_173, and string period.
asi_034 = "Einladungen wurden geplant (und"
;; asi_035 is concatenated with string asi_034, dynamic invitation counts, a dynamic record count, string data_entry_173, and string period.
asi_035 = "bereits geplante Einladungen wurden aufgehoben) über insgesamt"
asi_036 = "Abgeschlossen!"
asi_038 = "Diese Einladung dauerhaft stornieren? (optional)"
asi_039 = "Diese Einladungen dauerhaft stornieren? (optional)"
asi_043 = "Bitte beachten Sie, dass ASI-Einladungen kurz nach dem Klicken auf den Button unten gesendet werden, wenn sie auf 'Sofort' eingestellt sind. Wenn sie nach einer bestimmten Verzögerung gesendet werden sollen, basiert die Verzögerung auf dem Zeitpunkt, zu dem Sie die ASI neu ausgewertet haben."
asi_044 = "HINWEIS: <u>Die Neuauswertung einer ASI plant Einladungen, die noch nicht geplant sind, aber geplant sein sollten</u>, und umgekehrt entfernt sie aktuell geplante Einladungen, die nicht geplant sein sollten (weil die ASI-Bedingung nicht mehr als TRUE ausgewertet wird). <u>Die Neuauswertung einer ASI ändert *NICHT* bereits geplante Einladungen</u> - d. h. sie ändert weder Einladungstext, Empfänger-/Absenderadressen noch Datum/Uhrzeit, zu der die Einladung gesendet werden soll, *wenn* die Einladung bereits geplant wurde. Bei der Neuauswertung einer ASI werden nur Änderungen an Schritt 2 des ASI-Setup-Prozesses berücksichtigt (und nicht Änderungen an Schritt 3), wenn bestimmt wird, ob eine Einladung geplant werden soll oder ob eine bereits geplante Einladung entfernt/aufgehoben werden soll."
asi_045 = "Integer - Wiederholungsintervall nur für wiederholte Fragebögen"
asi_046 = "Integer - Anzahl der Wiederholungen (leer lassen für unbegrenzte Wiederholung)"
asi_047 = "- Einheiten des Wiederholungsintervalls"
asi_048 = "Automatisierte Einladungen für diesen Fragebogen aktivieren?"
asi_049 = "\"Aktiv\" muss ausgewählt sein, damit automatisierte Fragebogeneinladungen ausgelöst und anhand der in diesem Pop-up angegebenen Bedingungen gesendet werden. Sie können sie jederzeit in Zukunft auf Nicht aktiv setzen (und umgekehrt)."
asi_050 = "HINWEIS: Das Setzen der ASI auf 'Nicht aktiv' verhindert nicht, dass Einladungen gesendet werden, wenn sie bereits geplant wurden. In diesem Fall müssen sie stattdessen manuell über das Fragebogen-Einladungslog gelöscht werden. Außerdem werden bereits geplante Einladungen nicht neu ausgewertet, während die ASI auf 'Nicht aktiv' gesetzt ist, selbst wenn die Einstellung 'Sicherstellen, dass Logik noch wahr ist' aktiviert ist."
asi_051 = "Auto-Invitation-Optionen"
asi_052 = "Automatisierte Fragebogeneinladungen neu auswerten"
asi_053 = "Neuauswertung jetzt ausführen"
asi_054 = "Vor dem Speichern zurücksetzen?"
asi_055 = "In {0} vorgenommene Änderung(en) erfordern, dass die Queue- und/oder Wiederholungstabelle(n) für diesen Datensatz zurückgesetzt werden, damit die Änderung(en) wirksam werden. Wir empfehlen, vor dem Fortfahren einen Reset durchzuführen."
asi_056 = "Ja, zurücksetzen & Änderungen speichern"
asi_057 = "Nein, ignorieren & Änderungen speichern"
asi_058 = "<b>Testlaufmodus ist aktiviert</b>: Ausgewählte Fragebögen werden in einer sandboxähnlichen Umgebung neu ausgewertet. Dadurch können Sie anzeigen, welche Datensätze von der Neuauswertung *betroffen wären*, <b>ohne tatsächlich Einladungen zu senden oder zu planen</b>. Bei aktiviertem Testlauf werden während der Neuauswertung keine Datensätze betroffen."
asi_060 = "Ein neuer Wert, der in dieser automatisierten Fragebogeneinladung gesetzt wird, wird für bestehende Datensätze im Projekt NICHT automatisch angewendet, ES SEI DENN, dem Datensatz werden Daten hinzugefügt/aktualisiert (per Fragebogen, Eingabeformular oder Datenimport). <b>Als Best Practice wird empfohlen, dass Sie die Option 'ASIs neu auswerten' im Drop-down 'Auto Invitation options' anklicken</b>, um den Neuauswertungsprozess auszuführen. Dieser prüft erneut, ob bestehende Datensätze aufgrund einer kürzlich an der ASI vorgenommenen Änderung ausgelöst werden sollten (und daher einige Fragebogeneinladungen geplant werden müssen)."
asi_062 = "Wenn ein Teilnehmer von MyCap zu automatisierten Fragebogeneinladungen wechselt, fügen Sie die Variable [new-instance] unmittelbar nach dem Fragebogenlink/der URL in die an Teilnehmer gesendete Nachricht ein. Beispiel: [survey-link][new-instance]."

fdl_000 = "Form Display Logic bearbeiten"
