design_225 = "Branching Logic hinzufügen/bearbeiten"
design_226 = "Branching Logic kann verwendet werden, wenn Felder/Fragen unter bestimmten Bedingungen ausgeblendet werden sollen. Wenn Branching Logic definiert ist, ist das Feld nur sichtbar, wenn die angegebenen Bedingungen wahr sind (d. h. Feld nur anzeigen, wenn...). Sie können diese Bedingungen entweder im Textfeld unten mit der erweiterten Branching-Logic-Syntax angeben oder den Drag-N-Drop Logic Builder verwenden, mit dem Sie die Logik einfacher erstellen können, indem Sie die gewünschten Optionen hinüberziehen. Sie können bei Bedarf zwischen beiden Methoden wechseln. Beachten Sie jedoch, dass erweiterte Logik größere Komplexität erlaubt und daher möglicherweise nicht mehr in die Drag-N-Drop-Methode überführt werden kann, wenn sie zu komplex wird."
