survey_1585 = "Dateispeicherzeit"
survey_1586 = "Umfrage abgeschlossen"
survey_1587 = "Wenn das 'e-Consent Framework' in einer Umfrage aktiviert ist, können die e-Consent-PDF-Snapshot-Dateien, die im File Repository archiviert werden, zusätzlich mit den untenstehenden Einstellungen auf einem externen Dateiserver gespeichert werden. Dies kann für bestimmte Anforderungen an regulatorische Compliance wünschenswert sein, z. B. für 21 CFR Part 11-Studien, bei denen die PDFs in einer Part-11-konformen Umgebung gespeichert werden müssen. Hinweis: Wenn aktiviert, werden *alle* Umfragen in dieser gesamten REDCap-Installation, bei denen die Option 'e-Consent Framework' aktiviert ist, diese PDF-Snapshots automatisch auf dem externen Server speichern, dessen Zugangsdaten/Einstellungen unten definiert sind."
survey_1588 = "Somit läuft die Umfrage unabhängig von der lokalen Zeit des Teilnehmers zu der oben eingegebenen Zeit für die Zeitzone {0} ab."
survey_1589 = "HINWEIS: Da das e-Consent Framework für diese Umfrage aktiviert ist, dürfen Befragte nicht zurückkehren und ihre abgeschlossene e-Consent-Antwort ändern, um die Integrität der Einwilligung des Teilnehmers zu wahren."
survey_1590 = "HINWEIS: Im Projektstatus Analyse/Aufräumen werden bereits geplante Umfrageeinladungen NICHT gesendet, sofern das Projekt nicht zurück in den Produktionsstatus versetzt wird."
survey_1591 = "HINWEIS: Im Projektstatus Analyse/Aufräumen werden bereits geplante Alarme NICHT gesendet, sofern das Projekt nicht zurück in den Produktionsstatus versetzt wird."
survey_1592 = "Wenn Sie keinen Zugangscode haben, kontaktieren Sie bitte die Person(en), die diese Umfrage administrieren."
survey_1593 = "aus Event"
survey_1594 = "Link kopieren"
survey_1595 = "Twilio Alphanumeric Sender ID (optional)"
survey_1596 = "Anstelle der Eingabe einer Twilio-Telefonnummer können Sie alternativ eine Twilio Alphanumeric Sender ID verwenden, wenn diese von Twilio in Ihrem Land unterstützt wird (z. B. nicht in den USA verfügbar). HINWEIS: Die Alphanumeric Sender ID kann nur für ausgehende SMS-Nachrichten verwendet werden und daher nicht für Sprachanrufe oder eingehende SMS-Messaging-Funktionen."
survey_1597 = "(nicht verfügbar bei Verwendung von Alphanumeric Sender ID)"
survey_1598 = "(noch nicht gesendet)"
survey_1599 = "EINRICHTUNG & KONFIGURATION: Prüfen Sie anhand Ihrer institutionellen Richtlinien, ob Sie ein eigenes Twilio-Konto erstellen müssen. Wenn Ihre Institution verlangt, dass Sie ein Konto erstellen, navigieren Sie zu Twilio.com, um ein Konto zu eröffnen und Guthaben hinzuzufügen (da für jeden getätigten Telefonanruf und jede gesendete SMS-Nachricht Kosten entstehen). Sobald Ihr REDCap-Projekt durch Eingabe der Twilio-Kontozugangsdaten auf der Projekt-Setup-Seite Ihres REDCap-Projekts mit einem Twilio-Konto verbunden ist, können Sie konfigurieren, wie Sie Twilio in Ihrem Projekt verwenden möchten. Im Allgemeinen unterscheidet sich die normale Durchführung einer Umfrage in REDCap nicht stark von der Verwendung von Twilio-SMS/Sprachanrufen, außer dass Sie zusätzlich wählen, wie Ihre Umfrageeinladungen zugestellt werden. Die folgenden Auswahlmöglichkeiten sind verfügbar: 1) Umfrage als Sprachanruf starten, 2) Umfrage als SMS-Konversation starten, 3) Umfrageeinladung mit Umfragelink per SMS senden, 4) Umfrageeinladung per SMS senden, um Umfrage als Sprachanruf auszufüllen (Befragter ruft an), 5) Umfrageeinladung per SMS senden, um Umfrage als Sprachanruf auszufüllen (Befragter erhält Anruf beim Antworten per SMS). Eine oder alle dieser Einladungszustellmethoden können innerhalb eines einzigen Projekts verwendet werden. Die Wahl der Zustellmethode hängt vollständig von Ihrem konkreten Anwendungsfall ab, wie Sie Daten von Ihren Teilnehmenden erheben möchten."
survey_1600 = "Ihre E-Mail-Adresse wird nicht mit Ihren Umfrageantworten gespeichert, sondern in den E-Mail-Protokollen des Systems."
survey_1601 = "Benutzerdefiniertes CSS"
survey_1602 = "Fügen Sie Ihrer Umfrage benutzerdefiniertes Styling hinzu, indem Sie CSS definieren, das auf jeder Seite dieser Umfrage eingebunden wird."
survey_1603 = "Was ist CSS?"
survey_1604 = "CSS, oder Cascading Style Sheets, ist eine Sprache zur Beschreibung der Darstellung eines in HTML geschriebenen Dokuments. Im Wesentlichen steuert sie, wie eine Webseite aussieht, einschließlich Layout, Farben, Schriftarten und anderer visueller Aspekte."
