data_entry_411 = "(Obwohl Sie auf 'Zum nächsten Datensatz' geklickt haben, gibt es keinen Datensatz in der Liste, der auf den gerade gespeicherten folgt.)"
data_entry_412 = "Inkompatible Checkbox-Auswahl"
data_entry_414 = "Ermöglicht, eine Checkbox-Option als 'keines der oben genannten' festzulegen, sodass keine anderen Optionen markiert bleiben, wenn diese eine Option ausgewählt wird. Das bedeutet: Wenn diese bestimmte Option ausgewählt wird, wird der Benutzer darauf hingewiesen, dass alle anderen markierten Optionen abgewählt werden. Und wenn die Option 'keines der oben genannten' bereits markiert ist, während der Benutzer eine andere Option markiert, wird die Option 'keines der oben genannten' automatisch abgewählt. Dieses Action Tag ermöglicht eine Option 'keines der oben genannten', ohne dass Benutzer versehentlich gleichzeitig andere Optionen ausgewählt haben. Das Format muss dem Muster @NONEOFTHEABOVE=?? folgen, wobei ?? der codierte Wert der Checkbox-Option 'keines der oben genannten' ist - z. B. @NONEOFTHEABOVE=98. Alternativ ist es möglich, mehrere Optionen gleichzeitig als Option 'keines der oben genannten' festzulegen. Dafür müssen die codierten Werte durch Kommas getrennt in einfachen oder doppelten Anführungszeichen stehen - z. B. @NONEOFTHEABOVE='45,99'. Dies ist in bestimmten Situationen nützlich, etwa wenn Sie eine Option 'keines der oben genannten' und außerdem eine Option 'Antwort verweigert' haben, sodass jeweils nur eine dieser Optionen ausgewählt sein kann. HINWEIS: Dieses Action Tag kann nur für Checkbox-Felder verwendet werden."
data_entry_417 = "Ja, andere Auswahlen löschen"
data_entry_418 = "[keine Optionen verfügbar]"
data_entry_419 = "Bewirkt, dass eine oder mehrere angegebene Optionen für ein Checkbox-, Radio- oder Dropdown-Feld deaktiviert werden (d. h. angezeigt, aber nicht nutzbar), nachdem eine bestimmte Anzahl von Datensätzen mit dieser Option gespeichert wurde. Beispielsweise würde @MAXCHOICE(0=50,1=75,2=50) bedeuten, dass die mit '0' codierte Option, sobald 50 Datensätze sie ausgewählt haben, für jeden danach angezeigten Datensatz deaktiviert wird, der diese Option nicht gespeichert hat, etwa wenn das Formular/der Fragebogen für einen neuen Datensatz geöffnet wird; entsprechend 75 Datensätze für Option '1', 50 für Option '2' usw. Das Format besteht aus dem Namen des Action Tags gefolgt von den Optionsangaben in Klammern, wobei jede Angabe dem Format ChoiceCode=MaxCount folgt und die Optionen durch Kommas getrennt werden. Hinweis: Bei longitudinalen Projekten werden beim Zählen der für Datensätze gespeicherten Optionen alle Events getrennt behandelt. Im obigen Beispiel kann Option '0' also in JEDEM Event des Projekts maximal 50 Auswahlen haben."
data_entry_420 = "Ermöglicht einem Checkbox-Feld eine maximale Anzahl von Checkboxen, die markiert werden können. Wenn nach Erreichen des Maximums weitere Checkbox-Optionen angeklickt werden, können diese nicht markiert werden. Das Format muss @MAXCHECKED=# sein, wobei # eine positive ganze Zahl ist. Zum Beispiel erlaubt @MAXCHECKED=3 maximal 3 markierte Checkbox-Optionen. HINWEIS: Dieses Action Tag kann nur für Checkbox-Felder verwendet werden und wird bei Datenimporten nicht erzwungen."
data_entry_421 = "Option kann nicht ausgewählt werden! Die maximale Anzahl von Optionen wurde ausgewählt."
data_entry_423 = "Für die unten aufgeführten Felder wurden Werte eingegeben, aber die maximale Anzahl von Antworten, die für die von Ihnen für diese Felder ausgewählten Optionen eingegeben werden kann, ist leider bereits erreicht. Bitte beachten Sie: <b>Ihre Auswahlen für die unten aufgeführten Felder wurden *NICHT GESPEICHERT*.</b> Wenn Sie für diese Felder eine andere Option auswählen möchten, tun Sie dies bitte und reichen Sie die Seite erneut ein."
