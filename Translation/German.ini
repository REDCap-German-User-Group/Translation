data_entry_611 = "Wenn dieses Action Tag auf ein Mehrfachauswahlfeld angewendet wird, blendet es alle Optionen <b>außer</b> den in seinem Argument aufgeführten aus. Dieses Action Tag ist nützlich, wenn Sie je nach Logik (z. B. abhängig von Zugriffsgruppen) über das Action Tag <code>@IF</code> nur eine Teilmenge von Optionen anzeigen möchten. Das Format muss dem Muster <code>@SHOWCHOICE='??'</code> folgen, wobei die codierten Werte für die anzuzeigenden Optionen in einfachen oder doppelten Anführungszeichen stehen sollten. Wenn mehr als eine Option angezeigt werden soll, geben Sie alle codierten Werte durch Kommas getrennt an. Um zum Beispiel die Option 'Monday (1)' anzuzeigen, würden Sie <code>@SHOWCHOICE='1'</code> verwenden; wenn Sie zusätzlich 'Tuesday (2)' anzeigen möchten, würden Sie <code>@SHOWCHOICE='1,2'</code> verwenden.<br>HINWEIS:<ul><li>Wenn eine <i>nicht angezeigte</i> Option für einen bestimmten Datensatz bereits ausgewählt wurde, wird diese Option im Fragebogen oder Formular für diesen Datensatz/dieses Event weiterhin angezeigt.</li><li>Ausgeblendete Optionen erscheinen weiterhin in Reports und Datenexporten.</li><li>Dieses Action Tag kann nur für die folgenden Feldtypen verwendet werden: Checkbox, Radio, Dropdown, Ja-Nein und Wahr-Falsch.</li><li>Dieses Action Tag funktioniert nicht mit einer Matrix von Feldern.</li><li>Dieses Action Tag hat Vorrang vor dem Action Tag <code>@HIDECHOICE</code>.</li><li>Dieses Action Tag unterstützt Piping in sein Argument.</li></ul>"
data_entry_612 = "Blendet eine oder mehrere Optionen eines Mehrfachauswahlfeldes aus. Dieses Action Tag ist nützlich, wenn Sie eine bestimmte Option nach einer gewissen Nutzung in der Datenerfassung auslaufen lassen möchten. So können Sie die Option ab diesem Zeitpunkt ausblenden, ohne Daten dieser Option zu verwaisen, was passieren würde, wenn Sie die Option einfach löschen. Das Format muss dem Muster <code>@HIDECHOICE='??'</code> folgen, wobei die codierten Werte für die auszublendenden Optionen in einfachen oder doppelten Anführungszeichen stehen sollten. Wenn mehr als eine Option ausgeblendet werden soll, geben Sie alle codierten Werte durch Kommas getrennt an. Um zum Beispiel die Option 'Monday (1)' auszublenden, würden Sie <code>@HIDECHOICE='1'</code> verwenden; wenn Sie zusätzlich 'Tuesday (2)' ausblenden möchten, würden Sie <code>@HIDECHOICE='1,2'</code> verwenden.<br>HINWEIS:<ul><li>Wenn die ausgeblendete Option für einen bestimmten Datensatz bereits ausgewählt wurde, wird die Option im Fragebogen oder Formular für diesen Datensatz/dieses Event nicht ausgeblendet.</li><li>Ausgeblendete Optionen erscheinen weiterhin in Reports und Datenexporten.</li><li>Dieses Action Tag kann nur für die folgenden Feldtypen verwendet werden: Checkbox, Radio, Dropdown, Ja-Nein und Wahr-Falsch.</li><li>Dieses Action Tag funktioniert nur eingeschränkt mit einer Matrix von Feldern; dabei wird lediglich die Checkbox/das Radio für ein Feld in der Matrix ausgeblendet, die Spalte für diese Option in der Matrix aber weiterhin angezeigt.</li><li>Dieses Action Tag unterstützt Piping in sein Argument.</li></ul>"
data_entry_613 = "Die Dateiversionshistorie ermöglicht Ihnen, frühere Versionen einer Datei für ein File-Upload-Feld in einem Formular oder Fragebogen aufzubewahren. Wenn eine neue Version einer Datei für das Feld hochgeladen werden muss, können Sie statt die aktuelle Datei vor dem Hinzufügen der neuen zu löschen einfach eine neue Datei hochladen (über den Link 'Neue Version hochladen'); dabei bleiben alle älteren Versionen erhalten und sind im Popup Datenhistorie für das Feld zum Anzeigen/Herunterladen zugänglich. Diese Funktion bietet den Komfort, auf ältere Versionen der Datei zugreifen zu können, statt sie löschen zu müssen. (Hinweis: Ältere Versionen einer Datei sind nirgendwo sonst im Projekt zugänglich außer im Popup Datenhistorie. Sie werden beispielsweise nicht in die ZIP-Datei aller Dateien eingeschlossen, die für einen bestimmten Datensatz oder für das gesamte Projekt hochgeladen wurden.) Außerdem muss das Popup Datenhistorie (oben) aktiviert sein, um die Dateiversionshistorie zu verwenden."
