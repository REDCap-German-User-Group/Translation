api_docs_233 = "CSV-Beispiel:"
api_docs_234 = "XML-Beispiel:"
api_docs_235 = "Enthält die Attribute des zu erstellenden Projekts, die im angegebenen Format bereitgestellt werden. Obwohl nur die Attribute 'project_title' und 'purpose' erforderlich sind, sind die unten aufgeführten Felder alle möglichen Attribute, die im Parameter 'data' bereitgestellt werden können. Das Attribut 'purpose' muss einen numerischen Wert haben (0=Practice/Just for fun, 1=Other, 2=Research, 3=Quality Improvement, 4=Operational Support), wobei 'purpose_other' nur dann einen Wert (als Textzeichenfolge) haben muss, wenn purpose=1 ist. Die Attribute is_longitudinal (0=False, 1=True; Standard=0), surveys_enabled (0=False, 1=True; Standard=0) und record_autonumbering_enabled (0=False, 1=True; Standard=1) sind alle boolesch. Bitte beachten Sie, dass is_longitudinal=1 bzw. surveys_enabled=1 nicht automatisch Arms/Events bzw. Umfragen zum Projekt hinzufügt, sondern lediglich diese Einstellungen aktiviert, die oben auf der Projekt-Setup-Seite des Projekts sichtbar sind."
api_docs_236 = "Alle verfügbaren Attribute:"
api_docs_237 = "Enthält die Attribute 'arm_num' (bezieht sich auf die Arm-Nummer) und 'name' (bezieht sich auf den Namen des Arms) jedes zu erstellenden/zu ändernden Arms, die im angegebenen Format bereitgestellt werden."
api_docs_238 = "Enthält die erforderlichen Attribute 'event_name' (bezieht sich auf den Namen/das Label des Events) und 'arm_num' (bezieht sich auf die Arm-Nummer, zu der das Event gehört - nimmt '1' an, wenn das Projekt nur einen Arm enthält). Um ein bestehendes Event zu ändern, müssen Sie das Attribut 'unique_event_name' angeben (bezieht sich auf den automatisch generierten eindeutigen Event-Namen des betreffenden Events). Wenn das Projekt das Scheduling-Modul verwendet, können Sie optional die folgenden Attribute angeben, die numerisch sein müssen: day_offset, offset_min, offset_max. Wenn day_offset nicht angegeben wird, werden die Events automatisch in der Reihenfolge nummeriert, in der sie in der API-Anfrage bereitgestellt werden."
api_docs_239 = "Enthält die Attribute 'arm_num' (bezieht sich auf die Arm-Nummer), 'unique_event_name' (bezieht sich auf den automatisch generierten eindeutigen Event-Namen des betreffenden Events) und 'form' (bezieht sich auf den eindeutigen Formularnamen des betreffenden Datenerhebungsinstruments), die im angegebenen Format bereitgestellt werden."
api_docs_240 = "Enthält die Attribute des Benutzers, der zum Projekt hinzugefügt werden soll oder dessen Rechte im Projekt aktualisiert werden, die im angegebenen Format bereitgestellt werden. Alle Werte sollten numerisch sein, mit Ausnahme von username, expiration, data_access_group und forms. Bitte beachten Sie, dass das Attribut 'forms' das einzige Attribut ist, das Unterelemente enthält (eines für jedes Datenerhebungsinstrument), wobei jedes Formular seinen eigenen Form-Rights-Wert hat (siehe Schlüssel unten, um zu erfahren, wofür jeder numerische Wert steht). Die meisten Benutzerrechte-Attribute sind boolesch (0=No Access, 1=Access). Bitte beachten Sie den Unterschied zwischen data_access_group (enthält den eindeutigen DAG-Namen eines Benutzers) und data_access_groups (gibt an, ob der Benutzer Zugriff auf die Seite Zugriffsgruppen hat)."
api_docs_242 = "Super-Tokens: Wenn Sie die API-Methode 'Projekt erstellen' verwenden möchten, ist ein Super-API-Token erforderlich. Super-Tokens sind 64 Zeichen lang (im Gegensatz zu regulären Tokens mit 32 Zeichen), wobei ein REDCap-Benutzer höchstens ein Super-Token haben kann. Wenn Sie ein Super-Token erhalten möchten, wenden Sie sich bitte an Ihren lokalen REDCap-Administrator."
api_docs_243 = "Erforderliche Berechtigungen"
api_docs_244 = "Um diese Methode zu verwenden, benötigen Sie API-Exportrechte im Projekt."
api_docs_245 = "Um diese Methode zu verwenden, benötigen Sie API-Import-/Aktualisierungsrechte im Projekt."
api_docs_246 = "Um diese Methode zu verwenden, benötigen Sie API-Import-/Aktualisierungsrechte *und* Benutzerrechte-Rechte im Projekt."
api_docs_247 = "Um diese Methode zu verwenden, benötigen Sie API-Import-/Aktualisierungsrechte *und* Projekt-Design-/Setup-Rechte im Projekt."
api_docs_248 = "Um diese Methode zu verwenden, benötigen Sie ein Super-API-Token."
api_docs_249 = "Logiktext als Zeichenfolge (z. B. [age] > 30) zum Filtern der von dieser API-Methode zurückgegebenen Daten; die API gibt nur die Datensätze (oder Record-Events bei einem longitudinalen Projekt) zurück, bei denen die Logik TRUE ergibt. Dieser Parameter ist standardmäßig leer/null, sofern kein Wert angegeben wird. Bitte beachten Sie, dass die API mit einer Fehlermeldung antwortet, wenn die Filterlogik eine falsche Syntax enthält."
api_docs_250 = "csv, json, xml [Standard], odm ('odm' bezieht sich auf das CDISC-ODM-XML-Format, speziell ODM-Version 1.3.1)"
api_docs_251 = "Standard: NULL - Der Parameter 'odm' muss eine XML-Zeichenfolge im CDISC-ODM-XML-Format sein, die Projektmetadaten (Felder, Formulare, Events, Arms) enthält und optional auch zu importierende Daten enthalten kann. Das in diesem Parameter enthaltene XML kann aus einer REDCap Project XML-Exportdatei aus REDCap selbst stammen oder aus einem anderen System, das Projekte und Daten im CDISC-ODM-Format exportieren kann. Wenn der Parameter 'odm' in der API-Anfrage enthalten ist, wird das XML verwendet, um dessen Inhalte in das neu erstellte Projekt zu importieren. Dadurch können Sie nicht nur das Projekt mit der API-Anfrage erstellen, sondern auch alle Felder, Formulare und Projektattribute (sowie Events und Arms, falls longitudinal) und Datensatzdaten gleichzeitig importieren."
api_docs_252 = "Projekt-XML exportieren"
api_docs_253 = "Gesamtes Projekt als REDCap-XML-Datei exportieren (enthält Metadaten und Daten)"
api_docs_254 = "Die gesamten Metadaten des REDCap-Projekts (und Daten, falls angegeben) werden im CDISC-ODM-Format als einzelne XML-Zeichenfolge zurückgegeben."
api_docs_255 = "HINWEIS: Alle unten aufgeführten Optionsparameter gelten NUR für zurückgegebene Daten, wenn der Parameter 'returnMetadataOnly' auf FALSE (Standard) gesetzt ist. Für diese API-Methode werden IMMER ALLE Metadaten (alle Felder, Formulare, Events und Arms) exportiert. Nur die zurückgegebenen Daten können mit den optionalen Parametern gefiltert werden."
api_docs_256 = "true, false [Standard] - TRUE gibt nur Metadaten zurück (alle Felder, Formulare, Events und Arms), während FALSE alle Metadaten und außerdem Daten zurückgibt (und die Daten optional gemäß den in der Anfrage bereitgestellten optionalen Parametern filtert)"
api_docs_257 = "Wenn der Parameter 'returnMetadataOnly' auf FALSE gesetzt ist, beachten Sie bitte, dass Datenexport-Benutzerrechte auf alle Daten angewendet werden, die aus dieser API-Anfrage zurückgegeben werden. Wenn Sie beispielsweise Datenexportrechte 'De-identifiziert' oder 'Alle Identifikatorfelder entfernen' haben, werden möglicherweise einige Datenfelder aus dem von der API zurückgegebenen Datensatz entfernt und herausgefiltert. Um sicherzustellen, dass aus Ihrer API-Anfrage keine Daten unnötig herausgefiltert werden, sollten Sie im Projekt Exportrechte für den 'Vollständigen Datensatz' haben."
api_docs_258 = "Datensätze löschen"
api_docs_260 = "Um diese Methode zu verwenden, benötigen Sie das Benutzerrecht 'Datensatz löschen' im Projekt."
api_docs_261 = "delete"
api_docs_262 = "ein Array von Datensatznamen, das bestimmte Datensätze angibt, die Sie löschen möchten"
api_docs_264 = "die Arm-Nummer des Arms, in dem die Datensätze gelöscht werden sollen. (Dies kann nur verwendet werden, wenn das Projekt longitudinal ist und mehr als einen Arm hat.) HINWEIS: Wenn der Parameter arm nicht angegeben wird, werden die angegebenen Datensätze aus allen Arms gelöscht, in denen sie existieren. Wenn arm angegeben wird, werden sie dagegen nur aus dem angegebenen Arm gelöscht."
api_docs_265 = "Projektinformationen importieren"
api_docs_266 = "Mit dieser Methode können Sie einige grundlegende Attribute eines bestimmten REDCap-Projekts aktualisieren, z. B. den Projekttitel, ob es longitudinal ist, ob Umfragen aktiviert sind usw. Das Datenformat entspricht dem Format der API-Methode Projektinformationen exportieren."
api_docs_267 = "Enthält einige oder alle Attribute aus Projektinformationen exportieren im selben Datenformat wie beim Export. Diese Attribute ändern die Projektinformationen."
api_docs_268 = "csv, json, xml"
api_docs_269 = "Gibt die Anzahl der zur Aktualisierung in den Projekteinstellungen akzeptierten Werte zurück (einschließlich Werte, die vor und nach dem Import gleich geblieben sind)."
api_docs_270 = "Attribute des Projekts im angegebenen Format. Boolesche Werte sollten entweder als '0' (nein/false) oder '1' (ja/true) dargestellt werden. Die folgenden Projektattribute können aktualisiert werden:"
api_docs_272 = "Nächsten Datensatznamen generieren"
api_docs_273 = "Diese Methode ist für Projekte mit aktivierter automatischer Datensatznummerierung vorgesehen und exportiert die nächste potenzielle Datensatz-ID für ein Projekt. Sie generiert den nächsten Datensatznamen, indem sie die aktuell höchste numerische Datensatz-ID ermittelt und um eins erhöht."
api_docs_274 = "Hinweis: Diese Methode erstellt keinen neuen Datensatz, sondern ermittelt lediglich, wie der nächste Datensatzname lauten würde."
api_docs_275 = "Wenn im Projekt Zugriffsgruppen (DAGs) verwendet werden, berücksichtigt diese Methode die spezielle Formatierung des Datensatznamens für Benutzer in DAGs (z. B. DAG-ID). In diesem Fall weist sie nur den nächsten Wert für die ID für alle Zahlen innerhalb eines DAG zu. Wenn ein DAG beispielsweise die zugehörige DAG-Nummer 223 hat und die Datensätze 223-1 und 223-2 bereits existieren, ist der nächste Datensatz 223-3, wenn der API-Benutzer zu dem DAG mit der DAG-Nummer 223 gehört. (Die DAG-Nummer wird von REDCap automatisch für jeden DAG vergeben, wenn der DAG erstmals erstellt wird.) Beim Generieren eines neuen Datensatznamens in einem DAG berücksichtigt die Methode alle Datensätze im gesamten Projekt, um die maximale Datensatz-ID zu bestimmen, einschließlich solcher, die ursprünglich in diesem DAG erstellt, später aber einem anderen DAG zugewiesen wurden."
api_docs_276 = "Hinweis: Diese Methode funktioniert auch bei Projekten ohne aktivierte automatische Datensatznummerierung gleich."
api_docs_277 = "Die maximale ganzzahlige Datensatz-ID + 1."
api_docs_278 = "(nur für Projekte mit wiederholten Instrumenten/Events) Die Wiederholungsinstanznummer des wiederholten Events (wenn longitudinal) oder des wiederholten Instruments (wenn klassisch oder longitudinal). Standardwert ist '1'."
api_docs_279 = "true, false [Standard] - TRUE bewirkt, dass das zurückgegebene XML alle Dateien enthält, die für Datei-Upload- und Signaturfelder für alle Datensätze im Projekt hochgeladen wurden; FALSE bewirkt, dass alle solchen Felder nicht enthalten sind. HINWEIS: Wenn diese Option auf TRUE gesetzt wird, kann der Export sehr groß werden und möglicherweise nicht abgeschlossen werden, wenn das Projekt viele Dateien oder sehr große Dateien enthält."
api_docs_280 = "false (oder 'false') - Die in der Anfrage bereitgestellten Datensatznamen werden verwendet. [Standard]"
api_docs_281 = "true (oder 'true') - Neue Datensatznamen werden automatisch bestimmt."
;; api_docs_282 is concatenated with additional example text in API/help.php.
api_docs_282 = "Wenn die automatische Datensatznummerierung im Projekt aktiviert wurde, kann es wünschenswert sein, Datensätze zu importieren, bei denen jeder Datensatzname automatisch von REDCap bestimmt wird (genau wie in der Benutzeroberfläche). Wenn dieser Parameter auf 'true' gesetzt ist, werden die in der Anfrage bereitgestellten Datensatznamen nicht verwendet (obwohl sie weiterhin erforderlich sind, um mehrere Datenzeilen in der Anfrage einem einzelnen Datensatz zuzuordnen). Stattdessen erhalten diese Datensätze in der Anfrage während des Importvorgangs neue Datensatznamen. HINWEIS: Um zu sehen, wie die bereitgestellten Datensatznamen in neue automatische Datensatznamen übersetzt werden, sollte der Parameter returnContent auf 'auto_ids' gesetzt werden. Dadurch wird eine Datensatzliste zurückgegeben, die dem Wert 'ids' ähnelt, aber den neuen Datensatznamen gefolgt vom in der Anfrage bereitgestellten Datensatznamen enthält, wobei beide durch Kommas getrennt sind. Zum Beispiel, wenn "
api_docs_283 = "count [Standard] - die Anzahl importierter Datensätze, ids - eine Liste aller importierten Datensatz-IDs, auto_ids = (nur verwendet, wenn forceAutoNumber=true) eine Liste von Paaren aller importierten Datensatz-IDs, enthält die neu erstellte ID und den ID-Wert, der in der API-Anfrage gesendet wurde (z. B. 323,10)."
api_docs_284 = "Auf TRUE setzen, um eine kompakt formatierte PDF zurückzugeben, die Felder ohne gespeicherte Daten und nicht ausgewählte Multiple-Choice-Optionen ausschließt und dadurch eine kleinere PDF-Datei erzeugt. Wenn FALSE gesetzt ist, werden alle Felder normal angezeigt."
api_docs_285 = "Um nur Datensätze zurückzugeben, die *nach* einem bestimmten Datum/einer bestimmten Uhrzeit <u>erstellt oder geändert</u> wurden, geben Sie einen Zeitstempel im Format YYYY-MM-DD HH:MM:SS an (z. B. '2017-01-01 00:00:00' für den 1. Januar 2017 um Mitternacht Serverzeit). Wenn nicht angegeben, wird keine Startzeit angenommen."
api_docs_286 = "Um nur Datensätze zurückzugeben, die *vor* einem bestimmten Datum/einer bestimmten Uhrzeit <u>erstellt oder geändert</u> wurden, geben Sie einen Zeitstempel im Format YYYY-MM-DD HH:MM:SS an (z. B. '2017-01-01 00:00:00' für den 1. Januar 2017 um Mitternacht Serverzeit). Wenn nicht angegeben, wird die aktuelle Serverzeit verwendet."
api_docs_287 = "Legt das Trennzeichen fest, mit dem Werte in der CSV-Datendatei getrennt werden (nur für CSV-Format). Optionen sind: Komma ',' (Standard), 'tab', Semikolon ';', Pipe '|', oder Caret '^'. Geben Sie für diesen Parameter einfach den Wert in Anführungszeichen an."
api_docs_288 = "Falls angegeben, werden alle Zahlen in dasselbe Dezimalformat gezwungen. Sie können festlegen, dass alle Datenwerte mit Dezimalstelle dasselbe Dezimalzeichen verwenden; dies wird auf alle Berechnungsfelder und zahlenvalidierten Textfelder angewendet. Optionen sind Komma ',' oder Punkt '.', aber wenn leer/null, werden Zahlen im nativen Dezimalformat der Felder exportiert. Geben Sie für diesen Parameter einfach den Wert ',' oder '.' an."
api_docs_289 = "Hinweis: Super-API-Tokens können für diese Methode ebenfalls anstelle eines API-Tokens auf Projektebene verwendet werden. Benutzer können ein Super-Token nur von einem REDCap-Administrator erhalten (über die Seite API-Tokens im REDCap Control Center)."
api_docs_290 = "DAGs exportieren"
api_docs_291 = "Mit dieser Methode können Sie die Zugriffsgruppen eines Projekts exportieren"
api_docs_292 = "DAGs für das Projekt im angegebenen Format"
api_docs_293 = "DAGs importieren"
api_docs_294 = "Mit dieser Methode können Sie neue DAGs (Zugriffsgruppen) in ein Projekt importieren oder den Gruppennamen bestehender DAGs aktualisieren."
api_docs_295 = "DAGs können umbenannt werden, indem einfach der Gruppenname (data_access_group_name) geändert wird. Ein DAG kann erstellt werden, indem ein Gruppenname angegeben wird, während der eindeutige Gruppenname leer gelassen wird."
api_docs_296 = "Enthält die Attribute 'data_access_group_name' (bezieht sich auf den Gruppennamen) und 'unique_group_name' (bezieht sich auf den automatisch generierten eindeutigen Gruppennamen) jedes zu erstellenden/zu ändernden DAG, die im angegebenen Format bereitgestellt werden."
api_docs_297 = "Anzahl hinzugefügter oder aktualisierter DAGs"
api_docs_298 = "DAGs löschen"
api_docs_299 = "Mit dieser Methode können Sie DAGs aus einem Projekt löschen."
api_docs_300 = "ein Array eindeutiger Gruppennamen, die Sie löschen möchten"
api_docs_301 = "Anzahl gelöschter DAGs"
api_docs_302 = "Benutzer-DAG-Zuordnungen exportieren"
api_docs_303 = "Mit dieser Methode können Sie bestehende Benutzer-DAG-Zuordnungen für ein Projekt exportieren"
api_docs_304 = "Benutzer-DAG-Zuordnungen für das Projekt im angegebenen Format"
api_docs_305 = "Benutzer-DAG-Zuordnungen importieren"
api_docs_306 = "Mit dieser Methode können Sie Benutzer einer beliebigen Zugriffsgruppe zuweisen."
api_docs_307 = "Wenn Sie eine bestehende Zuordnung ändern möchten, *müssen* Sie den eindeutigen Benutzernamen und Gruppennamen angeben. Wenn die Spalte 'redcap_data_access_group' nicht bereitgestellt wird, wird der Benutzer keiner Gruppe zugewiesen. Pro Benutzername sollte es nur einen Datensatz geben."
api_docs_308 = "Enthält die Attribute 'username' (bezieht sich auf den bestehenden eindeutigen Benutzernamen) und 'redcap_data_access_group' (bezieht sich auf den bestehenden eindeutigen Gruppennamen) jeder zu ändernden Benutzer-DAG-Zuordnung, die im angegebenen Format bereitgestellt werden."
api_docs_309 = "Anzahl hinzugefügter oder aktualisierter Benutzer-DAG-Zuordnungen"
api_docs_310 = "Mit dieser Methode können Sie das Logging (Audit Trail) aller Änderungen exportieren, die an diesem Projekt vorgenommen wurden, einschließlich Datenexporten, Datenänderungen, Änderungen an Projektmetadaten, Änderungen von Benutzerrechten usw."
api_docs_311 = "Sie können einen Event-Typ wählen, um Ergebnisse für einen bestimmten Event-Typ abzurufen"
api_docs_312 = "Um nur Events zurückzugeben, die zu einem bestimmten Benutzer gehören (bezieht sich auf einen bestehenden Benutzernamen), geben Sie einen user an. Wenn nicht angegeben, werden alle Benutzer angenommen."
api_docs_313 = "Um nur Events zurückzugeben, die zu einem bestimmten Datensatz gehören (bezieht sich auf einen bestehenden Datensatznamen), geben Sie einen record an. Wenn nicht angegeben, werden alle Datensätze angenommen. Dieser Parameter ist nur verfügbar, wenn das Event mit einem Datensatz verbunden ist."
api_docs_314 = "Um nur Events zurückzugeben, die zu einem bestimmten DAG gehören (bezieht sich auf group_id), geben Sie einen dag an. Wenn nicht angegeben, werden alle dags angenommen."
api_docs_315 = "Um nur Events zurückzugeben, die *nach* einem bestimmten Datum/einer bestimmten Uhrzeit <u>protokolliert</u> wurden, geben Sie einen Zeitstempel im Format YYYY-MM-DD HH:MM an (z. B. '2017-01-01 17:00' für den 1. Januar 2017 um 17:00 Uhr Serverzeit). Wenn nicht angegeben, wird keine Startzeit angenommen."
api_docs_316 = "Um nur Datensätze zurückzugeben, die *vor* einem bestimmten Datum/einer bestimmten Uhrzeit <u>protokolliert</u> wurden, geben Sie einen Zeitstempel im Format YYYY-MM-DD HH:MM an (z. B. '2017-01-01 17:00' für den 1. Januar 2017 um 17:00 Uhr Serverzeit). Wenn nicht angegeben, wird die aktuelle Serverzeit verwendet."
api_docs_317 = "Liste aller an diesem Projekt vorgenommenen Änderungen, einschließlich Datenexporten, Datenänderungen sowie Erstellung oder Löschung von Benutzern."
api_docs_318 = "Nach Event filtern (logtype): <br>export = Datenexport, <br>manage = Verwaltung/Design, <br>user = Benutzer oder Rolle erstellt-aktualisiert-gelöscht, <br>record = Datensatz erstellt-aktualisiert-gelöscht, <br>record_add = Datensatz erstellt (nur), <br>record_edit = Datensatz aktualisiert (nur), <br>record_delete = Datensatz gelöscht (nur), <br>lock_record = Datensatzsperrung und E-Signaturen, <br>page_view = Seitenaufrufe"
api_docs_319 = "Mit dieser Methode können Sie Benutzer aus einem Projekt löschen."
api_docs_320 = "ein Array eindeutiger Benutzernamen, die Sie löschen möchten"
api_docs_321 = "Anzahl gelöschter Benutzer"
api_docs_322 = "Benutzerrollen exportieren"
api_docs_323 = "Mit dieser Methode können Sie die Liste der Benutzerrollen eines Projekts exportieren, einschließlich ihrer Benutzerrechte."
api_docs_324 = "Die Methode gibt alle unten aufgeführten Attribute zu Benutzerrollenrechten im angegebenen Format zurück. Bitte beachten Sie, dass das Attribut 'forms' das einzige Attribut ist, das Unterelemente enthält (eines für jedes Datenerhebungsinstrument), wobei jedes Formular seinen eigenen Form-Rights-Wert hat (siehe Schlüssel unten, um zu erfahren, wofür jeder numerische Wert steht). Die meisten Benutzerrollenrechte-Attribute sind boolesch (0=No Access, 1=Access). Zurückgegebene Attribute:"
api_docs_325 = "Benutzerrollen importieren"
api_docs_326 = "Mit dieser Methode können Sie neue Benutzerrollen in ein Projekt importieren und dabei ihre Rechte setzen oder die Rechte bestehender Benutzerrollen im Projekt aktualisieren."
api_docs_327 = "Enthält die Attribute der Benutzerrolle, die zum Projekt hinzugefügt werden soll oder deren Rechte im Projekt aktualisiert werden, die im angegebenen Format bereitgestellt werden. Alle Werte sollten numerisch sein, mit Ausnahme von unique_role_name, role_label und forms. Bitte beachten Sie, dass das Attribut 'forms' das einzige Attribut ist, das Unterelemente enthält (eines für jedes Datenerhebungsinstrument), wobei jedes Formular seinen eigenen Form-Rights-Wert hat (siehe Schlüssel unten, um zu erfahren, wofür jeder numerische Wert steht). Die meisten Benutzerrechte-Attribute sind boolesch (0=No Access, 1=Access)."
api_docs_328 = "Anzahl hinzugefügter oder aktualisierter Benutzerrollen"
api_docs_329 = "Benutzerrollen löschen"
api_docs_330 = "Mit dieser Methode können Sie Benutzerrollen aus einem Projekt löschen."
api_docs_331 = "ein Array eindeutiger Rollennamen, die Sie löschen möchten"
api_docs_332 = "Anzahl gelöschter Benutzerrollen"
api_docs_333 = "Benutzer-Rollen-Zuordnungen exportieren"
api_docs_334 = "Mit dieser Methode können Sie bestehende Benutzer-Rollen-Zuordnungen für ein Projekt exportieren"
api_docs_335 = "Benutzer-Rollen-Zuordnungen für das Projekt im angegebenen Format"
api_docs_336 = "Benutzer-Rollen-Zuordnungen importieren"
api_docs_337 = "Mit dieser Methode können Sie Benutzer einer beliebigen Benutzerrolle zuweisen."
api_docs_338 = "Wenn Sie eine bestehende Zuordnung ändern möchten, *müssen* Sie den eindeutigen Benutzernamen und Rollennamen angeben. Wenn die Spalte 'unique_role_name' nicht bereitgestellt wird, wird der Benutzer keiner Benutzerrolle zugewiesen. Pro Benutzername sollte es nur einen Datensatz geben."
api_docs_340 = "Anzahl hinzugefügter oder aktualisierter Benutzer-Rollen-Zuordnungen"
api_docs_341 = "Fehlende Attribute: Wenn eine Benutzerrolle in der API-Anfrage zu einem Projekt hinzugefügt wird, erhalten alle Attribute, die für diese Benutzerrolle in der Anfrage nicht bereitgestellt werden (einschließlich Formularrechte), automatisch die minimalen Berechtigungen (typischerweise 0=No Access) für dieses Attribut/Recht. Wenn jedoch die Rechte einer bestehenden Benutzerrolle in der API-Anfrage geändert werden, werden nicht bereitgestellte Attribute nicht von ihrem aktuellen Wert geändert; nur die in der Anfrage bereitgestellten Attribute werden geändert."
api_docs_342 = "der eindeutige Instrumentname (Spalte B im Data Dictionary) eines Instruments (als Zeichenfolge), wenn Sie die Daten für alle Felder des angegebenen Instruments für die angegebenen Datensätze löschen möchten."
api_docs_343 = "die Wiederholungsinstanznummer für ein wiederholtes Instrument oder wiederholtes Event. HINWEIS: Wenn das Projekt wiederholte Instrumente/Events hat, werden nur die Daten für diese Wiederholungsinstanz entfernt."
api_docs_344 = "ein Array eindeutiger Event-Namen, die Sie löschen möchten"
api_docs_345 = "HINWEIS: Wenn instrument für ein longitudinales Projekt angegeben wird, ist der Parameter event obligatorisch."
api_docs_346 = "Mit dieser Methode können Sie einen oder mehrere Datensätze aus einem Projekt in einer einzigen API-Anfrage löschen. Optional können Sie außerdem Teile eines Datensatzes löschen, z. B. die Daten eines einzelnen Instruments für einen oder mehrere Datensätze oder die Daten eines einzelnen Events für einen oder mehrere Datensätze."
api_docs_347 = "die Anzahl gelöschter Datensätze oder (wenn instrument, event und/oder instance angegeben sind) die Anzahl gelöschter Elemente im Verhältnis zur Gesamtzahl der angegebenen Datensätze."
api_docs_348 = "Mit dieser Methode kann der aktuelle API-Benutzer seine aktuelle Zuordnung zu einer Zugriffsgruppe wechseln (zuweisen/neu zuweisen/aufheben), wenn er über die DAG-Switcher-Seite im Projekt mehreren DAGs zugewiesen wurde."
api_docs_349 = "Der eindeutige Gruppenname der Zugriffsgruppe, zu der Sie wechseln möchten."
api_docs_350 = "Gibt \"1\" zurück, wenn der aktuelle API-Benutzer zur angegebenen Zugriffsgruppe gewechselt wurde; andernfalls wird eine Fehlermeldung zurückgegeben."
api_docs_351 = "Mit dieser Methode können Sie einen Datensatz aus einem Projekt in einer einzigen API-Anfrage umbenennen."
api_docs_352 = "Um diese Methode zu verwenden, benötigen Sie das Benutzerrecht 'Datensatz umbenennen' im Projekt."
api_docs_353 = "Datensatzname des aktuellen Datensatzes, den Sie in einen neuen Namen umbenennen möchten."
api_docs_354 = "neuer Datensatzname, in den Sie den aktuellen Datensatz umbenennen möchten."
api_docs_355 = "bestimmte Arm-Nummer, in der der aktuelle Datensatz existiert. Wenn null, werden alle Datensätze mit demselben Namen über alle Arms hinweg, in denen er existiert (bei longitudinalem Projekt mit mehreren Arms), in den neuen Datensatznamen umbenannt; andernfalls wird der Datensatz nur im angegebenen Arm umbenannt."
api_docs_356 = "Gibt \"1\" zurück, wenn der Datensatz umbenannt wurde, oder eine Fehlermeldung, falls vorhanden."
api_docs_357 = "true, false [Standard] - gibt an, ob leere Werte für Felder zum Instrument-Abschlussstatus exportiert werden sollen, die ein graues Statussymbol haben. Alle Felder zum Instrument-Abschlussstatus mit grauem Symbol können entweder als leerer Wert oder als \"0\" (Unvollständig) exportiert werden. Leere Werte werden für einen Datenexport empfohlen, wenn die Daten wieder in ein REDCap-Projekt importiert werden."
api_docs_358 = "Datenexport: 0=No Access, 2=De-Identified, 3=Remove Identifier Fields, 1=Full Data Set"
api_docs_359 = "Um diese Methode zu verwenden, benötigen Sie API-Exportrechte *und* Logging-Rechte im Projekt."
api_docs_360 = "Enthält die Attribute 'username' (bezieht sich auf den bestehenden eindeutigen Benutzernamen) und 'unique_role_name' (bezieht sich auf den bestehenden eindeutigen Rollennamen) jeder zu ändernden Benutzer-Rollen-Zuordnung, die im angegebenen Format bereitgestellt werden. Hinweis: Wenn das Projekt Zugriffsgruppen enthält, können Sie als drittes Attribut 'data_access_group' mit einem gültigen eindeutigen DAG-Namen des DAG übergeben, dem Sie den Benutzer während des Zuweisens zu einer Benutzerrolle zuweisen möchten."
;; api_docs_361 is appended after api_docs_066.
api_docs_361 = "oder alternativ als Zeichenfolge (kommagetrennte Liste)."
api_docs_362 = "Fehlende Attribute: Wenn ein Benutzer in der API-Anfrage zu einem Projekt hinzugefügt oder erneut importiert wird, erhalten alle Attribute, die für diesen Benutzer in der Anfrage nicht bereitgestellt werden (einschließlich Formularrechte), automatisch die minimalen Berechtigungen (typischerweise 0=No Access) für dieses Attribut/Recht. Wenn jedoch die Rechte eines bestehenden Benutzers in der API-Anfrage geändert werden, werden nicht bereitgestellte Attribute nicht von ihrem aktuellen Wert geändert; nur die in der Anfrage bereitgestellten Attribute werden geändert."
api_docs_363 = "geben Sie den Wert '0' (\"keep logging\") oder '1' (\"delete logging\") an. Diese Option kann nur für Projekte verwendet werden, bei denen die Einstellung \"Delete a records logging activity when deleting the record?\" durch einen Administrator auf der Seite Edit Project Settings aktiviert wurde. Wenn diese Einstellung im Projekt aktiviert ist, ist der Standardwert '1'; wenn die Einstellung auf Projektebene nicht aktiviert ist, ist der Standardwert '0'. Wenn die Einstellung auf Projektebene aktiviert wurde, muss diese Option mit dem Wert '0' bereitgestellt werden, um zu verhindern, dass die Logging-Aktivität des Datensatzes beim Löschen des Datensatzes gelöscht wird."
api_docs_364 = "Um diese Methode zu verwenden, benötigen Sie API-Exportrechte *und* Benutzerrechte-Rechte (Vollzugriff oder Nur Lesen) im Projekt."
api_docs_365 = "Gibt an, ob der Import als Hintergrundprozess ausgeführt werden soll."
api_docs_366 = "1 oder 'true' für Ja."
api_docs_367 = "0 oder 'false' für Nein. [Standard]"
api_docs_368 = "HINWEIS: Gilt nicht beim Importieren als Hintergrundprozess (d. h. backgroundProcess=true). Bei Verwendung eines Hintergrundprozesses wird success:true (bei Erfolg) oder success:false (bei Fehlschlag) im passenden Format (csv, json, xml) zurückgegeben."
api_docs_369 = "false [Standard], true - den Wert für das alternative Zielfeld zurückgeben, d. h. die Randomisierungsnummer für offene Zuteilungen. Hinweis: Bei verdeckten Zuteilungen wird nur der Wert '*' zurückgegeben, nicht die tatsächliche Zuteilungsgruppe (was die Verblindung aufheben würde)."
api_docs_370 = "Führt die angegebene Randomisierung für den Datensatz aus und gibt den Wert für das Ziel-Randomisierungsfeld zurück (plus optional den alternativen Zielwert) oder bei Fehlschlag eine Fehlermeldung (z. B. wenn der Datensatz nicht existiert oder Stratifikationsinformationen fehlen)."
api_docs_371 = "Mit dieser Methode kann der aktuelle API-Benutzer einen Datensatz randomisieren."
api_docs_372 = "Um diese Methode zu verwenden, benötigen Sie das Randomize-Recht im Projekt."
api_docs_373 = "Der Datensatzname (id) des zu randomisierenden Datensatzes. Der Datensatz muss bereits existieren und alle notwendigen Stratifikationsinformationen enthalten."
api_docs_374 = "Die eindeutige id der Randomisierung (sichtbar auf der Randomisierungsseite für Benutzer mit Design-Berechtigungen oder auf der API-Playground-Seite). Entspricht einem bestimmten Zielfeld und Event."
api_docs_375 = "Einen Umfrage-Zugangscode für einen Teilnehmer exportieren"
api_docs_376 = "Diese Methode gibt einen Umfrage-Zugangscode für einen angegebenen Datensatz und ein Datenerhebungsinstrument (und bei longitudinalen Projekten ein Event) in einem Projekt zurück. Wenn der Benutzer keine Berechtigung für 'Survey Distribution Tools' hat, kann er diese Methode nicht verwenden, und es wird ein Fehler zurückgegeben. Wenn das angegebene Datenerhebungsinstrument im Projekt nicht als Umfrage aktiviert wurde, wird ein Fehler zurückgegeben."
api_docs_377 = "Gibt einen Umfrage-Zugangscode für den angegebenen Datensatz und das Instrument (und bei longitudinalen Projekten das Event) zurück."
api_docs_378 = "HINWEIS: Wenn die Wiederholungsinstanz noch nicht existiert, wird sie erstellt."
api_docs_379 = "true, false [Standard] - gibt an, ob Checkbox-Feldoptionen in einer einzelnen Spalte zusammengefasst werden sollen, die nur die aktivierten Optionen enthält. Standardmäßig werden alle Checkbox-Feldoptionen als separate Spalten exportiert."
api_docs_380 = "Datenanzeigerechte auf Formularebene (Legacy): 0=No Access, 2=Read Only, 1=View records/responses and edit records (survey responses are read-only), 3=Edit Survey Responses<br>Datenanzeigerechte auf Formularebene (ab 15.6): 128=No Access, 129=Read Only, 130=View records/responses and edit records (survey responses are read-only), 8 und/oder 16 (zu 130) hinzufügen, um zusätzlich Edit Survey Responses bzw. Delete-Rechte zu gewähren."

