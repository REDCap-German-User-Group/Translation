system_config_804 = "Dateianhang-Einbettung für Rich-Text-Editor"
system_config_805 = "Wenn aktiviert, können Benutzer eine Datei in den Text einer Umfrageeinladung, eines Alarms, eines Feldlabels oder überall dort anhängen, wo der Rich-Text-Editor verwendet wird (mit Ausnahme des Action Tags @RICHTEXT und Nicht-Projektseiten wie Email Users), indem sie im Editor auf das Anhangsymbol klicken und dann eine Datei von ihrem lokalen Gerät hochladen. Diese Dateien können im Ordner \"Miscellaneous File Attachments\" im Datei-Repository des Projekts aufgerufen und/oder gelöscht werden (falls gewünscht)."
system_config_806 = "Wenn deaktiviert, erscheint das Anhangsymbol nicht im Rich-Text-Editor, und Benutzer können daher keine Dateianhänge in dessen Text einbetten."
system_config_807 = "Inline-PDF-Anhänge für beschreibende Textfelder in einem resultierenden PDF-Download eines Instruments/Fragebogens automatisch anzeigen?"
system_config_808 = "Durch Aktivieren dieser Funktion können PDF-Anhänge im herunterladbaren PDF inline erscheinen, wie sie derzeit auf der Webseite vollständig sichtbar sind."
system_config_809 = "HINWEIS: Diese Funktion erfordert, dass die ImageMagick-PHP-Erweiterung aktiviert ist."
system_config_810 = "ImageMagick ist derzeit in PHP aktiviert."
system_config_811 = "<b>ImageMagick ist derzeit NICHT in PHP aktiviert, daher funktioniert diese Funktion nicht, selbst wenn sie aktiviert ist.</b> Wenn Sie die Erweiterung installieren möchten, besuchen Sie <a target='_blank' href='https://www.php.net/manual/en/book.imagick.php'>die Installationsseite der Imagick-Erweiterung</a>."
system_config_812 = "HINWEIS: Diese Anweisungen werden nur einmal angezeigt."
