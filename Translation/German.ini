mobile_app_34 = "API-Token löschen & Mobile App trennen"
mobile_app_35 = "Wenn Sie aus Sicherheitsgründen oder aus anderen Gründen die REDCap Mobile App von diesem Projekt trennen möchten, müssen Sie Ihren API-Token für dieses Projekt löschen."
mobile_app_36 = "WARNUNG: Bitte beachten Sie, dass alle Daten, die für dieses Projekt in der REDCap Mobile App erfasst und noch nicht zurück auf den Server synchronisiert wurden, DAUERHAFT VERLOREN gehen, wenn Sie diesen API-Token für die REDCap Mobile App verwenden und den API-Token löschen oder neu generieren."
mobile_app_37 = "Projekt einrichten"
mobile_app_39 = "Sie müssen die REDCap Mobile App bereits auf Ihr Mobilgerät oder Tablet heruntergeladen haben. Um dieses Projekt in der REDCap App einzurichten:"
mobile_app_40 = "HINWEIS: Um dieses Projekt in der REDCap Mobile App einzurichten, müssen Sie zuerst einen API-Token anfordern."
mobile_app_41 = "Sie haben derzeit noch keinen API-Token für dieses Projekt. Ein REDCap-API-Token ermöglicht anderen Programmen, Skripten oder Apps, aus der Ferne mit dem REDCap-Server zu kommunizieren. Für die Verwendung der REDCap Mobile App ist ein API-Token erforderlich, damit die App Ihre Projektinformationen und Daten herunterladen und hochladen kann. Um einen API-Token anzufordern, klicken Sie einfach auf den Button unten. Dadurch wird eine E-Mail-Anfrage an Ihren lokalen REDCap-Administrator gesendet. Sobald Ihnen ein API-Token gewährt wurde und Sie per E-Mail benachrichtigt wurden, können Sie zu dieser Seite zurückkehren, um dieses Projekt in der REDCap Mobile App auf Ihrem Gerät einzurichten."
mobile_app_42 = "App auf Ihr Gerät herunterladen"
mobile_app_43 = "Sie müssen zuerst die REDCap Mobile App auf Ihr iOS-, Android- oder BlueStacks-Gerät (Android-Emulator) herunterladen, indem Sie unten auf das entsprechende Symbol klicken. Alternativ können Sie, wenn Sie sich derzeit nicht auf einem Mobilgerät befinden, auf Ihrem Mobilgerät im App Store oder Google Play Store nach 'REDCap' suchen, um die App dort herunterzuladen."
mobile_app_44 = "Mobiles Projekt auf Ihrem Gerät einrichten"
mobile_app_45 = "Eine alternative Möglichkeit, dieses Projekt in Ihrer REDCap App auf Ihrem Mobilgerät oder Tablet einzurichten, ist die Verwendung eines Initialisierungscodes. Öffnen Sie dazu die App auf Ihrem Gerät, klicken Sie auf den Button 'Mobiles Projekt einrichten' und geben Sie unten auf dieser Seite den Code ein, der unten angezeigt wird."
mobile_app_46 = "Links zum Herunterladen der App per E-Mail an mich senden"
mobile_app_47 = "Links zum Herunterladen der REDCap Mobile App"
mobile_app_48 = "Unten finden Sie die Links zum Herunterladen der REDCap Mobile App aus dem Apple App Store oder aus dem Google Play Store (abhängig davon, welche Art von Mobilgerät Sie haben)."
;; mobile_app_49 is concatenated with a dynamic count and mobile_app_50.
mobile_app_49 = "Es wurde festgestellt, dass"
;; mobile_app_50 is concatenated after mobile_app_49 and a dynamic instrument count.
mobile_app_50 = "Instrumente in Ihrem Projekt entweder ein Computer Adaptive Test (CAT) oder ein Auto-Scoring-Instrument sind, die nur als Umfrage auf dem REDCap-Server durchgeführt werden können. Daher können diese Instrumente in der Mobile App nicht funktionieren. Bitte beachten Sie, dass diese spezifischen Instrumente *nicht* in der App erscheinen, wenn Sie dieses Projekt in der REDCap Mobile App einrichten, obwohl alle anderen Instrumente erscheinen."
mobile_app_51 = "Die App ist für die folgenden Plattformen verfügbar: iOS 6.0 oder neuer (iPhone 4 und höher, iPad 2 und höher) und Android 4.3 oder neuer (Telefone und Tablets)."
