dataqueries_144 = "Dieser Datenlösungs-Workflow, in klinischen Prüfungen und Studien oft 'Datenabfragen' genannt, kann entweder auf einem Eingabeformular (durch Klicken auf das Sprechblasen-Symbol neben dem Feld) oder auf der Datenqualitätsseite beim Finden von Daten-Diskrepanzen verwendet werden. Das Datenqualitätsmodul zeigt dann einen neuen Tab 'Probleme lösen' an, über den Benutzer alle gelösten und ungelösten Datenabfragen anzeigen und so noch offene Abfragen lösen können. Benutzern können unterschiedliche Benutzerrechte gegeben werden, die steuern, ob sie Datenabfragen anzeigen, öffnen/schließen oder beantworten können."
