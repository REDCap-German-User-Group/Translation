design_783 = "Rich Text Editor verwenden"
design_784 = "Für jedes Feld eines Instruments können Sie optional den Rich Text Editor verwenden, um Feldlabels oder Abschnittsüberschriften mit vielen Textformatierungsoptionen zu gestalten. Mit dem Rich Text Editor können Sie die Textfarbe ändern (einschließlich Hintergrundfarbe), Tabellen erstellen, Text in verschiedenen Größen hinzufügen, Aufzählungslisten erstellen und mehr. Für Feldlabels, die ursprünglich ohne Rich Text Editor erstellt wurden, können Sie den Rich Text Editor optional für jedes Feld aktivieren, indem Sie die Checkbox 'Rich Text Editor verwenden' anklicken. Er kann später jederzeit auf gleiche Weise wieder deaktiviert werden. Hinweis: Der PDF-Export Ihrer Instrumente gibt *nicht* das gesamte Styling des Rich Text Editors wieder. Beachten Sie daher, dass Zeilenumbrüche und Absätze in PDFs gut dargestellt werden sollten, andere Textformatierungsoptionen wie großer Text, Aufzählungspunkte und Farben jedoch nicht in den PDF-Export des Instruments übertragen werden können. Dies ist eine aktuelle Einschränkung in REDCap."
design_785 = "Lädt das Datum+Uhrzeit des REDCap-Servers in ein leeres Textfeld - ähnlich wie das @TODAY-Tag, aber zusätzlich mit Zeitanteil. Wenn das Feld eine Validierung hat, wird der Wert an das Datumsformat angepasst. HINWEIS: Die verwendete Zeit ist die lokale Zeit des REDCap-Servers, die sich von der lokalen Zeit des Benutzers unterscheiden kann, wenn er sich in einer anderen Zeitzone befindet. Verwenden Sie dieses Tag außerdem nicht für Felder mit Branching Logic, weil der Benutzer immer aufgefordert wird, den Wert zu löschen. Prüfen Sie stattdessen @HIDDEN, wenn Sie das Feld ausblenden möchten."
design_786 = "Lädt das aktuelle UTC/GMT-Datum+Uhrzeit in ein leeres Textfeld - ähnlich wie das @TODAY-Tag, aber zusätzlich mit Zeitanteil. Wenn das Feld eine Validierung hat, wird der Wert an das Datumsformat angepasst. HINWEIS: Die verwendete Zeit ist die aktuelle UTC/GMT-Zeit, die sich von der lokalen Zeit des Benutzers unterscheiden kann, wenn er sich in einer anderen Zeitzone befindet. Verwenden Sie dieses Tag außerdem nicht für Felder mit Branching Logic, weil der Benutzer immer aufgefordert wird, den Wert zu löschen. Prüfen Sie stattdessen @HIDDEN, wenn Sie das Feld ausblenden möchten."
design_787 = "Lädt das Datum des REDCap-Servers in ein leeres Textfeld - ähnlich wie das @NOW-Tag, aber ohne Zeitanteil. Wenn das Feld eine Validierung hat, wird der Wert an das Datumsformat angepasst. Verwenden Sie dieses Tag außerdem nicht für Felder mit Branching Logic, weil der Benutzer immer aufgefordert wird, den Wert zu löschen. Prüfen Sie stattdessen @HIDDEN, wenn Sie das Feld ausblenden möchten."
design_788 = "Lädt das aktuelle UTC/GMT-Datum in ein leeres Textfeld - ähnlich wie das @NOW-Tag, aber ohne Zeitanteil. Wenn das Feld eine Validierung hat, wird der Wert an das Datumsformat angepasst. Verwenden Sie dieses Tag außerdem nicht für Felder mit Branching Logic, weil der Benutzer immer aufgefordert wird, den Wert zu löschen. Prüfen Sie stattdessen @HIDDEN, wenn Sie das Feld ausblenden möchten."
