access_control_groups_01 = "Access Control Groups"
access_control_groups_02 = "Access Control Groups (ACGs) werden verwendet, um einzuschränken, welche Benutzerrechte einem REDCap-Benutzer in einem Projekt gewährt werden können. ACGs definieren nicht die Rechte, die ein Benutzer in einem bestimmten Projekt haben wird; vielmehr definieren sie die Menge der zulässigen Rechte, die dem Benutzer gewährt werden können. ACGs werden auf Systemebene definiert. Wenn die ACG-Funktion aktiviert ist, wird sie in allen Projekten im System angewendet, insbesondere wenn ein Benutzer zu einem Projekt hinzugefügt wird oder wenn seine Benutzerrechte in einem Projekt geändert werden. Die Verwendung von ACGs ist vollständig optional, und die Funktion kann jederzeit aktiviert oder deaktiviert werden. Für bestehende Projekte, die bereits Benutzer haben, gibt es in jedem Projekt eine ACG-Konformitätsseite. Dort können Admins feststellen, ob bestehende Benutzer nicht konforme ACG-Rechte haben, und falls ja, stehen Tools bereit, um Benutzerrechte-Manager über Benutzer mit nicht konformen Rechten zu benachrichtigen oder Benutzer einfach ablaufen zu lassen."
access_control_groups_03 = "Bearbeitungsmodus öffnen"
access_control_groups_04 = "Gesperrt"
access_control_groups_05 = "Dropdown umschalten"
access_control_groups_06 = "Dieser Abschnitt ist gesperrt"
access_control_groups_07 = "ACG aktiviert"
access_control_groups_08 = "Access Control Groups aktivieren"
access_control_groups_09 = "Die Benutzerliste unten zeigt alle Benutzer im System und ihre aktuelle ACG-Zuweisung. Sobald ACGs aktiviert sind, hat jeder Benutzer eine ACG-Zuweisung. Benutzer werden anfänglich der Standard-ACG zugewiesen, können danach aber einzeln über die Tabelle unten oder über den CSV-Export/-Importprozess für Benutzerzuweisungen jeder ACG zugewiesen werden. Um die ACG-Zuweisung eines Benutzers in der Tabelle zu ändern, klicken Sie zuerst unten auf den Button \"Bearbeitungsmodus öffnen\" und wählen dann rechts über die Dropdown-Optionen eine neue Zuweisung aus."
