system_config_773 = "Bildeinbettung für Rich-Text-Editor"
system_config_774 = "Wenn aktiviert, können Benutzer ein Inline-Bild in den Text einer Umfrageeinladung, eines Alarms, eines Feldlabels oder überall dort einbetten, wo der Rich-Text-Editor verwendet wird (mit einer Ausnahme: das Action Tag @RICHTEXT in öffentlichen Fragebögen), indem sie im Editor auf das Bildsymbol klicken und dann ein Bild von ihrem lokalen Gerät hochladen."
system_config_775 = "Wenn deaktiviert, erscheint das Bildsymbol nicht im Rich-Text-Editor, und Benutzer können daher keine Bilder in dessen Text einbetten."
system_config_776 = "Alternative URL für Links \"Contact REDCap Admin\" im linken Menü jedes Projekts (optional)"
system_config_777 = "Standardmäßig (wenn das obige Textfeld leer gelassen wird) öffnen die Links \"Contact REDCap Admin\" eine vorformatierte E-Mail im nativen E-Mail-Client des Benutzers. Wenn Sie jedoch eine URL in das Textfeld eingeben, navigiert der Browser des Benutzers nach dem Klicken auf den Link \"Contact REDCap Admin\" in einem neuen Tab zu dieser URL. Wenn Sie beispielsweise ein Ticketsystem verwenden, um Fragen/Probleme Ihrer Benutzer zu sammeln, können Sie die URL der Ticketsystem-Seite eingeben, auf der neue Tickets eingereicht werden können."
system_config_778 = "MyCap ist eine teilnehmerorientierte mobile Anwendung zur Datenerhebung und automatisierten Durchführung aktiver Aufgaben (Aktivitäten, die von Teilnehmenden unter halbkontrollierten Bedingungen mit Sensoren mobiler Geräte durchgeführt werden). Wenn hier auf Systemebene aktiviert, können Benutzer MyCap auf der Projekt-Setup-Seite in ihren Projekten aktivieren."
