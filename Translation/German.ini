control_center_280 = "Diese Seite dient zur Verwaltung der API-Tokens, die von Ihren REDCap-Benutzern verwendet werden. Mit den beiden Drop-downs unten können Sie entweder einzelne Benutzer oder ganze Projekte anzeigen, um festzustellen, welche Benutzer API-Tokens haben, und außerdem ein neues API-Token für einen Benutzer erstellen. Benutzer, die bereits ein API-Token für ein bestimmtes Projekt haben, können ihr Token löschen oder neu generieren lassen."
control_center_281 = "<b>HINWEIS:</b> Denken Sie daran, dass Tokens jeweils für einen einzelnen Benutzer in einem einzelnen Projekt spezifisch sind. Ein einzelnes Projekt kann daher mehrere Tokens haben, und ein einzelner Benutzer kann ebenfalls mehrere Tokens haben, die jeweils zu einem anderen Projekt gehören."
