control_center_4516 = "Organisieren"
control_center_4517 = "Dies kann erfolgen, wenn dem aktuellen Benutzer mit dem Super API Token der Zugriff auf REDCap entzogen wird und sein Token danach von einem anderen Benutzer gepflegt werden muss (häufig, weil es von einem Programm oder Skript verwendet wird). Wenn das aktuelle Super API Token des Benutzers also beibehalten werden muss, ist die beste Option, das Token an einen anderen Benutzer zu übertragen. Wählen Sie dazu unten in der Drop-down-Liste einen anderen Benutzer aus. HINWEIS: Wenn Sie das Token an einen Benutzer übertragen, der bereits ein Super API Token hat, überschreibt das neue Token dessen altes Token."
control_center_4518 = "Super API Token wurde übertragen"
control_center_4519 = "Diese E-Mail informiert Sie lediglich darüber, dass ein REDCap-Administrator Ihr Super API Token für Ihren REDCap-Benutzer übertragen hat"
control_center_4520 = "Sie können Ihr Super API Token in Ihrem REDCap"
control_center_4521 = "Diese E-Mail informiert Sie darüber, dass ein REDCap-Administrator ein Super API Token an Ihren REDCap-Benutzer übertragen hat"
control_center_4522 = "Sie können Benutzern ein Super API Token gewähren, mit dem sie neue REDCap-Projekte über die API erstellen können, ohne dass eine Genehmigung durch einen REDCap-Administrator erforderlich ist. Super API Tokens sind 64 Zeichen lang (zur Unterscheidung von regulären 32 Zeichen langen projektweiten Tokens). Ein Benutzer kann nur ein Super Token haben. Wenn ein Benutzer ein neues Projekt mit einem Super API Token erstellt, erhält er sein neues projektweites API-Token für das Projekt, ebenfalls ohne erforderliche Genehmigung durch einen Administrator. Es wird allgemein empfohlen, Super API Tokens nur den vertrauenswürdigsten Benutzern zu gewähren."
