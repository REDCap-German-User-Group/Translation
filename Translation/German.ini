data_entry_734 = "<b>Hinweis:</b> Die Datei <i>'{0:Filename}'</i> wird dauerhaft gelöscht!"
data_entry_735 = "FELD AUSGEBLENDET"
data_entry_736 = "Das Feld, das Sie gerade geleert haben, wurde nun ausgeblendet. Es war nur sichtbar, weil es einen Wert enthielt, sollte gemäß den Formularregeln aber sonst ausgeblendet bleiben."
