survey_821 = "Alternativ können Sie, wenn die Teilnehmenden die Umfrage selbst starten sollen, Ihren Teilnehmenden die Anweisungen für eine der untenstehenden Optionen bereitstellen."
survey_823 = "Sprachanruf- und SMS-Optionen für die öffentliche Umfrage"
survey_825 = "Teilnehmende jetzt einladen:"
survey_826 = "FEHLER: Versand wegen fehlender E-Mails oder Telefonnummern nicht möglich"
survey_827 = "Es gibt"
survey_828 = "Teilnehmende, denen entweder eine E-Mail-Adresse oder Telefonnummer fehlt, wodurch es unmöglich ist, ihnen mit dem ausgewählten Einladungstyp eine Einladung zu senden. Sie können den Versand der Einladungen abbrechen oder, wenn Sie möchten, die problematischen Teilnehmenden automatisch abwählen lassen und die Einladungen an die übrigen Teilnehmenden senden."
survey_829 = "Abwählen und Einladungen senden"
survey_835 = "Nachdem Ihr Twilio-Konto erstellt wurde, müssen Sie <b>2) Ihr Konto mit etwas Geld aufladen</b> (über die Billing-Seite in Twilio) und dann <b>3) eine Telefonnummer kaufen</b>, die für dieses REDCap-Projekt verwendet wird (siehe Numbers-Seite in Twilio). Nachdem eine Telefonnummer für das Konto gekauft wurde, rufen Sie Account SID und Auth Token für Ihr Konto ab (siehe Abschnitt API Credentials auf der Hauptseite Account Settings) und geben Sie dann Account SID, Auth Token und Telefonnummer in den Abschnitt 'Twilio-Kontozugangsdaten' unten ein. HINWEIS: Immer wenn Sie unten die Dienste auf Aktiviert setzen und dann auf Speichern klicken, prüft REDCap bei Ihrem Twilio-Konto, ob alle Zugangsdaten und Informationen korrekt sind. REDCap erlaubt Ihnen nicht, die untenstehenden Twilio-SMS- und Sprachanrufdienste zu aktivieren, bevor bestätigt wurde, dass Account SID, Auth Token und Telefonnummer alle gültig sind. "
survey_836 = "Zu verwendende Umfrageeinladungstypen auswählen"
survey_837 = "Sie können mehrere verschiedene Wege auswählen, wie Teilnehmende zur Teilnahme an Umfragen eingeladen werden, sowie das Medium, über das sie die Umfragen ausfüllen"
survey_841 = "Bitte beachten Sie, dass 'localhost' NICHT als Teil der REDCap Base URL (siehe Allgemeine Konfigurationsseite) verwendet werden kann, da Twilio alle Anfragen von einer localhost-Adresse ablehnt."
survey_842 = "Das Twilio-Modul konnte für dieses Projekt NICHT aktiviert werden, weil noch keine Telefonnummer eingegeben wurde. Sobald eine mit dem Twilio-Konto verknüpfte Telefonnummer eingegeben wurde, können Sie die Twilio-Funktionalität in diesem Projekt aktivieren."
survey_843 = "HINWEIS: Dem Twilio-Konto sind keine Telefonnummern zugeordnet."
survey_846 = "Wie richte ich das ein?"
survey_847 = "Twilio-Webdienst für Sprachanrufe und SMS-Dienste aktivieren?"
survey_848 = "Dadurch können Twilio-Dienste in REDCap-Projekten verwendet werden, z. B. zum Senden von Umfrageeinladungen und zum Ausfüllen von Umfragen per SMS oder als Sprachanruf."
survey_849 = "Informationen zu Twilio-Diensten für <u>alle Benutzer</u> auf der Projekt-Setup-Seite in einem Projekt anzeigen?"
survey_850 = "Nein, alle Informationen zu Twilio-Diensten ausblenden"
survey_851 = "Ja, Informationen zu Twilio-Diensten anzeigen"
survey_852 = "Wenn 'Nein' ausgewählt ist, werden Twilio-SMS- und Sprachanrufdienste Benutzern auf der Projekt-Setup-Seite nicht beworben, und Informationen zu Twilio werden nirgends in einem Projekt angezeigt. Die Einstellung 'Nein' ist vorzuziehen, wenn Sie Twilio-Dienste nur einer begrenzten Anzahl von Benutzern bekannt machen möchten, ohne sie allen Benutzern zu bewerben."
survey_853 = "Außerdem muss Ihr REDCap-Server öffentlich im Web verfügbar sein (in der DMZ), damit Twilios Webserver Anfragen an ihn stellen können. Andernfalls kann Twilio nicht vollständig funktionieren."
survey_854 = "Die E-Mail-Adresse des Teilnehmers kann hier nicht geändert werden, weil sie aus dem 'festgelegten E-Mail-Feld' stammt. Sie können die E-Mail-Adresse jedoch auf dem Datenerhebungsinstrument ändern, auf dem sich das 'festgelegte E-Mail-Feld' befindet."
survey_855 = "Ihre Teilnehmenden wurden zur Teilnehmerliste hinzugefügt."
survey_856 = "TEILNEHMENDE HINZUGEFÜGT!"
survey_857 = "Telefonnummer kann hier nicht geändert werden:"
survey_858 = "Die Telefonnummer eines Teilnehmers kann hier nicht geändert werden, kann aber in der Teilnehmerliste für eine erste Umfrage (d. h. das erste Instrument) geändert werden. Alternativ können Sie, wenn Sie ein 'festgelegtes Telefonfeld' verwenden, die Telefonnummer auf dem Datenerhebungsinstrument ändern, auf dem sich das 'festgelegte Telefonfeld' befindet."
survey_859 = "Die Kennung des Teilnehmers kann <u>nach</u> Erstellung des Datensatzes nicht hinzugefügt werden, wenn die Kennung zuvor ursprünglich leer war. Dies soll verhindern, dass Benutzer nachträglich eine Kennung hinzufügen und dadurch unbeabsichtigt eine anonyme Antwort in eine identifizierbare Antwort umwandeln."
survey_860 = "Einladungspräferenz des Teilnehmers ändern:"
survey_861 = "Beim Hinzufügen von Teilnehmenden zur Teilnehmerliste können Sie die Standard-Einladungspräferenz dafür wählen, wie ihnen ihre Einladung gesendet wird. Die Einladungspräferenz einer Person kann jederzeit in der Teilnehmerliste geändert werden. Wenn Sie dann bereit sind, Umfrageeinladungen an Teilnehmende zu senden, können Sie die Versandmethode für diese Einladungsgruppe wählen. Die Präferenz muss beim Senden von Einladungen nicht verwendet werden, wird aber als Komfortfunktion bereitgestellt, falls Sie Teilnehmende mit mehreren unterschiedlichen Einladungspräferenzen haben. Unten sind alle Einladungstypen aufgeführt, die in diesem Projekt verfügbar sind."
survey_863 = "Um die Telefonumfrage zu beginnen, rufen Sie an unter"
survey_865 = "Um die Umfrage zu beginnen, antworten Sie mit beliebigem Text auf diese Nachricht."
survey_866 = "Um die Telefonumfrage zu beginnen, antworten Sie mit beliebigem Text auf diese Nachricht, um einen Telefonanruf zu erhalten."
survey_869 = "Umfragen für SMS und Sprachanrufe analysieren"
