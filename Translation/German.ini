survey_298 = "[konnte nicht bestimmt werden]"
survey_299 = "Mit dem Umfrageablauf können Sie den Zeitpunkt festlegen, nach dem die Umfrage inaktiv wird (d. h. offline geht), sodass Befragte nicht mehr an der Umfrage teilnehmen können. Nach Ablauf kann die Umfrage bei Bedarf auf der Projekt-Setup-Seite wieder online geschaltet werden."
survey_300 = "Option zur Anzeige aggregierter Umfrageergebnisse wurde deaktiviert"
survey_301 = "Die Weiterleitungsoption nach Abschluss der Umfrage ist nicht mit der Option kompatibel, Umfragebefragten nach Abschluss der Umfrage aggregierte Umfrageergebnisse anzuzeigen, die Sie derzeit aktiviert haben, weil Befragte bereits zur anderen Webseite weitergeleitet werden, bevor sie die aggregierten Ergebnisse ansehen können. Daher wurde die Einstellung für aggregierte Umfrageergebnisse deaktiviert."
survey_302 = "Diese Funktion kann nicht aktiviert werden"
survey_303 = "Die Option zur Anzeige aggregierter Umfrageergebnisse kann derzeit nicht aktiviert werden, weil die Weiterleitungsoption nach Abschluss der Umfrage für diese Umfrage aktiviert ist. Diese beiden Optionen sind nicht kompatibel. Wenn Sie die Option für aggregierte Umfrageergebnisse aktivieren möchten, müssen Sie zuerst unten auf der Seite die Optionen zum Beenden der Umfrage so ändern, dass die Weiterleitung nach Umfrageabschluss nicht mehr aktiviert ist."
survey_304 = "(Befragten erlauben, die Umfrage zu verlassen und später zurückzukehren.)"
survey_305 = "Umfrage ist wieder online, aber Ablaufzeit wurde entfernt"
survey_306 = "Ihre Umfrage wurde erfolgreich wieder online geschaltet. Die Ablaufzeit der Umfrage"
survey_307 = "liegt jedoch in der Vergangenheit. Daher wurde die Ablaufzeit der Umfrage automatisch entfernt, um Probleme zu verhindern. Wenn Sie möchten, können Sie auf der Seite Umfrageeinstellungen ändern eine neue Ablaufzeit für diese Umfrage festlegen."
