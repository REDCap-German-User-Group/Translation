data_export_tool_153 = "Hochgeladene Dateien für alle Datensätze in diesem Projekt können in einer einzigen ZIP-Datei heruntergeladen werden. Diese Datei enthält alle Dateien, die für 'File Upload'-Felder/Fragen in einem Fragebogen oder Dateneingabeformular hochgeladen wurden. Die ZIP-Datei enthält einen Ordner mit allen Dateien, organisiert nach Datensatzname und Variablen-/Feldname, sowie eine index.html-Datei, die als Inhaltsverzeichnis für alle Dateien dient. Extrahieren Sie nach dem Herunterladen der ZIP-Datei alle Dateien/Ordner in ein Verzeichnis auf Ihrem lokalen Computer. Danach können Sie die index.html-Datei darin doppelklicken, um eine Liste der Dateien in Ihrem Webbrowser anzuzeigen, oder Sie können die Dateien direkt im Ordner 'documents' ansehen. Klicken Sie rechts auf das Symbol, um den Download der ZIP-Datei zu starten."
