system_config_403 = "Diese Basis-URL wird nur beim Erstellen von Fragebogen-URLs verwendet (z. B. beim Senden von Einladungen an Umfrageteilnehmende). Für alle anderen URLs in REDCap wird die REDCap-Basis-URL verwendet. Diese Funktion kann nützlich sein, wenn Sie für Fragebögen eine andere Webadresse verwenden möchten als für die Webadresse, unter der sich Benutzer anmelden (z. B. bei Verwendung eines Reverse-Proxy-Servers oder eines separaten Webservers für Fragebögen)."
