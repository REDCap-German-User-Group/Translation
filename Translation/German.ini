system_config_375 = "Bevor Sie diese Funktion verwenden, müssen Sie zuerst ein Twilio-Konto einrichten und die unten erforderlichen Informationen erhalten."
system_config_376 = "Wie mache ich das?"
system_config_377 = "Die Option 'SMS' für Zwei-Faktor-Authentifizierung verwendet einen Drittanbieter-Webservice namens Twilio. Um diese Funktion zu verwenden, benötigen Sie ein Twilio-Konto, das mit Geld ausgestattet sein muss (da für jede gesendete SMS-Nachricht Kosten anfallen). Bevor Sie mit den Einrichtungsschritten für Twilio-SMS auf dieser Seite beginnen, müssen Sie <b>1) Ihr eigenes Twilio-Konto einrichten</b> unter"
system_config_378 = "Nachdem Ihr Twilio-Konto erstellt wurde, müssen Sie <b>2) Ihr Konto mit etwas Geld aufladen</b> (über die Billing-Seite in Twilio) und dann <b>3) eine Telefonnummer kaufen</b>, die für dieses REDCap-Projekt verwendet wird (siehe Numbers-Seite in Twilio)."
system_config_379 = "Nachdem eine Telefonnummer für das Konto gekauft wurde, erhalten Sie die Account SID und das Auth Token für Ihr Konto (siehe Abschnitt API Credentials auf der Hauptseite Account Settings) und geben dann Account SID, Auth Token und Telefonnummer in die 'Twilio-Konfigurationseinstellungen' auf dieser Seite ein. Klicken Sie abschließend auf den Button 'Twilio-Zugangsdaten testen', der die eingegebenen Zugangsdaten prüft, um sicherzustellen, dass sie funktionieren und SMS-Nachrichten erfolgreich senden."
system_config_381 = "Zusätzliche Google-OAuth2-Authentifizierungseinstellungen:"
system_config_382 = "Google API Client-ID"
system_config_383 = "Google API Client Secret"
system_config_384 = "Um Google-OAuth2-Authentifizierung zu verwenden, müssen Sie 1) zur"
system_config_385 = "gehen und auf dieser Webseite ein neues Projekt erstellen (Sie können das Projekt beliebig benennen, z. B. \"REDCap Auth\"). Hinweis: Sie sollten vermeiden, sich auf dieser Seite mit Ihrem persönlichen Google-Konto anzumelden, da Sie Google-API-Zugangsdaten erstellen, die von REDCap an Ihrer Institution verwendet werden. 2.) Nachdem Sie das neue Projekt auf der Google-Developers-Console-Webseite erstellt haben, wählen Sie im linken Menü im Abschnitt 'APIs & auth' den Eintrag 'Credentials'. Klicken Sie auf der Credentials-Seite im OAuth-Abschnitt auf den Button, um eine neue Client-ID zu erstellen, und wählen Sie 'web application' als Anwendungstyp. Auf dem nächsten Bildschirm müssen Sie nur den Product Name angeben (z. B. 'REDCap') und auf den Speichern-Button klicken. Sie können das Feld 'Authorized JavaScript Origins' leer lassen (es wird hier nicht benötigt), aber stellen Sie sicher, dass Sie die folgende URL in das Textfeld 'Authorized Redirect URIs' eingeben (mit und ohne abschließenden Backslash):"
system_config_386 = "3.) Nachdem die Client-ID erstellt wurde, werden automatisch ein Client-ID-Name und ein Client Secret erzeugt. Kopieren Sie diese Werte in die untenstehenden Textfelder, damit REDCap sie zur Authentifizierung bei Google verwenden kann."
system_config_387 = "Google-OAuth2-Einrichtungsanweisungen:"
system_config_388 = "Computer Adaptive Tests (CATs)<br>und Auto-Scoring-Instrumente"
system_config_389 = "Wenn aktiviert, können Benutzer CATs und Auto-Scoring-Instrumente aus der REDCap Shared Library herunterladen und sie dann in ihrem Projekt als Fragebogen verwenden, der von einem Drittanbieter-Service gesteuert wird (d. h. einem anderen Webserver). Wenn nicht aktiviert, werden Benutzern, die zur Shared Library navigieren, alle diese Instrumenttypen ausgeblendet, wodurch das Herunterladen verhindert wird. Dazu gehören"
system_config_390 = "Neuro-QoL-Instrumente"
