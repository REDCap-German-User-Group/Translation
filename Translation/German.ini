survey_118 = "Rückkehrcode"
survey_119 = "Ein Rückkehrcode ist <b>*erforderlich*</b>, um die Umfrage dort fortzusetzen, wo Sie aufgehört haben. Bitte notieren Sie den unten aufgeführten Wert."
survey_120 = "Der Rückkehrcode wird NICHT in der untenstehenden E-Mail enthalten sein."
survey_121 = "Umfragelink für die Rückkehr"
survey_122 = "Ihnen wurde soeben eine E-Mail mit einem Link zum Fortsetzen der Umfrage gesendet. Aus Sicherheitsgründen <b>enthält die E-Mail den Rückkehrcode NICHT</b>, aber der Code ist weiterhin erforderlich, um die Umfrage fortzusetzen. Wenn Sie die E-Mail nicht bald erhalten, prüfen Sie bitte Ihren Junk-E-Mail-Ordner."
survey_123 = "Sie können diese Seite als Lesezeichen speichern, um zur Umfrage zurückzukehren, ODER Sie können sich den Umfragelink per E-Mail senden lassen, indem Sie unten Ihre E-Mail-Adresse angeben. Aus Sicherheitsgründen <b>wird der Rückkehrcode NICHT in der E-Mail enthalten sein</b>. Wenn Sie die E-Mail anschließend nicht bald erhalten, prüfen Sie bitte Ihren Junk-E-Mail-Ordner."
survey_124 = "Umfragelink senden"
