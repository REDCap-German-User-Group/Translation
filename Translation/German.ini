survey_1474 = "Breite der Seite"
survey_1475 = "Breite der Umfrage auf der Seite"
survey_1476 = "Legen Sie eine benutzerdefinierte Breite als Prozentsatz der Webseite fest, den die Umfrage einnehmen soll."
survey_1477 = "Optionen zur Schriftgrößenänderung oben auf der Umfrageseite anzeigen"
survey_1478 = "Einzelseite"
survey_1479 = "Mehrere Seiten (einen Abschnitt pro Seite anzeigen)"
survey_1480 = "Absenden-Schaltflächen anzeigen oder ausblenden"
survey_1481 = "Absenden-Schaltflächen anzeigen oder ausblenden, die unten auf jeder Umfrageseite angezeigt werden (einschließlich der Schaltflächen 'Nächste Seite' und 'Vorherige Seite')."
survey_1482 = "Absenden-Schaltflächen immer anzeigen"
survey_1483 = "Absenden-Schaltflächen immer ausblenden"
survey_1484 = "Text der Absenden-Schaltflächen anpassen"
survey_1485 = "Alternativen Text für die Schaltflächen 'Absenden', 'Nächste Seite' und 'Vorherige Seite' angeben, die unten auf jeder Umfrageseite angezeigt werden."
survey_1486 = "Jeder für Absenden-Schaltflächen angegebene alternative Text überschreibt den untenstehenden Standardtext:"
survey_1487 = "Paginierung"
survey_1489 = "Hinweis: Diese Funktion kann NICHT durch Absenden eines Dateneingabeformulars ausgelöst werden, AUSSER nur dann, wenn ein Benutzer auf dem Dateneingabeformular auf die Schaltfläche 'Speichern & Umfrage als vollständig markieren' klickt. Hinweis: Wenn die aktuellen Umfrageeinstellungen Teilnehmenden erlauben, zu abgeschlossenen Antworten zurückzukehren, werden bereits in diesem Datei-Upload-Feld gespeicherte PDFs durch neue überschrieben, wenn die Umfrage erneut abgeschlossen wird."
survey_1490 = "Umfragetitel auf Umfrageseite ausblenden, wenn Logo angezeigt wird"
survey_1491 = "Das Ausblenden der Absenden-Schaltflächen kann nützlich sein, wenn Sie die Umfrage nicht zur Datenerhebung, sondern für Anweisungszwecke oder ähnliche Anwendungsfälle verwenden."
survey_1492 = "Hinweis: Die prozentualen Seitenbreiteneinstellungen hängen vollständig von der Bildschirmgröße des Teilnehmers ab."
survey_1493 = "Basierend auf den aktuellen Umfrageeinstellungen gelten Umfrageantworten in diesem Projekt als anonym. Der Datensatz eines Teilnehmers kann nicht identifiziert werden."
survey_1494 = "Basierend auf den aktuellen Umfrageeinstellungen gelten einige Umfrageantworten auf dieser Seite möglicherweise nicht als anonym."
survey_1495 = "Anonym*"
survey_1496 = "Nicht anonym"
survey_1497 = "Status der Umfrageantwort:"
survey_1498 = "*Bitte beachten Sie, dass Umfrageantworten in REDCap niemals wirklich zu 100 % als anonym betrachtet werden können. In manchen Fällen kann es möglich sein, den Datensatz eines Teilnehmers durch Ausschlussverfahren und Schlussfolgerung und/oder durch sehr genaues Beobachten der Datenwerte und Übermittlungszeiten eines Datensatzes zu identifizieren. Bei typischer Datenerhebung kann jedoch gesagt werden, dass die Umfrageantworten in diesem Projekt informell als \"anonym\" und somit nicht identifizierbar betrachtet werden können."
survey_1499 = "Mehr über anonyme Umfrageantworten erfahren"
survey_1500 = "Umfrageantworten gelten als anonym, <i>außer</i> der Teilnehmer hat eine definierte Teilnehmerkennung ODER die E-Mail-Adresse des Teilnehmers wurde über das festgelegte E-Mail-Feld hinzugefügt. Jede Antwort auf dieser Seite, die als anonym gilt, zeigt das Symbol <i class='far fa-eye-slash'></i> anstelle ihres Datensatznamens an, um zu verhindern, dass Benutzer erkennen, welcher Datensatz zum Teilnehmer gehört."
survey_1501 = "Diese Einstellung wird beim Anzeigen der Umfrage auf Mobilgeräten nicht angewendet."
survey_1502 = "Wiederkehrende automatisierte Einladung"
survey_1503 = "Einladung löschen"
survey_1504 = "Wiederkehrende Einladung löschen"
survey_1505 = "Diese wiederkehrende Einladung löschen?"
survey_1506 = "Sind Sie sicher, dass Sie ALLE wiederkehrenden Einladungen für dieses Element löschen möchten? Dadurch wird nicht nur eine einzelne Einladung gelöscht, sondern ALLE zukünftigen wiederkehrenden Einladungen für die unten aufgeführte ASI/den Datensatz."
survey_1507 = "Die wiederkehrende Serie von Umfrageeinladungen wurde erfolgreich gelöscht. Die Seite wird nun neu geladen, um die Änderungen anzuzeigen."
survey_1508 = "Unten wird die Umfrageeinladungsnachricht angezeigt, die an den Umfrageteilnehmer gesendet wird. Enthalten sind die geplante Sendezeit der Einladung, der Absender, die E-Mail-Adresse (oder Telefonnummer) des Umfrageteilnehmers sowie Betreff und Nachricht der Einladung."
survey_1509 = "(Optional) Umfrage wiederholen:"
survey_1510 = "Teilnehmende nach Abschluss bitten, die Umfrage erneut auszufüllen"
survey_1511 = "<b>[Diese Option ist verfügbar, da dieses Instrument als wiederholtes Instrument aktiviert wurde.]</b> Sobald der Befragte die Umfrage abgeschlossen hat, wird ihm eine Schaltfläche mit dem Text 'Diese Umfrage erneut ausfüllen' (oder Ihrem benutzerdefinierten Text) angezeigt, die die Umfrage von vorn startet, um sie als neue wiederholte Instanz der Umfrage für diesen Datensatz zu erfassen. Wenn auch die Umfrage-Warteschlange verwendet wird, wird der Umfrage-Warteschlange eine Schaltfläche für diese Umfrage hinzugefügt, damit der Befragte die Umfrage direkt aus der Umfrage-Warteschlange wiederholen kann. Wenn die Option auf 'Schaltfläche für wiederholte Umfrage nicht anzeigen' gesetzt ist, wird sie auf der Umfrageseite ausgeblendet, aber weiterhin in der Umfrage-Warteschlange angezeigt."
survey_1512 = "Umfragehinweis:"
survey_1513 = "Tipp: Eine monatliche Wiederholung kann als 30,44 Tage angenähert werden."
survey_1514 = "Vielen Dank, dass Sie die Umfrage teilweise abgeschlossen haben."
survey_1515 = "FEHLER: Leider konnte die Umfrageantwort nicht gespeichert werden, weil die Antwort absichtlich von jemandem gesperrt wurde und dadurch verhindert wird, dass Sie oder andere hier Antworten übermitteln."
survey_1516 = "Dadurch können Mosio-SMS-Dienste in REDCap-Projekten verwendet werden, z. B. zum Senden von Umfrageeinladungen und zum Ausfüllen von Umfragen per SMS."
survey_1517 = "Hinweis: Um den Mosio-SMS-Dienst zu verwenden, muss der REDCap-Webserver ausgehende HTTP/HTTPS-Anfragen an die folgende URL stellen können:"
survey_1518 = "Nein, alle Informationen zu Mosio-SMS-Diensten ausblenden"
survey_1519 = "Ja, Informationen zu Mosio-SMS-Diensten anzeigen"
survey_1520 = "Wer kann Mosio-SMS-Dienste in einem bestimmten Projekt aktivieren?"
survey_1521 = "Wenn 'Nur Administratoren' ausgewählt ist, sehen normale Benutzer die Einstellung nicht einmal auf der Projekt-Setup-Seite des Projekts (nur Administratoren können sie sehen und aktivieren). Wenn 'Alle Benutzer' ausgewählt ist, kann jeder Benutzer mit Projekt-Design-/Setup-Rechten in diesem Projekt die Einstellung sehen und auch selbst aktivieren, um Mosio-SMS-Dienste in seinem Projekt zu nutzen."
survey_1522 = "Informationen zu Mosio-SMS-Diensten für <u>alle Benutzer</u> auf der Projekt-Setup-Seite in einem Projekt anzeigen?"
survey_1523 = "Wenn 'Nein' ausgewählt ist, werden Mosio-SMS-Dienste Benutzern auf der Projekt-Setup-Seite nicht beworben, und Informationen zu Mosio werden nirgends in einem Projekt angezeigt. Die Einstellung 'Nein' ist vorzuziehen, wenn Sie Mosio-SMS-Dienste nur einer begrenzten Anzahl von Benutzern bekannt machen möchten, ohne sie allen Benutzern zu bewerben."
survey_1524 = "Außerdem muss Ihr REDCap-Server öffentlich im Web verfügbar sein (in der DMZ), damit Mosios Webserver Anfragen an ihn stellen können. Andernfalls kann Mosio nicht vollständig funktionieren."
survey_1525 = "Weitere Informationen zu Mosio siehe"
survey_1526 = "Mosio-SMS-Dienste für Umfragen und Alarme"
survey_1527 = "Mosio-API-Zugangsdaten (aus Ihrem Konto auf der Mosio-Website erhalten)"
survey_1528 = "Mosio API Key"
survey_1529 = "Einstellungen konfigurieren"
survey_1530 = "Um die Mosio-SMS-Dienste in diesem Projekt zu verwenden, klicken Sie unten auf die Schaltfläche 'Konfigurieren'. Sobald Sie den Mosio-SMS-Dienst aktiviert haben, können Sie im Konfigurations-Popup Mosio für 1) Alarme & Benachrichtigungen und/oder 2) Umfragen und Umfrageeinladungen aktivieren. Wenn Sie Mosio für Umfragen verwenden, müssen Sie zunächst ein Instrument in diesem REDCap-Projekt als Umfrage festlegen; danach können Sie auf die Schaltfläche 'Umfragen analysieren' klicken, um eine Analyse aller Ihrer Umfragen auszuführen und festzustellen, ob sie als SMS-Umfrage verwendet werden können."
survey_1531 = "Sie können Ihre Einstellungen nun anhand der Anweisungen in diesem Schritt einrichten."
survey_1532 = "Umfragen für SMS analysieren"
survey_1533 = "Die untenstehende Tabelle zeigt mögliche Probleme, die auftreten können, wenn eine Umfrage als SMS-Konversation verwendet wird. Um die Details eines Problems anzuzeigen, klicken Sie daneben auf den Link 'Anzeigen'; dadurch wird das Feld mit dem Problem sowie eine Beschreibung angezeigt, warum dieses Feld problematisch wäre. HINWEIS: Wenn eine untenstehende Umfrage als SMS-Konversation durchgeführt wird, wird <b>jedes Feld mit einem Problem übersprungen</b>, es sei denn, das unten beschriebene Problem wird durch Ändern oder Entfernen des Felds behoben."
survey_1534 = "Nur REDCap-Administratoren dürfen die Option aktivieren, eine Umfrage als SMS-Konversation zu starten. Ähnlich wie E-Mail gilt SMS nicht als sichere Kommunikationsform; daher möchten Sie Umfragen möglicherweise nicht als SMS-Konversationen durchführen, wenn der Teilnehmer identifizierende Informationen (PHI oder PII) übermittelt, es sei denn, Sie haben eine spezielle Erlaubnis des Teilnehmers dazu erhalten. Angesichts solcher sensiblen Datenschutzfragen kann nur Ihr lokaler REDCap-Administrator die optionale Einstellung zur Verwendung von SMS-Umfragen aktivieren. Bitte benachrichtigen Sie Ihren Administrator, wenn Sie diese Option aktiviert haben möchten."
survey_1535 = "Konfigurationseinstellungen"
survey_1536 = "SMS-Einstellungen"
survey_1537 = "Unten sind alle Konfigurationseinstellungen der Telefondienste für dieses Projekt aufgeführt. Diese Einstellungen steuern, welche Teile der Telefondienste im gesamten Projekt zur Verwendung verfügbar sind, und sie steuern, wie bestimmte Teile des Dienstes funktionieren. Um Einstellungen zu setzen oder zu ändern, ändern Sie sie unten und klicken Sie auf Speichern."
survey_1538 = "Projektfunktionen auswählen, für die die Telefondienste aktiviert werden sollen (z. B. Umfragen und/oder Alarme)"
survey_1539 = "REDCap kann mithilfe eines Drittanbieter-Webdienstes namens Mosio (www.mosio.com) SMS-Textnachrichten für Umfragen sowie für Alarme & Benachrichtigungen senden. So könnten Sie einen Teilnehmer zur Teilnahme an einer Umfrage einladen, indem Sie ihm eine SMS-Nachricht senden; die Daten würden dann direkt von seinem Telefon in REDCap erhoben, ohne eine Webseite verwenden zu müssen. REDCap arbeitet derzeit auf zwei Arten mit Mosio:<br>1. SMS-Umfragen - Fragen senden und Antworten per Textnachricht erhalten.<br>2. Alarme - REDCap-Alarme & Benachrichtigungen per Textnachricht senden.<br><br>Mosio ist auf Automatisierung der Forschungskommunikation spezialisiert und hilft Forschenden, Engagement, Adhärenz und Datenerhebung in Studien zu verbessern. Der Dienst ist sowohl HIPAA- als auch 21 CFR Part 11-konform und bereit, BAAs zu unterzeichnen."
survey_1540 = "<b>SMS-UMFRAGEN:</b><br>Bei SMS-Umfragen werden Fragen einzeln als Teil eines SMS-Konversations-Threads präsentiert. Befragte können mit jeder Art alphanumerischen Textes antworten.<br><br>Die meisten REDCap-Umfragefunktionen bleiben bei SMS-Umfragen unverändert. Dazu gehören das Erzwingen erforderlicher Felder, Feldvalidierung, Verzweigungslogik, Verwendung der Umfrage-Warteschlange für mehrere Umfragen (nur wenn Auto-Start aktiviert ist), Empfang von E-Mail-Benachrichtigungen und -Bestätigungen, Zugriff auf die Teilnehmerliste, Senden automatisierter Umfrageeinladungen, Implementieren von Stop-Aktionen und Verwendung computeradaptiver Tests (CATs), die aus der REDCap Shared Library heruntergeladen wurden. Die Umfrage-Login-Funktion ist jedoch nicht mit SMS-Umfragen kompatibel.<br><br>HINWEIS: "
survey_1541 = "<b>ALARME & BENACHRICHTIGUNGEN:</b><br>Mit Mosio können Sie Alarme als SMS-Textnachrichten senden, die sich auf der Seite Alarme & Benachrichtigungen befinden. Beim Erstellen eines neuen Alarms haben Sie die Option, entweder E-Mail (über REDCap) oder SMS (über Mosio) auszuwählen.<br><br>Die Auswahl von SMS entfernt alle E-Mail-spezifischen Einstellungen (Betreffzeile, Anhänge usw.) und zeigt ein Textfeld an, in das Sie die Telefonnummer(n) der Empfänger eingeben können. Die Alarme funktionieren weiterhin wie gewohnt, aber die Benachrichtigung wird als SMS-Nachricht statt als E-Mail gesendet.<br><br>Das Mosio-Team hilft REDCap-Benutzern seit vielen Jahren dabei, Zwei-Wege-Textnachrichten zu nutzen. Ihr REDCap-Direct-Angebot ermöglicht Benutzern, ihr System im 'Self-Service'-Ansatz zu verwenden. Weitere Funktionen und Funktionalität werden entwickelt."
survey_1542 = "<b>NÄCHSTE SCHRITTE:</b><br>Weitere Informationen und ein Mosio-Konto erhalten Sie unter <a href='https://www.mosio.com/redcap' target='_blank'><u>https://www.mosio.com/redcap</u></a>.<br>Für Einrichtungs-/Konfigurationsinformationen klicken Sie auf der Projekt-Setup-Seite Ihres REDCap-Projekts auf die Schaltfläche 'Aktivieren'.<br>Kontaktieren Sie Ihren REDCap-Administrator, um Mosio-Dienste in Ihrem Konto zu aktivieren."
survey_1545 = "Um mehr über die Verwendung von Mosio-SMS-Diensten in REDCap zu erfahren, kontaktieren Sie Ihren lokalen REDCap-Administrator."
survey_1546 = "HINWEIS: Nur ein REDCap-Administrator kann die Mosio-Dienste in Ihrem Projekt aktivieren. Bitte kontaktieren Sie ihn, um zu besprechen, wie dies erfolgen kann."
survey_1547 = "Sie können die Mosio-Dienste selbst aktivieren, indem Sie auf die Schaltfläche Aktivieren klicken; anschließend müssen Sie den bereitgestellten Anweisungen folgen, um diese Funktionalität in Ihrem Projekt vollständig zu aktivieren."
survey_1548 = "SMS-Optionen für die öffentliche Umfrage"
survey_1549 = "Sie können Teilnehmende einladen, die öffentliche Umfrage per SMS abzuschließen. Wenn Sie sie *jetzt sofort* direkt einladen möchten, klicken Sie auf die Schaltfläche unten, um ein Pop-up zum Eingeben von Telefonnummern zu öffnen, an die eine SMS-Textnachricht an die Teilnehmenden gesendet werden soll."
survey_1550 = "Teilnehmende per SMS einladen"
survey_1551 = "Geben Sie im Textfeld unten die Telefonnummern der Befragten ein, an die Sie Umfrageeinladungen per SMS-Textnachricht senden möchten."
survey_1552 = "Mosio-SMS-Dienste wurden erfolgreich aktiviert!"
survey_1553 = "Twilio-SMS- und Sprachanrufdienste wurden erfolgreich aktiviert!"
survey_1554 = "Mosio-Webdienst für SMS-Dienste aktivieren?"
survey_1555 = "Weitere Informationen und ein Mosio-Konto erhalten Sie unter <a href='https://www.mosio.com/redcap' target='_blank'><u>https://www.mosio.com/redcap</u></a>."
survey_1556 = "REDCap verwendet einen Drittanbieter-Webdienst namens Mosio (<a href='https://www.mosio.com/redcap' target='_blank'><u>https://www.mosio.com/redcap</u></a>), um Textnachrichten für SMS-Umfragen oder Alarme & Benachrichtigungen zu senden/empfangen. Dadurch können Sie Teilnehmende zur Teilnahme an einer Umfrage einladen, indem Sie ihnen eine SMS-Textnachricht senden und Daten direkt von ihrem Telefon in REDCap erheben, ohne eine Webseite zu benötigen. Es gibt mehrere Optionen zum Einladen von Teilnehmenden und Durchführen von Umfragen, z. B. über eine SMS-Konversation. Zusätzlich können Sie Alarme & Benachrichtigungen statt per E-Mail per SMS senden."
survey_1557 = "Einrichtungs- und Konfigurationsdetails anzeigen"
survey_1558 = "Um zu beginnen, müssen Sie hier ein Mosio-Konto einrichten: <a href='https://www.mosio.com/redcap' target='_blank'><u>https://www.mosio.com/redcap</u></a>.<br><br><b>REDCap arbeitet derzeit auf zwei Arten mit Mosio:</b><br>1. SMS-Umfragen - Fragen senden und Antworten per Textnachricht erhalten.<br>2. Alarme - REDCap-Umfragelinks per Textnachricht senden.<br><br>Weitere Zwei-Wege-Textnachrichten-Funktionen (Interactive “TextChat,” SMS Appointment Reminders usw.) werden entwickelt. Die folgenden Informationen helfen Ihnen bei Einrichtung und Konfiguration. Weitere Hilfe finden Sie auf der REDCap-Hilfe-&-FAQ-Seite oder auf Mosios Website: <a href='https://www.mosio.com/redcap-guide' target='_blank'><u>https://www.mosio.com/redcap-guide</u></a>.<br><br><b>EINRICHTUNG & KONFIGURATION:</b><br>Nachdem Sie ein Mosio-Konto erhalten haben, geben Sie Ihren Mosio API Key auf der Projekt-Setup-Seite Ihres REDCap-Projekts ein.<br><br>Alles ist der Durchführung einer Umfrage in REDCap sehr ähnlich, außer dass Sie wählen, wie Ihre Umfragen zugestellt werden: entweder als SMS-Umfrage oder mit Alarmen & Benachrichtigungen (Senden des REDCap-Umfragelinks per Textnachricht). Eine oder beide Zustellmethoden können in einem einzigen Projekt verwendet werden. Wenn Ihre Umfragen PHI erheben, wird empfohlen, Alarme & Benachrichtigungen zur Zustellung eines REDCap-Umfragelinks zu verwenden.<br><br><b>ALARME & BENACHRICHTIGUNGEN:</b><br>Beim Erstellen eines neuen Alarms auf der Seite Alarme & Benachrichtigungen gibt es eine Auswahl zwischen E-Mail und SMS. Die Auswahl von SMS blendet alle E-Mail-spezifischen Einstellungen aus (z. B. E-Mail-Betreff, Anhänge) und zeigt ein Telefonnummern-Textfeld zur Eingabe der Telefonnummer(n) aller Empfänger des Alarms an. Diese Alarme werden weiterhin normal ausgelöst, aber statt die Benachrichtigung per E-Mail zu senden, wird sie als SMS-Textnachricht gesendet.<br><br><b>SMS-UMFRAGEN:</b><br>Wenn Teilnehmende eine SMS-Umfrage ausfüllen, werden Fragen einzeln als SMS-Textnachrichten-Konversation/Thread gestellt. Teilnehmende können bei einer SMS-Umfrage mit jeder Art alphanumerischen Textes antworten.<br><br><b>HINWEIS ZU SMS-UMFRAGEN:</b> Nur REDCap-Administratoren dürfen die Option aktivieren, eine SMS-Umfrage zu starten. Wie E-Mail gilt SMS nicht als sichere Kommunikationsform; daher möchten Sie SMS-Umfragen möglicherweise nicht durchführen, wenn der Teilnehmer identifizierende Informationen (PHI oder PII) übermittelt, es sei denn, Sie haben eine spezielle Erlaubnis des Teilnehmers dazu erhalten. Angesichts solcher sensiblen Datenschutzfragen kann nur Ihr lokaler REDCap-Administrator die optionale Einstellung zur Verwendung von SMS-Umfragen aktivieren. Bitte benachrichtigen Sie Ihren Administrator, wenn Sie diese Option aktiviert haben möchten.<br><br><b>UMFRAGEKOMPATIBILITÄT:</b><br>Die meisten REDCap-Umfragefunktionen bleiben bei SMS-Umfragen unverändert. Dazu gehören das Erzwingen erforderlicher Felder, Feldvalidierung, Verzweigungslogik, Verwendung der Umfrage-Warteschlange für mehrere Umfragen (nur wenn Auto-Start aktiviert ist), Empfang von E-Mail-Benachrichtigungen und -Bestätigungen, Zugriff auf die Teilnehmerliste, Senden automatisierter Umfrageeinladungen, Implementieren von Stop-Aktionen und Verwendung computeradaptiver Tests (CATs), die aus der REDCap Shared Library heruntergeladen wurden. Die Umfrage-Login-Funktion ist jedoch nicht mit SMS-Umfragen kompatibel.<br><br><b>DATENSCHUTZ- & DATENSICHERHEITSINFO:</b><br>Es ist wichtig zu verstehen, dass diese Funktion den Drittanbieterdienst Mosio.com verwendet, was bedeutet, dass alle SMS-Nachrichten über Mosios Server geleitet werden. REDCap unternimmt jedoch große Anstrengungen, um sicherzustellen, dass SMS-Transkriptionen nicht in Mosios Protokollen verbleiben, sondern kurz nach Abschluss entfernt werden. Dies geschieht aus Sicherheits- und Datenschutzgründen (z. B. HIPAA), sodass die Telefonnummern Ihrer Umfrageteilnehmenden und ihre Umfrageantworten nicht dauerhaft auf Mosios Servern protokolliert werden, sondern sicher in REDCap verbleiben. Mosio ist HIPAA- und 21 CFR Part 11-konform. Weitere Informationen darüber, wie Mosio Datenschutz und Datensicherheit handhabt, können Sie deren Datenschutzerklärung anfordern."
