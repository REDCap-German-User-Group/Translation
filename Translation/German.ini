design_507 = "Adaptives Instrument kann nicht geändert werden!"
design_508 = "Dieses Instrument kann in keiner Weise geändert werden, weil es ein computeradaptiver Test (CAT) ist. Das bedeutet, dass seine Fragen dynamisch über einen Dienst außerhalb von REDCap generiert werden. Sie können das Instrument jedoch umbenennen oder löschen."
design_509 = "(Adaptiv)"
design_512 = "Optionen (nicht änderbar)"
design_513 = "Innerhalb der URL für die Fragebogeneinstellung 'Weiterleitung zu einer URL'"
design_514 = "HINWEIS: Berechnung wurde geändert - Daten sind betroffen!"
design_515 = "Es scheint, dass Sie gerade die Berechnungsgleichung eines berechneten Feldes geändert haben, das gespeicherte Daten für einen oder mehrere Datensätze enthält. Das bedeutet, dass alle gespeicherten Werte für dieses Feld nun ungültig geworden sind. Sie können sie sehr einfach korrigieren, indem Sie im linken Menü zur Seite Datenqualität wechseln, dort Regel H ausführen und anschließend im Pop-up dieser Regel auf den Button 'Fix calcs now' klicken. Dadurch werden alle gespeicherten Werte korrigiert, die von der Berechnungsänderung betroffen sind."
design_516 = "HINWEIS: Berechnungsgleichung wurde geändert!"
design_517 = "Bitte beachten Sie, dass bei einem oder mehreren berechneten Feldern, für die Datenwerte gespeichert sind, die Berechnung in den gerade freigegebenen Änderungen geändert wurde. Das bedeutet, dass alle für diese berechneten Felder gespeicherten Daten nun ungültig und falsch sind. Sie oder ein anderer Benutzer können diese Datenwerte jedoch sehr einfach korrigieren, indem Sie im linken Menü zur Seite Datenqualität wechseln, dort Regel H ausführen und anschließend im Pop-up dieser Regel auf den Button 'Fix calcs now' klicken. Dadurch werden alle gespeicherten Werte korrigiert, die von der Berechnungsänderung betroffen sind."
design_519 = "Sie können aus bestehenden Optionssätzen anderer Mehrfachauswahlfelder in diesem Projekt wählen. Klicken Sie neben jedem Satz auf den Button 'Verwenden', um diesen Optionssatz in das Choices-Textfeld des aktuellen Feldes zu importieren."
design_520 = "Verwenden"
design_521 = "Es sind keine bestehenden Optionen zum Anzeigen vorhanden."
design_522 = "Bestehende Optionen kopieren"
design_523 = "Sie dürfen nicht alle Ihre Datenerfassungsinstrumente löschen. Mindestens ein Instrument muss erhalten bleiben. Da Ihr Projekt nur ein Instrument enthält, dürfen Sie es daher nicht löschen. Wenn Sie das Instrument ersetzen möchten, sollten Sie zuerst ein neues Instrument hinzufügen und danach dieses löschen."
design_524 = "WARNUNG: Einziges Instrument kann nicht gelöscht werden!"
design_525 = "HINWEIS: Da die automatische Datensatznummerierung in diesem Projekt aktiviert ist, dürfen Sie die Feldvalidierung nicht auf etwas anderes als 'Integer' setzen."
design_526 = "Sie wurden sofort übernommen und sind bereits wirksam."
design_527 = "Feldannotation"
design_529 = "Feldannotationen können verwendet werden, um erklärende Hinweise oder Kommentare zu einem bestimmten Feld hinzuzufügen. Dies kann mehreren Zwecken dienen, etwa der Dokumentation der Feldstruktur eines Projekts (als Metadaten zum jeweiligen Feld) oder als Referenz dazu, wofür das Feld steht oder wie es verwendet werden soll (bei Dateneingabe, Analyse usw.). Feldannotationen werden auf keiner Seite angezeigt, sondern dienen nur als Referenz. Feldannotationen können auch verwendet werden, um das Feld nach Ermessen des Benutzers verschiedenen Standards (z. B. CDISC, SNOMED, LOINC) zuzuordnen, etwa mit einem einfachen ID-Code für den Standard oder einer komplexen XML-Struktur mit Informationen dazu, wie die Daten in den Standard transformiert werden. Da es sich nur um eine Annotation zu Referenzzwecken handelt, macht REDCap mit dem Feldannotationstext nicht von sich aus etwas. Die Annotation kann jedoch jederzeit von Benutzern für beliebige Zwecke abgerufen werden (typischerweise über den Download des Data Dictionary oder über den API-Metadatenexport). Zusammenfassend haben Feldannotationen keinen fest definierten Zweck; Benutzer können sie daher auf die Weise verwenden, die sie wählen."
