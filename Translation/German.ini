edit_project_29 = "Aktionen:"
edit_project_31 = "Alle Daten wurden jetzt aus dem Projekt gelöscht!"
edit_project_36 = "Alle Daten löschen?"
edit_project_37 = "<b>Sind Sie sicher, dass Sie alle Daten in diesem Projekt löschen möchten?</b> Dadurch werden alle Daten gelöscht (einschließlich aller Fragebogenantworten), Kalender-Events, in Formulare/Fragebögen hochgeladene Dokumente und alle im Datei-Repository gespeicherten Datenexportdateien. HINWEIS: Dateianhänge für Felder/Fragen werden NICHT gelöscht, ebenso wenig Fragebogenlogos, Fragebogenteilnehmer in der Teilnehmerliste oder von Benutzern im Datei-Repository hochgeladene Dateien."
edit_project_38 = "Projekteinstellungen ändern"
edit_project_41 = "Bei Änderungen an vorhandenen Datensätzen einen 'Grund' verlangen?"
edit_project_43 = "Auto-Nummerierung für neue Projektdatensätze verwenden?"
edit_project_44 = "Diese Option entfernt die Möglichkeit für Benutzer, neue Datensätze manuell zu benennen, und stellt stattdessen einen Link bereit, der automatisch einen neuen eindeutigen Datensatznamen generiert. Dieser ist numerisch und wird vom höchsten numerischen Datensatzwert im Projekt aus hochgezählt. Wenn keine Datensätze existieren, beginnt er mit '1'."
edit_project_50 = "Sie können dieses Projekt vollständig entfernen; dabei werden auch alle seine Daten dauerhaft gelöscht."
; edit_project_51 is concatenated with a dynamic project title.
edit_project_51 = "Löschen des Projekts mit dem Namen"
edit_project_52 = "Was ist die REDCap API?"
edit_project_53 = "Datenverlaufs-Popup für alle Datenerhebungsinstrumente aktivieren?"
edit_project_54 = "Wenn aktiviert, erscheint neben jedem Feld eines Datenerhebungsinstruments ein Icon. Wenn das Icon angeklickt wird, wird der Verlauf aller in dieses Feld für diesen Datensatz eingegebenen Daten chronologisch aufgelistet und zeigt alle früheren Werte, wer den Wert jeweils geändert hat und wann er geändert wurde."
; edit_project_55 is concatenated with string edit_project_56 and an Identifier Check link.
