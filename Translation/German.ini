calc_disclaimer_01 = "Aus verschiedenen Gründen wird empfohlen, 'calc'-Feldtypen in REDCap-Datenerhebungsinstrumenten nicht übermäßig zu verwenden, sondern nur dann, wenn der berechnete Wert auf dieser Seite oder auf Folgeseiten bekannt sein muss, etwa wenn das Ergebnis der Berechnung den Ablauf der Dateneingabe beeinflusst. Andernfalls ist es deutlich vorzuziehen, die Berechnung nach dem Export der Daten aus REDCap in einem Statistikpaket durchzuführen, statt ein 'calc'-Feld in REDCap zu verwenden."
calc_disclaimer_02 = "Wenn möglich, ist die Durchführung der Berechnung außerhalb von REDCap aus mehreren Gründen vorzuziehen. Statistikpakete können wesentlich robustere und präzisere Berechnungsmethoden bereitstellen und eine größere Vielfalt an Berechnungsfunktionen verarbeiten als REDCap. Außerdem ist bekannt, dass die Methode, mit der REDCap Berechnungen durchführt (mit JavaScript, einer verbreiteten Technologie in allen Webbrowsern), in seltenen Fällen Probleme mit der Berechnungsgenauigkeit haben kann (z. B. sollte das Ergebnis einer komplexen Berechnung 0.06 sein, ergibt stattdessen aber 0.06000000000000000005). Solche Genauigkeitsfehler sind jedoch sehr ungewöhnlich und treten nur sehr selten auf. Dies kann häufig durch strategische Verwendung der REDCap-Funktion round() innerhalb Ihrer Berechnung behoben werden, auch wenn dies nicht in 100 % aller Fälle vorbeugend wirkt."
calc_disclaimer_03 = "Zusammenfassend sollten 'calc'-Feldtypen in REDCap nicht übermäßig verwendet werden und nur dann eingesetzt werden, wenn das Berechnungsergebnis erforderlich ist und den Ablauf der Dateneingabe beeinflusst. Stattdessen sollte die Berechnung nach Möglichkeit nach dem Export aus REDCap in einem Statistikpaket durchgeführt werden."

calendar_02 = "Die Kalender-Anwendung kann innerhalb dieses Projekts als Projektkalender verwendet werden, um Ihre Termine zu organisieren und den Überblick über bevorstehende Events zu behalten. Sie können damit Kalender-Events hinzufügen oder ändern und diese unten im Tages-, Wochen- oder Monatsformat anzeigen. Um eine neue Notiz oder ein Kalender-Event zu einem beliebigen Tag hinzuzufügen, klicken Sie oben im Feld dieses Tages auf <b>+ Neu</b>, um mit der Eingabe der Informationen zu beginnen. "
