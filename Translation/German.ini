dataqueries_284 = "Diesen Feldkommentar löschen?"
dataqueries_285 = "Möchten Sie diesen Feldkommentar für dieses Feld und diesen Datensatz wirklich löschen? Dieser Vorgang ist irreversibel."
dataqueries_286 = "* Bearbeitet"
dataqueries_287 = "HINWEIS: Wenn Sie verhindern möchten, dass alle Benutzer in diesem Projekt die untenstehenden Feldkommentare bearbeiten oder löschen, siehe das Pop-up Zusätzliche Anpassungen auf der Projekt-Setup-Seite."
