design_957 = "<b>WICHTIGER HINWEIS:</b> Standardmäßig haben noch keine Benutzer im Projekt Zugriff auf dieses neue Instrument. Denken Sie daher bitte daran, <u>nachdem Ihre aktuellen Entwurfsmodus-Änderungen freigegeben wurden</u>, allen relevanten Benutzern/Rollen Anzeige-/Bearbeitungsrechte zu gewähren oder sich mit einem Benutzerrechte-Manager des Projekts abzustimmen, um den Zugriff auf dieses Instrument zu öffnen."
design_960 = "<b>FEHLER:</b><br>Möglicherweise haben Sie Ihr Data Dictionary im Microsoft-Excel-2003- (XLS) oder 2007-Format (XLSX) gespeichert, es muss hier beim Hochladen jedoch im CSV-Format vorliegen. Um dies zu beheben, öffnen Sie es in Excel und speichern Sie die Datei erneut als CSV (kommagetrenntes Format). Versuchen Sie dann erneut, sie hochzuladen."
