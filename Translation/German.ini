data_entry_727 = "Hintergrundlöschungen anzeigen"
data_entry_728 = "Das aktuelle Feld, für das Sie gerade Daten eingegeben haben, erfordert, dass einige Felder ausgeblendet werden. Diese Felder haben jedoch bereits Werte, daher müssen ihre Werte möglicherweise auf einen leeren Wert zurückgesetzt werden."
