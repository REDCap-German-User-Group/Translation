report_builder_215 = "Anfrage, den Report öffentlich zu machen, ist ausstehend"
report_builder_216 = "Seite wird gerendert... bitte warten"
report_builder_217 = "Dieser Report kann unter diesem öffentlichen Link nicht angezeigt werden, weil der Report das sekundäre eindeutige Feld anzeigt, das als Identifier-Feld markiert wurde und private/sensible Informationen enthalten könnte. Obwohl dieses Feld kein Feld im Report ist, wird sein Wert neben dem Record-ID-Feld angezeigt, das im Report angezeigt wird."
report_builder_218 = "Dieser Report kann unter diesem öffentlichen Link nicht angezeigt werden, weil der Report die benutzerdefinierte Datensatzbeschriftung anzeigt, die ein oder mehrere Felder enthält, die als Identifier-Felder markiert wurden und private/sensible Informationen enthalten könnten. Obwohl diese Felder keine Felder im Report sind, werden ihre Werte neben dem Record-ID-Feld angezeigt, das im Report angezeigt wird."
