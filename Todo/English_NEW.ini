	
alerts_417 = "This setting is optional for Alerts & Notifications that are scheduled relative to a stored date/time. When enabled, REDCap will automatically <b>update the scheduled send-time for an <u>unsent/scheduled</u> alert</b> whenever the value of the date/datetime field is modified.<br><br>NOTE: No other attributes of the notification will be updated, such as recipient, sender, subject, content; only the send-time will change."
alerts_418 = "Re-evaluate send-time for future notifications?"
