design_1504 = "Learn how to {0:LinkStart}Copy/Paste Fields{1:LinkEnd} between forms."
design_1505 = "Copy/Paste Fields"
design_1506 = "Use Copy/Paste Fields to move field definitions quickly between forms. Copied fields are placed on your clipboard and can be pasted into any other form that supports this feature, whether the target form is in the same project, another project, or even another REDCap instance."
design_1507 = "Copy a single field"
design_1508 = "Hold <kbd>Ctrl</kbd> and click the <b>Copy Field</b> button for the field you want to copy."
design_1509 = "Copy multiple fields"
design_1510 = "Open the <b>Quick Edit Field</b> dialog and use the <b>Copy fields</b> option to copy several fields at once."
design_1511 = "Paste fields"
design_1512 = "Click <b>Paste Field(s)</b> where the copied field or fields should be inserted. REDCap will first validate the clipboard content. If the content can be pasted, REDCap will either paste it immediately or show a confirmation dialog, depending on how many fields are included and whether any issues were detected."
design_1513 = "Other sources"
design_1514 = "Copied fields do not have to come from REDCap's Online Designer. They can also come from a field bank, a website, a shared template, or an AI assistant. This works as long as the clipboard contains a compatible REDCap Pasteable Fields JSON structure."
design_1515 = "One useful workflow is to ask an AI assistant to generate REDCap fields in this JSON format, then paste the generated fields directly into a form."
design_1516 = "Technical details"
design_1517 = "REDCap expects the clipboard content to contain JSON using the <code>{0}</code> format. The JSON contains an items array with one or more field definitions, plus optional file metadata and file data for attachments or embedded files/images."
design_1518 = "Copy JSON schema"
design_1519 = "This schema documents the public interchange format. REDCap may still apply project-specific validation after reading the clipboard content."
design_1520 = "Copy an example field to the clipboard"
design_1521 = "Limitations"
