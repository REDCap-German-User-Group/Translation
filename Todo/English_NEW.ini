asi_063 = "Re-evaluate the send-time for scheduled invitations when this field's value is updated?"
asi_064 = "This setting is optional for Automated Survey Invitations (ASI) that are scheduled relative to a stored date/time. When enabled, REDCap will automatically <b>update the scheduled send-time for an <u>unsent/scheduled</u> invitation</b> whenever the value of the date/datetime field is modified.<br><br>NOTE: No other attributes of the invitation will be updated, such as sender, subject, content; only the send-time will change. Additionally, be aware that for ASIs with reminders, if the initial invitation has already been sent, any subsequent unsent reminders will <u>not</u> have their send-time modified in this situation."
asi_065 = "Re-evaluate send-time for future invitations?"
