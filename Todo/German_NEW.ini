multilang_817 = "Übersetzungsanweisungen: Füllen oder aktualisieren Sie nur die \"translation\"-Werte mit natürlichem Text für die Sprache, die durch die root-Felder \"key\" und \"display\" identifiziert wird. Verwenden Sie den benachbarten \"default\"-Wert als Ausgangstext und den optionalen \"prompt\"-Wert als Kontext. Bewahren Sie die JSON-Struktur und REDCap-spezifische Syntax unverändert, einschließlich HTML-Tags und -Attribute, Rich-Text-Wrapper, Feld-Piping wie [field], Smart Variables, Action Tags, Feldeinbettungen, Platzhalter wie {field}, Zeilenumbrüche, anzeigerelevante Leerzeichen und alle durch \"valid-translation-values\" eingeschränkten Codes. Übersetzen Sie keine ids, hashes, paths, field names oder import metadata. Teilmengen dieser Datei können importiert werden, solange sie gültiges JSON bleiben; nicht passende Pfade oder ids werden von REDCap beim Import ignoriert."
rewards_settings_bypass_sensitive_confirmation_note = "Wenn aktiviert, müssen Benutzer, die Rewards-Berechtigungen verwalten, weiterhin einen Grund eingeben, der zu Prüfzwecken geloggt wird, aber REDCap erfordert den zusätzlichen Bestätigungsschritt für sensible Aktionen nicht."
rewards_settings_bypass_sensitive_confirmation_title = "Sensible Bestätigung beim Verwalten von Rewards-Berechtigungen umgehen?"
ws_383 = "Warum Mehr Ergebnisse abrufen angezeigt wird"
ws_384 = "REDCap prüft EHR-Daten in handhabbaren Batches. In diesem Modal bedeutet eine Seite einen Satz von EHR-Ergebnissen, den REDCap geprüft hat. Eine Seite kann der erste Ergebnissatz für einen gemappten FHIR-Ressourcentyp sein oder ein weiterer Satz für denselben Ressourcentyp, wenn das EHR diese Daten auf mehrere Antworten aufteilt. Wenn weitere Seiten verfügbar sind, setzt Mehr Ergebnisse abrufen dieselbe Aktualisierung fort und kann neue Werte hinzufügen, wenn die verbleibenden EHR-Daten gemappten Feldern entsprechen."
ws_385 = "Hilfe"
