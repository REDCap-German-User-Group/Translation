cdis_pm_share_info_before_use_body = "Bevor REDCap SHARE-Links an Teilnehmer gesendet werden, bestätigen Sie:"
cdis_pm_share_info_before_use_heading = "Vor der Verwendung von REDCap SHARE in einer Studie"
cdis_pm_share_info_before_use_item_1 = "Bestätigen Sie, dass REDCap SHARE für den Studienworkflow und die Einwilligungssprache genehmigt ist."
cdis_pm_share_info_before_use_item_1_01 = "REDCap SHARE ist für den Studienworkflow und den Einwilligungsprozess genehmigt"
cdis_pm_share_info_before_use_item_2 = "Bestätigen Sie, dass die benötigten Gesundheitsorganisationen für das Project verfügbar sind."
cdis_pm_share_info_before_use_item_2_01 = "Die erforderlichen Gesundheitsorganisationen sind für das Project verfügbar"
cdis_pm_share_info_before_use_item_3 = "Testen Sie den Teilnehmerworkflow und das Datenmapping, bevor REDCap SHARE-Links an Teilnehmer gesendet werden."
cdis_pm_share_info_before_use_item_3_01 = "Der Teilnehmerworkflow und die Datenmappings wurden erfolgreich getestet"
cdis_pm_share_info_heading = "Über REDCap SHARE"
cdis_pm_share_info_important_notes_label = "Wichtige Hinweise:"
cdis_pm_share_info_intro = "Mit REDCap SHARE können Teilnehmer eine Verbindung zu ihrem eigenen Portal für elektronische Patientenakten herstellen und REDCap autorisieren, Gesundheitsdaten für Forschungszwecke abzurufen. Es verwendet SMART on FHIR, sodass sich der Teilnehmer bei der Gesundheitsorganisation anmeldet und auswählt, ob Zugriff gewährt werden soll."
cdis_pm_share_info_intro_01 = "REDCap SHARE erlaubt Teilnehmern, ihr Portal für elektronische Patientenakten (EHR) mit REDCap zu verbinden und die sichere Weitergabe von Gesundheitsdaten für Forschungszwecke zu autorisieren. Es verwendet SMART-on-FHIR-Technologie, was bedeutet, dass Teilnehmer sich direkt über ihre Gesundheitsorganisation anmelden und auswählen, ob Zugriff erlaubt werden soll."
cdis_pm_share_info_participant_body = "Teilnehmer wählen ihre Gesundheitsorganisation aus, melden sich im Portal dieser Organisation an, prüfen die Autorisierungsanfrage und kehren nach Genehmigung oder Abbruch der Verbindung zu REDCap zurück."
cdis_pm_share_info_participant_heading = "Was Teilnehmer sehen"
cdis_pm_share_info_participant_heading_01 = "Was Teilnehmer erleben"
cdis_pm_share_info_participant_item_1 = "Ihre Gesundheitsorganisation auswählen"
cdis_pm_share_info_participant_item_2 = "Sich über das Patientenportal dieser Organisation anmelden"
cdis_pm_share_info_participant_item_3 = "Die Autorisierungsanfrage prüfen"
cdis_pm_share_info_participant_item_4 = "Auswählen, ob Zugriff auf ihre Gesundheitsdaten erlaubt werden soll"
cdis_pm_share_info_participant_item_5 = "Nach Genehmigung oder Ablehnung der Verbindung zu REDCap zurückkehren"
cdis_pm_share_info_participant_will_label = "Teilnehmer werden:"
cdis_pm_share_info_privacy_body = "REDCap erfasst weder Benutzername noch Passwort des EHR-Portals des Teilnehmers. Die Gesundheitsorganisation übernimmt die Anmeldung, und REDCap erhält nur das Autorisierungsergebnis und die klinischen Daten, die durch diese Autorisierung erlaubt sind."
cdis_pm_share_info_privacy_body_01 = "REDCap erfasst oder speichert keine Benutzernamen oder Passwörter der Patientenportale von Teilnehmern. Die Anmeldung wird vollständig von der Gesundheitsorganisation übernommen. REDCap erhält nur das Autorisierungsergebnis und die Gesundheitsdaten, die durch diese Autorisierung erlaubt sind."
cdis_pm_share_info_privacy_heading = "Was REDCap nicht erfasst"
cdis_pm_share_info_project_setup_body = "Wenn REDCap SHARE für ein Project aktiviert ist, kann das Project datensatzspezifische REDCap SHARE-Links erzeugen und sie im Teilnehmerworkflow verwenden. Benutzer mit Projekt-Setup-Rechten sollten bestätigen, dass die Studie bereit ist, bevor diese Links verteilt werden."
cdis_pm_share_info_project_setup_body_01 = "Wenn REDCap SHARE für ein Project aktiviert ist, kann das Project teilnehmerspezifische REDCap SHARE-Links als Teil des Studienworkflows erzeugen. Benutzer mit Projekt-Setup-Rechten sollten sicherstellen, dass die Studie vollständig konfiguriert und bereit ist, bevor diese Links an Teilnehmer gesendet werden."
cdis_pm_share_info_project_setup_heading = "Was die Einstellung in Project Setup steuert"
cdis_pm_share_info_project_setup_heading_01 = "Was diese Einstellung in Project Setup bewirkt"
cdis_pm_share_info_project_setup_item_1 = "Jeder REDCap SHARE-Link ist mit einem REDCap-Datensatz verknüpft und sollte nicht für einen anderen Teilnehmer wiederverwendet werden."
cdis_pm_share_info_project_setup_item_1_01 = "Jeder REDCap SHARE-Link ist mit einem bestimmten REDCap-Datensatz verbunden und sollte nur für diesen Teilnehmer verwendet werden."
cdis_pm_share_info_project_setup_item_2 = "Die verfügbaren Gesundheitsorganisationen stammen aus dem REDCap SHARE-EHR-Konfigurationskatalog, der von REDCap-Administratoren verwaltet wird."
cdis_pm_share_info_project_setup_item_2_01 = "Die Liste der verfügbaren Gesundheitsorganisationen stammt aus dem REDCap SHARE-EHR-Katalog, der von REDCap-Administratoren verwaltet wird."
cdis_pm_share_info_project_setup_item_3 = "Importierte EHR-Daten hängen weiterhin von den REDCap SHARE-Mappings des Projects und jedem projektspezifischen Prüfworkflow ab."
cdis_pm_share_info_project_setup_item_3_01 = "Importierte EHR-Daten hängen von den REDCap SHARE-Mappings des Projects und jedem projektspezifischen Prüf- oder Genehmigungsworkflow ab."

