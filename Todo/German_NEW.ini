openai_157 = "Text für MLM automatisch übersetzen"
openai_158 = "REDCap kann Artificial Intelligence (AI) verwenden, um Benutzer bei Aufgaben zu unterstützen, die bestehende Funktionen erweitern. Sie können unten mehrere Einstellungen erstellen, um verschiedene KI-basierte Dienste zu aktivieren und zu konfigurieren. Auf Projektebene können einzelne Einstellungen verwendet werden.    Mehrere KI-Funktionen werden durch Verbindung mit einem KI-Dienst über einen privaten Endpunkt in einem virtuellen Netzwerk implementiert, das Ihre Einrichtung kontrolliert. Dadurch wird ein höchstes Maß an Sicherheit und Datenschutz gewährleistet."
openai_159 = "Wählen Sie einen KI-Dienst aus und geben Sie die entsprechenden Werte ein, um die KI-Konfiguration zu erstellen, die auf Systemebene oder von jedem Projekt über die Seite <b>Projekteinstellungen bearbeiten</b> verwendet werden kann."
openai_160 = "Sie finden {0}hier Optionen{1} zu möglichen Wegen, eine OpenAI-Bereitstellung einzurichten und zu hosten."
openai_161 = "Bitte KI-Dienst auswählen."
openai_162 = "Bitte Abschnitt OpenAI-Konfiguration ausfüllen."
openai_163 = "Bitte Abschnitt Gemini-KI-Konfiguration ausfüllen."
openai_164 = "Projekte von der Verwendung dieser KI-Konfigurationseinstellung ausschließen"
openai_165 = "Unten sind alle REDCap-Projekte im Produktions- oder Entwicklungsstatus für ALLE Benutzer aufgeführt. Wählen Sie ein oder mehrere Projekte aus, für die Sie NICHT möchten, dass diese KI-Konfigurationseinstellung verwendet wird. Bei ALLEN unten nicht angehakten Projekten wird diese KI-Konfigurationseinstellung als auswählbare Option auf der Seite 'Projekteinstellungen bearbeiten' des Projekts angezeigt."
openai_166 = "Für die unten ausgewählten Projekte die KI-Konfigurationseinstellung NICHT verwenden "
openai_167 = "auf der Seite 'Projekteinstellungen bearbeiten' eines Projekts."
openai_168 = "Wenn eine oder mehrere KI-Konfigurationseinstellungen global hinzugefügt wurden, kann eine davon auf Projektebene ausgewählt werden, damit die jeweiligen KI-Ressourcen-/Endpunktwerte für dieses Projekt verwendet werden."
openai_169 = "KI-Konfiguration standardmäßig für alle Projekte aktiviert:"
openai_170 = "KI-Konfiguration für alle Nicht-Projektseiten aktiviert:"
openai_171 = "Wenn eine Einstellung ausgewählt ist, werden die entsprechenden KI-Konfigurationseinstellungen für verschiedene KI-basierte Dienste auf Systemebene verwendet. Wenn \'Deaktiviert\' ausgewählt ist, ist dies auf Systemebene deaktiviert."
openai_172 = "Wenn eine Einstellung ausgewählt ist, werden die entsprechenden KI-Konfigurationseinstellungen standardmäßig für verschiedene KI-basierte Dienste auf Projektebene verwendet. Wenn \'Deaktiviert\' ausgewählt ist, wird eine vom Benutzer auf der Seite Projekteinstellungen bearbeiten ausgewählte KI-Konfigurationseinstellung verwendet."
openai_173 = "KI-Konfiguration auswählen"
openai_174 = "Kann nicht gelöscht werden!"
openai_175 = "Diese Einstellung kann nicht gelöscht werden, weil sie systemweit angewendet wird oder als Standard für alle Projekte festgelegt ist. Sie können sie jedoch löschen, indem Sie die Auswahl im jeweiligen Abschnitt aufheben."
openai_176 = "Möchten Sie wirklich löschen"
openai_177 = "KI-Konfiguration für bestimmte Projekte aktiviert:"
openai_178 = "Siehe Seite \"Projekteinstellungen bearbeiten\" für ein bestimmtes Projekt."
openai_179 = "Hinweis: Wenn oben eine KI-Konfiguration standardmäßig für alle Projekte aktiviert ist, kann für jedes Projekt bei Bedarf auf der Seite Projekteinstellungen bearbeiten eine Überschreibung auf Projektebene festgelegt werden (oder alle KI-Funktionen können deaktiviert werden)."
openai_180 = "[Standardkonfiguration für alle Projekte]"
