em_manage_109 = "Ich bestätige, dass ich beabsichtige, <b>ALLE Einstellungen</b> in diesem Project für Module zu ersetzen, die im bereitgestellten Export enthalten sind. Ich verstehe, dass für Module im bereitgestellten Export alle Einstellungen, die nicht ebenfalls im Export vorhanden sind, <b>dauerhaft entfernt werden, einschließlich versteckter Einstellungen</b>, die im Hintergrund von jedem Modul verwendet werden. Ich verstehe, dass vor dem Klick auf <b>Import</b> unten dringend empfohlen wird, einen Einstellungsexport für alle Module in diesem Project durchzuführen und als Backup zu speichern. Nach Abschluss des Imports stimme ich zu, die Einstellungen für betroffene Module zu prüfen und diese vollständig zu testen, um sicherzustellen, dass sie sich wie erwartet verhalten."
