alerts_417 = "Diese Einstellung ist optional für Alarme & Benachrichtigungen, die relativ zu einem gespeicherten Datum/einer gespeicherten Uhrzeit geplant werden. Wenn aktiviert, wird REDCap die geplante Sendezeit für einen <u>ungesendeten/geplanten</u> Alarm automatisch <b>aktualisieren</b>, sobald der Wert des Datums-/Datetime-Feldes geändert wird.<br><br>HINWEIS: Keine anderen Eigenschaften der Benachrichtigung werden aktualisiert, z. B. Empfänger, Absender, Betreff, Inhalt; nur die Sendezeit ändert sich."
alerts_418 = "Sendezeit für zukünftige Benachrichtigungen neu auswerten?"
alerts_419 = "Sendezeit für geplante Benachrichtigungen neu auswerten, wenn der Wert dieses Feldes aktualisiert wird?"
asi_063 = "Sendezeit für geplante Einladungen neu auswerten, wenn der Wert dieses Feldes aktualisiert wird?"
asi_064 = "Diese Einstellung ist optional für Automated Survey Invitations (ASI), die relativ zu einem gespeicherten Datum/einer gespeicherten Uhrzeit geplant werden. Wenn aktiviert, wird REDCap die geplante Sendezeit für eine <u>ungesendete/geplante</u> Einladung automatisch <b>aktualisieren</b>, sobald der Wert des Datums-/Datetime-Feldes geändert wird.<br><br>HINWEIS: Keine anderen Eigenschaften der Einladung werden aktualisiert, z. B. Absender, Betreff, Inhalt; nur die Sendezeit ändert sich. Beachten Sie außerdem, dass bei ASIs mit Erinnerungen die Sendezeit aller nachfolgenden ungesendeten Erinnerungen in dieser Situation <u>nicht</u> geändert wird, wenn die erste Einladung bereits gesendet wurde."
asi_065 = "Sendezeit für zukünftige Einladungen neu auswerten?"
