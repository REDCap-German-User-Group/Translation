design_1505 = "Felder kopieren/einfügen"
design_1506 = "Verwenden Sie Felder kopieren/einfügen, um Felddefinitionen schnell zwischen Formularen zu verschieben. Kopierte Felder werden in Ihrer Zwischenablage abgelegt und können in jedes andere Formular eingefügt werden, das diese Funktion unterstützt, unabhängig davon, ob sich das Zielformular im selben Projekt, in einem anderen Projekt oder sogar in einer anderen REDCap-Instanz befindet."
design_1507 = "Ein einzelnes Feld kopieren"
design_1508 = "Halten Sie <kbd>Ctrl</kbd> gedrückt und klicken Sie auf den Button <b>Feld kopieren</b> für das Feld, das Sie kopieren möchten."
design_1509 = "Mehrere Felder kopieren"
design_1510 = "Öffnen Sie den Dialog <b>Feld schnell bearbeiten</b> und verwenden Sie die Option <b>Felder kopieren</b>, um mehrere Felder auf einmal zu kopieren."
design_1511 = "Felder einfügen"
design_1512 = "Klicken Sie auf <b>Feld(er) einfügen</b> an der Stelle, an der das kopierte Feld oder die kopierten Felder eingefügt werden sollen. REDCap validiert zuerst den Inhalt der Zwischenablage. Wenn der Inhalt eingefügt werden kann, fügt REDCap ihn entweder sofort ein oder zeigt einen Bestätigungsdialog an, je nachdem, wie viele Felder enthalten sind und ob Probleme erkannt wurden."
design_1513 = "Andere Quellen"
design_1514 = "Kopierte Felder müssen nicht aus REDCaps Online Designer stammen. Sie können auch aus einer Field Bank, einer Website, einer geteilten Vorlage oder einem KI-Assistenten stammen. Dies funktioniert, solange die Zwischenablage eine kompatible REDCap Pasteable Fields JSON-Struktur enthält."
design_1515 = "Ein nützlicher Workflow ist, einen KI-Assistenten zu bitten, REDCap-Felder in diesem JSON-Format zu erzeugen, und die erzeugten Felder dann direkt in ein Formular einzufügen."
design_1516 = "Technische Details"
design_1517 = "REDCap erwartet, dass der Inhalt der Zwischenablage JSON im Format <code>{0}</code> enthält. Das JSON enthält ein items-Array mit einer oder mehreren Felddefinitionen sowie optionale Dateimetadaten und Dateidaten für Anhänge oder eingebettete Dateien/Bilder."
design_1518 = "JSON-Schema kopieren"
design_1519 = "Dieses Schema dokumentiert das öffentliche Austauschformat. REDCap kann nach dem Lesen des Zwischenablageinhalts weiterhin projektspezifische Validierung anwenden."
