dataqueries_382 = "<b>WARNUNG:</b> Da Sie den Data Resolution Workflow verwenden, beachten Sie bitte, dass beim Löschen ausgewählter Datenqualitätsregeln, deren <u>Logik mehr als eine Feldvariable enthält</u>, zusätzlich ALLE DATA QUERIES (offen oder geschlossen) GELÖSCHT WERDEN, die derzeit mit diesen Regeln verknüpft sind. Dies ist ein dauerhafter und unumkehrbarer Prozess. Wenn die DQ-Regel eine Logik mit nur einer einzelnen Variable hat (z. B. [age] >= 18), wird die Data Query nicht gelöscht, bleibt aber weiterhin über das Feld selbst auf dessen Eingabeformular zugänglich."
