em_manage_16 = "Sie können optional im Textfeld unten benutzerdefinierten Text angeben, der Benutzern auf der External Modules-Seite 'Project Module Manager' in jedem Project angezeigt wird. Dies kann hilfreich sein, um Benutzern aus einem der folgenden Gründe benutzerdefinierten Text bereitzustellen: 1) Um Benutzer auf institutionelle Richtlinien oder Verfahren aufmerksam zu machen, die erforderlich sind, bevor ein Administrator ein Modul aktivieren kann, 2) um Leitlinien (oder einen Link zu einer externen Seite mit Leitlinien) zur Nutzung bestimmter Module an Ihrer Institution anzuzeigen, oder 3) um Benutzer auf etwas aufmerksam zu machen, das in Bezug auf bestimmte Module oder External Modules allgemein hilfreich sein könnte."
